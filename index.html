<script>
  // captura erros do modulo (import falho, sintaxe, runtime) e mostra na tela
  function showFatal(msg){
    var el=document.getElementById('app'); if(!el) return;
    var esc=String(msg==null?'erro desconhecido':msg).replace(/[<>&]/g,function(c){return ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c];});
    el.innerHTML='<div style="font-family:system-ui,sans-serif;padding:24px;max-width:720px;margin:24px auto;color:#1A1B1E">'
      +'<h2 style="font-family:Georgia,serif;margin:0 0 6px">QualiLab nao carregou</h2>'
      +'<p style="color:#5C5F66;margin:0 0 12px">Houve um erro ao iniciar. O detalhe abaixo ajuda a depurar. Causas comuns: alguma biblioteca de CDN bloqueada pela rede, ou um erro de digitacao ao colar as credenciais do Supabase.</p>'
      +'<pre style="white-space:pre-wrap;background:#F3ECD9;border:1px solid #d9c89a;border-radius:8px;padding:12px;font-size:12px;overflow:auto">'+esc+'</pre></div>';
  }
  window.addEventListener('error', function(e){ showFatal((e.error&&e.error.stack)||e.message||(e.filename?(e.filename+':'+e.lineno):'')||'erro'); });
  window.addEventListener('unhandledrejection', function(e){ var r=e.reason; showFatal((r&&(r.stack||r.message))||String(r)); });
</script>

/* ============ CORES (matiz = familia, luminosidade = profundidade) ============ */
const HUES = [210, 28, 150, 350, 268, 184, 322, 70];
function codeColor(hue, depth){
  const H = HUES[((hue % HUES.length)+HUES.length)%HUES.length];
  const solidL = Math.min(70, 32 + depth*13);
  const bgL = Math.min(94, 86 + depth*3);
  return { solid:`hsl(${H} 58% ${solidL}%)`, tint:`hsl(${H} 55% ${bgL}%)`, H };
}

/* ============ TIPOS DE CATEGORIA ============
   'single' (token legado) = Multipla Escolha. Os demais tokens sao novos.
   Os tipos com lista de valores: select, single, checkbox. Caixa de Selecao
   guarda varios valores num unico campo, separados por CAT_MULTI_SEP. */
const CAT_KINDS = [
  { id:'select',   label:'Texto Fechado' },
  { id:'text',     label:'Texto Aberto' },
  { id:'date',     label:'Data' },
  { id:'single',   label:'Múltipla Escolha' },
  { id:'checkbox', label:'Caixa de Seleção' },
];
const CAT_LABEL = (k)=> (CAT_KINDS.find(x=>x.id===k)||{}).label || 'Texto Aberto';
const CAT_HAS_OPTIONS = (k)=> k==='select' || k==='single' || k==='checkbox';
const CAT_MULTI_SEP = ' | ';
// valores especiais guardados dentro de options (sem precisar de colunas novas):
// NAO_INFO = "o documento nao informa"; OUTROS = habilita um valor livre "Outros".
const NAO_INFO = 'Não informado';
const OUTROS = 'Outros';
const isSpecialOpt = (o)=> o===NAO_INFO || o===OUTROS;

/* ============ EXTRACAO DE TEXTO ============ */
async function extractText(file){
  const n = (file.name||'').toLowerCase();
  if(n.endsWith('.txt')||n.endsWith('.md')||n.endsWith('.markdown')|| (file.type||'').startsWith('text/'))
    return await file.text();
  if(n.endsWith('.docx')){
    const ab = await file.arrayBuffer();
    const r = await (await getMammoth()).extractRawText({ arrayBuffer: ab });
    return (r && r.value) || '';
  }
  if(n.endsWith('.pdf')){
    const ab = await file.arrayBuffer();
    const pdfjsLib = await getPdfjs();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    const pages = [];
    for(let p=1;p<=pdf.numPages;p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      let out = '', lastY = null;
      tc.items.forEach(it=>{
        if('str' in it){
          const y = it.transform ? it.transform[5] : null;
          if(lastY!==null && y!==null && Math.abs(y-lastY)>2 && !out.endsWith('\n')) out += '\n';
          out += it.str + (it.hasEOL ? '\n' : ' ');
          lastY = y;
        }
      });
      pages.push(out.trim());
    }
    return pages.join('\n\n');
  }
  return await file.text();
}

/* ============ RUNS (segmentacao do texto para os grifos) ============ */
function buildRuns(text, codings){
  const b = new Set([0, text.length]);
  codings.forEach(c=>{ if(c.span_start>=0 && c.span_end>c.span_start){ b.add(c.span_start); b.add(c.span_end);} });
  const pts = [...b].filter(p=>p>=0&&p<=text.length).sort((x,y)=>x-y);
  const runs=[];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], z=pts[i+1]; if(z<=a) continue;
    runs.push({ start:a, end:z, text:text.slice(a,z), codings:codings.filter(c=>c.span_start>=0&&c.span_start<=a&&c.span_end>=z) });
  }
  return runs;
}

function hslToHex(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  const toHex=v=>Math.round(v*255).toString(16).padStart(2,'0');
  return '#'+toHex(f(0))+toHex(f(8))+toHex(f(4));
}
function hueOf(hex){
  const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex||'');
  if(!m) return 0;
  const r=parseInt(m[1],16)/255, g=parseInt(m[2],16)/255, b=parseInt(m[3],16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  let h=0;
  if(d!==0){ if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0) h+=360; }
  let best=0, bd=999;
  HUES.forEach((H,i)=>{ const dd=Math.min(Math.abs(H-h),360-Math.abs(H-h)); if(dd<bd){bd=dd;best=i;} });
  return best;
}
function xmlEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripGuid(g){ return String(g||'').replace(/[{}]/g,'').trim(); }

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));

function csvEscape(s){ s = s==null ? "" : String(s); return /[",\n\r]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function toCSV(rows){ return rows.map(r=>r.map(csvEscape).join(",")).join("\r\n"); }
function codePathFor(codes,id){ const by={}; codes.forEach(c=>by[c.id]=c); const o=[]; let c=by[id],g=0; while(c&&g++<12){o.unshift(c.name);c=c.parent_id?by[c.parent_id]:null;} return o; }
function download(name,text,mime){ const b=new Blob([text],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }

/* ============ QDPX (REFI-QDA Project Exchange) ============
   Compatível com ATLAS.ti, MAXQDA, NVivo, Quirkos, Taguette.
   Mapeamento: documento -> TextSource; categoria do documento -> Variable + Case;
   codigo -> Code (hierarquico); trecho codificado -> PlainTextSelection + Coding. */
function buildCodeXml(code, byParent){
  const kids = byParent[code.id] || [];
  const hex = hslToHex(HUES[((code.hue%HUES.length)+HUES.length)%HUES.length], 58, Math.min(70,32+code.depth*13));
  return `<Code guid="${stripGuid(code.id)}" name="${xmlEsc(code.name)}" isCodable="true" color="${hex}">`
    + kids.map(k=>buildCodeXml(k, byParent)).join('')
    + `</Code>`;
}

async function exportQDPX(docs, cats, allV, codes, allC, project){
  const JSZip = await getJSZip();
  const zip = new JSZip();
  const srcFolder = zip.folder('sources');

  // usuarios (autores distintos -> guid)
  const authorGuid = {};
  const ensureAuthor = (name)=>{ const n=name||'anonimo'; if(!authorGuid[n]) authorGuid[n]=uid(); return authorGuid[n]; };
  allV.forEach(v=>ensureAuthor(v.author));
  allC.forEach(c=>ensureAuthor(c.author_name));

  // arvore de codigos
  const byParent = {};
  codes.forEach(c=>{ const p=c.parent_id||'__root__'; (byParent[p]=byParent[p]||[]).push(c); });
  const topCodes = byParent['__root__']||[];
  const codesXml = topCodes.map(c=>buildCodeXml(c, byParent)).join('');

  // variaveis (categorias do documento). o tipo e a lista de valores entram na
  // Description em texto legivel; o proprio QualiLab reconstroi tudo na importacao.
  const variablesXml = cats.map(c=>{
    const bits = [`tipo: ${c.kind||'text'}`];
    if((c.options||[]).length) bits.push(`valores: ${c.options.join(', ')}`);
    // sempre Text: nossas datas podem ser parciais (DD/MM/AAAA), invalidas como Date ISO
    return `<Variable guid="${stripGuid(c.id)}" name="${xmlEsc(c.name)}" typeOfVariable="Text"><Description>${xmlEsc(bits.join(' | '))}</Description></Variable>`;
  }).join('');

  // sources (um TextSource por documento, conteudo gravado em sources/<guid>.txt)
  let sourcesXml = '';
  for(const d of docs){
    srcFolder.file(`${stripGuid(d.id)}.txt`, d.content);
    const docCodings = allC.filter(c=>c.document_id===d.id);
    const selXml = docCodings.map(c=>{
      const codingGuid = uid();
      const au = ensureAuthor(c.author_name);
      const name = (c.quote||'').slice(0,80);
      return `<PlainTextSelection guid="${stripGuid(c.id)}" name="${xmlEsc(name)}" startPosition="${c.span_start}" endPosition="${c.span_end}" creatingUser="${au}">`
        + `<Coding guid="${codingGuid}" creatingUser="${au}"><CodeRef targetGUID="${stripGuid(c.code_id)}"/></Coding>`
        + `</PlainTextSelection>`;
    }).join('');
    sourcesXml += `<TextSource guid="${stripGuid(d.id)}" name="${xmlEsc(d.name)}" plainTextPath="internal://${stripGuid(d.id)}.txt">${selXml}</TextSource>`;
  }

  // cases (um por documento, com os valores de categoria daquele documento)
  const casesXml = docs.map(d=>{
    const vv = allV.filter(v=>v.document_id===d.id).map(v=>
      `<VariableValue><VariableRef targetGUID="${stripGuid(v.category_id)}"/><TextValue>${xmlEsc(v.value)}</TextValue></VariableValue>`).join('');
    return `<Case guid="${uid()}" name="${xmlEsc(d.name)}"><SourceRef targetGUID="${stripGuid(d.id)}"/>${vv}</Case>`;
  }).join('');

  const usersXml = Object.entries(authorGuid).map(([name,g])=>`<User guid="${g}" name="${xmlEsc(name)}"/>`).join('');

  const qde = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n`
    + `<Project xmlns="urn:QDA-XML:project:1.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" `
    + `xsi:schemaLocation="urn:QDA-XML:project:1.0 http://schema.qdasoftware.org/versions/Project/v1.0/Project.xsd" `
    + `name="${xmlEsc(project.name||'Projeto QualiLab')}" origin="QualiLab" creationDateTime="${new Date().toISOString()}">`
    + `<Users>${usersXml}</Users>`
    + `<CodeBook><Codes>${codesXml}</Codes></CodeBook>`
    + `<Variables>${variablesXml}</Variables>`
    + `<Cases>${casesXml}</Cases>`
    + `<Sources>${sourcesXml}</Sources>`
    + `</Project>`;

  zip.file('project.qde', qde);
  const blob = await zip.generateAsync({ type:'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (project.name||'qualilab_projeto').replace(/[^\w\-]+/g,'_') + '.qdpx';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}

/* leitura de .qdpx para dentro do projeto ativo */
async function importQDPX(file, store, projectId){
  const JSZip = await getJSZip();
  const zip = await JSZip.loadAsync(await file.arrayBuffer());
  const qdeEntry = Object.keys(zip.files).find(k=>/\.qde$/i.test(k));
  if(!qdeEntry) throw new Error('Arquivo .qdpx sem project.qde');
  const xmlText = await zip.files[qdeEntry].async('string');
  const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
  if(xml.querySelector('parsererror')) throw new Error('XML do project.qde inválido');

  const skipped = { picture:0, audio:0, video:0, pdfSemTexto:0, fonteExterna:0 };

  // usuarios: guid -> nome
  const userName = {};
  xml.querySelectorAll('Users > User').forEach(u=>{ userName[stripGuid(u.getAttribute('guid'))] = u.getAttribute('name')||'importado'; });
  const authorOf = (g)=> g ? (userName[stripGuid(g)]||'importado') : 'importado';

  // codigos hierarquicos (recursivo); hue por familia de topo, na ordem em que aparecem
  const newCodes = [];
  let topHue = 0;
  function walkCode(el, parentId, depth, hue){
    const id = stripGuid(el.getAttribute('guid'));
    const name = el.getAttribute('name') || 'codigo';
    newCodes.push({ id, parent_id: parentId, name, hue, depth });
    Array.from(el.children).filter(c=>c.tagName==='Code').forEach(c=>walkCode(c, id, depth+1, hue));
  }
  const codeBook = xml.querySelector('CodeBook > Codes');
  if(codeBook){
    Array.from(codeBook.children).filter(c=>c.tagName==='Code').forEach(c=>{ walkCode(c, null, 0, topHue % HUES.length); topHue++; });
  }

  // variaveis -> categorias (reconstroi o tipo a partir de "tipo: ..." e "valores: ..."
  // na Description; aceita o formato legado "Valores fechados: ...")
  const newCats = [];
  const KNOWN_KINDS = new Set(CAT_KINDS.map(k=>k.id));
  xml.querySelectorAll('Variables > Variable').forEach(v=>{
    const id = stripGuid(v.getAttribute('guid'));
    const name = v.getAttribute('name') || 'categoria';
    const descEl = v.querySelector('Description');
    const desc = descEl ? descEl.textContent : '';
    const mVals = /(?:valores|Valores fechados):\s*(.+)/i.exec(desc||'');
    const options = mVals ? mVals[1].split(',').map(s=>s.trim()).filter(Boolean) : [];
    const mTipo = /tipo:\s*([a-z]+)/i.exec(desc||'');
    let kind = mTipo && KNOWN_KINDS.has(mTipo[1].toLowerCase()) ? mTipo[1].toLowerCase()
             : (mVals ? 'single' : ((v.getAttribute('typeOfVariable')||'').toLowerCase()==='date' ? 'date' : 'text'));
    newCats.push({ id, name, kind, options });
  });

  // fontes de texto (TextSource e, quando existir, a Representation textual de um PDFSource)
  const newDocs = [];
  const newCodings = [];
  async function readPlainText(srcEl){
    const inline = srcEl.querySelector(':scope > PlainTextContent');
    if(inline) return inline.textContent || '';
    const path = srcEl.getAttribute('plainTextPath') || '';
    if(path.startsWith('internal://')){
      const fname = path.replace('internal://','');
      const entry = Object.keys(zip.files).find(k=>k.toLowerCase().endsWith('/'+fname.toLowerCase()) || k.toLowerCase()===('sources/'+fname.toLowerCase()) || k.toLowerCase().endsWith(fname.toLowerCase()));
      if(entry) return await zip.files[entry].async('string');
    }
    if(path.startsWith('relative://') || path.startsWith('absolute://')){ skipped.fonteExterna++; }
    return null;
  }
  function importSelections(srcEl, docId, content){
    srcEl.querySelectorAll(':scope > PlainTextSelection').forEach(sel=>{
      const start = parseInt(sel.getAttribute('startPosition'),10);
      const end = parseInt(sel.getAttribute('endPosition'),10);
      const author = authorOf(sel.getAttribute('creatingUser'));
      const codingEls = sel.querySelectorAll(':scope > Coding');
      codingEls.forEach((cod,i)=>{
        const ref = cod.querySelector('CodeRef');
        if(!ref) return;
        const codeId = stripGuid(ref.getAttribute('targetGUID'));
        newCodings.push({
          id: i===0 ? stripGuid(sel.getAttribute('guid')) : uid(),
          document_id: docId, code_id: codeId, span_start:start, span_end:end,
          quote: (content||'').slice(start,end), author_name: author
        });
      });
    });
  }

  const sourcesEl = xml.querySelector('Sources');
  if(sourcesEl){
    for(const src of Array.from(sourcesEl.children)){
      if(src.tagName==='TextSource'){
        const id = stripGuid(src.getAttribute('guid'));
        const name = src.getAttribute('name') || 'documento importado';
        const content = await readPlainText(src);
        if(content==null) continue;
        newDocs.push({ id, name, content });
        importSelections(src, id, content);
      } else if(src.tagName==='PDFSource'){
        const rep = src.querySelector(':scope > Representation');
        if(rep){
          const id = stripGuid(src.getAttribute('guid'));
          const name = (src.getAttribute('name')||'pdf importado') + ' (texto extraído)';
          const content = await readPlainText(rep);
          if(content!=null){ newDocs.push({ id, name, content }); importSelections(rep, id, content); }
          else skipped.pdfSemTexto++;
        } else skipped.pdfSemTexto++;
      } else if(src.tagName==='PictureSource'){ skipped.picture++; }
      else if(src.tagName==='AudioSource'){ skipped.audio++; }
      else if(src.tagName==='VideoSource'){ skipped.video++; }
    }
  }

  // casos -> valores de categoria por documento
  const newValues = [];
  xml.querySelectorAll('Cases > Case').forEach(caseEl=>{
    const srcRefs = Array.from(caseEl.querySelectorAll(':scope > SourceRef')).map(r=>stripGuid(r.getAttribute('targetGUID')));
    const vvs = Array.from(caseEl.querySelectorAll(':scope > VariableValue'));
    vvs.forEach(vv=>{
      const ref = vv.querySelector('VariableRef'); if(!ref) return;
      const catId = stripGuid(ref.getAttribute('targetGUID'));
      const valEl = vv.querySelector('TextValue,BooleanValue,IntegerValue,FloatValue,DateValue,DateTimeValue');
      const value = valEl ? valEl.textContent : '';
      srcRefs.forEach(docId=>newValues.push({ document_id:docId, category_id:catId, value }));
    });
  });

  // gera ids novos para evitar colisao com dados ja existentes (ex.: reimportar o mesmo .qdpx),
  // remapeando todas as referencias internas (parent_id, document_id, category_id, code_id)
  const docMap = {}, catMap = {}, codeMap = {};
  newDocs.forEach(d=> docMap[d.id]=uid());
  newCats.forEach(c=> catMap[c.id]=uid());
  newCodes.forEach(c=> codeMap[c.id]=uid());

  // persiste no projeto ativo, respeitando ordem por causa de FKs
  for(const d of newDocs) await store.addDocument(projectId, { id:docMap[d.id], name:d.name, content:d.content });
  for(const c of newCats) await store.addCategory(projectId, { id:catMap[c.id], name:c.name, kind:c.kind, options:c.options, position:0 });
  for(const c of newCodes) await store.addCode(projectId, { id:codeMap[c.id], parent_id:c.parent_id?codeMap[c.parent_id]:null, name:c.name, hue:c.hue, depth:c.depth, position:0 });
  for(const v of newValues){ if(docMap[v.document_id] && catMap[v.category_id]) await store.setDocValue(projectId, docMap[v.document_id], catMap[v.category_id], v.value); }
  for(const c of newCodings){ if(docMap[c.document_id] && codeMap[c.code_id]) await store.addCoding(projectId, { document_id:docMap[c.document_id], code_id:codeMap[c.code_id], span_start:c.span_start, span_end:c.span_end, quote:c.quote, author_name:c.author_name }); }

  return {
    documentos:newDocs.length, categorias:newCats.length, codigos:newCodes.length,
    trechos:newCodings.length, casos: xml.querySelectorAll('Cases > Case').length,
    descartados: skipped
  };
}

/* ============ STORE LOCAL (navegador) ============ */
function LocalStore(){
  let db = { documents:[], categories:[], doc_values:[], codes:[], codings:[] };
  let name = 'pesquisador';
  try { const raw = localStorage.getItem('lastro:local'); if(raw) db = JSON.parse(raw); } catch(e){}
  const save = () => { try { localStorage.setItem('lastro:local', JSON.stringify(db)); } catch(e){} };
  const P = (v)=>Promise.resolve(v);
  return {
    mode:'local',
    async init(display){ name = display || name; return { id:'local-user', name }; },
    currentUser(){ return { id:'local-user', name }; },
    async createProject(){ return { id:'local', name:'Projeto local', code:'LOCAL' }; },
    async joinProject(){ return { id:'local', name:'Projeto local', code:'LOCAL' }; },
    listDocuments(){ return P(db.documents.slice()); },
    addDocument(pid,{id,name:dn,content}){ const d={id:id||uid(),name:dn,content,created_at:new Date().toISOString()}; db.documents.push(d); save(); return P(d); },
    deleteDocument(id){ db.documents=db.documents.filter(d=>d.id!==id); db.doc_values=db.doc_values.filter(v=>v.document_id!==id); db.codings=db.codings.filter(c=>c.document_id!==id); save(); return P(); },
    clearProject(){ db={ documents:[], categories:[], doc_values:[], codes:[], codings:[] }; save(); return P(); },
    listCategories(){ return P(db.categories.slice().sort((a,b)=>a.position-b.position)); },
    addCategory(pid,cat){ const c={id:uid(),position:db.categories.length,...cat}; db.categories.push(c); save(); return P(c); },
    updateCategory(id,patch){ db.categories=db.categories.map(c=>c.id===id?{...c,...patch}:c); save(); return P(); },
    deleteCategory(id){ db.categories=db.categories.filter(c=>c.id!==id); db.doc_values=db.doc_values.filter(v=>v.category_id!==id); save(); return P(); },
    getDocValues(docId){ return P(db.doc_values.filter(v=>v.document_id===docId)); },
    setDocValue(pid,docId,catId,value){ db.doc_values=db.doc_values.filter(v=>!(v.document_id===docId&&v.category_id===catId)); if(value!=='') db.doc_values.push({id:uid(),document_id:docId,category_id:catId,value,author_name:name}); save(); return P(); },
    listCodes(){ return P(db.codes.slice().sort((a,b)=>a.depth-b.depth||a.position-b.position)); },
    addCode(pid,code){ const c={id:uid(),position:db.codes.length,...code}; db.codes.push(c); save(); return P(c); },
    updateCode(id,patch){ db.codes=db.codes.map(c=>c.id===id?{...c,...patch}:c); save(); return P(); },
    deleteCode(id){ const kill=new Set([id]); let added=true; while(added){added=false; db.codes.forEach(c=>{if(c.parent_id&&kill.has(c.parent_id)&&!kill.has(c.id)){kill.add(c.id);added=true;}});} db.codes=db.codes.filter(c=>!kill.has(c.id)); db.codings=db.codings.filter(c=>!kill.has(c.code_id)); save(); return P(); },
    listCodings(pid,docId){ return P(db.codings.filter(c=>c.document_id===docId)); },
    addCoding(pid,co){ const c={id:uid(),author_name:name,created_at:new Date().toISOString(),...co}; db.codings.push(c); save(); return P(c); },
    deleteCoding(id){ db.codings=db.codings.filter(c=>c.id!==id); save(); return P(); },
  };
}

/* ============ STORE SUPABASE (coletivo) ============ */
function SupabaseStore(sb){
  let user=null, name='anonimo';
  const must = (r)=>{ if(r.error) throw r.error; return r.data; };
  const nameOf = (u, fallback)=> (u && u.user_metadata && u.user_metadata.name) || fallback || name;
  return {
    mode:'cloud',
    // apenas carrega a sessao existente (se houver); nao cria sessao anonima automaticamente
    async init(display){
      const { data:{ session } } = await sb.auth.getSession();
      if(session){ user = session.user; name = nameOf(user, display); return { id:user.id, name, email:user.email||null, anon:!!user.is_anonymous }; }
      if(display) name = display;
      return null;
    },
    async signIn(email, password){
      const r = await sb.auth.signInWithPassword({ email:email.trim(), password }); if(r.error) throw r.error;
      user = r.data.user; name = nameOf(user); return { id:user.id, name, email:user.email||null, anon:false };
    },
    async signUp(email, password, display){
      const r = await sb.auth.signUp({ email:email.trim(), password, options:{ data:{ name: display||'pesquisador' } } });
      if(r.error) throw r.error;
      // se a confirmacao de e-mail estiver ativa, ainda nao ha sessao
      if(r.data.session){ user = r.data.session.user; name = nameOf(user, display); return { confirmed:true, user:{ id:user.id, name, email:user.email||null, anon:false } }; }
      return { confirmed:false };
    },
    async signInAnon(display){
      let { data:{ session } } = await sb.auth.getSession();
      if(!session){ const r = await sb.auth.signInAnonymously(); if(r.error) throw r.error; session = r.data.session; }
      user = session.user; name = display || name;
      return { id:user.id, name, email:null, anon:true };
    },
    async signOut(){ try{ await sb.auth.signOut(); }catch(e){} user=null; },
    currentUser(){ return user ? { id:user.id, name, email:user.email||null, anon:!!user.is_anonymous } : null; },
    async createProject(pn, display){ name=display||name; const d=must(await sb.rpc('create_project',{p_name:pn,p_display:name})); return { id:d.id, name:d.name, code:d.code }; },
    async joinProject(code, display){ name=display||name; const d=must(await sb.rpc('join_project',{p_code:code,p_display:name})); return { id:d.id, name:d.name, code:d.code }; },
    // lista os projetos do usuario: tenta a RPC dedicada (com contagens), senao a tabela projects;
    // null = sem suporte no servidor (o app cai na lista local por conta)
    async listMyProjects(){
      try{ const r = await sb.rpc('my_projects'); if(!r.error && Array.isArray(r.data)) return r.data; }catch(e){}
      try{ const r = await sb.from('projects').select('id,name,code,created_at'); if(!r.error && Array.isArray(r.data)) return r.data; }catch(e){}
      return null;
    },
    async listDocuments(pid){ return must(await sb.from('documents').select('*').eq('project_id',pid).order('created_at')); },
    async addDocument(pid,{id,name:dn,content}){ const row={project_id:pid,name:dn,content,created_by:user.id}; if(id) row.id=id; return must(await sb.from('documents').insert(row).select().single()); },
    async deleteDocument(id){ must(await sb.from('documents').delete().eq('id',id)); },
    async clearProject(pid){
      await sb.from('codings').delete().eq('project_id',pid);
      await sb.from('doc_values').delete().eq('project_id',pid);
      await sb.from('documents').delete().eq('project_id',pid);
      await sb.from('codes').delete().eq('project_id',pid);
      await sb.from('categories').delete().eq('project_id',pid);
    },
    async listCategories(pid){ return must(await sb.from('categories').select('*').eq('project_id',pid).order('position')); },
    async addCategory(pid,cat){
      try { return must(await sb.from('categories').insert({project_id:pid,...cat}).select().single()); }
      catch(e){ if(!/description/i.test(String(e.message||e))) throw e;
        const { description, ...rest } = cat; // coluna ausente na nuvem: grava sem a descricao
        return must(await sb.from('categories').insert({project_id:pid,...rest}).select().single()); }
    },
    async updateCategory(id,patch){
      try { must(await sb.from('categories').update(patch).eq('id',id)); }
      catch(e){ if(!/description/i.test(String(e.message||e))) throw e;
        const { description, ...rest } = patch;
        if(Object.keys(rest).length) must(await sb.from('categories').update(rest).eq('id',id)); }
    },
    async deleteCategory(id){ must(await sb.from('categories').delete().eq('id',id)); },
    async getDocValues(docId){ return must(await sb.from('doc_values').select('*').eq('document_id',docId)); },
    async setDocValue(pid,docId,catId,value){
      if(value===''){ must(await sb.from('doc_values').delete().eq('document_id',docId).eq('category_id',catId)); return; }
      must(await sb.from('doc_values').upsert({project_id:pid,document_id:docId,category_id:catId,value,set_by:user.id,author_name:name,updated_at:new Date().toISOString()},{onConflict:'document_id,category_id'}));
    },
    async listCodes(pid){ return must(await sb.from('codes').select('*').eq('project_id',pid).order('depth').order('position')); },
    async addCode(pid,code){ return must(await sb.from('codes').insert({project_id:pid,...code}).select().single()); },
    async updateCode(id,patch){ must(await sb.from('codes').update(patch).eq('id',id)); },
    async deleteCode(id){ must(await sb.from('codes').delete().eq('id',id)); },
    async listCodings(pid,docId){ return must(await sb.from('codings').select('*').eq('project_id',pid).eq('document_id',docId)); },
    async addCoding(pid,co){ return must(await sb.from('codings').insert({project_id:pid,created_by:user.id,author_name:name,...co}).select().single()); },
    async deleteCoding(id){ must(await sb.from('codings').delete().eq('id',id)); },
    // sincronizacao ao vivo: dispara onChange a cada alteracao em codings/doc_values do projeto
    realtime(projectId, onChange){
      const ch = sb.channel('qualilab:'+projectId)
        .on('postgres_changes', { event:'*', schema:'public', table:'codings',    filter:'project_id=eq.'+projectId }, onChange)
        .on('postgres_changes', { event:'*', schema:'public', table:'doc_values', filter:'project_id=eq.'+projectId }, onChange)
        .subscribe();
      return ()=>{ try{ sb.removeChannel(ch); }catch(e){} };
    },
  };
}

/* ============================== APP ============================== */
function App(){
  const wantCloud = !!(SUPABASE_URL && SUPABASE_ANON_KEY);
  const [store, setStore] = useState(null);
  const [mode, setMode] = useState(wantCloud ? 'cloud' : 'local');
  const [phase, setPhase] = useState('boot');     // boot | auth | gate | work
  const [err, setErr] = useState(null);
  const [project, setProject] = useState(null);
  const [user, setUser] = useState(null);
  const [myProjects, setMyProjects] = useState([]);

  const [docs, setDocs] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [cats, setCats] = useState([]);
  const [values, setValues] = useState([]);
  const [codes, setCodes] = useState([]);
  const [codings, setCodings] = useState([]);

  // dados de todo o projeto (para a aba de visualizacao, que cruza documentos)
  const [allCodings, setAllCodings] = useState([]);
  const [allValues, setAllValues] = useState([]);

  const [sel, setSel] = useState(null);
  const [ctxMenu, setCtxMenu] = useState(null); // menu de contexto (botão direito) p/ aplicar código
  const [selCode, setSelCode] = useState(null);
  const [rtab, setRtab] = useState('categorias');
  const [mainView, setMainView] = useState('codificar'); // codificar | visualizar (tela inteira)
  const [settings, setSettings] = useState(false);
  const [expOpen, setExpOpen] = useState(false);
  const [busy, setBusy] = useState(null);
  const [importMsg, setImportMsg] = useState(null);

  const activeDoc = docs.find(d=>d.id===activeId) || null;

  /* lista "Meus Projetos" por conta (cache local, complementa o servidor) */
  const recentKey = (st)=> 'lastro:projects:'+((st||store)?.currentUser?.()?.id || 'anon');
  const getRecent = (st)=>{ try{ return JSON.parse(localStorage.getItem(recentKey(st))||'[]'); }catch(e){ return []; } };
  const pushRecent = (p, st)=>{ try{ const k=recentKey(st); const list=getRecent(st).filter(x=>x.code!==p.code);
    list.unshift({ id:p.id, name:p.name, code:p.code, at:Date.now() }); localStorage.setItem(k, JSON.stringify(list.slice(0,30))); }catch(e){} };

  const loadMyProjects = useCallback(async ()=>{
    if(!store){ setMyProjects([]); return; }
    let list = null;
    try{ list = await store.listMyProjects?.(); }catch(e){}
    const local = getRecent();
    if(list && list.length){ const codes=new Set(list.map(p=>p.code)); list=[...list, ...local.filter(p=>!codes.has(p.code))]; }
    else { list = local; }
    setMyProjects(list);
  }, [store, user]); // eslint-disable-line
  useEffect(()=>{ if(phase==='gate') loadMyProjects(); }, [phase, loadMyProjects]);

  /* apos autenticar (sessao existente ou login): reentra no projeto salvo ou vai pro gate */
  async function afterAuth(st, display){
    setUser(st.currentUser());
    const saved = (()=>{ try{return JSON.parse(localStorage.getItem('lastro:project')||'null');}catch(e){return null;} })();
    if(saved && saved.code){
      try{ const p = await st.joinProject(saved.code, display||st.currentUser()?.name||'anonimo'); pushRecent(p, st); setProject(p); setPhase('work'); return; }
      catch(e){ try{localStorage.removeItem('lastro:project');}catch(_){} }
    }
    setPhase('gate');
  }

  /* boot */
  useEffect(()=>{ (async()=>{
    try{
      if(wantCloud){
        const createClient = await getCreateClient();
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const st = SupabaseStore(sb);
        setStore(st);
        const display = (()=>{ try{return localStorage.getItem('lastro:name')||'';}catch(e){return '';} })();
        const sess = await st.init(display);   // null se nao houver sessao salva
        if(!sess){ setPhase('auth'); return; } // pede login/cadastro
        setUser(st.currentUser());
        await afterAuth(st, display);
      } else {
        const st = LocalStore(); setStore(st);
        const display = (()=>{ try{return localStorage.getItem('lastro:name')||'pesquisador';}catch(e){return 'pesquisador';} })();
        await st.init(display);
        setUser(st.currentUser());
        const p = await st.createProject(); setProject(p); setPhase('work');
      }
    }catch(e){ setErr(String(e.message||e)); setPhase(wantCloud?'auth':'work'); }
  })(); }, []); // eslint-disable-line

  /* carregar projeto */
  const loadProject = useCallback(async (st, pid)=>{
    const [d,c,k] = await Promise.all([st.listDocuments(pid), st.listCategories(pid), st.listCodes(pid)]);
    setDocs(d); setCats(c); setCodes(k);
    setActiveId(a => a && d.find(x=>x.id===a) ? a : (d[0]?.id || null));
  }, []);
  useEffect(()=>{ if(store && project && phase==='work') loadProject(store, project.id); }, [store, project, phase, loadProject]);

  /* carregar doc ativo */
  const loadDoc = useCallback(async ()=>{
    if(!store || !project || !activeId){ setValues([]); setCodings([]); return; }
    const [v, co] = await Promise.all([store.getDocValues(activeId), store.listCodings(project.id, activeId)]);
    setValues(v); setCodings(co);
  }, [store, project, activeId]);
  useEffect(()=>{ loadDoc(); setSel(null); setCtxMenu(null); }, [loadDoc]);

  /* carregar trechos e valores de TODOS os documentos (aba de visualizacao) */
  const loadAll = useCallback(async ()=>{
    if(!store || !project){ setAllCodings([]); setAllValues([]); return; }
    const V=[], C=[];
    for(const d of docs){
      const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id, d.id)]);
      v.forEach(x=>V.push({ document_id:d.id, category_id:x.category_id, value:x.value, author_name:x.author_name }));
      co.forEach(x=>C.push(x));
    }
    setAllValues(V); setAllCodings(C);
  }, [store, project, docs]);
  useEffect(()=>{ if(phase==='work' && mainView==='visualizar') loadAll(); }, [phase, mainView, loadAll, codings]);

  /* recarrega a visao atual (doc ativo + visualizacao, se aberta) — usado pelo realtime */
  const reloadRef = useRef(()=>{});
  reloadRef.current = ()=>{ loadDoc(); if(mainView==='visualizar') loadAll(); };

  /* sincronizacao ao vivo no modo nuvem (codings/doc_values), com poll lento de reserva */
  useEffect(()=>{
    if(mode!=='cloud' || phase!=='work' || !project || !store || !store.realtime) return;
    const onChange = ()=>reloadRef.current();
    const unsub = store.realtime(project.id, onChange);
    const t = setInterval(onChange, 20000); // reserva: caso a replicacao realtime nao esteja habilitada
    return ()=>{ if(unsub) unsub(); clearInterval(t); };
  }, [mode, phase, project, store]);

  /* ----- acoes ----- */
  async function onUpload(fileList){
    const files = Array.from(fileList||[]); if(!files.length) return;
    setBusy('Lendo arquivos...');
    for(const f of files){
      try{ const content = await extractText(f); const doc = await store.addDocument(project.id, { name:f.name.replace(/\.[^.]+$/,''), content }); setDocs(d=>[...d,doc]); setActiveId(doc.id); }
      catch(e){ setErr('Falha ao ler '+f.name+': '+(e.message||e)); }
    }
    setBusy(null);
  }
  async function addPasted(name, content){ const doc = await store.addDocument(project.id,{name:name||'Documento',content}); setDocs(d=>[...d,doc]); setActiveId(doc.id); }
  async function delDoc(id){ await store.deleteDocument(id); setDocs(d=>d.filter(x=>x.id!==id)); if(activeId===id) setActiveId(docs.find(x=>x.id!==id)?.id||null); }

  async function setValue(catId, value){ await store.setDocValue(project.id, activeId, catId, value); loadDoc(); }
  async function addCategory(){ const c = await store.addCategory(project.id,{name:'Nova categoria',kind:'single',options:[NAO_INFO],color:cats.length%HUES.length,position:cats.length}); setCats(x=>[...x,c]); }
  async function updCategory(id,patch){ await store.updateCategory(id,patch); setCats(x=>x.map(c=>c.id===id?{...c,...patch}:c)); }
  async function delCategory(id){ await store.deleteCategory(id); setCats(x=>x.filter(c=>c.id!==id)); setValues(v=>v.filter(x=>x.category_id!==id)); }

  async function addCode(parent){
    let hue, depth;
    if(parent){ hue = parent.hue; depth = parent.depth+1; }
    else { const tops = codes.filter(c=>!c.parent_id); hue = tops.length % HUES.length; depth = 0; }
    const c = await store.addCode(project.id,{ parent_id: parent?parent.id:null, name: parent?'subcódigo':'nova família', hue, depth, position: codes.length });
    setCodes(x=>[...x,c]); setSelCode(c.id);
  }
  async function updCode(id,patch){ await store.updateCode(id,patch); setCodes(x=>x.map(c=>c.id===id?{...c,...patch}:c)); }
  async function delCode(id){ await store.deleteCode(id); loadProject(store,project.id); loadDoc(); }
  async function applyCode(codeId, selection){
    const s = selection || sel;
    if(!s) return;
    const c = await store.addCoding(project.id,{ document_id:activeId, code_id:codeId, span_start:s.start, span_end:s.end, quote:s.quote });
    setCodings(x=>[...x,c]); setSel(null); setCtxMenu(null); window.getSelection()?.removeAllRanges();
  }
  async function delCoding(id){ await store.deleteCoding(id); setCodings(x=>x.filter(c=>c.id!==id)); }

  async function doExport(kind){
    setExpOpen(false);
    try{
      const allV=[], allC=[];
      for(const d of docs){
        const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id,d.id)]);
        v.forEach(x=>allV.push({ document_id:d.id, category_id:x.category_id, value:x.value, author:x.author_name||'anonimo' }));
        co.forEach(x=>allC.push(x));
      }
      const dn=(id)=>docs.find(d=>d.id===id)?.name||"";
      if(kind==='json'){
        const obj={ exported_at:new Date().toISOString(), project:{ name:project.name, code:project.code },
          documents:docs.map(d=>({id:d.id,name:d.name,content:d.content})),
          categories:cats.map(c=>({id:c.id,name:c.name,kind:c.kind,options:c.options,description:c.description||''})),
          document_values:allV,
          codes:codes.map(c=>({id:c.id,parent_id:c.parent_id,name:c.name,depth:c.depth,path:codePathFor(codes,c.id)})),
          codings:allC.map(c=>({id:c.id,document_id:c.document_id,code_id:c.code_id,code_path:codePathFor(codes,c.code_id),start:c.span_start,end:c.span_end,quote:c.quote,author:c.author_name})) };
        download('qualilab_projeto.json', JSON.stringify(obj,null,2), 'application/json');
      } else if(kind==='trechos'){
        const header=["documento","familia","codigo","nivel","trecho","inicio","fim","autor"];
        const sorted=allC.slice().sort((a,b)=> a.document_id===b.document_id ? a.span_start-b.span_start : (dn(a.document_id)>dn(b.document_id)?1:-1));
        const rows=sorted.map(c=>{ const p=codePathFor(codes,c.code_id); return [dn(c.document_id), p[0]||"", p.join(" > "), String(p.length-1), c.quote, String(c.span_start), String(c.span_end), c.author_name]; });
        download('qualilab_trechos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='documentos'){
        const header=["documento",...cats.map(c=>c.name),"n_trechos"];
        const rows=docs.map(d=>[d.name, ...cats.map(cat=>{ const v=allV.find(x=>x.document_id===d.id&&x.category_id===cat.id); return v?v.value:""; }), String(allC.filter(c=>c.document_id===d.id).length)]);
        download('qualilab_documentos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='qdpx'){
        await exportQDPX(docs, cats, allV, codes, allC, project);
      }
    }catch(e){ setErr('Falha ao exportar: '+(e.message||e)); }
  }

  async function doImportQDPX(file){
    setBusy('Importando .qdpx...');
    try{
      const r = await importQDPX(file, store, project.id);
      await loadProject(store, project.id);
      await loadDoc();
      const desc = r.descartados;
      const skippedBits = [];
      if(desc.picture) skippedBits.push(`${desc.picture} imagem(ns)`);
      if(desc.audio) skippedBits.push(`${desc.audio} áudio(s)`);
      if(desc.video) skippedBits.push(`${desc.video} vídeo(s)`);
      if(desc.pdfSemTexto) skippedBits.push(`${desc.pdfSemTexto} PDF(s) sem representação em texto`);
      if(desc.fonteExterna) skippedBits.push(`${desc.fonteExterna} fonte(s) externa(s)`);
      const skippedMsg = skippedBits.length ? ` Não importado(s): ${skippedBits.join(', ')}.` : '';
      setErr(null);
      setBusy(null);
      setImportMsg(`Importado: ${r.documentos} documento(s), ${r.categorias} categoria(s), ${r.codigos} código(s), ${r.trechos} trecho(s) codificado(s).${skippedMsg}`);
    }catch(e){ setBusy(null); setErr('Falha ao importar: '+(e.message||e)); }
  }

  async function doClearProject(){
    if(!confirm('Apagar TODOS os documentos, categorias, códigos e codificações deste projeto? Esta ação não pode ser desfeita.')) return;
    setBusy('Limpando projeto...');
    try{
      await store.clearProject(project.id);
      setActiveId(null); setSel(null); setSelCode(null);
      await loadProject(store, project.id);
      setBusy(null); setImportMsg('Projeto limpo.');
    }catch(e){ setBusy(null); setErr('Falha ao limpar: '+(e.message||e)); }
  }

  function computeSelection(){
    if(!activeDoc) return null;
    const s = window.getSelection();
    if(!s || s.rangeCount===0 || s.isCollapsed) return null;
    const r = s.getRangeAt(0);
    const off=(node,o)=>{ let el=node.nodeType===3?node.parentElement:node; while(el && (!el.dataset || el.dataset.start===undefined)) el=el.parentElement; return el?parseInt(el.dataset.start,10)+o:null; };
    const a=off(r.startContainer,r.startOffset), b=off(r.endContainer,r.endOffset);
    if(a==null||b==null) return null;
    const start=Math.min(a,b), end=Math.max(a,b);
    const q = activeDoc.content.slice(start,end); if(q.trim().length===0) return null;
    return { start, end, quote:q };
  }
  function onMouseUp(e){
    if(e && e.button!==0) return; // ignora clique direito (tratado em onContextMenu)
    const sx = computeSelection();
    if(sx){ setSel(sx); setRtab('codigos'); }
  }
  function onContextMenu(e){
    const sx = computeSelection();
    if(!sx) return; // sem seleção: deixa o menu normal do navegador
    e.preventDefault();
    setSel(sx);
    setCtxMenu({ x:e.clientX, y:e.clientY, sel:sx });
  }

  /* ----- maps ----- */
  const codeById = useMemo(()=>Object.fromEntries(codes.map(c=>[c.id,c])), [codes]);
  // codigos em ordem de arvore (pai antes dos filhos), para o menu de contexto
  const orderedCodes = useMemo(()=>{
    const out=[]; const childrenOf=(id)=>codes.filter(c=>c.parent_id===id);
    const walk=(list)=>list.forEach(c=>{ out.push(c); walk(childrenOf(c.id)); });
    walk(codes.filter(c=>!c.parent_id));
    return out;
  }, [codes]);
  const codePath = useCallback((id)=>{ const out=[]; let c=codeById[id]; let guard=0; while(c&&guard++<12){ out.unshift(c.name); c=c.parent_id?codeById[c.parent_id]:null; } return out; }, [codeById]);
  const codingCount = useMemo(()=>{ const m={}; codings.forEach(c=>{m[c.code_id]=(m[c.code_id]||0)+1;}); return m; }, [codings]);

  /* =================== RENDER =================== */
  if(phase==='boot') return html`<div class="empty"><div class="t">Carregando…</div></div>`;

  if(phase==='auth') return html`<${Auth}
    err=${err}
    onSignIn=${async (email,pw)=>{ try{ const u=await store.signIn(email,pw); try{localStorage.setItem('lastro:name',u.name);}catch(e){} setErr(null); await afterAuth(store, u.name); }catch(e){ setErr(String(e.message||e)); } }}
    onSignUp=${async (email,pw,disp)=>{ try{ const r=await store.signUp(email,pw,disp); try{localStorage.setItem('lastro:name',disp);}catch(e){} setErr(null); if(r.confirmed){ await afterAuth(store, disp); } return r; }catch(e){ setErr(String(e.message||e)); return { error:String(e.message||e) }; } }}
    onAnon=${async (disp)=>{ try{ const u=await store.signInAnon(disp); try{localStorage.setItem('lastro:name',disp);}catch(e){} setErr(null); await afterAuth(store, disp); }catch(e){ setErr(String(e.message||e)); } }}
  />`;

  if(phase==='gate') return html`<${Gate}
    err=${err} user=${user} projects=${myProjects}
    onOpen=${async (proj)=>{ try{ const p=await store.joinProject(proj.code, user?.name||''); try{localStorage.setItem('lastro:project',JSON.stringify(p));}catch(e){} pushRecent(p); setProject(p); setPhase('work'); }catch(e){ setErr(String(e.message||e)); } }}
    onCreate=${async (n,disp)=>{ try{ try{localStorage.setItem('lastro:name',disp);}catch(e){} const p=await store.createProject(n,disp); try{localStorage.setItem('lastro:project',JSON.stringify(p));}catch(e){} pushRecent(p); setUser(store.currentUser()); setProject(p); setPhase('work'); }catch(e){ setErr(String(e.message||e)); } }}
    onJoin=${async (code,disp)=>{ try{ try{localStorage.setItem('lastro:name',disp);}catch(e){} const p=await store.joinProject(code,disp); try{localStorage.setItem('lastro:project',JSON.stringify(p));}catch(e){} pushRecent(p); setUser(store.currentUser()); setProject(p); setPhase('work'); }catch(e){ setErr(String(e.message||e)); } }}
  />`;

  return html`
  <div class="app">
    <header class="top">
      <div class="brand">QualiLab</div>
      <div class="tag">o seu laboratório de pesquisa qualitativa / your own lab for qualitative research</div>
      ${project && html`<div class="seg" style="margin-left:10px">
        <button class=${mainView==='codificar'?'on':''} onClick=${()=>setMainView('codificar')}>Codificação</button>
        <button class=${mainView==='visualizar'?'on':''} onClick=${()=>setMainView('visualizar')}>Visualização</button>
      </div>`}
      <div class="grow"></div>
      ${project && html`<span class="pill ${mode==='cloud'?'mode-cloud':''}">${mode==='cloud'?'nuvem':'local'} · ${project.name}${mode==='cloud'?` · ${project.code}`:''}</span>`}
      ${user && html`<span class="meta" title=${user.email||''}>${user.name}${user.anon?' (visitante)':''}</span>`}
      ${mode==='cloud' && html`<button class="btn sm ghost" onClick=${()=>{ try{localStorage.removeItem('lastro:project');}catch(e){} setProject(null); setPhase('gate'); }}>trocar projeto</button>`}
      ${mode==='cloud' && user && html`<button class="btn sm ghost" onClick=${async()=>{ try{localStorage.removeItem('lastro:project');}catch(e){} try{ await store.signOut(); }catch(e){} setProject(null); setUser(null); setDocs([]); setActiveId(null); setPhase('auth'); }}>sair</button>`}
      ${project && docs.length>0 && html`<div style="position:relative">
        <button class="btn sm" onClick=${()=>setExpOpen(o=>!o)}>exportar ▾</button>
        ${expOpen && html`<div>
          <div onClick=${()=>setExpOpen(false)} style="position:fixed;inset:0;z-index:40"></div>
          <div class="exmenu">
            <button onClick=${()=>doExport('json')}>JSON (projeto)</button>
            <button onClick=${()=>doExport('trechos')}>CSV (trechos codificados)</button>
            <button onClick=${()=>doExport('documentos')}>CSV (atributos por documento)</button>
            <button onClick=${()=>doExport('qdpx')}>QDPX (ATLAS.ti / MAXQDA / NVivo)</button>
          </div>
        </div>`}
      </div>`}
      ${project && html`<label class="btn sm ghost" title="Importar projeto .qdpx (REFI-QDA)">importar qdpx
        <input type="file" accept=".qdpx" style="display:none" onChange=${e=>{ if(e.target.files[0]) doImportQDPX(e.target.files[0]); e.target.value=''; }} />
      </label>`}
      ${project && docs.length>0 && html`<button class="btn sm ghost" style="color:var(--danger)" onClick=${doClearProject} title="Apagar tudo deste projeto">limpar projeto</button>`}
      <button class="btn sm ghost" onClick=${()=>setSettings(true)} title="Conexão e identidade">⚙</button>
    </header>

    ${err && html`<div class="banner err">${err} <button class="btn sm ghost" onClick=${()=>setErr(null)}>fechar</button></div>`}
    ${importMsg && html`<div class="banner warn">${importMsg} <button class="btn sm ghost" onClick=${()=>setImportMsg(null)}>fechar</button></div>`}
    ${busy && html`<div class="banner warn">${busy}</div>`}

    ${mainView==='codificar' ? html`<div class="split">
      <!-- ESQUERDA: documento -->
      <section class="pane left">
        <div class="pane-head">
          <select class="opt" style="max-width:260px" value=${activeId||''} onChange=${e=>setActiveId(e.target.value)}>
            ${docs.length===0 && html`<option value="">sem documentos</option>`}
            ${docs.map(d=>html`<option value=${d.id}>${d.name}</option>`)}
          </select>
          <label class="btn sm">＋ enviar
            <input type="file" multiple accept=".txt,.md,.markdown,.pdf,.docx" style="display:none" onChange=${e=>{onUpload(e.target.files); e.target.value='';}} />
          </label>
          <${AddPaste} onAdd=${addPasted} />
          <div class="grow"></div>
          ${activeDoc && html`<button class="icon-btn" title="Remover documento" onClick=${()=>delDoc(activeDoc.id)}>🗑</button>`}
        </div>

        ${sel && html`<div class="toolbar">
          <span style="font-weight:600;color:var(--teal-deep);font-size:12.5px">Trecho selecionado</span>
          <span class="q">“${sel.quote}”</span>
          <span class="meta">escolha um código à direita para aplicar</span>
          <div class="grow"></div>
          <button class="btn sm ghost" onClick=${()=>{setSel(null);window.getSelection()?.removeAllRanges();}}>cancelar</button>
        </div>`}

        <div class="pane-body scroll">
          ${!activeDoc ? html`<div class="empty"><div class="t">Nenhum documento</div><div>Envie arquivos (.txt, .md, .docx, .pdf) ou cole um texto. O conteúdo é extraído e exibido aqui para codificação.</div></div>`
          : html`<div class="reader" onMouseUp=${onMouseUp} onContextMenu=${onContextMenu}>
              ${buildRuns(activeDoc.content, codings).map((run,i)=>{
                if(run.codings.length===0) return html`<span key=${i} data-start=${run.start}>${run.text}</span>`;
                const top = run.codings[run.codings.length-1];
                const code = codeById[top.code_id];
                const col = code ? codeColor(code.hue, code.depth) : codeColor(0,0);
                const title = run.codings.map(c=>codePath(c.code_id).join(' ▸ ')+' ('+c.author_name+')').join('  |  ');
                return html`<span key=${i} data-start=${run.start} data-c="1" title=${title}
                   style=${`background:${col.tint};border-bottom:2px solid ${col.solid}`}>${run.text}</span>`;
              })}
            </div>`}
        </div>
      </section>

      <!-- DIREITA: analise -->
      <aside class="pane right">
        <div class="pane-head">
          <div class="seg">
            <button class=${rtab==='categorias'?'on':''} onClick=${()=>setRtab('categorias')}>Categorias do documento</button>
            <button class=${rtab==='codigos'?'on':''} onClick=${()=>setRtab('codigos')}>Codificar</button>
          </div>
        </div>
        <div class="pane-body scroll">
          ${rtab==='categorias' && html`<${CategoriesPanel} cats=${cats} values=${values} activeDoc=${activeDoc}
                 onSet=${setValue} onAdd=${addCategory} onUpd=${updCategory} onDel=${delCategory} />`}
          ${rtab==='codigos' && html`<${CodesPanel} codes=${codes} codeById=${codeById} count=${codingCount} sel=${sel}
                 selCode=${selCode} setSelCode=${setSelCode} codePath=${codePath}
                 onAdd=${addCode} onDel=${delCode} onApply=${applyCode} onUpd=${updCode}
                 store=${store} project=${project} reload=${()=>loadProject(store,project.id)} />`}
        </div>
      </aside>
    </div>`
    : html`<div class="split">
      <!-- VISUALIZACAO: tela inteira -->
      <section class="pane left" style="flex:1 1 100%;border-right:none;max-width:none">
        <div class="pane-head"><span class="h" style="margin:0">Visualização — trechos codificados de todo o projeto</span></div>
        <div class="pane-body scroll">
          <div style="max-width:900px;margin:0 auto">
            <${CodedPanel} docs=${docs} cats=${cats} codes=${codes}
              codeById=${codeById} codePath=${codePath}
              allCodings=${allCodings} allValues=${allValues}
              onDelCoding=${async id=>{ await delCoding(id); loadAll(); }}
              onJump=${(docId)=>{ setActiveId(docId); setMainView('codificar'); }} />
          </div>
        </div>
      </section>
    </div>`}
  </div>

  ${ctxMenu && html`<div>
    <div onClick=${()=>setCtxMenu(null)} onContextMenu=${e=>{e.preventDefault();setCtxMenu(null);}} style="position:fixed;inset:0;z-index:60"></div>
    <div class="exmenu" style=${`position:fixed;left:${Math.min(ctxMenu.x, window.innerWidth-260)}px;top:${Math.min(ctxMenu.y, window.innerHeight-40)}px;z-index:61;max-height:60vh;overflow:auto;min-width:240px`}>
      <div style="padding:7px 12px;font-size:11px;color:var(--ink-faint);border-bottom:1px solid var(--line-soft);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px">“${ctxMenu.sel.quote}”</div>
      ${orderedCodes.length===0
        ? html`<div style="padding:9px 12px;color:var(--ink-faint);font-size:12.5px">Nenhum código criado ainda. Crie um na aba “Codificar”.</div>`
        : orderedCodes.map(c=>{ const col=codeColor(c.hue,c.depth); return html`<button key=${c.id} onClick=${()=>applyCode(c.id, ctxMenu.sel)} style=${`padding-left:${12+c.depth*14}px`}>
            <span class="swatch" style=${`background:${col.solid};display:inline-block;margin-right:7px;vertical-align:middle`}></span>${c.name}
          </button>`; })}
    </div>
  </div>`}

  ${settings && html`<${SettingsModal} mode=${mode} user=${user}
    onClose=${()=>setSettings(false)}
    onSaveCloud=${(url,key)=>{ try{localStorage.setItem('lastro:url',url);localStorage.setItem('lastro:key',key);}catch(e){} location.reload(); }}
    onClearCloud=${()=>{ try{localStorage.removeItem('lastro:url');localStorage.removeItem('lastro:key');localStorage.removeItem('lastro:project');}catch(e){} location.reload(); }}
  />`}
  `;
}

/* ============ AUTH (login / cadastro por e-mail e senha) ============ */
function Auth({ onSignIn, onSignUp, onAnon, err }){
  const [tab,setTab]=useState('in');   // in = entrar | up = criar conta
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false);
  const [confirmMsg,setConfirmMsg]=useState(false);
  const submit = async ()=>{
    setBusy(true); setConfirmMsg(false);
    if(tab==='in'){ await onSignIn(email, pw); }
    else { const r = await onSignUp(email, pw, name||'pesquisador'); if(r && r.confirmed===false) setConfirmMsg(true); }
    setBusy(false);
  };
  return html`<div class="modal-bg"><div class="modal">
    <h2>Acessar o QualiLab</h2>
    <p class="hint">Entre com e-mail e senha para que seus projetos e codificações fiquem salvos na sua conta, em qualquer dispositivo.</p>
    <div class="seg" style="margin-bottom:14px">
      <button class=${tab==='in'?'on':''} onClick=${()=>{setTab('in');setConfirmMsg(false);}}>Entrar</button>
      <button class=${tab==='up'?'on':''} onClick=${()=>{setTab('up');setConfirmMsg(false);}}>Criar conta</button>
    </div>
    ${err && html`<div class="banner err" style="margin:0 0 12px">${err}</div>`}
    ${confirmMsg && html`<div class="banner warn" style="margin:0 0 12px">Conta criada. Verifique seu e-mail para confirmar o cadastro e depois entre.</div>`}
    ${tab==='up' && html`<div class="field"><div class="field-label">Seu nome de exibição</div>
      <input class="txtin" value=${name} onInput=${e=>setName(e.target.value)} placeholder="como você aparece nas codificações" /></div>`}
    <div class="field"><div class="field-label">E-mail</div>
      <input class="txtin" type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="voce@exemplo.com"
        onKeyDown=${e=>{ if(e.key==='Enter') submit(); }} /></div>
    <div class="field"><div class="field-label">Senha</div>
      <input class="txtin" type="password" value=${pw} onInput=${e=>setPw(e.target.value)} placeholder="mínimo 6 caracteres"
        onKeyDown=${e=>{ if(e.key==='Enter') submit(); }} /></div>
    <button class="btn primary" style="width:100%" disabled=${busy||!email||pw.length<6} onClick=${submit}>
      ${busy?'...':(tab==='in'?'Entrar':'Criar conta')}</button>
    <div class="row" style="justify-content:center;margin-top:14px;gap:6px">
      <span class="meta">só testando?</span>
      <button class="btn sm ghost" onClick=${()=>onAnon(name||'visitante')}>entrar como visitante</button>
    </div>
  </div></div>`;
}

/* ============ GATE (Meus Projetos + criar / entrar em projeto) ============ */
function Gate({ onCreate, onJoin, onOpen, err, user, projects }){
  const [name,setName]=useState(user?.name||'');
  const [pname,setPname]=useState('');
  const [code,setCode]=useState('');
  const list = projects||[];
  const num = (p)=>{ const bits=[];
    if(p.n_documents!=null) bits.push(`${p.n_documents} documento(s)`);
    if(p.n_codings!=null) bits.push(`${p.n_codings} trecho(s)`);
    return bits.join(' · '); };
  return html`<div class="modal-bg"><div class="modal" style="max-width:520px">
    <h2>Meus projetos</h2>
    <p class="hint">Abra um projeto que você já criou ou participou, ou comece um novo. Vários pesquisadores no mesmo código codificam juntos.</p>
    ${err && html`<div class="banner err" style="margin:0 0 12px">${err}</div>`}

    ${list.length>0 ? html`<div style="margin-bottom:14px;max-height:240px;overflow:auto">
        ${list.map(p=>html`<div class="docitem" key=${p.code||p.id} style="cursor:pointer" onClick=${()=>onOpen(p)}>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name||'(sem nome)'}</div>
            <div class="meta">código ${p.code}${num(p)?` · ${num(p)}`:''}</div>
          </div>
          <button class="btn sm">abrir</button>
        </div>`)}
      </div>`
      : html`<div class="card" style="margin-bottom:14px"><span class="meta">Você ainda não tem projetos. Crie o primeiro abaixo.</span></div>`}

    <div class="field"><div class="field-label">Seu nome de exibição</div>
      <input class="txtin" value=${name} onInput=${e=>setName(e.target.value)} placeholder="como você aparece nas codificações" /></div>
    <div class="card" style="margin-bottom:12px">
      <div class="field-label">Criar projeto</div>
      <div class="row"><input class="txtin" value=${pname} onInput=${e=>setPname(e.target.value)} placeholder="nome do projeto" />
        <button class="btn primary" onClick=${()=>onCreate(pname,name)}>Criar</button></div>
    </div>
    <div class="card">
      <div class="field-label">Entrar com código</div>
      <div class="row"><input class="txtin" value=${code} onInput=${e=>setCode(e.target.value)} placeholder="ex: 9F2A1C" style="text-transform:uppercase" />
        <button class="btn" onClick=${()=>onJoin(code,name)}>Entrar</button></div>
    </div>
  </div></div>`;
}

function CategoryEditor({ cat, onUpd, onDel }){
  const [nv,setNv]=useState('');
  const opts = cat.options||[];
  const realOpts = opts.filter(o=>!isSpecialOpt(o));
  const hasTok = (tok)=> opts.includes(tok);
  // mantem os valores reais e adiciona/remove o token no fim, preservando a ordem dos demais
  const toggleTok = (tok,on)=>{ const base = opts.filter(o=>o!==tok); onUpd(cat.id,{ options: on ? [...base,tok] : base }); };
  const addVal = ()=>{ const t=nv.trim(); if(!t||isSpecialOpt(t)||opts.includes(t)) { setNv(''); return; }
    const tokens = opts.filter(isSpecialOpt); onUpd(cat.id,{ options:[...realOpts, t, ...tokens] }); setNv(''); };
  return html`<div class="card" style="margin-bottom:8px">
    <div class="row" style="gap:6px">
      <input class="txtin" value=${cat.name} onInput=${e=>onUpd(cat.id,{name:e.target.value})} />
      <select class="opt" value=${cat.kind} onChange=${e=>onUpd(cat.id,{kind:e.target.value})}>
        ${CAT_KINDS.map(k=>html`<option value=${k.id}>${k.label}</option>`)}
      </select>
      <button class="icon-btn" onClick=${()=>onDel(cat.id)} title="excluir">🗑</button>
    </div>
    <input class="txtin" style="margin-top:6px" placeholder="descrição / instrução (opcional)"
      value=${cat.description||''} onInput=${e=>onUpd(cat.id,{description:e.target.value})} />
    ${CAT_HAS_OPTIONS(cat.kind) && html`<div style="margin-top:8px">
      <div class="row" style="flex-wrap:wrap;gap:5px;margin-bottom:6px">
        ${realOpts.map(o=>html`<span class="opt" style="display:inline-flex;gap:5px">${o}
          <button class="icon-btn" style="padding:0" onClick=${()=>onUpd(cat.id,{options:opts.filter(x=>x!==o)})}>✕</button></span>`)}
      </div>
      <div class="row" style="gap:6px">
        <input class="txtin" placeholder="adicionar valor" value=${nv} onInput=${e=>setNv(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter') addVal(); }} />
        <button class="btn sm" onClick=${addVal}>＋</button>
      </div>
    </div>`}
    <div class="row" style="gap:16px;margin-top:8px;flex-wrap:wrap">
      <label class="row" style="gap:5px;font-size:12.5px;cursor:pointer">
        <input type="checkbox" checked=${hasTok(NAO_INFO)} onChange=${e=>toggleTok(NAO_INFO,e.target.checked)} /> Permitir “Não informado”</label>
      ${CAT_HAS_OPTIONS(cat.kind) && html`<label class="row" style="gap:5px;font-size:12.5px;cursor:pointer">
        <input type="checkbox" checked=${hasTok(OUTROS)} onChange=${e=>toggleTok(OUTROS,e.target.checked)} /> Permitir “Outros” (valor livre)</label>`}
    </div>
  </div>`;
}

/* ============ VALOR DE UMA CATEGORIA (por documento) ============
   "Não informado" e "Outros" sao opcoes dentro da categoria (tokens em options).
   Escolher "Outros" abre um campo de texto livre cujo conteudo vira o valor. */
function CategoryValue({ cat, v, onSet }){
  const [editingOther,setEditingOther]=useState(false);
  const opts = cat.options||[];
  const hasNA = opts.includes(NAO_INFO);
  const hasOther = opts.includes(OUTROS);
  const realOpts = opts.filter(o=>!isSpecialOpt(o));
  const value = v ? v.value : '';
  const isNA = value===NAO_INFO;
  const noVals = realOpts.length===0 && !hasNA && !hasOther
    ? html`<span class="meta">sem valores — edite o esquema abaixo</span>` : '';

  if(cat.kind==='date') return html`<${DateInput} value=${value} onCommit=${onSet} />`;

  if(cat.kind==='text'){
    return html`<div>
      ${hasNA && html`<button class="opt ${isNA?'on':''}" style="margin-bottom:6px" onClick=${()=>onSet(isNA?'':NAO_INFO)}>Não informado</button>`}
      ${!isNA && html`<${DebInput} value=${value} onCommit=${onSet} placeholder="valor descritivo" />`}
    </div>`;
  }

  if(cat.kind==='checkbox'){
    const selv = isNA ? [] : (value?String(value):'').split(CAT_MULTI_SEP).filter(Boolean);
    const customs = selv.filter(s=>!realOpts.includes(s));
    const showOther = hasOther && (editingOther || customs.length>0);
    const setSel = (arr)=> onSet(arr.join(CAT_MULTI_SEP));
    const toggle = (o)=>{ const base=isNA?[]:selv; setSel(base.includes(o)?base.filter(x=>x!==o):[...base,o]); };
    const setOther = (txt)=>{ const keep = selv.filter(s=>realOpts.includes(s)); setSel(txt.trim()?[...keep,txt.trim()]:keep); };
    return html`<div class="row" style="flex-wrap:wrap;gap:6px">
        ${noVals}
        ${realOpts.map(o=>html`<button class="opt ${selv.includes(o)?'on':''}" onClick=${()=>toggle(o)}>${selv.includes(o)?'☑':'☐'} ${o}</button>`)}
        ${hasOther && html`<button class="opt ${showOther?'on':''}" onClick=${()=>setEditingOther(x=>!x)}>${showOther?'☑':'☐'} Outros</button>`}
        ${hasNA && html`<button class="opt ${isNA?'on':''}" onClick=${()=>onSet(isNA?'':NAO_INFO)}>${isNA?'☑':'☐'} Não informado</button>`}
        ${showOther && html`<${DebInput} value=${customs[0]||''} onCommit=${setOther} placeholder="qual?" />`}
      </div>`;
  }

  // single / select: valor unico
  const isCustom = hasOther && !!value && value!==NAO_INFO && !realOpts.includes(value);
  const showOther = hasOther && (editingOther || isCustom);

  if(cat.kind==='select'){
    const selVal = showOther ? '__other__' : (isNA ? NAO_INFO : (realOpts.includes(value)?value:''));
    return html`<div>
      <select class="opt" style="min-width:180px" value=${selVal} onChange=${e=>{ const val=e.target.value;
          if(val==='__other__'){ setEditingOther(true); onSet(''); } else { setEditingOther(false); onSet(val); } }}>
        <option value="">(sem valor)</option>
        ${realOpts.map(o=>html`<option value=${o}>${o}</option>`)}
        ${hasOther && html`<option value="__other__">Outros…</option>`}
        ${hasNA && html`<option value=${NAO_INFO}>Não informado</option>`}
      </select>
      ${showOther && html`<div style="margin-top:6px"><${DebInput} value=${isCustom?value:''} onCommit=${onSet} placeholder="qual?" /></div>`}
      ${noVals && html`<div style="margin-top:4px">${noVals}</div>`}
    </div>`;
  }

  // single = Múltipla Escolha (botões)
  return html`<div class="row" style="flex-wrap:wrap;gap:6px;align-items:center">
      ${noVals}
      ${realOpts.map(o=>html`<button class="opt ${(!isCustom && value===o)?'on':''}" onClick=${()=>{ setEditingOther(false); onSet(value===o?'':o); }}>${o}</button>`)}
      ${hasOther && html`<button class="opt ${showOther?'on':''}" onClick=${()=>setEditingOther(true)}>Outros</button>`}
      ${hasNA && html`<button class="opt ${isNA?'on':''}" onClick=${()=>{ setEditingOther(false); onSet(isNA?'':NAO_INFO); }}>Não informado</button>`}
      ${showOther && html`<${DebInput} value=${isCustom?value:''} onCommit=${onSet} placeholder="qual?" />`}
    </div>`;
}

/* ============ PAINEL DE CODIGOS (tags de trecho, hierarquicas) ============ */
function CodesPanel({ codes, codeById, count, sel, selCode, setSelCode, codePath, onAdd, onDel, onApply, onUpd, store, project, reload }){

    <div class="row" style="gap:6px;margin-bottom:10px">

/* ============ PAINEL DE TRECHOS CODIFICADOS (visualizacao de todo o projeto) ============
   Filtra por categorias do documento e cruza ate 3 codigos por co-ocorrencia (sobreposicao
   de trechos no mesmo documento). E so visualizacao: a codificacao acontece na aba "Codificar". */
function CodedPanel({ docs, cats, codes, codeById, codePath, allCodings, allValues, onDelCoding, onJump }){
  const [catFilter, setCatFilter] = useState({});   // category_id -> valor exigido
  const [codeSel, setCodeSel] = useState(['','','']); // ate 3 codigos cruzados

  const docById = useMemo(()=>Object.fromEntries(docs.map(d=>[d.id,d])), [docs]);
  const docName = (id)=>docById[id]?.name || '';

  // valores possiveis por categoria (uniao do esquema fechado + valores presentes)
  const valuesFor = (cat)=>{
    const present = allValues.filter(v=>v.category_id===cat.id && v.value).map(v=>v.value);
    return [...new Set([...(cat.options||[]), ...present])];
  };
  const setCat = (catId,val)=> setCatFilter(f=>{ const n={...f}; if(val) n[catId]=val; else delete n[catId]; return n; });
  const setCode = (i,val)=> setCodeSel(s=>{ const n=s.slice(); n[i]=val; return n; });

  // documentos que passam no filtro de categorias
  const docMatches = (docId)=> Object.entries(catFilter).every(([catId,want])=>{
    const v = allValues.find(x=>x.document_id===docId && x.category_id===catId);
    // casa valor único ou um dos valores de uma Caixa de Seleção (multivalor)
    return v && v.value!=null && String(v.value).split(CAT_MULTI_SEP).includes(want);
  });

  const active = [...new Set(codeSel.filter(Boolean))]; // codigos cruzados, sem repetir

  // resultados: cada item e {key, docId, start, end, quote, codeIds, codingId?}
  const results = useMemo(()=>{
    const out = [];
    const docIds = docs.filter(d=>docMatches(d.id)).map(d=>d.id);
    for(const docId of docIds){
      const inDoc = allCodings.filter(c=>c.document_id===docId);
      if(active.length<=1){
        const list = active.length===1 ? inDoc.filter(c=>c.code_id===active[0]) : inDoc;
        list.forEach(c=> out.push({ key:c.id, docId, start:c.span_start, end:c.span_end, quote:c.quote, codeIds:[c.code_id], codingId:c.id }));
      } else {
        // co-ocorrencia: interseccao das combinacoes de trechos dos codigos selecionados
        const arrs = active.map(id=>inDoc.filter(c=>c.code_id===id));
        if(arrs.some(a=>a.length===0)) continue;
        const seen = new Set();
        const content = docById[docId]?.content || '';
        const combine = (idx, accStart, accEnd)=>{
          if(idx===arrs.length){
            if(accStart < accEnd){
              const k = docId+':'+accStart+':'+accEnd;
              if(!seen.has(k)){ seen.add(k); out.push({ key:k, docId, start:accStart, end:accEnd, quote:content.slice(accStart,accEnd), codeIds:active.slice() }); }
            }
            return;
          }
          for(const c of arrs[idx]){
            const s=Math.max(accStart, c.span_start), e=Math.min(accEnd, c.span_end);
            if(s<e) combine(idx+1, s, e);
          }
        };
        combine(0, 0, Infinity);
      }
    }
    return out.sort((a,b)=> a.docId===b.docId ? a.start-b.start : (docName(a.docId)>docName(b.docId)?1:-1));
  }, [docs, allCodings, allValues, catFilter, codeSel]);

  const crossing = active.length>=2;

  return html`<div class="section">
    <p class="h">Trechos codificados</p>
    <p class="hint">Visualização de todo o projeto. Filtre por atributos do documento e cruze até 3 códigos por co-ocorrência (trechos que se sobrepõem no mesmo documento). A codificação acontece na aba “Codificar”.</p>

    <div class="card" style="margin-bottom:12px">
      <div class="field-label">Filtrar por categorias</div>
      ${cats.length===0 ? html`<span class="meta">Nenhuma categoria definida.</span>`
        : cats.map(cat=>html`<div class="row" key=${cat.id} style="gap:6px;margin-bottom:6px">
            <span style="font-size:12.5px;min-width:120px">${cat.name}</span>
            <select class="opt" style="flex:1" value=${catFilter[cat.id]||''} onChange=${e=>setCat(cat.id, e.target.value)}>
              <option value="">(qualquer)</option>
              ${valuesFor(cat).map(o=>html`<option value=${o}>${o}</option>`)}
            </select>
          </div>`)}

      <div class="field-label" style="margin-top:12px">Cruzar códigos (co-ocorrência)</div>
      ${[0,1,2].map(i=>html`<div class="row" key=${i} style="gap:6px;margin-bottom:6px">
        <span style="font-size:12.5px;min-width:120px">${i===0?'Código':i===1?'+ Código':'+ Código'}</span>
        <select class="opt" style="flex:1" value=${codeSel[i]||''} onChange=${e=>setCode(i, e.target.value)}>
          <option value="">${i===0?'(todos)':'(nenhum)'}</option>
          ${codes.map(c=>html`<option value=${c.id}>${codePath(c.id).join(' ▸ ')}</option>`)}
        </select>
      </div>`)}
      ${(Object.keys(catFilter).length>0 || active.length>0) && html`<button class="btn sm ghost" style="margin-top:4px"
        onClick=${()=>{ setCatFilter({}); setCodeSel(['','','']); }}>limpar filtros</button>`}
    </div>

    <div class="row" style="justify-content:space-between;margin-bottom:8px">
      <span class="meta">${results.length} ${crossing?'co-ocorrência(s)':'trecho(s)'}</span>
      ${crossing && html`<span class="meta">cruzando ${active.length} códigos</span>`}
    </div>

    ${results.length===0 && html`<div class="card"><span class="meta">Nenhum trecho corresponde aos filtros.</span></div>`}
    ${results.map(r=>{
      const firstCode = codeById[r.codeIds[0]];
      const col = firstCode ? codeColor(firstCode.hue, firstCode.depth) : codeColor(0,0);
      return html`<div class="card" key=${r.key} style="margin-bottom:6px;padding:9px 11px">
        <div class="row" style="gap:7px;margin-bottom:3px">
          <span class="swatch" style=${`background:${col.solid}`}></span>
          <span class="crumb" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer"
            title=${'Abrir '+docName(r.docId)} onClick=${()=>onJump&&onJump(r.docId)}>${docName(r.docId)}</span>
          ${r.codingId && html`<button class="icon-btn" onClick=${()=>onDelCoding(r.codingId)} title="remover">🗑</button>`}
        </div>
        <div class="row" style="flex-wrap:wrap;gap:4px;margin-bottom:4px">
          ${r.codeIds.map(cid=>html`<span class="author" key=${cid}>${codePath(cid).join(' ▸ ')}</span>`)}
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--ink-soft)">“${(r.quote||'').slice(0,160)}”</div>
      </div>`;
    })}
  </div>`;
}

function TreeNode({ code, childrenOf, count, sel, selCode, setSelCode, onApply, onDel, store, reload, depthPad }){
  const [open,setOpen]=useState(true);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth);
  const isSel = selCode===code.id;
  const appliable = !!sel;
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''} ${appliable?'appliable':''}" style=${`padding-left:${6+depthPad*16}px`}
      onClick=${()=> appliable ? onApply(code.id) : setSelCode(code.id) }>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.name}</span>
      ${count[code.id]?html`<span class="count">${count[code.id]}</span>`:''}
      <button class="icon-btn" onClick=${e=>{e.stopPropagation(); if(confirm('Excluir o código e seus subcódigos e codificações?')) onDel(code.id);}} title="excluir">✕</button>
    </div>
    ${open && kids.map(k=>html`<${TreeNode} key=${k.id} code=${k} childrenOf=${childrenOf} count=${count}
      sel=${sel} selCode=${selCode} setSelCode=${setSelCode} onApply=${onApply} onDel=${onDel}
      store=${store} reload=${reload} depthPad=${depthPad+1} />`)}
  </div>`;
}
function RenameCode({ code, onUpd }){
  const [v,setV]=useState(code.name);
  useEffect(()=>setV(code.name),[code.id]);
  return html`<div class="row" style="gap:6px;margin-top:6px">
    <input class="txtin" value=${v} onInput=${e=>setV(e.target.value)} />
    <button class="btn sm" onClick=${()=>onUpd(code.id,{name:v})}>renomear</button>
  </div>`;
}

/* inputs com debounce / colar */
function DebInput({ value, onCommit, placeholder }){
  const [v,setV]=useState(value||''); const t=useRef(null);
  useEffect(()=>setV(value||''),[value]);
  return html`<input class="txtin" placeholder=${placeholder} value=${v}
    onInput=${e=>{ setV(e.target.value); clearTimeout(t.current); const val=e.target.value; t.current=setTimeout(()=>onCommit(val),600); }}
    onBlur=${()=>{ clearTimeout(t.current); onCommit(v); }} />`;
}

/* data possivelmente parcial: DD/MM/AAAA com partes em branco quando o documento nao informa.
   guarda como string "dd/mm/aaaa" (campo vazio = parte desconhecida); tudo vazio = nao informada. */
function parseDate(val){
  if(!val) return { d:'', mo:'', y:'' };
  const iso = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(val);   // aceita formato ISO legado
  if(iso) return { d:iso[3], mo:iso[2], y:iso[1] };
  const m = /^(\d{0,2})\/(\d{0,2})\/(\d{0,4})$/.exec(val);
  return m ? { d:m[1], mo:m[2], y:m[3] } : { d:'', mo:'', y:'' };
}
function DateInput({ value, onCommit }){
  const [p,setP]=useState(parseDate(value)); const t=useRef(null);
  useEffect(()=>setP(parseDate(value)),[value]);
  const build = (q)=> (q.d||q.mo||q.y) ? `${q.d}/${q.mo}/${q.y}` : '';
  const set = (k,raw,max)=>{ const digits=String(raw).replace(/\D/g,'').slice(0,max); const q={...p,[k]:digits}; setP(q);
    clearTimeout(t.current); t.current=setTimeout(()=>onCommit(build(q)),600); };
  const flush = ()=>{ clearTimeout(t.current); onCommit(build(p)); };
  const informada = !!(p.d||p.mo||p.y);
  return html`<div>
    <div class="row" style="gap:8px;margin-bottom:8px">
      <button class="opt ${informada?'':'on'}" title="Marca a data como não informada (limpa os campos)"
        onClick=${()=>{ const q={d:'',mo:'',y:''}; setP(q); clearTimeout(t.current); onCommit(''); }}>Não informada</button>
    </div>
    <div class="row" style="gap:6px;align-items:center">
      <input class="txtin" style="width:60px;text-align:center" inputmode="numeric" placeholder="DD" maxlength="2"
        value=${p.d} onInput=${e=>set('d',e.target.value,2)} onBlur=${flush} />
      <span class="meta">/</span>
      <input class="txtin" style="width:60px;text-align:center" inputmode="numeric" placeholder="MM" maxlength="2"
        value=${p.mo} onInput=${e=>set('mo',e.target.value,2)} onBlur=${flush} />
      <span class="meta">/</span>
      <input class="txtin" style="width:78px;text-align:center" inputmode="numeric" placeholder="AAAA" maxlength="4"
        value=${p.y} onInput=${e=>set('y',e.target.value,4)} onBlur=${flush} />
    </div>
    <div class="meta" style="margin-top:6px">Deixe em branco as partes que o documento não informa.</div>
  </div>`;
}
function AddPaste({ onAdd }){
  const [open,setOpen]=useState(false); const [n,setN]=useState(''); const [t,setT]=useState('');
  if(!open) return html`<button class="btn sm ghost" onClick=${()=>setOpen(true)}>colar texto</button>`;
  return html`<div class="modal-bg"><div class="modal">
    <h2>Colar documento</h2>
    <div class="field"><input class="txtin" placeholder="nome" value=${n} onInput=${e=>setN(e.target.value)} /></div>
    <div class="field"><textarea class="txtin" rows="8" placeholder="cole o texto aqui" value=${t} onInput=${e=>setT(e.target.value)} style="font-family:var(--serif);line-height:1.6"></textarea></div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="btn ghost" onClick=${()=>{setOpen(false);setN('');setT('');}}>cancelar</button>
      <button class="btn primary" onClick=${()=>{ if(t.trim()){ onAdd(n,t); setOpen(false); setN(''); setT(''); } }}>Adicionar</button>
    </div>
  </div></div>`;
}

/* ============ SETTINGS ============ */
function SettingsModal({ mode, user, onClose, onSaveCloud, onClearCloud }){
  const [url,setUrl]=useState(''); const [key,setKey]=useState('');
  return html`<div class="modal-bg"><div class="modal">
    <h2>Conexão</h2>
    <p class="hint">Modo atual: <b>${mode==='cloud'?'nuvem (coletivo)':'local (este navegador)'}</b>.</p>
    ${mode==='local'
      ? html`<div>
          <p class="hint">Para ativar o modo coletivo, cole a URL e a anon key do seu projeto Supabase. Elas ficam salvas só neste navegador.</p>
          <div class="field"><div class="field-label">Supabase URL</div><input class="txtin" value=${url} onInput=${e=>setUrl(e.target.value)} placeholder="https://xxxx.supabase.co" /></div>
          <div class="field"><div class="field-label">Anon key</div><input class="txtin" value=${key} onInput=${e=>setKey(e.target.value)} placeholder="eyJhbGciOi..." /></div>
          <button class="btn primary" disabled=${!url||!key} onClick=${()=>onSaveCloud(url.trim(),key.trim())}>Conectar e recarregar</button>
        </div>`
      : html`<div>
          <p class="hint">Usuário: ${user?.name}. Para voltar ao modo local (sem servidor), limpe a conexão.</p>
          <button class="btn ghost" onClick=${onClearCloud}>Desconectar do Supabase</button>
        </div>`}
    <div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn" onClick=${onClose}>Fechar</button></div>
  </div></div>`;
}
