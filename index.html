    try{
      const documents = docs.map(d=>({ id:d.id, name:d.name, content:d.content, created_at:d.created_at||new Date().toISOString() }));
      const categories = cats.map((c,i)=>({ id:c.id, position:c.position??i, name:c.name, kind:c.kind, options:c.options||[], description:c.description||'', color:c.color||0 }));
      const codesOut = codes.map((c,i)=>({ id:c.id, position:c.position??i, parent_id:c.parent_id||null, name:c.name, hue:c.hue||0, depth:c.depth||0 }));
      const doc_values=[], codings=[];
      for(const d of docs){
        const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id, d.id)]);
        v.forEach(x=>doc_values.push({ id:x.id||uid(), document_id:d.id, category_id:x.category_id, value:x.value, set_by:x.set_by||'file-user', author_name:x.author_name||'anonimo', layer:x.layer||'individual' }));
        co.forEach(x=>codings.push({ id:x.id||uid(), document_id:x.document_id, code_id:x.code_id, span_start:x.span_start, span_end:x.span_end, quote:x.quote, layer:x.layer||'individual', created_by:x.created_by??null, author_name:x.author_name||'anonimo', created_at:x.created_at||new Date().toISOString() }));
      }
      let memos=[];
      try{ memos = (await store.listMemos?.(project.id))||[]; }catch(e){}
      const db = { _meta:{ id:'file-project', name:project.name||'Projeto', code:'FILE', mode:projectMode||'individual', displayName:user?.name||'pesquisador' },
        documents, categories, doc_values, codes:codesOut, codings, memos };
      download((project.name||'projeto').replace(/[^\w\-]+/g,'_')+'.qualilab', JSON.stringify(db,null,2), 'application/json');
      setBusy(null);
    }catch(e){ setBusy(null); setErr('Falha ao salvar .qualilab: '+(e.message||e)); }
  }

  async function doExport(kind){
    setExpOpen(false);
    try{
      const allV=[], allC=[];
      for(const d of docs){
        const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id,d.id)]);
        v.forEach(x=>allV.push({ document_id:d.id, category_id:x.category_id, value:x.value, author:x.author_name||'anonimo', layer:x.layer||'individual' }));
        co.forEach(x=>allC.push(x));
      }
      const dn=(id)=>docs.find(d=>d.id===id)?.name||"";
      if(kind==='json'){
        const obj={ exported_at:new Date().toISOString(), project:{ name:project.name, code:project.code },
          documents:docs.map(d=>({id:d.id,name:d.name,content:d.content})),
          categories:cats.map(c=>({id:c.id,name:c.name,kind:c.kind,options:c.options,description:c.description||''})),
          document_values:allV,
          codes:codes.map(c=>({id:c.id,parent_id:c.parent_id,name:c.name,depth:c.depth,path:codePathFor(codes,c.id)})),
          codings:allC.map(c=>({id:c.id,document_id:c.document_id,code_id:c.code_id,code_path:codePathFor(codes,c.code_id),start:c.span_start,end:c.span_end,quote:c.quote,author:c.author_name,layer:c.layer||'individual'})) };
        download('qualilab_projeto.json', JSON.stringify(obj,null,2), 'application/json');
      } else if(kind==='trechos'){
        const header=["documento","familia","codigo","nivel","trecho","inicio","fim","autor","camada"];
        const sorted=allC.slice().sort((a,b)=> a.document_id===b.document_id ? a.span_start-b.span_start : (dn(a.document_id)>dn(b.document_id)?1:-1));
        const rows=sorted.map(c=>{ const p=codePathFor(codes,c.code_id); return [dn(c.document_id), p[0]||"", p.join(" > "), String(p.length-1), c.quote, String(c.span_start), String(c.span_end), c.author_name, c.layer||'individual']; });
        download('qualilab_trechos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='documentos'){
        // usa o gabarito (final) quando existe; senao a primeira resposta individual
        const valFor=(docId,catId)=>{ const rows=allV.filter(x=>x.document_id===docId&&x.category_id===catId);
          const fin=rows.find(r=>r.layer==='final'); return (fin||rows[0]||{}).value||""; };
        const header=["documento",...cats.map(c=>c.name),"n_trechos"];
        const rows=docs.map(d=>[d.name, ...cats.map(cat=>valFor(d.id,cat.id)), String(allC.filter(c=>c.document_id===d.id&&(c.layer||'individual')!=='final').length)]);
        download('qualilab_documentos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='qdpx'){
        // um valor por documento/categoria (QDPX espera isso): prefere o gabarito (final)
        const pick = {};
        allV.forEach(x=>{ const k=x.document_id+':'+x.category_id; const cur=pick[k];
          if(!cur || (x.layer==='final' && cur.layer!=='final')) pick[k]=x; });
        // prefere a camada final (gabarito consolidado); se nao houver, usa as individuais
        const finalCods = allC.filter(c=>c.layer==='final');
        const codForQdpx = finalCods.length > 0 ? finalCods : allC.filter(c=>(c.layer||'individual')!=='final');
        await exportQDPX(docs, cats, Object.values(pick), codes, codForQdpx, project);
      }
    }catch(e){ setErr('Falha ao exportar: '+(e.message||e)); }
  }

  async function doImportQDPX(file){
    setBusy('Importando .qdpx...');
    setProgress({done:0,total:0});
    try{
      const r = await importQDPX(file, store, project.id, projectMode, (done,total)=>setProgress({done,total}));
      setProgress(null);
      const freshDocs = await store.listDocuments(project.id);
      // carrega o projeto completo e define explicitamente o primeiro documento
      // (evita race condition: loadDoc usa activeId do closure, que pode ser antigo)
      const [cats2, codes2] = await Promise.all([store.listCategories(project.id), store.listCodes(project.id)]);
      setCats(cats2); setCodes(codes2); setDocs(freshDocs);
      const firstId = freshDocs[0]?.id || null;
      if(firstId){
        setActiveId(firstId);
        const [vals, cods] = await Promise.all([store.getDocValues(firstId), store.listCodings(project.id, firstId)]);
        setValues(vals); setCodings(cods);
      }
      const desc = r.descartados;
      const skippedBits = [];
      if(desc.picture) skippedBits.push(`${desc.picture} imagem(ns)`);
      if(desc.audio) skippedBits.push(`${desc.audio} áudio(s)`);
      if(desc.video) skippedBits.push(`${desc.video} vídeo(s)`);
      if(desc.pdfSemTexto) skippedBits.push(`${desc.pdfSemTexto} PDF(s) sem representação em texto`);
      if(desc.fonteExterna) skippedBits.push(`${desc.fonteExterna} fonte(s) externa(s)`);
      const skippedMsg = skippedBits.length ? ` Não importado(s): ${skippedBits.join(', ')}.` : '';
      const fechadasMsg = r.categoriasFechadasDetectadas>0
        ? ` ${r.categoriasFechadasDetectadas} categoria(s) detectada(s) como fechada(s) automaticamente (poucos valores distintos) — revise em "Gerenciar esquema de categorias".`
        : '';
      setErr(null);
      setBusy(null);
      setImportMsg(`Importado: ${r.documentos} documento(s), ${r.categorias} categoria(s), ${r.codigos} código(s), ${r.trechos} trecho(s) codificado(s).${skippedMsg}${fechadasMsg}`);
    }catch(e){ setBusy(null); setProgress(null); setErr('Falha ao importar: '+(e.message||e)); }
  }

  async function doImportTaguette(file){
    setBusy('Importando .sqlite3 (Taguette)...');
    setProgress({done:0,total:0});
    try{
      const r = await importTaguette(file, store, project.id, projectMode, (done,total)=>setProgress({done,total}));
      setProgress(null);
      const freshDocs = await store.listDocuments(project.id);
      const codes2 = await store.listCodes(project.id);
      setCodes(codes2); setDocs(freshDocs);
      const firstId = freshDocs[0]?.id || null;
      if(firstId){
        setActiveId(firstId);
        const [vals, cods] = await Promise.all([store.getDocValues(firstId), store.listCodings(project.id, firstId)]);
        setValues(vals); setCodings(cods);
      }
      setErr(null);
      setBusy(null);
      setImportMsg(`Importado de "${r.projeto}" (Taguette): ${r.documentos} documento(s), ${r.codigos} código(s), ${r.trechos} trecho(s) codificado(s). Sem atributos de documento ou autor por trecho — o Taguette não tem esses conceitos.`);
    }catch(e){ setBusy(null); setProgress(null); setErr('Falha ao importar .sqlite3: '+(e.message||e)); }
  }

  async function doImportQDC(file){
    setBusy('Importando .qdc...');
    setProgress({done:0,total:0});
    try{
      const r = await importQDC(file, store, project.id, (done,total)=>setProgress({done,total}));
      setProgress(null);
      const codes2 = await store.listCodes(project.id);
      setCodes(codes2);
      setErr(null);
      setBusy(null);
      setImportMsg(`Importado: ${r.codigos} código(s) do livro de códigos (.qdc). Sem documentos nem codificações — o formato não tem isso.`);
    }catch(e){ setBusy(null); setProgress(null); setErr('Falha ao importar .qdc: '+(e.message||e)); }
  }

  async function doClearProject(){
    if(!confirm('Apagar TODOS os documentos, categorias, códigos e codificações deste projeto? Esta ação não pode ser desfeita.')) return;
    setBusy('Limpando projeto...');
    try{
      await store.clearProject(project.id);
      setActiveId(null); setSel(null); setSelCode(null);
      await loadProject(store, project.id);
      setBusy(null); setImportMsg('Projeto limpo.');
    }catch(e){ setBusy(null); setErr('Falha ao limpar: '+(e.message||e)); }
  }

  function computeSelection(){
    if(!activeDoc) return null;
    const s = window.getSelection();
    if(!s || s.rangeCount===0 || s.isCollapsed) return null;
    const r = s.getRangeAt(0);
    const off=(node,o)=>{ let el=node.nodeType===3?node.parentElement:node; while(el && (!el.dataset || el.dataset.start===undefined)) el=el.parentElement; return el?parseInt(el.dataset.start,10)+o:null; };
    const a=off(r.startContainer,r.startOffset), b=off(r.endContainer,r.endOffset);
    if(a==null||b==null) return null;
    const start=Math.min(a,b), end=Math.max(a,b);
    const q = activeDoc.content.slice(start,end); if(q.trim().length===0) return null;
    return { start, end, quote:q };
  }
  function onMouseUp(e){
    if(e && e.button!==0) return; // ignora clique direito (tratado em onContextMenu)
    const sx = computeSelection();
    if(sx){ setSel(sx); setRtab('codigos'); }
  }
  function onContextMenu(e){
    const sx = computeSelection();
    if(!sx) return; // sem seleção: deixa o menu normal do navegador
    e.preventDefault();
    setSel(sx);
    // limite direito = borda da coluna de leitura (não invade o painel da direita)
    const boundRight = e.currentTarget.getBoundingClientRect().right;
    setCtxMenu({ x:e.clientX, y:e.clientY, sel:sx, boundRight });
  }

  /* ----- maps ----- */
  const codeById = useMemo(()=>Object.fromEntries(codes.map(c=>[c.id,c])), [codes]);
  // codigos em ordem de arvore (pai antes dos filhos), para o menu de contexto
  const orderedCodes = useMemo(()=>{
    const out=[]; const childrenOf=(id)=>codes.filter(c=>c.parent_id===id);
    const walk=(list)=>list.forEach(c=>{ out.push(c); walk(childrenOf(c.id)); });
    walk(codes.filter(c=>!c.parent_id));
    return out;
  }, [codes]);
  const codePath = useCallback((id)=>{ const out=[]; let c=codeById[id]; let guard=0; while(c&&guard++<12){ out.unshift(c.name); c=c.parent_id?codeById[c.parent_id]:null; } return out; }, [codeById]);
  const codingCount = useMemo(()=>{ const m={}; codings.forEach(c=>{m[c.code_id]=(m[c.code_id]||0)+1;}); return m; }, [codings]);
  // frequencia GLOBAL (todo o projeto, nao so o documento aberto) — usada na aba Esquema,
  // que nao tem documento ativo; ajuda a ver o que esta sendo usado de fato ao reorganizar
  // agregada (familia soma os subcodigos), igual o countByCode do VizNav — sem isso, uma
  // familia (Hierarquia 0) sempre aparece com 0 quando o uso real esta nos subcodigos
  const schemaCodingCount = useMemo(()=>{
    const direct={}; allCodings.forEach(c=>{direct[c.code_id]=(direct[c.code_id]||0)+1;});
    const parentOf={}; codes.forEach(c=>{parentOf[c.id]=c.parent_id;});
    const agg={...direct};
    Object.entries(direct).forEach(([codeId,n])=>{
      let p=parentOf[codeId];
      while(p){ agg[p]=(agg[p]||0)+n; p=parentOf[p]; }
    });
    return agg;
  }, [allCodings, codes]);

    onSignUp=${async (email,pw,disp)=>{ try{ const r=await store.signUp(email,pw,disp); try{localStorage.setItem('lastro:name',disp);}catch(e){} setErr(null); if(r.confirmed){ await afterAuth(store, disp); } return r; }catch(e){ setErr(String(e.message||e)); return { error:String(e.message||e) }; } }}

/* ============ AUTH (login / cadastro por e-mail e senha) ============ */
function Auth({ onSignIn, onSignUp, onAnon, err }){
  const [tab,setTab]=useState('in');   // in = entrar | up = criar conta
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false);
  const [confirmMsg,setConfirmMsg]=useState(false);
  const submit = async ()=>{
    setBusy(true); setConfirmMsg(false);
    if(tab==='in'){ await onSignIn(email, pw); }
    else { const r = await onSignUp(email, pw, name||'pesquisador'); if(r && r.confirmed===false) setConfirmMsg(true); }
    setBusy(false);
  };
  return html`<div class="modal-bg"><div class="modal">
    <h2>Acessar o QualiLab</h2>
    <p class="hint">Entre com e-mail e senha para que seus projetos e codificações fiquem salvos na sua conta, em qualquer dispositivo.</p>
    <div class="seg" style="margin-bottom:14px">
      <button class=${tab==='in'?'on':''} onClick=${()=>{setTab('in');setConfirmMsg(false);}}>Entrar</button>
      <button class=${tab==='up'?'on':''} onClick=${()=>{setTab('up');setConfirmMsg(false);}}>Criar conta</button>
    </div>
    ${err && html`<div class="banner err" style="margin:0 0 12px">${err}</div>`}
    ${confirmMsg && html`<div class="banner warn" style="margin:0 0 12px">Conta criada. Verifique seu e-mail para confirmar o cadastro e depois entre.</div>`}
    ${tab==='up' && html`<div class="field"><div class="field-label">Seu nome de exibição</div>
      <input class="txtin" value=${name} onInput=${e=>setName(e.target.value)} placeholder="como você aparece nas codificações" /></div>`}
    <div class="field"><div class="field-label">E-mail</div>
      <input class="txtin" type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="voce@exemplo.com"
        onKeyDown=${e=>{ if(e.key==='Enter') submit(); }} /></div>
    <div class="field"><div class="field-label">Senha</div>
      <input class="txtin" type="password" value=${pw} onInput=${e=>setPw(e.target.value)} placeholder="mínimo 6 caracteres"
        onKeyDown=${e=>{ if(e.key==='Enter') submit(); }} /></div>
    <button class="btn primary" style="width:100%" disabled=${busy||!email||pw.length<6} onClick=${submit}>
      ${busy?'...':(tab==='in'?'Entrar':'Criar conta')}</button>
    <hr style="border:none;border-top:1px solid var(--line-soft);margin:16px 0 10px" />
    <div style="text-align:center">
      <span class="meta">Sem conta? </span>
      <button class="btn sm ghost" style="font-size:12px" onClick=${()=>onAnon(name||'visitante')}>Continuar como visitante</button>
      <p class="meta" style="margin:6px 0 0;font-size:11px">Projetos ficam vinculados a este dispositivo — sem sincronização entre aparelhos.</p>
    </div>
  </div></div>`;
}

/* ============ PAINEL DE CATEGORIAS (atributos do documento) ============ */
function CategoriesPanel({ cats, values, activeDoc, canEditSchema, userId, projectMode, viewCoder, onSet, onAdd, onUpd, onDel }){
  // individual: setValue grava direto em layer='final' (sem multi-coder) — mostra o gabarito,
  // sempre editavel (so existe 1 "pesquisador").
  // coletivo: segue o MESMO filtro "Ver:" que o leitor usa pra codings, mas um campo de
  // categoria so cabe UM valor por vez — diferente dos grifos no texto, que podem sobrepor
  // varios. Por isso 'all' (Individuais/todos, no leitor = sobrepoe todo mundo) NAO pode
  // significar "minha resposta" aqui: sem um pesquisador especifico escolhido nao ha como
  // "calcular" qual resposta mostrar, entao cai no gabarito se existir (so leitura) — so 'mine'
  // (resposta do PROPRIO usuario, sem ambiguidade) e editavel. Ver a resposta de outro
  // pesquisador ou o gabarito tambem fica somente leitura — editar ali so escreveria sob a
  // identidade de quem esta logado (setDocValue sempre usa o uid do usuario atual), entao
  // "corrigir" o que aparece sobrescreveria a PROPRIA resposta do usuario atual por engano,
  // nao a da pessoa exibida. O gabarito se edita na Reconciliação (onSetFinal), nao aqui.
  const isOwnView = projectMode==='individual' || viewCoder==='mine';
  const valOf = (catId)=>{
    const final = ()=> values.find(v=>v.category_id===catId && v.layer==='final');
    if(projectMode==='individual') return final();
    if(viewCoder==='final' || viewCoder==='all') return final(); // 'all': sem 1 resposta so p/ mostrar, cai no gabarito
    const indiv = values.filter(v=>v.category_id===catId && (v.layer||'individual')!=='final');
    if(viewCoder==='mine') return indiv.find(v=>v.set_by===userId);
    if(viewCoder.startsWith('__nm__')){ const nm=viewCoder.slice(6); return indiv.find(v=>v.author_name===nm); }
    return indiv.find(v=>v.set_by===viewCoder);
  };
  const viewLabel = viewCoder==='final' ? 'Final / gabarito' : viewCoder==='all' ? 'Final / gabarito (sem 1 resposta individual só pra mostrar com "todos")' : viewCoder.startsWith('__nm__') ? viewCoder.slice(6) : 'outro pesquisador';
  return html`<div class="section">
    <p class="h">Atributos deste documento</p>
    <p class="hint">Cada categoria recebe um valor para o documento inteiro (não para um trecho). O esquema é definido pelo dono do projeto; o valor é preenchido por documento.</p>
    ${!isOwnView && html`<div class="banner warn" style="margin:0 0 10px">Mostrando: ${viewLabel} — somente leitura. Troque o filtro "Ver:" para "Minhas" pra editar a sua própria resposta.</div>`}
    ${!activeDoc && html`<div class="card"><span class="meta">Abra um documento para preencher.</span></div>`}
    ${activeDoc && cats.length===0 && html`<div class="card"><span class="meta">${canEditSchema?'Nenhuma categoria ainda. Crie abaixo.':'Nenhuma categoria definida pelo dono do projeto.'}</span></div>`}
    ${activeDoc && cats.map(cat=>{
      const v = valOf(cat.id);
      return html`<div class="field" key=${cat.id}>
        <div class="field-label">${cat.name} ${v && html`<span class="author">${v.author_name}</span>`}</div>
        ${cat.description && html`<p class="hint" style="margin:-2px 0 7px">${cat.description}</p>`}
        <${CategoryValue} cat=${cat} v=${v} onSet=${val=>onSet(cat.id,val)} readOnly=${!isOwnView} />
      </div>`;
    })}
    ${canEditSchema && html`<details style="margin-top:10px">
      <summary style="cursor:pointer;font-size:12.5px;color:var(--ink-soft)">Gerenciar esquema de categorias</summary>
      <div style="margin-top:10px">
        ${cats.map(cat=>html`<${CategoryEditor} key=${cat.id} cat=${cat} onUpd=${onUpd} onDel=${onDel} />`)}
        <button class="btn sm" onClick=${onAdd} style="margin-top:6px">＋ Nova categoria</button>
      </div>
    </details>`}
  </div>`;
}
function CategoryEditor({ cat, onUpd, onDel }){
  const [nv,setNv]=useState('');
  const opts = cat.options||[];
  const realOpts = opts.filter(o=>!isSpecialOpt(o));
  const hasTok = (tok)=> opts.includes(tok);
  // mantem os valores reais e adiciona/remove o token no fim, preservando a ordem dos demais
  const toggleTok = (tok,on)=>{ const base = opts.filter(o=>o!==tok); onUpd(cat.id,{ options: on ? [...base,tok] : base }); };
  const addVal = ()=>{ const t=nv.trim(); if(!t||isSpecialOpt(t)||opts.includes(t)) { setNv(''); return; }
    const tokens = opts.filter(isSpecialOpt); onUpd(cat.id,{ options:[...realOpts, t, ...tokens] }); setNv(''); };
  return html`<div class="card" style="margin-bottom:8px">
    <div class="row" style="gap:6px">
      <input class="txtin" value=${cat.name} onInput=${e=>onUpd(cat.id,{name:e.target.value})} />
      <select class="opt" value=${cat.kind} onChange=${e=>onUpd(cat.id,{kind:e.target.value})}>
        ${CAT_KINDS.map(k=>html`<option value=${k.id}>${k.label}</option>`)}
      </select>
      <button class="icon-btn" onClick=${()=>onDel(cat.id)} title="excluir">🗑</button>
    </div>
    <input class="txtin" style="margin-top:6px" placeholder="descrição / instrução (opcional)"
      value=${cat.description||''} onInput=${e=>onUpd(cat.id,{description:e.target.value})} />
    ${CAT_HAS_OPTIONS(cat.kind) && html`<div style="margin-top:8px">
      <div class="row" style="flex-wrap:wrap;gap:5px;margin-bottom:6px">
        ${realOpts.map(o=>html`<span class="opt" style="display:inline-flex;gap:5px">${o}
          <button class="icon-btn" style="padding:0" onClick=${()=>onUpd(cat.id,{options:opts.filter(x=>x!==o)})}>✕</button></span>`)}
      </div>
      <div class="row" style="gap:6px">
        <input class="txtin" placeholder="adicionar valor" value=${nv} onInput=${e=>setNv(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter') addVal(); }} />
        <button class="btn sm" onClick=${addVal}>＋</button>
      </div>
    </div>`}
    <div class="row" style="gap:16px;margin-top:8px;flex-wrap:wrap">
      <label class="row" style="gap:5px;font-size:12.5px;cursor:pointer">
        <input type="checkbox" checked=${hasTok(NAO_INFO)} onChange=${e=>toggleTok(NAO_INFO,e.target.checked)} /> Permitir "Não informado"</label>
      ${CAT_HAS_OPTIONS(cat.kind) && html`<label class="row" style="gap:5px;font-size:12.5px;cursor:pointer">
        <input type="checkbox" checked=${hasTok(OUTROS)} onChange=${e=>toggleTok(OUTROS,e.target.checked)} /> Permitir "Outros" (valor livre)</label>`}
    </div>
  </div>`;
}

/* ============ VALOR DE UMA CATEGORIA (por documento) ============
   "Não informado" e "Outros" sao opcoes dentro da categoria (tokens em options).
   Escolher "Outros" abre um campo de texto livre cujo conteudo vira o valor. */
function CategoryValue({ cat, v, onSet, readOnly }){
  const [editingOther,setEditingOther]=useState(false);
  const opts = cat.options||[];
  const hasNA = opts.includes(NAO_INFO);
  const hasOther = opts.includes(OUTROS);
  const realOpts = opts.filter(o=>!isSpecialOpt(o));
  const value = v ? v.value : '';
  const isNA = value===NAO_INFO;
  const noVals = realOpts.length===0 && !hasNA && !hasOther
    ? html`<span class="meta">sem valores — edite o esquema abaixo</span>` : '';

  if(cat.kind==='date') return html`<${DateInput} value=${value} onCommit=${onSet} disabled=${readOnly} />`;

  if(cat.kind==='text'){
    return html`<div>
      ${hasNA && html`<button class="opt ${isNA?'on':''}" disabled=${readOnly} style="margin-bottom:6px" onClick=${()=>onSet(isNA?'':NAO_INFO)}>Não informado</button>`}
      ${!isNA && (readOnly
        ? html`<span class="opt" style="display:inline-block;cursor:default">${value||html`<span class="meta" style="font-style:italic">sem resposta</span>`}</span>`
        : html`<${DebInput} value=${value} onCommit=${onSet} placeholder="valor descritivo" />`)}
    </div>`;
  }

  if(cat.kind==='checkbox'){
    const selv = isNA ? [] : (value?String(value):'').split(CAT_MULTI_SEP).filter(Boolean);
    const customs = selv.filter(s=>!realOpts.includes(s));
    const showOther = hasOther && (editingOther || customs.length>0);
    const setSel = (arr)=> onSet(arr.join(CAT_MULTI_SEP));
    const toggle = (o)=>{ const base=isNA?[]:selv; setSel(base.includes(o)?base.filter(x=>x!==o):[...base,o]); };
    const setOther = (txt)=>{ const keep = selv.filter(s=>realOpts.includes(s)); setSel(txt.trim()?[...keep,txt.trim()]:keep); };
    return html`<div class="row" style="flex-wrap:wrap;gap:6px">
        ${noVals}
        ${realOpts.map(o=>html`<button class="opt ${selv.includes(o)?'on':''}" disabled=${readOnly} onClick=${()=>toggle(o)}>${selv.includes(o)?'☑':'☐'} ${o}</button>`)}
        ${hasOther && (customs.length>0 || !readOnly) && html`<button class="opt ${showOther?'on':''}" disabled=${readOnly} onClick=${()=>setEditingOther(x=>!x)}>${showOther?'☑':'☐'} Outros</button>`}
        ${hasNA && html`<button class="opt ${isNA?'on':''}" disabled=${readOnly} onClick=${()=>onSet(isNA?'':NAO_INFO)}>${isNA?'☑':'☐'} Não informado</button>`}
        ${showOther && (readOnly
          ? html`<span class="opt" style="display:inline-block;cursor:default">${customs[0]||''}</span>`
          : html`<${DebInput} value=${customs[0]||''} onCommit=${setOther} placeholder="qual?" />`)}
      </div>`;
  }

  // single / select: valor unico
  const isCustom = hasOther && !!value && value!==NAO_INFO && !realOpts.includes(value);
  const showOther = hasOther && (editingOther || isCustom);

  if(cat.kind==='select'){
    const selVal = showOther ? '__other__' : (isNA ? NAO_INFO : (realOpts.includes(value)?value:''));
    return html`<div>
      <select class="opt" disabled=${readOnly} style="min-width:180px" value=${selVal} onChange=${e=>{ const val=e.target.value;
          if(val==='__other__'){ setEditingOther(true); onSet(''); } else { setEditingOther(false); onSet(val); } }}>
        <option value="">(sem valor)</option>
        ${realOpts.map(o=>html`<option value=${o}>${o}</option>`)}
        ${hasOther && html`<option value="__other__">Outros…</option>`}
        ${hasNA && html`<option value=${NAO_INFO}>Não informado</option>`}
      </select>
      ${showOther && html`<div style="margin-top:6px">${readOnly
        ? html`<span class="opt" style="display:inline-block;cursor:default">${isCustom?value:''}</span>`
        : html`<${DebInput} value=${isCustom?value:''} onCommit=${onSet} placeholder="qual?" />`}</div>`}
      ${noVals && html`<div style="margin-top:4px">${noVals}</div>`}
    </div>`;
  }

  // single = Múltipla Escolha (botões)
  return html`<div class="row" style="flex-wrap:wrap;gap:6px;align-items:center">
      ${noVals}
      ${realOpts.map(o=>html`<button class="opt ${(!isCustom && value===o)?'on':''}" disabled=${readOnly} onClick=${()=>{ setEditingOther(false); onSet(value===o?'':o); }}>${o}</button>`)}
      ${hasOther && (isCustom || !readOnly) && html`<button class="opt ${showOther?'on':''}" disabled=${readOnly} onClick=${()=>setEditingOther(true)}>Outros</button>`}
      ${hasNA && html`<button class="opt ${isNA?'on':''}" disabled=${readOnly} onClick=${()=>{ setEditingOther(false); onSet(isNA?'':NAO_INFO); }}>Não informado</button>`}
      ${showOther && (readOnly
        ? html`<span class="opt" style="display:inline-block;cursor:default">${isCustom?value:''}</span>`
        : html`<${DebInput} value=${isCustom?value:''} onCommit=${onSet} placeholder="qual?" />`)}
    </div>`;
}

/* ============ PAINEL DE CODIGOS (tags de trecho, hierarquicas) ============ */

    <div class="row" style="gap:6px;margin-bottom:10px">
      <button class="btn sm" onClick=${()=>onAdd(selected)} disabled=${!selected} title=${selected?`filho de ${selected.name}`:'selecione um código'}>＋ subcódigo${selected?` de "${selected.name}"`:''}</button>

/* ============ ESQUEMA > CODIGOS — reorganizacao em lote ============
   Tela cheia dedicada (sem documento aberto), pensada pra quem fez codificacao aberta
   (grounded theory) e termina com centenas de codigos soltos, todos no mesmo nivel.
   Selecao multipla por checkbox + duas acoes em lote:
   - "agrupar": os codigos marcados continuam separados, so passam a ser filhos de um
     unico pai (existente ou recem-criado, que nasce em Hierarquia 0).
   - "mesclar": reatribui as codificacoes de todos os marcados pra um unico sobrevivente
     e apaga os demais — irreversivel, confirma antes.
   Tambem da pra promover qualquer codigo a Hierarquia 0 (familia de topo) com um clique.
   Reaproveita RenameCode (definido mais abaixo, perto de TreeNode) mas NAO toca em
   CodesPanel/TreeNode — o painel da tela de Codificacao continua intocado de proposito. */
function SchemaCodesView({ codes, codeById, codePath, count, isAdmin, store, project, reload, loadAll,
                            allCodings, selCode, setSelCode, onUpd, onSetColor, onAdd, onDel }){
  const [query, setQuery] = useState('');
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [busy, setBusy] = useState(false);

  const tops = codes.filter(c=>!c.parent_id);
  const childrenOf = (id)=>codes.filter(c=>c.parent_id===id);
  const toggleSelect = (id)=> setSelectedIds(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const clearSelection = ()=> setSelectedIds(new Set());

  const q = query.trim().toLowerCase();
  const filtered = q ? codes.filter(c=>c.name.toLowerCase().includes(q)) : null;

  // evita ciclo: nao deixa mover um codigo pra dentro de um dos seus proprios descendentes
  const isDescendantOf = (nodeId, maybeAncestorId)=>{
    let p = codeById[nodeId]?.parent_id;
    while(p){ if(p===maybeAncestorId) return true; p = codeById[p]?.parent_id; }
    return false;
  };

  // recalcula a profundidade (e, se adoptColor, a cor) de um codigo e de toda a sua
  // subarvore — necessario sempre que um codigo muda de pai, senao a luminosidade do
  // swatch (que depende de code.depth) fica errada pra posicao nova na arvore.
  async function reparentSubtree(codeId, newParentId, newDepth, adoptColor){
    const patch = { parent_id:newParentId, depth:newDepth };
    if(adoptColor){ patch.hue = adoptColor.hue; patch.hue_deg = adoptColor.hue_deg ?? null; }
    await store.updateCode(codeId, patch);
    const stack=[{id:codeId,depth:newDepth}];
    while(stack.length){
      const {id,depth}=stack.pop();
      for(const ch of childrenOf(id)){
        const cd = depth+1;
        const cpatch = { depth:cd };
        if(adoptColor){ cpatch.hue=adoptColor.hue; cpatch.hue_deg=adoptColor.hue_deg ?? null; }
        await store.updateCode(ch.id, cpatch);
        stack.push({id:ch.id,depth:cd});
      }
    }
  }

  async function promoteToRoot(code){
    if(!code.parent_id) return;
    setBusy(true);
    try{ await reparentSubtree(code.id, null, 0, null); await reload(); }
    finally{ setBusy(false); }
  }

  async function handleGroup(targetId, newName, ids){
    setBusy(true);
    try{
      const target = targetId ? codeById[targetId] : await onAdd(null, newName||'Novo agrupamento');
      for(const id of ids){
        if(id===target.id || isDescendantOf(target.id, id)) continue;
        await reparentSubtree(id, target.id, target.depth+1, { hue:target.hue, hue_deg:target.hue_deg });
      }
      await reload();
      clearSelection();
    } finally { setBusy(false); }
  }

  async function handleMerge(survivorId, mergedIds){
    setBusy(true);
    try{
      const survivor = codeById[survivorId];
      // 1) reatribui as codificacoes dos mesclados pro sobrevivente (recria + apaga a
      // original, ja que os stores nao tem updateCoding — so addCoding/deleteCoding)
      for(const mid of mergedIds){
        for(const cod of allCodings.filter(c=>c.code_id===mid)){
          await store.addCoding(project.id, { document_id:cod.document_id, code_id:survivorId,
            span_start:cod.span_start, span_end:cod.span_end, quote:cod.quote, layer:cod.layer,
            created_by:cod.created_by??null, author_name:cod.author_name });
          await store.deleteCoding(cod.id);
        }
      }
      // 2) reparenta os filhos diretos dos mesclados pro sobrevivente — senao deleteCode
      // (que apaga em cascata) destruiria esses filhos junto
      for(const mid of mergedIds){
        for(const ch of childrenOf(mid)){
          await reparentSubtree(ch.id, survivorId, survivor.depth+1, { hue:survivor.hue, hue_deg:survivor.hue_deg });
        }
      }
      // 3) exclui os mesclados (ja sem filhos nem codificacoes)
      for(const mid of mergedIds){ await store.deleteCode(mid); }
      await reload();
      await loadAll();
      clearSelection();
    } finally { setBusy(false); }
  }

  return html`<div class="split">
    <section class="pane" style="flex:1;min-width:0;border-right:1px solid var(--line)">
      <div class="pane-body scroll" style="padding:14px">
        <div class="row" style="gap:6px;margin-bottom:10px;flex-wrap:wrap">
          <button class="btn sm" onClick=${()=>onAdd(selCode?codeById[selCode]:null)} disabled=${!selCode}
            title=${selCode?`filho de ${codeById[selCode]?.name}`:'selecione um código'}>＋ subcódigo</button>
          <button class="btn sm ghost" onClick=${()=>onAdd(null)}>＋ nova família (topo)</button>
          <div style="flex:1"></div>
          <input class="txtin" style="max-width:220px" placeholder="buscar código…" value=${query} onInput=${e=>setQuery(e.target.value)} />
        </div>
        ${busy && html`<div class="banner warn">Aplicando…</div>`}
        <div class="tree">
          ${tops.length===0 && html`<span class="meta">Nenhum código ainda. Comece por uma família.</span>`}
          ${!filtered && tops.map(t=>html`<${SchemaTreeNode} key=${t.id} code=${t} childrenOf=${childrenOf} count=${count}
              selCode=${selCode} setSelCode=${setSelCode} selectedIds=${selectedIds} onToggleSelect=${toggleSelect} onDel=${onDel} depthPad=${0} />`)}
          ${filtered && filtered.length===0 && html`<span class="meta">Nenhum código com esse nome.</span>`}
          ${filtered && filtered.map(c=>html`<div class="node-row ${selCode===c.id?'sel':''}" key=${c.id} onClick=${()=>setSelCode(c.id)}>
              <input type="checkbox" checked=${selectedIds.has(c.id)} onClick=${e=>e.stopPropagation()} onChange=${()=>toggleSelect(c.id)} style="margin-right:2px" />
              <span class="swatch" style=${`background:${codeColor(c.hue,c.depth,c.hue_deg).solid}`}></span>
              <span class="node-name" title=${codePath(c.id).join(' ▸ ')}>${codePath(c.id).join(' ▸ ')}</span>
              ${count[c.id]?html`<span class="count">${count[c.id]}</span>`:''}
            </div>`)}
        </div>
      </div>
    </section>
    <aside class="pane" style="flex:0 0 300px;min-width:0;background:var(--paper)">
      <div class="pane-body scroll" style="padding:14px">
        ${selectedIds.size>=2
          ? html`<${SchemaBulkPanel} selectedIds=${selectedIds} codes=${codes} codeById=${codeById} count=${count}
                   onMerge=${handleMerge} onGroup=${handleGroup} onClear=${clearSelection} />`
          : selCode && codeById[selCode]
            ? html`<div class="section">
                <p class="h">Código selecionado</p>
                <div class="crumb">${codePath(selCode).join(' ▸ ')}</div>
                <${RenameCode} code=${codeById[selCode]} onUpd=${onUpd} onSetColor=${onSetColor} isAdmin=${isAdmin} />
                ${codeById[selCode].parent_id && html`<button class="btn sm ghost" style="margin-top:10px;width:100%"
                  onClick=${()=>promoteToRoot(codeById[selCode])}>Promover a Hierarquia 0</button>`}
              </div>`
            : html`<div class="section"><p class="hint">Marque dois ou mais códigos (☑) para agrupar ou mesclar, ou clique em um para renomear/colorir.</p></div>`}
      </div>
    </aside>
  </div>`;
}

function SchemaTreeNode({ code, childrenOf, count, selCode, setSelCode, selectedIds, onToggleSelect, onDel, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg);
  const isSel = selCode===code.id;
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''}" style=${`padding-left:${6+depthPad*16}px`} onClick=${()=>setSelCode(code.id)}>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <input type="checkbox" checked=${selectedIds.has(code.id)} onClick=${e=>e.stopPropagation()} onChange=${()=>onToggleSelect(code.id)} style="margin-right:2px" />
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.name}</span>
      ${count[code.id]?html`<span class="count">${count[code.id]}</span>`:''}
      <button class="icon-btn" onClick=${e=>{e.stopPropagation(); if(confirm('Excluir o código e seus subcódigos e codificações?')) onDel(code.id);}} title="excluir">✕</button>
    </div>
    ${open && kids.map(k=>html`<${SchemaTreeNode} key=${k.id} code=${k} childrenOf=${childrenOf} count=${count}
      selCode=${selCode} setSelCode=${setSelCode} selectedIds=${selectedIds} onToggleSelect=${onToggleSelect} onDel=${onDel} depthPad=${depthPad+1} />`)}
  </div>`;
}

function SchemaBulkPanel({ selectedIds, codes, codeById, count, onMerge, onGroup, onClear }){
  const [mode, setMode] = useState('group'); // group | merge
  const items = [...selectedIds].map(id=>codeById[id]).filter(Boolean);
  const sorted = useMemo(()=>items.slice().sort((a,b)=>(count[b.id]||0)-(count[a.id]||0)), [selectedIds, count]);
  const [survivor, setSurvivor] = useState(sorted[0]?.id || '');
  // recalcula a sugestao (o mais frequente) a cada mudanca na selecao — useState(sorted[0])
  // so roda na montagem do componente (quando a selecao ja tinha 2), entao marcar um 3o item
  // mais frequente depois nao atualizaria o sobrevivente sugerido sem isto
  useEffect(()=>{ setSurvivor(sorted[0]?.id || ''); }, [selectedIds]); // eslint-disable-line
  const [groupTarget, setGroupTarget] = useState('');
  const [groupNewName, setGroupNewName] = useState('');
  const candidates = codes.filter(c=>!selectedIds.has(c.id)); // nao pode ser pai um dos proprios marcados

  return html`<div class="section">
    <p class="h">${items.length} código(s) selecionado(s)</p>
    <div class="seg" style="margin-bottom:10px">
      <button class=${mode==='group'?'on':''} onClick=${()=>setMode('group')}>Agrupar</button>
      <button class=${mode==='merge'?'on':''} onClick=${()=>setMode('merge')}>Mesclar</button>
    </div>

    ${mode==='group' ? html`<div>
      <p class="hint">Os códigos marcados continuam separados, mas passam a ser filhos de um único código.</p>
      <div class="field">
        <div class="field-label">Código-pai</div>
        <select class="opt" style="width:100%" value=${groupTarget} onChange=${e=>setGroupTarget(e.target.value)}>
          <option value="">＋ criar novo (Hierarquia 0)</option>
          ${candidates.map(c=>html`<option value=${c.id}>${'— '.repeat(c.depth)}${c.name}</option>`)}
        </select>
      </div>
      ${!groupTarget && html`<input class="txtin" style="margin-top:6px;width:100%" placeholder="nome do novo código"
        value=${groupNewName} onInput=${e=>setGroupNewName(e.target.value)} />`}
      <button class="btn sm primary" style="margin-top:10px;width:100%"
        disabled=${!groupTarget && !groupNewName.trim()}
        onClick=${()=>onGroup(groupTarget||null, groupNewName, [...selectedIds])}>Agrupar</button>
    </div>` : html`<div>
      <p class="hint">Escolha qual código sobrevive. Os demais têm suas codificações reatribuídas a ele e são excluídos — não pode ser desfeito.</p>
      ${sorted.map(c=>html`<label class="row" style="gap:6px;padding:4px 0;cursor:pointer" key=${c.id}>
        <input type="radio" name="survivor" checked=${survivor===c.id} onChange=${()=>setSurvivor(c.id)} />
        <span style="flex:1;font-size:13px">${c.name}</span><span class="meta">${count[c.id]||0}</span>
      </label>`)}
      <button class="btn sm primary" style="margin-top:10px;width:100%" disabled=${!survivor}
        onClick=${()=>{ if(confirm(`Mesclar ${items.length} códigos em "${codeById[survivor]?.name}"? As codificações dos outros serão reatribuídas a ele, e eles serão excluídos. Isso não pode ser desfeito.`))
          onMerge(survivor, [...selectedIds].filter(id=>id!==survivor)); }}>Mesclar</button>
    </div>`}

    <button class="btn sm ghost" style="margin-top:10px;width:100%" onClick=${onClear}>limpar seleção</button>
  </div>`;
}

/* ============ RECONCILIACAO (camadas individuais -> camada final) ============
   Agrupa as codificacoes individuais que se sobrepoem com o mesmo codigo, mostra
   quantos codificadores concordam e permite consolidar cada grupo na camada "final". */
function Reconcile({ activeDoc, codings, coders, codeById, codePath, cats, values, isOwner, onSetFinal, onConsolidate, onDelCoding }){
  if(!activeDoc) return html`<div class="card"><span class="meta">Abra um documento para reconciliar.</span></div>`;
  const indiv = codings.filter(c=>c.layer!=='final');
  const finals = codings.filter(c=>c.layer==='final');
  const totalCoders = new Set(indiv.map(c=>c.created_by)).size || 1;
  const byCode = {};
  indiv.forEach(c=>{ (byCode[c.code_id]=byCode[c.code_id]||[]).push(c); });
  const groups = [];
  Object.entries(byCode).forEach(([codeId,list])=>{
    list.slice().sort((a,b)=>a.span_start-b.span_start).forEach(c=>{
      const cur = groups.find(g=>g.codeId===codeId && c.span_start < g.end && g.start < c.span_end);
      if(cur){ cur.start=Math.min(cur.start,c.span_start); cur.end=Math.max(cur.end,c.span_end); cur.items.push(c); }
      else groups.push({ codeId, start:c.span_start, end:c.span_end, items:[c] });
    });
  });
  groups.sort((a,b)=>a.start-b.start || a.end-b.end);
  const finalFor = (g)=> finals.find(f=>f.code_id===g.codeId && f.span_start < g.end && g.start < f.span_end);
  const nameOf = (id, fallback)=> (coders.find(c=>c.id===id)||{}).name || fallback || 'anônimo';
  return html`<div class="section">
    <p class="h">Categorias — gabarito e comparação</p>
    <p class="hint">Cada pesquisador preenche os atributos do documento; o dono consolida o <b>gabarito</b>. ✓ = igual ao gabarito, ✗ = diferente.</p>
    ${(cats||[]).length===0 && html`<div class="card"><span class="meta">Nenhuma categoria definida.</span></div>`}
    ${(cats||[]).map(cat=>{
      const finRow = (values||[]).find(v=>v.category_id===cat.id && v.layer==='final');
      const finalVal = finRow ? finRow.value : '';
      const indivVals = (values||[]).filter(v=>v.category_id===cat.id && (v.layer||'individual')!=='final');
      return html`<div class="card" key=${cat.id} style="margin-bottom:8px;padding:10px 12px">
        <div style="font-size:12.5px;font-weight:600;margin-bottom:2px">${cat.name}</div>
        ${cat.description && html`<div class="hint" style="margin:0 0 6px">${cat.description}</div>`}
        <div style="background:var(--teal-soft);border-radius:8px;padding:6px 10px;margin-bottom:8px">
          <div class="row" style="gap:8px;align-items:center">
            <span class="meta" style="color:var(--teal-deep);font-weight:600">Gabarito</span>
            ${isOwner
              ? html`<div style="flex:1"><${CategoryValue} cat=${cat} v=${finRow} onSet=${val=>onSetFinal(cat.id,val)} /></div>`
              : html`<span style="font-weight:600;color:var(--teal-deep)">${finalVal||'(não consolidado)'}</span>`}
          </div>
        </div>
        ${indivVals.length===0
          ? html`<div class="meta">Ninguém respondeu ainda.</div>`
          : indivVals.map(v=>{ const ok = finalVal!=='' && v.value===finalVal;
              return html`<div class="row" key=${v.id||v.set_by} style="gap:8px;padding:2px 0">
                <span style=${`color:${ok?'var(--teal)':'var(--danger)'};font-weight:700;width:14px`}>${ok?'✓':'✗'}</span>
                <span style="flex:1;font-size:13px">${v.value||html`<span class="meta" style="font-style:italic">sem resposta</span>`}</span>
                <span class="meta">${v.author_name||'anônimo'}</span>
              </div>`;
            })}
      </div>`;
    })}

    <p class="h" style="margin-top:18px">Códigos — reconciliação</p>
    <p class="hint">Cada grupo reúne as codificações que se sobrepõem com o mesmo código. Consolide os que devem entrar na camada <b>final</b> do projeto.${totalCoders>1?` ${totalCoders} codificadores neste documento.`:''}</p>
    ${groups.length===0 && html`<div class="card"><span class="meta">Nenhuma codificação individual neste documento ainda.</span></div>`}
    ${groups.map(g=>{
      const code = codeById[g.codeId]; const col = code?codeColor(code.hue,code.depth,code.hue_deg):codeColor(0,0);
      const coderIds = [...new Set(g.items.map(i=>i.created_by))];
      const fin = finalFor(g);
      const consensus = coderIds.length>=totalCoders && totalCoders>1;
      const quote = activeDoc.content.slice(g.start,g.end);
      return html`<div class="card" key=${g.codeId+':'+g.start} style=${`margin-bottom:8px;padding:10px 12px;${consensus?'border-color:var(--teal)':''}`}>
        <div class="row" style="gap:7px;margin-bottom:4px">
          <span class="swatch" style=${`background:${col.solid}`}></span>
          <span style="flex:1;font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${codePath(g.codeId).join(' ▸ ')}</span>
          <span class="meta">${coderIds.length} de ${totalCoders}${consensus?' · consenso':''}</span>
        </div>
        <div class="row" style="flex-wrap:wrap;gap:4px;margin-bottom:6px">
          ${coderIds.map(id=>html`<span class="author" key=${id}>${nameOf(id, (g.items.find(i=>i.created_by===id)||{}).author_name)}</span>`)}
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:8px">"${quote.slice(0,180)}"</div>
        ${fin
          ? html`<div class="row" style="gap:8px;align-items:center">
              <span class="author" style="background:var(--teal-soft);color:var(--teal-deep)">✓ na camada final</span>
              <button class="btn sm ghost" onClick=${()=>onDelCoding(fin.id)}>remover do final</button></div>`
          : html`<button class="btn sm primary" onClick=${()=>onConsolidate(g.codeId, g.start, g.end, quote)}>Consolidar no final →</button>`}
      </div>`;
    })}
  </div>`;
}

/* ============ VizNav — painel esquerdo da Visualização ============
   Visual idêntico ao painel de Codificação: mesmas classes CSS, sem fundo colorido. */
function VizNav({ cats, codes, allCodings, allValues, docs, layer, catFilter, selCode,
                  onLayer, onCatFilter, onSelCode, codePath, codeById, projectMode }){
  const [catsOpen, setCatsOpen] = useState(false);
  const closedCats = cats.filter(c=>CAT_HAS_OPTIONS(c.kind)||c.kind==='date');
  const tops = codes.filter(c=>!c.parent_id);
  const childrenOf = (id)=>codes.filter(c=>c.parent_id===id);

  // projeto individual: sem reconciliação, todas as codificações já nascem na camada
  // 'final' — não há o que escolher, então nem mostra o seletor (uniforme com o leitor,
  // que também ignora a camada nesse modo — ver visibleCodings).
  const layerCodings = useMemo(()=>
    projectMode==='individual' ? allCodings
      : allCodings.filter(c=> layer==='final' ? c.layer==='final' : c.layer!=='final')
  , [allCodings, layer, projectMode]);

  const matchingDocIds = useMemo(()=>{
    const s=new Set();
    docs.forEach(d=>{
      const ok = Object.entries(catFilter).every(([catId,want])=>{
        if(!want) return true;
        const rows = allValues.filter(x=>x.document_id===d.id && x.category_id===catId);
        const fin = rows.find(r=>r.layer==='final');
        const pool = fin ? [fin.value] : rows.map(r=>r.value);
        return pool.some(v=>v!=null && String(v).split(CAT_MULTI_SEP).includes(want));
      });
      if(ok) s.add(d.id);
    });
    return s;
  }, [docs, allValues, catFilter]);

  // contagem direta por código + agregada nos ancestrais (família mostra a soma de todos os subcódigos)
  const countByCode = useMemo(()=>{
    const direct={};
    layerCodings.filter(c=>matchingDocIds.has(c.document_id)).forEach(c=>{ direct[c.code_id]=(direct[c.code_id]||0)+1; });
    const parentOf = {}; codes.forEach(c=>{ parentOf[c.id]=c.parent_id; });
    const agg = {...direct};
    Object.entries(direct).forEach(([codeId,n])=>{
      let p = parentOf[codeId];
      while(p){ agg[p]=(agg[p]||0)+n; p = parentOf[p]; }
    });
    return agg;
  }, [layerCodings, matchingDocIds, codes]);

  const hasFilter = Object.values(catFilter).some(Boolean);

  return html`<div style="background:var(--surface);display:flex;flex-direction:column;height:100%">

    <!-- camada + categorias: mesma linguagem do pane-head -->
    ${projectMode!=='individual' && html`<div class="pane-head" style="flex-direction:column;align-items:stretch;gap:6px;padding:10px 14px">
      <div class="row" style="gap:8px;align-items:center">
        <span class="field-label" style="margin:0;flex:none">Camada</span>
        <select class="opt" style="flex:1" value=${layer} onChange=${e=>onLayer(e.target.value)}>
          <option value="individual">Individuais (todos)</option>
          <option value="final">Final / gabarito</option>
        </select>
      </div>
    </div>`}

    <!-- categorias: seção colapsável idêntica ao "Gerenciar esquema" -->
    ${closedCats.length>0 && html`<div style="border-bottom:1px solid var(--line-soft)">
      <div class="node-row" style="padding:6px 14px;cursor:pointer;border-radius:0"
        onClick=${()=>setCatsOpen(o=>!o)}>
        <span class="caret">${catsOpen?'▾':'▸'}</span>
        <span class="node-name" style="font-weight:600">Categorias</span>
        ${hasFilter && html`<span class="pill" style="font-size:10px;padding:1px 8px">filtro ativo</span>`}
      </div>
      ${catsOpen && html`<div style="padding:4px 14px 12px">
        ${closedCats.map(cat=>{ const opts=(cat.options||[]).filter(o=>!isSpecialOpt(o));
          return html`<div key=${cat.id} class="field" style="margin-bottom:8px">
            <div class="field-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title=${cat.name}>${cat.name}</div>
            <select class="opt" style="width:100%"
              value=${catFilter[cat.id]||''} onChange=${e=>{ const v=e.target.value; onCatFilter(f=>{ const n={...f}; if(v) n[cat.id]=v; else delete n[cat.id]; return n; }); }}>
              <option value="">(qualquer)</option>
              ${opts.map(o=>html`<option value=${o}>${o}</option>`)}
            </select>
          </div>`; })}
        ${hasFilter && html`<button class="btn sm ghost" style="width:100%" onClick=${()=>onCatFilter({})}>limpar filtros</button>`}
      </div>`}
    </div>`}

    <!-- árvore de códigos (mesmas classes que o TreeNode do painel Codificar) -->
    <div class="tree scroll" style="flex:1;overflow-y:auto;padding:4px 6px">
      ${tops.length===0 && html`<span class="meta" style="padding:14px 8px;display:block">Nenhum código criado.</span>`}
      ${tops.map(t=>html`<${VizCodeNode} key=${t.id} code=${t} childrenOf=${childrenOf}
        counts=${countByCode} sel=${selCode} onSel=${onSelCode} depthPad=${0} />`)}
    </div>
  </div>`;
}

function VizCodeNode({ code, childrenOf, counts, sel, onSel, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg);
  const isSel = sel===code.id;
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''}" style=${`padding-left:${6+depthPad*16}px;cursor:pointer`}
      onClick=${()=>onSel(code.id)}>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.name}</span>
      ${counts[code.id] ? html`<span class="count">${counts[code.id]}</span>` : ''}
    </div>
    ${open && kids.map(k=>html`<${VizCodeNode} key=${k.id} code=${k} childrenOf=${childrenOf}
      counts=${counts} sel=${sel} onSel=${onSel} depthPad=${depthPad+1} />`)}
  </div>`;
}

/* ============ VizExcerpts — painel direito da Visualização ============
   Trechos do código selecionado, legíveis, agrupados por documento. */
function VizExcerpts({ docs, codes, codeById, codePath, allCodings, allValues,
                       layer, catFilter, selCode, crossCodes, setCrossCodes,
                       onDelCoding, onJump, projectMode }){
  const layerCodings = useMemo(()=>
    projectMode==='individual' ? allCodings
      : allCodings.filter(c=> layer==='final' ? c.layer==='final' : c.layer!=='final')
  , [allCodings, layer, projectMode]);

  const docById = useMemo(()=>Object.fromEntries(docs.map(d=>[d.id,d])), [docs]);

  const matchingDocIds = useMemo(()=>{
    const s=new Set();
    docs.forEach(d=>{
      const ok = Object.entries(catFilter).every(([catId,want])=>{
        if(!want) return true;
        const rows = allValues.filter(x=>x.document_id===d.id && x.category_id===catId);
        const fin = rows.find(r=>r.layer==='final');
        const pool = fin ? [fin.value] : rows.map(r=>r.value);
        return pool.some(v=>v!=null && String(v).split(CAT_MULTI_SEP).includes(want));
      });
      if(ok) s.add(d.id);
    });
    return s;
  }, [docs, allValues, catFilter]);

  // codigo selecionado + todos os seus descendentes (familia agrega os subcodigos)
  const selWithDescendants = useMemo(()=>{
    if(!selCode) return new Set();
    const ids = new Set([selCode]);
    let added = true;
    while(added){
      added = false;
      codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added = true; } });
    }
    return ids;
  }, [selCode, codes]);

  const excerpts = useMemo(()=>{
    if(!selCode) return [];
    const extra = [...new Set((crossCodes||[]).filter(Boolean))];
    return layerCodings
      .filter(c=> selWithDescendants.has(c.code_id) && matchingDocIds.has(c.document_id))
      .filter(c=>{
        if(!extra.length) return true;
        return extra.every(xid=>
          layerCodings.some(x=> x.document_id===c.document_id && x.code_id===xid
            && x.span_start < c.span_end && c.span_start < x.span_end));
      })
      .sort((a,b)=>{
        const na=docById[a.document_id]?.name||'', nb=docById[b.document_id]?.name||'';
        return na>nb?1:na<nb?-1:a.span_start-b.span_start;
      });
  }, [selCode, crossCodes, layerCodings, matchingDocIds, docById, selWithDescendants]);

  const byDoc = useMemo(()=>{
    const g={};
    excerpts.forEach(c=>{ (g[c.document_id]=g[c.document_id]||[]).push(c); });
    return Object.entries(g);
  }, [excerpts]);

  const selCodeObj = selCode ? codeById[selCode] : null;
  const crossOpts = codes.filter(c=>c.id!==selCode);

  if(!selCode) return html`<div class="empty">
    <div class="t">Selecione um código</div>
    <div>Clique em um código à esquerda para ver os trechos codificados de todo o projeto.</div>
  </div>`;

  const col = codeColor(selCodeObj?.hue||0, selCodeObj?.depth||0, selCodeObj?.hue_deg);

  return html`<div class="section" style="max-width:820px;margin:0 auto">

    <!-- cabeçalho: caminho do código + contagem -->
    <p class="h" style="font-size:15px;margin-bottom:4px">
      <span class="swatch" style=${`background:${col.solid}`}></span>
      ${codePath(selCode).join(' ▸ ')}
      <span class="pill">${excerpts.length} trecho${excerpts.length!==1?'s':''}</span>
    </p>

    <!-- co-ocorrência -->
    <div class="row" style="gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
      <span class="meta">Co-ocorrência com:</span>
      ${[0,1].map(i=>html`<select key=${i} class="opt" style="max-width:210px;font-size:12.5px"
        value=${(crossCodes||[])[i]||''} onChange=${e=>{ const v=e.target.value; setCrossCodes(s=>{ const n=s.slice(); n[i]=v; return n; }); }}>
        <option value="">${i===0?'(nenhum)':'e também…'}</option>
        ${crossOpts.map(c=>html`<option value=${c.id}>${codePath(c.id).join(' ▸ ')}</option>`)}
      </select>`)}
      ${(crossCodes||[]).some(Boolean) && html`<button class="btn sm ghost" onClick=${()=>setCrossCodes(['',''])}>limpar</button>`}
    </div>

    ${excerpts.length===0 && html`<div class="card"><span class="meta">Nenhum trecho corresponde aos filtros.</span></div>`}

    <!-- grupos por documento -->
    ${byDoc.map(([docId, cods])=>html`<div key=${docId} style="margin-bottom:22px">
      <div class="row" style="margin-bottom:8px;gap:7px;align-items:baseline">
        <button class="btn sm" title="Abrir no leitor" onClick=${()=>onJump&&onJump(docId)}>${docById[docId]?.name||docId}</button>
        <span class="count">${cods.length}</span>
      </div>
      ${cods.map(c=>{
        // quando a seleção agrega subcódigos (família), cada trecho mostra a cor/caminho do seu código específico (folha)
        const codeObj = codeById[c.code_id];
        const codeCol = c.code_id===selCode ? col : codeColor(codeObj?.hue??selCodeObj?.hue??0, codeObj?.depth??selCodeObj?.depth??0, codeObj?.hue_deg??selCodeObj?.hue_deg);
        const showSubPath = c.code_id!==selCode;
        return html`<div key=${c.id} class="card"
          style=${`margin-bottom:8px;padding:0;overflow:hidden;display:flex;border-left:3px solid ${codeCol.solid}`}>
        <div style="flex:1;padding:12px 14px;min-width:0">
          ${showSubPath && html`<div class="row" style="gap:6px;margin-bottom:6px">
            <span class="swatch" style=${`background:${codeCol.solid}`}></span>
            <span class="meta" style="font-weight:600">${codePath(c.code_id).join(' ▸ ')}</span>
          </div>`}
          <div class="reader" style="padding:0;font-size:16px;white-space:normal;margin-bottom:8px">${c.quote}</div>
          <div class="row" style="gap:8px">
            ${c.author_name && html`<span class="author">${c.author_name}</span>`}
            <div class="grow"></div>
            <button class="icon-btn" onClick=${()=>onDelCoding(c.id)} title="remover">🗑</button>
          </div>
        </div>
      </div>`; })}
    </div>`)}
  </div>`;
}

/* ============ GRAFICOS (barras em HTML/CSS + heatmap em tabela) ============ */
function barRows(items, color){
  const max = Math.max(1, ...items.map(i=>i.value));
  return items.map((it,idx)=>html`<div class="row" key=${it.key||it.label||idx} style="gap:8px;margin-bottom:5px;align-items:center">
    <div style="width:190px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title=${it.label}>${it.label}</div>
    <div style="flex:1;background:var(--line-soft);border-radius:5px;height:16px">
      <div style=${`width:${Math.round(it.value/max*100)}%;min-width:2px;height:100%;border-radius:5px;background:${it.color||color||'var(--teal)'}`}></div>
    </div>
    <div class="count" style="width:38px;text-align:right">${it.value}</div>
  </div>`);
}
/* ============ MemoNav — painel esquerdo da aba Memos ============

          style="padding:5px 14px 5px 28px;cursor:pointer" onClick=${()=>onSel({scope:'document', targetId:d.id})}>
        <span class="node-name" style="font-size:12.5px" title=${d.name}>${d.name}</span>

        <span class="caret">${codesOpen?'▾':'▸'}</span>
        <span class="node-name" style="font-weight:600">Códigos</span>

function MemoCodeNode({ code, childrenOf, sel, onSel, hasMemo, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg);
  const isSel = sel.scope==='code' && sel.targetId===code.id;

    <div class="node-row ${isSel?'sel':''}" style=${`padding-left:${6+depthPad*16}px;cursor:pointer`}

      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.name}</span>
      ${hasMemo('code', code.id) && html`<span class="count">●</span>`}
    </div>
    ${open && kids.map(k=>html`<${MemoCodeNode} key=${k.id} code=${k} childrenOf=${childrenOf}

/* ============ MemoEditor — painel direito da aba Memos ============
   Editor de texto livre com autosave (debounce), mostrando autor/data da última edição. */
function MemoEditor({ sel, project, codeById, codePath, memos, onSave }){
  const targetId = sel.scope==='project' ? project?.id : sel.targetId;
  const current = memos.find(m=>m.scope===sel.scope && m.target_id===targetId);
  const [text, setText] = useState(current?.content||'');
  const [saving, setSaving] = useState(false);
  const debRef = useRef(null);

  useEffect(()=>{ setText(current?.content||''); }, [sel.scope, targetId]); // eslint-disable-line

  if(!targetId) return html`<div class="empty">
    <div class="t">Selecione um alvo</div>
    <div>Escolha o projeto, um documento ou um código à esquerda para escrever um memo.</div>
  </div>`;

  const label = sel.scope==='project' ? 'Memo do projeto'
    : sel.scope==='document' ? 'Memo do documento'
    : 'Memo do código';
  const subtitle = sel.scope==='code' ? codePath(targetId).join(' ▸ ') : null;

  const change = (val)=>{
    setText(val);
    clearTimeout(debRef.current);
    debRef.current = setTimeout(async ()=>{ setSaving(true); await onSave(sel.scope, targetId, val); setSaving(false); }, 700);
  };

  return html`<div class="section" style="max-width:760px;margin:0 auto">
    <p class="h" style="margin-bottom:2px">${label}</p>
    ${subtitle && html`<p class="hint" style="margin:0 0 4px">${subtitle}</p>`}
    <p class="hint" style="margin:0 0 10px">
      Nota única, compartilhada entre todos os pesquisadores do projeto — qualquer membro pode editar.
      ${current && html` Última edição: <b>${current.author_name||'anônimo'}</b>${current.updated_at?` em ${new Date(current.updated_at).toLocaleString('pt-BR')}`:''}.`}
    </p>
    <textarea class="txtin" rows="18" style="font-family:var(--serif);font-size:16px;line-height:1.7;resize:vertical"
      placeholder="Escreva aqui suas anotações analíticas, definições, decisões metodológicas…"
      value=${text} onInput=${e=>change(e.target.value)}></textarea>
    <div class="row" style="margin-top:6px"><span class="meta">${saving?'salvando…':'salvo automaticamente'}</span></div>
  </div>`;
}

function ChartsPanel({ docs, cats, codes, codeById, codePath, allCodings, allValues, projectMode }){
  const isIndividual = projectMode==='individual';
  const [layer,setLayer] = useState('individual');         // individual | final
  const closedCats = (cats||[]).filter(c=>CAT_HAS_OPTIONS(c.kind) || c.kind==='date');
  const [catId,setCatId] = useState(closedCats[0]?.id || '');
  useEffect(()=>{ if(!closedCats.find(c=>c.id===catId)) setCatId(closedCats[0]?.id || ''); }, [cats]); // eslint-disable-line
  const cat = (cats||[]).find(c=>c.id===catId) || null;

  // projeto individual: sem reconciliação, todas as codificações já nascem na camada
  // 'final' — não há camada a escolher (mesmo raciocínio do VizNav/VizExcerpts).
  const cod = useMemo(()=> isIndividual ? allCodings
    : allCodings.filter(c=> layer==='final' ? c.layer==='final' : c.layer!=='final'), [allCodings, layer, isIndividual]);

  // 1) frequência de códigos
  const freqItems = useMemo(()=>{
    const f={}; cod.forEach(c=>{ f[c.code_id]=(f[c.code_id]||0)+1; });
    return codes.filter(c=>f[c.id]).map(c=>({ key:c.id, label:codePath(c.id).join(' ▸ '), value:f[c.id], color:codeColor(c.hue,c.depth,c.hue_deg).solid }))
      .sort((a,b)=>b.value-a.value);
  }, [cod, codes, codePath]);

  // valor consolidado (gabarito) de um documento para uma categoria
  const finalVal = (docId)=>{ const f=allValues.find(v=>v.document_id===docId && v.category_id===catId && v.layer==='final'); return f?f.value:null; };
  // rótulo neutro: vale para os dois modos (em individual não existe "consolidação" a esperar)
  const splitVals = (val)=> val==null ? ['(sem valor)'] : String(val).split(CAT_MULTI_SEP).filter(Boolean);

  // 2) distribuição de documentos por valor da categoria
  const distItems = useMemo(()=>{
    if(!cat) return [];
    const counts={};
    docs.forEach(d=>{ splitVals(finalVal(d.id)).forEach(v=>{ counts[v]=(counts[v]||0)+1; }); });
    return Object.entries(counts).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  }, [cat, docs, allValues, catId]);

  // 3) código × categoria (heatmap): linhas = códigos com trechos, colunas = valores
  const cross = useMemo(()=>{
    if(!cat) return { cols:[], rows:[] };
    const docVals = {}; docs.forEach(d=>{ docVals[d.id]=splitVals(finalVal(d.id)); });
    const colSet = new Set(); Object.values(docVals).forEach(vs=>vs.forEach(v=>colSet.add(v)));
    const cols = [...colSet];
    const cellCounts = {}; // codeId -> {val -> n}
    cod.forEach(c=>{ (docVals[c.document_id]||[]).forEach(v=>{ (cellCounts[c.code_id]=cellCounts[c.code_id]||{}); cellCounts[c.code_id][v]=(cellCounts[c.code_id][v]||0)+1; }); });
    const rows = codes.filter(c=>cellCounts[c.id]).map(c=>({ id:c.id, label:codePath(c.id).join(' ▸ '), cells:cellCounts[c.id] }));
    let max=1; rows.forEach(r=>cols.forEach(v=>{ max=Math.max(max, r.cells[v]||0); }));
    return { cols, rows, max };
  }, [cat, docs, cod, codes, catId, allValues]);

  // 4) por codificador + concordância por código
  // "indiv" = codificações individuais (layer !== 'final')
  // cada codificação é identificada pelo par (created_by, author_name): se created_by é null
  // (importado via QDPX), usa author_name como chave; se não, usa o uuid para agrupar corretamente
  // mesmo quando o author_name muda (ex.: renomeação posterior do pesquisador)
  const indiv = useMemo(()=> allCodings.filter(c=>c.layer!=='final'), [allCodings]);
  const coderKey = (c)=> c.created_by || ('__nm__'+(c.author_name||'anônimo'));
  const coderLabel = (c)=> c.author_name||'anônimo';
  const prodItems = useMemo(()=>{
    const p={}; const lbl={};
    indiv.forEach(c=>{ const k=coderKey(c); p[k]=(p[k]||0)+1; lbl[k]=coderLabel(c); });
    return Object.entries(p).map(([k,value])=>({label:lbl[k]||k,value})).sort((a,b)=>b.value-a.value);
  }, [indiv]);
  const agreeItems = useMemo(()=>{
    const m={}; indiv.forEach(c=>{ (m[c.code_id]=m[c.code_id]||new Set()).add(coderKey(c)); });
    return codes.filter(c=>m[c.id]).map(c=>({ key:c.id, label:codePath(c.id).join(' ▸ '), value:m[c.id].size, color:codeColor(c.hue,c.depth,c.hue_deg).solid }))
      .sort((a,b)=>b.value-a.value);
  }, [indiv, codes, codePath]);

  const empty = allCodings.length===0 && (allValues||[]).length===0;
  const heat = (n)=>{ if(!n) return 'transparent'; const a = 0.12 + 0.78*(n/cross.max); return `hsl(170 55% 38% / ${a.toFixed(2)})`; };

  return html`<div class="section">
    <div class="row" style="gap:14px;flex-wrap:wrap;margin-bottom:6px">
      ${!isIndividual && html`<label class="row" style="gap:6px;font-size:12.5px">Camada das codificações:
        <select class="opt" value=${layer} onChange=${e=>setLayer(e.target.value)}>
          <option value="individual">Individuais (todos)</option>
          <option value="final">Final / gabarito</option>
        </select></label>`}
      ${closedCats.length>0 && html`<label class="row" style="gap:6px;font-size:12.5px">Categoria:
        <select class="opt" value=${catId} onChange=${e=>setCatId(e.target.value)}>
          ${closedCats.map(c=>html`<option value=${c.id}>${c.name}</option>`)}
        </select></label>`}
    </div>
    ${empty && html`<div class="card"><span class="meta">Ainda não há dados para gráficos. Codifique trechos e preencha categorias.</span></div>`}

    <p class="h" style="margin-top:14px">Frequência de códigos</p>
    <div class="card">
      ${freqItems.length===0 ? html`<span class="meta">Nenhuma codificação nesta camada.</span>` : barRows(freqItems)}
    </div>

    <p class="h" style="margin-top:18px">Distribuição por categoria${cat?` — ${cat.name}`:''}</p>
    <div class="card">
      ${!cat ? html`<span class="meta">Defina uma categoria.</span>`
        : distItems.length===0 ? html`<span class="meta">Sem valores.</span>` : barRows(distItems, 'var(--teal)')}
    </div>

    <p class="h" style="margin-top:18px">Código × categoria${cat?` — ${cat.name}`:''} (nº de trechos)</p>
    <div class="card" style="overflow:auto">
      ${!cat || cross.rows.length===0 ? html`<span class="meta">Sem cruzamento disponível.</span>`
        : html`<table style="border-collapse:collapse;font-size:12px;min-width:100%">
            <thead><tr>
              <th style="text-align:left;padding:4px 8px;position:sticky;left:0;background:var(--surface)"></th>
              ${cross.cols.map(v=>html`<th key=${v} style="padding:4px 8px;text-align:center;font-weight:600">${v}</th>`)}
            </tr></thead>
            <tbody>
              ${cross.rows.map(r=>html`<tr key=${r.id}>
                <td style="padding:3px 8px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;position:sticky;left:0;background:var(--surface)" title=${r.label}>${r.label}</td>
                ${cross.cols.map(v=>{ const n=r.cells[v]||0; return html`<td key=${v} style=${`text-align:center;padding:3px 8px;background:${heat(n)}`}>${n||''}</td>`; })}
              </tr>`)}
            </tbody>
          </table>`}
    </div>

    ${!isIndividual && html`<p class="h" style="margin-top:18px">Produção por codificador</p>
    <div class="card">
      ${prodItems.length===0 ? html`<span class="meta">Nenhuma codificação individual.</span>` : barRows(prodItems, 'var(--amber)')}
    </div>`}

    ${!isIndividual && html`<p class="h" style="margin-top:18px">Concordância por código (nº de codificadores)</p>
    <div class="card">
      ${agreeItems.length===0 ? html`<span class="meta">Nenhuma codificação individual.</span>` : barRows(agreeItems)}
    </div>`}
  </div>`;
}

function TreeNode({ code, childrenOf, count, sel, selCode, setSelCode, onApply, onDel, store, reload, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg);
  const isSel = selCode===code.id;
  const appliable = !!sel;
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''} ${appliable?'appliable':''}" style=${`padding-left:${6+depthPad*16}px`}
      onClick=${()=> appliable ? onApply(code.id) : setSelCode(code.id) }>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.name}</span>
      ${count[code.id]?html`<span class="count">${count[code.id]}</span>`:''}
      <button class="icon-btn" onClick=${e=>{e.stopPropagation(); if(confirm('Excluir o código e seus subcódigos e codificações?')) onDel(code.id);}} title="excluir">✕</button>
    </div>
    ${open && kids.map(k=>html`<${TreeNode} key=${k.id} code=${k} childrenOf=${childrenOf} count=${count}
      sel=${sel} selCode=${selCode} setSelCode=${setSelCode} onApply=${onApply} onDel=${onDel}
      store=${store} reload=${reload} depthPad=${depthPad+1} />`)}
  </div>`;
}
function RenameCode({ code, onUpd, onSetColor, isAdmin }){
  const [v,setV]=useState(code.name);
  useEffect(()=>setV(code.name),[code.id]);
  const col = codeColor(code.hue, code.depth, code.hue_deg);
  // so o matiz (H) importa pra cor de codigo — saturacao/luminosidade sao sempre fixas por
  // codeColor() (luminosidade varia so pela profundidade do subcodigo). Um <input type="color">
  // deixaria escolher RGB completo, mas tudo que nao for matiz seria descartado — confunde,
  // parece que da pra escolher claro/escuro/saturacao quando na pratica nao da. Por isso um
  // slider de matiz (0-359), nao o retangulo de cor inteiro.
  const [hueLive,setHueLive]=useState(col.H);
  useEffect(()=>setHueLive(col.H),[code.id, col.H]);
  const isGray = code.hue_deg===-1;
  const previewHex = isGray ? '#808080' : hslToHex(hueLive, 58, 32);
  return html`<div>
    <div class="row" style="gap:6px;margin-top:6px">
      <input class="txtin" value=${v} onInput=${e=>setV(e.target.value)} />
      <button class="btn sm" onClick=${()=>onUpd(code.id,{name:v})}>renomear</button>
    </div>
    ${code.depth===0 && isAdmin && html`<div class="row" style="gap:8px;margin-top:6px;align-items:center">
      <span class="meta">Cor da família</span>
      <span style=${`background:${previewHex};flex-shrink:0;width:40px;height:40px;border-radius:8px;border:1px solid var(--line)`}></span>
      <input type="range" min="0" max="359" value=${hueLive} disabled=${isGray}
        oninput=${e=>setHueLive(parseInt(e.target.value,10))}
        onChange=${e=>onSetColor(code, hslToHex(parseInt(e.target.value,10), 58, 32))}
        style="flex:1;max-width:160px" title="Cor personalizada (matiz — propaga para os subcódigos)" />
      <button class="btn sm ${isGray?'':'ghost'}" onClick=${()=>onSetColor(code, isGray ? hslToHex(hueLive,58,32) : 'gray')}>cinza</button>
      ${code.hue_deg!=null && html`<button class="btn sm ghost" onClick=${()=>onSetColor(code, null)}>usar cor automática</button>`}
    </div>`}
    ${code.depth===0 && !isAdmin && code.hue_deg!=null && html`<p class="meta" style="margin-top:6px">Cor definida pelo administrador.</p>`}
  </div>`;
}

/* inputs com debounce / colar */
function DebInput({ value, onCommit, placeholder, disabled }){
  const [v,setV]=useState(value||''); const t=useRef(null);
  useEffect(()=>setV(value||''),[value]);
  return html`<input class="txtin" placeholder=${placeholder} value=${v} disabled=${!!disabled}
    onInput=${e=>{ setV(e.target.value); clearTimeout(t.current); const val=e.target.value; t.current=setTimeout(()=>onCommit(val),600); }}
    onBlur=${()=>{ clearTimeout(t.current); onCommit(v); }} />`;
}

/* data possivelmente parcial: DD/MM/AAAA com partes em branco quando o documento nao informa.
   guarda como string "dd/mm/aaaa" (campo vazio = parte desconhecida); tudo vazio = nao informada. */
function parseDate(val){
  if(!val) return { d:'', mo:'', y:'' };
  const iso = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(val);   // aceita formato ISO legado
  if(iso) return { d:iso[3], mo:iso[2], y:iso[1] };
  const m = /^(\d{0,2})\/(\d{0,2})\/(\d{0,4})$/.exec(val);
  return m ? { d:m[1], mo:m[2], y:m[3] } : { d:'', mo:'', y:'' };
}
function DateInput({ value, onCommit, disabled }){
  const [p,setP]=useState(parseDate(value)); const t=useRef(null);
  useEffect(()=>setP(parseDate(value)),[value]);
  const build = (q)=> (q.d||q.mo||q.y) ? `${q.d}/${q.mo}/${q.y}` : '';
  const set = (k,raw,max)=>{ const digits=String(raw).replace(/\D/g,'').slice(0,max); const q={...p,[k]:digits}; setP(q);
    clearTimeout(t.current); t.current=setTimeout(()=>onCommit(build(q)),600); };
  const flush = ()=>{ clearTimeout(t.current); onCommit(build(p)); };
  const informada = !!(p.d||p.mo||p.y);
  return html`<div>
    <div class="row" style="gap:8px;margin-bottom:8px">
      <button class="opt ${informada?'':'on'}" disabled=${!!disabled} title="Marca a data como não informada (limpa os campos)"
        onClick=${()=>{ const q={d:'',mo:'',y:''}; setP(q); clearTimeout(t.current); onCommit(''); }}>Não informada</button>
    </div>
    <div class="row" style="gap:6px;align-items:center">
      <input class="txtin" style="width:60px;text-align:center" inputmode="numeric" placeholder="DD" maxlength="2" disabled=${!!disabled}
        value=${p.d} onInput=${e=>set('d',e.target.value,2)} onBlur=${flush} />
      <span class="meta">/</span>
      <input class="txtin" style="width:60px;text-align:center" inputmode="numeric" placeholder="MM" maxlength="2" disabled=${!!disabled}
        value=${p.mo} onInput=${e=>set('mo',e.target.value,2)} onBlur=${flush} />
      <span class="meta">/</span>
      <input class="txtin" style="width:78px;text-align:center" inputmode="numeric" placeholder="AAAA" maxlength="4" disabled=${!!disabled}
        value=${p.y} onInput=${e=>set('y',e.target.value,4)} onBlur=${flush} />
    </div>
    <div class="meta" style="margin-top:6px">Deixe em branco as partes que o documento não informa.</div>
  </div>`;
}
function AddPaste({ onAdd }){
  const [open,setOpen]=useState(false); const [n,setN]=useState(''); const [t,setT]=useState('');
  if(!open) return html`<button class="btn sm ghost" onClick=${()=>setOpen(true)}>colar texto</button>`;
  return html`<div class="modal-bg"><div class="modal">
    <h2>Colar documento</h2>
    <div class="field"><input class="txtin" placeholder="nome" value=${n} onInput=${e=>setN(e.target.value)} /></div>
    <div class="field"><textarea class="txtin" rows="8" placeholder="cole o texto aqui" value=${t} onInput=${e=>setT(e.target.value)} style="font-family:var(--serif);line-height:1.6"></textarea></div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="btn ghost" onClick=${()=>{setOpen(false);setN('');setT('');}}>cancelar</button>
      <button class="btn primary" onClick=${()=>{ if(t.trim()){ onAdd(n,t); setOpen(false); setN(''); setT(''); } }}>Adicionar</button>
    </div>
  </div></div>`;
}

/* ============ HUB DO PROJETO (tipo, convite, membros, conexão, zona de perigo) ============ */
function ProjectModal({ mode, user, project, projectMode, isAdmin, members, hasDocs,
                        onClose, onSetMode, onSetRole, onRemoveMember, onRename, onClear, onDelete,
                        onSaveCloud, onClearCloud, canFolderBackup, backupStatus, onEnableFolderBackup, onDisableFolderBackup }){

      ${!backupStatus?.active

    <!-- CONEXÃO -->
