<script>
  // captura erros do modulo (import falho, sintaxe, runtime) e mostra na tela
  function showFatal(msg){
    var el=document.getElementById('app'); if(!el) return;
    var esc=String(msg==null?'erro desconhecido':msg).replace(/[<>&]/g,function(c){return ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c];});
    el.innerHTML='<div style="font-family:system-ui,sans-serif;padding:24px;max-width:720px;margin:24px auto;color:#1A1B1E">'
      +'<h2 style="font-family:Georgia,serif;margin:0 0 6px">QualiLab nao carregou</h2>'
      +'<p style="color:#5C5F66;margin:0 0 12px">Houve um erro ao iniciar. O detalhe abaixo ajuda a depurar. Causas comuns: alguma biblioteca de CDN bloqueada pela rede, ou um erro de digitacao ao colar as credenciais do Supabase.</p>'
      +'<pre style="white-space:pre-wrap;background:#F3ECD9;border:1px solid #d9c89a;border-radius:8px;padding:12px;font-size:12px;overflow:auto">'+esc+'</pre></div>';
  }
  window.addEventListener('error', function(e){ showFatal((e.error&&e.error.stack)||e.message||(e.filename?(e.filename+':'+e.lineno):'')||'erro'); });
  window.addEventListener('unhandledrejection', function(e){ var r=e.reason; showFatal((r&&(r.stack||r.message))||String(r)); });
</script>

/* ============ CORES (matiz = familia, luminosidade = profundidade) ============
   hueDeg (opcional, 0-359): cor personalizada definida na familia (nivel 0) e
   copiada para os descendentes na criacao/cascata. Quando ausente, usa a
   paleta automatica (HUES[hue]). */
const HUES = [210, 28, 150, 350, 268, 184, 322, 70];
function codeColor(hue, depth, hueDeg){
  // hueDeg===-1: marcador de cinza personalizado (sem matiz, saturacao 0) — reaproveita a
  // mesma coluna int em vez de criar campo novo no banco. Calculado por profundidade igual
  // as cores normais, so sem matiz.
  const isGray = hueDeg===-1;
  const H = isGray ? 0 : (hueDeg!=null) ? ((hueDeg%360)+360)%360 : HUES[((hue % HUES.length)+HUES.length)%HUES.length];
  const S = isGray ? 0 : 58, tintS = isGray ? 0 : 55;
  const solidL = Math.min(70, 32 + depth*13);
  const bgL = Math.min(94, 86 + depth*3);
  return { solid:`hsl(${H} ${S}% ${solidL}%)`, tint:`hsl(${H} ${tintS}% ${bgL}%)`, H, isGray };
}
/* extrai o matiz (0-359) de um hex, sem encaixar na paleta fixa (usado p/ cor personalizada) */
function hexToHue(hex){
  const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex||'');
  if(!m) return 0;
  const r=parseInt(m[1],16)/255, g=parseInt(m[2],16)/255, b=parseInt(m[3],16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  let h=0;
  if(d!==0){ if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0) h+=360; }
  return Math.round(h);
}

/* ============ TIPOS DE CATEGORIA ============
   'single' (token legado) = Multipla Escolha. Os demais tokens sao novos.
   Os tipos com lista de valores: select, single, checkbox. Caixa de Selecao
   guarda varios valores num unico campo, separados por CAT_MULTI_SEP. */
const CAT_KINDS = [
  { id:'select',   label:'Texto Fechado' },
  { id:'text',     label:'Texto Aberto' },
  { id:'date',     label:'Data' },
  { id:'single',   label:'Múltipla Escolha' },

const CAT_HAS_OPTIONS = (k)=> k==='select' || k==='single' || k==='checkbox';

// valores especiais guardados dentro de options (sem precisar de colunas novas):
// NAO_INFO = "o documento nao informa"; OUTROS = habilita um valor livre "Outros".
const NAO_INFO = 'Não informado';
const OUTROS = 'Outros';
const isSpecialOpt = (o)=> o===NAO_INFO || o===OUTROS;

/* ============ EXTRACAO DE TEXTO ============ */
async function extractText(file){
  const n = (file.name||'').toLowerCase();
  if(n.endsWith('.txt')||n.endsWith('.md')||n.endsWith('.markdown')|| (file.type||'').startsWith('text/'))
    return await file.text();
  if(n.endsWith('.docx')){
    const ab = await file.arrayBuffer();
    const r = await (await getMammoth()).extractRawText({ arrayBuffer: ab });
    return (r && r.value) || '';
  }
  if(n.endsWith('.pdf')){
    const ab = await file.arrayBuffer();
    const pdfjsLib = await getPdfjs();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    const pages = [];
    for(let p=1;p<=pdf.numPages;p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      let out = '', lastY = null;
      tc.items.forEach(it=>{
        if('str' in it){
          const y = it.transform ? it.transform[5] : null;
          if(lastY!==null && y!==null && Math.abs(y-lastY)>2 && !out.endsWith('\n')) out += '\n';
          out += it.str + (it.hasEOL ? '\n' : ' ');
          lastY = y;
        }
      });
      pages.push(out.trim());
    }
    return pages.join('\n\n');
  }
  return await file.text();
}

/* ============ RUNS (segmentacao do texto para os grifos) ============ */
function buildRuns(text, codings){
  const b = new Set([0, text.length]);
  codings.forEach(c=>{ if(c.span_start>=0 && c.span_end>c.span_start){ b.add(c.span_start); b.add(c.span_end);} });
  const pts = [...b].filter(p=>p>=0&&p<=text.length).sort((x,y)=>x-y);
  const runs=[];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], z=pts[i+1]; if(z<=a) continue;
    runs.push({ start:a, end:z, text:text.slice(a,z), codings:codings.filter(c=>c.span_start>=0&&c.span_start<=a&&c.span_end>=z) });
  }
  return runs;
}

function hslToHex(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  const toHex=v=>Math.round(v*255).toString(16).padStart(2,'0');
  return '#'+toHex(f(0))+toHex(f(8))+toHex(f(4));
}
function hueOf(hex){
  const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex||'');
  if(!m) return 0;
  const r=parseInt(m[1],16)/255, g=parseInt(m[2],16)/255, b=parseInt(m[3],16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  let h=0;
  if(d!==0){ if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0) h+=360; }
  let best=0, bd=999;
  HUES.forEach((H,i)=>{ const dd=Math.min(Math.abs(H-h),360-Math.abs(H-h)); if(dd<bd){bd=dd;best=i;} });
  return best;
}
function xmlEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripGuid(g){ return String(g||'').replace(/[{}]/g,'').trim(); }

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));

function csvEscape(s){ s = s==null ? "" : String(s); return /[",\n\r]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function toCSV(rows){ return rows.map(r=>r.map(csvEscape).join(",")).join("\r\n"); }
function codePathFor(codes,id){ const by={}; codes.forEach(c=>by[c.id]=c); const o=[]; let c=by[id],g=0; while(c&&g++<12){o.unshift(c.name);c=c.parent_id?by[c.parent_id]:null;} return o; }
function download(name,text,mime){ const b=new Blob([text],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }

/* ============ QDPX (REFI-QDA Project Exchange) ============
   Compatível com ATLAS.ti, MAXQDA, NVivo, Quirkos, Taguette.
   Mapeamento: documento -> TextSource; categoria do documento -> Variable + Case;
   codigo -> Code (hierarquico); trecho codificado -> PlainTextSelection + Coding. */
function buildCodeXml(code, byParent){
  const kids = byParent[code.id] || [];
  const H = (code.hue_deg!=null) ? ((code.hue_deg%360)+360)%360 : HUES[((code.hue%HUES.length)+HUES.length)%HUES.length];
  const hex = hslToHex(H, 58, Math.min(70,32+code.depth*13));
  return `<Code guid="${stripGuid(code.id)}" name="${xmlEsc(code.name)}" isCodable="true" color="${hex}">`
    + kids.map(k=>buildCodeXml(k, byParent)).join('')
    + `</Code>`;
}

/* exporta so o livro de codigos (sem documentos/codificacoes — .qdc nao tem isso),
   reusando o mesmo <Code> recursivo do QDPX. Util pra compartilhar/padronizar o esquema
   de codigos com outra ferramenta REFI-QDA sem expor os dados do projeto. */
function exportQDC(codes, project){
  const byParent = {};
  codes.forEach(c=>{ const p=c.parent_id||'__root__'; (byParent[p]=byParent[p]||[]).push(c); });
  const topCodes = byParent['__root__']||[];
  const codesXml = topCodes.map(c=>buildCodeXml(c, byParent)).join('');
  const qdc = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n`
    + `<CodeBook xmlns="urn:QDA-XML:codebook:1.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" `
    + `xsi:schemaLocation="urn:QDA-XML:codebook:1.0 http://schema.qdasoftware.org/versions/Codebook/v1.0/Codebook.xsd" `
    + `origin="QualiLab" name="${xmlEsc(project?.name||'Projeto QualiLab')}">`
    + `<Codes>${codesXml}</Codes>`
    + `</CodeBook>`;
  download((project?.name||'codebook').replace(/[^\w\-]+/g,'_')+'.qdc', qdc, 'application/xml');
}

async function exportQDPX(docs, cats, allV, codes, allC, project){
  const JSZip = await getJSZip();
  const zip = new JSZip();
  const srcFolder = zip.folder('sources');

  // usuarios (autores distintos -> guid)
  const authorGuid = {};
  const ensureAuthor = (name)=>{ const n=name||'anonimo'; if(!authorGuid[n]) authorGuid[n]=uid(); return authorGuid[n]; };
  allV.forEach(v=>ensureAuthor(v.author));
  allC.forEach(c=>ensureAuthor(c.author_name));

  // arvore de codigos
  const byParent = {};
  codes.forEach(c=>{ const p=c.parent_id||'__root__'; (byParent[p]=byParent[p]||[]).push(c); });
  const topCodes = byParent['__root__']||[];
  const codesXml = topCodes.map(c=>buildCodeXml(c, byParent)).join('');

  // variaveis (categorias do documento). o tipo e a lista de valores entram na
  // Description em texto legivel; o proprio QualiLab reconstroi tudo na importacao.
  const variablesXml = cats.map(c=>{
    const bits = [`tipo: ${c.kind||'text'}`];
    if((c.options||[]).length) bits.push(`valores: ${c.options.join(', ')}`);
    // sempre Text: nossas datas podem ser parciais (DD/MM/AAAA), invalidas como Date ISO
    return `<Variable guid="${stripGuid(c.id)}" name="${xmlEsc(c.name)}" typeOfVariable="Text"><Description>${xmlEsc(bits.join(' | '))}</Description></Variable>`;
  }).join('');

  // sources (um TextSource por documento, conteudo gravado em sources/<guid>.txt)
  let sourcesXml = '';
  for(const d of docs){
    srcFolder.file(`${stripGuid(d.id)}.txt`, d.content);
    const docCodings = allC.filter(c=>c.document_id===d.id);
    const selXml = docCodings.map(c=>{
      const codingGuid = uid();
      const au = ensureAuthor(c.author_name);
      const name = (c.quote||'').slice(0,80);
      return `<PlainTextSelection guid="${stripGuid(c.id)}" name="${xmlEsc(name)}" startPosition="${c.span_start}" endPosition="${c.span_end}" creatingUser="${au}">`
        + `<Coding guid="${codingGuid}" creatingUser="${au}"><CodeRef targetGUID="${stripGuid(c.code_id)}"/></Coding>`
        + `</PlainTextSelection>`;
    }).join('');
    sourcesXml += `<TextSource guid="${stripGuid(d.id)}" name="${xmlEsc(d.name)}" plainTextPath="internal://${stripGuid(d.id)}.txt">${selXml}</TextSource>`;
  }

  // cases (um por documento, com os valores de categoria daquele documento)
  const casesXml = docs.map(d=>{
    const vv = allV.filter(v=>v.document_id===d.id).map(v=>
      `<VariableValue><VariableRef targetGUID="${stripGuid(v.category_id)}"/><TextValue>${xmlEsc(v.value)}</TextValue></VariableValue>`).join('');
    return `<Case guid="${uid()}" name="${xmlEsc(d.name)}"><SourceRef targetGUID="${stripGuid(d.id)}"/>${vv}</Case>`;
  }).join('');

  const usersXml = Object.entries(authorGuid).map(([name,g])=>`<User guid="${g}" name="${xmlEsc(name)}"/>`).join('');

  const qde = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n`
    + `<Project xmlns="urn:QDA-XML:project:1.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" `
    + `xsi:schemaLocation="urn:QDA-XML:project:1.0 http://schema.qdasoftware.org/versions/Project/v1.0/Project.xsd" `
    + `name="${xmlEsc(project.name||'Projeto QualiLab')}" origin="QualiLab" creationDateTime="${new Date().toISOString()}">`
    + `<Users>${usersXml}</Users>`
    + `<CodeBook><Codes>${codesXml}</Codes></CodeBook>`
    + `<Variables>${variablesXml}</Variables>`
    + `<Cases>${casesXml}</Cases>`
    + `<Sources>${sourcesXml}</Sources>`
    + `</Project>`;

  zip.file('project.qde', qde);
  const blob = await zip.generateAsync({ type:'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (project.name||'qualilab_projeto').replace(/[^\w\-]+/g,'_') + '.qdpx';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}

/* leitura de .qdpx para dentro do projeto ativo */
/* devolve o controle ao navegador a cada N itens (em vez de so a cada microtask) —
   sem isso, uma importacao de milhares de itens com store em lote (beginBatch) nunca
   cede a vez para repintura, e a aba parece travada até o fim (so reage com F5). */
function makeProgressTicker(onProgress, total){
  const every = Math.max(10, Math.floor(total/60)); // ~60 atualizacoes da barra, nao uma por item
  let done = 0;
  return async ()=>{
    done++;
    if(done % every === 0 || done === total){
      onProgress?.(done, total);
      await new Promise(r=>setTimeout(r, 0));
    }
  };
}

async function importQDPX(file, store, projectId, projectMode, onProgress){
  const codLayer = projectMode==='individual' ? 'final' : 'individual';
  const JSZip = await getJSZip();
  const zip = await JSZip.loadAsync(await file.arrayBuffer());
  const qdeEntry = Object.keys(zip.files).find(k=>/\.qde$/i.test(k));
  if(!qdeEntry) throw new Error('Arquivo .qdpx sem project.qde');
  const xmlText = await zip.files[qdeEntry].async('string');
  const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
  if(xml.querySelector('parsererror')) throw new Error('XML do project.qde inválido');

  const skipped = { picture:0, audio:0, video:0, pdfSemTexto:0, fonteExterna:0 };

  // usuarios: guid -> nome
  const userName = {};
  xml.querySelectorAll('Users > User').forEach(u=>{ userName[stripGuid(u.getAttribute('guid'))] = u.getAttribute('name')||'importado'; });
  const authorOf = (g)=> g ? (userName[stripGuid(g)]||'importado') : 'importado';

  // codigos hierarquicos (recursivo); hue por familia de topo, na ordem em que aparecem
  const newCodes = [];
  let topHue = 0;
  function walkCode(el, parentId, depth, hue){
    const id = stripGuid(el.getAttribute('guid'));
    const name = el.getAttribute('name') || 'codigo';
    newCodes.push({ id, parent_id: parentId, name, hue, depth });
    Array.from(el.children).filter(c=>c.tagName==='Code').forEach(c=>walkCode(c, id, depth+1, hue));
  }
  const codeBook = xml.querySelector('CodeBook > Codes');
  if(codeBook){
    Array.from(codeBook.children).filter(c=>c.tagName==='Code').forEach(c=>{ walkCode(c, null, 0, topHue % HUES.length); topHue++; });
  }

  // variaveis -> categorias (reconstroi o tipo a partir de "tipo: ..." e "valores: ..."
  // na Description; aceita o formato legado "Valores fechados: ..."). Esses marcadores
  // sao uma convencao propria do QualiLab (gravada por exportQDPX) — um .qdpx "estrangeiro"
  // (ex.: QualCoder, ATLAS.ti) nao os tem. Para esses, o tipo fica indefinido aqui e e
  // decidido mais abaixo por heuristica, depois que os valores de cada caso sao lidos.
  const newCats = [];
  const foreignCatIds = new Set(); // sem a convencao propria -> tipo decidido por heuristica
  const KNOWN_KINDS = new Set(CAT_KINDS.map(k=>k.id));
  xml.querySelectorAll('Variables > Variable').forEach(v=>{
    const id = stripGuid(v.getAttribute('guid'));
    const name = v.getAttribute('name') || 'categoria';
    const descEl = v.querySelector('Description');
    const desc = descEl ? descEl.textContent : '';
    const mVals = /(?:valores|Valores fechados):\s*(.+)/i.exec(desc||'');
    const options = mVals ? mVals[1].split(',').map(s=>s.trim()).filter(Boolean) : [];
    const mTipo = /tipo:\s*([a-z]+)/i.exec(desc||'');
    let kind;
    if(mTipo && KNOWN_KINDS.has(mTipo[1].toLowerCase())) kind = mTipo[1].toLowerCase();
    else if(mVals) kind = 'single';
    else if((v.getAttribute('typeOfVariable')||'').toLowerCase()==='date') kind = 'date';
    else { kind = 'text'; foreignCatIds.add(id); }
    newCats.push({ id, name, kind, options });
  });

  // fontes de texto (TextSource e, quando existir, a Representation textual de um PDFSource)
  const newDocs = [];
  const newCodings = [];
  async function readPlainText(srcEl){
    const inline = srcEl.querySelector(':scope > PlainTextContent');
    if(inline) return inline.textContent || '';
    const path = srcEl.getAttribute('plainTextPath') || '';
    if(path.startsWith('internal://')){
      const fname = path.replace('internal://','');
      const entry = Object.keys(zip.files).find(k=>k.toLowerCase().endsWith('/'+fname.toLowerCase()) || k.toLowerCase()===('sources/'+fname.toLowerCase()) || k.toLowerCase().endsWith(fname.toLowerCase()));
      if(entry) return await zip.files[entry].async('string');
    }
    if(path.startsWith('relative://') || path.startsWith('absolute://')){ skipped.fonteExterna++; }
    return null;
  }
  function importSelections(srcEl, docId, content){
    srcEl.querySelectorAll(':scope > PlainTextSelection').forEach(sel=>{
      const start = parseInt(sel.getAttribute('startPosition'),10);
      const end = parseInt(sel.getAttribute('endPosition'),10);
      const author = authorOf(sel.getAttribute('creatingUser'));
      const codingEls = sel.querySelectorAll(':scope > Coding');
      codingEls.forEach((cod,i)=>{
        const ref = cod.querySelector('CodeRef');
        if(!ref) return;
        const codeId = stripGuid(ref.getAttribute('targetGUID'));
        newCodings.push({
          id: i===0 ? stripGuid(sel.getAttribute('guid')) : uid(),
          document_id: docId, code_id: codeId, span_start:start, span_end:end,
          quote: (content||'').slice(start,end), author_name: author
        });
      });
    });
  }

  const sourcesEl = xml.querySelector('Sources');
  if(sourcesEl){
    for(const src of Array.from(sourcesEl.children)){
      if(src.tagName==='TextSource'){
        const id = stripGuid(src.getAttribute('guid'));
        const name = src.getAttribute('name') || 'documento importado';
        const content = await readPlainText(src);
        if(content==null) continue;
        newDocs.push({ id, name, content });
        importSelections(src, id, content);
      } else if(src.tagName==='PDFSource'){
        const rep = src.querySelector(':scope > Representation');
        if(rep){
          const id = stripGuid(src.getAttribute('guid'));
          const name = (src.getAttribute('name')||'pdf importado') + ' (texto extraído)';
          const content = await readPlainText(rep);
          if(content!=null){ newDocs.push({ id, name, content }); importSelections(rep, id, content); }
          else skipped.pdfSemTexto++;
        } else skipped.pdfSemTexto++;
      } else if(src.tagName==='PictureSource'){ skipped.picture++; }
      else if(src.tagName==='AudioSource'){ skipped.audio++; }
      else if(src.tagName==='VideoSource'){ skipped.video++; }
    }
  }

  // casos -> valores de categoria por documento
  const newValues = [];
  xml.querySelectorAll('Cases > Case').forEach(caseEl=>{
    const srcRefs = Array.from(caseEl.querySelectorAll(':scope > SourceRef')).map(r=>stripGuid(r.getAttribute('targetGUID')));
    const vvs = Array.from(caseEl.querySelectorAll(':scope > VariableValue'));
    vvs.forEach(vv=>{
      const ref = vv.querySelector('VariableRef'); if(!ref) return;
      const catId = stripGuid(ref.getAttribute('targetGUID'));
      const valEl = vv.querySelector('TextValue,BooleanValue,IntegerValue,FloatValue,DateValue,DateTimeValue');
      const value = valEl ? valEl.textContent : '';
      srcRefs.forEach(docId=>newValues.push({ document_id:docId, category_id:catId, value }));
    });
  });

  // heuristica de interoperabilidade (.qdpx estrangeiro, sem a convencao tipo:/valores:
  // do QualiLab): poucas respostas distintas E REPETIDAS entre documentos sugerem lista
  // fechada (ex.: "Caso", "Turma", "Tribunal"); respostas todas diferentes sugerem texto
  // livre (ex.: resumo, observacoes), mesmo que o numero absoluto de respostas seja baixo
  // (poucos documentos importados). Por isso exige distinct < total — sem repeticao
  // nenhuma, nao ha evidencia real de que o campo seja uma lista fechada.
  let catsFechadasDetectadas = 0;
  if(foreignCatIds.size){
    const totalByCat = {}, distinctByCat = {};
    newValues.forEach(v=>{
      if(!foreignCatIds.has(v.category_id)) return;
      const val = (v.value||'').trim();
      if(!val) return;
      totalByCat[v.category_id] = (totalByCat[v.category_id]||0) + 1;
      (distinctByCat[v.category_id] = distinctByCat[v.category_id] || new Set()).add(val);
    });
    newCats.forEach(c=>{
      if(!foreignCatIds.has(c.id)) return;
      const distinct = distinctByCat[c.id];
      const total = totalByCat[c.id] || 0;
      if(distinct && distinct.size>=2 && distinct.size<=8 && distinct.size<total){
        c.kind = 'select';
        c.options = [...distinct].sort((a,b)=>a.localeCompare(b,'pt-BR'));
        catsFechadasDetectadas++;
      }
    });
  }

  // gera ids novos para evitar colisao com dados ja existentes (ex.: reimportar o mesmo .qdpx),
  // remapeando todas as referencias internas (parent_id, document_id, category_id, code_id)
  const docMap = {}, catMap = {}, codeMap = {};
  newDocs.forEach(d=> docMap[d.id]=uid());
  newCats.forEach(c=> catMap[c.id]=uid());
  newCodes.forEach(c=> codeMap[c.id]=uid());

  // persiste no projeto ativo, respeitando ordem por causa de FKs.
  // beginBatch/endBatch (LocalStore/FileStore): suprime o save() por item — senao
  // cada um dos centenas de inserts re-serializa o banco inteiro no disco/localStorage,
  // travando a aba por varios segundos. Salva uma unica vez no fim.
  const total = newDocs.length + newCats.length + newCodes.length + newValues.length + newCodings.length;
  const tick = makeProgressTicker(onProgress, total);
  if(store.beginBatch) store.beginBatch();
  try{
    for(const d of newDocs){ await store.addDocument(projectId, { id:docMap[d.id], name:d.name, content:d.content }); await tick(); }
    for(let i=0;i<newCats.length;i++){ const c=newCats[i]; await store.addCategory(projectId, { id:catMap[c.id], name:c.name, kind:c.kind, options:c.options, position:i }); await tick(); }
    for(let i=0;i<newCodes.length;i++){ const c=newCodes[i]; await store.addCode(projectId, { id:codeMap[c.id], parent_id:c.parent_id?codeMap[c.parent_id]:null, name:c.name, hue:c.hue, depth:c.depth, position:i }); await tick(); }
    // em projeto individual os valores vao direto para o gabarito (final); em coletivo, como resposta individual
    const setVal = projectMode==='individual' ? store.setFinalValue.bind(store) : store.setDocValue.bind(store);
    for(const v of newValues){ if(docMap[v.document_id] && catMap[v.category_id]) await setVal(projectId, docMap[v.document_id], catMap[v.category_id], v.value); await tick(); }
    // created_by: null => o agrupamento por codificador usa author_name (do QDPX), não o uuid de quem importou
    // layer: em projeto individual tudo vai para a camada final (sem reconciliacao); em coletivo, fica individual
    for(const c of newCodings){ if(docMap[c.document_id] && codeMap[c.code_id]) await store.addCoding(projectId, { created_by:null, layer:codLayer, document_id:docMap[c.document_id], code_id:codeMap[c.code_id], span_start:c.span_start, span_end:c.span_end, quote:c.quote, author_name:c.author_name }); await tick(); }
  } finally {
    if(store.endBatch) await store.endBatch();
  }

  return {
    documentos:newDocs.length, categorias:newCats.length, codigos:newCodes.length,
    trechos:newCodings.length, casos: xml.querySelectorAll('Cases > Case').length,
    descartados: skipped, categoriasFechadasDetectadas: catsFechadasDetectadas
  };
}

/* ============ IMPORT .qualilab (mesmo formato gerado por saveQualilab) ============
   Mescla um arquivo .qualilab no projeto ATIVO (local/arquivo/nuvem) — diferente de
   "abrir arquivo .qualilab" (que troca o store inteiro pelo FileStore). Útil para
   trazer um projeto exportado por outra pessoa, ou um backup, para dentro de um
   projeto coletivo na nuvem. Ids são remapeados (evita colisão ao reimportar o mesmo
   arquivo duas vezes), igual ao importQDPX. */
async function importQualilab(file, store, projectId, projectMode, onProgress){
  const codLayer = projectMode==='individual' ? 'final' : 'individual';
  let db;
  try{ db = JSON.parse(await file.text()); }
  catch(e){ throw new Error('Arquivo .qualilab inválido (JSON corrompido)'); }
  if(!db || !Array.isArray(db.documents)) throw new Error('Arquivo .qualilab sem o formato esperado');

  const docMap = {}, catMap = {}, codeMap = {};
  (db.documents||[]).forEach(d=> docMap[d.id]=uid());
  (db.categories||[]).forEach(c=> catMap[c.id]=uid());
  (db.codes||[]).forEach(c=> codeMap[c.id]=uid());

  const total = (db.documents||[]).length + (db.categories||[]).length + (db.codes||[]).length
    + (db.doc_values||[]).length + (db.codings||[]).length + (db.memos||[]).length;
  const tick = makeProgressTicker(onProgress, total);

  if(store.beginBatch) store.beginBatch();
  try{
    for(const d of (db.documents||[])){ await store.addDocument(projectId, { id:docMap[d.id], name:d.name, content:d.content }); await tick(); }
    const catsSorted = (db.categories||[]).slice().sort((a,b)=>(a.position??0)-(b.position??0));
    for(let i=0;i<catsSorted.length;i++){ const c=catsSorted[i];
      await store.addCategory(projectId, { id:catMap[c.id], name:c.name, kind:c.kind, options:c.options||[], description:c.description||'', color:c.color||0, position:i }); await tick(); }
    const codesSorted = (db.codes||[]).slice().sort((a,b)=>(a.position??0)-(b.position??0));
    for(let i=0;i<codesSorted.length;i++){ const c=codesSorted[i];
      await store.addCode(projectId, { id:codeMap[c.id], parent_id:c.parent_id?codeMap[c.parent_id]:null, name:c.name, hue:c.hue||0, depth:c.depth||0, position:i }); await tick(); }

    // doc_values: em destino COLETIVO, cada resposta individual do arquivo de origem (com seu
    // proprio author_name) vira uma linha independente via addDocValue — igual addCoding ja
    // faz com created_by:null, em vez de colapsar tudo num valor so sob a identidade de quem
    // importa. O gabarito (layer='final') continua um por documento+categoria, escrito por
    // ultimo via setFinalValue. Em destino INDIVIDUAL (sem multi-coder possivel), mantem o
    // comportamento anterior: prefere o gabarito de origem, senao a 1a resposta encontrada.
    if(projectMode==='individual'){
      const pickVal = {};
      (db.doc_values||[]).forEach(v=>{
        const k=v.document_id+':'+v.category_id; const cur=pickVal[k];
        if(!cur || (v.layer==='final' && cur.layer!=='final')) pickVal[k]=v;
      });
      for(const v of Object.values(pickVal)){
        if(docMap[v.document_id] && catMap[v.category_id]) await store.setFinalValue(projectId, docMap[v.document_id], catMap[v.category_id], v.value);
        await tick();
      }
    } else {
      const finalPick = {};
      for(const v of (db.doc_values||[])){
        if(docMap[v.document_id] && catMap[v.category_id]){
          if(v.layer==='final') finalPick[v.document_id+':'+v.category_id]=v;
          else if(store.addDocValue) await store.addDocValue(projectId, { document_id:docMap[v.document_id], category_id:catMap[v.category_id], value:v.value, author_name:v.author_name||'importado', layer:'individual' });
          else await store.setDocValue(projectId, docMap[v.document_id], catMap[v.category_id], v.value); // fallback p/ store sem addDocValue
        }
        await tick();
      }
      for(const v of Object.values(finalPick)){ await store.setFinalValue(projectId, docMap[v.document_id], catMap[v.category_id], v.value); }
    }

    // codings: created_by zerado (o uuid original não corresponde a ninguém no projeto de
    // destino); o agrupamento por codificador passa a usar author_name, como no import QDPX.
    // Em projeto INDIVIDUAL, força tudo para a camada 'final' (sem reconciliação, mesmo
    // invariante que o RPC set_project_mode garante ao converter collective->individual) —
    // ignora a camada original do arquivo de origem, que pode ter sido exportado de um
    // projeto coletivo com codificações ainda 'individual'.
    for(const c of (db.codings||[])){
      if(docMap[c.document_id] && codeMap[c.code_id]){
        const layer = projectMode==='individual' ? codLayer : (c.layer||codLayer);
        await store.addCoding(projectId, { created_by:null, layer, document_id:docMap[c.document_id], code_id:codeMap[c.code_id], span_start:c.span_start, span_end:c.span_end, quote:c.quote, author_name:c.author_name||'importado' });
      }
      await tick();
    }

    // memos: remapeia o alvo (documento/código); memo de projeto vira o memo do projeto de destino
    if(store.setMemo){
      for(const m of (db.memos||[])){
        let targetId = m.target_id;
        if(m.scope==='document') targetId = docMap[m.target_id];
        else if(m.scope==='code') targetId = codeMap[m.target_id];
        else if(m.scope==='project') targetId = projectId;
        if(targetId) await store.setMemo(projectId, m.scope, targetId, m.content, m.author_name);
        await tick();
      }
    }
  } finally {
    if(store.endBatch) await store.endBatch();
  }

  return {
    documentos:(db.documents||[]).length, categorias:(db.categories||[]).length, codigos:(db.codes||[]).length,
    trechos:(db.codings||[]).length, memos:(db.memos||[]).length
  };
}

/* divide um "caminho" de hierarquia (ex.: tags.path do Taguette, ou o name de um <Code>
   sem aninhamento real no .qdc) nos seus segmentos. Aceita as duas convencoes mais comuns
   de separador (o Taguette documenta as duas): "/" e ".". Sem nenhuma das duas, fica um
   codigo plano (um unico segmento). */
function splitHierPath(path){
  const p = String(path||'').trim();
  if(p.includes('/')) return p.split('/').map(s=>s.trim()).filter(Boolean);
  if(p.includes('.')) return p.split('.').map(s=>s.trim()).filter(Boolean);
  return [p || 'código importado'];
}
/* constroi a arvore de codigos a partir de uma lista de linhas com um "caminho" cada
   (getPath(row)). Dedup de pais compartilhados via JSON.stringify do array de segmentos
   (array, nao concatenacao de string — sem ambiguidade de separador). Usado pelo import
   do Taguette (.sqlite3, tags.path) e do .qdc quando o codebook chega sem aninhamento
   real de <Code> (alguns exportadores, como o do proprio Taguette, fazem assim). */
function buildCodeTreeFromPaths(rows, getPath){
  const codeByPathKey = {};
  const newCodes = [];
  const codeIdByRow = new Map();
  let topHue = 0;
  rows.forEach(row=>{
    const segs = splitHierPath(getPath(row));
    let parentId=null, hue=0;
    segs.forEach((seg,depth)=>{
      const key = JSON.stringify(segs.slice(0,depth+1));
      let node = codeByPathKey[key];
      if(!node){
        if(depth===0){ hue = topHue % HUES.length; topHue++; }
        node = { id:uid(), parent_id:parentId, name:seg, hue, depth };
        codeByPathKey[key] = node;
        newCodes.push(node);
      }
      hue = node.hue; parentId = node.id;
      if(depth===segs.length-1) codeIdByRow.set(row, node.id);
    });
  });
  return { newCodes, codeIdByRow };
}

/* ============ IMPORT .sqlite3 do TAGUETTE ============
   O Taguette nao usa QDPX/REFI-QDA para o projeto completo (so o codebook, em .qdc) —
   o projeto inteiro (documentos + tags + trechos) e um banco SQLite proprio. Lemos esse
   arquivo no navegador via sql.js (SQLite compilado para WASM), sem servidor.
   Schema relevante (taguette/database/models.py): projects, documents(contents=texto),
   tags(path=nome com hierarquia opcional via pontuacao livre), highlights(start_offset/
   end_offset/snippet), highlight_tags (M:N — um trecho pode ter varias tags ao mesmo tempo).
   Sem atributos de documento e sem autor por trecho: o Taguette nao tem esses conceitos. */
async function importTaguette(file, store, projectId, projectMode, onProgress){
  const codLayer = projectMode==='individual' ? 'final' : 'individual';
  const SQL = await getSqlJs();
  const buf = new Uint8Array(await file.arrayBuffer());
  let sdb;
  try{ sdb = new SQL.Database(buf); }
  catch(e){ throw new Error('Arquivo .sqlite3 inválido ou corrompido'); }

  // usa Statement.getAsObject() (nao db.exec()[0].columns) — em alguns builds via CDN
  // (esm.sh) a propriedade "columns" do resultado de exec() vem com o nome minificado,
  // entao ler por ali falha silenciosamente; getAsObject() ja devolve linha->objeto.
  const all = (sql)=>{
    const stmt = sdb.prepare(sql);
    const rows = [];
    try{ while(stmt.step()) rows.push(stmt.getAsObject()); }
    finally{ stmt.free(); }
    return rows;
  };

  try{
    const tableNames = new Set(all("SELECT name FROM sqlite_master WHERE type='table'").map(r=>r.name));
    for(const need of ['projects','documents','tags','highlights','highlight_tags']){
      if(!tableNames.has(need)) throw new Error(`Arquivo não parece ser um projeto do Taguette (.sqlite3) — tabela "${need}" não encontrada.`);
    }

    // se o arquivo tiver mais de um projeto, importa o primeiro (a maioria dos exports do
    // Taguette e de um unico projeto; nao ha, ainda, escolha de qual importar na interface)
    const projects = all('SELECT id, name FROM projects ORDER BY id');
    if(!projects.length) throw new Error('Nenhum projeto encontrado no arquivo .sqlite3.');
    const srcProjectId = projects[0].id;

    const docsRows = all(`SELECT id, name, contents FROM documents WHERE project_id=${srcProjectId}`);
    const tagsRows = all(`SELECT id, path FROM tags WHERE project_id=${srcProjectId}`);
    const docIds = docsRows.map(d=>d.id);
    const highlightsRows = docIds.length
      ? all(`SELECT id, document_id, start_offset, end_offset, snippet FROM highlights WHERE document_id IN (${docIds.join(',')})`) : [];
    const hlIds = highlightsRows.map(h=>h.id);
    const linkRows = hlIds.length
      ? all(`SELECT highlight_id, tag_id FROM highlight_tags WHERE highlight_id IN (${hlIds.join(',')})`) : [];

    // documentos
    const docMap = {};
    const newDocs = docsRows.map(d=>{ const id=uid(); docMap[d.id]=id; return { id, name:d.name||'documento importado', content:d.contents||'' }; });

    // codigos: hierarquia a partir de tags.path (ver buildCodeTreeFromPaths/splitHierPath)
    const { newCodes, codeIdByRow } = buildCodeTreeFromPaths(tagsRows, t=>t.path);
    const tagToCodeId = {}; // tag.id (sqlite) -> id do codigo-folha (nosso)
    tagsRows.forEach(t=>{ tagToCodeId[t.id] = codeIdByRow.get(t); });

    // codificacoes: cada par (highlight, tag) gera uma coding — um trecho com 2+ tags no
    // Taguette vira 2+ codings com o mesmo span (mesmo padrao do QDPX p/ Coding multiplo)
    const tagsByHighlight = {};
    linkRows.forEach(l=>{ (tagsByHighlight[l.highlight_id]=tagsByHighlight[l.highlight_id]||[]).push(l.tag_id); });
    const newCodings = [];
    highlightsRows.forEach(h=>{
      const docId = docMap[h.document_id]; if(!docId) return;
      (tagsByHighlight[h.id]||[]).forEach(tagId=>{
        const codeId = tagToCodeId[tagId]; if(!codeId) return;
        newCodings.push({ document_id:docId, code_id:codeId, span_start:h.start_offset, span_end:h.end_offset, quote:h.snippet||'' });
      });
    });

    const total = newDocs.length + newCodes.length + newCodings.length;
    const tick = makeProgressTicker(onProgress, total);
    if(store.beginBatch) store.beginBatch();
    try{
      for(const d of newDocs){ await store.addDocument(projectId, d); await tick(); }
      for(const c of newCodes){ await store.addCode(projectId, { id:c.id, parent_id:c.parent_id, name:c.name, hue:c.hue, depth:c.depth, position:0 }); await tick(); }
      // Taguette nao registra autor por trecho — sem isso, o agrupamento por codificador
      // (Graficos/Visualizacao) trata tudo como um unico codificador, "Taguette"
      for(const c of newCodings){ await store.addCoding(projectId, { created_by:null, layer:codLayer, document_id:c.document_id, code_id:c.code_id, span_start:c.span_start, span_end:c.span_end, quote:c.quote, author_name:'Taguette' }); await tick(); }
    } finally {
      if(store.endBatch) await store.endBatch();
    }

    return { documentos:newDocs.length, codigos:newCodes.length, trechos:newCodings.length, projeto:projects[0].name||'' };
  } finally {
    sdb.close();
  }
}

/* ============ IMPORT .qdc (REFI-QDA Codebook) ============
   So o livro de codigos — .qdc nao tem documentos nem codificacoes, isso nao vem no
   import. Mescla os codigos no projeto ativo. Mesmo elemento <Code> (recursivo, com
   guid/name/color) usado dentro do <Project> do QDPX — por isso reaproveita boa parte
   do raciocinio de importQDPX. Algumas ferramentas (ex.: o proprio Taguette) exportam
   tudo num unico nivel, com a hierarquia codificada no "name" (ex.: "tech.floss"); nesse
   caso (sem NENHUM <Code> aninhado no arquivo inteiro) aplica a mesma heuristica de
   separador do import do Taguette via .sqlite3 (buildCodeTreeFromPaths/splitHierPath). */
async function importQDC(file, store, projectId, onProgress){
  const text = await file.text();
  const xml = new DOMParser().parseFromString(text, 'application/xml');
  if(xml.querySelector('parsererror')) throw new Error('XML do .qdc inválido');
  if(!xml.querySelector('CodeBook')) throw new Error('Arquivo não parece ser um codebook REFI-QDA (.qdc) — elemento <CodeBook> não encontrado.');

  const hasRealNesting = !!xml.querySelector('Code Code');
  let newCodes = [];

  if(hasRealNesting){
    let topHue = 0;
    function walk(el, parentId, depth, hue){
      const id = uid();
      const name = el.getAttribute('name') || 'código importado';
      const colorAttr = el.getAttribute('color');
      newCodes.push({ id, parent_id:parentId, name, hue, depth, hue_deg: /^#?[0-9a-f]{6}$/i.test(colorAttr||'') ? hexToHue(colorAttr) : null });
      Array.from(el.children).filter(c=>c.tagName==='Code').forEach(c=>walk(c, id, depth+1, hue));
    }
    const codesEl = xml.querySelector('CodeBook > Codes');
    Array.from(codesEl ? codesEl.children : []).filter(c=>c.tagName==='Code').forEach(el=>{
      walk(el, null, 0, topHue % HUES.length); topHue++;
    });
  } else {
    // sem aninhamento real em lugar nenhum do arquivo: trata "name" como caminho
    // (ex.: export flat do Taguette), igual ao import de tags.path do .sqlite3
    const rows = Array.from(xml.querySelectorAll('CodeBook > Codes > Code')).map(el=>({
      name: el.getAttribute('name') || 'código importado',
      colorAttr: el.getAttribute('color'),
    }));
    const { newCodes: built, codeIdByRow } = buildCodeTreeFromPaths(rows, r=>r.name);
    newCodes = built;
    rows.forEach(r=>{
      if(!/^#?[0-9a-f]{6}$/i.test(r.colorAttr||'')) return;
      const node = newCodes.find(c=>c.id===codeIdByRow.get(r));
      if(node) node.hue_deg = hexToHue(r.colorAttr);
    });
  }

  const tick = makeProgressTicker(onProgress, newCodes.length);
  if(store.beginBatch) store.beginBatch();
  try{
    for(const c of newCodes){
      await store.addCode(projectId, { id:c.id, parent_id:c.parent_id, name:c.name, hue:c.hue, depth:c.depth, hue_deg:c.hue_deg??null, position:0 });
      await tick();
    }
  } finally {
    if(store.endBatch) await store.endBatch();
  }

  return { codigos: newCodes.length };
}

/* ============ IDB HELPER (IndexedDB p/ fila de escrita + handle de arquivo) ============ */
const IDB = {
  _db: null,
  async open(){
    if(this._db) return this._db;
    return new Promise((res,rej)=>{
      const r = indexedDB.open('qualilab_meta',1);
      r.onupgradeneeded = e=>{
        const d=e.target.result;
        if(!d.objectStoreNames.contains('write_queue')) d.createObjectStore('write_queue',{keyPath:'id',autoIncrement:true});
        if(!d.objectStoreNames.contains('file_handles')) d.createObjectStore('file_handles',{keyPath:'key'});
      };
      r.onsuccess = e=>{ this._db=e.target.result; res(this._db); };
      r.onerror = ()=>rej(r.error);
    });
  },
  async tx(store,mode,fn){ const db=await this.open(); return new Promise((res,rej)=>{ const t=db.transaction(store,mode); t.onerror=()=>rej(t.error); const r=fn(t.objectStore(store)); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); },
  async enqueue(item){ return this.tx('write_queue','readwrite',s=>s.add(item)); },
  async dequeue(id){ return this.tx('write_queue','readwrite',s=>s.delete(id)); },
  async allQueued(){ const db=await this.open(); return new Promise((res,rej)=>{ const t=db.transaction('write_queue','readonly'); const r=t.objectStore('write_queue').getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); },
  async saveHandle(key,handle){ return this.tx('file_handles','readwrite',s=>s.put({key,handle})); },
  async getHandle(key){ try{ return await this.tx('file_handles','readonly',s=>s.get(key)); }catch(e){ return null; } },
};

/* ============ FILE STORE (File System Access API — arquivo .qualilab no disco) ============
   Zero dependência de rede. O projeto é um arquivo JSON visível no sistema de arquivos.
   Funciona offline, file://, ambientes air-gapped, HDs criptografados.
   Requer Chrome/Edge (File System Access API). Firefox/Safari: não disponível. */
async function createFileStore(fileHandle, isNew){
  let db = { _meta:{name:'Projeto',mode:'individual',displayName:'pesquisador'}, documents:[], categories:[], doc_values:[], codes:[], codings:[], memos:[] };
  if(!isNew){
    const file = await fileHandle.getFile();
    try{ const parsed=JSON.parse(await file.text()); if(parsed.documents) db=parsed; }catch(e){}
  }
  if(!db.memos) db.memos = [];
  let name = db._meta?.displayName || 'pesquisador';
  // batching: durante importacao grande, escreve no disco uma vez no fim (senao seria
  // um createWritable+write+close por trecho — centenas de gravacoes, travando a aba).
  let batching = false, dirty = false;
  // write() pode falhar (permissao revogada, disco/volume removido, sem espaco) e isso
  // passava so pro console — o usuario continuava editando sem saber que nada mais estava
  // sendo escrito no arquivo. _onSaveError avisa o App pra mostrar um banner persistente.
  let _onSaveError = null;
  const save = async ()=>{
    if(batching){ dirty = true; return; }
    try{ db._meta.displayName=name; const w=await fileHandle.createWritable(); await w.write(JSON.stringify(db,null,2)); await w.close(); _onSaveError?.(null); }
    catch(e){ console.warn('Falha ao salvar arquivo:',e); _onSaveError?.(e); }
  };
  const P = v=>Promise.resolve(v);
  if(isNew) await save();
  // persiste o fileHandle no IDB para reabrir na próxima sessão
  await IDB.saveHandle('lastro:file', fileHandle).catch(()=>{});
  return {
    mode:'file', fileName:fileHandle.name,
    onSaveError(cb){ _onSaveError=cb; },
    beginBatch(){ batching = true; },
    async endBatch(){ batching = false; if(dirty){ dirty = false; await save(); } },
    async init(display){ name=display||name; return {id:'file-user',name,email:null,anon:false}; },
    currentUser(){ return {id:'file-user',name,email:null,anon:false}; },
    async changePassword(){ throw new Error('Modo arquivo: sem conta de usuário'); },
    async changeDisplayName(n){ name=n||name; db._meta.displayName=name; await save(); },
    async createProject(pn){ db._meta={...db._meta,id:'file-project',name:pn||fileHandle.name.replace(/\.qualilab$/i,''),code:'FILE',mode:'individual'}; await save(); return {id:'file-project',name:db._meta.name,code:'FILE',created_by:'file-user',mode:'individual'}; },
    async joinProject(){ return {id:'file-project',name:db._meta?.name||'Projeto',code:'FILE',created_by:'file-user',mode:db._meta?.mode||'individual'}; },
    async listMyProjects(){ return null; },
    async myRole(){ return 'admin'; },
    async listMembers(){ return [{user_id:'file-user',display_name:name,role:'admin',joined_at:null}]; },
    async setMemberRole(){}, async removeMember(){},
    async renameProject(pid,pn){ db._meta.name=pn; await save(); },
    async deleteProject(){ db={_meta:db._meta,documents:[],categories:[],doc_values:[],codes:[],codings:[]}; await save(); },
    async setProjectMode(pid,pmode){ db._meta.mode=pmode; await save(); },
    realtime(){ return ()=>{}; },
    listDocuments(){ return P(db.documents.slice()); },
    async addDocument(pid,{id,name:dn,content}){ const d={id:id||uid(),name:dn,content,created_at:new Date().toISOString()}; db.documents.push(d); await save(); return d; },
    async deleteDocument(id){ db.documents=db.documents.filter(d=>d.id!==id); db.doc_values=db.doc_values.filter(v=>v.document_id!==id); db.codings=db.codings.filter(c=>c.document_id!==id); db.memos=db.memos.filter(m=>!(m.scope==='document'&&m.target_id===id)); await save(); },
    async clearProject(){ db.documents=[]; db.categories=[]; db.doc_values=[]; db.codes=[]; db.codings=[]; db.memos=db.memos.filter(m=>m.scope==='project'); await save(); },
    listCategories(){ return P(db.categories.slice().sort((a,b)=>a.position-b.position)); },
    async addCategory(pid,cat){ const c={id:uid(),position:db.categories.length,...cat}; db.categories.push(c); await save(); return c; },
    async updateCategory(id,patch){ db.categories=db.categories.map(c=>c.id===id?{...c,...patch}:c); await save(); },
    async deleteCategory(id){ db.categories=db.categories.filter(c=>c.id!==id); db.doc_values=db.doc_values.filter(v=>v.category_id!==id); await save(); },
    async getDocValues(docId){ return db.doc_values.filter(v=>v.document_id===docId); },
    async setDocValue(pid,docId,catId,value){ db.doc_values=db.doc_values.filter(v=>!(v.document_id===docId&&v.category_id===catId&&v.layer==='final')); if(value!=='') db.doc_values.push({id:uid(),document_id:docId,category_id:catId,value,set_by:'file-user',author_name:name,layer:'final'}); await save(); },
    async setFinalValue(pid,docId,catId,value){ db.doc_values=db.doc_values.filter(v=>!(v.document_id===docId&&v.category_id===catId&&v.layer==='final')); if(value!=='') db.doc_values.push({id:uid(),document_id:docId,category_id:catId,value,set_by:'file-user',author_name:name,layer:'final'}); await save(); },
    async addDocValue(pid,v){ const row={id:uid(),document_id:v.document_id,category_id:v.category_id,value:v.value,set_by:v.set_by??null,author_name:v.author_name||'anonimo',layer:v.layer||'individual'}; db.doc_values.push(row); await save(); return row; },
    listCodes(){ return P(db.codes.slice().sort((a,b)=>a.depth-b.depth||a.position-b.position)); },
    async addCode(pid,code){ const c={id:uid(),position:db.codes.length,...code}; db.codes.push(c); await save(); return c; },
    async updateCode(id,patch){ db.codes=db.codes.map(c=>c.id===id?{...c,...patch}:c); await save(); },
    async deleteCode(id){ const kill=new Set([id]); let added=true; while(added){added=false; db.codes.forEach(c=>{if(c.parent_id&&kill.has(c.parent_id)&&!kill.has(c.id)){kill.add(c.id);added=true;}});} db.codes=db.codes.filter(c=>!kill.has(c.id)); db.codings=db.codings.filter(c=>!kill.has(c.code_id)); db.memos=db.memos.filter(m=>!(m.scope==='code'&&kill.has(m.target_id))); await save(); },
    async listCodings(pid,docId){ return db.codings.filter(c=>c.document_id===docId); },
    async addCoding(pid,co){ const c={id:uid(),author_name:name,created_at:new Date().toISOString(),...co}; db.codings.push(c); await save(); return c; },
    async deleteCoding(id){ db.codings=db.codings.filter(c=>c.id!==id); await save(); },
    async listMemos(){ return db.memos.slice(); },
    async setMemo(pid, scope, targetId, content, authorName){
      db.memos = db.memos.filter(m=>!(m.scope===scope && m.target_id===targetId));
      if(content && content.trim()) db.memos.push({ id:uid(), project_id:pid, scope, target_id:targetId, content, author_name:authorName||name, updated_at:new Date().toISOString() });
      await save();
    },
  };
}
/* verifica suporte e reabre último arquivo */
const supportsFileAPI = typeof window!=='undefined' && 'showSaveFilePicker' in window;
const supportsDirAPI = typeof window!=='undefined' && 'showDirectoryPicker' in window;
async function reopenLastFile(){
  if(!supportsFileAPI) return null;
  try{
    const rec = await IDB.getHandle('lastro:file');
    if(!rec) return null;
    const perm = await rec.handle.queryPermission({mode:'readwrite'});
    if(perm==='granted') return rec.handle;
    const req = await rec.handle.requestPermission({mode:'readwrite'});
    return req==='granted' ? rec.handle : null;
  }catch(e){ return null; }
}

/* ============ STORE LOCAL (navegador) ============ */
function LocalStore(){
  let db = { documents:[], categories:[], doc_values:[], codes:[], codings:[], memos:[] };
  let name = 'pesquisador';
  try { const raw = localStorage.getItem('lastro:local'); if(raw) db = JSON.parse(raw); } catch(e){}
  if(!db.memos) db.memos = [];
  // batching: durante uma importacao grande, suprime o save por item (que re-serializa
  // o banco inteiro) e grava so uma vez no fim — evita travar a aba por segundos.
  let batching = false, dirty = false;
  // localStorage.setItem pode falhar (quota — geralmente 5-10MB — ou storage desabilitado)
  // e isso passava em silencio: o app continuava parecendo funcionar, mas nada do que o
  // usuario fizesse depois ficava salvo de fato. _onSaveError avisa o App pra mostrar um
  // banner persistente, em vez de descobrir so quando reabrir e os dados nao estarem la.
  let _onSaveError = null;

  // backup automatico em pasta (File System Access API) — espelho redundante do localStorage
  // numa pasta escolhida pelo pesquisador (ex.: a mesma do index.html), so modo local (modo
  // arquivo ja E o disco, modo nuvem ja tem backup no servidor). Escrever o projeto inteiro a
  // cada mudanca trava a aba em projetos grandes, entao o debounce escala pelo tamanho —
  // pequeno escreve rapido, grande espera mais — em vez de tentar escrever sempre que algo
  // muda. Acima de 50MB so avisa (warnLarge) que pode ficar lento, mas continua tentando.
  let backupHandle = null, backupTimer = null;
  let backupStatus = { active:false, name:null, lastOk:null, lastError:null, warnLarge:false };
  let _onBackupStatus = null;
  const notifyBackup = ()=> _onBackupStatus?.({...backupStatus});
  (async ()=>{ // tenta restaurar a pasta escolhida numa sessao anterior, sem pedir de novo se a permissao ainda valer
    try{
      const rec = await IDB.getHandle('lastro:backupdir');
      if(!rec) return;
      const perm = await rec.handle.queryPermission({mode:'readwrite'});
      if(perm==='granted'){ backupHandle = rec.handle; backupStatus = { ...backupStatus, active:true, name:rec.handle.name }; }
      else { backupStatus = { ...backupStatus, name:rec.handle.name, lastError:'permissão perdida — reative' }; }
      notifyBackup();
    }catch(e){}
  })();
  const backupDebounceMs = (chars)=> chars>50e6 ? 60000 : chars>20e6 ? 30000 : chars>5e6 ? 15000 : 5000;
  const writeBackup = async (json)=>{
    if(!backupHandle) return;
    try{
      const fh = await backupHandle.getFileHandle('backup-automatico.qualilab', {create:true});
      const w = await fh.createWritable(); await w.write(json); await w.close();
      backupStatus = { ...backupStatus, lastOk:new Date().toISOString(), lastError:null, warnLarge:json.length>50e6 };
    }catch(e){ backupStatus = { ...backupStatus, lastError:String(e.message||e) }; }
    notifyBackup();
  };
  const scheduleBackup = (json)=>{ if(!backupHandle) return; clearTimeout(backupTimer); backupTimer=setTimeout(()=>writeBackup(json), backupDebounceMs(json.length)); };

  const save = () => {
    if(batching){ dirty = true; return; }
    let json;
    try { json = JSON.stringify(db); localStorage.setItem('lastro:local', json); _onSaveError?.(null); }
    catch(e){ _onSaveError?.(e); return; }
    scheduleBackup(json);
  };
  const P = (v)=>Promise.resolve(v);
  return {
    mode:'local',
    onSaveError(cb){ _onSaveError=cb; },
    onBackupStatus(cb){ _onBackupStatus=cb; cb({...backupStatus}); },
    async enableFolderBackup(){
      const handle = await window.showDirectoryPicker({mode:'readwrite'});
      await IDB.saveHandle('lastro:backupdir', handle);
      backupHandle = handle;
      backupStatus = { active:true, name:handle.name, lastOk:null, lastError:null, warnLarge:false };
      notifyBackup();
      await writeBackup(JSON.stringify(db));
      return handle.name;
    },
    async disableFolderBackup(){
      backupHandle = null; clearTimeout(backupTimer);
      backupStatus = { active:false, name:null, lastOk:null, lastError:null, warnLarge:false };
      try{ await IDB.tx('file_handles','readwrite', s=>s.delete('lastro:backupdir')); }catch(e){}
      notifyBackup();
    },
    beginBatch(){ batching = true; },
    endBatch(){ batching = false; if(dirty){ dirty = false; let json; try { json=JSON.stringify(db); localStorage.setItem('lastro:local', json); _onSaveError?.(null); } catch(e){ _onSaveError?.(e); return; } scheduleBackup(json); } },
    async init(display){ name = display || name; return { id:'local-user', name }; },
    currentUser(){ return { id:'local-user', name }; },
    async listMemos(){ return db.memos.slice(); },
    async setMemo(pid, scope, targetId, content, authorName){
      db.memos = db.memos.filter(m=>!(m.scope===scope && m.target_id===targetId));
      if(content && content.trim()) db.memos.push({ id:uid(), project_id:pid, scope, target_id:targetId, content, author_name:authorName||name, updated_at:new Date().toISOString() });
      save();
    },
    async changePassword(){ throw new Error('Sem conta no modo local'); },
    async changeDisplayName(newName){ name = newName || name; try{ localStorage.setItem('lastro:name', name); }catch(e){} },
    async createProject(pn,disp,pmode){ return { id:'local', name:pn||'Projeto local', code:'LOCAL', created_by:'local-user', mode:pmode||'individual' }; },
    async joinProject(){ return { id:'local', name:'Projeto local', code:'LOCAL', created_by:'local-user', mode:'collective' }; },
    async myRole(){ return 'admin'; },
    async listMembers(){ return [{ user_id:'local-user', display_name:name, role:'admin' }]; },
    async setMemberRole(){ return P(); },
    async removeMember(){ return P(); },
    async renameProject(){ return P(); },
    async deleteProject(){ db={ documents:[], categories:[], doc_values:[], codes:[], codings:[] }; save(); return P(); },
    async setProjectMode(){ return P(); },
    listDocuments(){ return P(db.documents.slice()); },
    addDocument(pid,{id,name:dn,content}){ const d={id:id||uid(),name:dn,content,created_at:new Date().toISOString()}; db.documents.push(d); save(); return P(d); },
    deleteDocument(id){ db.documents=db.documents.filter(d=>d.id!==id); db.doc_values=db.doc_values.filter(v=>v.document_id!==id); db.codings=db.codings.filter(c=>c.document_id!==id); db.memos=db.memos.filter(m=>!(m.scope==='document'&&m.target_id===id)); save(); return P(); },
    clearProject(){ const keepMemos=(db.memos||[]).filter(m=>m.scope==='project'); db={ documents:[], categories:[], doc_values:[], codes:[], codings:[], memos:keepMemos }; save(); return P(); },
    listCategories(){ return P(db.categories.slice().sort((a,b)=>a.position-b.position)); },
    addCategory(pid,cat){ const c={id:uid(),position:db.categories.length,...cat}; db.categories.push(c); save(); return P(c); },
    updateCategory(id,patch){ db.categories=db.categories.map(c=>c.id===id?{...c,...patch}:c); save(); return P(); },
    deleteCategory(id){ db.categories=db.categories.filter(c=>c.id!==id); db.doc_values=db.doc_values.filter(v=>v.category_id!==id); save(); return P(); },
    getDocValues(docId){ return P(db.doc_values.filter(v=>v.document_id===docId)); },
    setDocValue(pid,docId,catId,value){ db.doc_values=db.doc_values.filter(v=>!(v.document_id===docId&&v.category_id===catId&&v.set_by==='local-user'&&(v.layer||'individual')==='individual')); if(value!=='') db.doc_values.push({id:uid(),document_id:docId,category_id:catId,value,set_by:'local-user',author_name:name,layer:'individual'}); save(); return P(); },
    setFinalValue(pid,docId,catId,value){ db.doc_values=db.doc_values.filter(v=>!(v.document_id===docId&&v.category_id===catId&&v.layer==='final')); if(value!=='') db.doc_values.push({id:uid(),document_id:docId,category_id:catId,value,set_by:'local-user',author_name:name,layer:'final'}); save(); return P(); },
    // grava uma resposta de categoria com autor arbitrario (sem dono-do-navegador) — usado
    // pelo import de .qualilab pra preservar cada pesquisador de origem, igual ao addCoding
    // ja faz com author_name/created_by. Nao deduplica: cada chamada e uma linha nova.
    addDocValue(pid,v){ const row={id:uid(),document_id:v.document_id,category_id:v.category_id,value:v.value,set_by:v.set_by??null,author_name:v.author_name||'anonimo',layer:v.layer||'individual'}; db.doc_values.push(row); save(); return P(row); },
    listCodes(){ return P(db.codes.slice().sort((a,b)=>a.depth-b.depth||a.position-b.position)); },
    addCode(pid,code){ const c={id:uid(),position:db.codes.length,...code}; db.codes.push(c); save(); return P(c); },
    updateCode(id,patch){ db.codes=db.codes.map(c=>c.id===id?{...c,...patch}:c); save(); return P(); },
    deleteCode(id){ const kill=new Set([id]); let added=true; while(added){added=false; db.codes.forEach(c=>{if(c.parent_id&&kill.has(c.parent_id)&&!kill.has(c.id)){kill.add(c.id);added=true;}});} db.codes=db.codes.filter(c=>!kill.has(c.id)); db.codings=db.codings.filter(c=>!kill.has(c.code_id)); db.memos=db.memos.filter(m=>!(m.scope==='code'&&kill.has(m.target_id))); save(); return P(); },
    listCodings(pid,docId){ return P(db.codings.filter(c=>c.document_id===docId)); },
    addCoding(pid,co){ const c={id:uid(),author_name:name,created_at:new Date().toISOString(),...co}; db.codings.push(c); save(); return P(c); },
    deleteCoding(id){ db.codings=db.codings.filter(c=>c.id!==id); save(); return P(); },
  };
}

/* ============ STORE SUPABASE (coletivo) ============ */
function SupabaseStore(sb){
  let user=null, name='anonimo';
  const must = (r)=>{ if(r.error) throw r.error; return r.data; };
  const nameOf = (u, fallback)=> (u && u.user_metadata && u.user_metadata.name) || fallback || name;

  /* fila de escrita: tentativas que falharam por rede ficam no IDB e são reprocessadas */
  let _pendingCount = 0;
  let _onPendingChange = null; // callback → App pode mostrar contador
  const setPending = (n)=>{ _pendingCount=n; _onPendingChange?.(n); };
  const withQueue = async (key, fn)=>{
    try{ const r = await fn(); setPending(Math.max(0,_pendingCount-1)); return r; }
    catch(e){
      const isNet = !navigator.onLine || String(e?.message||'').match(/fetch|network|failed/i);
      if(isNet){ await IDB.enqueue({key,ts:Date.now()}).catch(()=>{}); setPending(_pendingCount+1); return; }
      throw e;
    }
  };
  const flushQueue = async ()=>{
    const items = await IDB.allQueued().catch(()=>[]);
    for(const it of items){ try{ await it.fn?.(); await IDB.dequeue(it.id); setPending(Math.max(0,_pendingCount-1)); }catch(e){} }
  };
  return {
    mode:'cloud',
    onPendingChange(cb){ _onPendingChange=cb; },
    pendingCount(){ return _pendingCount; },
    async flush(){ await flushQueue(); },
    // retoma sessão de e-mail/senha; sessões anônimas são ignoradas (usuário volta à tela de auth)
    async init(display){
      const { data:{ session } } = await sb.auth.getSession();
      if(session && !session.user.is_anonymous){
        user = session.user; name = nameOf(user, display);
        return { id:user.id, name, email:user.email||null, anon:false };
      }
      if(display) name = display;
      return null; // sem sessão ou sessão anônima → tela de login
    },
    async signIn(email, password){
      const r = await sb.auth.signInWithPassword({ email:email.trim(), password }); if(r.error) throw r.error;
      user = r.data.user; name = nameOf(user); return { id:user.id, name, email:user.email||null, anon:false };
    },
    async signUp(email, password, display){
      const r = await sb.auth.signUp({ email:email.trim(), password, options:{ data:{ name: display||'pesquisador' } } });
      if(r.error) throw r.error;
      // se a confirmacao de e-mail estiver ativa, ainda nao ha sessao
      if(r.data.session){ user = r.data.session.user; name = nameOf(user, display); return { confirmed:true, user:{ id:user.id, name, email:user.email||null, anon:false } }; }
      return { confirmed:false };
    },
    async signInAnon(display){
      let { data:{ session } } = await sb.auth.getSession();
      if(!session){ const r = await sb.auth.signInAnonymously(); if(r.error) throw r.error; session = r.data.session; }
      user = session.user; name = display || name;
      return { id:user.id, name, email:null, anon:true };
    },
    async signOut(){ try{ await sb.auth.signOut(); }catch(e){} user=null; },
    currentUser(){ return user ? { id:user.id, name, email:user.email||null, anon:!!user.is_anonymous } : null; },
    async changePassword(newPw){ const r = await sb.auth.updateUser({ password:newPw }); if(r.error) throw r.error; },
    async changeDisplayName(newName){ name = newName || name; const r = await sb.auth.updateUser({ data:{ name } }); if(r.error) throw r.error; if(r.data&&r.data.user) user = r.data.user; },
    async createProject(pn, display, pmode){ name=display||name; const d=must(await sb.rpc('create_project',{p_name:pn,p_display:name})); return { id:d.id, name:d.name, code:d.code, created_by:d.created_by, mode:pmode||'collective' }; },
    async joinProject(code, display){ name=display||name; const d=must(await sb.rpc('join_project',{p_code:code,p_display:name})); return { id:d.id, name:d.name, code:d.code, created_by:d.created_by, mode:d.mode||'collective' }; },
    // lista os projetos do usuario: tenta a RPC dedicada (com contagens), senao a tabela projects;
    // null = sem suporte no servidor (o app cai na lista local por conta)
    async listMyProjects(){
      try{ const r = await sb.rpc('my_projects'); if(!r.error && Array.isArray(r.data)) return r.data; }catch(e){}
      try{ const r = await sb.from('projects').select('id,name,code,created_at'); if(!r.error && Array.isArray(r.data)) return r.data; }catch(e){}
      return null;
    },
    // papel do usuario atual no projeto: 'admin' | 'member'
    async myRole(pid){ try{ const r = await sb.from('members').select('role').eq('project_id',pid).eq('user_id',user.id).maybeSingle(); return (r.data&&r.data.role)||'member'; }catch(e){ return 'member'; } },
    async listMembers(pid){ try{ return must(await sb.from('members').select('user_id,display_name,role,joined_at').eq('project_id',pid).order('joined_at')); }catch(e){ return []; } },
    async setMemberRole(pid, userId, role){ must(await sb.rpc('set_member_role',{ p_project:pid, p_user:userId, p_role:role })); },
    async removeMember(pid, userId){ must(await sb.rpc('remove_member',{ p_project:pid, p_user:userId })); },
    async renameProject(pid, pn){ must(await sb.rpc('rename_project',{ p_project:pid, p_name:pn })); },
    async deleteProject(pid){ must(await sb.rpc('delete_project',{ p_project:pid })); },
    async setProjectMode(pid, pmode, authorName){ must(await sb.rpc('set_project_mode',{ p_project:pid, p_mode:pmode, p_author:authorName||'pesquisador' })); },
    async listDocuments(pid){ return must(await sb.from('documents').select('*').eq('project_id',pid).order('created_at')); },
    async addDocument(pid,{id,name:dn,content}){ const row={project_id:pid,name:dn,content,created_by:user.id}; if(id) row.id=id; return must(await sb.from('documents').insert(row).select().single()); },
    async deleteDocument(id){ must(await sb.from('documents').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','document').eq('target_id',id); },
    async clearProject(pid){
      await sb.from('codings').delete().eq('project_id',pid);
      await sb.from('doc_values').delete().eq('project_id',pid);
      await sb.from('documents').delete().eq('project_id',pid);
      await sb.from('codes').delete().eq('project_id',pid);
      await sb.from('categories').delete().eq('project_id',pid);
      // mantem o memo do projeto; remove memos de documento/codigo (orfaos apos a limpeza)
      await sb.from('memos').delete().eq('project_id',pid).in('scope',['document','code']);
    },
    async listCategories(pid){ return must(await sb.from('categories').select('*').eq('project_id',pid).order('position')); },
    async addCategory(pid,cat){
      try { return must(await sb.from('categories').insert({project_id:pid,...cat}).select().single()); }
      catch(e){ if(!/description/i.test(String(e.message||e))) throw e;
        const { description, ...rest } = cat; // coluna ausente na nuvem: grava sem a descricao
        return must(await sb.from('categories').insert({project_id:pid,...rest}).select().single()); }
    },
    async updateCategory(id,patch){
      try { must(await sb.from('categories').update(patch).eq('id',id)); }
      catch(e){ if(!/description/i.test(String(e.message||e))) throw e;
        const { description, ...rest } = patch;
        if(Object.keys(rest).length) must(await sb.from('categories').update(rest).eq('id',id)); }
    },
    async deleteCategory(id){ must(await sb.from('categories').delete().eq('id',id)); },
    async getDocValues(docId){ return must(await sb.from('doc_values').select('*').eq('document_id',docId)); },
    // valor individual do usuario atual (cada pesquisador responde o seu)
    async setDocValue(pid,docId,catId,value){
      if(value===''){ must(await sb.from('doc_values').delete().eq('document_id',docId).eq('category_id',catId).eq('set_by',user.id).eq('layer','individual')); return; }
      must(await sb.from('doc_values').upsert({project_id:pid,document_id:docId,category_id:catId,value,set_by:user.id,author_name:name,layer:'individual',updated_at:new Date().toISOString()},{onConflict:'document_id,category_id,set_by,layer'}));
    },
    // valor consolidado (gabarito) — somente o dono escreve (garantido por RLS)
    async setFinalValue(pid,docId,catId,value){
      if(value===''){ must(await sb.from('doc_values').delete().eq('document_id',docId).eq('category_id',catId).eq('layer','final')); return; }
      must(await sb.from('doc_values').upsert({project_id:pid,document_id:docId,category_id:catId,value,set_by:user.id,author_name:name,layer:'final',updated_at:new Date().toISOString()},{onConflict:'document_id,category_id,set_by,layer'}));
    },
    // grava uma resposta de categoria com autor arbitrario (set_by:null, author_name livre) —
    // usado pelo import de .qualilab pra preservar cada pesquisador de origem como uma linha
    // independente, igual ja fazia addCoding com created_by:null. set_by null nunca colide
    // com a unique (document_id,category_id,set_by,layer) — Postgres trata NULL como distinto
    // de outro NULL — entao e sempre um insert novo, nunca um upsert/merge.
    async addDocValue(pid,v){
      return must(await sb.from('doc_values').insert({project_id:pid,document_id:v.document_id,category_id:v.category_id,value:v.value,set_by:v.set_by??null,author_name:v.author_name||'anonimo',layer:v.layer||'individual',updated_at:new Date().toISOString()}).select().single());
    },
    async listCodes(pid){ return must(await sb.from('codes').select('*').eq('project_id',pid).order('depth').order('position')); },
    async addCode(pid,code){ return must(await sb.from('codes').insert({project_id:pid,...code}).select().single()); },
    async updateCode(id,patch){ must(await sb.from('codes').update(patch).eq('id',id)); },
    async deleteCode(id){ must(await sb.from('codes').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','code').eq('target_id',id); },
    async listCodings(pid,docId){ return must(await sb.from('codings').select('*').eq('project_id',pid).eq('document_id',docId)); },
    async addCoding(pid,co){
      const hasCB = Object.prototype.hasOwnProperty.call(co,'created_by');
      const row = {project_id:pid, created_by:user.id, author_name:name, ...co};
      if(hasCB && co.created_by===null) row.created_by = null;
      return must(await sb.from('codings').insert(row).select().single());
    },
    async deleteCoding(id){ must(await sb.from('codings').delete().eq('id',id)); },
    // memos: nota unica compartilhada por alvo (projeto/documento/codigo); ultima edicao vale
    async listMemos(pid){ try{ return must(await sb.from('memos').select('*').eq('project_id',pid)); }catch(e){ return []; } },
    async setMemo(pid, scope, targetId, content, authorName){
      if(!content || !content.trim()){
        must(await sb.from('memos').delete().eq('project_id',pid).eq('scope',scope).eq('target_id',targetId));
        return;
      }
      must(await sb.from('memos').upsert(
        { project_id:pid, scope, target_id:targetId, content, author_name:authorName||'anonimo', updated_by:user?.id||null, updated_at:new Date().toISOString() },
        { onConflict:'project_id,scope,target_id' }
      ));
    },
    // sincronizacao ao vivo: dispara onChange a cada alteracao em codings/doc_values do projeto
    realtime(projectId, onChange){
      const ch = sb.channel('qualilab:'+projectId)
        .on('postgres_changes', { event:'*', schema:'public', table:'codings',    filter:'project_id=eq.'+projectId }, onChange)
        .on('postgres_changes', { event:'*', schema:'public', table:'doc_values', filter:'project_id=eq.'+projectId }, onChange)
        .subscribe();
      return ()=>{ try{ sb.removeChannel(ch); }catch(e){} };
    },
  };
}

/* ============================== APP ============================== */
function App(){

  const [store, setStore] = useState(null);
  const [mode, setMode] = useState(wantCloud ? 'cloud' : 'local');
  // modo derivado inclui 'file' quando o store ativo é FileStore
  const effectiveMode = store?.mode==='file' ? 'file' : mode;
  const [phase, setPhase] = useState('boot');     // boot | auth | gate | work
  const [err, setErr] = useState(null);
  const [project, setProject] = useState(null);
  const [projectMode, setProjectMode] = useState('collective'); // 'individual' | 'collective'
  const [user, setUser] = useState(null);
  const [myProjects, setMyProjects] = useState([]);

  const [docs, setDocs] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [cats, setCats] = useState([]);
  const [values, setValues] = useState([]);
  const [codes, setCodes] = useState([]);
  const [codings, setCodings] = useState([]);

  // dados de todo o projeto (para a aba de visualizacao, que cruza documentos)
  const [allCodings, setAllCodings] = useState([]);
  const [allValues, setAllValues] = useState([]);
  const [memos, setMemos] = useState([]);
  const [memoSel, setMemoSel] = useState({ scope:'project', targetId:null }); // alvo selecionado na aba Memos
  // estado da aba Visualização (elevado para poder usar o split nativo do app)
  const [vizLayer,      setVizLayer]      = useState('individual');
  const [vizCatFilter,  setVizCatFilter]  = useState({});
  const [vizSelCode,    setVizSelCode]    = useState(null);
  const [vizCross,      setVizCross]      = useState(['','']);

  const [sel, setSel] = useState(null);
  const [ctxMenu, setCtxMenu] = useState(null); // menu de contexto (botão direito) p/ aplicar código
  const [ctxCreating, setCtxCreating] = useState(false); // mini-formulário "criar novo código" dentro do menu
  const [ctxNewName, setCtxNewName] = useState('');
  const [ctxNewParent, setCtxNewParent] = useState(''); // id do código-pai, ou '' para nova família
  const [selCode, setSelCode] = useState(null);
  const [rtab, setRtab] = useState('categorias');
  const [esquemaTab, setEsquemaTab] = useState('codigos'); // codigos | categorias — sub-paginas da aba Esquema
  const [mainView, setMainView] = useState('codificar'); // codificar | reconciliar | visualizar
  const [viewCoder, setViewCoder] = useState('all');      // all | mine | <userId> | final
  const [account, setAccount] = useState(false);  // tela "Minha conta"
  const [projEdit, setProjEdit] = useState(false); // editar tipo do projeto (pelo pill)
  const [expOpen, setExpOpen] = useState(false);
  const [impOpen, setImpOpen] = useState(false);
  const qualilabInputRef = useRef(null);
  const qdpxInputRef = useRef(null);
  const taguetteInputRef = useRef(null);
  const qdcInputRef = useRef(null);
  const [busy, setBusy] = useState(null);
  const [progress, setProgress] = useState(null); // {done,total} durante import grande
  const [online, setOnline] = useState(navigator.onLine);
  const [pending, setPending] = useState(0); // escritas em fila (cloud offline)
  const [saveError, setSaveError] = useState(null); // ultima falha de gravacao local/arquivo (null = ok)
  const [backupStatus, setBackupStatus] = useState({ active:false, name:null, lastOk:null, lastError:null, warnLarge:false }); // backup automatico em pasta (so LocalStore)
  const [importMsg, setImportMsg] = useState(null);
  const [role, setRole] = useState('member');  // papel do usuário no projeto: admin | member
  const [members, setMembers] = useState([]);   // membros do projeto (gestão de admins)

  const activeDoc = docs.find(d=>d.id===activeId) || null;
  const isAdmin = role==='admin';

  // codificadores presentes no documento ativo (para o filtro "Ver:")
  // usa created_by quando disponível (sessão ativa); cai em author_name para codificações
  // importadas de QDPX que chegam sem uuid (created_by === null)
  const coders = useMemo(()=>{
    const byId = {}; const byName = {};
    codings.filter(c=>c.layer!=='final').forEach(c=>{
      if(c.created_by) byId[c.created_by] = c.author_name||'anônimo';
      else if(c.author_name) byName[c.author_name] = true;
    });
    const fromId = Object.entries(byId).map(([id,name])=>({id, name}));
    // inclui autores por nome que não coincidam com alguém já indexado por uuid
    const fromName = Object.keys(byName)
      .filter(n=>!fromId.find(x=>x.name===n))
      .map(n=>({id:'__nm__'+n, name:n}));
    return [...fromId, ...fromName];
  }, [codings]);

  // codificações visíveis no leitor conforme o filtro de camada/codificador
  const visibleCodings = useMemo(()=>{
    // projeto individual: um unico codificador, sem reconciliacao e sem seletor "Ver:".
    // Mostra TODAS as codificacoes (qualquer camada) — senao codigos importados de .qdpx
    // (que entram na camada 'final', mas podem estar em 'individual' por historico de modo)
    // ficariam invisiveis no leitor. buildRuns dedup por posicao, entao nao ha risco real.
    if(projectMode==='individual') return codings;
    if(viewCoder==='final') return codings.filter(c=>c.layer==='final');
    const indiv = codings.filter(c=>c.layer!=='final');
    if(viewCoder==='mine') return indiv.filter(c=>c.created_by===user?.id);
    if(viewCoder==='all') return indiv;
    // id baseado em nome (importados de QDPX)
    if(viewCoder.startsWith('__nm__')){ const nm=viewCoder.slice(6); return indiv.filter(c=>c.author_name===nm); }
    return indiv.filter(c=>c.created_by===viewCoder);
  }, [codings, viewCoder, user, projectMode]);

  /* lista "Meus Projetos" por conta (cache local, complementa o servidor) */
  const recentKey = (st)=> 'lastro:projects:'+((st||store)?.currentUser?.()?.id || 'anon');
  const getRecent = (st)=>{ try{ return JSON.parse(localStorage.getItem(recentKey(st))||'[]'); }catch(e){ return []; } };
  const removeRecent = (p, st)=>{ try{ const k=recentKey(st||store); localStorage.setItem(k, JSON.stringify(getRecent(st||store).filter(x=>x.code!==p.code))); }catch(e){} };
  const pushRecent = (p, st)=>{ try{ const k=recentKey(st); const list=getRecent(st).filter(x=>x.code!==p.code);
    list.unshift({ id:p.id, name:p.name, code:p.code, at:Date.now() }); localStorage.setItem(k, JSON.stringify(list.slice(0,30))); }catch(e){} };

  const loadMyProjects = useCallback(async ()=>{
    if(!store){ setMyProjects([]); return; }
    let list = null;
    try{ list = await store.listMyProjects?.(); }catch(e){}
    const local = getRecent();
    if(list && list.length){ const codes=new Set(list.map(p=>p.code)); list=[...list, ...local.filter(p=>!codes.has(p.code))]; }
    else { list = local; }
    setMyProjects(list);
  }, [store, user]); // eslint-disable-line
  useEffect(()=>{ if(phase==='gate' || account) loadMyProjects(); }, [phase, account, loadMyProjects]);

  const openProject = (p)=>{
    setProject(p); setProjectMode(p.mode||'collective');
    // projetos individuais nao tem camada "individual" relevante: tudo fica no gabarito (final)
    setVizLayer(p.mode==='individual' ? 'final' : 'individual');
  };

  /* online / offline + flush da fila de escrita ao recuperar conexão */
  useEffect(()=>{
    const goOnline = ()=>{ setOnline(true); if(store?.flush) store.flush(); };
    const goOffline = ()=>setOnline(false);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    if(store?.onPendingChange) store.onPendingChange(setPending);
    if(store?.onSaveError) store.onSaveError(setSaveError);
    if(store?.onBackupStatus) store.onBackupStatus(setBackupStatus);
    return ()=>{ window.removeEventListener('online',goOnline); window.removeEventListener('offline',goOffline); };
  }, [store]);

  /* apos autenticar (sessao existente ou login): reentra no projeto salvo ou vai pro gate */
  async function afterAuth(st, display){
    setUser(st.currentUser());

  // cor personalizada: so o nivel 0 escolhe; a cascata propaga para todos os descendentes
  async function setCodeColor(rootCode, hex){
    if(!isAdmin){ setErr('Apenas administradores podem alterar a cor de uma família de código.'); return; }
    const hueDeg = hex==='gray' ? -1 : hex ? hexToHue(hex) : null;
    const ids = new Set([rootCode.id]);
    let added = true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); }
    for(const id of ids) await store.updateCode(id, { hue_deg: hueDeg });
    setCodes(x=>x.map(c=>ids.has(c.id) ? {...c, hue_deg:hueDeg} : c));
  }

  async function saveQualilab(){
