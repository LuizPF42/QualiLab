  // autenticacao por header "api-key" e chave obrigatoria — tratado pela Edge Function.
  // baseUrl = endpoint "v1" do recurso (https://SEU-RECURSO.openai.azure.com/openai/v1);
  // modelo = nome do DEPLOYMENT criado no portal do Azure (nao o nome do modelo base).
  { id:'azure', label:'Azure OpenAI', azure:true, custom:true, models:[] },
  // provedor "personalizado": sem lista fixa de modelos (custom:true) — o pesquisador
  // preenche URL base + modelo em texto livre. Cobre qualquer API compativel com o formato
  // classico da OpenAI (/chat/completions): DeepSeek, Mistral, Qwen hospedado, ou um
  // servidor local (Ollama/vLLM) exposto numa URL publica (a Edge Function roda no servidor
  // do Supabase, nao alcanca localhost da maquina do pesquisador sem tunel).
  { id:'custom', label:'Personalizado', custom:true, models:[] },
];
// configuracao pessoal de IA (BYOK) — guardada so no localStorage de quem configurou em
// "Minha Conta". Ausente = usa a chave/modelo compartilhados do projeto (comportamento
// de sempre); a Edge Function decide isso, aqui so manda o que tiver preenchido.
function getAIConfig(){
  try{
    return {
      provider: localStorage.getItem('qualilab:ai_provider') || 'gemini',
      apiKey: localStorage.getItem('qualilab:ai_key') || '',
      model: localStorage.getItem('qualilab:ai_model') || '',
      baseUrl: localStorage.getItem('qualilab:ai_baseurl') || '',
    };
  }catch(e){ return { provider:'gemini', apiKey:'', model:'', baseUrl:'' }; }
}
async function askAI(prompt){
  const cfg = getAIConfig();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/ai-ask`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, provider: cfg.provider, ...(cfg.apiKey ? { apiKey: cfg.apiKey } : {}), ...(cfg.model ? { model: cfg.model } : {}), ...(cfg.baseUrl ? { baseUrl: cfg.baseUrl } : {}) }),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || data.error) throw new Error(data.error || `Erro ${res.status}`);
  return data.text || '';
}

// Motor de conversa multi-turno (Fase 0 do plano de IA assistida). Reaproveita o suporte a
// { system, messages } que a Edge Function ai-ask JA tem — nao substitui askAI (que segue
// servindo o caminho de uma rodada). messages = [{role:'user'|'assistant', content}]; o
// material grande vai no system (prefixo estavel = candidato a prompt caching no provedor).
//
// IMPORTANTE: a ai-ask SO usa body.system no fallback de { prompt } — quando vem body.messages,
// ela ignora body.system e extrai o system de mensagens com role:'system' DENTRO do array.
// Por isso o system entra PREPENDADO como 1a mensagem (role:'system'), nao como campo separado;
// senao o system (= todo o material) seria descartado e o modelo responderia sem contexto.
// Esse caminho funciona em todos os provedores (Gemini/OpenAI/Anthropic/Azure/custom) sem
// precisar redeploy da function. Mandamos body.system tambem, por compatibilidade/inocuo.
async function askAIChat({ system, messages, signal }){
  const cfg = getAIConfig();
  const msgs = [ ...(system ? [{ role:'system', content: system }] : []), ...(messages || []) ];
  const res = await fetch(`${SUPABASE_URL}/functions/v1/ai-ask`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ...(system ? { system } : {}),
      messages: msgs,
      provider: cfg.provider,
      ...(cfg.apiKey ? { apiKey: cfg.apiKey } : {}),
      ...(cfg.model ? { model: cfg.model } : {}),
      ...(cfg.baseUrl ? { baseUrl: cfg.baseUrl } : {}),
    }),
    ...(signal ? { signal } : {}),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || data.error) throw new Error(data.error || `Erro ${res.status}`);
  return data.text || '';
}

// extrai os objetos {...} de NIVEL SUPERIOR de uma string, respeitando strings/escapes —
// usado pra "salvar" operacoes mesmo quando o JSON em volta veio truncado (max_tokens) ou
// malformado. Pula chaves dentro de strings; nao confunde { de dentro de uma string.
function extractBalancedObjects(s){
  const out=[]; let depth=0, start=-1, inStr=false, esc=false;
  for(let i=0;i<s.length;i++){ const ch=s[i];
    if(inStr){ if(esc) esc=false; else if(ch==='\\') esc=true; else if(ch==='"') inStr=false; continue; }
    if(ch==='"'){ inStr=true; continue; }
    if(ch==='{'){ if(depth===0) start=i; depth++; }
    else if(ch==='}'){ if(depth>0){ depth--; if(depth===0 && start>=0){ out.push(s.slice(start,i+1)); start=-1; } } }
  }
  return out;
}

// Parser tolerante de JSON vindo da IA — e o fallback UNIVERSAL do plano (funciona em
// qualquer provedor BYOK sem depender de saida estruturada nativa). Estrategia em camadas:
//   1) recorta um bloco ```json``` se houver, senao do 1o {/[ ao ultimo }/] e tenta JSON.parse
//      (com e sem virgulas-sobrando), cobrindo o caso comum de resposta bem-formada.
//   2) SALVAMENTO: se o parse falhar (tipico de saida truncada por max_tokens, em que o objeto
//      { "operations": [ ... } nunca fecha), localiza o array "operations" e extrai dele os
//      objetos {...} balanceados que parsearem individualmente — recupera as operacoes
//      completas e descarta so a ultima cortada. Marca _salvaged pra UI avisar.
// Devolve null se nada der. Quem chama trata o erro (e pode mostrar a resposta crua).
function parseAIJson(text){
  if(!text) return null;
  let s = String(text).trim();
  const fenced = s.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if(fenced) s = fenced[1].trim();
  const firstObj = s.indexOf('{'), firstArr = s.indexOf('[');
  let start = -1, closeCh = '}';
  if(firstArr >= 0 && (firstObj < 0 || firstArr < firstObj)){ start = firstArr; closeCh=']'; }
  else if(firstObj >= 0){ start = firstObj; }
  const last = start>=0 ? s.lastIndexOf(closeCh) : -1;
  const core = start>=0 ? s.slice(start, last>start ? last+1 : s.length) : s;
  for(const t of [core, core.replace(/,\s*([}\]])/g, '$1')]){ // crua e sem virgula-sobrando
    try{ return JSON.parse(t); }catch(e){}
  }
  // salvamento de operacoes (cobre truncamento): varre o conteudo do array "operations"
  const opsKey = s.search(/["']operations["']/);
  const scanFrom = opsKey>=0 ? s.slice(s.indexOf('[', opsKey) + 1) : s;
  const objs = extractBalancedObjects(scanFrom);
  const ops = [];
  for(const o of objs){ try{ const p = JSON.parse(o); if(p && typeof p==='object') ops.push(p); }catch(e){} }
  const opLike = ops.filter(o=>o.op);
  if(opLike.length){
    const sum = s.match(/["']summary["']\s*:\s*"((?:[^"\\]|\\.)*)"/);
    return { operations: opLike, summary: sum ? sum[1] : '', _salvaged: true };
  }
  return null;
}

/* ============ ReportView — aba Relatório ============
   Montador: o pesquisador liga/desliga seções por checkbox e o relatório se monta
   ao vivo no painel direito. Imprime só o relatório (#report-print + CSS @media print). */
const REPORT_GROUPS = [
  { group:'Visão geral', items:[
    { id:'resumo',    label:'Resumo do projeto',  desc:'Nome, tipo, totais e codificadores.' },
    { id:'docs_list', label:'Lista de documentos', desc:'Nomes dos documentos do projeto.' },
  ]},
  { group:'Esquema', items:[
    { id:'cat_count',  label:'Quantas categorias',   desc:'Número total de categorias.' },
    { id:'cat_list',   label:'Quais categorias',     desc:'Lista das categorias, com o tipo.' },
    { id:'code_count', label:'Quantos códigos',      desc:'Número de códigos de Hierarquia 0 (raiz).' },
    { id:'sub_count',  label:'Quantos sub-códigos',  desc:'Número de códigos com pai (subníveis).' },
    { id:'code_list',  label:'Quais códigos',        desc:'Lista dos códigos de Hierarquia 0.' },
    { id:'sub_list',   label:'Quais sub-códigos',    desc:'Lista dos sub-códigos, com o caminho do pai.' },
  ]},
  { group:'Resultados', items:[
    { id:'freq',       label:'Frequência de códigos',     desc:'Quantas vezes cada código foi aplicado.' },
    { id:'categorias', label:'Distribuição por categoria', desc:'Documentos por valor de cada categoria fechada.' },
    { id:'trechos',    label:'Trechos por código',        desc:'Citações agrupadas por código e documento.' },
    { id:'unused',     label:'Códigos não utilizados',    desc:'Códigos sem nenhuma codificação.' },
  ]},
];

function ReportView({ project, projectMode, docs, cats, codes, codeById, codePath, allCodings, allValues, store, view, onView, coders:projCoders, userId, mode, memos }){
  const [enabled, setEnabled] = useState(()=>new Set(['credito','resumo','freq']));
  const [title, setTitle] = useState('');
  const [rmode, setRmode] = useState('ati'); // ati | padrao | w3c — interativo é o padrão (incentivar)
  const [anonAuthors, setAnonAuthors] = useState(false); // ocultar autoria (revisão cega) nas saídas de transparência
  const toggle = (id)=> setEnabled(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const on = (id)=> enabled.has(id);

  // codificações do recorte "Ver:" compartilhado (mesma fonte das outras telas)
  const codingsForReport = useMemo(()=>
    codingsForView(allCodings, view, userId, projectMode)
  , [allCodings, view, userId, projectMode]);

  const docById = useMemo(()=>Object.fromEntries(docs.map(d=>[d.id,d])), [docs]);
  const pathOf = (id)=> codePath ? codePath(id).join(' ▸ ') : (codeById[id]?.name||id);
  const swatch = (c)=> html`<span class="swatch" style=${`display:inline-block;vertical-align:middle;background:${codeColor(c.hue,c.depth,c.hue_deg).solid}`}></span>`;
  const kindLabel = (k)=> (CAT_KINDS.find(x=>x.id===k)||{}).label || k;

  const topCodes = useMemo(()=>codes.filter(c=>!c.parent_id), [codes]);
  const subCodes = useMemo(()=>codes.filter(c=>c.parent_id), [codes]);

  // contagem (direta) por código
  const countMap = useMemo(()=>{
    const m={}; codingsForReport.forEach(c=>{ m[c.code_id]=(m[c.code_id]||0)+1; }); return m;
  }, [codingsForReport]);
  // frequência por código, do mais usado ao menos
  const freq = useMemo(()=>
    codes.map(c=>({ code:c, n:countMap[c.id]||0 })).filter(x=>x.n>0).sort((a,b)=>b.n-a.n)
  , [countMap, codes]);
  const unusedCodes = useMemo(()=>codes.filter(c=>!countMap[c.id]), [countMap, codes]);
  const anyEsq = ['cat_count','cat_list','code_count','sub_count','code_list','sub_list'].some(on);

  // distribuição por categoria fechada: contagem de documentos por valor (usa gabarito quando há)
  const catDist = useMemo(()=>{
    const closed = cats.filter(c=>CAT_HAS_OPTIONS(c.kind)||c.kind==='date');
    return closed.map(cat=>{
      const counts={};
      docs.forEach(d=>{
        // segue o recorte "Ver:": gabarito usa só o final; individuais usam as respostas individuais
        const vals = valuesForView(allValues, d.id, cat.id, view, userId, projectMode);
        const seen=new Set();
        vals.forEach(v=>{ if(v==null) return; String(v).split(CAT_MULTI_SEP).forEach(part=>{ const k=part.trim(); if(k && !seen.has(k)){ seen.add(k); counts[k]=(counts[k]||0)+1; } }); });
      });
      const rows = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
      return { cat, rows };
    }).filter(x=>x.rows.length>0);
  }, [cats, docs, allValues, view, userId, projectMode]);

  // trechos por código: agrupa codings por código, depois por documento
  const trechosByCode = useMemo(()=>{
    const byCode={};
    codingsForReport.forEach(c=>{ (byCode[c.code_id]=byCode[c.code_id]||[]).push(c); });
    return freq.map(({code})=>{
      const list = byCode[code.id]||[];
      const byDoc={};
      list.forEach(c=>{ (byDoc[c.document_id]=byDoc[c.document_id]||[]).push(c); });
      const docs2 = Object.entries(byDoc)
        .map(([docId,cods])=>({ docId, name:docById[docId]?.name||docId,
          cods:cods.slice().sort((a,b)=>a.span_start-b.span_start) }))
        .sort((a,b)=>a.name>b.name?1:-1);
      return { code, docs:docs2 };
    }).filter(x=>x.docs.length>0);
  }, [codingsForReport, freq, docById]);

  const totalCodings = codingsForReport.length;

  // codificadores: nomes distintos das codificações individuais (o trabalho de codificação).
  // Só faz sentido em projeto coletivo; ordena alfabeticamente.
  const coders = useMemo(()=>{
    if(projectMode!=='collective') return [];
    const s=new Set();
    allCodings.filter(c=>c.layer!=='final').forEach(c=>{ const n=(c.author_name||'').trim(); if(n) s.add(n); });
    return [...s].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  }, [allCodings, projectMode]);

  // monta o relatório como texto simples (sem marcações .md) — para colar direto em Word/Docs
  function buildText(){
    const L=[]; const H=(t)=>L.push('',''+t,'');
    L.push(title.trim()||project?.name||'Relatório');
    L.push('Gerado em '+new Date().toLocaleDateString('pt-BR')+(projectMode==='collective'?' · Ver: '+viewLabel(view, projCoders):''));
    if(on('resumo')){ H('Resumo');
      L.push(`Projeto ${project?.name||''} (${projectMode==='collective'?'coletivo':'individual'}), com ${docs.length} documento(s), ${codes.length} código(s), ${cats.length} categoria(s) e ${totalCodings} codificação(ões).`+(on('credito')?' O projeto foi codificado por meio da ferramenta QualiLab.':''));
      if(coders.length) L.push('', 'Codificado por: '+coders.join(', ')+'.');
    }
    if(on('docs_list')){ H('Documentos');
      if(!docs.length) L.push('(nenhum documento)');
      else docs.forEach((d,i)=> L.push(`${i+1}. ${d.name}`));
    }
    if(anyEsq){ H('Esquema');
      if(on('cat_count')) L.push(`Total de ${cats.length} categoria(s).`);
      if(on('cat_list')){ L.push(''); cats.forEach(c=> L.push(`• ${c.name} (${kindLabel(c.kind)})`)); }
      if(on('code_count')) L.push(`${topCodes.length} código(s) de Hierarquia 0 (raiz).`);
      if(on('sub_count')) L.push(`${subCodes.length} sub-código(s).`);
      if(on('code_list')){ L.push('','Códigos de Hierarquia 0:'); topCodes.forEach(c=> L.push(`• ${c.name}`)); }
      if(on('sub_list')){ L.push('','Sub-códigos:'); if(!subCodes.length) L.push('(nenhum)'); else subCodes.forEach(c=> L.push(`• ${pathOf(c.id)}`)); }
    }
    if(on('freq')){ H('Frequência de códigos');
      if(!freq.length) L.push('(nenhuma codificação)');
      else freq.forEach(({code,n})=> L.push(`• ${pathOf(code.id)}: ${n}`));
    }
    if(on('categorias')){ H('Distribuição por categoria');
      if(!catDist.length) L.push('(nenhuma categoria fechada com valores)');
      else catDist.forEach(({cat,rows})=>{ L.push('',cat.name+':');
        rows.forEach(([val,n])=> L.push(`• ${val}: ${n}`)); });
    }
    if(on('trechos')){ H('Trechos por código');
      if(!trechosByCode.length) L.push('(nenhum trecho codificado)');
      else trechosByCode.forEach(({code,docs:ds})=>{ L.push('',pathOf(code.id));
        ds.forEach(d=>{ L.push('',d.name+':');
          d.cods.forEach(c=> L.push(`"${c.quote}"${c.author_name?' — '+c.author_name:''}`)); }); });
    }
    if(on('unused')){ H('Códigos não utilizados');
      if(!unusedCodes.length) L.push('(todos os códigos foram utilizados)');
      else unusedCodes.forEach(c=> L.push(`• ${pathOf(c.id)}`));
    }
    return L.join('\n').replace(/\n{3,}/g,'\n\n').trim()+'\n';
  }
  const [copied, setCopied] = useState(false);
  async function copy(){
    try{ await navigator.clipboard.writeText(buildText()); setCopied(true); setTimeout(()=>setCopied(false),1800); }
    catch(e){ alert('Não foi possível copiar automaticamente. '+(e.message||'')); }
  }

  // --- modos de transparência: prévia ao vivo + exportação (só constrói no modo ativo) ---
  const readerHTML = useMemo(()=> rmode==='ati' ? buildTransparencyReaderHTML(docs, codes, allCodings, memos||[], project, anonAuthors) : ''
  , [rmode, docs, codes, allCodings, memos, project, anonAuthors]);
  const w3cText = useMemo(()=> rmode==='w3c' ? JSON.stringify(buildWebAnnotations(docs, codes, allCodings, memos||[], project, anonAuthors), null, 2) : ''
  , [rmode, docs, codes, allCodings, memos, project, anonAuthors]);
  const w3cTotal = useMemo(()=> rmode==='w3c' ? (buildWebAnnotations(docs, codes, allCodings, memos||[], project, anonAuthors).total||0) : 0
  , [rmode, docs, codes, allCodings, memos, project, anonAuthors]);
  const RMODES = [
    { id:'ati',    label:'Relatório Interativo (ATI)', desc:'Documentos com grifos clicáveis e nota analítica. HTML publicável.' },
    { id:'padrao', label:'Relatório Padrão',         desc:'Resumo: contagens, frequências, trechos. Imprimir/PDF ou copiar.' },
    { id:'w3c',    label:'Web Annotation (W3C)',      desc:'Anotações JSON-LD no padrão aberto (Dataverse, hypothes.is, Anno-REP).' },
  ];

  return html`<section class="pane left" style="flex:1 1 100%;border-right:none;max-width:none">
    <div class="pane-head no-print" style="flex:none;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span class="field-label" style="margin:0">${(RMODES.find(m=>m.id===rmode)||{}).label}</span>
      <div class="row" style="gap:8px;flex-wrap:wrap">
        ${rmode==='padrao' && html`<button class="btn sm" onClick=${copy} disabled=${enabled.size===0}>${copied?'Copiado ✓':'Copiar texto'}</button>
          <button class="btn sm primary" onClick=${()=>window.print()} disabled=${enabled.size===0}>Imprimir / PDF</button>`}
        ${rmode==='ati' && html`<button class="btn sm primary" onClick=${()=>exportTransparencyReader(docs, codes, allCodings, memos||[], project, anonAuthors)} disabled=${docs.length===0}>Exportar HTML</button>`}
        ${rmode==='w3c' && html`<button class="btn sm primary" onClick=${()=>exportWebAnnotations(docs, codes, allCodings, memos||[], project, anonAuthors)} disabled=${docs.length===0}>Exportar JSON</button>`}
      </div>
    </div>
    <div class="pane-body scroll" style="display:flex;gap:0;align-items:flex-start">

      <!-- seletor de modo + montador (não imprime) -->
      <aside class="no-print" style="flex:0 0 280px;position:sticky;top:0;padding:16px;border-right:1px solid var(--line)">
        <p class="field-label" style="margin:0 0 8px">Tipo de saída</p>
        <div style="margin-bottom:16px">
          ${RMODES.map(m=>html`<button key=${m.id} class="opt ${rmode===m.id?'on':''}"
              style="display:block;width:100%;text-align:left;margin-bottom:6px;cursor:pointer;padding:9px 11px"
              onClick=${()=>setRmode(m.id)}>
            <span style="font-weight:600;display:block">${m.label}</span>
            <span class="meta" style="font-size:11px">${m.desc}</span>
          </button>`)}
        </div>

        ${rmode==='padrao' && html`<div>
        <label style="display:flex;gap:7px;align-items:center;cursor:pointer;margin:0 0 14px;font-size:12px;color:var(--ink-soft)">
          <input type="checkbox" checked=${on('credito')} onChange=${()=>toggle('credito')} />
          Creditar QualiLab no resumo
        </label>

        <p class="field-label" style="margin:0 0 8px">Seções do relatório</p>
        <div class="field" style="margin-bottom:10px">
          <div class="field-label">Título (opcional)</div>
          <input class="txtin" placeholder=${project?.name||'Relatório'} value=${title} onInput=${e=>setTitle(e.target.value)} />
        </div>
        ${((mode==='cloud' && projectMode==='collective') || (projCoders||[]).length>1) && html`<div class="field" style="margin-bottom:14px">
          <div class="field-label">Ver</div>
          <${ViewSelect} value=${view} onChange=${onView} coders=${projCoders} userId=${userId} projectMode=${projectMode} mode=${mode} label="" />
        </div>`}
        ${REPORT_GROUPS.map(g=>html`<div key=${g.group} style="margin-bottom:12px">
          <p class="meta" style="font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.04em;margin:0 0 4px">${g.group}</p>
          ${g.items.map(s=>html`<label key=${s.id} class="opt ${on(s.id)?'on':''}"
              style="display:flex;gap:8px;align-items:flex-start;width:100%;text-align:left;margin-bottom:6px;cursor:pointer;padding:8px 10px">
            <input type="checkbox" checked=${on(s.id)} onChange=${()=>toggle(s.id)} style="margin-top:2px" />
            <span><span style="font-weight:600;display:block">${s.label}</span>
              <span class="meta" style="font-size:11px">${s.desc}</span></span>
          </label>`)}
        </div>`)}
        </div>`}

        ${rmode==='ati' && html`<div class="meta" style="font-size:12px;line-height:1.6">
          Página HTML auto-contida (sem rede): cada documento com os trechos grifados e, ao clicar, a nota analítica e o excerto. Equivalente ao <i>overlay</i> do ATI, hospedável (ex.: GitHub Pages).
          <p style="margin:8px 0 0">A nota do <b>trecho</b> tem prioridade sobre a do código. Trechos de censura são mascarados.</p>
        </div>`}
        ${rmode==='w3c' && html`<div class="meta" style="font-size:12px;line-height:1.6">
          Anotações no padrão aberto <b>W3C Web Annotation</b> (JSON-LD) — a língua de dados sob o ATI do QDR, hypothes.is, Anno-REP e Dataverse. Cada trecho vira uma anotação com seletor de posição/citação + nota analítica.
          <p style="margin:8px 0 0">${w3cTotal} anotação(ões). Censura mascarada.</p>
        </div>`}
        ${rmode!=='padrao' && html`<label style="display:flex;gap:8px;align-items:flex-start;cursor:pointer;margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft)">
          <input type="checkbox" checked=${anonAuthors} onChange=${()=>setAnonAuthors(v=>!v)} style="margin-top:2px" />
          <span><b>Ocultar autoria</b> (revisão cega) — remove o nome dos codificadores da prévia e da exportação. Use ao preparar o material para avaliador cego (double-blind).</span>
        </label>`}
      </aside>

      ${rmode==='padrao' && html`

/* ============ CODIFICAR COM IA — organizacao de codigos (Fase 2 do plano) ============
   A IA PROPOE reorganizar o esquema de codigos (caso classico de grounded theory: centenas
   de codigos soltos no mesmo nivel apos a codificacao aberta); o pesquisador APROVA / recusa
   cada operacao, com a justificativa (reason) visivel. Nada e aplicado sem confirmacao
   (mesmo espirito do allowRedact e do "Ver prompt completo"). Aplicar reusa a MESMA logica
   ja provada em SchemaCodesView — reparentSubtree (recalcula profundidade/cor da subarvore),
   merge via addCoding+deleteCoding preservando filhos, proteção contra ciclo (isDescendantOf).

   IDs: os codigos reais sao uuids longos; aqui mapeamos cada um pra um id curto (#c1, #c2...)
   pra IA referenciar de forma barata e legivel. Toda operacao tem seus ids traduzidos de
   volta e VALIDADOS contra os codigos reais — id inexistente e descartado em silencio. */

// uma operacao por tipo, com descricao legivel pra previa antes->depois e o reason da IA.
const IA_COD_SYS_REGRAS = `Sua tarefa é propor uma reorganização do esquema de códigos e devolver SOMENTE um objeto JSON (sem texto fora dele), no formato:
{
  "operations": [
    { "op": "merge",    "survivor": "#c2", "merged": ["#c5","#c8"], "reason": "..." },
    { "op": "group",    "children": ["#c3","#c4"], "parent": "#c1", "reason": "..." },
    { "op": "group",    "children": ["#c6","#c7"], "parent": null, "newParentName": "Nome da nova família", "reason": "..." },
    { "op": "reparent", "id": "#c9", "newParent": "#c1", "reason": "..." },
    { "op": "rename",   "id": "#c4", "newName": "Novo nome", "reason": "..." },
    { "op": "promote",  "id": "#c7", "reason": "..." }
  ],
  "summary": "uma frase resumindo a lógica geral da proposta"
}
Significado: merge = fundir códigos redundantes num só (survivor sobrevive, merged somem e seus trechos passam pro survivor); group = manter os códigos separados, mas agrupá-los como filhos de um pai (existente em "parent", ou novo com "newParentName" e parent=null); reparent = mover um código pra dentro de outro pai; rename = renomear; promote = tornar um código uma família de topo (Hierarquia 0).
Regras: use SOMENTE os ids curtos que aparecem na lista de códigos (não invente ids nem use nomes no lugar do id); explique CADA operação no campo "reason" (em português, em UMA frase curta — não use quebras de linha dentro de strings JSON); prefira poucas famílias claras a muitos níveis; sinalize incerteza no próprio "reason" quando houver; não proponha operações triviais ou redundantes. Proponha NO MÁXIMO 20 operações por resposta — se houver mais a fazer, priorize as mais importantes e diga no "summary" que há mais a fazer numa próxima rodada (a resposta não pode ser longa demais ou será cortada). Se o esquema já estiver bem organizado, devolva "operations": [] e diga isso no "summary". Devolva apenas o JSON, sem texto antes nem depois, sem comentários.`;

function IACodificarPanel({ project, docs, codes, codeById, codePath, store, allCodings, count, isAdmin, reload, loadAll, onAdd, memos }){
  const [history, setHistory] = useState([]);   // [{role:'user'|'assistant', content}] enviado ao modelo
  const [ops, setOps] = useState([]);            // operacoes validas da ultima resposta, ja traduzidas+validadas
  const [summary, setSummary] = useState('');    // resumo textual da IA
  const [dropped, setDropped] = useState(0);     // quantas operacoes vieram invalidas (ids inexistentes etc.)
  const [salvaged, setSalvaged] = useState(false); // JSON veio truncado/malformado e operacoes foram recuperadas
  const [rawFail, setRawFail] = useState('');    // resposta crua quando o parse falha de vez (pra diagnostico)
  const [decided, setDecided] = useState({});    // { opKey: true|false } aprovar/recusar por operacao (default aprovar)
  const [instruction, setInstruction] = useState(''); // 1o turno / follow-up livre do pesquisador
  const [withSamples, setWithSamples] = useState(true); // incluir amostra de trechos por codigo
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [applyMsg, setApplyMsg] = useState('');
  const [showPrompt, setShowPrompt] = useState(false);

  // memo do projeto (mesma fonte que o IAAnalisarPanel usa pra contextualizar)
  const projectMemo = (memos||[]).find(m=>m.scope==='project' && (m.target_id==null || m.target_id===project.id));

  // ids curtos estaveis (#c1..) <-> uuid real. Recalcula quando a lista de codigos muda.
  const { shortToId, idToShort } = useMemo(()=>{
    const s2i = {}, i2s = {};
    codes.forEach((c,i)=>{ const sh = 'c'+(i+1); s2i[sh] = c.id; i2s[c.id] = sh; });
    return { shortToId: s2i, idToShort: i2s };
  }, [codes]);
  const resolveId = (ref)=>{
    if(ref==null) return null;
    const key = String(ref).replace(/^#/, '').trim();
    if(shortToId[key]) return shortToId[key];      // id curto (#c3 ou c3)
    if(codeById[key]) return key;                  // a IA mandou o uuid real direto
    return null;
  };
  const shortOf = (realId)=> idToShort[realId] || '?';
  const nameOf = (realId)=> codeById[realId]?.name || '(removido)';
  const labelOf = (realId)=> `#${shortOf(realId)} "${nameOf(realId)}"`;

  // censura: mascara amostras de trechos de codigos is_redaction (cobertura por codigo, simples
  // — basta pra "dica" de organizacao; a versao com sobreposicao fica no IAAnalisarPanel).
  const maskedCodeIds = useMemo(()=> new Set(codes.filter(c=>c.is_redaction).map(c=>c.id)), [codes]);

  // ---- MATERIAL (vai no system, prefixo estavel) ----
  const codeListBlock = useMemo(()=>{
    const lines = codes.map(c=>{
      const parent = c.parent_id ? '#'+shortOf(c.parent_id) : '(raiz)';
      return `#${shortOf(c.id)} | "${c.name}" | pai: ${parent} | profundidade ${c.depth??0} | ${count[c.id]||0} trechos`;
    });
    return 'LISTA DE CÓDIGOS (id | nome | pai | profundidade | nº de trechos — esta lista é COMPLETA):\n' + (lines.join('\n') || '(nenhum código)');
  }, [codes, count, idToShort]);

  const excerptBlock = useMemo(()=>{
    if(!withSamples) return '';
    const byCode = {};
    (allCodings||[]).forEach(c=>{ (byCode[c.code_id] = byCode[c.code_id]||[]).push(c); });
    const blocks = codes.map(c=>{
      const list = (byCode[c.id]||[]).slice(0, 3); // ate 3 trechos ilustrativos por codigo
      if(!list.length) return null;
      const quotes = list.map(co=> `- "${maskedCodeIds.has(c.id) ? '[trecho censurado]' : (co.quote||'').slice(0,240)}"`);
      return `#${shortOf(c.id)} "${c.name}":\n${quotes.join('\n')}`;
    }).filter(Boolean);
    if(!blocks.length) return '';
    return '\n\nAMOSTRA DE TRECHOS POR CÓDIGO (até 3 por código, apenas ilustrativos — NÃO são todos os trechos):\n' + blocks.join('\n\n');
  }, [codes, allCodings, withSamples, maskedCodeIds, idToShort]);

  const systemPrompt = useMemo(()=>{
    const memo = projectMemo?.content?.trim();
    let mat = codeListBlock + excerptBlock;
    if(mat.length > IA_TOTAL_CHAR_LIMIT){
      // preserva a lista de codigos inteira (essencial); trunca a amostra de trechos primeiro
      const budget = Math.max(0, IA_TOTAL_CHAR_LIMIT - codeListBlock.length);
      mat = codeListBlock + (budget>200 ? excerptBlock.slice(0, budget) + '\n[...amostra truncada — limite de tamanho...]' : '\n[amostra de trechos omitida — esquema grande]');
    }
    return [
      'Você é um assistente de análise qualitativa especializado em organização de esquemas de códigos (codebooks), no espírito da grounded theory. Trabalha em português.',
      memo ? `MEMO DO PROJETO (objetivo da pesquisa): ${memo}` : '(Sem memo de projeto registrado.)',
      'DESCRIÇÃO DO MATERIAL: abaixo está a lista COMPLETA dos códigos do projeto (com hierarquia e contagem de trechos) e, quando disponível, uma amostra ilustrativa de trechos por código. A amostra NÃO é exaustiva — não tire conclusões sobre a quantidade de trechos a partir dela. Não critique a cobertura nem a quantidade de codificação: o foco é só a ORGANIZAÇÃO dos códigos.',
      'MATERIAL:\n' + mat,
      IA_COD_SYS_REGRAS,
    ].join('\n\n');
  }, [codeListBlock, excerptBlock, projectMemo]);

  // ---- VALIDACAO: traduz ids curtos -> reais e descarta operacoes invalidas ----
  const validateOps = (rawOps)=>{
    const out = []; let bad = 0;
    const seen = new Set(); // ids ja "consumidos" por um merge/group anterior nesta proposta
    for(const o of (Array.isArray(rawOps)?rawOps:[])){
      const op = String(o?.op||'').toLowerCase();
      const reason = String(o?.reason||'').trim();
      if(op==='merge'){
        const survivor = resolveId(o.survivor);
        const merged = (Array.isArray(o.merged)?o.merged:[]).map(resolveId).filter(id=>id && id!==survivor && !seen.has(id));
        if(survivor && merged.length){ merged.forEach(id=>seen.add(id)); out.push({ op, survivor, merged, reason }); }
        else bad++;
      } else if(op==='group'){
        const parent = o.parent!=null ? resolveId(o.parent) : null;
        const newParentName = String(o.newParentName||'').trim();
        const children = (Array.isArray(o.children)?o.children:[]).map(resolveId).filter(Boolean);
        if(children.length && (parent || newParentName)) out.push({ op, parent, newParentName, children, reason });
        else bad++;
      } else if(op==='reparent'){
        const id = resolveId(o.id), newParent = resolveId(o.newParent);
        if(id && newParent && id!==newParent) out.push({ op, id, newParent, reason });
        else bad++;
      } else if(op==='rename'){
        const id = resolveId(o.id), newName = String(o.newName||'').trim();
        if(id && newName) out.push({ op, id, newName, reason });
        else bad++;
      } else if(op==='promote'){
        const id = resolveId(o.id);
        if(id && codeById[id]?.parent_id) out.push({ op, id, reason });
        else bad++;
      } else bad++;
    }
    return { out, bad };
  };

  const opKey = (o, i)=> i+':'+o.op; // chave estavel pra map de decisao (a lista e recriada por turno)

  // ---- ENVIAR (1o turno ou follow-up) ----
  async function send(){
    if(busy) return;
    if(!codes.length){ setErr('Não há códigos no projeto para organizar.'); return; }
    const base = instruction.trim() || (history.length
      ? 'Continue refinando a proposta.'
      : 'Analise a lista de códigos fornecida e proponha uma reorganização (mesclar redundâncias, agrupar em famílias coerentes, mover, renomear ou promover quando fizer sentido).');
    // reforco do formato no turno do usuario — modelos menores as vezes respondem em prosa
    const userTurn = base + ' Responda APENAS com o objeto JSON no formato especificado, sem texto antes ou depois.';
    setErr(''); setApplyMsg(''); setRawFail(''); setSalvaged(false); setBusy(true);
    const nextHistory = [...history, { role:'user', content: userTurn }];
    setHistory(nextHistory); setInstruction('');
    try{
      const text = await askAIChat({ system: systemPrompt, messages: nextHistory });
      setHistory(h=>[...h, { role:'assistant', content: text }]);
      const parsed = parseAIJson(text);
      if(!parsed){
        // parse falhou de vez: mostra a resposta crua pra diagnosticar (truncada? texto em vez de JSON?)
        setErr('A IA não devolveu um JSON válido. Veja a resposta abaixo — se estiver cortada no fim, o esquema é grande demais: peça menos operações por vez, ou desligue a amostra de trechos.');
        setRawFail(text || '(resposta vazia)'); setOps([]); setSummary(''); setDropped(0);
        return;
      }
      setSalvaged(!!parsed._salvaged);
      const { out, bad } = validateOps(parsed.operations);
      setOps(out); setDropped(bad); setSummary(String(parsed.summary||''));
      const dec = {}; out.forEach((o,i)=>{ dec[opKey(o,i)] = true; }); // default: aprovar tudo
      setDecided(dec);
    }catch(e){ setErr(String(e?.message||e)); }
    finally{ setBusy(false); }
  }

  // ---- APLICAR operacoes aprovadas (reusa a logica de SchemaCodesView, sobre um modelo de
  // trabalho local pra nao depender de re-render entre operacoes; reload/loadAll no fim) ----
  async function applyApproved(){
    if(!isAdmin){ setErr('Apenas administradores podem alterar o esquema de códigos.'); return; }
    const approved = ops.filter((o,i)=>decided[opKey(o,i)]);
    if(!approved.length){ setErr('Nenhuma operação aprovada para aplicar.'); return; }
    setErr(''); setBusy(true);
    // modelo de trabalho: copia mutavel dos codigos (intermediarios refletem aqui; o store e a
    // fonte da verdade so depois do reload). _deleted marca codigos ja mesclados/excluidos.
    const work = codes.map(c=>({ ...c }));
    const byId = id => work.find(c=>c.id===id);
    const childrenOf = id => work.filter(c=>c.parent_id===id && !c._deleted);
    const isDescendantOf = (nodeId, ancId)=>{ let p=byId(nodeId)?.parent_id; while(p){ if(p===ancId) return true; p=byId(p)?.parent_id; } return false; };
    async function reparentSubtree(codeId, newParentId, newDepth, adoptColor){
      const node = byId(codeId); if(!node) return;
      const patch = { parent_id:newParentId, depth:newDepth };
      if(adoptColor){ patch.hue=adoptColor.hue; patch.hue_deg=adoptColor.hue_deg ?? null; }
      await store.updateCode(codeId, patch); Object.assign(node, patch);
      const stack=[{id:codeId,depth:newDepth}];
      while(stack.length){ const {id,depth}=stack.pop();
        for(const ch of childrenOf(id)){ const cd=depth+1; const cp={depth:cd};
          if(adoptColor){ cp.hue=adoptColor.hue; cp.hue_deg=adoptColor.hue_deg ?? null; }
          await store.updateCode(ch.id, cp); Object.assign(ch, cp); stack.push({id:ch.id,depth:cd}); }
      }
    }
    let applied=0, skipped=0;
    if(store.beginBatch) store.beginBatch();
    try{
      for(let i=0;i<ops.length;i++){
        const o = ops[i];
        if(!decided[opKey(o,i)]) continue;
        try{
          if(o.op==='merge'){
            const survivor = byId(o.survivor);
            const merged = o.merged.filter(id=>byId(id) && !byId(id)._deleted);
            if(!survivor || survivor._deleted || !merged.length){ skipped++; continue; }
            for(const mid of merged){
              for(const cod of (allCodings||[]).filter(c=>c.code_id===mid)){
                await store.addCoding(project.id, { document_id:cod.document_id, code_id:o.survivor,
                  span_start:cod.span_start, span_end:cod.span_end, quote:cod.quote, layer:cod.layer,
                  created_by:cod.created_by??null, author_name:cod.author_name });
                await store.deleteCoding(cod.id);
              }
            }
            for(const mid of merged){ for(const ch of childrenOf(mid)){ await reparentSubtree(ch.id, o.survivor, survivor.depth+1, { hue:survivor.hue, hue_deg:survivor.hue_deg }); } }
            for(const mid of merged){ await store.deleteCode(mid); const n=byId(mid); if(n) n._deleted=true; }
            applied++;
          } else if(o.op==='group'){
            let parent = o.parent ? byId(o.parent) : null;
            if(!parent){ const created = await onAdd(null, o.newParentName||'Novo agrupamento'); parent = { ...created }; work.push(parent); }
            if(parent._deleted){ skipped++; continue; }
            for(const id of o.children){ const ch = byId(id); if(!ch || ch._deleted || id===parent.id || isDescendantOf(parent.id, id)) continue; await reparentSubtree(id, parent.id, parent.depth+1, { hue:parent.hue, hue_deg:parent.hue_deg }); }
            applied++;
          } else if(o.op==='reparent'){
            const node = byId(o.id), parent = byId(o.newParent);
            if(!node || node._deleted || !parent || parent._deleted || o.id===parent.id || isDescendantOf(parent.id, o.id)){ skipped++; continue; }
            await reparentSubtree(o.id, parent.id, parent.depth+1, { hue:parent.hue, hue_deg:parent.hue_deg });
            applied++;
          } else if(o.op==='rename'){
            const node = byId(o.id); if(!node || node._deleted){ skipped++; continue; }
            await store.updateCode(o.id, { name:o.newName }); node.name=o.newName; applied++;
          } else if(o.op==='promote'){
            const node = byId(o.id); if(!node || node._deleted || !node.parent_id){ skipped++; continue; }
            await reparentSubtree(o.id, null, 0, null); applied++;
          }
        }catch(e){ skipped++; }
      }
    } finally { if(store.endBatch) await store.endBatch(); }
    await reload(); await loadAll();
    setOps([]); setDecided({}); setSummary('');
    setApplyMsg(`${applied} operação(ões) aplicada(s)${skipped?`, ${skipped} ignorada(s)`:''}. Confira o esquema na aba "Esquema ▸ Códigos".`);
    // registra no historico que foi aplicado, pra IA saber o estado num proximo turno
    setHistory(h=>[...h, { role:'user', content: `(Apliquei ${applied} operação(ões) da sua proposta. O esquema mudou.)` }]);
    setBusy(false);
  }

  function reset(){ setHistory([]); setOps([]); setSummary(''); setDropped(0); setDecided({}); setErr(''); setApplyMsg(''); setInstruction(''); setRawFail(''); setSalvaged(false); }

  // ---- descricao legivel de uma operacao (previa antes->depois) ----
  const describe = (o)=>{
    if(o.op==='merge') return html`Mesclar ${o.merged.map(labelOf).join(', ')} → sobrevivente <b>${labelOf(o.survivor)}</b>`;
    if(o.op==='group') return html`Agrupar ${o.children.map(labelOf).join(', ')} sob ${o.parent ? html`<b>${labelOf(o.parent)}</b>` : html`a nova família <b>"${o.newParentName}"</b>`}`;
    if(o.op==='reparent') return html`Mover ${labelOf(o.id)} para dentro de <b>${labelOf(o.newParent)}</b>`;
    if(o.op==='rename') return html`Renomear ${labelOf(o.id)} → <b>"${o.newName}"</b>`;
    if(o.op==='promote') return html`Promover ${labelOf(o.id)} a família de topo (Hierarquia 0)`;
    return o.op;
  };
  const OP_TAG = { merge:'Mesclar', group:'Agrupar', reparent:'Mover', rename:'Renomear', promote:'Promover' };

  const approvedCount = ops.filter((o,i)=>decided[opKey(o,i)]).length;

  return html`<div class="section">
    <p class="h">Codificar com IA — organização de códigos</p>
    <p class="hint" style="margin:0 0 10px">A IA analisa todos os códigos do projeto e <b>propõe</b> uma reorganização (mesclar, agrupar, mover, renomear, promover). Você aprova ou recusa cada operação — <b>nada é aplicado sem a sua confirmação</b>. A aplicação usa a mesma lógica da aba Esquema.</p>

    ${!isAdmin && html`<div class="banner warn" style="margin-bottom:10px">Você não é administrador deste projeto: pode ver as sugestões, mas não aplicá-las.</div>`}

    <div class="card" style="margin-bottom:10px">
      <label class="row" style="gap:6px;font-size:12.5px;cursor:pointer;align-items:center;margin-bottom:8px">
        <input type="checkbox" checked=${withSamples} disabled=${busy} onChange=${e=>setWithSamples(e.target.checked)} />
        Incluir amostra de trechos por código (a IA decide melhor, mas gasta mais tokens)
      </label>
      <textarea class="txtin" rows="2" style="width:100%;resize:vertical;box-sizing:border-box"
        placeholder=${history.length ? 'Responder à IA / refinar (ex.: \"mantenha X separado\", \"agrupe de outro jeito\")…' : 'Instrução opcional para a 1ª proposta (deixe em branco para a IA decidir sozinha)…'}
        value=${instruction} disabled=${busy} onInput=${e=>setInstruction(e.target.value)}></textarea>
      <div class="row" style="gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">
        <button class="btn primary" disabled=${busy || !codes.length} onClick=${send}>${history.length ? 'Enviar refinamento' : 'Propor reorganização'}</button>
        ${history.length>0 && html`<button class="btn ghost" disabled=${busy} onClick=${reset}>Recomeçar</button>`}
        <button class="btn sm ghost" disabled=${busy} onClick=${()=>setShowPrompt(s=>!s)}>${showPrompt?'Ocultar':'Ver'} material enviado</button>
        ${busy && html`<span class="meta">pensando…</span>`}
      </div>
      ${showPrompt && html`<pre style="white-space:pre-wrap;font-family:var(--mono);font-size:11px;background:var(--teal-soft);padding:10px;border-radius:8px;margin-top:8px;max-height:280px;overflow:auto">${systemPrompt}</pre>`}
    </div>

    ${err && html`<div class="banner err" style="margin-bottom:10px">${err}</div>`}
    ${rawFail && html`<details style="margin-bottom:10px"><summary class="meta" style="cursor:pointer">Ver resposta crua da IA (diagnóstico)</summary>
      <pre style="white-space:pre-wrap;font-family:var(--mono);font-size:11px;background:var(--teal-soft);padding:10px;border-radius:8px;margin-top:6px;max-height:280px;overflow:auto">${rawFail}</pre></details>`}
    ${applyMsg && html`<div class="banner warn" style="margin-bottom:10px">${applyMsg}</div>`}
    ${salvaged && html`<div class="banner warn" style="margin-bottom:10px">A resposta da IA veio truncada ou malformada; foram recuperadas as operações completas abaixo (a última pode ter sido descartada). Para uma proposta completa, peça menos operações por vez.</div>`}

    ${summary && html`<div class="card" style="margin-bottom:10px"><b>Resumo da IA:</b> <span dangerouslySetInnerHTML=${{__html: mdLite(summary)}} /></div>`}

    ${ops.length>0 && html`<div style="margin-bottom:10px">
      <div class="row" style="align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
        <b>${ops.length} operação(ões) proposta(s)</b>
        <span class="meta">${approvedCount} marcada(s) para aplicar</span>
        ${dropped>0 && html`<span class="meta">(${dropped} descartada(s) por id inválido)</span>`}
        <div style="flex:1"></div>
        <button class="btn sm ghost" onClick=${()=>{ const d={}; ops.forEach((o,i)=>d[opKey(o,i)]=true); setDecided(d); }}>Aprovar todas</button>
        <button class="btn sm ghost" onClick=${()=>{ const d={}; ops.forEach((o,i)=>d[opKey(o,i)]=false); setDecided(d); }}>Recusar todas</button>
      </div>
      ${ops.map((o,i)=>{ const k=opKey(o,i); const on=!!decided[k]; return html`<div key=${k} class="card" style=${`margin-bottom:8px;opacity:${on?1:0.55}`}>
        <div class="row" style="gap:10px;align-items:flex-start">
          <div style="flex:1;min-width:0">
            <div style=${`font-size:13px;${on?'':'text-decoration:line-through;text-decoration-color:var(--ink-faint)'}`}><span class="pill" style="margin-right:6px">${OP_TAG[o.op]||o.op}</span>${describe(o)}</div>
            ${o.reason && html`<div class="meta" style="margin-top:4px">${o.reason}</div>`}
          </div>
          <div class="row" style="gap:6px;flex-shrink:0">
            <button class=${`btn sm ${on?'primary':'ghost'}`} title="Incluir esta operação ao aplicar" onClick=${()=>setDecided(d=>({...d,[k]:true}))}>${on?'✓ Aprovada':'Aprovar'}</button>
            <button class=${`btn sm ${on?'ghost':''}`} title="Não aplicar esta operação" onClick=${()=>setDecided(d=>({...d,[k]:false}))} style=${on?'':'background:var(--danger);color:#fff;border-color:var(--danger)'}>${on?'Recusar':'✕ Recusada'}</button>
          </div>
        </div>
      </div>`; })}
      <div class="row" style="gap:8px;margin-top:4px">
        <button class="btn primary" disabled=${busy || !isAdmin || !approvedCount} onClick=${applyApproved}>Aplicar ${approvedCount} operação(ões)</button>
      </div>
    </div>`}

    ${history.length>0 && !ops.length && !summary && !busy && !err && html`<span class="meta">Sem operações na última resposta.</span>`}
  </div>`;
}

/* ============ ANALISAR COM IA ============
   Cada um dos tres escopos esta num momento diferente do trabalho qualitativo,
   entao tem modalidades proprias (nao mais um conjunto unico colado nos tres):

   - Documentos (texto bruto, SEM codificacao): leitura fresca / indutiva. A IA
     e uma "segunda leitora" que NAO conhece o esquema de codigos — boa pra
     codificacao aberta, sintese e a visao de fora.
   - Trechos + Codigo (corpus ja codificado, sem o texto em volta): analise do
     CODIGO em si — o que ele reune, se e coerente, se bate com a propria
     definicao (memo), como varia entre casos.
   - Documentos + Trechos + Codigo (texto + codificacao): codificacao EM CONTEXTO.
     Unico escopo onde "segunda codificacao" e segura: o que escapou (recall),
     validacao da associacao trecho-codigo, leitura do trecho no contexto.

   Cada modalidade so troca a instrucao da tarefa; papel/material/regras vem do
   buildPrompt, que tambem declara os LIMITES da selecao (recorte != lacuna).
   Toda lista termina em "Personalizado": instrucao livre escrita pelo pesquisador. */
const IA_MODE_CUSTOM = { id:'custom', label:'Personalizado', instr:'' };

// Documentos — leitura indutiva, a IA nao ve nenhuma codificacao
const IA_MODES_DOCS = [
  { id:'temas', label:'Temas emergentes',
    instr:'faça uma leitura aberta e indutiva, como numa primeira passada de codificação aberta: identifique os temas, conceitos e tensões que emergem do próprio material, sem partir de um esquema prévio. Para cada tema, dê um nome curto, descreva-o em uma frase e cite os trechos e documentos que o sustentam. Priorize o que é recorrente ou analiticamente denso em relação ao objetivo da pesquisa.' },
  { id:'sintese', label:'Síntese analítica',
    instr:'sintetize o que o material diz em relação ao objetivo da pesquisa: os achados principais e a linha geral, organizados de forma legível. Distinga o que é dominante do que é marginal e ancore cada ponto em evidência concreta (trecho e documento).' },
  { id:'inesperado', label:'O inesperado',
    instr:'em uma ou duas frases, declare primeiro o que seria razoável esperar sobre este fenômeno com base em conhecimento geral; depois confronte com o material e destaque o que há de mais surpreendente ou contraintuitivo, sempre ancorado em evidência (trecho e documento). Se nada for genuinamente surpreendente, diga isso.' },
  { id:'diferencas', label:'Diferenças entre casos',
    instr:'compare sistematicamente os documentos e aponte diferenças relevantes entre eles — de conteúdo, posição, ênfase ou mesmo silêncios — contrastando as fontes citadas. Se as diferenças forem triviais, diga isso: a convergência também é um achado.' },
  IA_MODE_CUSTOM,
];

// Trechos + Codigo — analise do codigo como categoria analitica
const IA_MODES_CODES = [
  { id:'conteudo', label:'O que há no código',
    instr:'para cada código, sintetize o que o conjunto de trechos efetivamente expressa: o sentido central, as dimensões ou variações internas e os matizes. Trate o código como uma categoria analítica e descreva seu conteúdo a partir das evidências, citando trechos e suas fontes.' },
  { id:'coerencia', label:'Coerência & saturação',
    instr:'avalie, para cada código, se os trechos formam um conjunto coerente: compartilham um mesmo sentido ou o código está abarcando coisas distintas demais (candidato a ser desdobrado)? Há repetição que sugira saturação, ou o sentido ainda está disperso? Aponte tensões internas citando os trechos que as revelam — analise a coerência do que está presente, não a quantidade.' },
  { id:'definicao', label:'Código vs. definição',
    instr:'compare os trechos de cada código com o memo/definição do código (quando houver). Os trechos correspondem ao que o código se propõe a capturar, ou há desvio, sobre-extensão ou uso ambíguo? Aponte casos concretos. Se não houver memo, infira a definição implícita a partir dos próprios trechos e avalie sua consistência.' },
  { id:'diferencas', label:'Diferenças entre casos',
    instr:'examine como cada código se manifesta de forma diferente entre os documentos ou falantes: variações de sentido, intensidade ou enquadramento. Contraste as fontes citando os trechos. Se o código for homogêneo entre os casos, diga isso.' },
  IA_MODE_CUSTOM,
];

// Documentos + Trechos + Codigo — codificacao em contexto (segunda leitura)
const IA_MODES_DOCSCODES = [
  { id:'escapou', label:'O que escapou',
    instr:'atue como uma segunda leitura de recall: considerando apenas os códigos que aparecem aplicados neste material, percorra o texto integral e aponte passagens que se encaixariam nesses mesmos códigos mas não foram codificadas. Cite a passagem e indique a qual código presente ela corresponderia. Restrinja-se aos códigos efetivamente presentes — não proponha códigos novos nem comente a ausência de outros.' },
  { id:'validacao', label:'Validação em contexto',
    instr:'para cada trecho codificado, verifique se o contexto ao redor no documento sustenta o código atribuído. Aponte trechos cuja codificação parece frágil, ambígua, ou cujo sentido muda quando lido no contexto. Foque na validade da associação trecho–código, não na quantidade de codificação.' },
  { id:'contexto', label:'Trecho em contexto',
    instr:'aprofunde a interpretação de cada trecho codificado lendo-o à luz do documento inteiro: que função ele cumpre no argumento, na narrativa ou na posição do falante? O contexto reforça, qualifica ou tensiona o sentido capturado pelo código? Cite documento e código.' },
  { id:'sintese', label:'Síntese contextualizada',
    instr:'sintetize os achados relacionando a codificação ao texto: o que os trechos codificados dizem, lidos dentro de seus documentos, em relação ao objetivo da pesquisa. Ancore cada ponto em documento e código.' },
  IA_MODE_CUSTOM,
];
// travas de tamanho do material enviado (~1 token ≈ 4 caracteres). O backend usa
// Gemini (tier gratuito bem mais folgado que o da Groq), mas ainda vale ter um
// limite pra não gerar prompts gigantes sem necessidade.
const IA_DOC_CHAR_LIMIT = 8000; // por documento
const IA_TOTAL_CHAR_LIMIT = 40000; // total do material empírico, somando todos os itens selecionados

function IAAnalisarPanel({ project, docs, codes, codeById, codePath, allCodings, memos, cats, allValues, onSave }){
  const [scope, setScope] = useState('docs'); // docs | codes | docs_codes
  const [selDocs, setSelDocs] = useState([]);
  const [selCodes, setSelCodes] = useState([]);
  const [docFilter, setDocFilter] = useState({}); // {categoryId: valor} — so pra ajudar a marcar varios documentos de uma vez
  const [allowRedact, setAllowRedact] = useState({}); // {codeId: true} — codigos de censura que o pesquisador decidiu incluir nesta analise (default: de fora)
  const modesFor = (s)=> s==='docs' ? IA_MODES_DOCS : s==='codes' ? IA_MODES_CODES : IA_MODES_DOCSCODES;
  const modes = modesFor(scope);
  const [mode, setMode] = useState(modes[0].id);
  const [customInstr, setCustomInstr] = useState(''); // instrucao livre quando mode==='custom'
  // conversa iterativa (Fase 1): o material vira o `system` TRAVADO da conversa; a tarefa do
  // modo e o 1o turno; os follow-ups do pesquisador sao os turnos seguintes (material entra
  // so uma vez no system, so os turnos crescem — cuida do IA_TOTAL_CHAR_LIMIT).
  const [history, setHistory] = useState([]);       // [{role:'user'|'assistant', content}]
  const [convSystem, setConvSystem] = useState(''); // system travado enquanto a conversa esta ativa
  const [convLabel, setConvLabel] = useState('');   // rotulo do modo com que a conversa comecou (pra salvar)
  const [followup, setFollowup] = useState('');     // texto do proximo turno do pesquisador
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [saved, setSaved] = useState(false);

  const changeScope = (s)=>{ setScope(s); setMode(modesFor(s)[0].id); };
  const isCustom = mode==='custom';

  const projectMemo = (memos||[]).find(m=>m.scope==='project' && m.target_id===project?.id);

  const toggleIn = (arr, setArr, id)=> setArr(arr.includes(id) ? arr.filter(x=>x!==id) : [...arr, id]);

  const closedCats = (cats||[]).filter(c=>CAT_HAS_OPTIONS(c.kind));
  const hasDocFilter = Object.values(docFilter).some(Boolean);
  const matchingDocIds = useMemo(()=>{
    const s = new Set();
    docs.forEach(d=>{
      const ok = Object.entries(docFilter).every(([catId,want])=>{
        if(!want) return true;
        const rows = (allValues||[]).filter(x=>x.document_id===d.id && x.category_id===catId);
        const fin = rows.find(r=>r.layer==='final');
        const pool = fin ? [fin.value] : rows.map(r=>r.value);
        return pool.some(v=>v!=null && String(v).split(CAT_MULTI_SEP).includes(want));
      });
      if(ok) s.add(d.id);
    });
    return s;
  }, [docs, allValues, docFilter]);
  const visibleDocs = hasDocFilter ? docs.filter(d=>matchingDocIds.has(d.id)) : docs;

  // categorias preenchidas do documento (prefere o gabarito quando existe) — da contexto
  // de "fonte" pra IA citar junto das observacoes, especialmente na analise por codigo
  const docCatsLine = (docId)=>{
    const parts = (cats||[]).map(cat=>{
      const rows = (allValues||[]).filter(v=>v.document_id===docId && v.category_id===cat.id);
      const fin = rows.find(r=>r.layer==='final');
      const val = fin ? fin.value : rows.map(r=>r.value).filter(Boolean).join(' | ');
      return val ? `${cat.name}: ${val}` : null;
    }).filter(Boolean);
    return parts.length ? parts.join(', ') : '(sem categorias preenchidas)';
  };
  const codeMemoLine = (codeId)=>{
    const m = (memos||[]).find(mm=>mm.scope==='code' && mm.target_id===codeId);
    return m?.content?.trim() || null;
  };
  const docNameOf = (docId)=> docs.find(d=>d.id===docId)?.name || '(documento removido)';

  // duas codificacoes "se sobrepoem" se os spans (no mesmo documento) se cruzam — usado pra
  // detectar censura em scope='codes', onde a citacao mostrada e o c.quote de UM coding so
  // (o do codigo analitico selecionado), que pode ocupar o MESMO trecho de uma censura
  // aplicada como um coding separado (code_id diferente). Nos outros escopos (docs/docs_codes)
  // isso ja "funciona de graca": maskRedactedContent reconstroi o texto inteiro por posicao,
  // entao uma censura em qualquer code_id já apaga aquele intervalo independente de quem mais
  // codificou o mesmo span.
  const spansOverlap = (aStart,aEnd,bStart,bEnd)=>
    aStart>=0 && aEnd>aStart && bStart>=0 && bEnd>bStart && aStart<bEnd && bStart<aEnd;
  const codingsByDoc = useMemo(()=>{
    const m = {}; (allCodings||[]).forEach(c=>{ (m[c.document_id]=m[c.document_id]||[]).push(c); }); return m;
  }, [allCodings]);

  // codigos de censura (is_redaction) com trechos na selecao atual — um checkbox por codigo,
  // default excluido (mascarado). So olha os codigos relevantes pro escopo atual: em
  // scope='codes', inclui tanto o codigo de censura selecionado diretamente quanto qualquer
  // censura cujo span se sobrepoe ao de algum coding dos codigos analiticos selecionados; nos
  // outros dois escopos, e o que pode aparecer no texto integral dos documentos escolhidos
  // (a sobreposicao ali ja e coberta por posicao em maskRedactedContent, sem precisar disso).
  const relevantForRedaction = scope==='codes'
    ? (()=>{
        const chosen = (allCodings||[]).filter(c=>selCodes.includes(c.code_id));
        const overlapping = chosen.flatMap(c=>(codingsByDoc[c.document_id]||[])
          .filter(o=>o.id!==c.id && spansOverlap(c.span_start,c.span_end,o.span_start,o.span_end)));
        return [...chosen, ...overlapping];
      })()
    : (allCodings||[]).filter(c=>selDocs.includes(c.document_id));
  const redactionCodesPresent = [...new Set(relevantForRedaction.map(c=>c.code_id))]
    .map(id=>codeById[id]).filter(c=>c && c.is_redaction);
  const maskedCodeIds = new Set(redactionCodesPresent.filter(c=>!allowRedact[c.id]).map(c=>c.id));

  const docsBlock = ()=>{
    const chosen = docs.filter(d=>selDocs.includes(d.id));
    return chosen.map(d=>{
      const content = maskRedactedContent(d.content||'', (allCodings||[]).filter(c=>c.document_id===d.id), maskedCodeIds);
      return `--- Documento: ${d.name} (categorias: ${docCatsLine(d.id)}) ---\n${content.slice(0, IA_DOC_CHAR_LIMIT)}`;
    }).join('\n\n');
  };

  // mascara a citacao se o PROPRIO code_id estiver marcado, ou se algum outro coding do mesmo
  // documento sobrepoe o span dela com um codigo de censura nao liberado em allowRedact.
  const isQuoteMasked = (c)=> maskedCodeIds.has(c.code_id)
    || (codingsByDoc[c.document_id]||[]).some(o=>o.id!==c.id && maskedCodeIds.has(o.code_id) && spansOverlap(c.span_start,c.span_end,o.span_start,o.span_end));

  const codesBlock = ()=>{
    const chosen = (allCodings||[]).filter(c=>selCodes.includes(c.code_id));
    return selCodes.map(codeId=>{
      const memo = codeMemoLine(codeId);
      const quotes = chosen.filter(c=>c.code_id===codeId)
        .map(c=>`"${isQuoteMasked(c)?'[trecho censurado]':c.quote}" — documento: ${docNameOf(c.document_id)} (categorias: ${docCatsLine(c.document_id)}) [${c.author_name||'anônimo'}${c.layer==='final'?', final':''}]`);
      return `--- Código: ${codePath(codeId).join(' ▸ ')}${memo?`\nMemo do código: ${memo}`:''} (${quotes.length} trechos) ---\n${quotes.join('\n')}`;
    }).join('\n\n');
  };

  const docsWithCodingsBlock = ()=>{
    const chosen = docs.filter(d=>selDocs.includes(d.id));
    // filtro opcional de codigos: se nada selecionado, inclui todos os codigos do documento
    const codeFilter = selCodes.length ? new Set(selCodes) : null;
    return chosen.map(d=>{
      const codingsByCode = {};
      (allCodings||[]).filter(c=>c.document_id===d.id && (!codeFilter || codeFilter.has(c.code_id)))
        .forEach(c=>{ (codingsByCode[c.code_id]=codingsByCode[c.code_id]||[]).push(c); });
      const codeBlocks = Object.entries(codingsByCode).map(([codeId,cs])=>{
        const memo = codeMemoLine(codeId);
        const quotes = cs.map(c=>`"${isQuoteMasked(c)?'[trecho censurado]':c.quote}" (${c.author_name||'anônimo'}${c.layer==='final'?', final':''})`);
        return `${codePath(codeId).join(' ▸ ')}${memo?` — memo: ${memo}`:''}:\n${quotes.join('\n')}`;
      });
      // rotulo filtro-ciente: quando ha filtro, "(nenhum)" significaria so "nenhum DOS SELECIONADOS",
      // nunca "documento sem codificacao" — deixar isso explicito evita a IA criticar lacuna inexistente.
      const header = codeFilter ? 'Trechos dos códigos selecionados presentes neste documento:' : 'Codificação aplicada neste documento:';
      const empty = codeFilter ? '(nenhum trecho dos códigos selecionados neste documento — o documento pode conter outras codificações não exibidas)' : '(nenhuma codificação neste documento)';
      const content = maskRedactedContent(d.content||'', (allCodings||[]).filter(c=>c.document_id===d.id), maskedCodeIds);
      return `--- Documento: ${d.name} (categorias: ${docCatsLine(d.id)}) ---\n${content.slice(0, IA_DOC_CHAR_LIMIT)}\n\n${header}\n${codeBlocks.length?codeBlocks.join('\n\n'):empty}`;
    }).join('\n\n');
  };

  const rawMaterial = scope==='docs' ? docsBlock()
    : scope==='codes' ? codesBlock()
    : docsWithCodingsBlock();
  const materialTruncated = rawMaterial.length > IA_TOTAL_CHAR_LIMIT;
  const buildMaterial = ()=> materialTruncated
    ? rawMaterial.slice(0, IA_TOTAL_CHAR_LIMIT) + '\n\n[...material truncado — limite de tamanho da requisição...]'
    : rawMaterial;

  const hasSelection = scope==='codes' ? selCodes.length>0 : selDocs.length>0;

  // monta as PECAS do prompt (papel, memo, descricao do material com os LIMITES da selecao,
  // material, regra de citacao, e a tarefa). A descricao do material e a chave: diz a IA o que
  // ela ve e, sobretudo, o que foi deixado de fora de proposito — pra nao confundir recorte
  // com lacuna. buildSystem junta tudo MENOS a tarefa (= prefixo estavel/cacheavel = `system`);
  // buildTask devolve so a tarefa (= 1o turno de usuario). Assim a conversa reusa o mesmo
  // material sem remontar nada a cada follow-up.
  const buildParts = ()=>{
    const memo = projectMemo?.content?.trim() || '(nenhum memo de projeto registrado)';
    const codeNames = (ids)=> ids.map(id=>codePath(id).join(' ▸ ')).join('; ');

    let role, materialDesc, taskLead, cite;
    if(scope==='docs'){
      role = 'Você é um assistente de análise qualitativa. Vai analisar o texto bruto de documentos, sem nenhuma codificação aplicada.';
      materialDesc = `É o texto integral de ${selDocs.length} documento(s) escolhido(s) pelo pesquisador. Não há códigos nem trechos destacados — trate o conteúdo como dado empírico bruto.`;
      taskLead = 'Analisando o conteúdo dos documentos,';
      cite = 'Ao fazer uma observação, cite a fonte (nome exato do documento).';
    } else if(scope==='codes'){
      role = 'Você é um assistente de análise qualitativa. Vai analisar trechos já codificados, agrupados pelo código que receberam.';
      materialDesc = `Contém apenas os trechos dos ${selCodes.length} código(s) que o pesquisador selecionou para esta análise: ${codeNames(selCodes)}. `
        + 'O texto integral dos documentos NÃO está incluído — você vê somente os trechos extraídos. '
        + 'Outros códigos e trechos existem no projeto, mas foram deliberadamente deixados de fora desta seleção: NÃO trate a ausência deles como lacuna, falha ou achado.';
      taskLead = 'Analisando os trechos e o que cada código reúne,';
      cite = 'Ao fazer uma observação, cite a fonte (nome do documento e código correspondente, exatamente como aparecem no material).';
    } else { // docs_codes
      const filtered = selCodes.length > 0;
      role = 'Você é um assistente de análise qualitativa. Vai analisar documentos em conjunto com a codificação aplicada a eles, relacionando texto e códigos.';
      materialDesc = `É o texto integral de ${selDocs.length} documento(s) escolhido(s) e, em cada um, os trechos nele codificados. `
        + (filtered
            ? `ATENÇÃO: foram incluídos apenas os trechos do(s) código(s) selecionado(s): ${codeNames(selCodes)}. `
              + 'Os documentos podem conter muitas outras codificações que foram deliberadamente omitidas desta visualização. '
              + 'NÃO interprete a ausência de outros códigos — nem documentos que apareçam sem trechos — como lacuna de codificação, falha do pesquisador ou achado: o recorte é intencional.'
            : 'Estão incluídas todas as codificações presentes nesses documentos.');
      taskLead = 'Analisando os documentos em conjunto com a codificação aplicada (relacionando o que os trechos codificados dizem com o texto em volta),';
      cite = 'Ao fazer uma observação, cite a fonte (nome do documento e, quando for sobre um trecho, o código correspondente).';
    }
    if(maskedCodeIds.size){
      materialDesc += ` Trechos marcados como censura (${[...maskedCodeIds].map(id=>codeById[id]?.name).join(', ')}) aparecem como "[trecho censurado]" — é uma omissão deliberada do pesquisador, não uma lacuna ou erro de extração.`;
    }

    // tarefa: modo pre-definido usa taskLead + instrucao; "Personalizado" usa a
    // instrucao livre do pesquisador como tarefa inteira (controle total do verbo).
    const task = isCustom
      ? (customInstr.trim() || '(escreva a instrução personalizada)')
      : `${taskLead} ${modes.find(m=>m.id===mode).instr}`;

    return { role, memo, materialDesc, material: buildMaterial(), cite, task };
  };

  // system = tudo MENOS a tarefa (prefixo estavel/cacheavel). Inclui a nota de que e uma conversa.
  const buildSystem = ()=>{ const p = buildParts();
    return `${p.role}\n\n`
      + `Memo do projeto (objetivo e contexto da pesquisa):\n${p.memo}\n\n`
      + `Sobre o material que você recebeu:\n${p.materialDesc}\n\n`
      + `Material:\n${p.material}\n\n`
      + `Regras:\n- Baseie-se exclusivamente no material acima; não invente nada além dele.\n- ${p.cite}\n- Não comente o tamanho ou a abrangência da seleção: ela foi definida de propósito pelo pesquisador.\n\n`
      + `Esta é uma conversa de análise: responda à tarefa inicial do pesquisador e, depois, às perguntas de acompanhamento, sempre com base neste mesmo material.`;
  };
  const buildTask = ()=> buildParts().task;
  // previa de transparencia total: mostra o system (material) + a 1a tarefa exatamente como vao.
  const buildPreview = ()=> buildSystem() + `\n\n=== 1º turno (tarefa enviada como mensagem do usuário) ===\n${buildTask()}`;

  const canRun = hasSelection && !(isCustom && !customInstr.trim());

  // 1o turno: trava o material no system e manda a tarefa do modo como 1a mensagem de usuario.
  const analyze = async ()=>{
    if(!canRun || busy) return;
    const system = buildSystem();
    const h = [{ role:'user', content: buildTask() }];
    setConvSystem(system); setConvLabel(isCustom ? 'Personalizado' : modes.find(m=>m.id===mode).label);
    setHistory(h); setFollowup(''); setSaved(false); setErr(''); setBusy(true);
    try{
      const text = await askAIChat({ system, messages: h });
      setHistory(x=>[...x, { role:'assistant', content: text }]);
    }catch(e){ setErr(String(e?.message || e)); }
    finally{ setBusy(false); }
  };

  // follow-up: continua a MESMA conversa reusando o system travado (material entra so 1 vez;
  // so os turnos crescem). buildPrompt nao e remontado.
  const sendFollowup = async ()=>{
    const text = followup.trim();
    if(!text || busy || !convSystem) return;
    const h = [...history, { role:'user', content: text }];
    setHistory(h); setFollowup(''); setSaved(false); setErr(''); setBusy(true);
    try{
      const reply = await askAIChat({ system: convSystem, messages: h });
      setHistory(x=>[...x, { role:'assistant', content: reply }]);
    }catch(e){ setErr(String(e?.message || e)); }
    finally{ setBusy(false); }
  };

  const resetConv = ()=>{ setHistory([]); setConvSystem(''); setConvLabel(''); setFollowup(''); setErr(''); setSaved(false); };

  // salva a conversa INTEIRA (todas as perguntas e respostas) como um resultado unico.
  const save = async ()=>{
    if(!history.length || saved) return;
    const transcript = history.map(t=> (t.role==='user' ? '**Pergunta:** ' : '**IA:** ') + t.content).join('\n\n');
    await onSave(scope, convLabel || (modes.find(m=>m.id===mode)?.label || ''), transcript);
    setSaved(true);
  };

  return html`<div class="section">
    <p class="h">Analisar com IA</p>
    <p class="hint" style="margin:0 0 10px">O memo do projeto é sempre enviado como contexto. Escolha o material e a modalidade de análise.</p>

    <p class="field-label">Material</p>
    <div class="seg" style="margin-bottom:10px;flex-wrap:wrap">
      <button class=${scope==='docs'?'on':''} onClick=${()=>changeScope('docs')}>Documentos</button>
      <button class=${scope==='codes'?'on':''} onClick=${()=>changeScope('codes')}>Trechos + Código</button>
      <button class=${scope==='docs_codes'?'on':''} onClick=${()=>changeScope('docs_codes')}>Documentos + Trechos + Código</button>
    </div>

    ${scope==='codes' ? html`<div>
      <div class="row" style="margin-bottom:6px;gap:8px">
        <button class="btn sm ghost" onClick=${()=>setSelCodes(codes.map(c=>c.id))}>selecionar todos</button>
        <button class="btn sm ghost" onClick=${()=>setSelCodes([])}>limpar seleção</button>
      </div>
      <div class="card" style="margin-bottom:10px;max-height:220px;overflow:auto">
        ${codes.length===0 && html`<span class="meta">Nenhum código no projeto.</span>`}
        ${codes.map(c=>html`<button key=${c.id} class="opt ${selCodes.includes(c.id)?'on':''}" style="display:flex;width:100%;margin-bottom:4px"
          onClick=${()=>toggleIn(selCodes, setSelCodes, c.id)}>${selCodes.includes(c.id)?'☑':'☐'} ${codePath(c.id).join(' ▸ ')}</button>`)}
      </div>
    </div>` : html`<div>
      ${closedCats.length>0 && html`<div class="field" style="margin-bottom:8px">
        <div class="field-label">Filtrar documentos por categoria (opcional, ajuda a marcar vários de uma vez)</div>
        <div class="row" style="gap:8px;flex-wrap:wrap">
          ${closedCats.map(cat=>{ const opts=(cat.options||[]).filter(o=>!isSpecialOpt(o));
            return html`<select key=${cat.id} class="opt" style="min-width:160px"
              value=${docFilter[cat.id]||''} onChange=${e=>{ const v=e.target.value; setDocFilter(f=>{ const n={...f}; if(v) n[cat.id]=v; else delete n[cat.id]; return n; }); }}>
              <option value="">${cat.name}: qualquer</option>
              ${opts.map(o=>html`<option value=${o}>${cat.name}: ${o}</option>`)}
            </select>`;
          })}
          ${hasDocFilter && html`<button class="btn sm ghost" onClick=${()=>setDocFilter({})}>limpar filtro</button>`}
        </div>
      </div>`}
      <div class="row" style="margin-bottom:6px;gap:8px">
        <button class="btn sm ghost" onClick=${()=>setSelDocs(visibleDocs.map(d=>d.id))}>selecionar ${hasDocFilter?'visíveis':'todos'}</button>
        <button class="btn sm ghost" onClick=${()=>setSelDocs([])}>limpar seleção</button>
      </div>
      <div class="card" style="margin-bottom:10px;max-height:220px;overflow:auto">
        ${visibleDocs.length===0 && html`<span class="meta">${docs.length===0?'Nenhum documento no projeto.':'Nenhum documento corresponde ao filtro.'}</span>`}
        ${visibleDocs.map(d=>html`<button key=${d.id} class="opt ${selDocs.includes(d.id)?'on':''}" style="display:flex;width:100%;margin-bottom:4px"
          onClick=${()=>toggleIn(selDocs, setSelDocs, d.id)}>${selDocs.includes(d.id)?'☑':'☐'} ${d.name}</button>`)}
      </div>
      ${scope==='docs_codes' && html`<div class="field" style="margin-bottom:10px">
        <div class="field-label">Filtrar por código (opcional — vazio = todos os códigos do documento)</div>
        <div class="row" style="margin-bottom:6px;gap:8px">
          <button class="btn sm ghost" onClick=${()=>setSelCodes(codes.map(c=>c.id))}>selecionar todos</button>
          <button class="btn sm ghost" onClick=${()=>setSelCodes([])}>limpar seleção</button>
        </div>
        <div class="card" style="max-height:200px;overflow:auto">
          ${codes.length===0 && html`<span class="meta">Nenhum código no projeto.</span>`}
          ${codes.map(c=>html`<button key=${c.id} class="opt ${selCodes.includes(c.id)?'on':''}" style="display:flex;width:100%;margin-bottom:4px"
            onClick=${()=>toggleIn(selCodes, setSelCodes, c.id)}>${selCodes.includes(c.id)?'☑':'☐'} ${codePath(c.id).join(' ▸ ')}</button>`)}
        </div>
      </div>`}
    </div>`}

    ${redactionCodesPresent.length>0 && html`<div class="card" style="margin-bottom:10px">
      <div class="field-label">🚫 Trechos censurados na seleção</div>
      <p class="hint" style="margin:0 0 6px">Por padrão, ficam fora do material enviado à IA. Marque os que valem como contexto para esta análise.</p>
      ${redactionCodesPresent.map(c=>html`<label key=${c.id} class="row" style="gap:6px;font-size:12.5px;cursor:pointer;align-items:center">
        <input type="checkbox" checked=${!!allowRedact[c.id]} onChange=${e=>setAllowRedact(x=>({...x,[c.id]:e.target.checked}))} />
        Incluir trechos de "${c.name}"
      </label>`)}
    </div>`}

    <p class="field-label">Modalidade</p>
    <div class="seg" style="margin-bottom:10px;flex-wrap:wrap">
      ${modes.map(m=>html`<button key=${m.id} class=${mode===m.id?'on':''} onClick=${()=>setMode(m.id)}>${m.label}</button>`)}
    </div>
    ${!isCustom && html`<p class="hint" style="margin:0 0 10px">${modes.find(m=>m.id===mode).instr}</p>`}
    ${isCustom && html`<div class="field" style="margin-bottom:10px">
      <textarea class="txtin" rows="3" style="resize:vertical" placeholder="Escreva sua própria instrução de análise (ela vira a tarefa enviada à IA, com o memo, o material e as regras de citação em volta)…"
        value=${customInstr} onInput=${e=>setCustomInstr(e.target.value)}></textarea>
    </div>`}
    <details style="margin:0 0 14px">
      <summary class="hint" style="cursor:pointer">Ver prompt completo enviado à IA (material no system + 1ª tarefa)</summary>
      <div class="card" style="margin-top:8px;white-space:pre-wrap;font-size:12.5px;max-height:300px;overflow:auto">${buildPreview()}</div>
    </details>
    ${materialTruncated && html`<div class="banner warn" style="margin-bottom:10px">Material selecionado (~${rawMaterial.length} caracteres) excede o limite de tamanho por requisição e será truncado em ${IA_TOTAL_CHAR_LIMIT} caracteres antes de enviar — selecione menos itens para uma análise completa.</div>`}
    ${history.length>0 && html`<p class="hint" style="margin:0 0 8px">Uma conversa está em andamento — os follow-ups continuam sobre o material desta análise. Mude a seleção e clique em <b>Analisar de novo</b> para recomeçar com outro material.</p>`}

    <button class="btn primary" disabled=${busy || !canRun} onClick=${analyze}>
      ${history.length ? 'Analisar de novo' : (busy ? 'analisando…' : 'Analisar')}
    </button>

    ${err && html`<div class="banner err" style="margin-top:10px">${err}</div>`}

    ${history.length>0 && html`<div style="margin-top:14px">
      ${history.map((t,i)=>html`<div key=${i} class="card" style="margin-bottom:8px">
        <div class="field-label" style="margin-bottom:4px">${t.role==='user' ? (i===0?'Tarefa':'Você') : 'IA'}</div>
        ${t.role==='user'
          ? html`<div style="white-space:pre-wrap;font-size:13px">${t.content}</div>`
          : html`<div dangerouslySetInnerHTML=${{__html: mdLite(t.content)}} />`}
      </div>`)}
      ${busy && html`<span class="meta">analisando…</span>`}

      <div class="field" style="margin-top:8px">
        <textarea class="txtin" rows="2" style="resize:vertical" placeholder="Continuar a conversa (ex.: &quot;desenvolva o ponto 2&quot;, &quot;compare com o outro documento&quot;)… Enter envia, Shift+Enter quebra linha"
          value=${followup} disabled=${busy} onInput=${e=>setFollowup(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendFollowup(); } }}></textarea>
      </div>
      <div class="row" style="gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap">
        <button class="btn primary" disabled=${busy || !followup.trim()} onClick=${sendFollowup}>Enviar</button>
        <button class="btn sm ${saved?'ghost':'primary'}" disabled=${saved} onClick=${save}>${saved?'Salvo ✓':'Salvar conversa'}</button>
        <button class="btn sm ghost" disabled=${busy} onClick=${resetConv}>Limpar conversa</button>
        ${saved && html`<span class="meta">Disponível em "Resultados salvos" →</span>`}
      </div>
    </div>`}
  </div>`;
}

/* ============ Resultados salvos da aba "Analisar com IA" ============
   Lista lateral, mais recente primeiro; cada item pode ser expandido e
   apagado. Persistido via store (sobrevive ao F5 / fechar o navegador). */
