        <span style="font-size:11.5px;color:var(--ink-faint);font-family:var(--serif);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px">${co?.quote||m.content.slice(0,60)}</span>
      </div>`)}
    </div>`}

    <!-- códigos -->
    <div style="border-bottom:1px solid var(--line-soft)">
      <div class="node-row" style="padding:6px 14px;cursor:pointer;border-radius:0" onClick=${()=>setCodesOpen(o=>!o)}>
        <span class="caret">${codesOpen?'▾':'▸'}</span>
        <span class="node-name" style="font-weight:600">Códigos</span>
      </div>
      ${codesOpen && html`<div class="tree" style="padding:0 6px">
        ${tops.length===0 && html`<div class="meta" style="padding:6px 22px">Nenhum código criado.</div>`}
        ${tops.map(t=>html`<${MemoCodeNode} key=${t.id} code=${t} childrenOf=${childrenOf}
          sel=${sel} onSel=${onSel} hasMemo=${hasMemo} depthPad=${0} />`)}
      </div>`}
    </div>

    <!-- IA: conversas salvas + memória do projeto (abaixo de Documentos e Códigos, mesmo formato) -->
    ${AI_ENABLED && html`<div style="border-bottom:1px solid var(--line-soft)">
      <div class="node-row" style="padding:6px 14px;cursor:pointer;border-radius:0"
        onClick=${()=>setConvsOpen(o=>!o)}>
        <span class="caret">${convsOpen?'▾':'▸'}</span>
        <span class="node-name" style="font-weight:600">Conversas salvas</span>
        ${(iaResults?.length||0)>0 && html`<span class="count">${iaResults.length}</span>`}
      </div>
      ${convsOpen && (iaResults||[]).map(r=>html`<div key=${r.id} class="node-row ${sel.scope==='ia_results'&&sel.targetId===r.id?'sel':''}"
        style="padding:5px 14px 5px 28px;cursor:pointer" onClick=${()=>onSel({scope:'ia_results', targetId:r.id})}>
        <span class="node-name" style="font-size:12.5px" title=${r.mode_label}>${r.mode_label}</span>
      </div>`)}
      ${convsOpen && (iaResults||[]).length===0 && html`<div class="meta" style="padding:6px 28px">Nenhuma conversa salva.</div>`}
    </div>`}
    <!-- Memo para a IA (contexto do projeto dedicado à IA, injetado por padrão) -->
    ${AI_ENABLED && html`<div class="node-row ${sel.scope==='ai_context'?'sel':''}" style="padding:8px 14px;cursor:pointer;border-bottom:1px solid var(--line-soft)"
      onClick=${()=>onSel({scope:'ai_context', targetId:project.id})}>
      <span style="margin-right:4px">✦</span>
      <span class="node-name" style="font-weight:600">Memo para a IA</span>
      ${hasMemo('ai_context', project.id) && html`<span class="count">●</span>`}
    </div>`}
    <!-- Prompts salvos (biblioteca de prompts, escopo ai_prompt) -->
    ${AI_ENABLED && html`<div style="border-bottom:1px solid var(--line-soft)">
      <div class="node-row" style="padding:6px 14px;cursor:pointer;border-radius:0" onClick=${()=>setPromptsOpen(o=>!o)}>
        <span class="caret">${promptsOpen?'▾':'▸'}</span>
        <span style="margin-right:4px">✦</span>
        <span class="node-name" style="font-weight:600">Prompts salvos</span>
        ${promptMemos.length>0 && html`<span class="count">${promptMemos.length}</span>`}
      </div>
      ${promptsOpen && promptMemos.map(m=>html`<div key=${m.id} class="node-row ${sel.scope==='ai_prompt'&&sel.targetId===m.target_id?'sel':''}"
        style="padding:5px 14px 5px 28px;cursor:pointer" onClick=${()=>onSel({scope:'ai_prompt', targetId:m.target_id})}>
        <span style="margin-right:4px;color:var(--teal-deep)">✦</span>
        <span class="node-name" style="font-size:12.5px" title=${m.label||m.content}>${m.label||m.content.slice(0,40)}</span>
      </div>`)}
      ${promptsOpen && promptMemos.length===0 && html`<div class="meta" style="padding:6px 28px">Nenhum prompt salvo. Salve na aba Analisar com IA.</div>`}
    </div>`}
    ${AI_ENABLED && html`<div style="border-bottom:1px solid var(--line-soft)">
      <div class="node-row" style="padding:6px 14px;cursor:pointer;border-radius:0"
        onClick=${()=>{ setMemOpen(o=>!o); onSel({scope:'ai_memory'}); }}>
        <span class="caret">${memOpen?'▾':'▸'}</span>
        <span style="margin-right:4px">✦</span>
        <span class="node-name" style="font-weight:600">Memória do projeto</span>
        ${(aiMemory?.length||0)>0 && html`<span class="count">${aiMemory.length}</span>`}
      </div>
      ${memOpen && (aiMemory||[]).map(m=>html`<div key=${m.id} class="node-row ${sel.scope==='ai_memory'&&sel.targetId===m.id?'sel':''}"
        style="padding:5px 14px 5px 28px;cursor:pointer" onClick=${()=>onSel({scope:'ai_memory', targetId:m.id})}>
        <span class="node-name" style="font-size:12.5px" title=${m.content}>${m.content}</span>
      </div>`)}
      ${memOpen && (aiMemory||[]).length===0 && html`<div class="meta" style="padding:6px 28px">Nenhuma memória ainda.</div>`}
    </div>`}
  </div>`;
}
function MemoCodeNode({ code, childrenOf, sel, onSel, hasMemo, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg, false, code.sat);
  const isSel = sel.scope==='code' && sel.targetId===code.id;
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''}" style=${`padding-left:${6+depthPad*16}px;cursor:pointer`}
      onClick=${()=>onSel({scope:'code', targetId:code.id})}>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.name}</span>
      ${hasMemo('code', code.id) && html`<span class="count">●</span>`}
    </div>
    ${open && kids.map(k=>html`<${MemoCodeNode} key=${k.id} code=${k} childrenOf=${childrenOf}
      sel=${sel} onSel=${onSel} hasMemo=${hasMemo} depthPad=${depthPad+1} />`)}
  </div>`;
}

/* ============ MemoEditor — painel direito da aba Memos ============
   Editor de texto livre com autosave (debounce), mostrando autor/data da última edição. */
function MemoEditor({ sel, project, codeById, codePath, codings, docs, memos, onSave, onDelete, onRenameDoc }){
  const targetId = sel.scope==='project' ? project?.id : sel.targetId;
  // memo de projeto: tolera target_id null gravado por versões antigas do import (a convenção
  // atual é target_id = project.id) — sem isso o memo importado ficava invisível e editar criava
  // uma segunda linha
  const current = memos.find(m=>m.scope===sel.scope && (m.target_id===targetId || (sel.scope==='project' && !m.target_id)));
  const [text, setText] = useState(current?.content||'');
  const [labelVal, setLabelVal] = useState(current?.label||''); // nome do prompt (só ai_prompt)
  const [saving, setSaving] = useState(false);
  const [editingName, setEditingName] = useState(false); // renomear documento inline no topo do memo
  const [nameVal, setNameVal] = useState('');
  const debRef = useRef(null), labelDebRef = useRef(null);

  useEffect(()=>{ setText(current?.content||''); setLabelVal(current?.label||''); setEditingName(false); }, [sel.scope, targetId]); // eslint-disable-line

  if(!targetId) return html`<div class="empty">
    <div class="t">Selecione um alvo</div>
    <div>Escolha o projeto, um documento, um código ou um trecho à esquerda para escrever um memo.</div>
  </div>`;

  const coding = sel.scope==='coding' ? (codings||[]).find(c=>c.id===targetId) : null;
  const doc = sel.scope==='document' ? (docs||[]).find(d=>d.id===targetId) : null;
  const label = sel.scope==='project' ? 'Memo do projeto'
    : sel.scope==='ai_context' ? 'Memo para a IA'
    : sel.scope==='ai_prompt' ? 'Prompt salvo'
    : sel.scope==='document' ? 'Memo do documento'
    : sel.scope==='coding' ? 'Nota analítica do trecho'
    : 'Memo do código';
  const subtitle = sel.scope==='code' ? codePath(targetId).join(' ▸ ')
    : sel.scope==='coding' && coding ? codePath(coding.code_id).join(' ▸ ') : null;

  const change = (val)=>{
    setText(val);
    clearTimeout(debRef.current);
    debRef.current = setTimeout(async ()=>{ setSaving(true); await onSave(sel.scope, targetId, val, labelVal); setSaving(false); }, 700);
  };
  // renomear um prompt salvo (preserva o conteúdo). Só usado em ai_prompt.
  const changeLabel = (val)=>{
    setLabelVal(val);
    clearTimeout(labelDebRef.current);
    labelDebRef.current = setTimeout(async ()=>{ setSaving(true); await onSave(sel.scope, targetId, text, val); setSaving(false); }, 700);
  };

  return html`<div class="section" style="max-width:760px;margin:0 auto">
    <p class="h" style="margin-bottom:2px">${label}</p>
    ${sel.scope==='ai_context' && html`<p class="hint" style="margin:2px 0 8px">Contexto do projeto escrito <b>para a IA</b> — injetado nos prompts por padrão (você controla no painel "Configurar Prompt"). O "Memo do projeto" comum deixou de ser enviado automaticamente; use-o como rascunho livre.</p>`}
    ${sel.scope==='ai_prompt' && html`<div style="margin:2px 0 10px">
      <input class="txtin" style="font-size:14px;padding:5px 9px" placeholder="Nome do prompt" value=${labelVal} onInput=${e=>changeLabel(e.target.value)} />
      <p class="hint" style="margin:6px 0 0">Prompt reutilizável da biblioteca (aba Analisar com IA). Editar aqui muda o texto que a sugestão insere.</p>
    </div>`}
    ${doc && html`<div class="row" style="gap:6px;align-items:center;margin:0 0 4px">
      ${editingName
        ? html`<input class="txtin" autoFocus style="max-width:460px;font-size:14px;padding:3px 8px" value=${nameVal}
            onInput=${e=>setNameVal(e.target.value)}
            onKeyDown=${e=>{ if(e.key==='Enter'){ if(nameVal.trim()) onRenameDoc?.(doc.id, nameVal); setEditingName(false); } else if(e.key==='Escape') setEditingName(false); }}
            onBlur=${()=>{ if(nameVal.trim()) onRenameDoc?.(doc.id, nameVal); setEditingName(false); }} />`
        : html`<span style="font-weight:600;font-size:15px">${doc.name}</span>
          ${onRenameDoc && html`<button class="icon-btn" title="Renomear documento" style="font-size:13px" onClick=${()=>{ setNameVal(doc.name); setEditingName(true); }}>✏</button>`}`}
    </div>`}
    ${subtitle && html`<p class="hint" style="margin:0 0 4px">${subtitle}</p>`}
    ${coding && coding.quote && html`<blockquote style="margin:0 0 8px;padding:8px 12px;background:var(--surface);border-left:3px solid var(--teal);font-family:var(--serif);font-size:14px;max-height:140px;overflow:auto">${coding.quote}</blockquote>`}
    <p class="hint" style="margin:0 0 10px">
      Nota única, compartilhada entre todos os pesquisadores do projeto — qualquer membro pode editar.
      ${current && html` Última edição: <b>${current.author_name||'anônimo'}</b>${current.updated_at?` em ${new Date(current.updated_at).toLocaleString('pt-BR')}`:''}.`}
    </p>
    <textarea class="txtin" rows="18" style="font-family:var(--serif);font-size:16px;line-height:1.7;resize:vertical"
      placeholder="Escreva aqui suas anotações analíticas, definições, decisões metodológicas…"
      value=${text} onInput=${e=>change(e.target.value)}></textarea>
    <div class="row" style="margin-top:6px;gap:10px"><span class="meta">${saving?'salvando…':'salvo automaticamente'}</span>
      ${sel.scope==='ai_prompt' && onDelete && current && html`<button class="btn sm" style="margin-left:auto;color:var(--danger)" onClick=${()=>{ if(confirm('Apagar este prompt salvo?')) onDelete(current.id); }}>🗑 apagar prompt</button>`}
    </div>
  </div>`;
}

/* ============ CodingMemoModal — nota analítica por TRECHO (scope='coding') ============
   Aberto pelo menu de contexto do leitor sobre um grifo. É a "anotação por trecho" (base da
   transparência ativa): a nota que o export de transparência prefere sobre o memo do código.
   Nota única por coding, compartilhada entre membros (mesma semântica de setMemo). */
function CodingMemoModal({ target, memos, onClose, onSave }){
  const current = (memos||[]).find(m=>m.scope==='coding' && m.target_id===target.id);
  const [text, setText] = useState(current?.content||'');
  const [saving, setSaving] = useState(false);
  useEffect(()=>{ setText(current?.content||''); }, [target.id]); // eslint-disable-line
  const save = async ()=>{ setSaving(true); await onSave(text); setSaving(false); onClose(); };
  // clique fora só fecha direto se o texto não mudou — um clique acidental no backdrop
  // no meio da digitação descartava a nota inteira sem aviso
  const requestClose = ()=>{ if(text===(current?.content||'') || confirm('Descartar a nota não salva?')) onClose(); };
  return html`<div class="modal-bg" onClick=${requestClose}>
    <div class="modal" style="max-width:620px" onClick=${e=>e.stopPropagation()}>
      <h3 style="margin:0 0 2px">Nota analítica do trecho</h3>
      <p class="hint" style="margin:0 0 8px">${target.codePath||''}</p>
      <blockquote style="margin:0 0 10px;padding:8px 12px;background:var(--surface);border-left:3px solid var(--teal);font-family:var(--serif);font-size:14px;max-height:120px;overflow:auto">${target.quote||''}</blockquote>
      <p class="hint" style="margin:0 0 8px">
        Explique como este trecho sustenta a interpretação/inferência (o que vira a "nota analítica" no apêndice de transparência). Nota única, compartilhada entre membros.
        ${current && html` Última edição: <b>${current.author_name||'anônimo'}</b>${current.updated_at?` em ${new Date(current.updated_at).toLocaleString('pt-BR')}`:''}.`}
      </p>
      <textarea class="txtin" rows="7" autofocus style="font-family:var(--serif);font-size:15px;line-height:1.6;resize:vertical"
        placeholder="Ex.: este trecho evidencia a contradição porque…" value=${text} onInput=${e=>setText(e.target.value)}></textarea>
      <div class="row" style="gap:8px;justify-content:flex-end;margin-top:10px">
        <button class="btn ghost" onClick=${requestClose}>cancelar</button>
        <button class="btn primary" disabled=${saving} onClick=${save}>${saving?'salvando…':'salvar nota'}</button>
      </div>
    </div>
  </div>`;
}

/* ============ IA (chat simples via Edge Function ai-ask) ============
   Proxy generico para a Groq, deployado em supabase/functions/ai-ask.
   Aqui so existe um chat de pergunta/resposta; funcoes mais especificas
   (sugerir codigo, resumir documento) podem reusar askAI() depois. */
// catalogo de modelos por provedor pro seletor de botoes em "Minha Conta" — ordenados do
// mais rapido/barato pro mais capaz/lento/caro (mesmo padrao "tamanho" nos tres provedores).
// O array tambem decide a ordem dos botoes de provedor.
const AI_PROVIDERS = [
  { id:'gemini', label:'Google Gemini', models:[
    { id:'gemini-3.1-flash-lite',  label:'3.1 Flash Lite', note:'mais rápido e barato' },
    { id:'gemini-3.5-flash',       label:'3.5 Flash',      note:'padrão — equilíbrio', def:true },
    { id:'gemini-3.1-pro-preview', label:'3.1 Pro',        note:'mais capaz — mais lento e caro' },
  ]},
  { id:'openai', label:'OpenAI', models:[
    { id:'gpt-5.6-luna',  label:'GPT-5.6 Luna',  note:'mais rápido e barato' },
    { id:'gpt-5.6-terra', label:'GPT-5.6 Terra', note:'padrão — equilíbrio', def:true },
    { id:'gpt-5.6-sol',   label:'GPT-5.6 Sol',   note:'mais capaz — mais lento e caro' },
  ]},
  { id:'anthropic', label:'Anthropic', models:[
    { id:'claude-haiku-4-5-20251001', label:'Haiku',    note:'mais rápido e barato' },
    { id:'claude-sonnet-5',           label:'Sonnet 5', note:'padrão — equilíbrio', def:true },
    { id:'claude-opus-4-8',           label:'Opus',     note:'mais capaz — mais lento e caro' },
  ]},
  // Azure OpenAI: como o "custom" (URL base + modelo em texto livre, custom:true), mas
  // autenticacao por header "api-key" e chave obrigatoria — tratado pela Edge Function.
  // baseUrl = endpoint "v1" do recurso (https://SEU-RECURSO.openai.azure.com/openai/v1);
  // modelo = nome do DEPLOYMENT criado no portal do Azure (nao o nome do modelo base).
  { id:'azure', label:'Azure OpenAI', azure:true, custom:true, models:[] },
  // provedor "personalizado": sem lista fixa de modelos (custom:true) — o pesquisador
  // preenche URL base + modelo em texto livre. Cobre qualquer API compativel com o formato
  // classico da OpenAI (/chat/completions): DeepSeek, Mistral, Qwen hospedado, ou um
  // servidor local (Ollama/vLLM) exposto numa URL publica (a Edge Function roda no servidor
  // do Supabase, nao alcanca localhost da maquina do pesquisador sem tunel).
  { id:'custom', label:'Personalizado', custom:true, models:[] },
  // Ollama LOCAL: tambem formato classico da OpenAI (custom:true reusa a UI de URL+modelo),
  // mas a flag local:true desvia a chamada pra DIRETA do navegador (askLocalChat), sem passar
  // pela Edge Function ai-ask — que roda no servidor do Supabase e nao alcanca o localhost da
  // maquina. Assim funciona offline/air-gapped, sem tunel. Requer iniciar o Ollama com
  // OLLAMA_ORIGINS liberando a origem do navegador (CORS); ver hint em "Minha Conta".
  { id:'ollama', label:'Ollama (local)', custom:true, local:true, models:[] },
];
// Sugestoes (NAO uma lista fixa) de modelos Ollama populares — viram <option> de um <datalist>
// no campo de modelo (texto livre): o pesquisador clica numa sugestao OU digita qualquer outro
// modelo que tenha baixado (ollama pull / ollama list). So nomes-base comuns; tags especificas
// (ex.: llama3.1:70b) o usuario completa a mao. Manter curto e atualizavel.
const OLLAMA_MODEL_SUGGESTIONS = [
  'llama3.1', 'llama3.2', 'llama3.3', 'qwen2.5', 'qwen2.5-coder',
  'gemma2', 'mistral', 'mistral-nemo', 'phi4', 'deepseek-r1',
];
// configuracao pessoal de IA (BYOK) — guardada so no localStorage de quem configurou em
// "Minha Conta". Ausente = usa a chave/modelo do servidor, se houver (comportamento
// de sempre); a Edge Function decide isso, aqui so manda o que tiver preenchido.
function getAIConfig(){
  try{
    return {
      provider: localStorage.getItem('qualilab:ai_provider') || 'gemini',
      apiKey: localStorage.getItem('qualilab:ai_key') || '',
      model: localStorage.getItem('qualilab:ai_model') || '',
      baseUrl: localStorage.getItem('qualilab:ai_baseurl') || '',
    };
  }catch(e){ return { provider:'gemini', apiKey:'', model:'', baseUrl:'' }; }
}
// rótulo do modelo ativo, pra proveniência da memória (ex.: "anthropic:claude-opus-4-8",
// ou "gemini:(padrão)" quando o modelo é o default do provedor). Auditoria em projeto coletivo.
function currentModelLabel(){
  const c = getAIConfig();
  const prov = AI_PROVIDERS.find(p=>p.id===c.provider);
  const provLabel = prov?.label || c.provider || 'IA';
  // modelo escolhido; se vazio, resolve o default (def:true) do provedor (mesmo do DEFAULT_MODELS da Edge Function)
  const mid = c.model || (prov?.models||[]).find(m=>m.def)?.id || '';
  const mObj = (prov?.models||[]).find(m=>m.id===mid);
  let mLabel;
  if(mObj){
    mLabel = mObj.label; // ex.: "Sonnet"
    // acrescenta a versao vinda do id quando o rotulo nao a traz ("Sonnet" + "claude-sonnet-4-6" -> "Sonnet 4.6")
    if(!/\d/.test(mLabel)){ const v=(mid.match(/(\d+)[.\-](\d+)/)||[])[0]; if(v) mLabel += ' '+v.replace('-','.'); }
  } else {
    mLabel = c.model || 'modelo padrão'; // custom/azure/ollama: modelo em texto livre
  }
  return `${provLabel}: ${mLabel}`;
}
// provedor "local" (Ollama/vLLM na maquina): a chamada NAO passa pela Edge Function ai-ask
// (que roda no servidor do Supabase e nao alcanca o localhost do pesquisador) — o navegador
// fala DIRETO com o servidor local. Marcado pela flag local:true em AI_PROVIDERS.
function isLocalProvider(provider){
  return !!AI_PROVIDERS.find(p=>p.id===provider)?.local;
}
// --- CALCULADORA DE CUSTO DA IA (jul/2026) — helpers de preco/custo logo apos askAIChat ---
// LAST_AI_USAGE guarda o { input, output, cached } (tokens REAIS) da ULTIMA chamada de IA — a
// Edge Function ai-ask agora devolve `usage`, e o caminho local reusa prompt_tokens/completion_tokens.
// O painel le via lastAiUsage() logo apos o await (single-thread, sem chamadas concorrentes). AI_PRICES
// e o cache (map) da tabela ai_prices = referencia de preco por modelo (leitura publica).
let LAST_AI_USAGE = null;
let AI_PRICES = null;
// Chamada direta do navegador a um servidor local compativel com o formato classico da OpenAI
// (/chat/completions). Mesmo corpo do callCustom da Edge Function, porem disparado no cliente —
// funciona offline/air-gapped, sem tunel nem nuvem. Requer OLLAMA_ORIGINS liberando a origem do
// navegador (CORS); e, se o app estiver em HTTPS (GitHub Pages), o navegador pode bloquear
// http://localhost como conteudo misto — rodar o app localmente (http://localhost) contorna.
// json=true ativa o "modo JSON" do servidor local (response_format json_object). Ollama/vLLM
// compativeis com OpenAI restringem a saida a JSON valido via gramatica — essencial pros modelos
// locais menores, que entendem a tarefa mas costumam ignorar a instrucao de "responda so JSON" e
// devolvem prosa (ai o parseAIJson falha). So passar nas chamadas que esperam JSON (Codificar com
// IA, "Sugerir memorias"); NUNCA na conversa em prosa do Analisar, senao quebraria a resposta.
async function askLocalChat({ system, messages, signal, json }){
  const cfg = getAIConfig();
  const base = (cfg.baseUrl || 'http://localhost:11434/v1').replace(/\/+$/, '');
  const msgs = [ ...(system ? [{ role:'system', content: system }] : []), ...(messages || []) ];
  let res;
  try{
    res = await fetch(`${base}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', ...(cfg.apiKey ? { Authorization:`Bearer ${cfg.apiKey}` } : {}) },
      body: JSON.stringify({ model: cfg.model, messages: msgs, temperature: 0.3, stream: false, max_tokens: 8192, ...(json ? { response_format:{ type:'json_object' } } : {}) }),
      ...(signal ? { signal } : {}),
    });
  }catch(e){
    if(e && e.name === 'AbortError') throw e;
    throw new Error(`Não consegui falar com o servidor local em ${base} — o Ollama está rodando e iniciado com OLLAMA_ORIGINS liberando este site? (Se o app estiver em HTTPS, rode-o localmente em http://localhost.)`);
  }
  if(!res.ok){ const t = await res.text().catch(()=> ''); throw new Error(`Servidor local (${res.status}): ${t || 'sem detalhe'}`); }
  const data = await res.json().catch(()=>({}));
  LAST_AI_USAGE = data.usage ? { input: data.usage.prompt_tokens||0, output: data.usage.completion_tokens||0, cached: 0 } : null;
  return data.choices?.[0]?.message?.content || '';
}
async function askAI(prompt){
  const cfg = getAIConfig();
  if(isLocalProvider(cfg.provider)) return askLocalChat({ messages:[{ role:'user', content: prompt }] });
  const res = await fetch(`${SUPABASE_URL}/functions/v1/ai-ask`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${await aiAuthToken()}`, apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, provider: cfg.provider, ...(cfg.apiKey ? { apiKey: cfg.apiKey } : {}), ...(activeModelId(cfg) ? { model: activeModelId(cfg) } : {}), ...(cfg.baseUrl ? { baseUrl: cfg.baseUrl } : {}) }),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || data.error) throw new Error(data.error || `Erro ${res.status}`);
  LAST_AI_USAGE = data.usage || null;
  return data.text || '';
}

// Motor de conversa multi-turno (Fase 0 do plano de IA assistida). Reaproveita o suporte a
// { system, messages } que a Edge Function ai-ask JA tem — nao substitui askAI (que segue
// servindo o caminho de uma rodada). messages = [{role:'user'|'assistant', content}]; o
// material grande vai no system (prefixo estavel = candidato a prompt caching no provedor).
//
// IMPORTANTE: a ai-ask SO usa body.system no fallback de { prompt } — quando vem body.messages,
// ela ignora body.system e extrai o system de mensagens com role:'system' DENTRO do array.
// Por isso o system entra PREPENDADO como 1a mensagem (role:'system'), nao como campo separado;
// senao o system (= todo o material) seria descartado e o modelo responderia sem contexto.
// Esse caminho funciona em todos os provedores (Gemini/OpenAI/Anthropic/Azure/custom) sem
// precisar redeploy da function. Mandamos body.system tambem, por compatibilidade/inocuo.
async function askAIChat({ system, messages, signal, json }){
  const cfg = getAIConfig();
  if(isLocalProvider(cfg.provider)) return askLocalChat({ system, messages, signal, json });
  const msgs = [ ...(system ? [{ role:'system', content: system }] : []), ...(messages || []) ];
  const res = await fetch(`${SUPABASE_URL}/functions/v1/ai-ask`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${await aiAuthToken()}`, apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ...(system ? { system } : {}),
      messages: msgs,
      provider: cfg.provider,
      ...(cfg.apiKey ? { apiKey: cfg.apiKey } : {}),
      ...(activeModelId(cfg) ? { model: activeModelId(cfg) } : {}),
      ...(cfg.baseUrl ? { baseUrl: cfg.baseUrl } : {}),
    }),
    ...(signal ? { signal } : {}),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || data.error) throw new Error(data.error || `Erro ${res.status}`);
  LAST_AI_USAGE = data.usage || null;
  return data.text || '';
}

function lastAiUsage(){ return LAST_AI_USAGE; }
// carrega (uma vez, cacheado) a tabela ai_prices por REST com a anon key (leitura publica).
// Funciona em qualquer modo (nuvem/arquivo/rascunho): as chamadas de IA ja usam SUPABASE_URL/ANON.
async function loadAiPrices(){

  }catch(e){}

// cambio US$->R$ ajustavel (Minha Conta); default provisorio, o pesquisador acerta.
function aiUsdBrl(){ const v = parseFloat(localStorage.getItem('qualilab:usd_brl')||''); return (v>0 && isFinite(v)) ? v : 5.5; }
// tarifa do usuario (BYOK) pra custom/azure (US$/1M), guardada em Minha Conta
function aiUserRate(){
  const i = parseFloat(localStorage.getItem('qualilab:ai_price_in')||'');
  const o = parseFloat(localStorage.getItem('qualilab:ai_price_out')||'');
  return (isFinite(i) && isFinite(o) && i>=0 && o>=0 && (i||o)) ? { input:i, output:o } : null;
}
// modelo efetivo do config ativo (config.model, ou o default def:true do provedor quando vazio —
// mesmo id que a Edge Function usa via DEFAULT_MODELS, mantidos em sincronia manual).
function activeModelId(cfg){
  cfg = cfg || getAIConfig();
  const prov = AI_PROVIDERS.find(p=>p.id===cfg.provider);
  return cfg.model || (prov?.models||[]).find(m=>m.def)?.id || '';
}
// preco unitario (US$/1M) do provedor+modelo: ollama/local = gratis; custom/azure = tarifa do
// usuario (sem referencia possivel); catalogo = referencia da ai_prices (id normalizado tirando
// sufixo de data, ex. claude-haiku-4-5-20251001 -> claude-haiku-4-5). null = sem preco conhecido.
function aiUnitPrice(provider, model, prices){
  if(isLocalProvider(provider)) return { input:0, output:0, src:'local' };
  const provDef = AI_PROVIDERS.find(p=>p.id===provider);
  if(provDef?.custom){ const r = aiUserRate(); return r ? { input:r.input, output:r.output, src:'sua tarifa' } : null; }
  const map = prices || AI_PRICES;
  const norm = String(model||'').replace(/-\d{8}$/,'');
  const row = map && (map[`${provider}|${model}`] || map[`${provider}|${norm}`]);
  return row ? { input: row.input, output: row.output, src:'referência' } : null;
}
// estimativa de custo de UMA chamada dado o usage (tokens). Ignora desconto de cache (=teto
// conservador). Retorna { usd, brl, src } ou null (sem preco). provider/model default = config ativo.
function aiCostEstimate(usage, provider, model){
  if(!usage) return null;
  const c = getAIConfig();
  provider = provider || c.provider;
  if(model==null) model = activeModelId(c);
  const p = aiUnitPrice(provider, model);
  if(!p) return null;
  const usd = (Number(usage.input||0)/1e6)*p.input + (Number(usage.output||0)/1e6)*p.output;
  return { usd, brl: usd*aiUsdBrl(), src: p.src };
}
// formata dinheiro pt-BR com precisao pra valores pequenos (chamadas custam centavos)
function iaMoney(v, cur){
  const sym = cur==='USD' ? 'US$' : 'R$';
  if(!(v>0)) return `${sym} 0`;
  if(v<0.005) return `${sym} <0,01`;
  return `${sym} ${v.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2})}`;
}
// rotulo curto de custo pra exibir num balao/turno: "~R$ 0,04" (+ "US$ 0,007" no title) ou
// "grátis (local)" ou null (sem preco configurado). tokens sempre disponiveis a parte.
function aiCostLabel(usage, provider, model){
  const est = aiCostEstimate(usage, provider, model);
  if(!est) return null;
  if(est.src==='local') return 'grátis (local)';
  return `~${iaMoney(est.brl,'BRL')}`;
}
// tokens ESTIMADOS de entrada de um prompt de IA: material capado no limite + escala fixa do prompt
// (~1200 chars de andaime), a ~4 chars/token. FONTE UNICA (buildProv das 4 telas de IA + os botoes).
function iaPromptTokens(chars){ return Math.round((Math.min(chars, IA_TOTAL_CHAR_LIMIT) + 1200) / 4); }
// IA_FORECAST_OUT_TOKENS: orcamento de saida ASSUMIDO na estimativa PRE-envio. Diferente do custo por
// turno (usage REAL), aqui a saida ainda nao existe — e costuma custar mais por token que a entrada.
// Valor modesto e explicado no title; ajuste aqui pra mudar o padrao de todas as telas de IA.
const IA_FORECAST_OUT_TOKENS = 1500;
// rotulo PROSPECTIVO de custo (antes de enviar) = entrada (inTok) + IA_FORECAST_OUT_TOKENS de saida
// assumida. prices = mapa opcional (default global AI_PRICES); os paineis passam o proprio estado pra
// forcar o recalculo quando a referencia de preco chega. Retorna { text, title } (text = "≈ R$ X" ou
// "grátis") ou null (sem preco conhecido -> a UI mostra so os tokens, como antes).
function aiForecastLabel(inTok, prices){
  const c = getAIConfig();
  const p = aiUnitPrice(c.provider, activeModelId(c), prices);
  if(!p) return null;
  if(p.src==='local') return { text:'grátis', title:'modelo local (Ollama) — sem custo de API' };
  const outTok = IA_FORECAST_OUT_TOKENS;
  const usd = (Number(inTok||0)/1e6)*p.input + (outTok/1e6)*p.output;
  return {
    text: '≈ ' + iaMoney(usd*aiUsdBrl(), 'BRL'),
    title: `custo estimado (${p.src}): entrada ~${Number(inTok||0).toLocaleString('pt-BR')} + saída estimada ~${outTok.toLocaleString('pt-BR')} tokens · teto (ignora desconto de cache); a saída real varia`,
  };
}

// extrai os objetos {...} de NIVEL SUPERIOR de uma string, respeitando strings/escapes —
// usado pra "salvar" operacoes mesmo quando o JSON em volta veio truncado (max_tokens) ou
// malformado. Pula chaves dentro de strings; nao confunde { de dentro de uma string.
function extractBalancedObjects(s){
  const out=[]; let depth=0, start=-1, inStr=false, esc=false;
  for(let i=0;i<s.length;i++){ const ch=s[i];
    if(inStr){ if(esc) esc=false; else if(ch==='\\') esc=true; else if(ch==='"') inStr=false; continue; }
    if(ch==='"'){ inStr=true; continue; }
    if(ch==='{'){ if(depth===0) start=i; depth++; }
    else if(ch==='}'){ if(depth>0){ depth--; if(depth===0 && start>=0){ out.push(s.slice(start,i+1)); start=-1; } } }
  }
  return out;
}

// Parser tolerante de JSON vindo da IA — e o fallback UNIVERSAL do plano (funciona em
// qualquer provedor BYOK sem depender de saida estruturada nativa). Estrategia em camadas:
//   1) recorta um bloco ```json``` se houver, senao do 1o {/[ ao ultimo }/] e tenta JSON.parse
//      (com e sem virgulas-sobrando), cobrindo o caso comum de resposta bem-formada.
//   2) SALVAMENTO: se o parse falhar (tipico de saida truncada por max_tokens, em que o objeto
//      { "operations": [ ... } nunca fecha), localiza o array "operations" e extrai dele os
//      objetos {...} balanceados que parsearem individualmente — recupera as operacoes
//      completas e descarta so a ultima cortada. Marca _salvaged pra UI avisar.
// Devolve null se nada der. Quem chama trata o erro (e pode mostrar a resposta crua).
// Bloco de "memória do projeto" (diário de insights) injetado no system prompt das chamadas
// de IA. Só as entradas ATIVAS entram (o pesquisador escolhe quais usar — economia de tokens
// e transparência). Recebe a lista completa de memórias e filtra aqui, pra ser uma única fonte.
function memoryBlock(entries){
  const active = (entries||[]).filter(m=>m && m.active);
  if(!active.length) return 'Memória do projeto (decisões e insights já registrados pelo pesquisador): (nenhuma memória registrada ainda)';
  return 'Memória do projeto (decisões e insights já registrados pelo pesquisador — leve em conta, não repita como novidade):\n'
    + active.map(m=>`- ${m.content}`).join('\n');
}

// Valida/normaliza as memórias propostas pela IA (campo "memory" do JSON): só entradas com
// content não-vazio; reason default ''; corta tamanho; até 8 (mesma disciplina do validateOps).
function validateMemProps(raw){
  const out = [];
  for(const e of (Array.isArray(raw)?raw:[])){
    const content = String(e?.content||'').trim();
    if(!content) continue;
    out.push({ content: content.slice(0,400), reason: String(e?.reason||'').trim().slice(0,300) });
    if(out.length>=8) break;
  }
  return out;
}

function parseAIJson(text){
  if(!text) return null;
  let s = String(text).trim();
  const fenced = s.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if(fenced) s = fenced[1].trim();
  const firstObj = s.indexOf('{'), firstArr = s.indexOf('[');
  let start = -1, closeCh = '}';
  if(firstArr >= 0 && (firstObj < 0 || firstArr < firstObj)){ start = firstArr; closeCh=']'; }
  else if(firstObj >= 0){ start = firstObj; }
  const last = start>=0 ? s.lastIndexOf(closeCh) : -1;
  const core = start>=0 ? s.slice(start, last>start ? last+1 : s.length) : s;
  for(const t of [core, core.replace(/,\s*([}\]])/g, '$1')]){ // crua e sem virgula-sobrando
    try{ return JSON.parse(t); }catch(e){}
  }
  // SALVAMENTO generico (cobre truncamento por max_tokens): acha o 1o array NOMEADO do objeto
  // ("operations"/"values"/"codings"/"memory"...) e extrai dele os objetos {...} balanceados que
  // parseiam individualmente — recupera os itens completos e descarta so o ultimo cortado. A chave
  // detectada e PRESERVADA (parsed.operations, parsed.values, ...), pra cada painel ler a sua.
  const arrKey = s.match(/["'](\w+)["']\s*:\s*\[/);
  if(arrKey){
    const items = [];
    for(const o of extractBalancedObjects(s.slice(s.indexOf('[', arrKey.index) + 1))){
      try{ const p = JSON.parse(o); if(p && typeof p==='object' && !Array.isArray(p)) items.push(p); }catch(e){}
    }
    if(items.length){
      const sum = s.match(/["']summary["']\s*:\s*"((?:[^"\\]|\\.)*)"/);
      return { [arrKey[1]]: items, summary: sum ? sum[1] : '', _salvaged: true };
    }
  }
  return null;
}

/* ============ ReportView — aba Relatório ============
   Montador: o pesquisador liga/desliga seções por checkbox e o relatório se monta
   ao vivo no painel direito. Imprime só o relatório (#report-print + CSS @media print). */
const REPORT_GROUPS = [
  { group:'Visão geral', items:[
    { id:'resumo',    label:'Resumo do projeto',  desc:'Nome, tipo, totais e codificadores.' },
    { id:'docs_list', label:'Lista de documentos', desc:'Nomes dos documentos do projeto.' },
  ]},
  { group:'Esquema', items:[
    { id:'cat_count',  label:'Quantas categorias',   desc:'Número total de categorias.' },
    { id:'cat_list',   label:'Quais categorias',     desc:'Lista das categorias, com o tipo.' },
    { id:'code_count', label:'Quantos códigos',      desc:'Número de códigos de Hierarquia 0 (raiz).' },
    { id:'sub_count',  label:'Quantos sub-códigos',  desc:'Número de códigos com pai (subníveis).' },
    { id:'code_list',  label:'Quais códigos',        desc:'Lista dos códigos de Hierarquia 0.' },
    { id:'sub_list',   label:'Quais sub-códigos',    desc:'Lista dos sub-códigos, com o caminho do pai.' },
  ]},
  { group:'Resultados', items:[
    { id:'freq',       label:'Frequência de códigos',     desc:'Quantas vezes cada código foi aplicado.' },
    { id:'categorias', label:'Distribuição por categoria', desc:'Documentos por valor de cada categoria fechada.' },
    { id:'trechos',    label:'Trechos por código',        desc:'Citações agrupadas por código e documento.' },
    { id:'unused',     label:'Códigos não utilizados',    desc:'Códigos sem nenhuma codificação.' },
  ]},
];

function ReportView({ project, projectMode, docs, cats, codes, codeById, codePath, allCodings, allValues, store, view, onView, coders:projCoders, userId, mode, memos }){
  const [enabled, setEnabled] = useState(()=>new Set(['credito','resumo','freq']));
  const [title, setTitle] = useState('');
  const [rmode, setRmode] = useState('ati'); // ati | padrao | w3c — interativo é o padrão (incentivar)
  const [anonAuthors, setAnonAuthors] = useState(false); // ocultar autoria (revisão cega) nas saídas de transparência
  const toggle = (id)=> setEnabled(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const on = (id)=> enabled.has(id);

  // codificações do recorte "Ver:" compartilhado (mesma fonte das outras telas)
  const codingsForReport = useMemo(()=>
    codingsForView(allCodings, view, userId, projectMode)
  , [allCodings, view, userId, projectMode]);

  const docById = useMemo(()=>Object.fromEntries(docs.map(d=>[d.id,d])), [docs]);
  // CENSURA: o relatorio (copia/impressao/tela) e feito pra compartilhar — mascara trechos
  // censurados. Detecta censura em TODAS as camadas (allCodings, conservador), entao um trecho
  // censurado por um codificador nao vaza via quote de codigo analitico (ou da propria censura).
  const redactionIds = useMemo(()=> new Set(codes.filter(c=>c.is_redaction).map(c=>c.id)), [codes]);
  const codingsByDoc = useMemo(()=>{ const m={}; (allCodings||[]).forEach(c=>{ (m[c.document_id]=m[c.document_id]||[]).push(c); }); return m; }, [allCodings]);
  const maskQuote = (c)=> maskQuoteSpans(c, codingsByDoc[c.document_id], redactionIds);
  const pathOf = (id)=> codePath ? codePath(id).join(' ▸ ') : (codeById[id]?.name||id);
  const swatch = (c)=> html`<span class="swatch" style=${`display:inline-block;vertical-align:middle;background:${codeColor(c.hue,c.depth,c.hue_deg,false,c.sat).solid}`}></span>`;
  const kindLabel = (k)=> (CAT_KINDS.find(x=>x.id===k)||{}).label || k;

  // CENSURA fora do relatorio: codigos is_redaction nao sao categorias analiticas (marcacao de
  // conteudo sensivel) — saem de TODAS as secoes derivadas de codigo (esquema, frequencia, trechos,
  // nao-utilizados) e das contagens do resumo. Os exports de transparencia ja os excluem; o
  // relatorio padrao tambem deve. (As citacoes que sobram, de codigos analiticos, seguem mascaradas
  // por maskQuote onde sobreponham censura.)
  const analyticCodes = useMemo(()=>codes.filter(c=>!c.is_redaction), [codes]);
  const topCodes = useMemo(()=>analyticCodes.filter(c=>!c.parent_id), [analyticCodes]);
  const subCodes = useMemo(()=>analyticCodes.filter(c=>c.parent_id), [analyticCodes]);

  // contagem (direta) por código
  const countMap = useMemo(()=>{
    const m={}; codingsForReport.forEach(c=>{ m[c.code_id]=(m[c.code_id]||0)+1; }); return m;
  }, [codingsForReport]);
  // frequência por código, do mais usado ao menos
  const freq = useMemo(()=>
    analyticCodes.map(c=>({ code:c, n:countMap[c.id]||0 })).filter(x=>x.n>0).sort((a,b)=>b.n-a.n)
  , [countMap, analyticCodes]);
  const unusedCodes = useMemo(()=>analyticCodes.filter(c=>!countMap[c.id]), [countMap, analyticCodes]);
  const anyEsq = ['cat_count','cat_list','code_count','sub_count','code_list','sub_list'].some(on);

  // distribuição por categoria fechada: contagem de documentos por valor (usa gabarito quando há)
  const catDist = useMemo(()=>{
    const closed = cats.filter(c=>CAT_HAS_OPTIONS(c.kind)||c.kind==='date');
    return closed.map(cat=>{
      const counts={};
      docs.forEach(d=>{
        // segue o recorte "Ver:": gabarito usa só o final; individuais usam as respostas individuais
        const vals = valuesForView(allValues, d.id, cat.id, view, userId, projectMode);
        const seen=new Set();
        vals.forEach(v=>{ if(v==null) return; String(v).split(CAT_MULTI_SEP).forEach(part=>{ const k=part.trim(); if(k && !seen.has(k)){ seen.add(k); counts[k]=(counts[k]||0)+1; } }); });
      });
      const rows = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
      return { cat, rows };
    }).filter(x=>x.rows.length>0);
  }, [cats, docs, allValues, view, userId, projectMode]);

  // trechos por código: agrupa codings por código, depois por documento
  const trechosByCode = useMemo(()=>{
    const byCode={};
    codingsForReport.forEach(c=>{ (byCode[c.code_id]=byCode[c.code_id]||[]).push(c); });
    return freq.map(({code})=>{
      const list = byCode[code.id]||[];
      const byDoc={};
      list.forEach(c=>{ (byDoc[c.document_id]=byDoc[c.document_id]||[]).push(c); });
      const docs2 = Object.entries(byDoc)
        .map(([docId,cods])=>({ docId, name:docById[docId]?.name||docId,
          cods:cods.slice().sort((a,b)=>a.span_start-b.span_start) }))
        .sort((a,b)=>a.name>b.name?1:-1);
      return { code, docs:docs2 };
    }).filter(x=>x.docs.length>0);
  }, [codingsForReport, freq, docById]);

  const totalCodings = codingsForReport.filter(c=>!redactionIds.has(c.code_id)).length;

  // codificadores: nomes distintos das codificações individuais (o trabalho de codificação).
  // Só faz sentido em projeto coletivo; ordena alfabeticamente.
  const coders = useMemo(()=>{
    if(projectMode!=='collective') return [];
    const s=new Set();
    // censura nao conta como trabalho analitico no relatorio: quem so marcou censura nao vira
    // "codificador" aqui (consistente com a exclusao dos codigos is_redaction das demais secoes).
    allCodings.filter(c=>c.layer!=='final' && !redactionIds.has(c.code_id)).forEach(c=>{ const n=(c.author_name||'').trim(); if(n) s.add(n); });
    return [...s].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  }, [allCodings, projectMode, redactionIds]);

  // monta o relatório como texto simples (sem marcações .md) — para colar direto em Word/Docs
  function buildText(){
    const L=[]; const H=(t)=>L.push('',''+t,'');
    L.push(title.trim()||project?.name||'Relatório');
    L.push('Gerado em '+new Date().toLocaleDateString('pt-BR')+(projectMode==='collective'?' · Ver: '+viewLabel(view, projCoders):''));
    if(on('resumo')){ H('Resumo');
      L.push(`Projeto ${project?.name||''} (${projectMode==='collective'?'coletivo':'individual'}), com ${docs.length} documento(s), ${analyticCodes.length} código(s), ${cats.length} categoria(s) e ${totalCodings} codificação(ões).`+(on('credito')?' O projeto foi codificado por meio da ferramenta QualiLab.':''));
      if(coders.length) L.push('', 'Codificado por: '+coders.join(', ')+'.');
    }
    if(on('docs_list')){ H('Documentos');
      if(!docs.length) L.push('(nenhum documento)');
      else docs.forEach((d,i)=> L.push(`${i+1}. ${d.name}`));
    }
    if(anyEsq){ H('Esquema');
      if(on('cat_count')) L.push(`Total de ${cats.length} categoria(s).`);
      if(on('cat_list')){ L.push(''); cats.forEach(c=> L.push(`• ${c.name} (${kindLabel(c.kind)})`)); }

    }
    return L.join('\n').replace(/\n{3,}/g,'\n\n').trim()+'\n';
  }

/* ============ CODIFICAR COM IA — organizacao de codigos (Fase 2 do plano) ============
   A IA PROPOE reorganizar o esquema de codigos (caso classico de grounded theory: centenas
   de codigos soltos no mesmo nivel apos a codificacao aberta); o pesquisador APROVA / recusa
   cada operacao, com a justificativa (reason) visivel. Nada e aplicado sem confirmacao
   (mesmo espirito do allowRedact e do "Ver prompt completo"). Aplicar reusa a MESMA logica
   ja provada em SchemaCodesView — reparentSubtree (recalcula profundidade/cor da subarvore),
   merge via addCoding+deleteCoding preservando filhos, proteção contra ciclo (isDescendantOf).

   IDs: os codigos reais sao uuids longos; aqui mapeamos cada um pra um id curto (#c1, #c2...)
   pra IA referenciar de forma barata e legivel. Toda operacao tem seus ids traduzidos de
   volta e VALIDADOS contra os codigos reais — id inexistente e descartado em silencio. */

// uma operacao por tipo, com descricao legivel pra previa antes->depois e o reason da IA.
const IA_COD_SYS_REGRAS = `Sua tarefa é propor uma reorganização do esquema de códigos e devolver SOMENTE um objeto JSON (sem texto fora dele), no formato:
{
  "operations": [
    { "op": "merge",    "survivor": "#c2", "merged": ["#c5","#c8"], "reason": "..." },
    { "op": "group",    "children": ["#c3","#c4"], "parent": "#c1", "reason": "..." },
    { "op": "group",    "children": ["#c6","#c7"], "parent": null, "newParentName": "Nome da nova família", "reason": "..." },
    { "op": "reparent", "id": "#c9", "newParent": "#c1", "reason": "..." },
    { "op": "rename",   "id": "#c4", "newName": "Novo nome", "reason": "..." },
    { "op": "promote",  "id": "#c7", "reason": "..." }
  ],
  "summary": "uma frase resumindo a lógica geral da proposta",
  "memory": [ { "content": "fato/decisão curto e durável sobre o projeto, em 1 frase", "reason": "por que vale lembrar, em 1 linha" } ]
}
Significado: merge = fundir códigos redundantes num só (survivor sobrevive, merged somem e seus trechos passam pro survivor); group = manter os códigos separados, mas agrupá-los como filhos de um pai (existente em "parent", ou novo com "newParentName" e parent=null); reparent = mover um código pra dentro de outro pai; rename = renomear; promote = tornar um código uma família de topo (Hierarquia 0).
Regras: use SOMENTE os ids curtos que aparecem na lista de códigos (não invente ids nem use nomes no lugar do id); explique CADA operação no campo "reason" (em português, em UMA frase curta — não use quebras de linha dentro de strings JSON); prefira poucas famílias claras a muitos níveis; sinalize incerteza no próprio "reason" quando houver; não proponha operações triviais ou redundantes. Proponha NO MÁXIMO 20 operações por resposta — se houver mais a fazer, priorize as mais importantes e diga no "summary" que há mais a fazer numa próxima rodada (a resposta não pode ser longa demais ou será cortada). Se o esquema já estiver bem organizado, devolva "operations": [] e diga isso no "summary".
O campo "memory" é OPCIONAL: inclua-o só se desta análise emergir algum fato ou decisão DURÁVEL sobre o projeto que valha registrar na memória do projeto (ex.: "as famílias X e Y foram consolidadas", "o esquema foi reorganizado em N famílias temáticas"). NÃO registre observações triviais ou transitórias. No máximo 8 entradas, cada "content" em UMA frase. Se não houver nada relevante, omita "memory" ou devolva [].
Devolva apenas o JSON, sem texto antes nem depois, sem comentários.`;

function IAOrganizarPanel({ project, docs, codes, codeById, codePath, store, allCodings, count, isAdmin, reload, loadAll, onAdd, memos, onSetMemo, memory, onAddMemory, onToggleMemory, onDeleteMemory, tab, setTab, TABS }){
  // history: a conversa inteira. Cada turno de IA carrega seus PROPRIOS dados estruturados
  // (operacoes ja traduzidas+validadas, resumo, memorias propostas, flags) — assim as operacoes
  // aparecem INLINE no balao da IA. So o ultimo turno de IA fica acionavel; os anteriores/aplicados
  // viram registro somente-leitura (aplicar uma proposta velha apos o esquema mudar seria inseguro).
  const [history, setHistory] = useState([]);
  const [decided, setDecided] = useState({});    // { 'turnIdx:opIdx:op': true|false } aprovar/recusar (default aprovar)
  const [instruction, setInstruction] = useState(''); // 1o turno / follow-up livre do pesquisador
  const [withSamples, setWithSamples] = useState(true); // incluir amostra de trechos por codigo
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [applyMsg, setApplyMsg] = useState('');

  // patch imutavel de um turno especifico do history
  const patchTurn = (idx, patch)=> setHistory(h=> h.map((t,i)=> i===idx ? { ...t, ...patch } : t));
  // ultimo turno de IA (so ele aceita aprovar/aplicar)
  const lastAssistantIdx = (()=>{ for(let i=history.length-1;i>=0;i--){ if(history[i].role==='assistant') return i; } return -1; })();
  const dkey = (turnIdx, i, op)=> turnIdx+':'+i+':'+op;

  // --- CONFIG DO PROMPT (mesmo padrão do Analisar, MENOS postura/biblioteca): ai_instructions
  // (COMPARTILHADO com o Analisar) + ai_context (Memo para a IA) + memos injetados. ---
  const [showPrompt, setShowPrompt] = useState(false);
  const [aiPrices, setAiPrices] = useState(AI_PRICES); // referencia de preco p/ estimativa de custo (re-render quando chega)
  useEffect(()=>{ if(!AI_PRICES) loadAiPrices().then(setAiPrices); }, []);
  const aiInstrMemo = (memos||[]).find(m=>m.scope==='ai_instructions' && m.target_id===project?.id);
  const ctxMemo     = (memos||[]).find(m=>m.scope==='ai_context' && m.target_id===project?.id);
  const [aiInstr, setAiInstr] = useState('');
  const instrTouched = useRef(false);
  const memoKey = (m)=> `${m.scope}:${m.target_id}`;
  const ctxKey = `ai_context:${project?.id}`;
  const [injectSel, setInjectSel] = useState(()=> new Set([ctxKey]));
  useEffect(()=>{ if(!instrTouched.current) setAiInstr(aiInstrMemo?.content || ''); }, [aiInstrMemo?.content]);
  useEffect(()=>{ instrTouched.current=false; setInjectSel(new Set([ctxKey])); }, [project?.id]); // eslint-disable-line
  const instrDebRef = useRef(null);
  const changeInstr = (val)=>{ instrTouched.current=true; setAiInstr(val); clearTimeout(instrDebRef.current); instrDebRef.current = setTimeout(()=>{ onSetMemo && onSetMemo('ai_instructions', project.id, val); }, 700); };
  const toggleInject = (key)=> setInjectSel(s=>{ const n=new Set(s); n.has(key)?n.delete(key):n.add(key); return n; });
  const memoName = (m)=> m.scope==='ai_context' ? 'Memo para a IA'
    : m.scope==='project' ? 'Memo do projeto'
    : m.scope==='document' ? `Documento: ${(docs.find(d=>d.id===m.target_id)||{}).name||'—'}`
    : m.scope==='code' ? `Código: ${(codePath?codePath(m.target_id):[]).join(' ▸ ')}`
    : m.scope==='coding' ? 'Nota de trecho' : m.scope;
  const injectableMemos = (memos||[]).filter(m=> ['project','document','code','coding'].includes(m.scope) && m.content && m.content.trim());
  const injectedMemos = (memos||[]).filter(m=> injectSel.has(memoKey(m)) && m.content && m.content.trim());

  // ids curtos estaveis (#c1..) <-> uuid real. Recalcula quando a lista de codigos muda.
  const { shortToId, idToShort } = useMemo(()=>{
    const s2i = {}, i2s = {};
    codes.forEach((c,i)=>{ const sh = 'c'+(i+1); s2i[sh] = c.id; i2s[c.id] = sh; });
    return { shortToId: s2i, idToShort: i2s };
  }, [codes]);
  const resolveId = (ref)=>{
    if(ref==null) return null;
    const key = String(ref).replace(/^#/, '').trim();
    if(shortToId[key]) return shortToId[key];      // id curto (#c3 ou c3)
    if(codeById[key]) return key;                  // a IA mandou o uuid real direto
    return null;
  };
  const shortOf = (realId)=> idToShort[realId] || '?';
  const nameOf = (realId)=> codeById[realId]?.name || '(removido)';
  const labelOf = (realId)=> `#${shortOf(realId)} "${nameOf(realId)}"`;

  // censura: codigos is_redaction (e toda a subarvore — a flag cascateia) NAO sao categorias
  // analiticas, sao marcacao de conteudo sensivel. Ficam FORA do material de reorganizacao (a IA
  // nao deve mesclar/agrupar/mover censura) — mesmo espirito do selectableCodes no IAAnalisarPanel.
  const redactionIds = useMemo(()=> new Set(codes.filter(c=>c.is_redaction).map(c=>c.id)), [codes]);
  const organizable = useMemo(()=> codes.filter(c=>!redactionIds.has(c.id)), [codes, redactionIds]);

  // ---- MATERIAL (vai no system, prefixo estavel) ----
  const codeListBlock = useMemo(()=>{
    const lines = organizable.map(c=>{
      const parent = c.parent_id ? '#'+shortOf(c.parent_id) : '(raiz)';
      return `#${shortOf(c.id)} | "${c.name}" | pai: ${parent} | profundidade ${c.depth??0} | ${count[c.id]||0} trechos`;
    });
    return 'LISTA DE CÓDIGOS (id | nome | pai | profundidade | nº de trechos):\n' + (lines.join('\n') || '(nenhum código)');
  }, [organizable, count, idToShort]);

  const excerptBlock = useMemo(()=>{
    if(!withSamples) return '';
    const byCode = {}, byDoc = {};
    (allCodings||[]).forEach(c=>{ (byCode[c.code_id] = byCode[c.code_id]||[]).push(c); (byDoc[c.document_id] = byDoc[c.document_id]||[]).push(c); });
    // CENSURA POR SOBREPOSICAO: o codigo amostrado nunca e de censura (organizable exclui), mas o
    // quote dele pode COBRIR um trecho que OUTRO codificador censurou (coding separado, code_id de
    // censura). maskQuoteSpans (top-level) mascara so a porcao sobreposta, preservando o resto como
    // contexto de organizacao; depois corta em 240 chars.
    const maskQuote = (co)=> maskQuoteSpans(co, byDoc[co.document_id], redactionIds).slice(0,240);
    // escolhe ate N trechos ILUSTRATIVOS e DISTINTOS por codigo (O(n), so um Set):
    //  1) dedup por span EXATO (documento+offsets) — varios pesquisadores codificando o MESMO
    //     trecho viram 1 (era o desperdicio: os 3 slots gastos com a mesma frase repetida);
    //  2) round-robin por documento — alterna as fontes pra mostrar variacao entre casos, em
    //     vez de 3 trechos do mesmo documento. (Mesmo span/texto identico = mesma chave; dois
    //     trechos com texto igual mas spans diferentes sao ocorrencias distintas, ficam ambos.)
    const pick = (list, n)=>{
      const seen = new Set(); const docBuckets = new Map();
      for(const co of list){
        const key = co.document_id+'|'+co.span_start+'|'+co.span_end;
        if(seen.has(key)) continue; seen.add(key);
        if(!docBuckets.has(co.document_id)) docBuckets.set(co.document_id, []);
        docBuckets.get(co.document_id).push(co);
      }
      const out = []; let round = 0, added = true;
      while(added && out.length < n){ added = false;
        for(const arr of docBuckets.values()){ if(out.length>=n) break; if(arr[round]){ out.push(arr[round]); added = true; } }
        round++;
      }
      return out;
    };
    const blocks = organizable.map(c=>{
      const list = pick(byCode[c.id]||[], 3);
      if(!list.length) return null;
      const quotes = list.map(co=> `- "${maskQuote(co)}"`);
      return `#${shortOf(c.id)} "${c.name}":\n${quotes.join('\n')}`;
    }).filter(Boolean);
    if(!blocks.length) return '';
    return '\n\nAMOSTRA DE TRECHOS POR CÓDIGO (até 3 por código, distintos e ilustrativos — NÃO são todos os trechos):\n' + blocks.join('\n\n');
  }, [organizable, allCodings, withSamples, idToShort, redactionIds]);

  // material com truncamento (preserva a lista de codigos inteira; corta a amostra primeiro)
  const buildMaterial = ()=>{
    let mat = codeListBlock + excerptBlock;
    if(mat.length > IA_TOTAL_CHAR_LIMIT){
      const budget = Math.max(0, IA_TOTAL_CHAR_LIMIT - codeListBlock.length);
      mat = codeListBlock + (budget>200 ? excerptBlock.slice(0, budget) + '\n[...amostra truncada — limite de tamanho...]' : '\n[amostra de trechos omitida — esquema grande]');
    }
    return mat;
  };
  // SECOES NOMEADAS do prompt — FONTE UNICA (system enviado + PromptInspector). Papel =
  // constituicao + papel deste painel + instrucoes; Memo = memos injetados (nao mais o memo
  // de projeto auto-injetado); regras = IA_COD_SYS_REGRAS.
  const promptSections = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const roleText = [
      IA_CONSTITUICAO,
      'Neste projeto você organiza o ESQUEMA DE CÓDIGOS (codebook), no espírito da grounded theory: propõe mesclar, agrupar, mover, renomear e promover códigos.',
      aiInstr.trim() ? `Instruções específicas deste projeto:\n${aiInstr.trim()}` : '',
    ].filter(Boolean).join('\n\n');
    const memoText = injectedMemos.length
      ? injectedMemos.map(m=>`[${memoName(m)}]\n${m.content.trim()}`).join('\n\n')
      : '(nenhum memo injetado)';
    const desc = 'Abaixo está a lista dos códigos do projeto que você pode reorganizar (com hierarquia e contagem de trechos) e, quando disponível, uma amostra ilustrativa de trechos por código. A amostra NÃO é exaustiva — não tire conclusões sobre a quantidade de trechos a partir dela. Não critique a cobertura nem a quantidade de codificação: o foco é só a ORGANIZAÇÃO dos códigos.'
      + (redactionIds.size ? ' OBSERVAÇÃO: códigos de CENSURA (marcação de conteúdo sensível) foram deixados de fora desta lista de propósito — eles não são categorias analíticas e NÃO devem ser mesclados, agrupados, movidos nem renomeados. Trabalhe apenas com os códigos listados.' : '');
    return [
      { key:'role',  label:'Papel e princípios',       meta:'organizador de códigos', text: roleText },
      { key:'memo',  label:'Memo(s) para a IA',         meta:`${injectedMemos.length} injetado(s)`, text: memoText },
      { key:'mem',   label:'Memória do projeto',        meta: nMem ? `${nAtiv} de ${nMem} ativas` : 'nenhuma', text: memoryBlock(memory) },
      { key:'desc',  label:'Sobre o material',          meta:'o recorte', text: `Sobre o material que você recebeu:\n${desc}` },
      { key:'mat',   label:'Material',                  meta:`${organizable.length} código(s)`, text: 'MATERIAL:\n' + buildMaterial() },
      { key:'rules', label:'Regras e formato de saída', meta:'—', text: IA_COD_SYS_REGRAS },
    ];
  };
  const systemPrompt = promptSections().map(s=>s.text).join('\n\n');
  const buildProv = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const chars = (codeListBlock + excerptBlock).length;
    return {
      model: currentModelLabel(),
      material: `${organizable.length} código(s)`,
      mem: nMem ? `${nAtiv} de ${nMem}` : 'nenhuma',
      censura: redactionIds.size ? `${redactionIds.size} código(s) de censura fora` : '—',
      chars, limit: IA_TOTAL_CHAR_LIMIT,
      tokens: iaPromptTokens(chars),
      cost: aiForecastLabel(iaPromptTokens(chars), aiPrices),
    };
  };

  // ---- VALIDACAO: traduz ids curtos -> reais e descarta operacoes invalidas ----
  // resolveSafe = resolveId mas BLOQUEIA ids de censura (defesa: mesmo que a IA alucine um id
  // de codigo is_redaction, a operacao que o referencia e descartada — censura nao se reorganiza).
  const resolveSafe = (ref)=>{ const id = resolveId(ref); return (id && redactionIds.has(id)) ? null : id; };
  const validateOps = (rawOps)=>{
    const out = []; let bad = 0;
    const seen = new Set(); // ids ja "consumidos" por um merge/group anterior nesta proposta
    for(const o of (Array.isArray(rawOps)?rawOps:[])){
      const op = String(o?.op||'').toLowerCase();
      const reason = String(o?.reason||'').trim();
      if(op==='merge'){
        const survivor = resolveSafe(o.survivor);
        const merged = (Array.isArray(o.merged)?o.merged:[]).map(resolveSafe).filter(id=>id && id!==survivor && !seen.has(id));
        if(survivor && merged.length){ merged.forEach(id=>seen.add(id)); out.push({ op, survivor, merged, reason }); }
        else bad++;
      } else if(op==='group'){
        const parent = o.parent!=null ? resolveSafe(o.parent) : null;
        const newParentName = String(o.newParentName||'').trim();
        const children = (Array.isArray(o.children)?o.children:[]).map(resolveSafe).filter(Boolean);
        if(children.length && (parent || newParentName)) out.push({ op, parent, newParentName, children, reason });
        else bad++;
      } else if(op==='reparent'){
        const id = resolveSafe(o.id), newParent = resolveSafe(o.newParent);
        if(id && newParent && id!==newParent) out.push({ op, id, newParent, reason });
        else bad++;
      } else if(op==='rename'){
        const id = resolveSafe(o.id), newName = String(o.newName||'').trim();
        if(id && newName) out.push({ op, id, newName, reason });
        else bad++;
      } else if(op==='promote'){
        const id = resolveSafe(o.id);
        if(id && codeById[id]?.parent_id) out.push({ op, id, reason });
        else bad++;
      } else bad++;
    }
    return { out, bad };
  };

  // ---- ENVIAR (1o turno ou follow-up) ----
  async function send(){
    if(busy) return;
    if(!organizable.length){ setErr('Não há códigos para organizar (códigos de censura ficam de fora).'); return; }
    const base = instruction.trim() || (history.length
      ? 'Continue refinando a proposta.'
      : 'Analise a lista de códigos fornecida e proponha uma reorganização (mesclar redundâncias, agrupar em famílias coerentes, mover, renomear ou promover quando fizer sentido).');
    // reforco do formato no turno do usuario — modelos menores as vezes respondem em prosa
    const userTurn = base + ' Responda APENAS com o objeto JSON no formato especificado, sem texto antes ou depois.';
    setErr(''); setApplyMsg(''); setBusy(true);
    const nextHistory = [...history, { role:'user', content: userTurn, display: base }];
    setHistory(nextHistory); setInstruction('');
    const aIdx = nextHistory.length; // indice que o turno de IA ocupara
    try{
      const text = await askAIChat({ system: systemPrompt, messages: nextHistory, json: true });
      const parsed = parseAIJson(text);
      let entry;
      if(!parsed){
        // parse falhou de vez: guarda a resposta crua pra diagnosticar (truncada? texto em vez de JSON?)
        entry = { role:'assistant', content:text, ops:[], summary:'', dropped:0, salvaged:false,
          rawFail: text || '(resposta vazia)', memProps:[], applied:false, parseFailed:true };
      }else{
        const { out, bad } = validateOps(parsed.operations);
        entry = { role:'assistant', content:text, ops:out, summary:String(parsed.summary||''), dropped:bad,
          salvaged:!!parsed._salvaged, rawFail:'', memProps: validateMemProps(parsed.memory), applied:false };
        if(out.length){ setDecided(d=>{ const n={...d}; out.forEach((o,i)=>{ n[dkey(aIdx,i,o.op)] = true; }); return n; }); }
      }
      setHistory(h=>[...h, entry]);
    }catch(e){ setErr(String(e?.message||e)); }
    finally{ setBusy(false); }
  }

  // ---- APLICAR operacoes aprovadas (reusa a logica de SchemaCodesView, sobre um modelo de
  // trabalho local pra nao depender de re-render entre operacoes; reload/loadAll no fim) ----
  async function applyApproved(turnIdx){
    if(!isAdmin){ setErr('Apenas administradores podem alterar o esquema de códigos.'); return; }
    const turn = history[turnIdx]; if(!turn) return;
    const ops = turn.ops || [];
    const approved = ops.filter((o,i)=>decided[dkey(turnIdx,i,o.op)]);
    if(!approved.length){ setErr('Nenhuma operação aprovada para aplicar.'); return; }
    setErr(''); setApplyMsg(''); setBusy(true);
    // modelo de trabalho: copia mutavel dos codigos (intermediarios refletem aqui; o store e a
    // fonte da verdade so depois do reload). _deleted marca codigos ja mesclados/excluidos.
    const work = codes.map(c=>({ ...c }));
    const byId = id => work.find(c=>c.id===id);
    const childrenOf = id => work.filter(c=>c.parent_id===id && !c._deleted);
    const isDescendantOf = (nodeId, ancId)=>{ let p=byId(nodeId)?.parent_id; while(p){ if(p===ancId) return true; p=byId(p)?.parent_id; } return false; };
    async function reparentSubtree(codeId, newParentId, newDepth, adoptColor){
      const node = byId(codeId); if(!node) return;
      const patch = { parent_id:newParentId, depth:newDepth };
      if(adoptColor){ patch.hue=adoptColor.hue; patch.hue_deg=adoptColor.hue_deg ?? null; patch.sat=adoptColor.sat ?? null; }
      await store.updateCode(codeId, patch); Object.assign(node, patch);
      const stack=[{id:codeId,depth:newDepth}];
      while(stack.length){ const {id,depth}=stack.pop();
        for(const ch of childrenOf(id)){ const cd=depth+1; const cp={depth:cd};
          if(adoptColor){ cp.hue=adoptColor.hue; cp.hue_deg=adoptColor.hue_deg ?? null; cp.sat=adoptColor.sat ?? null; }
          await store.updateCode(ch.id, cp); Object.assign(ch, cp); stack.push({id:ch.id,depth:cd}); }
      }
    }
    let applied=0, skipped=0;
    // notas-por-trecho (scope='coding'): o merge recria os codings (id novo) e o delete do
    // antigo faz GC do memo; busca fresco pra migrar a nota pro id novo (mesmo fix do Esquema).
    let memoByCoding = {};
    try{ (await store.listMemos(project.id)).forEach(m=>{ if(m.scope==='coding' && m.content) memoByCoding[m.target_id]=m; }); }catch(e){}
    if(store.beginBatch) store.beginBatch();
    try{
      for(let i=0;i<ops.length;i++){
        const o = ops[i];
        if(!decided[dkey(turnIdx,i,o.op)]) continue;
        try{
          if(o.op==='merge'){
            const survivor = byId(o.survivor);
            const merged = o.merged.filter(id=>byId(id) && !byId(id)._deleted);
            if(!survivor || survivor._deleted || !merged.length){ skipped++; continue; }
            for(const mid of merged){
              for(const cod of (allCodings||[]).filter(c=>c.code_id===mid)){
                const nc = await store.addCoding(project.id, { document_id:cod.document_id, code_id:o.survivor,
                  span_start:cod.span_start, span_end:cod.span_end, quote:cod.quote, layer:cod.layer,
                  created_by:cod.created_by??null, author_name:cod.author_name });
                const mem = memoByCoding[cod.id];
                if(mem && nc && nc.id) await store.setMemo(project.id, 'coding', nc.id, mem.content, mem.author_name);
                await store.deleteCoding(cod.id);
              }
            }
            for(const mid of merged){ for(const ch of childrenOf(mid)){ await reparentSubtree(ch.id, o.survivor, survivor.depth+1, { hue:survivor.hue, hue_deg:survivor.hue_deg, sat:survivor.sat }); } }
            for(const mid of merged){ await store.deleteCode(mid); const n=byId(mid); if(n) n._deleted=true; }
            applied++;
          } else if(o.op==='group'){
            let parent = o.parent ? byId(o.parent) : null;
            if(!parent){ const created = await onAdd(null, o.newParentName||'Novo agrupamento'); parent = { ...created }; work.push(parent); }
            if(parent._deleted){ skipped++; continue; }
            for(const id of o.children){ const ch = byId(id); if(!ch || ch._deleted || id===parent.id || isDescendantOf(parent.id, id)) continue; await reparentSubtree(id, parent.id, parent.depth+1, { hue:parent.hue, hue_deg:parent.hue_deg, sat:parent.sat }); }
            applied++;
          } else if(o.op==='reparent'){
            const node = byId(o.id), parent = byId(o.newParent);
            if(!node || node._deleted || !parent || parent._deleted || o.id===parent.id || isDescendantOf(parent.id, o.id)){ skipped++; continue; }
            await reparentSubtree(o.id, parent.id, parent.depth+1, { hue:parent.hue, hue_deg:parent.hue_deg, sat:parent.sat });
            applied++;
          } else if(o.op==='rename'){
            const node = byId(o.id); if(!node || node._deleted){ skipped++; continue; }
            await store.updateCode(o.id, { name:o.newName }); node.name=o.newName; applied++;
          } else if(o.op==='promote'){
            const node = byId(o.id); if(!node || node._deleted || !node.parent_id){ skipped++; continue; }
            await reparentSubtree(o.id, null, 0, null); applied++;
          }
        }catch(e){ skipped++; }
      }
    } finally { if(store.endBatch) await store.endBatch(); }
    await reload(); await loadAll();
    patchTurn(turnIdx, { applied:true }); // proposta vira registro somente-leitura
    setApplyMsg(`${applied} operação(ões) aplicada(s)${skipped?`, ${skipped} ignorada(s)`:''}. Confira o esquema na aba "Esquema ▸ Códigos".`);
    // registra no historico que foi aplicado, pra IA saber o estado num proximo turno
    setHistory(h=>[...h, { role:'user', content: `(Apliquei ${applied} operação(ões) da sua proposta. O esquema mudou.)` }]);
    setBusy(false);
  }

  function reset(){ setHistory([]); setDecided({}); setErr(''); setApplyMsg(''); setInstruction(''); }

  // ---- descricao legivel de uma operacao (previa antes->depois) ----
  const describe = (o)=>{
    if(o.op==='merge') return html`Mesclar ${o.merged.map(labelOf).join(', ')} → sobrevivente <b>${labelOf(o.survivor)}</b>`;
    if(o.op==='group') return html`Agrupar ${o.children.map(labelOf).join(', ')} sob ${o.parent ? html`<b>${labelOf(o.parent)}</b>` : html`a nova família <b>"${o.newParentName}"</b>`}`;
    if(o.op==='reparent') return html`Mover ${labelOf(o.id)} para dentro de <b>${labelOf(o.newParent)}</b>`;
    if(o.op==='rename') return html`Renomear ${labelOf(o.id)} → <b>"${o.newName}"</b>`;
    if(o.op==='promote') return html`Promover ${labelOf(o.id)} a família de topo (Hierarquia 0)`;
    return o.op;
  };
  const OP_TAG = { merge:'Mesclar', group:'Agrupar', reparent:'Mover', rename:'Renomear', promote:'Promover' };

  const turnApprovedCount = (t, idx)=> (t.ops||[]).filter((o,i)=>decided[dkey(idx,i,o.op)]).length;

  // ---- render de um turno da IA: resumo em prosa + operacoes INLINE no proprio balao ----
  const assistantTurn = (t, idx)=>{
    const ops = t.ops || [];
    const interactive = idx===lastAssistantIdx && !t.applied && isAdmin; // so a ultima proposta e acionavel
    const appr = turnApprovedCount(t, idx);
    return html`<div key=${'a'+idx} class="card" style="margin-bottom:10px">
      <div class="field-label" style="margin-bottom:4px">IA</div>
      ${t.summary && html`<div dangerouslySetInnerHTML=${{__html: mdLite(t.summary)}} />`}
      ${t.salvaged && html`<div class="banner warn" style="margin-top:8px">A resposta veio truncada ou malformada; recuperei as operações completas abaixo (a última pode ter sido descartada). Para uma proposta completa, peça menos operações por vez.</div>`}
      ${t.parseFailed && html`<div class="banner err" style="margin-top:8px">A IA não devolveu um JSON válido. Se a resposta abaixo está cortada no fim, o esquema é grande demais: peça menos operações por vez, ou desligue a amostra de trechos.</div>`}
      ${t.rawFail && html`<details style="margin-top:8px"><summary class="meta" style="cursor:pointer">Ver resposta crua (diagnóstico)</summary>
        <pre style="white-space:pre-wrap;font-family:var(--mono);font-size:11px;background:var(--teal-soft);padding:10px;border-radius:8px;margin-top:6px;max-height:280px;overflow:auto">${t.rawFail}</pre></details>`}
      ${ops.length>0 && html`<div style="margin-top:10px">
        <div class="row" style="align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
          <b>${ops.length} operação(ões) ${t.applied?'aplicada(s)':'proposta(s)'}</b>
          ${!t.applied && html`<span class="meta">${appr} marcada(s) para aplicar</span>`}
          ${t.dropped>0 && html`<span class="meta">(${t.dropped} descartada(s) por id inválido)</span>`}
          ${interactive && html`<div style="flex:1"></div>
            <button class="btn sm ghost" onClick=${()=>setDecided(d=>{ const n={...d}; ops.forEach((o,i)=>{ n[dkey(idx,i,o.op)]=true; }); return n; })}>Aprovar todas</button>
            <button class="btn sm ghost" onClick=${()=>setDecided(d=>{ const n={...d}; ops.forEach((o,i)=>{ n[dkey(idx,i,o.op)]=false; }); return n; })}>Recusar todas</button>`}
        </div>
        ${ops.map((o,i)=>{ const k=dkey(idx,i,o.op); const on=!!decided[k]; const struck = !t.applied && !on;
          return html`<div key=${k} class="card" style=${`margin-bottom:8px;opacity:${struck?0.55:1}`}>
          <div class="row" style="gap:10px;align-items:flex-start">
            <div style="flex:1;min-width:0">
              <div style=${`font-size:13px;${struck?'text-decoration:line-through;text-decoration-color:var(--ink-faint)':''}`}><span class="pill" style="margin-right:6px">${OP_TAG[o.op]||o.op}</span>${describe(o)}</div>
              ${o.reason && html`<div class="meta" style="margin-top:4px">${o.reason}</div>`}
            </div>
            ${interactive && html`<div class="row" style="gap:6px;flex-shrink:0">
              <button class=${`btn sm ${on?'primary':'ghost'}`} title="Incluir esta operação ao aplicar" onClick=${()=>setDecided(d=>({...d,[k]:true}))}>${on?'✓ Aprovada':'Aprovar'}</button>
              <button class=${`btn sm ${on?'ghost':''}`} title="Não aplicar esta operação" onClick=${()=>setDecided(d=>({...d,[k]:false}))} style=${on?'':'background:var(--danger);color:#fff;border-color:var(--danger)'}>${on?'Recusar':'✕ Recusada'}</button>
            </div>`}
          </div>
        </div>`; })}
        ${interactive && html`<button class="btn primary" disabled=${busy || !appr} onClick=${()=>applyApproved(idx)}>Aplicar ${appr} operação(ões)</button>`}
        ${t.applied && html`<div class="meta" style="margin-top:4px">✓ Operações aplicadas ao esquema.</div>`}
        ${!interactive && !t.applied && ops.length>0 && html`<div class="meta" style="margin-top:4px">${isAdmin?'Proposta anterior — envie um refinamento para gerar uma nova.':'Você não é administrador: pode ver, mas não aplicar.'}</div>`}
      </div>`}
      ${!ops.length && !t.summary && !t.rawFail && html`<span class="meta">Sem operações nesta resposta.</span>`}
      ${onAddMemory && html`<${MemoryProposalReview} proposals=${t.memProps||[]} onCommit=${async (entries)=>{
        for(const e of entries) await onAddMemory({ content:e.content, reason:e.reason, source:'ai', ai_model:currentModelLabel(), mode_label:'Organização de códigos' });
        patchTurn(idx, { memProps:[] });
      }} />`}
    </div>`;
  };

  return html`<section class="pane" style="flex:1 1 100%">
    <div class="pane-head" style="gap:12px">
      <button class="btn accent" onClick=${()=>setShowPrompt(true)}
        title="Configurar e revisar exatamente o que será enviado à IA">
        <${PromptGearIcon} /> Configurar Prompt ${(()=>{ const pv=buildProv(); return html`<span style="font-family:var(--mono);font-size:11px;font-weight:400;opacity:.85">· ≈ ${pv.tokens.toLocaleString('pt-BR')} tokens${pv.cost?html` · <span title=${pv.cost.title}>${pv.cost.text}</span>`:''}</span>`; })()}
      </button>
      <div class="seg" style="flex-wrap:wrap">
        ${TABS.map(t=>html`<button key=${t.id} class=${tab===t.id?'on':''} onClick=${()=>setTab(t.id)}>${t.label}</button>`)}
      </div>
    </div>
    <div style="flex:1;min-height:0;display:flex">

    <!-- TELA ESQUERDA: configuração / material -->
    <div class="pane-body scroll" style="flex:0 0 400px;border-right:1px solid var(--line)">
      <div class="section">
        <p class="hint" style="margin:0 0 10px">A IA analisa <b>todos os códigos do projeto</b> e <b>propõe</b> uma reorganização (mesclar, agrupar, mover, renomear, promover) no chat à direita. Você aprova ou recusa cada operação — <b>nada é aplicado sem a sua confirmação</b>. A aplicação usa a mesma lógica da aba Esquema.</p>
        ${!isAdmin && html`<div class="banner warn" style="margin-bottom:10px">Você não é administrador deste projeto: pode ver as sugestões, mas não aplicá-las.</div>`}
        <div class="card" style="margin-bottom:10px">
          <label class="row" style="gap:6px;font-size:12.5px;cursor:pointer;align-items:center">
            <input type="checkbox" checked=${withSamples} disabled=${busy} onChange=${e=>setWithSamples(e.target.checked)} />
            Incluir amostra de trechos por código (a IA decide melhor, mas gasta mais tokens)
          </label>
          <p class="meta" style="margin:8px 0 0">${organizable.length} código(s) para organizar${redactionIds.size?` · ${redactionIds.size} de censura fora`:''}.</p>
        </div>      </div>    </div>

    <!-- TELA DIREITA: chat da reorganização -->
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;background:var(--paper)">
      <div class="pane-head"><span class="field-label" style="margin:0">Conversa — organização de códigos</span></div>
      <div class="pane-body scroll" style="padding:16px">
        ${history.length===0 && html`<div style="text-align:center;max-width:380px;margin:56px auto 0">
          <p class="meta" style="font-size:13px;line-height:1.7;margin:0">Descreva o que você quer (ou deixe em branco para a IA decidir sozinha) e clique em <b>Propor reorganização</b> abaixo. A IA devolve operações que você aprova uma a uma.</p>
        </div>`}
        ${history.map((t,i)=> t.role==='user'
          ? html`<div key=${'u'+i} class="card" style="margin-bottom:10px;background:var(--teal-soft);border-color:var(--teal-soft)">
              <div class="field-label" style="margin-bottom:4px">${i===0?'Sua instrução':'Você'}</div>
              <div style="white-space:pre-wrap;font-size:13px">${t.display || t.content}</div>
            </div>`
          : assistantTurn(t, i))}
        ${busy && html`<div class="card" style="margin-bottom:10px">
          <div class="field-label" style="margin-bottom:6px">IA</div>
          <div class="typing"><span></span><span></span><span></span></div>
        </div>`}
        ${err && html`<div class="banner err" style="margin-top:10px">${err}</div>`}
        ${applyMsg && html`<div class="banner warn" style="margin-top:10px">${applyMsg}</div>`}
      </div>

      <div style="flex:none;border-top:1px solid var(--line);background:var(--surface);padding:10px 14px">
        <textarea class="txtin" rows="2" style="resize:vertical"
          placeholder=${history.length ? 'Refinar a proposta (ex.: "mantenha X separado", "agrupe de outro jeito")… Enter envia, Shift+Enter quebra linha' : 'Instrução opcional para a 1ª proposta (deixe em branco para a IA decidir)… Enter envia, Shift+Enter quebra linha'}
          value=${instruction} disabled=${busy} onInput=${e=>setInstruction(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }}></textarea>
        <div class="row" style="gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap">
          <button class="btn primary" disabled=${busy || !organizable.length} onClick=${send}>${history.length ? 'Enviar refinamento' : 'Propor reorganização'}</button>
          ${history.length>0 && html`<button class="btn sm ghost" disabled=${busy} onClick=${reset}>Limpar conversa</button>`}
          ${busy && html`<span class="meta">pensando…</span>`}
        </div>
      </div>
    </div>
    ${showPrompt && (()=>{ const controls = html`<div>
        <div class="field" style="margin-bottom:12px">
          <div class="field-label">Instruções próprias à IA</div>
          <textarea class="txtin" rows="2" style="resize:vertical" placeholder="Guias que sempre entram no prompt (ex.: prefira poucas famílias amplas)…" value=${aiInstr} onInput=${e=>changeInstr(e.target.value)}></textarea>
          <div class="meta" style="margin-top:4px">Compartilhado com o Analisar com IA.</div>
        </div>
        <div class="field">
          <div class="field-label">Memos injetados</div>
          <label class="row" style="gap:7px;font-size:12.5px;cursor:pointer;align-items:center">
            <input type="checkbox" checked=${injectSel.has(ctxKey)} onChange=${()=>toggleInject(ctxKey)} />
            <span>Memo para a IA${ctxMemo?.content?.trim()?'':' — vazio (escreva na aba Memos)'}</span>
          </label>
          <details class="collap" style="margin-top:4px">
            <summary class="field-label" style="font-weight:400">outros memos (${injectableMemos.length})</summary>
            ${injectableMemos.length===0 && html`<div class="meta" style="padding:4px 0 0 18px">Nenhum outro memo com conteúdo.</div>`}
            ${injectableMemos.map(m=>html`<label key=${memoKey(m)} class="row" style="gap:7px;font-size:12px;cursor:pointer;align-items:center;padding:2px 0 2px 18px">
              <input type="checkbox" checked=${injectSel.has(memoKey(m))} onChange=${()=>toggleInject(memoKey(m))} />
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${memoName(m)}</span>
            </label>`)}
          </details>
        </div>
        ${onToggleMemory && html`<${MemoryPanel} memory=${memory} onToggle=${onToggleMemory} onDelete=${onDeleteMemory} showAdd=${false} bare=${true} />`}
      </div>`;
