      if(value===''){ must(await sb.from('doc_values').delete().eq('document_id',docId).eq('category_id',catId).eq('set_by',user.id).eq('layer','individual')); return; }
      must(await sb.from('doc_values').upsert({project_id:pid,document_id:docId,category_id:catId,value,set_by:user.id,author_name:name,layer:'individual',updated_at:new Date().toISOString()},{onConflict:'document_id,category_id,set_by,layer'}));
    },
    // valor consolidado (gabarito) — somente o dono escreve (garantido por RLS)
    async setFinalValue(pid,docId,catId,value){
      if(value===''){ must(await sb.from('doc_values').delete().eq('document_id',docId).eq('category_id',catId).eq('layer','final')); return; }
      must(await sb.from('doc_values').upsert({project_id:pid,document_id:docId,category_id:catId,value,set_by:user.id,author_name:name,layer:'final',updated_at:new Date().toISOString()},{onConflict:'document_id,category_id,set_by,layer'}));
    },
    // grava uma resposta de categoria com autor arbitrario (set_by:null, author_name livre) —
    // usado pelo import de .qualilab pra preservar cada pesquisador de origem como uma linha
    // independente, igual ja fazia addCoding com created_by:null. set_by null nunca colide
    // com a unique (document_id,category_id,set_by,layer) — Postgres trata NULL como distinto
    // de outro NULL — entao e sempre um insert novo, nunca um upsert/merge.
    async addDocValue(pid,v){
      return must(await sb.from('doc_values').insert({project_id:pid,document_id:v.document_id,category_id:v.category_id,value:v.value,set_by:v.set_by??null,author_name:v.author_name||'anonimo',layer:v.layer||'individual',updated_at:new Date().toISOString()}).select().single());
    },
    async listCodes(pid){ return must(await sb.from('codes').select('*').eq('project_id',pid).order('depth').order('position')); },
    async addCode(pid,code){ return must(await sb.from('codes').insert({project_id:pid,...code}).select().single()); },
    async updateCode(id,patch){ must(await sb.from('codes').update(patch).eq('id',id)); },
    // memos de SUBcodigos e das codings da subarvore (apagados por cascade do Postgres) sao
    // limpos pelo trigger memos_gc no banco — o cliente nao conhece a subarvore daqui.
    async deleteCode(id){ must(await sb.from('codes').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','code').eq('target_id',id); },
    async listCodings(pid,docId){ return must(await sb.from('codings').select('*').eq('project_id',pid).eq('document_id',docId)); },
    async addCoding(pid,co){
      const hasCB = Object.prototype.hasOwnProperty.call(co,'created_by');
      const row = {project_id:pid, created_by:user.id, author_name:name, ...co};
      if(hasCB && co.created_by===null) row.created_by = null;
      return must(await sb.from('codings').insert(row).select().single());
    },
    async deleteCoding(id){ must(await sb.from('codings').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','coding').eq('target_id',id); },
    // memos: nota unica compartilhada por alvo (projeto/documento/codigo); ultima edicao vale
    async listMemos(pid){ try{ return must(await sb.from('memos').select('*').eq('project_id',pid)); }catch(e){ return []; } },
    async setMemo(pid, scope, targetId, content, authorName, label){
      if(!content || !content.trim()){
        must(await sb.from('memos').delete().eq('project_id',pid).eq('scope',scope).eq('target_id',targetId));
        return;
      }
      must(await sb.from('memos').upsert(
        { project_id:pid, scope, target_id:targetId, content, label:label||'', author_name:authorName||'anonimo', updated_by:user?.id||null, updated_at:new Date().toISOString() },
        { onConflict:'project_id,scope,target_id' }
      ));
    },
    async deleteMemo(id){ must(await sb.from('memos').delete().eq('id',id)); },
    // resultados salvos da aba "Analisar com IA"
    async listIaResults(pid){ try{ return must(await sb.from('ia_results').select('*').eq('project_id',pid).order('created_at',{ascending:false})); }catch(e){ return []; } },
    async addIaResult(pid,{scope,mode_label,result,author_name}){
      return must(await sb.from('ia_results').insert(
        { project_id:pid, scope, mode_label, result, author_name:author_name||'anonimo', created_by:user?.id||null }
      ).select().single());
    },
    async deleteIaResult(id){ must(await sb.from('ia_results').delete().eq('id',id)); },
    async listMemory(pid){ try{ return must(await sb.from('ia_memory').select('*').eq('project_id',pid).order('created_at',{ascending:false})); }catch(e){ return []; } },
    async addMemory(pid,{content,reason,source,ai_model,mode_label,author_name}){
      return must(await sb.from('ia_memory').insert(
        { project_id:pid, content, reason:reason||'', source:source||'ai', active:true, ai_model:ai_model||'', mode_label:mode_label||'', author_name:author_name||'anonimo', created_by:user?.id||null }
      ).select().single());
    },
    // via RPC: a policy de update de ia_memory protege o content (autor/admin), mas o
    // toggle de "usar na analise" e aberto a todo membro. Fallback direto pra banco antigo.
    async setMemoryActive(id,active){
      const r = await sb.rpc('set_memory_active',{ p_id:id, p_active:!!active });
      if(r.error) must(await sb.from('ia_memory').update({ active:!!active }).eq('id',id));
    },
    async deleteMemory(id){ must(await sb.from('ia_memory').delete().eq('id',id)); },
    // sincronizacao ao vivo: dispara onChange a cada alteracao em codings/doc_values do projeto
    realtime(projectId, onChange){
      const ch = sb.channel('qualilab:'+projectId)
        .on('postgres_changes', { event:'*', schema:'public', table:'codings',    filter:'project_id=eq.'+projectId }, onChange)
        .on('postgres_changes', { event:'*', schema:'public', table:'doc_values', filter:'project_id=eq.'+projectId }, onChange)
        .subscribe();
      return ()=>{ try{ sb.removeChannel(ch); }catch(e){} };
    },
  };
}

/* ===== Recorte "Ver:" unificado (camada/codificador) — fonte unica usada em TODAS as telas =====
   view: 'all' (individuais de todos + gabarito) | 'mine' | 'final' (gabarito) | <userId> | '__nm__'+nome
   Regra: 'all' = sobreposicao de TODAS as camadas (individuais de cada codificador + o gabarito
   consolidado), pra "ver todo mundo" incluir o que ja foi reconciliado. O gabarito sozinho fica
   em 'final'. (Atencao: em telas de contagem — Graficos/Relatorio — 'all' soma individuais E
   gabarito, entao o que ja foi consolidado conta duas vezes; escolha do autor.) Projeto individual:
   tudo ja nasce em 'final', entao o recorte so filtra por codificador quando ha >1 autor importado. */
function codingsForView(codings, view, userId, projectMode){
  if(projectMode==='individual'){
    if(typeof view==='string' && view.startsWith('__nm__')) return codings.filter(c=>c.author_name===view.slice(6));
    if(view && view!=='all' && view!=='mine' && view!=='final') return codings.filter(c=>c.created_by===view);
    return codings;
  }
  if(view==='final') return codings.filter(c=>c.layer==='final');
  if(view==='all') return codings;
  const indiv = codings.filter(c=>c.layer!=='final');
  if(view==='mine') return indiv.filter(c=>c.created_by===userId);
  if(typeof view==='string' && view.startsWith('__nm__')){ const nm=view.slice(6); return indiv.filter(c=>c.author_name===nm); }
  return indiv.filter(c=>c.created_by===view);
}
/* lista de valores de UMA categoria de UM documento conforme o recorte (para agregacao/distribuicao).
   'all' devolve as respostas de todos os pesquisadores + o gabarito; 'final' so o gabarito;
   'mine'/coder a resposta daquele autor. Em projeto individual, gabarito (ou a 1a resposta). */
function valuesForView(values, docId, catId, view, userId, projectMode){
  const rows = values.filter(v=>v.document_id===docId && v.category_id===catId);
  const fin = rows.find(r=>r.layer==='final');
  if(projectMode==='individual') return fin ? [fin.value] : (rows[0] ? [rows[0].value] : []);
  if(view==='final') return fin ? [fin.value] : [];
  const indiv = rows.filter(r=>(r.layer||'individual')!=='final');
  if(view==='all') return rows.map(r=>r.value);
  if(view==='mine'){ const m=indiv.find(r=>r.set_by===userId); return m?[m.value]:[]; }
  if(typeof view==='string' && view.startsWith('__nm__')){ const nm=view.slice(6); const m=indiv.find(r=>r.author_name===nm); return m?[m.value]:[]; }
  const m=indiv.find(r=>r.set_by===view); return m?[m.value]:[];
}
/* rotulo legivel do recorte (para textos/relatorio) */
function viewLabel(view, coders){
  if(view==='final') return 'gabarito final';
  if(view==='all') return 'individuais (todos)';
  if(view==='mine') return 'minhas codificacoes';
  if(typeof view==='string' && view.startsWith('__nm__')) return view.slice(6);
  const c=(coders||[]).find(x=>x.id===view); return c?c.name:'individuais';
}
/* Seletor "Ver:" unico, identico em todas as telas. Recebe o estado compartilhado do App.
   Visibilidade: igual a regra historica do leitor — projeto coletivo na nuvem, ou qualquer
   projeto com mais de um codificador (ex.: .qdpx importado offline). */
function ViewSelect({ value, onChange, coders, userId, projectMode, mode, label='Ver:' }){
  const show = (mode==='cloud' && projectMode==='collective') || (coders||[]).length>1;
  if(!show) return null;
  return html`<label class="meta" style="display:flex;align-items:center;gap:5px">${label}
    <select class="opt" value=${value} onChange=${e=>onChange(e.target.value)}>
      ${projectMode==='collective' ? html`
        <option value="all">Individuais (todos)</option>
        <option value="mine">Minhas</option>
        ${coders.filter(c=>c.id!==userId).map(c=>html`<option value=${c.id}>${c.name}</option>`)}
        <option value="final">Final / gabarito</option>
      ` : html`
        <option value="all">Todos os codificadores</option>
        ${coders.map(c=>html`<option value=${c.id}>${c.name}</option>`)}
      `}
    </select></label>`;
}

/* Seção colapsável (fechada por padrão) do menu de contexto do leitor — usada por
   "Aceitar no gabarito" e "Rejeitar / remover", pra não despejar listas longas abertas. */
function CtxSection({ title, count, children }){
  const [open, setOpen] = useState(false);
  return html`<div style="border-bottom:1px solid var(--line-soft)">
    <button onClick=${e=>{ e.stopPropagation(); setOpen(o=>!o); }}
      style="display:flex;align-items:center;gap:6px;width:100%;padding:7px 12px;font-size:11px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;box-sizing:border-box">
      <span style="font-size:9px;width:9px">${open?'▼':'▶'}</span>${title}<span class="count" style="margin-left:auto">${count}</span>
    </button>
    ${open && children}
  </div>`;
}

/* Seção colapsável (aberta por padrão) de barra lateral — cabeçalho com caret + conteúdo.
   Usada na navegação da Reconciliação (Documentos / Categoria / Código). */
function NavGroup({ title, children, defaultOpen=true }){
  const [open, setOpen] = useState(defaultOpen);
  return html`<div style="border-bottom:1px solid var(--line-soft)">
    <div class="node-row" style="padding:6px 12px;cursor:pointer;border-radius:0" onClick=${()=>setOpen(o=>!o)}>
      <span class="caret">${open?'▾':'▸'}</span>
      <span class="node-name" style="font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.04em;color:var(--ink-soft)">${title}</span>
    </div>
    ${open && html`<div style="padding-bottom:6px">${children}</div>`}
  </div>`;
}

  const [busy, setBusy] = useState(null);
  const [progress, setProgress] = useState(null); // {done,total} durante import grande

  useEffect(()=>{

  useEffect(()=>{

  }, [project]);

  const [saveError, setSaveError] = useState(null); // ultima falha de gravacao local/arquivo (null = ok)
  const [lastSaved, setLastSaved] = useState(null); // hora do ultimo save ok (local/arquivo) — "✓ salvo HH:MM"
  const [localUsage, setLocalUsage] = useState(0);  // chars do JSON no localStorage (indicador de quota, so modo local)
  const [backupStatus, setBackupStatus] = useState({ active:false, name:null, lastOk:null, lastError:null, warnLarge:false }); // backup automatico em pasta (so LocalStore)
  const [sendCloudOpen, setSendCloudOpen] = useState(false); // modal "Enviar para a nuvem" (projeto local/arquivo -> projeto novo na nuvem)
  const [nudgeHidden, setNudgeHidden] = useState(false); // oculta o nudge do rascunho ATE recarregar (colapsavel por sessao)
  const [importMsg, setImportMsg] = useState(null);
  const [role, setRole] = useState('member');  // papel do usuário no projeto: admin | member
  const [members, setMembers] = useState([]);   // membros do projeto (gestão de admins)

  const activeDoc = docs.find(d=>d.id===activeId) || null;
  const isAdmin = role==='admin';
  // editar o texto do documento: livre em rascunho/arquivo/individual; admin-only em coletivo na nuvem
  // (editar desloca os offsets dos grifos de TODOS os codificadores, entao so admin, que pode remapear todos).
  const canEditText = !!activeDoc && (store?.mode!=='cloud' || projectMode==='individual' || isAdmin);

  // modo escuro do app inteiro (persistido por navegador, sem relacao com o projeto). Liga/desliga
  // via html[data-theme=dark], que sobrepoe as variaveis de cor do :root. O tema do LEITOR
  // (readerPrefs.theme) e independente disto.
  const [darkMode, setDarkMode] = useState(()=>{ try{ return localStorage.getItem('qualilab:dark')==='1'; }catch(e){ return false; } });
  useEffect(()=>{
    document.documentElement.dataset.theme = darkMode ? 'dark' : '';
    try{ localStorage.setItem('qualilab:dark', darkMode?'1':'0'); }catch(e){}
  }, [darkMode]);

  // preferencias de leitura do .reader (zoom, largura, tema) — persistidas no localStorage,
  // sem relacao com o projeto (vale pra qualquer documento/projeto neste navegador).
  const [readerPrefs, setReaderPrefs] = useState(()=>{
    try{ return { scale:1, width:'normal', theme:'light', rightW:340, ...JSON.parse(localStorage.getItem('qualilab:reader_prefs')||'{}') }; }
    catch(e){ return { scale:1, width:'normal', theme:'light', rightW:340 }; }
  });
  useEffect(()=>{ try{ localStorage.setItem('qualilab:reader_prefs', JSON.stringify(readerPrefs)); }catch(e){} }, [readerPrefs]);
  // arrasta a divisa (.pane-resize) entre o leitor e o painel direito na tela de Codificação —
  // largura do painel direito persiste em readerPrefs.rightW. Arrastar pra esquerda alarga a
  // direita (delta = startX - x atual). Limites: 180px a 60% da janela.
  function onResizeHandleMouseDown(e){
    if(e.button!==0) return;
    const startX = e.clientX;
    const startW = readerPrefs.rightW;
    const handle = e.currentTarget;
    handle.classList.add('dragging');
    function onMove(ev){
      const delta = startX - ev.clientX;
      const newW = Math.max(180, Math.min(window.innerWidth*0.6, startW + delta));
      setReaderPrefs(p=>({...p, rightW:Math.round(newW)}));
    }
    function onUp(){ handle.classList.remove('dragging'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    e.preventDefault();
  }
  // busca dentro do documento aberto (independente da selecao de codigo/categoria)
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchIdx, setSearchIdx] = useState(0);
  const readerRef = useRef(null);
  const searchMatches = useMemo(()=>{
    const text = activeDoc?.content||'';
    const q = searchQuery.trim().toLowerCase();
    // minimo de 2 chars + teto de matches: buscar "a" num documento grande gerava dezenas
    // de milhares de matches -> dezenas de milhares de spans no DOM -> congelamento
    if(!q || q.length<2 || !text) return [];
    const lower = text.toLowerCase();
    const out = []; let from = 0;
    while(out.length<2000){ const found = lower.indexOf(q, from); if(found<0) break; out.push([found, found+q.length]); from = found+q.length; }
    return out;
  }, [searchQuery, activeDoc]);
  useEffect(()=>{ setSearchIdx(0); }, [searchQuery, activeId]);
  useEffect(()=>{
    if(!searchOpen || !searchMatches.length) return;
    const i = ((searchIdx % searchMatches.length) + searchMatches.length) % searchMatches.length;
    const el = readerRef.current?.querySelector(`[data-match="${i}"]`);
    el?.scrollIntoView({ block:'center' });
  }, [searchIdx, searchMatches, searchOpen]);

  // codificadores presentes no documento ativo (para o filtro "Ver:")
  // usa created_by quando disponível (sessão ativa); cai em author_name para codificações
  // importadas de QDPX que chegam sem uuid (created_by === null)
  const coders = useMemo(()=>{
    const byId = {}; const byName = {};
    // lista de codificadores do PROJETO INTEIRO (allCodings) quando carregado — assim o filtro
    // "Ver:" aparece e oferece todos os pesquisadores mesmo abrindo um documento de um so autor;
    // cai para as codings do doc ativo enquanto allCodings nao estiver carregado.
    const src = allCodings.length ? allCodings : codings;
    src.forEach(c=>{
      // coletivo: a camada final (gabarito) nao e um "codificador". Individual: tudo conta,
      // pois .qdpx importado entra em 'final' mas preserva os autores em author_name —
      // sem isso, um projeto multi-pesquisador importado offline ficaria sem o filtro "Ver:".
      if(projectMode!=='individual' && c.layer==='final') return;
      if(c.created_by) byId[c.created_by] = c.author_name||'anônimo';
      else if(c.author_name) byName[c.author_name] = true;
    });
    const fromId = Object.entries(byId).map(([id,name])=>({id, name}));
    // inclui autores por nome que não coincidam com alguém já indexado por uuid
    const fromName = Object.keys(byName)
      .filter(n=>!fromId.find(x=>x.name===n))
      .map(n=>({id:'__nm__'+n, name:n}));
    return [...fromId, ...fromName].sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  }, [allCodings, codings, projectMode]);

  // codificações visíveis no leitor conforme o recorte "Ver:" — mesma fonte (codingsForView)
  // usada por Visualizar, Gráficos e Relatório, pra o comportamento ser idêntico em todas as telas.
  const visibleCodings = useMemo(()=>
    codingsForView(codings, viewCoder, user?.id, projectMode)
  , [codings, viewCoder, user, projectMode]);

  // runs do leitor MEMOIZADOS (antes o buildRuns rodava inline no JSX a cada render do App —
  // cada seleção de texto/tick de realtime re-segmentava o documento inteiro). O índice do
  // match de busca é anotado numa única passada de dois ponteiros (era findIndex linear POR
  // RUN: O(runs×matches) congelava a busca em documento grande).
  const readerRuns = useMemo(()=>{
    if(!activeDoc) return [];
    const runs = buildRuns(activeDoc.content, visibleCodings, searchMatches.flat());
    let mi = 0;
    for(const run of runs){
      while(mi < searchMatches.length && searchMatches[mi][1] <= run.start) mi++;
      run.matchI = (mi < searchMatches.length && run.start>=searchMatches[mi][0] && run.end<=searchMatches[mi][1]) ? mi : -1;
    }
    return runs;
  }, [activeDoc, visibleCodings, searchMatches]);

  // veio da Visualizacao (clicou num trecho): quando o leitor do doc certo estiver montado,
  // rola ate o run que comeca no span e o destaca (span_start e sempre uma fronteira em buildRuns).
  // Declarado DEPOIS de readerRuns de proposito — o array de dependencias referencia readerRuns,
  // avaliado no render; declarar antes daria TDZ ("Cannot access 'readerRuns' before initialization").
  useEffect(()=>{
    if(!pendingJump || mainView!=='codificar' || !activeDoc || String(activeDoc.id)!==String(pendingJump.docId)) return;
    const el = readerRef.current?.querySelector(`[data-start="${pendingJump.start}"]`);
    if(!el) return; // runs ainda nao montaram (ex.: conteudo carregando na nuvem) — espera o proximo tick
    el.scrollIntoView({ block:'center' });
    setReaderFlash(pendingJump.start);
    setPendingJump(null);

  /* carregar doc ativo — com token de staleness: trocar rápido de documento (ou um poll
     concorrente) podia fazer a resposta VELHA chegar depois e ancorar codings do doc A
     sobre o texto do doc B. Só a resposta mais recente aplica o estado; dados idênticos
     não trocam a referência (sameJson) pra não invalidar os useMemo do leitor. */
  const reqSeqRef = useRef({ doc:0, all:0 });
  const loadDoc = useCallback(async ()=>{
    if(!store || !project || !activeId){ setValues([]); setCodings([]); return; }
    const tok = ++reqSeqRef.current.doc;
    const [v, co] = await Promise.all([store.getDocValues(activeId), store.listCodings(project.id, activeId)]);
    if(tok !== reqSeqRef.current.doc) return;
    setValues(x=> sameJson(x,v) ? x : v);
    setCodings(x=> sameJson(x,co) ? x : co);
  }, [store, project, activeId]);
  useEffect(()=>{ loadDoc(); setSel(null); setCtxMenu(null); }, [loadDoc]);

  /* carregar trechos e valores de TODOS os documentos (aba de visualizacao) */
  const loadAll = useCallback(async ()=>{
    if(!store || !project){ setAllCodings([]); setAllValues([]); return; }
    const tok = ++reqSeqRef.current.all;
    // busca os valores+codings de TODOS os documentos em paralelo (antes era doc-a-doc em
    // serie: N round-trips sequenciais, lento na nuvem com muitos docs). O navegador limita
    // a concorrencia real por host, entao isso sobrepoe as latencias sem estourar o servidor.
    const per = await Promise.all(docs.map(async d=>{
      const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id, d.id)]);
      return { d, v, co };
    }));
    if(tok !== reqSeqRef.current.all) return; // resposta velha (outro loadAll ja começou)
    const V=[], C=[];
    for(const { d, v, co } of per){
      v.forEach(x=>V.push({ document_id:d.id, category_id:x.category_id, value:x.value, author_name:x.author_name, layer:x.layer||'individual' }));
      co.forEach(x=>C.push(x));
    }
    setAllValues(x=> sameJson(x,V) ? x : V);
    setAllCodings(x=> sameJson(x,C) ? x : C);
  }, [store, project, docs]);

  useEffect(()=>{ if(phase==='work' && AGG_VIEWS.includes(mainView)) loadAll(); }, [phase, mainView, loadAll]);

  /* recarrega a visao atual — usado pelo realtime e pelo poll de reserva.
     full=true recarrega tambem o agregado (loadAll) quando uma tela agregada esta aberta;
     full=false so o doc ativo (barato: 2 requests). */
  const reloadRef = useRef(()=>{});
  reloadRef.current = (full)=>{ loadDoc(); if(full && AGG_VIEWS.includes(mainView)) loadAll(); };

  /* sincronizacao ao vivo no modo nuvem (codings/doc_values), com poll lento de reserva.
     Evento realtime = mudanca real -> recarga completa. O poll cego de reserva e dividido:
     doc ativo a cada 20s (leve) e agregado a cada 60s — o formato antigo (tudo a cada 20s)
     custava 2 requests POR DOCUMENTO a cada 20s nas telas agregadas. */
  useEffect(()=>{
    if(mode!=='cloud' || phase!=='work' || !project || !store || !store.realtime) return;
    const onChange = ()=>reloadRef.current(true);
    const unsub = store.realtime(project.id, onChange);
    const t  = setInterval(()=>reloadRef.current(false), 20000);
    const t2 = setInterval(()=>reloadRef.current(true), 60000);
    return ()=>{ if(unsub) unsub(); clearInterval(t); clearInterval(t2); };
  }, [mode, phase, project, store]);

  // reordena categorias por drag-and-drop: move draggedId pra posicao de targetId,
  // empurrando as demais — so muda position, nunca a hierarquia (categoria e flat).
  async function reorderCategories(draggedId, targetId){
    if(draggedId===targetId) return;
    const ordered = cats.slice().sort((a,b)=>(a.position??0)-(b.position??0));
    const from = ordered.findIndex(c=>c.id===draggedId), to = ordered.findIndex(c=>c.id===targetId);
    if(from<0 || to<0) return;
    ordered.splice(to, 0, ordered.splice(from,1)[0]);
    if(store.beginBatch) store.beginBatch();
    try{ await Promise.all(ordered.map((c,i)=> c.position!==i ? store.updateCategory(c.id,{position:i}) : null)); }
    finally{ if(store.endBatch) await store.endBatch(); }
    setCats(ordered.map((c,i)=>({...c,position:i})));
  }

  async function addCode(parent, customName){
    let hue, depth, hueDeg, sat;
    if(parent){ hue = parent.hue; depth = parent.depth+1; hueDeg = parent.hue_deg ?? null; sat = parent.sat ?? null; }
    else { const tops = codes.filter(c=>!c.parent_id); hue = tops.length % HUES.length; depth = 0; hueDeg = null; sat = null; }
    const name = customName?.trim() || (parent?'subcódigo':'nova família');
    const c = await store.addCode(project.id,{ parent_id: parent?parent.id:null, name, hue, depth, hue_deg:hueDeg, sat, position: codes.length });
    setCodes(x=>[...x,c]); setSelCode(c.id);
    return c;
  }

  // cor personalizada: so o nivel 0 escolhe; a cascata propaga para todos os descendentes
  async function setCodeColor(rootCode, hex){
    if(!isAdmin){ setErr('Apenas administradores podem alterar a cor de uma família de código.'); return; }
    const hueDeg = hex==='gray' ? -1 : hex==='black' ? -2 : hex ? hexToHue(hex) : null;
    const ids = new Set([rootCode.id]);
    let added = true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); }
    // batch + paralelo: a cascata numa família grande fazia um write serial por subcódigo
    if(store.beginBatch) store.beginBatch();
    try{ await Promise.all([...ids].map(id=>store.updateCode(id, { hue_deg: hueDeg }))); }
    finally{ if(store.endBatch) await store.endBatch(); }
    setCodes(x=>x.map(c=>ids.has(c.id) ? {...c, hue_deg:hueDeg} : c));
  }
  // saturacao personalizada da familia (eixo vivo<->apagado). Cascata igual a cor; nao mexe na
  // luminosidade (profundidade). null = padrao (58). So admin, so nivel 0 (o guard replica no banco).
  async function setCodeSat(rootCode, sat){
    if(!isAdmin){ setErr('Apenas administradores podem alterar a cor de uma família de código.'); return; }
    const val = (sat==null) ? null : Math.max(0, Math.min(100, Math.round(sat)));
    const ids = new Set([rootCode.id]);
    let added = true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); }
    if(store.beginBatch) store.beginBatch();
    try{ await Promise.all([...ids].map(id=>store.updateCode(id, { sat: val }))); }
    finally{ if(store.endBatch) await store.endBatch(); }
    setCodes(x=>x.map(c=>ids.has(c.id) ? {...c, sat:val} : c));
  }
  // censura propaga pra subarvore inteira (igual cor) — marcar uma familia como censura e
  // os subcodigos continuarem "normais" seria inconsistente: o pesquisador esperaria que
  // qualquer trecho dali pra baixo ficasse de fora do material da IA por padrao.
  async function setCodeRedaction(rootCode, value){
    if(!isAdmin){ setErr('Apenas administradores podem marcar um código como censura.'); return; }
    const ids = new Set([rootCode.id]);
    let added = true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); }
    // ao marcar censura: força preto (hue_deg:-2); ao desmarcar: devolve cor automática (null)
    const huePatch = value ? { hue_deg: -2 } : { hue_deg: null };
    if(store.beginBatch) store.beginBatch();
    try{ await Promise.all([...ids].map(id=>store.updateCode(id, { is_redaction: value, ...huePatch }))); }
    finally{ if(store.endBatch) await store.endBatch(); }
    setCodes(x=>x.map(c=>ids.has(c.id) ? {...c, is_redaction:value, ...huePatch} : c));
  }

  // Salva a edicao do texto do documento e REANCORA os grifos (remapSpans reancora por prefixo/sufixo;
  // grifo que caiu dentro do trecho editado e clampeado e contado em 'affected' pra avisar).
  async function saveEditedText(){
    if(!activeDoc) return;
    const oldC = activeDoc.content, newC = editDraft;
    const newTitle = (editTitleDraft||'').trim();
    const titleChanged = !!newTitle && newTitle !== activeDoc.name;   // titulo e so uma string, nao mexe em offset
    const contentChanged = newC !== oldC;
    if(!titleChanged && !contentChanged){ setEditingText(false); return; }
    let updates=[], affected=0;
    if(contentChanged){
      const docCodings = codings.filter(c=>c.document_id===activeDoc.id);
      const r = remapSpans(oldC, newC, docCodings); updates=r.updates; affected=r.affected;
      if(affected>0 && !window.confirm(`Sua edição toca ${affected} codificação(ões): os grifos afetados serão reajustados às bordas do trecho editado e podem precisar de conferência. Continuar?`)) return;
    }
    try{
      if(titleChanged) await renameDoc(activeDoc.id, newTitle);
      if(contentChanged){
        await store.setDocumentContent(activeDoc.id, newC);
        for(const u of updates) await store.updateCoding(u.id, { span_start:u.span_start, span_end:u.span_end, quote:u.quote });
      }
    }catch(e){ setErr('Falha ao salvar a edição: '+(e?.message||e)); return; }
    if(contentChanged){
      const patch = list => list.map(c=>{ const u=updates.find(x=>x.id===c.id); return u ? {...c, span_start:u.span_start, span_end:u.span_end, quote:u.quote} : c; });
      setDocs(ds=>ds.map(x=>x.id===activeDoc.id ? {...x, content:newC} : x));   // renameDoc ja atualizou o name
      setCodings(patch); setAllCodings(patch);
    }
    setEditingText(false);
  }

  useEffect(()=>{
    const onKeyDown = (e)=>{
      // Esc fecha o que estiver aberto por cima (menu de contexto > dropdowns > busca > modais)
      // — nada respondia a Esc antes; um handler global cobre tudo de uma vez
      if(e.key==='Escape'){
        if(ctxMenu){ closeCtxMenu(); e.preventDefault(); return; }
        if(expOpen || impOpen){ setExpOpen(false); setImpOpen(false); e.preventDefault(); return; }
        if(searchOpen){ setSearchOpen(false); e.preventDefault(); return; }
        if(sendCloudOpen){ setSendCloudOpen(false); e.preventDefault(); return; }
        if(account){ setAccount(false); e.preventDefault(); return; }
        if(projEdit){ setProjEdit(false); e.preventDefault(); return; }
        return;
      }
      const isUndo = (e.ctrlKey||e.metaKey) && !e.shiftKey && (e.key||'').toLowerCase()==='z';
      if(!isUndo || mainView!=='codificar' || undoStackRef.current.length===0) return;
      const tag = (e.target?.tagName||'').toLowerCase();
      if(tag==='input' || tag==='textarea' || tag==='select' || e.target?.isContentEditable) return;
      e.preventDefault();
      undoLastCoding();
    };
    window.addEventListener('keydown', onKeyDown);
    return ()=>window.removeEventListener('keydown', onKeyDown);
  }, [mainView, undoLastCoding, ctxMenu, expOpen, impOpen, searchOpen, sendCloudOpen, account, projEdit]);

  // monta o objeto db no mesmo formato de um .qualilab a partir do projeto ATIVO (qualquer
  // modo) — extraido pra ser reaproveitado tanto por saveQualilab (baixa como arquivo) quanto
  // por "enviar para a nuvem" (importa direto noutro projeto, sem passar por arquivo).
  async function buildQualilabDb(){
    const documents = docs.map(d=>({ id:d.id, name:d.name, content:d.content, created_at:d.created_at||new Date().toISOString() }));
    const categories = cats.map((c,i)=>({ id:c.id, position:c.position??i, name:c.name, kind:c.kind, options:c.options||[], description:c.description||'', color:c.color||0 }));
    const codesOut = codes.map((c,i)=>({ id:c.id, position:c.position??i, parent_id:c.parent_id||null, name:c.name, hue:c.hue||0, depth:c.depth||0, hue_deg:c.hue_deg??null, sat:c.sat??null, is_redaction:!!c.is_redaction, pos_x:c.pos_x??null, pos_y:c.pos_y??null }));
    const doc_values=[], codings=[];
    for(const d of docs){
      const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id, d.id)]);
      // set_by null é semântica de multi-autor importado (o autor de fato está em author_name)
      // e PRECISA sobreviver ao export — reescrever como 'file-user' fazia o valOf estrito
      // mostrar resposta alheia como "minha" ao reabrir o arquivo
      v.forEach(x=>doc_values.push({ id:x.id||uid(), document_id:d.id, category_id:x.category_id, value:x.value, set_by:x.set_by??null, author_name:x.author_name||'anonimo', layer:x.layer||'individual' }));
      co.forEach(x=>codings.push({ id:x.id||uid(), document_id:x.document_id, code_id:x.code_id, span_start:x.span_start, span_end:x.span_end, quote:x.quote, layer:x.layer||'individual', created_by:x.created_by??null, author_name:x.author_name||'anonimo', created_at:x.created_at||new Date().toISOString() }));
    }
    let memos=[], ia_results=[], ia_memory=[];
    try{ memos = (await store.listMemos?.(project.id))||[]; }catch(e){}
    try{ ia_results = ((await store.listIaResults?.(project.id))||[]).slice().reverse(); }catch(e){}
    try{ ia_memory = ((await store.listMemory?.(project.id))||[]).slice().reverse(); }catch(e){}
    return { _meta:{ id:'file-project', name:project.name||'Projeto', code:'FILE', mode:projectMode||'individual', displayName:user?.name||'pesquisador' },
      documents, categories, doc_values, codes:codesOut, codings, memos, ia_results, ia_memory };
  }

  async function doExport(kind){
    setExpOpen(false);
    try{
      const allV=[], allC=[];
      for(const d of docs){
        const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id,d.id)]);
        v.forEach(x=>allV.push({ document_id:d.id, category_id:x.category_id, value:x.value, author:x.author_name||'anonimo', layer:x.layer||'individual' }));
        co.forEach(x=>allC.push(x));
      }
      const dn=(id)=>docs.find(d=>d.id===id)?.name||"";
      if(kind==='json'){
        const obj={ exported_at:new Date().toISOString(), project:{ name:project.name, code:project.code },
          documents:docs.map(d=>({id:d.id,name:d.name,content:d.content})),
          categories:cats.map(c=>({id:c.id,name:c.name,kind:c.kind,options:c.options,description:c.description||''})),
          document_values:allV,
          codes:codes.map(c=>({id:c.id,parent_id:c.parent_id,name:c.name,depth:c.depth,path:codePathFor(codes,c.id)})),
          codings:allC.map(c=>({id:c.id,document_id:c.document_id,code_id:c.code_id,code_path:codePathFor(codes,c.code_id),start:c.span_start,end:c.span_end,quote:c.quote,author:c.author_name,layer:c.layer||'individual'})) };
        download('qualilab_projeto.json', JSON.stringify(obj,null,2), 'application/json');
      } else if(kind==='trechos'){
        const header=["documento","familia","codigo","nivel","trecho","inicio","fim","autor","camada"];
        const sorted=allC.slice().sort((a,b)=> a.document_id===b.document_id ? a.span_start-b.span_start : (dn(a.document_id)>dn(b.document_id)?1:-1));
        const rows=sorted.map(c=>{ const p=codePathFor(codes,c.code_id); return [dn(c.document_id), p[0]||"", p.join(" > "), String(p.length-1), c.quote, String(c.span_start), String(c.span_end), c.author_name, c.layer||'individual']; });
        download('qualilab_trechos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='documentos'){
        // usa o gabarito (final) quando existe; senao a primeira resposta individual
        const valFor=(docId,catId)=>{ const rows=allV.filter(x=>x.document_id===docId&&x.category_id===catId);
          const fin=rows.find(r=>r.layer==='final'); return (fin||rows[0]||{}).value||""; };
        const header=["documento",...cats.map(c=>c.name),"n_trechos"];
        const rows=docs.map(d=>[d.name, ...cats.map(cat=>valFor(d.id,cat.id)), String(allC.filter(c=>c.document_id===d.id&&(c.layer||'individual')!=='final').length)]);
        download('qualilab_documentos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='qdpx'){
        // um valor por documento/categoria (QDPX espera isso): prefere o gabarito (final)
        const pick = {};
        allV.forEach(x=>{ const k=x.document_id+':'+x.category_id; const cur=pick[k];
          if(!cur || (x.layer==='final' && cur.layer!=='final')) pick[k]=x; });
        // prefere a camada final (gabarito consolidado); se nao houver, usa as individuais
        const finalCods = allC.filter(c=>c.layer==='final');
        const codForQdpx = finalCods.length > 0 ? finalCods : allC.filter(c=>(c.layer||'individual')!=='final');
        await exportQDPX(docs, cats, Object.values(pick), codes, codForQdpx, project);
      } else if(kind==='ati' || kind==='leitor'){
        let memosForExport=[]; try{ memosForExport=(await store.listMemos?.(project.id))||[]; }catch(e){}
        if(kind==='ati') exportWebAnnotations(docs, codes, allC, memosForExport, project);
        else exportTransparencyReader(docs, codes, allC, memosForExport, project);
      }
    }catch(e){ setErr('Falha ao exportar: '+(e.message||e)); }
  }

      const freshDocs = await store.listDocuments(project.id);

      // (evita race condition: loadDoc usa activeId do closure, que pode ser antigo)
      const [cats2, codes2] = await Promise.all([store.listCategories(project.id), store.listCodes(project.id)]);
      setCats(cats2); setCodes(codes2); setDocs(freshDocs);
      try{ if(store.listMemos) setMemos(await store.listMemos(project.id) || []); }catch(e){}

        setActiveId(firstId);
        const [vals, cods] = await Promise.all([store.getDocValues(firstId), store.listCodings(project.id, firstId)]);
        setValues(vals); setCodings(cods);
      }
      const desc = r.descartados;
      const skippedBits = [];
      if(desc.picture) skippedBits.push(`${desc.picture} imagem(ns)`);
      if(desc.audio) skippedBits.push(`${desc.audio} áudio(s)`);
      if(desc.video) skippedBits.push(`${desc.video} vídeo(s)`);
      if(desc.pdfSemTexto) skippedBits.push(`${desc.pdfSemTexto} PDF(s) sem representação em texto`);
      if(desc.fonteExterna) skippedBits.push(`${desc.fonteExterna} fonte(s) externa(s)`);
      if(desc.codingsRegiao) skippedBits.push(`${desc.codingsRegiao} codificação(ões) em regiões/imagens do PDF (sem texto selecionável)`);
      if(desc.codingsNaoLocalizados) skippedBits.push(`${desc.codingsNaoLocalizados} codificação(ões) cujo trecho não foi localizado no texto`);
      const skippedMsg = skippedBits.length ? ` Não importado(s): ${skippedBits.join(', ')}.` : '';
      const detalhes = [];
      if(r.trechosGeometricos>0) detalhes.push(`${r.trechosGeometricos} recuperado(s) por geometria do PDF`);
      if(r.trechosAproximados>0) detalhes.push(`${r.trechosAproximados} localizado(s) de forma aproximada`);
      const aproxMsg = detalhes.length ? ` (${detalhes.join(', ')})` : '';
      const fechadasMsg = r.categoriasFechadasDetectadas>0
        ? ` ${r.categoriasFechadasDetectadas} categoria(s) detectada(s) como fechada(s) automaticamente (poucos valores distintos) — revise em "Gerenciar esquema de categorias".`
        : '';
      setErr(null);
      setBusy(null);
      const memosMsg = r.memos>0 ? ` ${r.memos} memo(s) (comentários de documento/código).` : '';
      const notasMsg = r.notasProjeto>0 ? ` ${r.notasProjeto} nota(s) livre(s) reunida(s) no memo do projeto.` : '';
      setImportMsg(`Importado: ${r.documentos} documento(s), ${r.categorias} categoria(s), ${r.codigos} código(s), ${r.trechos} trecho(s) codificado(s)${aproxMsg}.${memosMsg}${notasMsg}${skippedMsg}${fechadasMsg}`);
    }catch(e){ setBusy(null); setProgress(null); setErr('Falha ao importar: '+(e.message||e)); }
  }

      const [freshDocs, cats2] = await Promise.all([store.listDocuments(project.id), store.listCategories(project.id)]);
      setCats(cats2); setDocs(freshDocs);
      const firstId = freshDocs[0]?.id || null;
      if(firstId){
        setActiveId(firstId);
        const [vals, cods] = await Promise.all([store.getDocValues(firstId), store.listCodings(project.id, firstId)]);
        setValues(vals); setCodings(cods);
      }
      setErr(null);
      setBusy(null);
      const ignMsg = r.ignoradas>0 ? ` ${r.ignoradas} linha(s) ignorada(s) por estarem sem texto.` : '';
      setImportMsg(`Importado da planilha: ${r.documentos} documento(s), ${r.categorias} categoria(s).${ignMsg}`);
    }catch(e){ setBusy(null); setProgress(null); setErr('Falha ao importar planilha: '+(e.message||e)); }
  }

  async function doClearProject(){
    if(!confirm('Apagar TODOS os documentos, categorias, códigos e codificações deste projeto? Esta ação não pode ser desfeita.')) return;
    setBusy('Limpando projeto...');
    try{
      await store.clearProject(project.id);
      setActiveId(null); setSel(null); setSelCode(null);
      await loadProject(store, project.id);
      setBusy(null); setImportMsg('Projeto limpo.');
    }catch(e){ setBusy(null); setErr('Falha ao limpar: '+(e.message||e)); }
  }

  function computeSelection(){
    if(!activeDoc) return null;
    const s = window.getSelection();
    if(!s || s.rangeCount===0 || s.isCollapsed) return null;
    const r = s.getRangeAt(0);
    const off=(node,o)=>{ let el=node.nodeType===3?node.parentElement:node; while(el && (!el.dataset || el.dataset.start===undefined)) el=el.parentElement; return el?parseInt(el.dataset.start,10)+o:null; };
    const a=off(r.startContainer,r.startOffset), b=off(r.endContainer,r.endOffset);
    if(a==null||b==null) return null;
    const start=Math.min(a,b), end=Math.max(a,b);
    const q = activeDoc.content.slice(start,end); if(q.trim().length===0) return null;
    return { start, end, quote:q };
  }
  function onMouseUp(e){
    if(e && e.button!==0) return; // ignora clique direito (tratado em onContextMenu)
    const sx = computeSelection();
    if(sx){ setSel(sx); setRtab('codigos'); }
  }
  function onContextMenu(e){
    const sx = computeSelection();
    const marked = e.target?.closest?.('[data-c="1"]');
    if(!sx && !marked) return; // sem seleção nem grifo: deixa o menu normal do navegador
    e.preventDefault();
    // limite direito = borda da coluna de leitura (não invade o painel da direita)
    const boundRight = e.currentTarget.getBoundingClientRect().right;
    if(sx){
      setSel(sx);
      setCtxMenu({ x:e.clientX, y:e.clientY, sel:sx, quote:sx.quote, boundRight });
    } else {
      const start = parseInt(marked.dataset.start,10);
      const end = parseInt(marked.dataset.end||marked.dataset.start,10);
      setCtxMenu({ x:e.clientX, y:e.clientY, sel:null, pos:start, runEnd:end, quote:activeDoc.content.slice(start,end), boundRight });
    }
  }

  /* ----- maps ----- */
  const codeById = useMemo(()=>Object.fromEntries(codes.map(c=>[c.id,c])), [codes]);
  // codigos em ordem de arvore (pai antes dos filhos), para o menu de contexto
  const orderedCodes = useMemo(()=>{
    const out=[]; const childrenOf=(id)=>codes.filter(c=>c.parent_id===id);
    const walk=(list)=>list.forEach(c=>{ out.push(c); walk(childrenOf(c.id)); });
    walk(codes.filter(c=>!c.parent_id));
    return out;
  }, [codes]);
  const codePath = useCallback((id)=>{ const out=[]; let c=codeById[id]; let guard=0; while(c&&guard++<12){ out.unshift(c.name); c=c.parent_id?codeById[c.parent_id]:null; } return out; }, [codeById]);
  // o próprio autor sempre remove; admin remove (rejeita) o grifo de qualquer codificador; fora da nuvem/individual tudo é do usuário
  const canRemoveCoding = useCallback((c)=> store?.mode!=='cloud' || projectMode==='individual' || c.created_by===user?.id || isAdmin, [store, projectMode, user, isAdmin]);
  function codingsForCtxMenu(menu){
    if(!menu) return [];
    const matches = visibleCodings.filter(c=>{
      if(c.document_id!==activeId || !canRemoveCoding(c)) return false;
      if(menu.sel) return c.span_start < menu.sel.end && c.span_end > menu.sel.start;
      return c.span_start <= menu.pos && c.span_end > menu.pos;
    });
    const seen = new Set();
    return matches.filter(c=>{ if(seen.has(c.id)) return false; seen.add(c.id); return true; });
  }
  const codingCount = useMemo(()=>{ const m={}; codings.forEach(c=>{m[c.code_id]=(m[c.code_id]||0)+1;}); return m; }, [codings]);
  // frequencia GLOBAL (todo o projeto, nao so o documento aberto) — usada na aba Esquema,
  // que nao tem documento ativo; ajuda a ver o que esta sendo usado de fato ao reorganizar
  // agregada (familia soma os subcodigos), igual o countByCode do VizNav — sem isso, uma
  // familia (Hierarquia 0) sempre aparece com 0 quando o uso real esta nos subcodigos
  const schemaCodingCount = useMemo(()=>{
    const direct={}; allCodings.forEach(c=>{direct[c.code_id]=(direct[c.code_id]||0)+1;});
    const parentOf={}; codes.forEach(c=>{parentOf[c.id]=c.parent_id;});
    const agg={...direct};
    Object.entries(direct).forEach(([codeId,n])=>{
      let p=parentOf[codeId];
      while(p){ agg[p]=(agg[p]||0)+n; p=parentOf[p]; }
    });
    return agg;
  }, [allCodings, codes]);

  /* =================== RENDER =================== */
  // conectar/desconectar do Supabase PESSOAL direto das telas de entrada (Welcome/Auth), sem
  // precisar abrir um projeto antes. Mesma logica do card "Conexao" do ProjectModal: credenciais
  // no localStorage (so neste navegador) + reload; CUSTOM_SUPABASE re-deriva no boot seguinte.
  // DEFINIDO ANTES dos returns de fase (o Auth referencia connectCustomCloud) pra evitar TDZ.
  const connectCustomCloud = (url,key)=>{ try{ localStorage.setItem('qualilab:url',url); localStorage.setItem('qualilab:key',key); localStorage.removeItem('qualilab:forcelocal'); }catch(e){} location.reload(); };
  const resetCustomCloud = ()=>{ try{ localStorage.removeItem('qualilab:url'); localStorage.removeItem('qualilab:key'); localStorage.removeItem('qualilab:forcelocal'); }catch(e){} location.reload(); };

  if(phase==='boot') return html`<div class="empty"><div class="t">Carregando…</div></div>`;

  if(phase==='auth') return html`<${Auth}
    err=${err}
    onSignIn=${async (email,pw)=>{ try{ const u=await store.signIn(email,pw); try{localStorage.setItem('qualilab:name',u.name);}catch(e){} setErr(null); await afterAuth(store, u.name); }catch(e){ setErr(String(e.message||e)); } }}
    onSignUp=${async (email,pw,disp)=>{ try{ const r=await store.signUp(email,pw,disp); try{localStorage.setItem('qualilab:name',disp);}catch(e){} setErr(null); if(r.confirmed){ await afterAuth(store, disp); } return r; }catch(e){ setErr(String(e.message||e)); return { error:String(e.message||e) }; } }}
    onBack=${()=>{ setErr(null); setPhase('welcome'); }}
    onServer=${connectCustomCloud} onResetServer=${resetCustomCloud}
  />`;

  const openFileProject = async (isNew)=>{
    if(!supportsFileAPI) return;
    try{
      const fh = isNew
        ? await window.showSaveFilePicker({ suggestedName:'projeto.qualilab', types:[{description:'QualiLab',accept:{'application/json':['.qualilab']}}] })
        : await window.showOpenFilePicker({ types:[{description:'QualiLab',accept:{'application/json':['.qualilab']}}], multiple:false }).then(r=>r[0]);
      const st = await createFileStore(fh, isNew); setStore(st); setMode('file');
      const display = (()=>{ try{return localStorage.getItem('qualilab:name')||'pesquisador';}catch(e){return 'pesquisador';} })();
      const u = await st.init(display); setUser({...u,anon:false});
      const p = isNew ? await st.createProject(fh.name.replace(/\.qualilab$/i,''), display) : await st.joinProject();
      openProject(p); setPhase('work');
    }catch(e){ if(e?.name!=='AbortError') setErr(String(e.message||e)); }
  };

  // migra o RASCUNHO (localStorage) para um arquivo .qualilab no disco, que passa a ser o
  // armazenamento PRIMARIO (pilula verde). Copia tudo do projeto atual pro arquivo novo sem
  // passar pelo Gate. So Chromium (File System Access API); acionado pelo card do ProjectModal.
  const saveAsFile = async ()=>{
    if(!supportsFileAPI) return;
    try{
      const db = await buildQualilabDb();
      const suggested = (project?.name||'projeto').replace(/[^\w\-]+/g,'_')+'.qualilab';
      const fh = await window.showSaveFilePicker({ suggestedName:suggested, types:[{description:'QualiLab',accept:{'application/json':['.qualilab']}}] });
      setBusy('Salvando como arquivo...');
      try{ if(store?.disableFolderBackup) await store.disableFolderBackup(); }catch(e){}
      const st = await createFileStore(fh, true);
      const display = user?.name || 'pesquisador';
      await st.init(display);
      const p = await st.createProject(project?.name||fh.name.replace(/\.qualilab$/i,''), display);
      if(st.beginBatch) st.beginBatch();
      try{ await mergeQualilabDb(db, st, p.id, 'individual', (done,total)=>setProgress({done,total,label:'copiando'})); }
      finally{ if(st.endBatch) await st.endBatch(); }
      setStore(st); setMode('file'); openProject(p);
      setProgress(null); setBusy(null);
    }catch(e){ setProgress(null); setBusy(null); if(e?.name!=='AbortError') setErr(String(e.message||e)); }
  };

  // "Sair deste arquivo": desanexa do arquivo atual (limpa o handle do IDB, que faz o boot
  // reabrir sozinho) e recarrega, caindo na tela de escolha (welcome) ou rascunho. O .qualilab
  // no disco fica intacto — e o escape pra nao ficar "preso" no arquivo pelo reabrir-automatico.
  const leaveFile = async ()=>{
    if(!confirm('Sair deste arquivo e voltar à tela inicial? O arquivo .qualilab continua salvo no disco, intacto.')) return;
    try{ await IDB.deleteHandle('qualilab:file'); }catch(e){}
    try{ localStorage.removeItem('qualilab:project'); }catch(e){}
    location.reload();
  };

  if(phase==='welcome') return html`<${Welcome}
    err=${err}
    onNewFile=${()=>openFileProject(true)}
    onOpenFile=${()=>openFileProject(false)}
    onCloud=${()=>{ setErr(null); setPhase('auth'); }}
    onRascunho=${()=>enterLocalOffline()}
    onServer=${connectCustomCloud} onResetServer=${resetCustomCloud}
  />`;

  if(phase==='gate') return html`<div>

      onLogin=${async()=>{ try{ await store.signOut(); }catch(e){} setUser(null); setPhase('auth'); }}
      onOpen=${async (proj)=>{ try{ const p=await store.joinProject(proj.code, user?.name||''); try{localStorage.setItem('qualilab:project',JSON.stringify(p));}catch(e){} pushRecent(p); openProject(p); setPhase('work'); }catch(e){ setErr(String(e.message||e)); } }}
      onCreate=${async (n,disp,pmode)=>{ try{ try{localStorage.setItem('qualilab:name',disp);}catch(e){} const p=await store.createProject(n,disp,pmode); try{localStorage.setItem('qualilab:project',JSON.stringify(p));}catch(e){} pushRecent(p); setUser(store.currentUser()); openProject(p); setPhase('work'); }catch(e){ setErr(String(e.message||e)); } }}
      onJoin=${async (code,disp)=>{ try{ try{localStorage.setItem('qualilab:name',disp);}catch(e){} const p=await store.joinProject(code,disp); try{localStorage.setItem('qualilab:project',JSON.stringify(p));}catch(e){} pushRecent(p); setUser(store.currentUser()); openProject(p); setPhase('work'); }catch(e){ setErr(String(e.message||e)); } }}
    />
    ${account && html`<${AccountModal} user=${user} projects=${myProjects}
      onClose=${()=>setAccount(false)} onChangePassword=${changePassword} onChangeName=${changeDisplayName}
      onOpen=${acctOpenProject} onRename=${acctRenameProject} onDelete=${acctDeleteProject} onLeave=${acctLeaveProject}
      onLogout=${async()=>{ setAccount(false); try{localStorage.removeItem('qualilab:project');}catch(e){} try{ await store.signOut(); }catch(e){} setProject(null); setUser(null); setDocs([]); setActiveId(null); setPhase('welcome'); }} />`}
  </div>`;

  return html`
  <div class="app">
    <header class="top">
      <div class="top-row">
        <a class="brand" href="https://github.com/LuizPF42/QualiLab" target="_blank" rel="noopener"
          title="o seu laboratório de pesquisa qualitativa / your own lab for qualitative research — ver no GitHub"
          style="text-decoration:none">QualiLab</a>
        <button class="icon-btn" title=${darkMode?'Modo claro':'Modo escuro'} onClick=${()=>setDarkMode(d=>!d)}>${darkMode?'☀︎':'⏾'}</button>
        ${project && html`<div class="seg" style="margin-left:10px">
          <button class=${mainView==='codificar'?'on':''} onClick=${()=>setMainView('codificar')}>Codificação</button>
          ${projectMode==='collective' && html`<button class=${mainView==='reconciliar'?'on':''} onClick=${()=>setMainView('reconciliar')}>Reconciliação</button>`}
          <button class=${mainView==='visualizar'?'on':''} onClick=${()=>setMainView('visualizar')}>Visualização</button>
          <button class=${mainView==='graficos'?'on':''} onClick=${()=>setMainView('graficos')}>Gráficos</button>
          <button class=${mainView==='memos'?'on':''} onClick=${()=>setMainView('memos')}>Memos</button>
          <button class=${mainView==='esquema'?'on':''} onClick=${()=>setMainView('esquema')}>Esquema</button>
          ${AI_ENABLED && html`<button class=${mainView==='ia_codificar'?'on':''} onClick=${()=>setMainView('ia_codificar')}>Codificar com IA</button>`}
          ${AI_ENABLED && html`<button class=${mainView==='ia_analisar'?'on':''} onClick=${()=>setMainView('ia_analisar')}>Analisar com IA</button>`}
          <button class=${mainView==='relatorio'?'on':''} onClick=${()=>setMainView('relatorio')}>Relatório</button>
        </div>`}
      </div>
      <div class="top-row">
        ${project && (()=>{ /* pilula do projeto: cor + rotulo + tooltip por estado de conexao */
          const cs = store?.mode==='file' ? 'file' : mode!=='cloud' ? 'local' : !online ? 'offline' : CUSTOM_SUPABASE ? 'custom' : 'cloud';
          const csLabel = { file:'arquivo', local:'rascunho', cloud:'nuvem', custom:'nuvem pessoal', offline:'nuvem' }[cs];
          const csTitle = {
            file:'Projeto em ARQUIVO (.qualilab) no seu disco — os dados ficam só no seu dispositivo. Clique para gerenciar.',
            local:'Rascunho (armazenamento deste navegador). Os dados ficam só neste dispositivo e podem sumir se você limpar os dados do navegador. Salve como arquivo ou conecte à nuvem para não perder.'
              + (localUsage>0?` Usando ~${Math.max(1,Math.round(localUsage/LOCAL_QUOTA_CHARS*100))}% do limite (~5 MB).`:'')
              + ' Clique para gerenciar.',
            cloud:'Projeto na NUVEM — servidor padrão do QualiLab (Supabase). Clique para gerenciar.',

            ${csLabel} · ${project.name}${mode==='cloud'?` · ${project.code}`:''} · ${projectMode==='individual'?'individual':'coletivo'} ▾
          </button>`;
        })()}
        ${user && html`<button class="btn sm ghost" title=${'Minha conta'+(user.email?' · '+user.email:'')} onClick=${()=>setAccount(true)}>${user.name}${user.anon?' (visitante)':''}</button>`}
        ${mode==='cloud' && html`<button class="btn sm ghost" onClick=${()=>{ try{localStorage.removeItem('qualilab:project');}catch(e){} setProject(null); setPhase('gate'); }}>trocar projeto</button>`}
        ${mode==='cloud' && user && html`<button class="btn sm ghost" onClick=${async()=>{ try{localStorage.removeItem('qualilab:project');}catch(e){} try{ await store.signOut(); }catch(e){} setProject(null); setUser(null); setDocs([]); setActiveId(null); setPhase('welcome'); }}>sair</button>`}
        ${project && docs.length>0 && html`<div style="position:relative">
          <button class="btn sm" onClick=${()=>setExpOpen(o=>!o)}>exportar ▾</button>
          ${expOpen && html`<div>
            <div onClick=${()=>setExpOpen(false)} style="position:fixed;inset:0;z-index:40"></div>
            <div class="exmenu">
              <button title="Baixa o projeto inteiro (documentos, categorias, códigos, codificações e memos) para reabrir/importar depois no próprio QualiLab" onClick=${()=>{ setExpOpen(false); saveQualilab(); }}>.qualilab (projeto completo, nativo)</button>

              <button onClick=${()=>doExport('documentos')}>CSV (atributos por documento)</button>
              <button onClick=${()=>doExport('qdpx')}>QDPX (ATLAS.ti / MAXQDA / NVivo)</button>
              <button title="Exporta só o livro de códigos, sem documentos nem codificações" onClick=${()=>{ setExpOpen(false); exportQDC(codes, project); }}>QDC (codebook REFI-QDA)</button>
              <div style="padding:6px 12px;font-size:11px;color:var(--ink-faint);border-top:1px solid var(--line-soft)">Transparência (W3C / Leitor) agora na aba <b>Relatório</b>.</div>
            </div>
          </div>`}
        </div>`}
        ${project && html`<div style="position:relative">
          <button class="btn sm ghost" onClick=${()=>setImpOpen(o=>!o)}>importar ▾</button>
          ${impOpen && html`<div>
            <div onClick=${()=>setImpOpen(false)} style="position:fixed;inset:0;z-index:40"></div>
            <div class="exmenu">
              <button title="Mescla um arquivo .qualilab (exportado por outra pessoa/dispositivo) neste projeto" onClick=${()=>{ setImpOpen(false); qualilabInputRef.current.click(); }}>.qualilab (projeto completo, nativo)</button>
              <button title="Importa um projeto .qdpx (REFI-QDA)" onClick=${()=>{ setImpOpen(false); qdpxInputRef.current.click(); }}>QDPX (ATLAS.ti / MAXQDA / NVivo)</button>
              <button title="Importa o projeto completo do Taguette (documentos, tags e trechos codificados)" onClick=${()=>{ setImpOpen(false); taguetteInputRef.current.click(); }}>.sqlite3 (Taguette)</button>
              <button title="Importa só o livro de códigos (.qdc) — sem documentos nem codificações" onClick=${()=>{ setImpOpen(false); qdcInputRef.current.click(); }}>.qdc (codebook REFI-QDA)</button>
              <button title="Importa uma planilha (.csv ou Excel .xlsx): cada linha vira um documento; você escolhe qual coluna é o texto e quais viram categorias" onClick=${()=>{ setImpOpen(false); csvInputRef.current.click(); }}>planilha (.csv / .xlsx → documentos + categorias)</button>
            </div>
          </div>`}
        </div>`}
        ${mode==='cloud' && !online && html`<span class="pill mode-offline" style="font-size:11px" title="Sem conexão: alterações NÃO estão sendo salvas na nuvem — aguarde reconectar antes de continuar">offline — alterações não salvas</span>`}
        ${store?.mode==='local' && localUsage>=0.75*LOCAL_QUOTA_CHARS && html`<span class="pill mode-offline" style="font-size:11px"
          title="O armazenamento deste navegador (~5 MB) está quase cheio: quando estourar, NADA mais é salvo. Baixe um .qualilab agora e considere migrar para o modo arquivo ou nuvem (pílula do projeto → Conexão).">
          armazenamento ${Math.round(localUsage/LOCAL_QUOTA_CHARS*100)}% cheio</span>`}
        ${(store?.mode==='local'||store?.mode==='file') && lastSaved && !saveError && html`<span class="meta"
          title=${'Última gravação '+(store?.mode==='file'?'no arquivo':'neste navegador')+' às '+lastSaved.toTimeString().slice(0,8)}>✓ salvo ${lastSaved.toTimeString().slice(0,5)}</span>`}
      </div>
      <input ref=${qualilabInputRef} type="file" accept=".qualilab" style="display:none" onChange=${e=>{ if(e.target.files[0]) doImportQualilab(e.target.files[0]); e.target.value=''; }} />
      <input ref=${qdpxInputRef} type="file" accept=".qdpx" style="display:none" onChange=${e=>{ if(e.target.files[0]) doImportQDPX(e.target.files[0]); e.target.value=''; }} />
      <input ref=${taguetteInputRef} type="file" accept=".sqlite3,.sqlite,.db" style="display:none" onChange=${e=>{ if(e.target.files[0]) doImportTaguette(e.target.files[0]); e.target.value=''; }} />
      <input ref=${qdcInputRef} type="file" accept=".qdc" style="display:none" onChange=${e=>{ if(e.target.files[0]) doImportQDC(e.target.files[0]); e.target.value=''; }} />
      <input ref=${csvInputRef} type="file" accept=".csv,text/csv,.xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" style="display:none" onChange=${e=>{ if(e.target.files[0]) openCsvMapping(e.target.files[0]); e.target.value=''; }} />
    </header>

    ${store?.mode==='local' && !nudgeHidden && html`<div class="nudge">
      <span class="msg">Você está num <b>rascunho</b>. Os dados ficam só neste navegador e podem sumir se você limpar os dados do site. Salve como arquivo ou conecte à nuvem para não perder.</span>
      ${supportsFileAPI && html`<button class="btn sm" onClick=${saveAsFile}>Salvar como arquivo</button>`}
      <button class="btn sm ghost" onClick=${()=>setProjEdit(true)}>Conectar à nuvem</button>
      <button class="icon-btn" title="ocultar até recarregar" onClick=${()=>setNudgeHidden(true)}>✕</button>
    </div>`}

    ${saveError && html`<div class="banner err">
      <b>Atenção: as últimas alterações NÃO foram salvas</b> ${mode==='local' ? '(armazenamento do navegador cheio ou indisponível).' : '(falha ao gravar o arquivo — verifique se o disco/pasta ainda está acessível).'}
      Continuar trabalhando sem resolver isso arrisca perder o que vier depois. Baixe um backup agora:
      <button class="btn sm" onClick=${saveQualilab}>baixar .qualilab</button>
    </div>`}
    ${err && (()=>{ const h = humanizeError(err); return html`<div class="banner err">${h||err}${h && html`<div class="meta" style="margin-top:4px">${err}</div>`} <button class="btn sm ghost" onClick=${()=>setErr(null)}>fechar</button></div>`; })()}
    ${importMsg && html`<div class="banner warn">${importMsg} <button class="btn sm ghost" onClick=${()=>setImportMsg(null)}>fechar</button></div>`}
    ${busy && html`<div class="banner warn">
      ${busy}${progress?.total>0 ? `${progress.label?' — '+progress.label:''} ${progress.done}/${progress.total}` : ''}
      ${progress?.total>0 && html`<div class="progress-track"><div class="progress-fill" style=${`width:${Math.min(100,Math.round(100*progress.done/progress.total))}%`}></div></div>`}
    </div>`}

    ${mainView==='codificar' ? html`<div class="split">
      <!-- ESQUERDA: documento -->
      <section class="pane left">

                const matchI = run.matchI;

                const matchAttrs = matchI>=0 ? { 'data-match': matchI } : {};
                const jumpCls = (readerFlash!=null && run.start===readerFlash) ? ' qljump' : '';
                if(run.codings.length===0) return html`<span key=${i} data-start=${run.start} data-end=${run.end} ...${matchAttrs}
                   class=${(isCurrent?'current':'')+jumpCls}>${run.text}</span>`;
                // censura sempre na frente quando ha mais de um codigo no mesmo trecho — senao
                // a caixa fechada (sinal visual de censura) podia ficar escondida atras de
                // outro codigo que por acaso vem depois na lista (ordem nao tem prioridade).
                const top = run.codings.find(c=>codeById[c.code_id]?.is_redaction) || run.codings[run.codings.length-1];
                const code = codeById[top.code_id];
                const col = code ? codeColor(code.hue, code.depth, code.hue_deg, darkMode, code.sat) : codeColor(0,0,null,darkMode);
                const title = run.codings.map(c=>codePath(c.code_id).join(' ▸ ')+' ('+c.author_name+')').join('  |  ');
                // igual o QualCoder: border-bottom so sinaliza "tem mais de um codigo aqui"
                // (em vez de decorar todo trecho codificado, mesmo quando ha so 1 — o fundo
                // tintado ja basta nesse caso, menos poluido visualmente). Censura e exececao:
                // ganha caixa fechada (borda nos 4 lados) sempre, mesmo com 1 so codigo —
                // cinza e preto tem o mesmo tom claro de fundo (tint), praticamente
                // indistinguiveis sem essa borda; a caixa fechada tambem lembra visualmente o
                // "tarjao" classico de redacao, reforcando que e censura.
                // em fundo escuro de leitura (tema escuro do leitor, ou modo escuro do app que
                // escurece sépia/claro também) a borda preta da censura some — usa branca.
                const readerDark = readerPrefs.theme==='dark' || darkMode;

                   style=${`background:${col.tint};${border}`}>${run.text}</span>`;

              </${NavGroup}>`}

            ${navRow(reconcileTab==='codigos', '✎ Códigos', ()=>setReconcileTab('codigos'))}

              <${NavGroup} title="Documentos">

  ${ctxMenu && (()=>{

/* ============ MODAL DE MAPEAMENTO DO .csv ============
   Mostra cada coluna do .csv e deixa o usuario escolher o papel dela: Texto (conteudo do
   documento), Nome do documento, uma Categoria (de qualquer tipo) ou Ignorar. Exige
   exatamente UMA coluna de texto. Os defaults sao um chute: a coluna com texto mais longo
   em media vira o "Texto"; as demais viram Categoria · Texto Fechado (revisavel). */
function CsvImportModal({ parsed, fileName, onCancel, onConfirm }){
  const { headers, rows } = parsed;
  // chute inicial: coluna com maior comprimento medio = texto
  const guessTextCol = (()=>{
    let best=0, bestLen=-1;
    headers.forEach((_,c)=>{ let sum=0,n=0; for(const r of rows.slice(0,50)){ sum+=(r[c]||'').length; n++; } const avg=n?sum/n:0; if(avg>bestLen){ bestLen=avg; best=c; } });
    return best;
  })();
  const [roles, setRoles] = useState(()=> headers.map((_,c)=> c===guessTextCol ? 'text' : 'cat:select'));
  const setRole = (c,v)=> setRoles(rs=> rs.map((x,i)=> i===c ? v : x));

  const textCount = roles.filter(r=>r==='text').length;
  const valid = textCount===1;
  const roleOpts = [
    {v:'ignore', l:'— Ignorar —'},
    {v:'text', l:'Texto (conteúdo do documento)'},
    {v:'name', l:'Nome do documento'},
    ...CAT_KINDS.map(k=>({v:'cat:'+k.id, l:'Categoria · '+k.label})),
  ];

  function confirm(){
    if(!valid) return;
    const textCol = roles.findIndex(r=>r==='text');
    const nameCol = roles.findIndex(r=>r==='name'); // -1 se nenhum
    const cats = roles.map((r,c)=> r.startsWith('cat:') ? { col:c, name:headers[c], kind:r.slice(4) } : null).filter(Boolean);
    onConfirm({ textCol, nameCol, cats });
  }

  // amostra por coluna: primeiros 3 VALORES DISTINTOS nao-vazios (para no 3o, varre so o necessario) —
  // a 1a linha de dados as vezes esta vazia/NA e nao representa a coluna; mostrar distintos
  // da uma ideia melhor do conteudo (e ja sinaliza colunas de poucos valores = candidatas a fechada).
  const colSamples = headers.map((_,c)=>{
    const seen=new Set(); const out=[];
    for(const r of rows){ const v=(r[c]||'').trim(); if(!v||seen.has(v)) continue; seen.add(v); out.push(v); if(out.length>=3) break; }
    return out;
  });
  return html`<div class="modal-bg" onClick=${onCancel}>
    <div class="modal" onClick=${e=>e.stopPropagation()} style="max-width:640px">
      <h3 style="margin:0 0 4px">Importar planilha</h3>
      <p class="hint" style="margin:0 0 12px">
        <b>${fileName}</b> · ${rows.length} linha(s) → cada linha vira um documento.
        Escolha o papel de cada coluna. Exatamente uma coluna deve ser o <b>Texto</b> (o conteúdo a codificar); as demais podem virar categorias.
      </p>
      <div style="max-height:46vh;overflow:auto;display:flex;flex-direction:column;gap:8px">
        ${headers.map((h,c)=> html`<div key=${c} class="card" style="padding:8px 10px;display:flex;align-items:center;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h}</div>
            <div class="hint" style="font-family:var(--mono);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title=${colSamples[c].join(' · ')}>
              ${colSamples[c].length ? 'ex.: '+colSamples[c].join(' · ') : '(coluna vazia)'}
            </div>
          </div>
          <select value=${roles[c]} onChange=${e=>setRole(c, e.target.value)} style="flex-shrink:0">
            ${roleOpts.map(o=> html`<option key=${o.v} value=${o.v}>${o.l}</option>`)}
          </select>
        </div>`)}
      </div>
      ${!valid && html`<p class="hint" style="color:var(--danger);margin:10px 0 0">
        ${textCount===0 ? 'Selecione uma coluna como "Texto (conteúdo do documento)".' : 'Apenas uma coluna pode ser o Texto.'}
      </p>`}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button class="btn ghost" onClick=${onCancel}>Cancelar</button>
        <button class="btn primary" disabled=${!valid} onClick=${confirm}>Importar</button>
      </div>
    </div>
  </div>`;
}

  const [code,setCode]=useState('');

    if(p.n_documents!=null) bits.push(`${p.n_documents} documento(s)`);
    if(p.n_codings!=null) bits.push(`${p.n_codings} trecho(s)`);
    return bits.join(' · '); };
