<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QualiLab — o seu laboratório de pesquisa qualitativa -- your own lab for qualitative research</title>
<!-- favicon SVG inline (sem arquivo externo): "Q" serifada branca sobre quadrado azul-marinho FGV -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2300427A'/><text x='16.02' y='23.13' font-family='Georgia,serif' font-size='26' font-weight='700' fill='white' text-anchor='middle'>Q</text></svg>" />
<script>
  // captura erros do modulo (import falho, sintaxe, runtime) e mostra na tela
  function showFatal(msg){
    var el=document.getElementById('app'); if(!el) return;
    var esc=String(msg==null?'erro desconhecido':msg).replace(/[<>&]/g,function(c){return ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c];});
    el.innerHTML='<div style="font-family:system-ui,sans-serif;padding:24px;max-width:720px;margin:24px auto;color:#1A1B1E">'
      +'<h2 style="font-family:Georgia,serif;margin:0 0 6px">QualiLab nao carregou</h2>'
      +'<p style="color:#5C5F66;margin:0 0 12px">Houve um erro ao iniciar. O detalhe abaixo ajuda a depurar. Causas comuns: alguma biblioteca de CDN bloqueada pela rede, ou um erro de digitacao ao colar as credenciais do Supabase.</p>'
      +'<pre style="white-space:pre-wrap;background:#F3ECD9;border:1px solid #d9c89a;border-radius:8px;padding:12px;font-size:12px;overflow:auto">'+esc+'</pre></div>';
  }
  // Antes do boot, qualquer erro derruba pra tela fatal (CDN bloqueada, credencial errada).
  // DEPOIS do boot (__qlBooted, setado apos o primeiro render), substituir a tela de trabalho
  // seria pior que o erro: uma falha de rede num salvamento virava "QualiLab nao carregou"
  // com o projeto aberto. Pos-boot: avisa via banner do app (__qlNotify) e loga no console.
  function handleGlobal(msg){
    if(window.__qlBooted){
      try{ console.error('QualiLab (erro nao tratado):', msg); }catch(_){}
      try{ if(window.__qlNotify) window.__qlNotify(msg); }catch(_){}
      return;
    }
    showFatal(msg);
  }
  window.addEventListener('error', function(e){ handleGlobal((e.error&&e.error.stack)||e.message||(e.filename?(e.filename+':'+e.lineno):'')||'erro'); });
  window.addEventListener('unhandledrejection', function(e){ var r=e.reason; handleGlobal((r&&(r.stack||r.message))||String(r)); });
</script>
<style>
  :root{
    /* --ink-faint escurecido de #8B8E94 pra #6E7176 (jul/2026): era ~3.3:1 sobre branco,
       abaixo do minimo WCAG AA de 4.5:1 pra texto pequeno — e .meta/.count (11px) carregam
       informacao real (autoria, datas, contadores) */
    --paper:#F4F3EF; --surface:#FFFFFF; --ink:#1A1B1E; --ink-soft:#5C5F66; --ink-faint:#6E7176;
    --line:#E5E3DD; --line-soft:#EEECE6;
    /* paleta FGV: azul-marinho (primario) + azul-celeste (acento). nomes --teal* mantidos por compatibilidade */
    --teal:#00427A; --teal-deep:#002B5C; --teal-soft:#E2ECF5; --sky:#1B9DD9;
    --amber:#8A6D1F; --amber-soft:#F3ECD9; --danger:#B23A3A;
    /* estados de conexao da pilula do projeto: verde = arquivo (dados no disco do pesquisador),
       violeta = nuvem pessoal (Supabase do proprio pesquisador) */
    --ok:#256B43; --ok-soft:#E4F2E9; --violet:#5B3C96; --violet-soft:#EEE9F8;
    --serif:"Newsreader","Iowan Old Style",Palatino,Georgia,serif;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"JetBrains Mono","SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;
  }
  /* modo escuro do app inteiro: sobrepoe as MESMAS variaveis do :root quando html[data-theme=dark]
     (setado pelo state darkMode no App). A maior parte da UI vira escura de graca por usar var(--*).
     As 3 regras abaixo cobrem o que nao depende so de variavel (banner de erro e o tema sepia do
     leitor sob fundo escuro). As cores dos codigos (tint) viram escuras via codeColor(...,dark). */
  [data-theme="dark"]{
    --paper:#1C1C1E; --surface:#2C2C2E; --ink:#F0EFEB; --ink-soft:#A0A09A; --ink-faint:#98988F; /* idem: #6B6B6B dava ~2.6:1 no fundo escuro */
    --line:#3A3A3C; --line-soft:#2E2E30;
    --teal:#4A9EDB; --teal-deep:#76BBEC; --teal-soft:#1A2E3F; --sky:#5BB8F5;
    --amber:#C8A84B; --amber-soft:#2E2510; --danger:#E06060;
    --ok:#7CC79A; --ok-soft:#17281D; --violet:#B49DE0; --violet-soft:#251C38;
  }
  [data-theme="dark"] .banner.err{background:#3D1A1A;border-color:#7A3A3A;color:#F08080;}
  [data-theme="dark"] .reader-pane.theme-sepia{background:#2A2218;}
  [data-theme="dark"] .reader-pane.theme-sepia .reader{color:#D4C9A8;}
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);font-size:14px;}
  #app{height:100%;}
  ::selection{background:rgba(0,66,122,.18);}
  button{font-family:var(--sans);cursor:pointer;}
  input,select,textarea{font-family:var(--sans);color:var(--ink);}
  .scroll::-webkit-scrollbar{width:10px;height:10px;}
  .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  :focus-visible{outline:2px solid var(--sky);outline-offset:2px;}

  .app{display:flex;flex-direction:column;height:100vh;}
  header.top{background:var(--surface);border-bottom:1px solid var(--line);padding:8px 14px;display:flex;flex-direction:column;gap:8px;}
  .top-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:-.01em;color:var(--teal-deep);}
  .tag{font-size:11px;color:var(--ink-faint);letter-spacing:.04em;}
  .grow{flex:1;}
  .pill{font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:inline-flex;align-items:center;gap:6px;}
  /* pilula do projeto: uma cor por estado de conexao (o texto ja diz o modo — cor e reforco).
     local = neutra (sem classe); arquivo = verde; nuvem oficial = azul FGV; nuvem pessoal =
     violeta; offline = ambar (nao esta salvando). bg/cor via var(--*) viram dark de graca. */
  .pill.mode-cloud{background:var(--teal-soft);border-color:rgba(0,66,122,.35);color:var(--teal-deep);}
  .pill.mode-custom{background:var(--violet-soft);border-color:rgba(91,60,150,.4);color:var(--violet);}
  .pill.mode-file{background:var(--ok-soft);border-color:rgba(37,107,67,.4);color:var(--ok);}
  .pill.mode-offline{background:var(--amber-soft);border-color:var(--amber);color:var(--amber);}
  /* nudge do rascunho: faixa fina e sobria abaixo do header (modo localStorage), com atalhos
     pra salvar como arquivo ou conectar a nuvem. Colapsavel por sessao (state nudgeHidden). */
  .nudge{display:flex;align-items:center;gap:10px;padding:6px 14px;font-size:12.5px;background:var(--amber-soft);border-bottom:1px solid var(--line);}
  .nudge .msg{flex:1;color:var(--ink-soft);}
  .nudge b{color:var(--amber);}
  /* tela de entrada (Welcome): cartoes de escolha arquivo/nuvem/rascunho */
  .wcard{display:flex;flex-direction:column;align-items:flex-start;gap:5px;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;cursor:pointer;width:100%;color:var(--ink);}
  .wcard:hover{border-color:var(--teal);background:var(--paper);}
  .wcard.wrow{flex-direction:row;align-items:center;gap:12px;}
  .wdot{width:11px;height:11px;border-radius:99px;flex:none;}
  .wicon{flex:none;}
  .wtitle{font-size:15px;font-weight:600;}
  .wdesc{font-size:12.5px;color:var(--ink-soft);line-height:1.45;}
  .btn{font-size:13px;font-weight:500;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 12px;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .btn:hover{background:var(--paper);}
  .btn.primary{background:var(--teal);color:#fff;border:none;font-weight:600;}
  .btn.primary:hover{background:var(--teal-deep);}
  .btn.violet{color:var(--violet);border-color:var(--violet);}
  .btn.violet:hover{background:var(--violet-soft);}
  /* botão "configurar prompt" (transparência da IA): acento no azul-claro FGV, o "oposto" do
     var(--teal) primário. No claro fica #4A9EDB (destaca contra o navy dos primários); no escuro
     INVERTE pra navy #00427A, porque lá o --teal já é #4A9EDB (os primários viram azul-claros) e o
     acento precisa contrastar. Texto branco, SEM borda (era box-shadow inset marinho, tirada a
     pedido do autor). Sem box-shadow o tamanho da caixa não muda, então segue alinhado com o .seg. */
  .btn.accent{background:#4A9EDB;color:#fff;border:none;font-weight:600;}
  .btn.accent:hover{background:#3E8FCD;}
  [data-theme="dark"] .btn.accent{background:#00427A;}
  [data-theme="dark"] .btn.accent:hover{background:#002B5C;}
  .btn.ghost{background:transparent;}
  .btn.sm{font-size:12px;padding:5px 9px;border-radius:7px;}
  .icon-btn{background:transparent;border:none;color:var(--ink-soft);padding:4px;border-radius:6px;display:inline-flex;}
  .icon-btn:hover{background:var(--line-soft);color:var(--ink);}

  .split{flex:1;display:flex;min-height:0;}
  .pane{min-width:0;display:flex;flex-direction:column;}
  .pane.left{flex:1 1 58%;border-right:1px solid var(--line);}
  .pane.right{flex:none;min-width:180px;}
  /* divisa arrastavel entre leitor e painel direito (tela Codificacao). So a Codificacao usa
     .pane.right; as outras views usam .pane.left com flex:1 1 100% inline, intocadas por isto. */
  .pane-resize{width:5px;flex:none;background:var(--line);cursor:col-resize;transition:background .15s;}
  .pane-resize:hover,.pane-resize.dragging{background:var(--sky);}
  .pane-head{padding:10px 14px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--surface);}
  .pane-body{flex:1;overflow:auto;padding:0;}

  .reader{font-family:var(--serif);font-size:17px;line-height:1.8;color:var(--ink);padding:22px 26px;white-space:pre-wrap;}
  .reader span[data-c]{border-radius:3px;padding:0 1px;cursor:default;}
  .reader span[data-match]{border-radius:2px;box-shadow:inset 0 0 0 1px #C98A12;}
  .reader span[data-match].current{background:#FFD54A!important;color:#3a2c00;box-shadow:none;}
  /* destaque momentaneo ao "pular ao trecho" a partir da Visualizacao */
  .reader span.qljump{border-radius:3px;animation:qlJumpFlash 1.6s ease-out;}
  @keyframes qlJumpFlash{0%,25%{box-shadow:0 0 0 3px var(--sky);}100%{box-shadow:0 0 0 3px transparent;}}

  /* preferencias de leitura (zoom/largura/tema), aplicadas no .pane-body que envolve o .reader */
  .reader-pane.width-narrow .reader{max-width:760px;margin:0 auto;}
  .reader-pane.theme-sepia{background:#F4ECD8;}
  .reader-pane.theme-sepia .reader{color:#3b2f1d;}
  .reader-pane.theme-dark{background:#1c1c1e;}
  .reader-pane.theme-dark .reader{color:#e8e6e1;}
  .reader-toolbar{display:flex;align-items:center;gap:4px;}
  .reader-toolbar .icon-btn{font-size:13px;}
  .search-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line-soft);background:var(--paper);}
  .search-bar input{flex:1;max-width:320px;}

  .toolbar{position:sticky;top:0;z-index:5;background:var(--teal-soft);border-bottom:1px solid rgba(0,66,122,.3);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .toolbar .q{font-family:var(--mono);font-size:12px;color:var(--ink);max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{border:none;background:var(--surface);padding:6px 12px;font-size:13px;color:var(--ink-soft);}
  .seg button.on{background:var(--teal);color:#fff;font-weight:600;}

  .section{padding:14px;}
  .h{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;margin:0 0 8px;}
  .hint{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin:0 0 10px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px;}
  .row{display:flex;align-items:center;gap:8px;}
  .field{margin-bottom:14px;}
  .field-label{font-size:12.5px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
  .opt{font-size:12.5px;padding:5px 11px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink);}
  .opt.on{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600;}
  /* descricao (.meta) dentro de um .opt selecionado: no claro o fundo e navy (texto claro);
     no escuro o --teal vira azul-claro, entao texto/descricao ficam ESCUROS pra contrastar. */
  .opt.on .meta{color:rgba(255,255,255,.82);}
  [data-theme="dark"] .opt.on{color:#0A1A2A;}
  [data-theme="dark"] .opt.on .meta{color:rgba(8,20,33,.72);}
  .txtin{width:100%;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--surface);}
  .meta{font-size:11px;color:var(--ink-faint);}

  /* render de markdown leve das respostas da IA (mdLite) */
  .md{font-size:13px;line-height:1.5;}
  .md p{margin:0 0 .5em;}
  .md p:last-child{margin-bottom:0;}
  .md-h{font-weight:600;margin:6px 0 2px;line-height:1.3;}
  .md-h:first-child{margin-top:0;}
  .md-h1{font-size:15px;} .md-h2{font-size:14px;} .md-h3,.md-h4{font-size:13px;}
  .md ul,.md ol{margin:4px 0 6px;padding-left:20px;}
  .md li{margin:2px 0;}
  .md code{font-family:var(--mono);font-size:12px;background:var(--paper);padding:1px 4px;border-radius:4px;}
  .md-table{border-collapse:collapse;margin:8px 0;font-size:12.5px;display:block;overflow-x:auto;max-width:100%;}
  .md-table th,.md-table td{border:1px solid var(--line);padding:5px 9px;text-align:left;vertical-align:top;}
  .md-table th{background:var(--teal-soft);color:var(--teal-deep);font-weight:600;}
  .md hr{border:none;border-top:1px solid var(--line);margin:6px 0;}

  .tree{margin-top:6px;}
  .node{}
  .node-row{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:8px;}
  .node-row:hover{background:var(--paper);}
  .node-row.sel{background:var(--teal-soft);}
  .node-row.appliable{cursor:pointer;}
  .swatch{width:11px;height:11px;border-radius:3px;flex:none;}
  .node-name{font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .count{font-family:var(--mono);font-size:11px;color:var(--ink-faint);}
  .caret{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-faint);cursor:pointer;flex:none;}
  /* <details> colapsavel com caret proprio — o marcador nativo some quando o <summary> e
     display:flex (ex.: .field-label), entao desenhamos com ::before e alternamos por [open]. */
  .collap>summary{cursor:pointer;list-style:none;}
  .collap>summary::-webkit-details-marker{display:none;}
  .collap>summary::before{content:'▸';color:var(--ink-faint);font-size:10px;flex:none;}
  .collap[open]>summary::before{content:'▾';}
  /* dica clicavel em negrito dentro do summary; alterna "ver"/"ocultar" conforme [open] */
  .collap>summary .clickhint{margin-top:4px;font-weight:700;color:var(--teal);font-size:11.5px;}
  .collap>summary .clickhint.on-closed{display:block;}
  .collap>summary .clickhint.on-open{display:none;}
  .collap[open]>summary .clickhint.on-closed{display:none;}
  .collap[open]>summary .clickhint.on-open{display:block;}
  /* indicador "pensando" (tres bolinhas) enquanto a IA processa */
  .typing{display:inline-flex;gap:5px;align-items:center;}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:typingDot 1s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.16s;}
  .typing span:nth-child(3){animation-delay:.32s;}
  @keyframes typingDot{0%,70%,100%{opacity:.3;transform:translateY(0);}35%{opacity:1;transform:translateY(-4px);}}
  .crumb{font-size:11px;color:var(--ink-faint);font-family:var(--mono);}

  .docitem{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;background:var(--surface);}
  .docitem.active{border-color:var(--teal);background:var(--teal-soft);}

  .modal-bg{position:fixed;inset:0;background:rgba(20,20,22,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:18px;}
  .modal{background:var(--surface);border-radius:16px;border:1px solid var(--line);max-width:460px;width:100%;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.2);max-height:calc(100vh - 36px);overflow-y:auto;}
  .modal h2{font-family:var(--serif);font-size:22px;margin:0 0 4px;}

  .empty{max-width:440px;margin:40px auto;text-align:center;color:var(--ink-soft);}
  .empty .t{font-family:var(--serif);font-size:20px;color:var(--ink);margin:10px 0 6px;}

  .author{font-size:10.5px;background:var(--line-soft);color:var(--ink-soft);border-radius:99px;padding:1px 7px;}
  /* botoezinhos dentro do balao de codificador (Visualizacao): ● abre a nota analitica, × remove */
  .anndot{border:0;background:none;color:var(--sky);cursor:pointer;font-size:10px;line-height:1;padding:0;}
  .balx{border:0;background:none;color:var(--ink-faint);cursor:pointer;font-size:13px;line-height:1;padding:0;}
  .balx:hover{color:var(--danger);}
  .anncard{margin-top:8px;background:var(--teal-soft);border-radius:8px;padding:8px 10px;font-size:13px;white-space:pre-wrap;line-height:1.5;color:var(--ink);}
  .vizquote:hover{box-shadow:inset 0 0 0 9999px rgba(27,157,217,.06);border-radius:4px;}
  .banner{font-size:12.5px;padding:9px 12px;border-radius:9px;margin:0 14px 12px;}
  .banner.warn{background:var(--amber-soft);border:1px solid rgba(138,109,31,.3);color:var(--amber);}
  .banner.err{background:#F8E6E6;border:1px solid #D9A3A3;color:#8A2A2A;}
  .progress-track{height:6px;border-radius:4px;background:rgba(138,109,31,.18);margin-top:7px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--amber);border-radius:4px;transition:width .15s linear;}
  .exmenu{position:absolute;right:0;top:112%;z-index:41;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.14);overflow:hidden;min-width:212px;}
  .exmenu button{display:block;width:100%;text-align:left;border:none;background:var(--surface);padding:9px 12px;font-size:13px;color:var(--ink);cursor:pointer;font-family:var(--sans);}
  .exmenu button:hover{background:var(--paper);}
  .exmenu button:disabled:hover{background:var(--surface);}
  .drag-handle{cursor:grab;color:var(--ink-faint);padding:0 4px;user-select:none;flex-shrink:0}

  /* Quadro branco espacial dos codigos (Esquema -> Mapa) */
  .mapwrap{position:absolute;inset:0;overflow:hidden;background:var(--paper);}
  .mapwrap svg{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .map-zoom{position:absolute;right:10px;bottom:10px;z-index:5;background:var(--surface);border:1px solid var(--line-soft);border-radius:6px;padding:2px 7px;font-size:11px;font-family:var(--mono);color:var(--ink-soft);pointer-events:none;}
  .map-hint{position:absolute;left:50%;transform:translateX(-50%);top:12px;z-index:5;background:var(--surface);border:1px solid var(--line-soft);border-radius:20px;padding:4px 13px;font-size:11.5px;color:var(--ink-soft);pointer-events:none;white-space:nowrap;max-width:calc(100% - 24px);overflow:hidden;text-overflow:ellipsis;}
  .map-node-label{font-family:var(--sans);font-size:11px;fill:var(--ink);pointer-events:none;user-select:none;}

  /* Relatório: ao imprimir, esconde tudo menos o relatório e remove cromo da página */
  @media print{
    body *{visibility:hidden}
    #report-print, #report-print *{visibility:visible}
    /* sempre tinta escura sobre papel branco, mesmo com o app em tema escuro */
    #report-print{position:absolute;left:0;top:0;width:100%;background:#fff;
      --ink:#1A1B1E; --ink-soft:#5C5F66; --ink-faint:#8B8E94; --surface:#fff; --paper:#fff;
      --line:#d8d8d2; --line-soft:#ececec; color:#1A1B1E;}
    #report-print h1, #report-print h2{color:#1A1B1E !important;}
    .no-print{display:none !important}

/* ============ CORES (matiz = familia, luminosidade = profundidade) ============
   hueDeg (opcional, 0-359): cor personalizada definida na familia (nivel 0) e
   copiada para os descendentes na criacao/cascata. Quando ausente, usa a
   paleta automatica (HUES[hue]). */
// Os 8 primeiros matizes sao os originais (NAO reordenar/alterar: code.hue guarda o INDICE
// nesta paleta, entao mexer neles recoloriria familias ja criadas). Os 6 seguintes foram
// acrescentados para dar mais cores distintas antes de a paleta ciclar — todos a >=18 graus
// de qualquer outro (mesmo criterio de separacao dos originais).
const HUES = [210, 28, 150, 350, 268, 184, 322, 70, 48, 96, 122, 238, 295, 8];
function codeColor(hue, depth, hueDeg, dark=false, sat=null){
  // hueDeg===-1: marcador de cinza personalizado (sem matiz, saturacao 0). hueDeg===-2: preto
  // solido (sem matiz, sem variar por profundidade — diferente do cinza, que ainda escurece/
  // clareia com a profundidade igual as cores normais). Ambos reaproveitam a mesma coluna int
  // em vez de campo novo no banco. Preto e mais reconhecivel como "censurado" que cinza.
  // sat (coluna propria, 35-75, null=58): saturacao personalizada da familia (eixo vivo<->apagado),
  // propagada aos subcodigos igual ao hueDeg. NAO afeta a luminosidade — profundidade continua
  // mandando na luminosidade. Ignorada quando cinza/preto (S ja e 0).
  const isGray = hueDeg===-1, isBlack = hueDeg===-2;
  const H = (isGray||isBlack) ? 0 : (hueDeg!=null) ? ((hueDeg%360)+360)%360 : HUES[((hue % HUES.length)+HUES.length)%HUES.length];
  const baseS = (sat!=null) ? Math.max(0, Math.min(100, sat)) : 58;
  // o tint (fundo do grifo) e levemente menos saturado que o solido — preserva a relacao 58/55
  const S = (isGray||isBlack) ? 0 : baseS, tintS = (isGray||isBlack) ? 0 : Math.max(0, baseS-3);
  const solidL = isBlack ? 0 : Math.min(70, 32 + depth*13);
  // em dark mode, o tint (fundo do grifo) usa luminosidade baixa (fundo escuro tintado) em vez
  // do pastel claro — senao os grifos viram blocos claros e berrantes sobre o fundo escuro.
  const bgL = dark ? Math.max(18, 24 - depth*2) : Math.min(94, 86 + depth*3);
  return { solid:`hsl(${H} ${S}% ${solidL}%)`, tint:`hsl(${H} ${tintS}% ${bgL}%)`, H, isGray, isBlack };
}
/* extrai o matiz (0-359) de um hex, sem encaixar na paleta fixa (usado p/ cor personalizada) */
function hexToHue(hex){
  const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex||'');
  if(!m) return 0;
  const r=parseInt(m[1],16)/255, g=parseInt(m[2],16)/255, b=parseInt(m[3],16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  let h=0;
  if(d!==0){ if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0) h+=360; }
  return Math.round(h);
}

/* ============ EXTRACAO DE TEXTO ============ */

/* Converte o HTML que o mammoth gera de um .docx num TEXTO PURO bem estruturado, pronto pro
   leitor (que renderiza content como texto com white-space:pre-wrap; codificacoes sao offsets
   nessa string). Decisao de design (pedido do autor): a estrutura vem SO de quebras de linha e
   indentacao por espacos — NUNCA marcadores injetados (#, bullets), que virariam conteudo
   codificavel/exportavel e deslocariam os offsets vs. o documento original. Regras:
     - paragrafos e titulos: cada um e um bloco, separados por linha em branco (\n\n);
     - listas: itens em linhas proprias separadas por \n simples (agrupa a lista visualmente,
       vs. os \n\n entre paragrafos); sublistas indentadas com 2 espacos por nivel;
     - tabelas: uma linha por <tr>, celulas separadas por TAB; a tabela inteira e um bloco;
     - <br> vira \n; inline (negrito/italico/link) contribui so o texto; imagens sao descartadas.
   Caminha por childNodes (O(n)) — NUNCA querySelectorAll(':scope > X'), lento em DOM grande
   (ver CLAUDE.md, gotcha #0). */
function docxHtmlToText(html){
  const doc = new DOMParser().parseFromString(html||'', 'text/html');
  const out = [];
  const clean = (t)=> String(t||'')
    .replace(/ /g,' ')          // nbsp -> espaco normal
    .replace(/[ \t]+/g,' ')          // colapsa espacos/tabs internos
    .replace(/ *\n */g,'\n')         // tira espacos ao redor de quebras
    .replace(/\n{3,}/g,'\n\n')
    .replace(/^\s+|\s+$/g,'');
  // texto "inline" de um bloco: junta text nodes; <br> -> \n; blocos filhos inesperados
  // (P/DIV/H*/LI/TR/TD dentro de uma celula, por ex.) ganham uma quebra/tab de fronteira.
  const inlineText = (node)=>{
    let s='';
    node.childNodes.forEach(ch=>{
      if(ch.nodeType===3){ s+=ch.nodeValue; return; }
      if(ch.nodeType!==1) return;
      const t=ch.tagName;
      if(t==='BR'){ s+='\n'; return; }
      s+=inlineText(ch);
      if(t==='P'||t==='DIV'||t==='BLOCKQUOTE'||t==='PRE'||t==='LI'||t==='TR'||/^H[1-6]$/.test(t)) s+='\n';
      else if(t==='TD'||t==='TH') s+='\t';
    });
    return s;
  };
  const listText = (listEl, depth)=>{
    const lines=[]; const pad='  '.repeat(depth);
    listEl.childNodes.forEach(li=>{
      if(li.nodeType!==1 || li.tagName!=='LI') return;
      let own=''; const nested=[];
      li.childNodes.forEach(c=>{
        if(c.nodeType===1 && (c.tagName==='UL'||c.tagName==='OL')){ nested.push(c); return; }
        if(c.nodeType===3){ own+=c.nodeValue; return; }
        if(c.nodeType===1){ own += c.tagName==='BR' ? '\n' : inlineText(c); }
      });
      own=clean(own);
      if(own) lines.push(own.split('\n').map(l=>pad+l).join('\n'));
      nested.forEach(nl=>{ const sub=listText(nl, depth+1); if(sub) lines.push(sub); });
    });
    return lines.join('\n');
  };
  const tableText = (tableEl)=>{
    const trs=[];
    (function findRows(n){ n.childNodes.forEach(c=>{ if(c.nodeType!==1) return; if(c.tagName==='TR') trs.push(c); else findRows(c); }); })(tableEl);
    return trs.map(tr=>{
      const cells=[];
      tr.childNodes.forEach(td=>{ if(td.nodeType===1 && (td.tagName==='TD'||td.tagName==='TH')) cells.push(clean(inlineText(td)).replace(/[\n\t]+/g,' ')); });
      return cells.join('\t');
    }).join('\n');
  };
  const walk = (node)=>{
    node.childNodes.forEach(ch=>{
      if(ch.nodeType===3){ const t=ch.nodeValue.trim(); if(t) out.push(t); return; }
      if(ch.nodeType!==1) return;
      const tag=ch.tagName;
      if(tag==='UL'||tag==='OL'){ const t=listText(ch,0); if(t) out.push(t); }
      else if(tag==='TABLE'){ const t=tableText(ch); if(t) out.push(t); }
      else if(tag==='PRE'){ const t=ch.textContent.replace(/\s+$/,''); if(t) out.push(t); }
      else if(tag==='P'||tag==='BLOCKQUOTE'||/^H[1-6]$/.test(tag)){ const t=clean(inlineText(ch)); if(t) out.push(t); }
      else if(tag==='DIV'||tag==='SECTION'||tag==='ARTICLE'||tag==='MAIN'||tag==='HEADER'||tag==='FOOTER'||tag==='NAV'||tag==='ASIDE'){ walk(ch); }
      else { const t=clean(inlineText(ch)); if(t) out.push(t); }
    });
  };
  walk(doc.body);
  return out.join('\n\n');
}

/* ============ REFLOW DE PDF ============ Reconstroi texto legivel a partir dos itens
   posicionados do pdf.js. Ganhos sobre o reflow linear antigo (assumia 1 coluna e mantinha
   todo cabecalho/rodape, o que virava salada em paper de 2 colunas e jurisprudencia suja):
   (1) COLUNAS por LINHA: detecta a(s) calha(s) vertical(is) e, por linha (row), decide se ela
       e full-width (cruza a calha: titulo/cabecalho/rodape) ou colunar (divide na calha). Le
       coluna a coluna, esvaziando os buffers em cada linha full-width. Row-based e nao
       item-based de proposito: um cabecalho com itens por-palavra nao 'bloqueia' a calha
       item-a-item e racharia entre colunas.
   (2) REMOVE cabecalho/rodape/numero de pagina que se repetem (forma normalizada) na 1a ou
       ultima linha de >=60% das paginas.
   (3) DEHIFENIZACAO conservadora (minuscula = quebra de palavra, une sem hifen; senao mantem)
       + juncao de paragrafo na virada de pagina.
   A deteccao de calha ignora as faixas de margem (8% topo/rodape) pra numero de pagina
   centralizado nao preencher a calha. Coluna unica cai no mesmo resultado de antes (sem
   regressao). Geometria (colunas / ordem de leitura) validada em casos sinteticos de 1/2/3 colunas. */
function _reflowMergedGaps(intervals){          // [[lo,hi]] -> [[gLo,gHi,width]] entre intervalos mesclados
  if(!intervals.length) return [];
  const iv = intervals.slice().sort((a,b)=>a[0]-b[0]);
  const gaps = []; let hi = iv[0][1];
  for(let i=1;i<iv.length;i++){
    if(iv[i][0] > hi){ gaps.push([hi, iv[i][0], iv[i][0]-hi]); hi = iv[i][1]; }
    else if(iv[i][1] > hi) hi = iv[i][1];
  }
  return gaps;
}
function _reflowMedCharW(items){                 // largura mediana de caractere (pra dimensionar a calha)
  const ws = items.filter(it=>it.str).map(it=> it.w/it.str.length).sort((a,b)=>a-b);
  return ws.length ? ws[ws.length>>1] : 6;
}
function _reflowColumnGutters(items){            // -> [x,...] midpoints das calhas verticais; [] = coluna unica
  if(items.length < 8) return [];
  let ylo=Infinity, yhi=-Infinity;
  for(const it of items){ if(it.y<ylo) ylo=it.y; if(it.y+it.h>yhi) yhi=it.y+it.h; }
  const band=(yhi-ylo)*0.08;                      // ignora margens topo/rodape (num de pagina / cabecalho)
  let core = items.filter(it=> it.y>=ylo+band && it.y+it.h<=yhi-band);
  if(core.length < 8) core = items;
  let minx=Infinity, maxx=-Infinity;
  for(const it of core){ if(it.x<minx) minx=it.x; if(it.x+it.w>maxx) maxx=it.x+it.w; }
  const W=maxx-minx, cw=_reflowMedCharW(core), out=[];
  for(const g of _reflowMergedGaps(core.map(it=>[it.x, it.x+it.w]))){
    const wd=g[2];
    if(wd >= Math.max(cw*2.5, 12) && wd >= W*0.03){
      const mid=(g[0]+g[1])/2;
      let l=0; for(const it of core) if(it.x+it.w/2 < mid) l++;
      if(Math.min(l, core.length-l) >= Math.max(3, 0.15*core.length)) out.push(mid);  // os dois lados com massa real
    }
  }
  return out.sort((a,b)=>a-b);
}
function _reflowColOf(x, bounds){ let i=0; while(i<bounds.length && x >= bounds[i]) i++; return i; }
function _reflowRowFullWidth(row, bounds){       // linha atravessa alguma calha => full-width (cabecalho/titulo/rodape)
  for(const it of row) for(const b of bounds) if(it.x < b && b < it.x+it.w) return true;
  return false;
}
function _reflowGroupRows(items, avgH){          // agrupa itens em linhas por Y (topo -> baixo)
  const s = items.slice().sort((a,b)=> b.y-a.y || a.x-b.x);
  const rows=[]; let cur=[s[0]];
  for(let i=1;i<s.length;i++){ if(Math.abs(s[i].y-cur[0].y) < avgH*0.4) cur.push(s[i]); else { rows.push(cur); cur=[s[i]]; } }
  rows.push(cur);
  return rows;
}
function _reflowJoinHyphen(prev, next){          // une duas linhas tratando hifenizacao de fim de linha
  if(prev.endsWith('-') && prev.length>=2 && /\p{L}/u.test(prev.slice(-2,-1)))
    return (/\p{Ll}/u.test(next[0]||'')) ? prev.slice(0,-1)+next : prev+next;  // minuscula = quebra de palavra; senao mantem hifen (composto)
  return prev + ' ' + next;
}
function _reflowBlockToParas(items){             // bloco de coluna unica -> paragrafos (linhas por Y, uniao por gap)
  if(!items.length) return [];
  const avgH = items.reduce((s,it)=>s+it.h,0)/items.length, sp = avgH*0.25;
  const rows = _reflowGroupRows(items, avgH);
  rows.forEach(r=> r.sort((a,b)=>a.x-b.x));
  const lineText = (line)=>{ let t=line[0].str; for(let i=1;i<line.length;i++){ const gap=line[i].x-(line[i-1].x+line[i-1].w); if(gap>sp && !t.endsWith(' ') && !line[i].str.startsWith(' ')) t+=' '; t+=line[i].str; } return t.trim(); };
  // deteccao de paragrafo INDEPENDENTE DA ALTURA do item. O antigo gapY>localH*1.6 dependia da
  // altura do glifo, que o pdf.js reporta menor que a entrelinha -> em PDF de entrelinha generosa
  // (JSTOR etc.) TODA linha virava um paragrafo (leitor com espacamento duplo). Agora quebra se:
  //  (a) o gap vertical e bem maior que a MEDIANA dos gaps do bloco (espaco extra); OU
  //  (b) a linha e uma PRIMEIRA-LINHA-INDENTADA (recuo vs a margem modal do bloco, com a linha
  //      anterior NA margem - gating que evita rachar um bloco de citacao uniformemente recuado).
  // Quase todo corpo academico separa paragrafo por recuo de 1a linha, sem gap extra.
  const gaps=[]; for(let k=1;k<rows.length;k++){ const g=rows[k-1][0].y-rows[k][0].y; if(g>0) gaps.push(g); }
  const medGap = gaps.length ? gaps.slice().sort((a,b)=>a-b)[gaps.length>>1] : avgH*1.4;
  const lefts = rows.map(r=> Math.round(Math.min(...r.map(it=>it.x))));
  let leftMode=lefts[0]; { const m=new Map(); let bc=0; for(const x of lefts){ const c=(m.get(x)||0)+1; m.set(x,c); if(c>bc){ bc=c; leftMode=x; } } }
  const charW=_reflowMedCharW(items), maxRight=Math.max(...rows.map(r=>Math.max(...r.map(it=>it.x+it.w))));
  const indentTh=Math.max(charW*1.3,(maxRight-leftMode)*0.012);
  const paras=[]; let para=lineText(rows[0]);
  for(let k=1;k<rows.length;k++){
    const gapY=rows[k-1][0].y-rows[k][0].y, t=lineText(rows[k]);
    const gapBrk=gapY>medGap*1.35, indentBrk=(lefts[k]>leftMode+indentTh)&&(lefts[k-1]<=leftMode+indentTh);
    if(gapBrk||indentBrk){ paras.push(para.trim()); para=t; }
    else para = _reflowJoinHyphen(para, t);
  }
  paras.push(para.trim());
  return paras.filter(p=>p);
}
function _reflowDedup(items){                     // remove OVER-PRINT (pagina desenhada 2x: falso-negrito ou
  // camada de texto dupla) que faz o pdf.js emitir cada glifo 2x na MESMA posicao -> "factfact" (o
  // fitz/MuPDF colapsa isso sozinho, o pdf.js nao). Descarta item cujo (texto + posicao arredondada) ja
  // apareceu; repeticao legitima (palavra igual em posicao DIFERENTE) tem chave diferente e e preservada.
  const seen=new Set(), out=[];
  for(const it of items){ const k=Math.round(it.x)+'|'+Math.round(it.y)+'|'+it.str; if(seen.has(k)) continue; seen.add(k); out.push(it); }
  return out;
}
function _reflowPageParas(items){                // itens de UMA pagina -> paragrafos em ordem de leitura
  const its = _reflowDedup(items.filter(it=> 'str' in it && it.str.trim().length>0));
  if(!its.length) return [];
  const avgH = its.reduce((s,it)=>s+it.h,0)/its.length;
  const bounds = _reflowColumnGutters(its);
  // 0 calhas = coluna unica; >2 calhas (4+ colunas) e provavelmente tabela/deteccao espuria ->
  // le em ordem de linha (menos pior pra tabela) em vez de coluna a coluna.
  if(!bounds.length || bounds.length > 2) return _reflowBlockToParas(its);
  const rows = _reflowGroupRows(its, avgH);       // topo -> baixo
  const cols = Array.from({length: bounds.length+1}, ()=>[]);
  const segments=[];
  const flush = ()=>{ for(const c of cols){ if(c.length){ segments.push(c.slice()); c.length=0; } } };
  for(const row of rows){
    if(_reflowRowFullWidth(row, bounds)){ flush(); segments.push(row); }   // linha full-width esvazia as colunas antes
    else for(const it of row) cols[_reflowColOf(it.x+it.w/2, bounds)].push(it);
  }
  flush();
  const out=[];
  for(const seg of segments) for(const p of _reflowBlockToParas(seg)) out.push(p);
  return out;
}
function _reflowNormRun(s){ return s.toLowerCase().replace(/\d+/g,'#').replace(/\s+/g,' ').trim(); }
function reflowPdfPages(pages){                  // pages: [{items:[{str,x,y,w,h}]}] -> {content, removedRunning}
  const perPage = pages.map(pg=> _reflowPageParas(pg.items||[]));
  const n = perPage.length, topC=new Map(), botC=new Map();
  for(const paras of perPage){ if(!paras.length) continue;
    const a=_reflowNormRun(paras[0]); topC.set(a,(topC.get(a)||0)+1);
    const b=_reflowNormRun(paras[paras.length-1]); botC.set(b,(botC.get(b)||0)+1);
  }
  const thr = Math.max(3, Math.round(0.6*n)), killTop=new Set(), killBot=new Set();
  for(const [k,c] of topC) if(c>=thr && k.length<=80) killTop.add(k);
  for(const [k,c] of botC) if(c>=thr && k.length<=80) killBot.add(k);
  let removed=0;
  const cleaned = perPage.map(paras=>{
    let p=paras;
    if(p.length && killTop.has(_reflowNormRun(p[0]))){ p=p.slice(1); removed++; }
    if(p.length && killBot.has(_reflowNormRun(p[p.length-1]))){ p=p.slice(0,-1); removed++; }
    return p;
  });
  const flat=[];                                  // junta paginas: continuacao (sem pontuacao final / hifen) une na virada
  for(const paras of cleaned) for(let i=0;i<paras.length;i++){
    const cur=paras[i];
    if(i===0 && flat.length){
      const prev=flat[flat.length-1];
      if(prev.endsWith('-') && /\p{L}/u.test(prev.slice(-2,-1))){ flat[flat.length-1]=_reflowJoinHyphen(prev,cur); continue; }
      if(!/[.!?:;"')\]]$/.test(prev) && /\p{Ll}/u.test(cur[0]||'')){ flat[flat.length-1]=prev+' '+cur; continue; }
    }
    flat.push(cur);
  }
  return { content: flat.join('\n\n'), removedRunning: removed };
}

async function extractText(file){
  const n = (file.name||'').toLowerCase();
  if(n.endsWith('.txt')||n.endsWith('.md')||n.endsWith('.markdown')|| (file.type||'').startsWith('text/'))
    return stripLeadingBom(await file.text());
  if(n.endsWith('.docx')){
    const ab = await file.arrayBuffer();
    // convertToHtml (nao extractRawText) preserva titulos/listas/tabelas/quebras; docxHtmlToText
    // reconstitui um texto puro bem espacado, sem marcadores injetados (offsets limpos).
    const r = await (await getMammoth()).convertToHtml({ arrayBuffer: ab });
    return stripLeadingBom(docxHtmlToText((r && r.value) || ''));
  }
  if(n.endsWith('.pdf')){
    const ab = await file.arrayBuffer();
    const pdfjsLib = await getPdfjs();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    const pages = [];
    for(let p=1;p<=pdf.numPages;p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent({ includeMarkedContent: false });
      pages.push({ items: tc.items.filter(it => 'str' in it && it.str.trim().length > 0).map(it => ({
        str: it.str, x: it.transform[4], y: it.transform[5], w: it.width, h: Math.abs(it.height) || 10,
      })) });
    }
    return reflowPdfPages(pages).content;
  }
  return await file.text();
}

/* ============ RUNS (segmentacao do texto para os grifos) ============
   Varredura ordenada (sweep) em vez de codings.filter() por run — o filter era
   O(runs × codings) e travava o leitor em documento denso (milhares de codings ≈
   milhoes de comparacoes A CADA render). Como todo limite de span vira ponto de
   corte, a "janela ativa" num segmento e exatamente o conjunto de codings que
   cobre o segmento inteiro — semantica identica a do filter antigo. A ordem
   original do array e preservada por indice (o leitor usa o ULTIMO da lista como
   tint de desempate em sobreposicao). */

/* ===== Reancoragem de offsets ao EDITAR o texto de um documento =====
   As codificacoes sao offsets (span_start/span_end, UTF-16) no content; editar o content
   desloca esses offsets. remapSpans reancora cada coding comparando texto velho x novo por
   PREFIXO+SUFIXO comuns (edicao localizada): o que esta ANTES do ponto editado fica, o que esta
   DEPOIS desloca pelo delta; grifo que cai DENTRO do trecho editado e clampeado nas bordas (start
   pro inicio da regiao, end pro fim - nunca invertido) e contado em 'affected' pra a UI avisar.
   Varias edicoes num unico save viram UMA regiao grande (1o ao ultimo ponto mudado): conservador
   (avisa mais), nunca reancora errado em silencio - critico num app de pesquisa. */
function diffPrefixSuffix(oldC, newC){
  const oL=oldC.length, nL=newC.length, m=Math.min(oL,nL);
  let p=0; while(p<m && oldC.charCodeAt(p)===newC.charCodeAt(p)) p++;
  let s=0; while(s<m-p && oldC.charCodeAt(oL-1-s)===newC.charCodeAt(nL-1-s)) s++;
  return { p, oldEnd:oL-s, newEnd:nL-s, delta:nL-oL };
}
function remapSpans(oldC, newC, codings){       // -> { updates:[{id,span_start,span_end,quote}], affected }
  const d = diffPrefixSuffix(oldC, newC);
  const mapStart = o => o>=d.oldEnd ? o+d.delta : Math.min(o, d.p);        // gravidade a direita: nao engole texto inserido no inicio
  const mapEnd   = o => o<=d.p ? o : (o>=d.oldEnd ? o+d.delta : d.newEnd); // gravidade a esquerda: nao engole no fim
  const updates=[]; let affected=0;
  for(const c of codings){
    if(!(c.span_start>=0 && c.span_end>c.span_start)) continue;
    if(c.span_start < d.oldEnd && c.span_end > d.p) affected++;   // o grifo toca o trecho editado
    let ns=mapStart(c.span_start), ne=mapEnd(c.span_end); if(ne<ns) ne=ns;
    const nq = newC.slice(ns, ne);
    if(ns!==c.span_start || ne!==c.span_end || nq!==c.quote) updates.push({ id:c.id, span_start:ns, span_end:ne, quote:nq });
  }
  return { updates, affected };
}

function buildRuns(text, codings, extraPoints){
  const b = new Set([0, text.length]);
  const valid = [];
  codings.forEach((c,i)=>{ if(c.span_start>=0 && c.span_end>c.span_start){ b.add(c.span_start); b.add(c.span_end); valid.push([i,c]); } });
  (extraPoints||[]).forEach(p=>{ if(p>=0 && p<=text.length) b.add(p); });
  const pts = [...b].filter(p=>p>=0&&p<=text.length).sort((x,y)=>x-y);
  const starts = valid.slice().sort((x,y)=>x[1].span_start-y[1].span_start);
  const ends   = valid.slice().sort((x,y)=>x[1].span_end-y[1].span_end);
  const active = new Map(); // indice original -> coding (entra no span_start, sai no span_end)
  let si=0, ei=0;
  const runs=[];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], z=pts[i+1]; if(z<=a) continue;
    while(si<starts.length && starts[si][1].span_start<=a){ active.set(starts[si][0], starts[si][1]); si++; }
    while(ei<ends.length && ends[ei][1].span_end<=a){ active.delete(ends[ei][0]); ei++; }
    const cods = active.size ? [...active.entries()].sort((x,y)=>x[0]-y[0]).map(e=>e[1]) : [];
    runs.push({ start:a, end:z, text:text.slice(a,z), codings:cods });
  }
  return runs;
}

/* mascara trechos marcados como censura (code.is_redaction) antes de mandar pra IA — so
   considera o codigo da PROPRIA linha de coding, nao verifica sobreposicao com OUTROS codigos
   no mesmo span (ex.: um trecho com "Tema X" que por acaso contem um nome ja censurado por
   outro codigo continuaria aparecendo intacto aqui). Cobertura parcial, de proposito por ora —
   ver CLAUDE.md ("Censura — proximos passos") pra fechar essa lacuna e estender pra exports. */
function maskRedactedContent(content, codings, maskedCodeIds){
  if(!maskedCodeIds || !maskedCodeIds.size) return content;
  const ranges = (codings||[])
    .filter(c=>maskedCodeIds.has(c.code_id) && c.span_start>=0 && c.span_end>c.span_start)
    .map(c=>[c.span_start, c.span_end]).sort((a,b)=>a[0]-b[0]);
  if(!ranges.length) return content;
  const merged=[]; for(const r of ranges){ const last=merged[merged.length-1]; if(last && r[0]<=last[1]) last[1]=Math.max(last[1],r[1]); else merged.push([...r]); }
  let out='', pos=0;
  for(const [s,e] of merged){ out += content.slice(pos,s) + '[trecho censurado]'; pos = e; }
  return out + content.slice(pos);
}

function hslToHex(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  const toHex=v=>Math.round(v*255).toString(16).padStart(2,'0');
  return '#'+toHex(f(0))+toHex(f(8))+toHex(f(4));
}
function xmlEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripGuid(g){ return String(g||'').replace(/[{}]/g,'').trim(); }

/* REFI-QDA conta posicoes de trecho em CARACTERES (code points); o app indexa strings em
   UTF-16 (semantica de String do JS, span_start/span_end). Os dois so divergem quando ha
   caractere FORA do BMP (emoji, alguns CJK estendidos): 1 code point = 2 unidades UTF-16
   (surrogate pair). QualCoder (Python) lê code points — sem converter, no .qdpx todo trecho
   APOS um char astral sai deslocado e o highlight ancora no texto errado (interop quebrada,
   confirmado pelo harness de round-trip). Convertendo nos dois sentidos, o offset gravado no
   .qdpx fica em code points (o que o ecossistema REFI-QDA espera) e o app continua correto ao
   reimportar. No-op em texto sem char astral (a esmagadora maioria), entao nao muda nada nos
   projetos comuns. Ver scripts/roundtrip/. */
function u16ToCp(str, u16){ return [...str.slice(0, u16)].length; }   // offset UTF-16 -> indice de code point
function cpToU16(str, cp){ let u=0,n=0; for(const ch of str){ if(n>=cp) break; u+=ch.length; n++; } return u; } // code point -> offset UTF-16

/* Um BOM (U+FEFF) no inicio do texto e marcador de codificacao, NAO conteudo. Mantê-lo
   desloca todos os offsets de trecho em 1 e quebra a interoperabilidade: o QualCoder (e o
   leitor padrao, via utf-8-sig) descarta o BOM antes de contar posicoes, entao um .qdpx
   importado dele traz os offsets SEM o BOM, mas o .txt COM o BOM. Removemos o BOM inicial na
   ingestao (arquivo de texto, import QDPX) pra o conteudo guardado nunca conta-lo. Ver
   scripts/roundtrip/ (round-trip real com o QualCoder). */
function stripLeadingBom(s){ return (s && s.charCodeAt(0) === 0xFEFF) ? s.slice(1) : s; }

/* markdown bem leve, so pra exibir as respostas da IA (que vem em markdown)
   sem precisar carregar uma lib: negrito/italico e quebras de linha. */
/* markdown leve pra exibir respostas da IA. Antes so tratava negrito/italico/quebra
   e os modelos vinham devolvendo cabecalhos "###", listas "- "/"1." e codigo `x`
   que apareciam CRUS na tela (reclamacao real). Agora processa tambem esses blocos,
   linha a linha, mantendo o inline. Saida embrulhada em .md (estilos no <style>). */
function mdLite(text){
  const inline = s => s
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/(?<!\*)\*(?!\*)(.+?)\*(?!\*)/g, '<i>$1</i>')
    .replace(/`([^`]+?)`/g, '<code>$1</code>');
  const lines = xmlEsc(text==null ? '' : String(text)).split('\n');
  const out = [];
  let list = null; // 'ul' | 'ol' aberta no momento
  let table = null; // buffer de linhas |...| enquanto uma tabela markdown esta aberta
  const closeList = () => { if(list){ out.push('</'+list+'>'); list=null; } };
  // tabela markdown: linhas |a|b| com uma 2a linha separadora |---|---|. Sem isso, os modelos
  // (a Anthropic em especial) devolviam a tabela em pipes crus. Se nao houver separadora valida,
  // as linhas em buffer voltam como divs simples (nao era tabela de verdade).
  const cells = row => row.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
  const isSep = row => { const r = row.trim().replace(/^\||\|$/g,''); return /-/.test(r) && /^[\s:|-]+$/.test(r); };
  const flushTable = () => {
    if(!table) return; const rows = table; table = null;
    if(rows.length>=2 && isSep(rows[1])){
      let h = '<table class="md-table"><thead><tr>'+cells(rows[0]).map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>';
      for(const r of rows.slice(2)) h += '<tr>'+cells(r).map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>';
      out.push(h+'</tbody></table>');
    } else { for(const r of rows) out.push('<p>'+inline(r)+'</p>'); }
  };
  let para = null; // linhas de texto consecutivas viram UM paragrafo (espacamento pelo CSS, sem <br> por linha em branco)
  const flushPara = () => { if(para){ out.push('<p>'+para.map(inline).join('<br>')+'</p>'); para=null; } };
  for(const line of lines){
    let m;
    if(/^\s*\|.*\|\s*$/.test(line)){                          // linha de tabela |a|b|
      flushPara(); closeList();
      (table || (table = [])).push(line);
      continue;
    }
    flushTable();                                            // qualquer outra linha fecha a tabela
    if(m = line.match(/^\s*(#{1,6})\s+(.*\S)\s*$/)){          // cabecalho ###
      flushPara(); closeList();
      out.push('<div class="md-h md-h'+Math.min(4,m[1].length)+'">'+inline(m[2])+'</div>');
    } else if(/^\s*([-*_])\1\1+\s*$/.test(line)){             // regua --- *** ___
      flushPara(); closeList();
      out.push('<hr>');
    } else if(m = line.match(/^\s*[-*+]\s+(.*)$/)){           // item de lista "- "
      flushPara(); if(list!=='ul'){ closeList(); out.push('<ul>'); list='ul'; }
      out.push('<li>'+inline(m[1])+'</li>');
    } else if(m = line.match(/^\s*\d+[.)]\s+(.*)$/)){         // item numerado "1. "
      flushPara(); if(list!=='ol'){ closeList(); out.push('<ol>'); list='ol'; }
      out.push('<li>'+inline(m[1])+'</li>');
    } else if(line.trim()===''){                             // linha em branco: fecha o paragrafo (sem <br>)
      flushPara(); closeList();
    } else {                                                 // texto: acumula no paragrafo corrente
      closeList();
      (para || (para = [])).push(line);
    }
  }
  flushPara(); closeList(); flushTable();
  return '<div class="md">'+out.join('')+'</div>';
}

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));

// igualdade de conteúdo entre duas listas vindas do store — usada pra NÃO trocar a referência

/* traduz os erros técnicos mais frequentes (em inglês, vindos do Supabase/rede/navegador)
   pra uma mensagem acionável em português. Devolve null quando não reconhece — o chamador
   mostra o texto original. O banner principal do App mostra a tradução + o cru em .meta. */
function humanizeError(raw){
  const t = String(raw==null?'':raw).toLowerCase();
  if(t.includes('invalid login credentials')) return 'E-mail ou senha incorretos.';
  if(t.includes('email not confirmed')) return 'E-mail ainda não confirmado — verifique sua caixa de entrada (e o spam).';
  if(t.includes('already registered') || t.includes('already been registered')) return 'Este e-mail já tem cadastro — use "Entrar".';
  if(t.includes('failed to fetch') || t.includes('networkerror') || t.includes('load failed') || t.includes('fetch failed')) return 'Falha de conexão — verifique sua internet e tente de novo (a alteração NÃO foi salva).';
  if(t.includes('row-level security')) return 'Sem permissão para esta operação neste projeto (regra de acesso do servidor).';
  if(t.includes('exceeded the quota') || t.includes('quotaexceeded')) return 'Espaço de armazenamento do navegador esgotado — baixe um .qualilab do projeto antes de continuar.';
  if(t.includes('jwt expired') || t.includes('token is expired') || t.includes('invalid claim')) return 'Sessão expirada — entre novamente.';
  return null;
}

function csvEscape(s){ s = s==null ? "" : String(s); return /[",\n\r]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function toCSV(rows){ return rows.map(r=>r.map(csvEscape).join(",")).join("\r\n"); }
function codePathFor(codes,id){ const by={}; codes.forEach(c=>by[c.id]=c); const o=[]; let c=by[id],g=0; while(c&&g++<12){o.unshift(c.name);c=c.parent_id?by[c.parent_id]:null;} return o; }
function download(name,text,mime){ const b=new Blob([text],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }

/* ============ QDPX (REFI-QDA Project Exchange) ============
   Compatível com ATLAS.ti, MAXQDA, NVivo, Quirkos, Taguette.
   Mapeamento: documento -> TextSource; categoria do documento -> Variable + Case;
   codigo -> Code (hierarquico); trecho codificado -> PlainTextSelection + Coding. */
function buildCodeXml(code, byParent){
  const kids = byParent[code.id] || [];
  const H = (code.hue_deg!=null) ? ((code.hue_deg%360)+360)%360 : HUES[((code.hue%HUES.length)+HUES.length)%HUES.length];
  const S = (code.hue_deg===-1||code.hue_deg===-2) ? 0 : (code.sat!=null ? Math.max(0,Math.min(100,code.sat)) : 58);
  const hex = hslToHex(H, S, Math.min(70,32+code.depth*13));
  return `<Code guid="${stripGuid(code.id)}" name="${xmlEsc(code.name)}" isCodable="true" color="${hex}">`
    + kids.map(k=>buildCodeXml(k, byParent)).join('')
    + `</Code>`;
}

/* exporta so o livro de codigos (sem documentos/codificacoes — .qdc nao tem isso),
   reusando o mesmo <Code> recursivo do QDPX. Util pra compartilhar/padronizar o esquema
   de codigos com outra ferramenta REFI-QDA sem expor os dados do projeto. */
function exportQDC(codes, project){
  const byParent = {};
  codes.forEach(c=>{ const p=c.parent_id||'__root__'; (byParent[p]=byParent[p]||[]).push(c); });
  const topCodes = byParent['__root__']||[];
  const codesXml = topCodes.map(c=>buildCodeXml(c, byParent)).join('');
  const qdc = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n`
    + `<CodeBook xmlns="urn:QDA-XML:codebook:1.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" `
    + `xsi:schemaLocation="urn:QDA-XML:codebook:1.0 http://schema.qdasoftware.org/versions/Codebook/v1.0/Codebook.xsd" `
    + `origin="QualiLab" name="${xmlEsc(project?.name||'Projeto QualiLab')}">`
    + `<Codes>${codesXml}</Codes>`
    + `</CodeBook>`;
  download((project?.name||'codebook').replace(/[^\w\-]+/g,'_')+'.qdc', qdc, 'application/xml');
}

/* ============ Web Annotation (W3C) + Leitor de Transparência ============
   Liga o QualiLab ao ecossistema de transparência qualitativa (DA-RT / QDR / ATI).
   O padrão de fato sob o ATI do QDR, hypothes.is, Anno-REP e Dataverse é o W3C Web
   Annotation Data Model (JSON-LD). Miramos NELE — interoperável sem casar com nenhum
   fornecedor. Cada trecho codificado vira uma Annotation: target com TextQuoteSelector
   (exact/prefix/suffix) + TextPositionSelector (start/end); o código vira um body de
   "tagging" e o memo do código, quando existe, um body de "commenting" (a "nota
   analítica" do ATI). Memos de documento/projeto entram como metadados da coleção.
   Para qual camada usar: prefere o gabarito (final); se não houver, as individuais
   (mesma regra do QDPX). Ver CLAUDE.md. */
function pickTransparencyLayer(allC){
  const finalC = allC.filter(c=>c.layer==='final');
  return finalC.length ? finalC : allC.filter(c=>(c.layer||'individual')!=='final');
}
function indexMemos(memos){
  const codeMemo={}, docMemo={}, codingMemo={}; let projectMemo='';
  (memos||[]).forEach(m=>{ if(!m.content||!String(m.content).trim()) return;
    if(m.scope==='code') codeMemo[m.target_id]=m.content;
    else if(m.scope==='document') docMemo[m.target_id]=m.content;
    else if(m.scope==='coding') codingMemo[m.target_id]=m.content;
    else if(m.scope==='project') projectMemo=m.content; });
  return { codeMemo, docMemo, codingMemo, projectMemo };
}
/* CENSURA nos exports de transparência: por padrão NADA marcado com código is_redaction pode
   vazar num apêndice público. Como esses exports são artefatos para terceiros, mascaramos sempre
   (sem o toggle por-código que o Relatório tem). Duas frentes: (1) excluir as próprias codings
   de censura das anotações/legenda; (2) substituir por "[trecho censurado]" qualquer pedaço de
   texto (do documento OU do excerto de outra coding) que caia sobre uma faixa censurada.
   maskRedactedContent muda o tamanho do texto (desalinha offsets), então aqui trabalhamos por
   faixa/posição: redactionRanges (faixas mescladas, de TODAS as camadas — nunca vaza) + maskSlice
   (recorta [start,end) trocando só a sobreposição). */
function redactionRanges(allC, redactionCodeIds, docId){
  const r = allC.filter(c=>c.document_id===docId && redactionCodeIds.has(c.code_id) && c.span_start>=0 && c.span_end>c.span_start)
    .map(c=>[c.span_start,c.span_end]).sort((a,b)=>a[0]-b[0]);
  const m=[]; for(const x of r){ const last=m[m.length-1]; if(last && x[0]<=last[1]) last[1]=Math.max(last[1],x[1]); else m.push([...x]); }
  return m;
}
function maskSlice(content, start, end, ranges){
  if(!ranges || !ranges.length) return content.slice(start,end);
  let out='', pos=start;
  for(const [s,e] of ranges){ if(e<=start||s>=end) continue; const a=Math.max(s,start), b=Math.min(e,end);
    if(a>pos) out+=content.slice(pos,a); out+='[trecho censurado]'; pos=Math.max(pos,b); }
  if(pos<end) out+=content.slice(pos,end);
  return out;
}
/* mascara PARCIAL de uma citacao trabalhando sobre o PROPRIO quote (sem precisar do conteudo do
   documento): troca por "[censurado]" so as porcoes do quote cobertas por codings de censura
   (code_id em maskedIds) que sobrepoem o span; se o proprio code_id estiver em maskedIds, a
   citacao inteira e sensivel -> "[trecho censurado]". codingsInDoc = todos os codings do mesmo
   documento (qualquer camada — conservador). Usado por IACodificarPanel, IAAnalisarPanel e
   ReportView, pra censura nunca vazar via quote de codigo analitico que cobre o mesmo trecho. */
function maskQuoteSpans(coding, codingsInDoc, maskedIds){
  let q = coding.quote || '';
  if(!maskedIds || !maskedIds.size) return q;
  if(maskedIds.has(coding.code_id)) return '[trecho censurado]';
  const base = coding.span_start;
  const ov = (bS,bE)=> bS>=0 && bE>bS && coding.span_start>=0 && coding.span_end>coding.span_start && coding.span_start<bE && bS<coding.span_end;
  const ranges = (codingsInDoc||[])
    .filter(o=> o.id!==coding.id && maskedIds.has(o.code_id) && ov(o.span_start,o.span_end))
    .map(o=>[Math.max(o.span_start,coding.span_start)-base, Math.min(o.span_end,coding.span_end)-base])
    .sort((a,b)=>a[0]-b[0]);
  if(!ranges.length) return q;
  const merged=[]; for(const r of ranges){ const l=merged[merged.length-1]; if(l && r[0]<=l[1]) l[1]=Math.max(l[1],r[1]); else merged.push(r.slice()); }
  for(let i=merged.length-1;i>=0;i--) q = q.slice(0,merged[i][0]) + '[censurado]' + q.slice(merged[i][1]);
  return q;
}
function buildWebAnnotations(docs, codes, allC, memos, project, anonymize){
  const docById={}; docs.forEach(d=>docById[d.id]=d);
  const { codeMemo, docMemo, codingMemo, projectMemo } = indexMemos(memos);
  const redactionCodeIds = new Set(codes.filter(c=>c.is_redaction).map(c=>c.id));
  const rangesByDoc = {}; docs.forEach(d=>rangesByDoc[d.id]=redactionRanges(allC, redactionCodeIds, d.id));
  const CTX = 32; // caracteres de contexto (prefix/suffix) p/ reancoragem robusta
  const useC = pickTransparencyLayer(allC)
    .filter(c=>c.span_start>=0 && c.span_end>c.span_start && !redactionCodeIds.has(c.code_id));
  const items = useC.map(c=>{
    const content = docById[c.document_id]?.content || '';
    const ranges = rangesByDoc[c.document_id] || [];
    const path = codePathFor(codes, c.code_id);
    // nota analítica: a do TRECHO (coding) tem prioridade; cai pra do código se não houver
    const note = codingMemo[c.id] || codeMemo[c.code_id];
    const body = [{ type:'TextualBody', purpose:'tagging', value: path.join(' > ') }];
    if(note) body.push({ type:'TextualBody', purpose:'commenting', value: note });
    const ann = {
      id:'urn:uuid:'+(c.id||uid()), type:'Annotation',
      created: c.created_at || undefined,
      creator: (!anonymize && c.author_name) ? { type:'Person', name:c.author_name } : undefined,
      body,
      target:{
        source:'urn:qualilab:document:'+c.document_id,
        selector:[
          { type:'TextQuoteSelector', exact: maskSlice(content, c.span_start, c.span_end, ranges) || c.quote || '',
            prefix: maskSlice(content, Math.max(0,c.span_start-CTX), c.span_start, ranges),
            suffix: maskSlice(content, c.span_end, c.span_end+CTX, ranges) },
          { type:'TextPositionSelector', start:c.span_start, end:c.span_end }
        ]
      }
    };
    return ann;
  });
  // IRIs do Collection/Page: o modelo W3C exige id (IRI) em AnnotationCollection E em AnnotationPage,
  // e a Page exige partOf apontando pro Collection (+ startIndex, SHOULD). Como o export é um arquivo
  // local (sem URL canônica), cunhamos urn: estáveis a partir do project.id (mesma abordagem do urn:uuid
  // das próprias Annotations e do urn:qualilab:document: dos alvos).
  const collId = 'urn:qualilab:collection:'+(project?.id || 'local');
  const pageId = collId+'/page/1';
  const collection = {
    // array p/ definir o prefixo qualilab: (extensão não-normativa vira compact IRI válido em JSON-LD),
    // mantendo anno.jsonld como exige o modelo
    '@context':['http://www.w3.org/ns/anno.jsonld', { qualilab:'https://luizpf42.github.io/QualiLab/ns#' }],
    id: collId,
    type:'AnnotationCollection',
    label: project?.name || 'Projeto QualiLab',
    generator:{ type:'Software', name:'QualiLab', homepage:'https://luizpf42.github.io/QualiLab/' },
    total: items.length,
    // metadados não-normativos (extensão QualiLab): visão geral + fontes referenciadas
    'qualilab:overview': projectMemo || undefined,
    'qualilab:sources': docs.map(d=>({ id:'urn:qualilab:document:'+d.id, name:d.name, note: docMemo[d.id]||undefined })),
    first:{ id: pageId, type:'AnnotationPage', partOf: collId, startIndex: 0, items }
  };
  return collection;
}
function exportWebAnnotations(docs, codes, allC, memos, project, anonymize){
  download((project?.name||'projeto').replace(/[^\w\-]+/g,'_')+(anonymize?'_anon':'')+'_anotacoes.json',
    JSON.stringify(buildWebAnnotations(docs, codes, allC, memos, project, anonymize),null,2), 'application/ld+json');
}

/* Leitor de Transparência: página HTML auto-contida (sem rede, sem build) que mostra
   cada documento com os trechos grifados e, ao clicar, a "nota analítica" (memo do código),
   o excerto e a autoria — o equivalente ao overlay do ATI, mas hospedável por você (ex.:
   uma subpasta do GitHub Pages). Reaproveita buildRuns/codeColor; pré-renderiza os runs
   pra não precisar embarcar lógica do app. */
function buildTransparencyReaderHTML(docs, codes, allC, memos, project, anonymize){
  const codeById={}; codes.forEach(c=>codeById[c.id]=c);
  const colorOf = (id)=>{ const c=codeById[id]; return c ? codeColor(c.hue, c.depth, c.hue_deg, false, c.sat) : {tint:'#eee',solid:'#888'}; };
  const { codeMemo, docMemo, codingMemo, projectMemo } = indexMemos(memos);
  const redactionCodeIds = new Set(codes.filter(c=>c.is_redaction).map(c=>c.id));
  const useC = pickTransparencyLayer(allC).filter(c=>!redactionCodeIds.has(c.code_id));
  const anns = {}; // id -> detalhes p/ o painel
  const docsHtml = docs.map(d=>{
    const content = d.content || '';
    const ranges = redactionRanges(allC, redactionCodeIds, d.id);
    const overlapsRedaction = (s,e)=> ranges.some(([a,b])=>a<e && b>s);
    // inclui as codings de censura só pra cortar os runs nas bordas certas (não viram grifo)
    const redC = allC.filter(c=>c.document_id===d.id && redactionCodeIds.has(c.code_id) && c.span_start>=0 && c.span_end>c.span_start);
    const dc = useC.filter(c=>c.document_id===d.id && c.span_start>=0 && c.span_end>c.span_start).concat(redC);
    let body='', prevMasked=false;
    buildRuns(content, dc).forEach(r=>{
      if(overlapsRedaction(r.start, r.end)){ if(!prevMasked){ body += '<span class="redacted">[trecho censurado]</span>'; prevMasked=true; } return; }
      prevMasked=false;
      const vis = r.codings.filter(c=>!redactionCodeIds.has(c.code_id));
      const t = xmlEsc(r.text).replace(/\n/g,'<br>');
      if(!vis.length){ body += t; return; }
      const col = colorOf(vis[0].code_id);
      vis.forEach(c=>{ if(!anns[c.id]){ const p=codePathFor(codes,c.code_id);
        anns[c.id]={ code:p.join(' › '), color:colorOf(c.code_id).solid, author:anonymize?'':(c.author_name||''),
          note:codingMemo[c.id]||'' }; } });
      const bb = vis.length>1 ? `border-bottom:2px solid ${col.solid}` : '';
      body += `<span class="hl" data-ann="${vis.map(c=>c.id).join(' ')}" style="background:${col.tint};${bb}">${t}</span>`;
    });
    // documento colapsável (vem colapsado): o TÍTULO (summary) abre/fecha; o ● é o link pro
    // memo do documento (clicar nele não dispara o colapso — preventDefault no handler).
    const hasDocMemo = !!docMemo[d.id];
    const memoDot = hasDocMemo ? ` <span class="memo-dot linky" data-ann="doc:${xmlEsc(d.id)}" title="ver memo do documento">●</span>` : '';
    return `<details class="doc"><summary class="doc-title">${xmlEsc(d.name)}${memoDot}</summary><div class="reader">${body}</div></details>`;
  }).join('\n');
  // legenda em ÁRVORE (como a aba Esquema): mostra os códigos usados na sua HIERARQUIA,
  // incluindo os ancestrais mesmo não usados diretamente (pra a estrutura fazer sentido).
  // Swatch + nome + contagem agregada; código com memo vira "link" pro memo (abre no painel).
  const usedIds = new Set(useC.map(c=>c.code_id));
  const showIds = new Set(usedIds);
  usedIds.forEach(id=>{ let p=codeById[id]?.parent_id; while(p){ showIds.add(p); p=codeById[p]?.parent_id; } });
  const legAgg = {}; // contagem agregada (código + descendentes) no recorte da transparência
  useC.forEach(c=>{ let id=c.code_id; while(id){ legAgg[id]=(legAgg[id]||0)+1; id=codeById[id]?.parent_id; } });
  const byPos = (a,b)=> (a.position??0)-(b.position??0) || String(a.name).localeCompare(String(b.name));
  const legNode = (c)=>{ const col=codeColor(c.hue,c.depth,c.hue_deg,false,c.sat).solid; const hasMemo=!!codeMemo[c.id]; const n=legAgg[c.id]||0;
    const kids = codes.filter(k=>k.parent_id===c.id && showIds.has(k.id)).sort(byPos);
    const row = `<div class="legrow${hasMemo?' linky':''}"${hasMemo?` data-ann="code:${xmlEsc(c.id)}"`:''}>`
      + `<i style="background:${col}"></i><span class="nm">${xmlEsc(c.name)}${hasMemo?' <span class="memo-dot">●</span>':''}</span>`
      + (n?`<span class="ct">${n}</span>`:'') + `</div>`;
    return `<div class="legnode" data-name="${xmlEsc(String(c.name).toLowerCase())}">${row}`
      + (kids.length?`<div class="legkids">${kids.map(legNode).join('')}</div>`:'') + `</div>`; };
  const legTree = codes.filter(c=>!c.parent_id && showIds.has(c.id)).sort(byPos).map(legNode).join('');
  // muitos códigos (grounded theory) viram um paredão ilegível no topo: recolhe por padrão
  // acima do limite, com filtro + altura limitada. <details> nativo, sem JS pra abrir/fechar.
  const manyCodes = showIds.size > 12;
  const legend = usedIds.size ? `<details class="legend"${manyCodes?'':' open'}>`
    + `<summary>Legenda de códigos (${usedIds.size})</summary>`
    + (manyCodes ? `<input class="legfilter" type="text" placeholder="filtrar códigos…" oninput="filterLeg(this.value)">` : '')
    + `<div class="legtree${manyCodes?' capped':''}" id="legtree">${legTree}</div></details>` : '';
  // entradas de memo de documento/código no mesmo mapa do painel (chaves prefixadas, sem colidir com ids de coding)
  docs.forEach(d=>{ if(docMemo[d.id]) anns['doc:'+d.id]={ code:d.name, color:'#00427A', author:'', note:docMemo[d.id] }; });
  codes.filter(c=>showIds.has(c.id)).forEach(c=>{ if(codeMemo[c.id]) anns['code:'+c.id]={ code:codePathFor(codes,c.id).join(' › '), color:codeColor(c.hue,c.depth,c.hue_deg,false,c.sat).solid, author:'', note:codeMemo[c.id] }; });
  const overview = projectMemo ? `<div class="overview"><h3>Visão geral</h3><div>${xmlEsc(projectMemo).replace(/\n/g,'<br>')}</div></div>` : '';
  const docsCtrl = docs.length>1 ? `<div class="docctrl"><span>${docs.length} documentos</span><button onclick="allDocs(true)">expandir todos</button><button onclick="allDocs(false)">recolher todos</button></div>` : '';
  const dataJson = JSON.stringify(anns).replace(/</g,'\\u003c');
  const title = xmlEsc(project?.name || 'Projeto QualiLab');
  return `<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${title} — Apêndice de Transparência</title>
<style>

*{box-sizing:border-box}
body{margin:0;font-family:Georgia,'Newsreader',serif;color:var(--ink);background:#f6f8fb;line-height:1.6}

header h1{margin:0;font-size:20px}
header .sub{opacity:.85;font-size:13px;margin-top:4px}
.wrap{display:flex;gap:20px;max-width:1180px;margin:0 auto;padding:24px;align-items:flex-start}
.main{flex:1;min-width:0}
.aside{width:340px;flex:none;position:sticky;top:24px}
.overview,.legend,.doc,#panel{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:18px}
.legend{font-family:system-ui,sans-serif;font-size:13px}
.legend>summary{cursor:pointer;font-weight:600;color:var(--teal);list-style:revert}
.legend[open]>summary{margin-bottom:10px}
.legfilter{width:100%;padding:6px 9px;margin-bottom:10px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:12px}
.legtree{font-size:13px}
.legtree.capped{max-height:300px;overflow:auto;padding-right:4px}
.legrow{display:flex;align-items:center;gap:7px;padding:2px 4px;border-radius:5px}
.legrow i{width:12px;height:12px;border-radius:3px;display:inline-block;flex:none}
.legrow .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legrow .ct{color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px}
.legkids{margin-left:13px;border-left:1px solid var(--line);padding-left:5px}
.legrow.linky{cursor:pointer}
.legrow.linky:hover{background:#eef4fb}
.doc>summary{font-size:18px;color:var(--teal);font-weight:600;cursor:pointer;list-style:revert}
.doc[open]>summary{margin-bottom:10px}
.docctrl{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-family:system-ui,sans-serif;font-size:12px;color:var(--muted)}

</style></head><body>
<header><h1>${title}</h1><div class="sub">Apêndice de Transparência — gerado pelo QualiLab</div></header>

<script>
var ANNS = JSON.parse(${JSON.stringify(dataJson)});
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function filterLeg(q){ q=(q||'').toLowerCase();
  function walk(node){ var name=node.getAttribute('data-name')||'';
    var kids=node.querySelectorAll(':scope > .legkids > .legnode'), anyKid=false;
    for(var i=0;i<kids.length;i++){ if(walk(kids[i])) anyKid=true; }
    var vis = !q || name.indexOf(q)>=0 || anyKid;
    node.style.display = vis ? '' : 'none'; return vis;
  }
  var roots=document.querySelectorAll('#legtree > .legnode');
  for(var i=0;i<roots.length;i++) walk(roots[i]);
}
function allDocs(open){ var d=document.querySelectorAll('details.doc'); for(var i=0;i<d.length;i++) d[i].open=open; }
document.addEventListener('click',function(e){
  var sp=e.target.closest?e.target.closest('[data-ann]'):null; if(!sp) return;
  // clicar no ● (link de memo) dentro do título não deve abrir/fechar o documento
  if(sp.closest('summary')) e.preventDefault();
  var panel=document.getElementById('panel');
  var ids=sp.getAttribute('data-ann').split(' '), out='<h3>Nota analítica</h3>';
  ids.forEach(function(id){ var a=ANNS[id]; if(!a) return;
    out+='<div class="ann"><div class="ann-code" style="color:'+a.color+'">'+esc(a.code)+'</div>'
      +(a.author?'<div class="ann-meta">'+esc(a.author)+'</div>':'')
      +(a.note?'<div class="ann-note">'+esc(a.note)+'</div>':'<div class="ann-empty">Sem nota para este trecho.</div>')
      +'</div>';

  var prev=document.querySelector('[data-ann].active'); if(prev)prev.classList.remove('active');

}
function exportTransparencyReader(docs, codes, allC, memos, project, anonymize){
  const htmlStr = buildTransparencyReaderHTML(docs, codes, allC, memos, project, anonymize);
  download((project?.name||'projeto').replace(/[^\w\-]+/g,'_')+(anonymize?'_anon':'')+'_transparencia.html', htmlStr, 'text/html;charset=utf-8');
}

async function exportQDPX(docs, cats, allV, codes, allC, project){
  const JSZip = await getJSZip();
  const zip = new JSZip();
  const srcFolder = zip.folder('sources');

  // usuarios (autores distintos -> guid)
  const authorGuid = {};
  const ensureAuthor = (name)=>{ const n=name||'anonimo'; if(!authorGuid[n]) authorGuid[n]=uid(); return authorGuid[n]; };
  allV.forEach(v=>ensureAuthor(v.author));
  allC.forEach(c=>ensureAuthor(c.author_name));

  // arvore de codigos
  const byParent = {};
  codes.forEach(c=>{ const p=c.parent_id||'__root__'; (byParent[p]=byParent[p]||[]).push(c); });
  const topCodes = byParent['__root__']||[];
  const codesXml = topCodes.map(c=>buildCodeXml(c, byParent)).join('');

  // variaveis (categorias do documento). o tipo e a lista de valores entram na
  // Description em texto legivel; o proprio QualiLab reconstroi tudo na importacao.
  const variablesXml = cats.map(c=>{
    const bits = [`tipo: ${c.kind||'text'}`];
    if((c.options||[]).length) bits.push(`valores: ${c.options.join(', ')}`);
    // sempre Text: nossas datas podem ser parciais (DD/MM/AAAA), invalidas como Date ISO
    return `<Variable guid="${stripGuid(c.id)}" name="${xmlEsc(c.name)}" typeOfVariable="Text"><Description>${xmlEsc(bits.join(' | '))}</Description></Variable>`;
  }).join('');

  // sources (um TextSource por documento, conteudo gravado em sources/<guid>.txt)
  let sourcesXml = '';
  for(const d of docs){
    srcFolder.file(`${stripGuid(d.id)}.txt`, d.content);
    const docCodings = allC.filter(c=>c.document_id===d.id);
    const selXml = docCodings.map(c=>{
      const codingGuid = uid();
      const au = ensureAuthor(c.author_name);
      const name = (c.quote||'').slice(0,80);
      // posicoes em code points (REFI-QDA/QualCoder), convertidas do offset UTF-16 interno
      const cs = u16ToCp(d.content, c.span_start), ce = u16ToCp(d.content, c.span_end);
      return `<PlainTextSelection guid="${stripGuid(c.id)}" name="${xmlEsc(name)}" startPosition="${cs}" endPosition="${ce}" creatingUser="${au}">`
        + `<Coding guid="${codingGuid}" creatingUser="${au}"><CodeRef targetGUID="${stripGuid(c.code_id)}"/></Coding>`
        + `</PlainTextSelection>`;
    }).join('');
    sourcesXml += `<TextSource guid="${stripGuid(d.id)}" name="${xmlEsc(d.name)}" plainTextPath="internal://${stripGuid(d.id)}.txt">${selXml}</TextSource>`;
  }

  // cases (um por documento, com os valores de categoria daquele documento)
  const casesXml = docs.map(d=>{
    const vv = allV.filter(v=>v.document_id===d.id).map(v=>
      `<VariableValue><VariableRef targetGUID="${stripGuid(v.category_id)}"/><TextValue>${xmlEsc(v.value)}</TextValue></VariableValue>`).join('');
    // ordem dos filhos do <Case> segue o XSD do REFI-QDA: CodeRef, VariableValue, SourceRef,
    // SelectionRef. VariableValue ANTES de SourceRef — senao importadores estritos (MAXQDA/
    // ATLAS.ti) recusam o .qdpx por invalidez de schema (confirmado pelo harness de round-trip).
    return `<Case guid="${uid()}" name="${xmlEsc(d.name)}">${vv}<SourceRef targetGUID="${stripGuid(d.id)}"/></Case>`;
  }).join('');

  const usersXml = Object.entries(authorGuid).map(([name,g])=>`<User guid="${g}" name="${xmlEsc(name)}"/>`).join('');

  const qde = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n`
    + `<Project xmlns="urn:QDA-XML:project:1.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" `
    + `xsi:schemaLocation="urn:QDA-XML:project:1.0 http://schema.qdasoftware.org/versions/Project/v1.0/Project.xsd" `
    + `name="${xmlEsc(project.name||'Projeto QualiLab')}" origin="QualiLab" creationDateTime="${new Date().toISOString()}">`
    + `<Users>${usersXml}</Users>`
    + `<CodeBook><Codes>${codesXml}</Codes></CodeBook>`
    + `<Variables>${variablesXml}</Variables>`
    + `<Cases>${casesXml}</Cases>`
    + `<Sources>${sourcesXml}</Sources>`
    + `</Project>`;

  zip.file('project.qde', qde);
  const blob = await zip.generateAsync({ type:'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (project.name||'qualilab_projeto').replace(/[^\w\-]+/g,'_') + '.qdpx';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}

/* leitura de .qdpx para dentro do projeto ativo */
/* devolve o controle ao navegador a cada N itens (em vez de so a cada microtask) —
   sem isso, uma importacao de milhares de itens com store em lote (beginBatch) nunca
   cede a vez para repintura, e a aba parece travada até o fim (so reage com F5). */
// Cede o controle ao event-loop (pra repintar a barra de progresso) SEM o throttle de
// setTimeout: o Chrome clampa setTimeout aninhado a ~1s em aba/iframe em segundo plano, o que
// travava imports longos por dezenas de segundos (cada um dos ~60 yields virava ~0,5-1s).
// MessageChannel.postMessage e agendado como macrotask mas NAO sofre esse clamp. Fila FIFO de
// resolvers pra suportar yields em sequencia com um unico canal.
const yieldToHost = (()=>{
  if(typeof MessageChannel==='undefined') return ()=> new Promise(r=>setTimeout(r,0));
  const ch = new MessageChannel(); const q = [];
  ch.port1.onmessage = ()=>{ const r = q.shift(); if(r) r(); };
  return ()=> new Promise(res=>{ q.push(res); ch.port2.postMessage(0); });
})();
function makeProgressTicker(onProgress, total){
  const every = Math.max(10, Math.floor(total/60)); // ~60 atualizacoes da barra, nao uma por item
  let done = 0;
  return async ()=>{
    done++;
    if(done % every === 0 || done === total){
      onProgress?.(done, total);
      await yieldToHost();
    }
  };
}

const COMBINING_MARK = /\p{M}/u;
function buildMatchIndex(content){
  const map = []; const parts = []; let lastSpace = false;
  const n = content.length; let i = 0;
  while(i < n){
    const c = content[i]; const code = c.charCodeAt(0);
    if(code < 128){ // caminho rapido ASCII (a grande maioria dos caracteres)
      if(code===32||code===9||code===10||code===13||code===12||code===11){
        if(!lastSpace){ parts.push(' '); map.push(i); lastSpace = true; }
      } else { parts.push(code>=65&&code<=90 ? c.toLowerCase() : c); map.push(i); lastSpace = false; }
      i++; continue;
    }
    let j = i + 1;
    while(j < n && COMBINING_MARK.test(content[j])) j++;   // agrupa base + marcas combinantes
    const cluster = content.slice(i, j).normalize('NFC');
    if(/^\s+$/.test(cluster)){
      if(!lastSpace){ parts.push(' '); map.push(i); lastSpace = true; }
    } else {
      const lc = cluster.toLowerCase();
      for(let k=0;k<lc.length;k++){ parts.push(lc[k]); map.push(i); } // por unidade UTF-16
      lastSpace = false;
    }
    i = j;
  }
  map.push(content.length); // sentinela: offset logo apos o ultimo caractere
  return { norm: parts.join(''), map };
}
function normQuery(s){ return (s||'').normalize('NFC').replace(/\s+/g,' ').trim().toLowerCase(); }
function isImageRegionName(q){ return /^\d+\s*[x×]\s*\d+$/.test(q); } // ex.: "392 x 396" / "392 × 396"
function isFilenameName(q){ return /\.(pdf|png|jpe?g|tiff?|gif|bmp|docx?|txt)$/i.test(q); } // selecao retangular nomeada com o arquivo
function findQuoteSpan(index, name){
  const q = normQuery(name);
  if(q.length < 3) return null;
  const at = index.norm.indexOf(q);
  if(at >= 0) return { start: index.map[at], end: index.map[at + q.length], approx:false };
  // fallback conservador: ancora no comeco e (quando da) no fim do trecho. Util quando o
  // miolo tem caractere ilegivel (�) ou ordem trocada na extracao do PDF. Marcado approx.
  const words = q.split(' ').filter(Boolean);
  if(words.length >= 4){
    const prefix = words.slice(0, Math.min(5, words.length)).join(' ');
    const p = index.norm.indexOf(prefix);
    if(p >= 0){
      const suffix = words.slice(Math.max(0, words.length - 3)).join(' ');
      const s = index.norm.indexOf(suffix, p + prefix.length - suffix.length);
      let endN;
      if(s >= 0 && (s + suffix.length - p) <= q.length * 2.5) endN = s + suffix.length;
      else endN = Math.min(p + q.length, index.norm.length);
      return { start: index.map[p], end: index.map[endN], approx:true };
    }
  }
  return null;
}

/* ===== Recuperacao geometrica de selecoes retangulares (Tier 2) =====
   ATLAS.ti codifica PDF por RETANGULO (pagina + coordenadas em pontos, origem embaixo) e NAO
   guarda o texto desses trechos em lugar nenhum — nem no .qdpx, nem no .atlasti nativo (so o
   atributo "name", que para regiao vira o nome do arquivo ou "L x A"). Para recupera-los, usamos
   o pdf.js como FONTE UNICA do documento: extraimos numa so passada o texto reflowado (que vira o
   conteudo exibido) E os itens de texto posicionados de cada pagina. Cada selecao (inline ou
   retangular) e localizada reconstruindo o texto dentro do seu retangulo a partir desses MESMOS
   itens e casando-o no conteudo via findQuoteSpan — casamento INTRA-extracao, sem depender de
