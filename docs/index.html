            </div>
            ${interactive && html`<div class="row" style="gap:6px;flex-shrink:0">
              <button class=${`btn sm ${on?'primary':'ghost'}`} onClick=${()=>setDecided(d=>({...d,[k]:true}))}>${on?'‚úď Aprovado':'Aprovar'}</button>
              <button class=${`btn sm ${on?'ghost':''}`} onClick=${()=>setDecided(d=>({...d,[k]:false}))} style=${on?'':'background:var(--danger);color:#fff;border-color:var(--danger)'}>${on?'Recusar':'‚úē Recusado'}</button>
            </div>`}
          </div>
        </div>`; })}
        ${interactive && html`<button class="btn primary" disabled=${busy || !appr} onClick=${()=>applyApproved(idx)}>Aplicar ${appr} valor(es)</button>`}
        ${t.applied && html`<div class="meta" style="margin-top:4px">‚úď Valores aplicados.</div>`}
        ${!interactive && !t.applied && vals.length>0 && html`<div class="meta" style="margin-top:4px">Sugest√£o anterior ‚ÄĒ envie um refinamento para gerar nova.</div>`}
      </div>`}
      ${!vals.length && !t.rawFail && html`<span class="meta">Nenhuma altera√ß√£o sugerida ‚ÄĒ a IA concordou com os valores j√° preenchidos (ou n√£o encontrou base para mudar).</span>`}
      ${onAddMemory && html`<${MemoryProposalReview} proposals=${t.memProps||[]} onCommit=${async (entries)=>{
        for(const e of entries) await onAddMemory({ content:e.content, reason:e.reason, source:'ai', ai_model:currentModelLabel(), mode_label:'Sugest√£o de categoriza√ß√£o' });
        patchTurn(idx, { memProps:[] });
      }} />`}
    </div>`;
  };

  const canRun = selDocObjs.length>0 && selCatObjs.length>0;

  return html`<section class="pane" style="flex:1 1 100%">
    <div class="pane-head" style="gap:12px">
      <button class="btn accent" onClick=${()=>setShowPrompt(true)}
        title="Configurar e revisar exatamente o que ser√° enviado √† IA">
        <${PromptGearIcon} /> configurar prompt <span style="font-family:var(--mono);font-size:11px;font-weight:400;opacity:.85">¬∑ ‚Čą ${buildProv().tokens.toLocaleString('pt-BR')} tokens</span>
      </button>
      <div class="seg" style="flex-wrap:wrap">
        ${TABS.map(t=>html`<button key=${t.id} class=${tab===t.id?'on':''} onClick=${()=>setTab(t.id)}>${t.label}</button>`)}
      </div>
    </div>
    <div style="flex:1;min-height:0;display:flex">
    <!-- ESQUERDA: configura√ß√£o -->
    <div class="pane-body scroll" style="flex:0 0 400px;border-right:1px solid var(--line)">
      <div class="section">
        <p class="hint" style="margin:0 0 10px">A IA l√™ os documentos e <b>sugere o valor</b> de categorias <b>j√° existentes</b> (n√£o cria categorias). Ela v√™ o que <b>j√° est√° preenchido</b> e s√≥ devolve <b>diferen√ßas ou campos vazios</b> ‚ÄĒ se concorda, n√£o prop√Ķe nada. Voc√™ aprova ou recusa cada sugest√£o; <b>nada √© gravado sem confirma√ß√£o</b>.</p>
        ${cats.length===0 && html`<div class="banner warn" style="margin-bottom:10px">Nenhuma categoria no projeto. Crie categorias na aba <b>Esquema ‚Ėł Categorias</b> primeiro.</div>`}
        ${projectMode==='individual' && !isAdmin && html`<div class="banner warn" style="margin-bottom:10px">Em projeto individual, gravar o valor exige permiss√£o de administrador.</div>`}
        <details class="collap field" open>
          <summary class="field-label">Documentos${selDocs.length?` (${selDocs.length})`:''}</summary>
          <div class="row" style="margin:6px 0;gap:8px">
            <button class="btn sm ghost" onClick=${()=>setSelDocs(docs.map(d=>d.id))}>todos</button>
            <button class="btn sm ghost" onClick=${()=>setSelDocs([])}>limpar</button>

            ${docs.length===0 && html`<span class="meta">Nenhum documento.</span>`}
            ${docs.map(d=>html`<button key=${d.id} class="opt ${selDocs.includes(d.id)?'on':''}" style="display:flex;gap:6px;align-items:flex-start;width:100%;margin-bottom:4px;font-size:11px;line-height:1.35"
              onClick=${()=>toggle(selDocs,setSelDocs,d.id)}>${selDocs.includes(d.id)?'‚ėĎ':'‚ėź'}<span style="flex:1;text-align:justify">${d.name}</span></button>`)}
          </div>
        </details>
        <details class="collap field" open>
          <summary class="field-label">Categorias${selCats.length?` (${selCats.length})`:''}</summary>
          <div class="row" style="margin:6px 0;gap:8px">
            <button class="btn sm ghost" onClick=${()=>setSelCats(cats.map(c=>c.id))}>todas</button>
            <button class="btn sm ghost" onClick=${()=>setSelCats([])}>limpar</button>
          </div>
          <div class="card" style="margin-bottom:10px;max-height:220px;overflow:auto">
            ${cats.length===0 && html`<span class="meta">Nenhuma categoria.</span>`}
            ${cats.map(c=>html`<button key=${c.id} class="opt ${selCats.includes(c.id)?'on':''}" style="display:flex;gap:6px;align-items:center;width:100%;margin-bottom:4px;font-size:11px"
              onClick=${()=>toggle(selCats,setSelCats,c.id)}>${selCats.includes(c.id)?'‚ėĎ':'‚ėź'}<span style="flex:1;text-align:left">${c.name} <span class="meta">¬∑ ${kindLabel(c.kind)}</span></span></button>`)}
          </div>
        </details>      </div>
      ${onToggleMemory && html`<${MemoryPanel} memory=${memory} onToggle=${onToggleMemory} onDelete=${onDeleteMemory} showAdd=${false} />`}
    </div>

    <!-- DIREITA: chat -->
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;background:var(--paper)">
      <div class="pane-head"><span class="field-label" style="margin:0">Conversa ‚ÄĒ preenchimento de categorias</span></div>
      <div class="pane-body scroll" style="padding:16px">
        ${history.length===0 && html`<div style="text-align:center;max-width:380px;margin:56px auto 0">
          <p class="meta" style="font-size:13px;line-height:1.7;margin:0">Selecione documentos e categorias √† esquerda e clique em <b>Sugerir preenchimento</b> abaixo. A IA prop√Ķe um valor por documento√ócategoria, que voc√™ aprova um a um.</p>
        </div>`}
        ${history.map((t,i)=> t.role==='user'
          ? html`<div key=${'u'+i} class="card" style="margin-bottom:10px;background:var(--teal-soft);border-color:var(--teal-soft)">
              <div class="field-label" style="margin-bottom:4px">${i===0?'Sua instru√ß√£o':'Voc√™'}</div>
              <div style="white-space:pre-wrap;font-size:13px">${t.display || t.content}</div>
            </div>`
          : assistantTurn(t, i))}
        ${busy && html`<div class="card" style="margin-bottom:10px"><div class="field-label" style="margin-bottom:6px">IA</div><div class="typing"><span></span><span></span><span></span></div></div>`}
        ${err && html`<div class="banner err" style="margin-top:10px">${err}</div>`}
        ${applyMsg && html`<div class="banner warn" style="margin-top:10px">${applyMsg}</div>`}
      </div>
      <div style="flex:none;border-top:1px solid var(--line);background:var(--surface);padding:10px 14px">
        <textarea class="txtin" rows="2" style="resize:vertical"
          placeholder=${history.length ? 'Refinar (ex.: "reavalie a categoria Cargo no ENT-03")‚Ä¶ Enter envia, Shift+Enter quebra linha' : 'Instru√ß√£o opcional‚Ä¶ Enter envia, Shift+Enter quebra linha'}
          value=${instruction} disabled=${busy} onInput=${e=>setInstruction(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }}></textarea>
        <div class="row" style="gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap">
          <button class="btn primary" disabled=${busy || !canRun} onClick=${send}>${history.length ? 'Enviar refinamento' : 'Sugerir preenchimento'}</button>
          ${history.length>0 && html`<button class="btn sm ghost" disabled=${busy} onClick=${reset}>Limpar conversa</button>`}
          ${busy && html`<span class="meta">pensando‚Ä¶</span>`}
          ${!canRun && !busy && history.length===0 && html`<span class="meta">Selecione documentos e categorias.</span>`}
        </div>
      </div>
    </div>
    ${showPrompt && (()=>{ const controls = html`<div>
        <div class="field" style="margin-bottom:12px">
          <div class="field-label">Instru√ß√Ķes pr√≥prias √† IA</div>
          <textarea class="txtin" rows="2" style="resize:vertical" placeholder="Guias que sempre entram no prompt (ex.: priorize a linguagem dos entrevistados)‚Ä¶" value=${aiInstr} onInput=${e=>changeInstr(e.target.value)}></textarea>
          <div class="meta" style="margin-top:4px">Compartilhado com o Analisar com IA.</div>
        </div>
        <div class="field">
          <div class="field-label">Memos injetados</div>
          <label class="row" style="gap:7px;font-size:12.5px;cursor:pointer;align-items:center">
            <input type="checkbox" checked=${injectSel.has(ctxKey)} onChange=${()=>toggleInject(ctxKey)} />
            <span>Memo para a IA${ctxMemo?.content?.trim()?'':' ‚ÄĒ vazio (escreva na aba Memos)'}</span>
          </label>
          <details class="collap" style="margin-top:4px">
            <summary class="field-label" style="font-weight:400">outros memos (${injectableMemos.length})</summary>
            ${injectableMemos.length===0 && html`<div class="meta" style="padding:4px 0 0 18px">Nenhum outro memo com conte√ļdo.</div>`}
            ${injectableMemos.map(m=>html`<label key=${memoKey(m)} class="row" style="gap:7px;font-size:12px;cursor:pointer;align-items:center;padding:2px 0 2px 18px">
              <input type="checkbox" checked=${injectSel.has(memoKey(m))} onChange=${()=>toggleInject(memoKey(m))} />
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${memoName(m)}</span>
            </label>`)}
          </details>
        </div>
      </div>`;
      return html`<${PromptInspector} title="Configurar prompt" hint="Ajuste os controles; a pr√©via mostra exatamente o que a IA recebe." controls=${controls}
        sections=${promptSections()} prov=${buildProv()} onClose=${()=>setShowPrompt(false)} />`; })()}
  </div>
  </section>`;
}

const IA_CODIF_SYS_REGRAS = `Sua tarefa √©, atuando como SEGUNDA CODIFICADORA (recall), apontar trechos do texto que se encaixam nos C√ďDIGOS EXISTENTES mas que ainda N√ÉO foram codificados, e devolver SOMENTE um objeto JSON (sem texto fora dele), no formato:
{
  "codings": [
    { "doc": "#d1", "code": "#c3", "quote": "trecho copiado LITERALMENTE do texto", "reason": "..." }
  ],
  "summary": "uma frase resumindo a l√≥gica geral",
  "memory": [ { "content": "fato/decis√£o dur√°vel sobre o projeto, em 1 frase", "reason": "por que vale lembrar" } ]
}
Regras: use SOMENTE os ids de documento (#d...) e de c√≥digo (#c...) que aparecem no material ‚ÄĒ N√ÉO crie c√≥digos novos nem invente ids. O "quote" deve ser COPIADO LITERALMENTE do TEXTO INTEGRAL do documento (mesmas palavras e acentos, sem reescrever, resumir ou traduzir), curto o suficiente para ser localizado (uma frase ou trecho cont√≠nuo). Cada documento lista os TRECHOS J√Ā CODIFICADOS ‚ÄĒ N√ÉO repita o que j√° est√° coberto por aquele c√≥digo; aponte s√≥ o que ESCAPOU. S√≥ proponha quando o trecho realmente corresponde ao sentido do c√≥digo (precis√£o importa mais que recall). Explique cada um no "reason" (em portugu√™s, UMA frase, sem quebras de linha dentro de strings JSON). Proponha NO M√ĀXIMO 30 por resposta; se faltar, diga no "summary". Se nada escapou, devolva "codings": [].
O campo "memory" √© OPCIONAL (s√≥ fatos/decis√Ķes DUR√ĀVEIS; no m√°ximo 8). Devolva apenas o JSON, sem texto antes nem depois, sem coment√°rios.`;

/* ============ SUGERIR CODIFICACAO ‚ÄĒ segundo codificador / recall (Fase 4). A IA le o documento +
   o esquema de codigos e propoe trechos {doc, code, quote} usando codigos EXISTENTES; localiza o
   quote->span com buildMatchIndex/findQuoteSpan (mesmo motor do import) e aplica via addCoding.
   Espelha o IACategorizarPanel: ve o que JA esta codificado (nao repropoe), revisao item a item,
   censura mascarada no material, salvamento generico do parseAIJson cobre truncamento. */
function IACodificacaoPanel({ project, docs, codes, codeById, codePath, store, allCodings, isAdmin, projectMode, user, reload, loadAll, memos, onSetMemo, memory, onAddMemory, onToggleMemory, onDeleteMemory, tab, setTab, TABS }){
  const [history, setHistory] = useState([]);
  const [decided, setDecided] = useState({});
  const [instruction, setInstruction] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [applyMsg, setApplyMsg] = useState('');
  const selectableCodes = useMemo(()=>codes.filter(c=>!c.is_redaction), [codes]); // censura n√£o √© codificada pela IA
  const [selDocs, setSelDocs] = useState(()=>docs.map(d=>d.id));
  const [selCodes, setSelCodes] = useState(()=>selectableCodes.map(c=>c.id));

  // --- CONFIG DO PROMPT (mesmo padr√£o do Analisar, MENOS postura/biblioteca). Persistida via
  // memos: ai_instructions (COMPARTILHADO com o Analisar) e ai_context (Memo para a IA). ---
  const [showPrompt, setShowPrompt] = useState(false);
  const aiInstrMemo = (memos||[]).find(m=>m.scope==='ai_instructions' && m.target_id===project?.id);
  const ctxMemo     = (memos||[]).find(m=>m.scope==='ai_context' && m.target_id===project?.id);
  const [aiInstr, setAiInstr] = useState('');
  const instrTouched = useRef(false);
  const memoKey = (m)=> `${m.scope}:${m.target_id}`;
  const ctxKey = `ai_context:${project?.id}`;
  const [injectSel, setInjectSel] = useState(()=> new Set([ctxKey]));
  useEffect(()=>{ if(!instrTouched.current) setAiInstr(aiInstrMemo?.content || ''); }, [aiInstrMemo?.content]);
  useEffect(()=>{ instrTouched.current=false; setInjectSel(new Set([ctxKey])); }, [project?.id]); // eslint-disable-line
  const instrDebRef = useRef(null);
  const changeInstr = (val)=>{ instrTouched.current=true; setAiInstr(val); clearTimeout(instrDebRef.current); instrDebRef.current = setTimeout(()=>{ onSetMemo && onSetMemo('ai_instructions', project.id, val); }, 700); };
  const toggleInject = (key)=> setInjectSel(s=>{ const n=new Set(s); n.has(key)?n.delete(key):n.add(key); return n; });
  const memoName = (m)=> m.scope==='ai_context' ? 'Memo para a IA'
    : m.scope==='project' ? 'Memo do projeto'
    : m.scope==='document' ? `Documento: ${(docs.find(d=>d.id===m.target_id)||{}).name||'‚ÄĒ'}`
    : m.scope==='code' ? `C√≥digo: ${codePath(m.target_id).join(' ‚Ėł ')}`
    : m.scope==='coding' ? 'Nota de trecho' : m.scope;
  const injectableMemos = (memos||[]).filter(m=> ['project','document','code','coding'].includes(m.scope) && m.content && m.content.trim());
  const injectedMemos = (memos||[]).filter(m=> injectSel.has(memoKey(m)) && m.content && m.content.trim());

  const patchTurn = (idx,patch)=> setHistory(h=>h.map((t,i)=>i===idx?{...t,...patch}:t));
  const lastAssistantIdx = (()=>{ for(let i=history.length-1;i>=0;i--){ if(history[i].role==='assistant') return i; } return -1; })();
  const dkey = (ti,i)=> ti+':'+i;
  const overlap = (aS,aE,bS,bE)=> aS>=0 && aE>aS && bS>=0 && bE>bS && aS<bE && bS<aE;

  const { d2i } = useMemo(()=>{ const a={}; docs.forEach((d,i)=>{a['d'+(i+1)]=d.id;}); return {d2i:a}; }, [docs]);
  const { c2i } = useMemo(()=>{ const a={}; codes.forEach((c,i)=>{a['c'+(i+1)]=c.id;}); return {c2i:a}; }, [codes]);
  const i2d = useMemo(()=>Object.fromEntries(Object.entries(d2i).map(([k,v])=>[v,k])), [d2i]);
  const i2c = useMemo(()=>Object.fromEntries(Object.entries(c2i).map(([k,v])=>[v,k])), [c2i]);
  const dShort = id=>i2d[id]||'?', cShort = id=>i2c[id]||'?';
  const docById = useMemo(()=>Object.fromEntries(docs.map(d=>[d.id,d])), [docs]);
  const resolveDoc = ref=>{ const k=String(ref??'').replace(/^#/,'').trim(); return d2i[k] || (docById[k]?k:null); };
  const resolveCode = ref=>{ const k=String(ref??'').replace(/^#/,'').trim(); return c2i[k] || (codeById[k]?k:null); };

  const selDocObjs = docs.filter(d=>selDocs.includes(d.id));
  const selCodeObjs = selectableCodes.filter(c=>selCodes.includes(c.id));
  const redactionIds = useMemo(()=> new Set(codes.filter(c=>c.is_redaction).map(c=>c.id)), [codes]);
  const codingsByDoc = useMemo(()=>{ const m={}; (allCodings||[]).forEach(c=>{ (m[c.document_id]=m[c.document_id]||[]).push(c); }); return m; }, [allCodings]);
  const codeCount = useMemo(()=>{ const m={}; (allCodings||[]).forEach(c=>{m[c.code_id]=(m[c.code_id]||0)+1;}); return m; }, [allCodings]);
  const toggle = (arr,set,id)=> set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);

  // ---- MATERIAL ----
  const codeListBlock = useMemo(()=>{
    const lines = selCodeObjs.map(c=>`#${cShort(c.id)} | "${codePath(c.id).join(' ‚Ėł ')}" | ${codeCount[c.id]||0} trechos`);
    return 'C√ďDIGOS DISPON√ćVEIS PARA APLICAR (id | caminho | n¬ļ de trechos j√° aplicados):\n' + (lines.join('\n') || '(nenhum c√≥digo selecionado)');
  }, [selCodeObjs, i2c, codeCount]);

  const docBlock = useMemo(()=>{
    let total = 0; const parts = [];
    for(const d of selDocObjs){
      const inDoc = (allCodings||[]).filter(c=>c.document_id===d.id);
      const already = inDoc.filter(c=>selCodes.includes(c.code_id))
        .map(c=>`  - [#${cShort(c.code_id)} "${codeById[c.code_id]?.name||''}"] "${maskQuoteSpans(c, inDoc, redactionIds)}"`);
      const masked = maskRedactedContent(d.content||'', inDoc, redactionIds);
      const chunk = `--- #${dShort(d.id)} "${d.name}" ---\nTRECHOS J√Ā CODIFICADOS (n√£o repita):\n${already.join('\n') || '  (nenhum)'}\nTEXTO INTEGRAL:\n${masked.slice(0, IA_DOC_CHAR_LIMIT)}`;
      if(total + chunk.length > IA_TOTAL_CHAR_LIMIT){ parts.push('[...documentos restantes omitidos ‚ÄĒ limite de tamanho; selecione menos documentos...]'); break; }
      parts.push(chunk); total += chunk.length;
    }
    return 'DOCUMENTOS:\n' + (parts.join('\n\n') || '(nenhum documento selecionado)');
  }, [selDocObjs, selCodes, allCodings, redactionIds, codeById, i2d, i2c]);

  // SECOES NOMEADAS do prompt ‚ÄĒ FONTE UNICA (alimenta o `system` enviado E o PromptInspector).
  // Papel = constituicao + papel deste painel + instrucoes proprias; Memo = memos injetados
  // (NAO mais o memo de projeto auto-injetado); regras = IA_CODIF_SYS_REGRAS.
  const promptSections = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const roleText = [
      IA_CONSTITUICAO,
      'Neste projeto voc√™ atua como SEGUNDA CODIFICADORA (recall): aponta trechos que se encaixam nos c√≥digos J√Ā EXISTENTES e que escaparam da codifica√ß√£o. Voc√™ N√ÉO cria c√≥digos novos.',
      aiInstr.trim() ? `Instru√ß√Ķes espec√≠ficas deste projeto:\n${aiInstr.trim()}` : '',
    ].filter(Boolean).join('\n\n');
    const memoText = injectedMemos.length
      ? injectedMemos.map(m=>`[${memoName(m)}]\n${m.content.trim()}`).join('\n\n')
      : '(nenhum memo injetado)';
    const desc = 'Abaixo est√£o os c√≥digos dispon√≠veis e, para cada documento, os TRECHOS J√Ā CODIFICADOS seguidos do TEXTO INTEGRAL. Aponte s√≥ trechos do texto que caibam num c√≥digo existente e ainda n√£o estejam codificados com ele.' + (redactionIds.size?' Trechos sens√≠veis aparecem como "[trecho censurado]" ‚ÄĒ n√£o os cite nem proponha codific√°-los.':'');
    return [
      { key:'role',  label:'Papel e princ√≠pios',       meta:'segunda codificadora', text: roleText },
      { key:'memo',  label:'Memo(s) para a IA',         meta:`${injectedMemos.length} injetado(s)`, text: memoText },
      { key:'mem',   label:'Mem√≥ria do projeto',        meta: nMem ? `${nAtiv} de ${nMem} ativas` : 'nenhuma', text: memoryBlock(memory) },
      { key:'desc',  label:'Sobre o material',          meta:'o recorte', text: `Sobre o material que voc√™ recebeu:\n${desc}` },
      { key:'mat',   label:'Material',                  meta:`${selCodeObjs.length} c√≥digo(s) ¬∑ ${selDocObjs.length} doc(s)`, text: 'MATERIAL:\n' + codeListBlock + '\n\n' + docBlock },
      { key:'rules', label:'Regras e formato de sa√≠da', meta:'‚ÄĒ', text: IA_CODIF_SYS_REGRAS },
    ];
  };
  const systemPrompt = promptSections().map(s=>s.text).join('\n\n');
  // proveniencia pro cabecalho do inspetor (modelo/contagens/estimativa de tokens).
  const buildProv = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const chars = codeListBlock.length + docBlock.length;
    return {
      model: currentModelLabel(),
      material: `${selCodeObjs.length} c√≥digo(s) ¬∑ ${selDocObjs.length} doc(s)`,
      mem: nMem ? `${nAtiv} de ${nMem}` : 'nenhuma',
      censura: redactionIds.size ? `${redactionIds.size} c√≥digo(s) de censura mascarado(s)` : '‚ÄĒ',
      chars, limit: IA_TOTAL_CHAR_LIMIT,
      tokens: Math.round((Math.min(chars, IA_TOTAL_CHAR_LIMIT) + 1200) / 4),
    };
  };

  // ---- VALIDACAO: resolve ids, LOCALIZA o quote no texto (quote->span) e descarta o que ja existe ----
  const validateCodings = (raw)=>{
    const out=[]; let bad=0, notFound=0, dup=0; const idxCache=new Map();
    for(const item of (Array.isArray(raw)?raw:[])){
      const docId=resolveDoc(item?.doc), codeId=resolveCode(item?.code);
      if(!docId || !codeId || !selCodes.includes(codeId) || redactionIds.has(codeId)){ bad++; continue; }
      const doc=docById[docId]; const quote=String(item?.quote||'').trim();
      if(!doc || quote.length<3){ bad++; continue; }
      let idx=idxCache.get(docId); if(!idx){ idx=buildMatchIndex(doc.content||''); idxCache.set(docId,idx); }
      const sp=findQuoteSpan(idx, quote);
      if(!sp){ notFound++; continue; }
      // ja existe coding do MESMO codigo cobrindo esse span (no banco, ou ja aceito nesta resposta)?
      const exists = (codingsByDoc[docId]||[]).some(c=>c.code_id===codeId && overlap(c.span_start,c.span_end,sp.start,sp.end))
                  || out.some(o=>o.docId===docId && o.codeId===codeId && overlap(o.start,o.end,sp.start,sp.end));
      if(exists){ dup++; continue; }
      out.push({ docId, codeId, start:sp.start, end:sp.end, quote:(doc.content||'').slice(sp.start, sp.end), approx:!!sp.approx, reason:String(item?.reason||'').trim() });
    }
    return { out, bad, notFound, dup };
  };

  async function send(){
    if(busy) return;
    if(!selDocObjs.length || !selCodeObjs.length){ setErr('Selecione ao menos um documento e um c√≥digo.'); return; }
    const base = instruction.trim() || (history.length ? 'Continue, apontando mais trechos que escaparam.' : 'Percorra os documentos e aponte trechos que se encaixam nos c√≥digos existentes mas n√£o foram codificados.');
    const userTurn = base + ' Responda APENAS com o objeto JSON no formato especificado, sem texto antes ou depois.';
    setErr(''); setApplyMsg(''); setBusy(true);
    const nextHistory = [...history, { role:'user', content:userTurn, display:base }];
    setHistory(nextHistory); setInstruction('');
    const aIdx = nextHistory.length;
    try{
      const text = await askAIChat({ system: systemPrompt, messages: nextHistory, json: true });
      const parsed = parseAIJson(text); let entry;
      if(!parsed){ entry = { role:'assistant', content:text, codings:[], summary:'', bad:0, notFound:0, dup:0, memProps:[], applied:false, rawFail:text||'(resposta vazia)', parseFailed:true }; }
      else {
        const { out, bad, notFound, dup } = validateCodings(parsed.codings);
        entry = { role:'assistant', content:text, codings:out, summary:String(parsed.summary||''), bad, notFound, dup, memProps:validateMemProps(parsed.memory), applied:false, rawFail:'', salvaged:!!parsed._salvaged };
        if(out.length){ setDecided(d=>{ const n={...d}; out.forEach((_,i)=>{ n[dkey(aIdx,i)]=true; }); return n; }); }
      }
      setHistory(h=>[...h, entry]);
    }catch(e){ setErr(String(e?.message||e)); }
    finally{ setBusy(false); }
  }

  async function applyApproved(turnIdx){
    const turn = history[turnIdx]; if(!turn) return;
    const approved = (turn.codings||[]).filter((_,i)=>decided[dkey(turnIdx,i)]);
    if(!approved.length){ setErr('Nenhuma codifica√ß√£o aprovada para aplicar.'); return; }
    setErr(''); setApplyMsg(''); setBusy(true);
    const layer = projectMode==='individual' ? 'final' : 'individual';
    let applied=0, skipped=0;
    if(store.beginBatch) store.beginBatch();
    try{
      for(const o of approved){ try{ await store.addCoding(project.id, { document_id:o.docId, code_id:o.codeId, span_start:o.start, span_end:o.end, quote:o.quote, layer }); applied++; }catch(e){ skipped++; } }
    } finally { if(store.endBatch) await store.endBatch(); }
    await reload(); await loadAll();
    patchTurn(turnIdx, { applied:true });
    setApplyMsg(`${applied} codifica√ß√£o(√Ķes) aplicada(s)${skipped?`, ${skipped} falhou(aram)`:''}. Confira no leitor (aba Codifica√ß√£o) ou na Visualiza√ß√£o.`);
    setHistory(h=>[...h, { role:'user', content:`(Apliquei ${applied} codifica√ß√£o(√Ķes) da sua proposta.)` }]);
    setBusy(false);
  }

  function reset(){ setHistory([]); setDecided({}); setErr(''); setApplyMsg(''); setInstruction(''); }

  const turnApprovedCount = (t,idx)=> (t.codings||[]).filter((_,i)=>decided[dkey(idx,i)]).length;

  const codingLine = (o)=>{ const doc=docById[o.docId]; const path=codePath(o.codeId).join(' ‚Ėł ');
    return html`<div>
      <div style="font-size:13px"><b>${doc?.name||'(doc)'}</b> ‚Ėł ${path}
        <span class="pill" style="margin:0 4px;background:var(--teal-soft);border-color:var(--teal-soft);color:var(--teal-deep)">novo</span>${o.approx?html`<span class="pill" style="margin:0 4px;background:transparent;border-color:var(--line);color:var(--ink-faint)">‚Čą localiza√ß√£o aproximada</span>`:''}</div>
      <blockquote style="margin:4px 0 0;padding:2px 0 2px 10px;border-left:3px solid ${codeColor(codeById[o.codeId]?.hue,codeById[o.codeId]?.depth,codeById[o.codeId]?.hue_deg).solid};font-family:var(--serif);font-size:13px">‚Äú${o.quote}‚ÄĚ</blockquote>
    </div>`; };

  const assistantTurn = (t, idx)=>{
    const cods = t.codings || [];
    const interactive = idx===lastAssistantIdx && !t.applied;
    const appr = turnApprovedCount(t, idx);
    const drops = (t.bad||0)+(t.notFound||0)+(t.dup||0);
    return html`<div key=${'a'+idx} class="card" style="margin-bottom:10px">
      <div class="field-label" style="margin-bottom:4px">IA</div>
      ${t.summary && html`<div dangerouslySetInnerHTML=${{__html: mdLite(t.summary)}} />`}
      ${t.parseFailed && html`<div class="banner err" style="margin-top:8px">A IA n√£o devolveu um JSON v√°lido. Se a resposta abaixo est√° cortada, selecione menos documentos/c√≥digos.</div>`}
      ${t.salvaged && html`<div class="banner warn" style="margin-top:8px">A resposta veio truncada (limite de tokens); recuperei as codifica√ß√Ķes completas abaixo. Aplique e pe√ßa a continua√ß√£o, ou selecione menos documentos.</div>`}
      ${t.rawFail && html`<details style="margin-top:8px"><summary class="meta" style="cursor:pointer">Ver resposta crua (diagn√≥stico)</summary>
        <pre style="white-space:pre-wrap;font-family:var(--mono);font-size:11px;background:var(--teal-soft);padding:10px;border-radius:8px;margin-top:6px;max-height:280px;overflow:auto">${t.rawFail}</pre></details>`}
      ${cods.length>0 && html`<div style="margin-top:10px">
        <div class="row" style="align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
          <b>${cods.length} trecho(s) ${t.applied?'aplicado(s)':'sugerido(s)'}</b>
          ${!t.applied && html`<span class="meta">${appr} marcado(s)</span>`}
          ${drops>0 && html`<span class="meta">(${t.dup||0} j√° codificado(s), ${t.notFound||0} n√£o localizado(s)${t.bad?`, ${t.bad} inv√°lido(s)`:''})</span>`}
          ${interactive && html`<div style="flex:1"></div>
            <button class="btn sm ghost" onClick=${()=>setDecided(d=>{ const n={...d}; cods.forEach((_,i)=>{ n[dkey(idx,i)]=true; }); return n; })}>Aprovar todas</button>
            <button class="btn sm ghost" onClick=${()=>setDecided(d=>{ const n={...d}; cods.forEach((_,i)=>{ n[dkey(idx,i)]=false; }); return n; })}>Recusar todas</button>`}
        </div>
        ${cods.map((o,i)=>{ const k=dkey(idx,i); const on=!!decided[k]; const struck=!t.applied && !on;
          return html`<div key=${k} class="card" style=${`margin-bottom:8px;opacity:${struck?0.55:1}`}>
          <div class="row" style="gap:10px;align-items:flex-start">
            <div style="flex:1;min-width:0">${codingLine(o)}${o.reason && html`<div class="meta" style="margin-top:4px">${o.reason}</div>`}</div>
            ${interactive && html`<div class="row" style="gap:6px;flex-shrink:0">
              <button class=${`btn sm ${on?'primary':'ghost'}`} onClick=${()=>setDecided(d=>({...d,[k]:true}))}>${on?'‚úď Aprovado':'Aprovar'}</button>
              <button class=${`btn sm ${on?'ghost':''}`} onClick=${()=>setDecided(d=>({...d,[k]:false}))} style=${on?'':'background:var(--danger);color:#fff;border-color:var(--danger)'}>${on?'Recusar':'‚úē Recusado'}</button>
            </div>`}
          </div>
        </div>`; })}
        ${interactive && html`<button class="btn primary" disabled=${busy || !appr} onClick=${()=>applyApproved(idx)}>Aplicar ${appr} codifica√ß√£o(√Ķes)</button>`}
        ${t.applied && html`<div class="meta" style="margin-top:4px">‚úď Codifica√ß√Ķes aplicadas.</div>`}
        ${!interactive && !t.applied && cods.length>0 && html`<div class="meta" style="margin-top:4px">Sugest√£o anterior ‚ÄĒ envie um refinamento para gerar nova.</div>`}
      </div>`}
      ${!cods.length && !t.rawFail && html`<span class="meta">Nenhum trecho novo sugerido${(t.dup||t.notFound)?` (${t.dup||0} j√° codificado(s), ${t.notFound||0} n√£o localizado(s))`:''}.</span>`}
      ${onAddMemory && html`<${MemoryProposalReview} proposals=${t.memProps||[]} onCommit=${async (entries)=>{
        for(const e of entries) await onAddMemory({ content:e.content, reason:e.reason, source:'ai', ai_model:currentModelLabel(), mode_label:'Sugest√£o de codifica√ß√£o' });
        patchTurn(idx, { memProps:[] });
      }} />`}
    </div>`;
  };

  const canRun = selDocObjs.length>0 && selCodeObjs.length>0;

  return html`<section class="pane" style="flex:1 1 100%">
    <div class="pane-head" style="gap:12px">
      <button class="btn accent" onClick=${()=>setShowPrompt(true)}
        title="Configurar e revisar exatamente o que ser√° enviado √† IA">
        <${PromptGearIcon} /> configurar prompt <span style="font-family:var(--mono);font-size:11px;font-weight:400;opacity:.85">¬∑ ‚Čą ${buildProv().tokens.toLocaleString('pt-BR')} tokens</span>
      </button>
      <div class="seg" style="flex-wrap:wrap">
        ${TABS.map(t=>html`<button key=${t.id} class=${tab===t.id?'on':''} onClick=${()=>setTab(t.id)}>${t.label}</button>`)}
      </div>
    </div>
    <div style="flex:1;min-height:0;display:flex">
    <div class="pane-body scroll" style="flex:0 0 400px;border-right:1px solid var(--line)">
      <div class="section">
        <p class="hint" style="margin:0 0 10px">A IA atua como <b>segunda codificadora</b>: l√™ os documentos e aponta trechos que se encaixam em <b>c√≥digos existentes</b> mas escaparam (recall). Ela v√™ o que <b>j√° est√° codificado</b> e n√£o repete. Voc√™ aprova ou recusa cada trecho ‚ÄĒ <b>nada √© gravado sem confirma√ß√£o</b>.</p>
        ${selectableCodes.length===0 && html`<div class="banner warn" style="margin-bottom:10px">Nenhum c√≥digo no projeto. Crie c√≥digos na aba <b>Esquema</b> primeiro.</div>`}
        <details class="collap field" open>
          <summary class="field-label">Documentos${selDocs.length?` (${selDocs.length})`:''}</summary>
          <div class="row" style="margin:6px 0;gap:8px">
            <button class="btn sm ghost" onClick=${()=>setSelDocs(docs.map(d=>d.id))}>todos</button>
            <button class="btn sm ghost" onClick=${()=>setSelDocs([])}>limpar</button>
          </div>
          <div class="card" style="margin-bottom:10px;max-height:200px;overflow:auto">
            ${docs.length===0 && html`<span class="meta">Nenhum documento.</span>`}
            ${docs.map(d=>html`<button key=${d.id} class="opt ${selDocs.includes(d.id)?'on':''}" style="display:flex;gap:6px;align-items:flex-start;width:100%;margin-bottom:4px;font-size:11px;line-height:1.35"
              onClick=${()=>toggle(selDocs,setSelDocs,d.id)}>${selDocs.includes(d.id)?'‚ėĎ':'‚ėź'}<span style="flex:1;text-align:justify">${d.name}</span></button>`)}
          </div>
        </details>
        <details class="collap field">
          <summary class="field-label">C√≥digos dispon√≠veis${selCodes.length?` (${selCodes.length})`:''}</summary>
          <div class="row" style="margin:6px 0;gap:8px">
            <button class="btn sm ghost" onClick=${()=>setSelCodes(selectableCodes.map(c=>c.id))}>todos</button>
            <button class="btn sm ghost" onClick=${()=>setSelCodes([])}>limpar</button>
          </div>
          <div class="card" style="margin-bottom:10px;max-height:240px;overflow:auto">
            ${selectableCodes.length===0 && html`<span class="meta">Nenhum c√≥digo.</span>`}
            ${selectableCodes.map(c=>html`<button key=${c.id} class="opt ${selCodes.includes(c.id)?'on':''}" style="display:flex;gap:6px;align-items:center;width:100%;margin-bottom:4px;font-size:11px"
              onClick=${()=>toggle(selCodes,setSelCodes,c.id)}>${selCodes.includes(c.id)?'‚ėĎ':'‚ėź'}<span style="flex:1;text-align:left">${codePath(c.id).join(' ‚Ėł ')}</span></button>`)}
          </div>
        </details>      </div>
      ${onToggleMemory && html`<${MemoryPanel} memory=${memory} onToggle=${onToggleMemory} onDelete=${onDeleteMemory} showAdd=${false} />`}
    </div>

    <div style="flex:1;min-width:0;display:flex;flex-direction:column;background:var(--paper)">
      <div class="pane-head"><span class="field-label" style="margin:0">Conversa ‚ÄĒ codifica√ß√£o assistida (recall)</span></div>
      <div class="pane-body scroll" style="padding:16px">
        ${history.length===0 && html`<div style="text-align:center;max-width:380px;margin:56px auto 0">
          <p class="meta" style="font-size:13px;line-height:1.7;margin:0">Selecione documentos e c√≥digos √† esquerda e clique em <b>Sugerir trechos</b> abaixo. A IA aponta trechos que se encaixam nos c√≥digos existentes mas escaparam; voc√™ aprova um a um.</p>
        </div>`}
        ${history.map((t,i)=> t.role==='user'
          ? html`<div key=${'u'+i} class="card" style="margin-bottom:10px;background:var(--teal-soft);border-color:var(--teal-soft)">
              <div class="field-label" style="margin-bottom:4px">${i===0?'Sua instru√ß√£o':'Voc√™'}</div>
              <div style="white-space:pre-wrap;font-size:13px">${t.display || t.content}</div>
            </div>`
          : assistantTurn(t, i))}
        ${busy && html`<div class="card" style="margin-bottom:10px"><div class="field-label" style="margin-bottom:6px">IA</div><div class="typing"><span></span><span></span><span></span></div></div>`}
        ${err && html`<div class="banner err" style="margin-top:10px">${err}</div>`}
        ${applyMsg && html`<div class="banner warn" style="margin-top:10px">${applyMsg}</div>`}
      </div>
      <div style="flex:none;border-top:1px solid var(--line);background:var(--surface);padding:10px 14px">
        <textarea class="txtin" rows="2" style="resize:vertical"
          placeholder=${history.length ? 'Refinar (ex.: "foque no c√≥digo Confidencialidade")‚Ä¶ Enter envia, Shift+Enter quebra linha' : 'Instru√ß√£o opcional‚Ä¶ Enter envia, Shift+Enter quebra linha'}
          value=${instruction} disabled=${busy} onInput=${e=>setInstruction(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }}></textarea>
        <div class="row" style="gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap">
          <button class="btn primary" disabled=${busy || !canRun} onClick=${send}>${history.length ? 'Enviar refinamento' : 'Sugerir trechos'}</button>
          ${history.length>0 && html`<button class="btn sm ghost" disabled=${busy} onClick=${reset}>Limpar conversa</button>`}
          ${busy && html`<span class="meta">pensando‚Ä¶</span>`}
          ${!canRun && !busy && history.length===0 && html`<span class="meta">Selecione documentos e c√≥digos.</span>`}
        </div>

/* ============ ANALISAR COM IA ============
   Cada um dos tres escopos esta num momento diferente do trabalho qualitativo,
   entao tem modalidades proprias (nao mais um conjunto unico colado nos tres):

   - Documentos (texto bruto, SEM codificacao): leitura fresca / indutiva. A IA
     e uma "segunda leitora" que NAO conhece o esquema de codigos ‚ÄĒ boa pra
     codificacao aberta, sintese e a visao de fora.
   - Trechos + Codigo (corpus ja codificado, sem o texto em volta): analise do
     CODIGO em si ‚ÄĒ o que ele reune, se e coerente, se bate com a propria
     definicao (memo), como varia entre casos.

// INSPETOR DE PROMPT ‚ÄĒ modal que mostra EXATAMENTE o que vai pra IA, se√ß√£o por se√ß√£o (papel,
// memo, mem√≥ria, material, regras, tarefa), com cabe√ßalho de proveni√™ncia (modelo/escopo/
// contagens/estimativa) e "copiar prompt". Reus√°vel por todas as telas de IA: uma fonte √ļnica
// (o array de se√ß√Ķes) alimenta tanto o `system` enviado quanto esta pr√©via. As se√ß√Ķes s√£o s√≥
// reapresenta√ß√£o ‚ÄĒ o texto √© id√™ntico ao que a IA recebe.
//   sections = [{key,label,meta,text}]  (as se√ß√Ķes do system)
//   task     = {key,label,meta,text}    (opcional: o 1¬ļ turno, mostrado √† parte)
//   prov     = {model,scope,material,mem,censura,chars,limit,tokens}  (cabe√ßalho, opcional)
function PromptInspector({ title, hint, controls, sections, task, prov, onClose }){
  const [copied, setCopied] = useState(false);
  const all = task ? [...sections, task] : sections;
  const copy = async ()=>{
    try{ await navigator.clipboard.writeText(all.map(s=>s.text).join('\n\n')); setCopied(true); setTimeout(()=>setCopied(false), 1500); }
    catch(e){ setCopied(false); }
  };
  useEffect(()=>{ const onKey=e=>{ if(e.key==='Escape') onClose(); }; document.addEventListener('keydown', onKey); return ()=>document.removeEventListener('keydown', onKey); }, []);
  const pct = prov ? Math.min(100, Math.round((prov.chars/Math.max(1,prov.limit))*100)) : 0;
  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal" style="max-width:640px" onClick=${e=>e.stopPropagation()}>

      </div>

      ${controls && html`<div class="field-label" style="margin:14px 0 8px;padding-top:12px;border-top:1px solid var(--line)">Pr√©via ‚ÄĒ o que ser√° enviado</div>`}
      ${prov && html`<div class="card" style="background:var(--teal-soft);border-color:var(--teal-soft);margin-bottom:10px;padding:10px 12px">
        <div class="row" style="flex-wrap:wrap;gap:4px 16px;font-size:11.5px;color:var(--teal-deep)">
          <div><b>Modelo</b> ¬∑ <span style="font-family:var(--mono)">${prov.model}</span></div>
          ${prov.scope && html`<div><b>Escopo</b> ¬∑ ${prov.scope}</div>`}
          <div><b>Material</b> ¬∑ ${prov.material}</div>
          <div><b>Mem√≥rias</b> ¬∑ ${prov.mem}</div>
          <div><b>Censura</b> ¬∑ ${prov.censura}</div>
          <div><b>Estimativa</b> ¬∑ <span style="font-family:var(--mono)">‚Čą ${prov.tokens.toLocaleString('pt-BR')} tokens</span></div>
        </div>
        <div style="height:5px;border-radius:99px;background:rgba(0,66,122,.16);margin-top:9px;overflow:hidden">
          <div style=${`height:100%;width:${pct}%;background:${pct>=100?'var(--danger)':'var(--teal)'}`}></div>
        </div>
        <div class="meta" style="margin-top:4px;color:var(--teal-deep)">material ${prov.chars.toLocaleString('pt-BR')} / ${prov.limit.toLocaleString('pt-BR')} caracteres${pct>=100?' ‚ÄĒ ser√° truncado':''}</div>
      </div>`}
      <div class="card" style="padding:0;max-height:52vh;overflow:auto">
        ${all.map((s,i)=>html`<details key=${s.key} class="collap" style=${`padding:9px 12px;${i>0?'border-top:1px solid var(--line-soft)':''}`} open=${s.key==='role'||s.key==='mat'}>
          <summary class="field-label" style="margin:0">${s.label}<span class="count" style="margin-left:auto">${s.meta}</span></summary>
          <pre style="white-space:pre-wrap;font-family:var(--mono);font-size:11px;line-height:1.5;margin:8px 0 2px;color:var(--ink-soft)">${s.text}</pre>
        </details>`)}
      </div>
      <div class="row" style="justify-content:flex-end;gap:8px;margin-top:12px">
        <button class="btn sm" onClick=${copy}>${copied?'copiado ‚úď':'copiar prompt'}</button>
        <button class="btn sm primary" onClick=${onClose}>fechar</button>
      </div>
    </div>
  </div>`;
}

function IAAnalisarPanel({ project, docs, codes, codeById, codePath, allCodings, memos, cats, allValues, memory, onAddMemory, onToggleMemory, onDeleteMemory, onSave, onSetMemo, onDeletePrompt }){

  // sugest√Ķes que se INSEREM no campo (ponto de partida edit√°vel), espec√≠ficas por escopo.
  const suggestionsFor = (s)=> (s==='docs' ? IA_MODES_DOCS : s==='codes' ? IA_MODES_CODES : IA_MODES_DOCSCODES).filter(m=>m.id!=='custom');

  const [libOpen, setLibOpen] = useState(false); // dropdown flutuante da biblioteca
  // conversa iterativa (Fase 1): o material vira o `system` TRAVADO da conversa; a tarefa do

  // so uma vez no system, so os turnos crescem ‚ÄĒ cuida do IA_TOTAL_CHAR_LIMIT).
  // A conversa e inicializada do IA_CONV_CACHE (modulo) e gravada de volta a cada mudanca:
  // trocar de mainView desmonta este painel, e sem o cache uma conversa inteira (que custou

  const [busy, setBusy] = useState(false);

  useEffect(()=>{ IA_CONV_CACHE[convCacheKey] = { history, convSystem, convLabel, followup, saved }; }, [convCacheKey, history, convSystem, convLabel, followup, saved]);
  const [memProps, setMemProps] = useState([]);     // memorias sugeridas pela IA (a revisar)

  const openConfig = ()=>{ setShowPrompt(true); markIntroSeen(); };

  const aiStanceMemo = (memos||[]).find(m=>m.scope==='ai_stance' && m.target_id===project?.id);
  const aiInstrMemo  = (memos||[]).find(m=>m.scope==='ai_instructions' && m.target_id===project?.id);

  const instrTouched = useRef(false);

  const ctxKey = `ai_context:${project?.id}`;
  const [injectSel, setInjectSel] = useState(()=> new Set([ctxKey]));
  // sincroniza da fonte (memos) sem atropelar edi√ß√£o: postura sempre reflete o salvo; instru√ß√Ķes
  // refletem o salvo at√© o pesquisador come√ßar a digitar (instrTouched); reset ao trocar de projeto.
  useEffect(()=>{ setStance(aiStanceMemo?.content || 'padrao'); }, [aiStanceMemo?.content]);
  useEffect(()=>{ if(!instrTouched.current) setAiInstr(aiInstrMemo?.content || ''); }, [aiInstrMemo?.content]);
  useEffect(()=>{ if(!stanceTouched.current) setStanceText(aiStanceTextMemo?.content || ''); }, [aiStanceTextMemo?.content]);
  useEffect(()=>{ instrTouched.current=false; stanceTouched.current=false; setInjectSel(new Set([ctxKey])); }, [project?.id]); // eslint-disable-line
  const changeStance = (id)=>{ setStance(id); onSetMemo && onSetMemo('ai_stance', project.id, id); };
  const instrDebRef = useRef(null), stanceTextDebRef = useRef(null);
  const changeInstr = (val)=>{ instrTouched.current=true; setAiInstr(val); clearTimeout(instrDebRef.current); instrDebRef.current = setTimeout(()=>{ onSetMemo && onSetMemo('ai_instructions', project.id, val); }, 700); };
  const changeStanceText = (val)=>{ stanceTouched.current=true; setStanceText(val); clearTimeout(stanceTextDebRef.current); stanceTextDebRef.current = setTimeout(()=>{ onSetMemo && onSetMemo('ai_stance_text', project.id, val); }, 700); };
  const toggleInject = (key)=> setInjectSel(s=>{ const n=new Set(s); n.has(key)?n.delete(key):n.add(key); return n; });
  const memoName = (m)=> m.scope==='ai_context' ? 'Memo para a IA'
    : m.scope==='project' ? 'Memo do projeto'
    : m.scope==='document' ? `Documento: ${(docs.find(d=>d.id===m.target_id)||{}).name||'‚ÄĒ'}`
    : m.scope==='code' ? `C√≥digo: ${codePath(m.target_id).join(' ‚Ėł ')}`
    : m.scope==='coding' ? 'Nota de trecho' : m.scope;
  const injectableMemos = (memos||[]).filter(m=> ['project','document','code','coding'].includes(m.scope) && m.content && m.content.trim());
  const injectedMemos = (memos||[]).filter(m=> injectSel.has(memoKey(m)) && m.content && m.content.trim());

  const changeScope = (s)=>{ setScope(s); };
  // insere uma sugest√£o no campo da tarefa (SUBSTITUI, confirmando se j√° houver texto)
  const useSuggestion = (text)=>{ if(customInstr.trim() && !confirm('Substituir a tarefa atual por esta sugest√£o?')) return; setCustomInstr(text); setLibOpen(false); };
  // prompts salvos pelo usu√°rio = memos de escopo ai_prompt (um por prompt, target_id = uid)
  const savedPrompts = (memos||[]).filter(m=>m.scope==='ai_prompt' && m.content && m.content.trim());
  const savePrompt = ()=>{
    const t = customInstr.trim(); if(!t) return;
    const nm = prompt('Nome deste prompt (para a biblioteca):', t.slice(0,40));
    if(nm===null) return; // cancelou
    onSetMemo && onSetMemo('ai_prompt', uid(), t, (nm.trim() || t.slice(0,40)));
    setLibOpen(false);
  };

  const projectMemo = (memos||[]).find(m=>m.scope==='project' && m.target_id===project?.id);

  const toggleIn = (arr, setArr, id)=> setArr(arr.includes(id) ? arr.filter(x=>x!==id) : [...arr, id]);

  // codigos de censura nao sao categoria analitica ‚ÄĒ ficam fora da lista selecionavel do
  // escopo "Trechos + Codigo" (sua inclusao no material e decidida pelo bloco de censura).
  const selectableCodes = (codes||[]).filter(c=>!c.is_redaction);
  // arvore de codigos (mesma hierarquia/visual da Visualizacao, via CloudCodeNode) pros
  // seletores: filhos/topos a partir de selectableCodes (sem censura) + contagem por codigo.
  const childrenOfSel = (id)=> selectableCodes.filter(c=>c.parent_id===id);
  const selCodeIdSet = new Set(selectableCodes.map(c=>c.id));
  const topSelCodes = selectableCodes.filter(c=> !c.parent_id || !selCodeIdSet.has(c.parent_id));
  // contagem DIRETA por c√≥digo (sem agregar descendentes) ‚ÄĒ de prop√≥sito: selecionar um c√≥digo
  // inclui no material s√≥ os trechos aplicados DIRETAMENTE nele (selCodes.includes(c.code_id)),
  // n√£o os dos subc√≥digos. Mostrar o agregado aqui enganaria (pareceria que os filhos entram).
  const codeCounts = useMemo(()=>{ const m={}; (allCodings||[]).forEach(c=>{ m[c.code_id]=(m[c.code_id]||0)+1; }); return m; }, [allCodings]);
  const closedCats = (cats||[]).filter(c=>CAT_HAS_OPTIONS(c.kind));
  const hasDocFilter = Object.values(docFilter).some(Boolean);
  const matchingDocIds = useMemo(()=>{
    const s = new Set();
    docs.forEach(d=>{
      const ok = Object.entries(docFilter).every(([catId,want])=>{
        if(!want) return true;
        const rows = (allValues||[]).filter(x=>x.document_id===d.id && x.category_id===catId);
        const fin = rows.find(r=>r.layer==='final');
        const pool = fin ? [fin.value] : rows.map(r=>r.value);
        return pool.some(v=>v!=null && String(v).split(CAT_MULTI_SEP).includes(want));
      });
      if(ok) s.add(d.id);
    });
    return s;
  }, [docs, allValues, docFilter]);
  const visibleDocs = hasDocFilter ? docs.filter(d=>matchingDocIds.has(d.id)) : docs;

  // categorias preenchidas do documento (prefere o gabarito quando existe) ‚ÄĒ da contexto
  // de "fonte" pra IA citar junto das observacoes, especialmente na analise por codigo
  const docCatsLine = (docId)=>{
    const parts = (cats||[]).map(cat=>{
      const rows = (allValues||[]).filter(v=>v.document_id===docId && v.category_id===cat.id);
      const fin = rows.find(r=>r.layer==='final');
      const val = fin ? fin.value : rows.map(r=>r.value).filter(Boolean).join(' | ');
      return val ? `${cat.name}: ${val}` : null;
    }).filter(Boolean);
    return parts.length ? parts.join(', ') : '(sem categorias preenchidas)';
  };
  const codeMemoLine = (codeId)=>{
    const m = (memos||[]).find(mm=>mm.scope==='code' && mm.target_id===codeId);
    return m?.content?.trim() || null;
  };
  const docNameOf = (docId)=> docs.find(d=>d.id===docId)?.name || '(documento removido)';

  // censura em scope='codes' (e nas citacoes de docs_codes): a citacao mostrada e o c.quote de UM
  // coding so (o do codigo analitico), que pode ocupar o MESMO trecho de uma censura aplicada como
  // coding separado (code_id diferente). maskQuoteText (via maskQuoteSpans, sobre codingsByDoc)
  // mascara isso. Nos escopos de texto integral (docs/docs_codes) o maskRedactedContent ja
  // reconstroi o texto por posicao, entao a censura em qualquer code_id apaga o intervalo de graca.
  const codingsByDoc = useMemo(()=>{
    const m = {}; (allCodings||[]).forEach(c=>{ (m[c.document_id]=m[c.document_id]||[]).push(c); }); return m;
  }, [allCodings]);

  // documentos cujo conteudo entra no material do escopo atual ‚ÄĒ base UNICA de deteccao de
  // censura pros TRES escopos: docs/docs_codes mostram o texto integral dos documentos
  // selecionados; codes mostra as citacoes dos codigos selecionados (logo, dos documentos
  // desses codigos). Assim a opcao "excluir censura" aparece sempre que houver trecho
  // censurado no material ‚ÄĒ antes a deteccao por escopo era inconsistente e a opcao sumia
  // em Trechos+Codigo / Documentos+Trechos+Codigo. A MASCARA em si continua precisa:
  // maskRedactedContent (texto integral) e maskQuoteText (citacoes, mascara parcial por span).
  // memoizado: isto rodava no corpo do componente a CADA render (inclusive a cada tecla no
  // input de follow-up), varrendo allCodings inteiro ‚ÄĒ agora s√≥ quando a sele√ß√£o/m√°scara muda
  const { redactionCodesPresent, maskedCodeIds } = useMemo(()=>{
    const docIdsInMaterial = scope==='codes'
      ? new Set((allCodings||[]).filter(c=>selCodes.includes(c.code_id)).map(c=>c.document_id))
      : new Set(selDocs);
    // codigos de censura (is_redaction) presentes nesses documentos ‚ÄĒ um checkbox por codigo,
    // default excluido (mascarado); marcar libera incluir aquele tipo nesta analise.
    const present = [...new Set(
        (allCodings||[]).filter(c=>docIdsInMaterial.has(c.document_id)).map(c=>c.code_id)
      )].map(id=>codeById[id]).filter(c=>c && c.is_redaction);
    return { redactionCodesPresent: present, maskedCodeIds: new Set(present.filter(c=>!allowRedact[c.id]).map(c=>c.id)) };
  }, [scope, selCodes, selDocs, allCodings, codeById, allowRedact]);

  const docsBlock = ()=>{
    const chosen = docs.filter(d=>selDocs.includes(d.id));
    return chosen.map(d=>{
      const content = maskRedactedContent(d.content||'', (allCodings||[]).filter(c=>c.document_id===d.id), maskedCodeIds);
      return `--- Documento: ${d.name} (categorias: ${docCatsLine(d.id)}) ---\n${content.slice(0, IA_DOC_CHAR_LIMIT)}`;
    }).join('\n\n');
  };

  // mascara PARCIAL da citacao (maskQuoteSpans top-level): se o PROPRIO code_id for censura (nao
  // liberado), o trecho inteiro vira "[trecho censurado]"; senao mascara so as porcoes cobertas por
  // codings de censura de OUTROS codificadores sobrepostos. Respeita allowRedact (via maskedCodeIds).
  const maskQuoteText = (c)=> maskQuoteSpans(c, codingsByDoc[c.document_id], maskedCodeIds);

  // colapsa codings pelo MESMO span (documento+offsets): em projeto coletivo, varios
  // pesquisadores codificando o trecho EXATO viram UMA entrada, listando quem aplicou ‚ÄĒ em vez
  // de repetir a citacao por codificador (o que inflava frequencia/saturacao e gastava tokens).
  // Dois trechos com texto igual mas spans diferentes sao ocorrencias distintas, ficam ambos.
  const collapseSpans = (list)=>{
    const map = new Map();
    for(const c of list){
      const key = c.document_id+'|'+c.span_start+'|'+c.span_end;
      let g = map.get(key);
      if(!g){ g = { rep:c, authors:[], hasFinal:false }; map.set(key, g); }
      const a = c.author_name||'an√īnimo';
      if(!g.authors.includes(a)) g.authors.push(a);
      if(c.layer==='final') g.hasFinal = true;
    }
    return [...map.values()];
  };
  const spanCoders = (g)=> [...g.authors, ...(g.hasFinal?['final']:[])].join(', ');

  const codesBlock = ()=>{
    const chosen = (allCodings||[]).filter(c=>selCodes.includes(c.code_id));
    return selCodes.map(codeId=>{
      const memo = codeMemoLine(codeId);
      const quotes = collapseSpans(chosen.filter(c=>c.code_id===codeId))
        .map(g=>`"${maskQuoteText(g.rep)}" ‚ÄĒ documento: ${docNameOf(g.rep.document_id)} (categorias: ${docCatsLine(g.rep.document_id)}) [${spanCoders(g)}]`);
      return `--- C√≥digo: ${codePath(codeId).join(' ‚Ėł ')}${memo?`\nMemo do c√≥digo: ${memo}`:''} (${quotes.length} trechos) ---\n${quotes.join('\n')}`;
    }).join('\n\n');
  };

  const docsWithCodingsBlock = ()=>{
    const chosen = docs.filter(d=>selDocs.includes(d.id));
    // filtro opcional de codigos: se nada selecionado, inclui todos os codigos do documento
    const codeFilter = selCodes.length ? new Set(selCodes) : null;
    return chosen.map(d=>{
      const codingsByCode = {};
      (allCodings||[]).filter(c=>c.document_id===d.id && (!codeFilter || codeFilter.has(c.code_id)))
        .forEach(c=>{ (codingsByCode[c.code_id]=codingsByCode[c.code_id]||[]).push(c); });
      const codeBlocks = Object.entries(codingsByCode).map(([codeId,cs])=>{
        const memo = codeMemoLine(codeId);
        const quotes = collapseSpans(cs).map(g=>`"${maskQuoteText(g.rep)}" (${spanCoders(g)})`);
        return `${codePath(codeId).join(' ‚Ėł ')}${memo?` ‚ÄĒ memo: ${memo}`:''}:\n${quotes.join('\n')}`;
      });
      // rotulo filtro-ciente: quando ha filtro, "(nenhum)" significaria so "nenhum DOS SELECIONADOS",
      // nunca "documento sem codificacao" ‚ÄĒ deixar isso explicito evita a IA criticar lacuna inexistente.
      const header = codeFilter ? 'Trechos dos c√≥digos selecionados presentes neste documento:' : 'Codifica√ß√£o aplicada neste documento:';
      const empty = codeFilter ? '(nenhum trecho dos c√≥digos selecionados neste documento ‚ÄĒ o documento pode conter outras codifica√ß√Ķes n√£o exibidas)' : '(nenhuma codifica√ß√£o neste documento)';
      const content = maskRedactedContent(d.content||'', (allCodings||[]).filter(c=>c.document_id===d.id), maskedCodeIds);
      return `--- Documento: ${d.name} (categorias: ${docCatsLine(d.id)}) ---\n${content.slice(0, IA_DOC_CHAR_LIMIT)}\n\n${header}\n${codeBlocks.length?codeBlocks.join('\n\n'):empty}`;
    }).join('\n\n');
  };

  // memoizado: montar o material concatena (e mascara) o texto integral dos documentos
  // selecionados ‚ÄĒ recalcular isso a cada tecla digitada no chat era o custo dominante da
  // tela. Deps = tudo que os blocos leem (sele√ß√£o, docs, codings, m√°scara, memos, categorias).
  const rawMaterial = useMemo(()=>(
    scope==='docs' ? docsBlock()
    : scope==='codes' ? codesBlock()
    : docsWithCodingsBlock()
  ), [scope, selDocs, selCodes, docs, allCodings, maskedCodeIds, codeById, memos, cats, allValues]); // eslint-disable-line
  const materialTruncated = rawMaterial.length > IA_TOTAL_CHAR_LIMIT;
  const buildMaterial = ()=> materialTruncated
    ? rawMaterial.slice(0, IA_TOTAL_CHAR_LIMIT) + '\n\n[...material truncado ‚ÄĒ limite de tamanho da requisi√ß√£o...]'
    : rawMaterial;

  const hasSelection = scope==='codes' ? selCodes.length>0 : selDocs.length>0;

  // monta as PECAS do prompt (papel, memo, descricao do material com os LIMITES da selecao,
  // material, regra de citacao, e a tarefa). A descricao do material e a chave: diz a IA o que
  // ela ve e, sobretudo, o que foi deixado de fora de proposito ‚ÄĒ pra nao confundir recorte
  // com lacuna. buildSystem junta tudo MENOS a tarefa (= prefixo estavel/cacheavel = `system`);
  // buildTask devolve so a tarefa (= 1o turno de usuario). Assim a conversa reusa o mesmo
  // material sem remontar nada a cada follow-up.
  const buildParts = ()=>{
    const memo = projectMemo?.content?.trim() || '(nenhum memo de projeto registrado)';
    const codeNames = (ids)=> ids.map(id=>codePath(id).join(' ‚Ėł ')).join('; ');

    let role, materialDesc, taskLead, cite;
    if(scope==='docs'){
      role = 'Voc√™ √© um assistente de an√°lise qualitativa. Vai analisar o texto bruto de documentos, sem nenhuma codifica√ß√£o aplicada.';
      materialDesc = `√Č o texto integral de ${selDocs.length} documento(s) escolhido(s) pelo pesquisador. N√£o h√° c√≥digos nem trechos destacados ‚ÄĒ trate o conte√ļdo como dado emp√≠rico bruto.`;
      taskLead = 'Analisando o conte√ļdo dos documentos,';
      cite = 'Ao fazer uma observa√ß√£o, cite a fonte (nome exato do documento).';
    } else if(scope==='codes'){
      role = 'Voc√™ √© um assistente de an√°lise qualitativa. Vai analisar trechos j√° codificados, agrupados pelo c√≥digo que receberam.';
      materialDesc = `Cont√©m apenas os trechos dos ${selCodes.length} c√≥digo(s) que o pesquisador selecionou para esta an√°lise: ${codeNames(selCodes)}. `
        + 'O texto integral dos documentos N√ÉO est√° inclu√≠do ‚ÄĒ voc√™ v√™ somente os trechos extra√≠dos. '
        + 'Outros c√≥digos e trechos existem no projeto, mas foram deliberadamente deixados de fora desta sele√ß√£o: N√ÉO trate a aus√™ncia deles como lacuna, falha ou achado.';
      taskLead = 'Analisando os trechos e o que cada c√≥digo re√ļne,';
      cite = 'Ao fazer uma observa√ß√£o, cite a fonte (nome do documento e c√≥digo correspondente, exatamente como aparecem no material).';
    } else { // docs_codes
      const filtered = selCodes.length > 0;
      role = 'Voc√™ √© um assistente de an√°lise qualitativa. Vai analisar documentos em conjunto com a codifica√ß√£o aplicada a eles, relacionando texto e c√≥digos.';
      materialDesc = `√Č o texto integral de ${selDocs.length} documento(s) escolhido(s) e, em cada um, os trechos nele codificados. `
        + (filtered
            ? `ATEN√á√ÉO: foram inclu√≠dos apenas os trechos do(s) c√≥digo(s) selecionado(s): ${codeNames(selCodes)}. `
              + 'Os documentos podem conter muitas outras codifica√ß√Ķes que foram deliberadamente omitidas desta visualiza√ß√£o. '
              + 'N√ÉO interprete a aus√™ncia de outros c√≥digos ‚ÄĒ nem documentos que apare√ßam sem trechos ‚ÄĒ como lacuna de codifica√ß√£o, falha do pesquisador ou achado: o recorte √© intencional.'
            : 'Est√£o inclu√≠das todas as codifica√ß√Ķes presentes nesses documentos.');
      taskLead = 'Analisando os documentos em conjunto com a codifica√ß√£o aplicada (relacionando o que os trechos codificados dizem com o texto em volta),';
      cite = 'Ao fazer uma observa√ß√£o, cite a fonte (nome do documento e, quando for sobre um trecho, o c√≥digo correspondente).';
    }
    if(maskedCodeIds.size){
      materialDesc += ` Trechos marcados como censura (${[...maskedCodeIds].map(id=>codeById[id]?.name).join(', ')}) aparecem como "[censurado]" (quando s√≥ parte de uma cita√ß√£o √© sens√≠vel) ou "[trecho censurado]" (cita√ß√£o inteira) ‚ÄĒ √© uma omiss√£o deliberada do pesquisador, n√£o uma lacuna ou erro de extra√ß√£o.`;
    }

    // tarefa: modo pre-definido usa taskLead + instrucao; "Personalizado" usa a
    // instrucao livre do pesquisador como tarefa inteira (controle total do verbo).
    const task = customInstr.trim() || '(escreva a tarefa ou use uma sugest√£o da biblioteca)';

    return { role, memo, materialDesc, material: buildMaterial(), cite, task };
  };

  // SECOES NOMEADAS do prompt ‚ÄĒ FONTE UNICA: o `system` enviado e a juncao das secoes de
  // sistema (mesma string de sempre, byte a byte), e o PromptInspector mostra essas mesmas
  // secoes rotuladas. A tarefa e o 1o turno de usuario (fora do system), exibida a parte.
  const promptSections = ()=>{
    const p = buildParts();
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const matMeta = (scope==='codes' ? `${selCodes.length} c√≥digo(s)` : `${selDocs.length} doc(s)`) + ` ¬∑ ${p.material.length.toLocaleString('pt-BR')} chars`;
    const stanceObj = IA_STANCES.find(s=>s.id===stance) || IA_STANCES[0];
    const postureText = stance==='personalizado' ? stanceText.trim() : stanceObj.text;
    const roleText = [IA_CONSTITUICAO, postureText, p.role, aiInstr.trim() ? `Instru√ß√Ķes espec√≠ficas deste projeto:\n${aiInstr.trim()}` : ''].filter(Boolean).join('\n\n');
    const memoText = injectedMemos.length
      ? injectedMemos.map(m=>`[${memoName(m)}]\n${m.content.trim()}`).join('\n\n')
      : '(nenhum memo injetado)';
    const sys = [
      { key:'role',  label:'Papel e princ√≠pios',       meta:`postura: ${stanceObj.label.toLowerCase()}`,
        text: roleText },
      { key:'memo',  label:'Memo(s) para a IA',         meta:`${injectedMemos.length} injetado(s)`,
        text: memoText },
      { key:'mem',   label:'Mem√≥ria do projeto',        meta: nMem ? `${nAtiv} de ${nMem} ativas` : 'nenhuma',
        text: memoryBlock(memory) },
      { key:'desc',  label:'Sobre o material',          meta:'o recorte',
        text: `Sobre o material que voc√™ recebeu:\n${p.materialDesc}` },
      { key:'mat',   label:'Material',                  meta: matMeta,
        text: `Material:\n${p.material}` },
      { key:'rules', label:'Regras e formato de sa√≠da', meta:'‚ÄĒ',
        text: `Regras:\n- Baseie-se exclusivamente no material acima; n√£o invente nada al√©m dele.\n- ${p.cite}\n- N√£o comente o tamanho ou a abrang√™ncia da sele√ß√£o: ela foi definida de prop√≥sito pelo pesquisador.\n\nEsta √© uma conversa de an√°lise: responda √† tarefa inicial do pesquisador e, depois, √†s perguntas de acompanhamento, sempre com base neste mesmo material.` },
    ];
    const task = { key:'task', label:'Tarefa ¬∑ 1¬ļ turno', meta: customInstr.trim() ? 'definida' : 'vazia',
      text: p.task };
    return { sys, task };
  };
  // system = juncao das secoes de sistema (identico ao buildSystem antigo).
  const buildSystem = ()=> promptSections().sys.map(s=>s.text).join('\n\n');
  const buildTask = ()=> buildParts().task;
  // proveniencia pro cabecalho do inspetor (modelo/escopo/contagens/estimativa de tokens).
  // tokens ~ (material efetivo, capado no limite, + escala fixa do prompt) / 4 chars por token.
  const buildProv = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const chars = rawMaterial.length;
    return {
      model: currentModelLabel(),
      scope: SCOPES.find(s=>s.id===scope)?.label,
      material: scope==='codes' ? `${selCodes.length} c√≥digo(s)` : `${selDocs.length} doc(s)`,
      mem: nMem ? `${nAtiv} de ${nMem}` : 'nenhuma',
      censura: maskedCodeIds.size ? `${maskedCodeIds.size} mascarada(s)` : (redactionCodesPresent.length ? 'inclu√≠da' : '‚ÄĒ'),
      chars, limit: IA_TOTAL_CHAR_LIMIT,
      tokens: Math.round((Math.min(chars, IA_TOTAL_CHAR_LIMIT) + 1200) / 4),
    };
  };

  const canRun = hasSelection && !!customInstr.trim();

  // aborto: uma chamada pendurada (modelo lento) podia ficar viva depois de trocar de tela,
  // e n√£o havia como o pesquisador cancelar. O controller vale pra an√°lise/follow-up/mem√≥rias;
  // desmontar o painel aborta o fetch em voo. AbortError n√£o vira banner (foi intencional).
  const abortRef = useRef(null);
  const newAbort = ()=>{ abortRef.current?.abort(); const ac = new AbortController(); abortRef.current = ac; return ac; };
  useEffect(()=>()=>abortRef.current?.abort(), []);
  const isAbort = (e)=> e?.name==='AbortError' || /abort/i.test(String(e?.message||''));

  const unsavedConv = history.length>0 && !saved;

  // 1o turno: trava o material no system e manda a tarefa do modo como 1a mensagem de usuario.
  const analyze = async ()=>{
    if(!canRun || busy) return;
    if(unsavedConv && !confirm('Come√ßar uma nova an√°lise descarta a conversa atual, que n√£o foi salva. Continuar?')) return;
    const system = buildSystem();
    const h = [{ role:'user', content: buildTask() }];
    setConvSystem(system); setConvLabel((suggestions.find(s=>s.instr===customInstr.trim())?.label) || customInstr.trim().slice(0,40) || 'An√°lise'); setTaskOpen(false);
    setHistory(h); setFollowup(''); setSaved(false); setErr(''); setBusy(true);
    const ac = newAbort();
    try{
      const text = await askAIChat({ system, messages: h, signal: ac.signal });
      setHistory(x=>[...x, { role:'assistant', content: text, model: currentModelLabel() }]);
    }catch(e){ if(!isAbort(e)) setErr(String(e?.message || e)); }
    finally{ setBusy(false); }
  };

  // follow-up: continua a MESMA conversa reusando o system travado (material entra so 1 vez;
  // so os turnos crescem). buildPrompt nao e remontado.
  const sendFollowup = async ()=>{
    const text = followup.trim();
    if(!text || busy || !convSystem) return;
    const h = [...history, { role:'user', content: text }];
    setHistory(h); setFollowup(''); setSaved(false); setErr(''); setBusy(true);
    const ac = newAbort();
    try{
      const reply = await askAIChat({ system: convSystem, messages: h, signal: ac.signal });
      setHistory(x=>[...x, { role:'assistant', content: reply, model: currentModelLabel() }]);
    }catch(e){ if(!isAbort(e)) setErr(String(e?.message || e)); }
    finally{ setBusy(false); }
  };

    if(unsavedConv && !confirm('Limpar a conversa descarta as perguntas e respostas atuais, que n√£o foram salvas. Continuar?')) return;

  // JSON de mem√≥rias (n√£o for√ßa a an√°lise principal a virar JSON ‚ÄĒ preserva a UX conversacional).
  // Reusa o system travado da conversa; parseia com a mesma toler√Ęncia das opera√ß√Ķes.
  const suggestMemories = async ()=>{

    try{
      const text = await askAIChat({ system: convSystem, messages: [...history, ask], json: true, signal: ac.signal });
      const parsed = parseAIJson(text);

    finally{ setMemBusy(false); }
  };

/* ============ IAResultView ‚ÄĒ uma √öNICA conversa salva (painel direito de Memos) ============
   Espelha o MemoEditor: cabe√ßalho com t√≠tulo + proced√™ncia, conte√ļdo da conversa (markdown)
   e bot√£o de apagar. Mostrado quando se clica numa conversa na navega√ß√£o. */
function IAResultView({ result, onDelete }){
  // apagar em dois passos (o bot√£o vira "confirmar?"), mesmo padr√£o do AccountModal ‚ÄĒ
  // era destrutivo em 1 clique, sem volta
  const [confirming, setConfirming] = useState(false);
  useEffect(()=>{ setConfirming(false); }, [result?.id]);
  if(!result) return html`<div class="empty">
    <div class="t">Selecione uma conversa</div>
    <div>Escolha uma conversa salva √† esquerda para ver o conte√ļdo.</div>
  </div>`;
  const r = result;
  const scopeLabel = r.scope==='docs'?'Documentos':r.scope==='codes'?'Trechos + C√≥digo':'Documentos + Trechos + C√≥digo';
  return html`<div class="section" style="max-width:760px;margin:0 auto">
    <p class="h" style="margin-bottom:2px">${r.mode_label}</p>
    <p class="hint" style="margin:0 0 12px">${scopeLabel} ¬∑ ${r.author_name||'an√īnimo'}${r.created_at?` ¬∑ ${new Date(r.created_at).toLocaleString('pt-BR')}`:''}</p>
    <div class="card"><div dangerouslySetInnerHTML=${{__html: mdLite(r.result)}} /></div>
    <div class="row" style="margin-top:10px;gap:8px">
      ${confirming
        ? html`<button class="btn sm" style="color:var(--danger)" onClick=${()=>onDelete(r.id)}>confirmar exclus√£o?</button>
               <button class="btn sm ghost" onClick=${()=>setConfirming(false)}>cancelar</button>`
        : html`<button class="btn sm ghost" onClick=${()=>setConfirming(true)}>apagar conversa</button>`}
    </div>
  </div>`;
}

/* Revis√£o das mem√≥rias que a IA PROP√ĒS (campo "memory" do JSON, ou turno "Sugerir mem√≥rias").
   Mesmo esp√≠rito da revis√£o de opera√ß√Ķes do IACodificarPanel: nada √© gravado sem confirma√ß√£o;
   cada item pode ser aprovado/editado/recusado. onCommit recebe as entradas finais (editadas e
   aprovadas) ‚ÄĒ o painel pai anexa source/ai_model/mode_label e grava via store.addMemory. */
function MemoryProposalReview({ proposals, onCommit }){
  const [decided, setDecided] = useState({});
  const [edits, setEdits] = useState({});
  const [editing, setEditing] = useState({});
  const [done, setDone] = useState(false);
  const [saving, setSaving] = useState(false);
  useEffect(()=>{ const d={}; (proposals||[]).forEach((_,i)=>{ d[i]=true; }); setDecided(d); setEdits({}); setEditing({}); setDone(false); }, [proposals]);
  if(!proposals || !proposals.length) return null;
  if(done) return html`<div class="card" style="margin-top:10px"><span class="meta">‚úď Mem√≥rias adicionadas ao di√°rio do projeto.</span></div>`;
  const val = (i,f)=> (edits[i] && edits[i][f]!=null) ? edits[i][f] : proposals[i][f];
  const setVal = (i,f,v)=> setEdits(e=>({ ...e, [i]:{ ...(e[i]||{}), [f]:v } }));
  const setAll = v=>{ const d={}; proposals.forEach((_,i)=>{ d[i]=v; }); setDecided(d); };
  const approvedCount = proposals.filter((_,i)=>decided[i]).length;
  async function commit(){
    const entries = proposals
      .map((p,i)=>({ content:String(val(i,'content')||'').trim(), reason:String(val(i,'reason')||'').trim(), keep:!!decided[i] }))
      .filter(e=>e.keep && e.content)
      .map(({content,reason})=>({content,reason}));
    if(!entries.length) return;
    setSaving(true);
    try{ await onCommit(entries); setDone(true); }
    finally{ setSaving(false); }
  }
  return html`<div class="card" style="margin-top:10px;border-color:var(--sky)">
    <p class="h" style="margin:0 0 2px">A IA sugeriu ${proposals.length} mem√≥ria${proposals.length===1?'':'s'} para o projeto</p>
    <p class="hint" style="margin:0 0 8px">Revise antes de gravar ‚ÄĒ nada entra no di√°rio sem sua confirma√ß√£o.</p>
    <div style="display:flex;gap:6px;margin-bottom:6px">
      <button class="btn sm ghost" onClick=${()=>setAll(true)}>Aprovar todas</button>
      <button class="btn sm ghost" onClick=${()=>setAll(false)}>Recusar todas</button>
    </div>
    ${proposals.map((p,i)=>html`<div key=${i} class="card" style="margin:6px 0;padding:8px 10px;${decided[i]?'':'opacity:.5'}">
      <div style="display:flex;gap:8px;align-items:flex-start">
        <input type="checkbox" checked=${!!decided[i]} onChange=${e=>setDecided(d=>({ ...d, [i]:e.target.checked }))} style="margin-top:3px" />
        <div style="flex:1;min-width:0">
          ${editing[i]
            ? html`<textarea class="txtin" rows="2" style="width:100%;box-sizing:border-box;resize:vertical" value=${val(i,'content')} onInput=${e=>setVal(i,'content',e.target.value)}></textarea>
                   <textarea class="txtin" rows="1" style="width:100%;box-sizing:border-box;resize:vertical;margin-top:4px" placeholder="motivo" value=${val(i,'reason')} onInput=${e=>setVal(i,'reason',e.target.value)}></textarea>`
            : html`<div style="font-weight:600">${val(i,'content')}</div>
                   ${val(i,'reason') && html`<div class="meta" style="margin-top:2px">${val(i,'reason')}</div>`}`}
          <button class="btn sm ghost" style="margin-top:4px" onClick=${()=>setEditing(s=>({ ...s, [i]:!s[i] }))}>${editing[i]?'concluir':'editar'}</button>
        </div>
      </div>
    </div>`)}
    <button class="btn sm primary" disabled=${!approvedCount||saving} onClick=${commit}>${saving?'Gravando‚Ä¶':`Adicionar √† mem√≥ria (${approvedCount})`}</button>
  </div>`;
}

/* Di√°rio de insights da IA: lista as mem√≥rias curadas do projeto, com checkbox "usar na an√°lise"
   (controla o flag active ‚Üí s√≥ as ativas entram no prompt, por economia/transpar√™ncia), autoria

    ${list.length>0 && html`<div class="row" style="gap:6px;margin-bottom:10px">
      <button class="btn sm ghost" onClick=${()=>list.forEach(m=>{ if(!m.active) onToggle(m.id,true); })}>ativar todas</button>

    ${list.length===0 && html`<span class="meta">Nenhuma mem√≥ria ainda. A IA pode sugerir ap√≥s uma an√°lise${showAdd?', ou adicione abaixo':''}.</span>`}
    ${list.map(m=>html`<div key=${m.id} class="card" style="margin-bottom:8px;padding:8px 10px;${m.active?'':'opacity:.55'}">
      <label style="display:flex;gap:8px;align-items:flex-start;cursor:pointer">
        <input type="checkbox" checked=${!!m.active} onChange=${e=>onToggle(m.id, e.target.checked)} title="usar na an√°lise" style="margin-top:3px" />
        <span class="node-name" style="flex:1;min-width:0;font-weight:500">${m.content}</span>
      </label>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin:4px 0 0 26px">
        <span class="meta">${m.reason && html`${m.reason} ¬∑ `}${m.author_name||'an√īnimo'}
          ¬∑ ${m.source==='manual' ? 'manual' : (m.ai_model || 'IA')}
          ${m.created_at ? ' ¬∑ '+new Date(m.created_at).toLocaleDateString('pt-BR') : ''}</span>
        ${confirmDel===m.id

              <button class="btn sm" style="color:var(--danger)" onClick=${()=>{ setConfirmDel(null); onDelete(m.id); }}>confirmar?</button>
              <button class="btn sm ghost" onClick=${()=>setConfirmDel(null)}>cancelar</button></span>`

    ${showAdd && html`<div style="margin-top:8px">
      <textarea class="txtin" rows="2" style="width:100%;box-sizing:border-box;resize:vertical" placeholder="adicionar mem√≥ria manualmente (fato/decis√£o do projeto)‚Ä¶" value=${draft} onInput=${e=>setDraft(e.target.value)}></textarea>
      <button class="btn sm" style="margin-top:4px" disabled=${!draft.trim()||adding} onClick=${addManual}>Ôľč adicionar √† mem√≥ria</button>
