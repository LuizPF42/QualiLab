// INSPETOR DE PROMPT — modal que mostra EXATAMENTE o que vai pra IA, seção por seção (papel,
// memo, memória, material, regras, tarefa), com cabeçalho de proveniência (modelo/escopo/
// contagens/estimativa) e "copiar prompt". Reusável por todas as telas de IA: uma fonte única
// (o array de seções) alimenta tanto o `system` enviado quanto esta prévia. As seções são só
// reapresentação — o texto é idêntico ao que a IA recebe.
//   sections = [{key,label,meta,text}]  (as seções do system)
//   task     = {key,label,meta,text}    (opcional: o 1º turno, mostrado à parte)
//   prov     = {model,scope,material,mem,censura,chars,limit,tokens}  (cabeçalho, opcional)
function PromptInspector({ title, hint, controls, sections, task, prov, onClose }){
  const [copied, setCopied] = useState(false);
  const all = task ? [...sections, task] : sections;
  const copy = async ()=>{
    try{ await navigator.clipboard.writeText(all.map(s=>s.text).join('\n\n')); setCopied(true); setTimeout(()=>setCopied(false), 1500); }
    catch(e){ setCopied(false); }
  };
  useEffect(()=>{ const onKey=e=>{ if(e.key==='Escape') onClose(); }; document.addEventListener('keydown', onKey); return ()=>document.removeEventListener('keydown', onKey); }, []);
  const pct = prov ? Math.min(100, Math.round((prov.chars/Math.max(1,prov.limit))*100)) : 0;
  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal" style="max-width:640px" onClick=${e=>e.stopPropagation()}>
      <div class="row" style="justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:12px">
        <div>
          <h3 style="margin:0">${title||'O que será enviado à IA'}</h3>
          <p class="hint" style="margin:2px 0 0">${hint||'Exatamente o texto que a IA recebe — nada é enviado sem passar por aqui.'}</p>
        </div>
        <button class="icon-btn" onClick=${onClose} aria-label="Fechar" style="font-size:15px">✕</button>
      </div>
      ${controls}
      ${controls && html`<div class="field-label" style="margin:14px 0 8px;padding-top:12px;border-top:1px solid var(--line)">Prévia — o que será enviado</div>`}
      ${prov && html`<div class="card" style="background:var(--teal-soft);border-color:var(--teal-soft);margin-bottom:10px;padding:10px 12px">
        <div class="row" style="flex-wrap:wrap;gap:4px 16px;font-size:11.5px;color:var(--teal-deep)">
          <div><b>Modelo</b> · <span style="font-family:var(--mono)">${prov.model}</span></div>
          ${prov.scope && html`<div><b>Escopo</b> · ${prov.scope}</div>`}
          <div><b>Material</b> · ${prov.material}</div>
          <div><b>Memórias</b> · ${prov.mem}</div>
          <div><b>Censura</b> · ${prov.censura}</div>
          <div><b>Estimativa</b> · <span style="font-family:var(--mono)">≈ ${prov.tokens.toLocaleString('pt-BR')} tokens</span></div>
          ${prov.cost && html`<div><b>Custo estimado</b> · <span style="font-family:var(--mono)" title=${prov.cost.title}>${prov.cost.text}</span></div>`}
        </div>
        <div style="height:5px;border-radius:99px;background:rgba(0,66,122,.16);margin-top:9px;overflow:hidden">
          <div style=${`height:100%;width:${pct}%;background:${pct>=100?'var(--danger)':'var(--teal)'}`}></div>
        </div>
        <div class="meta" style="margin-top:4px;color:var(--teal-deep)">material ~${iaPages(prov.chars)} / ~${iaPages(prov.limit)} páginas <span style="opacity:.7">(${prov.chars.toLocaleString('pt-BR')} / ${prov.limit.toLocaleString('pt-BR')} caracteres)</span>${pct>=100?' — será truncado':''}</div>
      </div>`}
      <div class="card" style="padding:0;max-height:52vh;overflow:auto">
        ${all.map((s,i)=>html`<details key=${s.key} class="collap" style=${`padding:9px 12px;${i>0?'border-top:1px solid var(--line-soft)':''}`} open=${s.key==='role'||s.key==='mat'}>
          <summary class="field-label" style="margin:0">${s.label}<span class="count" style="margin-left:auto">${s.meta}</span></summary>
          <pre style="white-space:pre-wrap;font-family:var(--mono);font-size:11px;line-height:1.5;margin:8px 0 2px;color:var(--ink-soft)">${s.text}</pre>
        </details>`)}
      </div>
      <div class="row" style="justify-content:flex-end;gap:8px;margin-top:12px">
        <button class="btn sm" onClick=${copy}>${copied?'copiado ✓':'copiar prompt'}</button>
        <button class="btn sm primary" onClick=${onClose}>fechar</button>
      </div>
    </div>
  </div>`;
}

function IAAnalisarPanel({ project, docs, codes, codeById, codePath, allCodings, memos, cats, allValues, memory, onAddMemory, onToggleMemory, onDeleteMemory, onSave, onSetMemo, onDeletePrompt }){
  const [scope, setScope] = useState('docs'); // docs | codes | docs_codes
  const [selDocs, setSelDocs] = useState([]);
  const [selCodes, setSelCodes] = useState([]);
  const [docFilter, setDocFilter] = useState({}); // {categoryId: valor} — so pra ajudar a marcar varios documentos de uma vez
  const [allowRedact, setAllowRedact] = useState({}); // {codeId: true} — codigos de censura que o pesquisador decidiu incluir nesta analise (default: de fora)
  // toggle "Incluir categorias como metadados dos casos" (Configurar prompt) — DESLIGADO por padrao.
  // Ligado, anexa a cada documento, entre colchetes, so as categorias PREENCHIDAS dele (etiqueta de
  // caso); a guarda no "Sobre o material" viaja junto (ver catsInjected). Vale so nos escopos com
  // documento (docs/docs_codes) — categoria e atributo de documento, e "Trechos + Codigo" nao tem doc.
  // PERSISTIDO por projeto via memo scope 'ai_include_cats' (mesmo padrao de ai_stance) — sincronizado
  // do memo mais abaixo, gravado por changeIncludeCats. Assim a config viaja com o projeto (nuvem, .qualilab).
  const [includeCats, setIncludeCats] = useState(false);
  // Tarefa = texto livre (Personalizado é o default). Os antigos "modos" viram uma BIBLIOTECA de
  // sugestões que se INSEREM no campo (ponto de partida editável), específicas por escopo.
  const suggestionsFor = (s)=> (s==='docs' ? IA_MODES_DOCS : s==='codes' ? IA_MODES_CODES : IA_MODES_DOCSCODES).filter(m=>m.id!=='custom');
  const suggestions = suggestionsFor(scope);
  const [customInstr, setCustomInstr] = useState(''); // a TAREFA (texto livre; as sugestões inserem aqui)
  const [libOpen, setLibOpen] = useState(false); // dropdown flutuante da biblioteca
  // conversa iterativa (Fase 1): o material vira o `system` TRAVADO da conversa; a tarefa do
  // modo e o 1o turno; os follow-ups do pesquisador sao os turnos seguintes (material entra
  // so uma vez no system, so os turnos crescem — cuida do IA_TOTAL_CHAR_LIMIT).
  // A conversa e inicializada do IA_CONV_CACHE (modulo) e gravada de volta a cada mudanca:
  // trocar de mainView desmonta este painel, e sem o cache uma conversa inteira (que custou
  // tokens) sumia so de o pesquisador espiar Memos no meio da analise.
  const convCacheKey = project?.id || 'local';
  const cachedConv = IA_CONV_CACHE[convCacheKey] || {};
  const [history, setHistory] = useState(cachedConv.history||[]); // [{role:'user'|'assistant', content}]
  const [taskOpen, setTaskOpen] = useState(!(cachedConv.history||[]).length); // colapsa a Tarefa quando ja ha conversa (ganha espaco)
  const [convSystem, setConvSystem] = useState(cachedConv.convSystem||''); // system travado enquanto a conversa esta ativa
  const [convLabel, setConvLabel] = useState(cachedConv.convLabel||'');   // rotulo do modo com que a conversa comecou (pra salvar)
  const [followup, setFollowup] = useState(cachedConv.followup||'');      // texto do proximo turno do pesquisador
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [saved, setSaved] = useState(!!cachedConv.saved);
  useEffect(()=>{ IA_CONV_CACHE[convCacheKey] = { history, convSystem, convLabel, followup, saved }; }, [convCacheKey, history, convSystem, convLabel, followup, saved]);
  const [aiPrices, setAiPrices] = useState(AI_PRICES); // referencia de preco p/ estimativa de custo (re-render quando chega)
  useEffect(()=>{ if(!AI_PRICES) loadAiPrices().then(setAiPrices); }, []); // carrega a referencia de preco (calculadora de custo)
  const [memProps, setMemProps] = useState([]);     // memorias sugeridas pela IA (a revisar)
  const [memBusy, setMemBusy] = useState(false);    // turno extra "Sugerir memorias" em andamento
  const [showPrompt, setShowPrompt] = useState(false); // inspetor / configurador do prompt (modal)
  // aviso de 1ª vez (uma vez só, GLOBAL): some ao abrir a config OU clicar "entendi", e não volta
  const introSeenKey = 'qualilab:ai_intro_seen';
  const [introSeen, setIntroSeen] = useState(()=>{ try{ return !!localStorage.getItem(introSeenKey); }catch(e){ return false; } });
  const markIntroSeen = ()=>{ setIntroSeen(true); try{ localStorage.setItem(introSeenKey,'1'); }catch(e){} };
  const openConfig = ()=>{ setShowPrompt(true); markIntroSeen(); };
  // --- CONFIG DO PROMPT (persistida via memos: ai_stance / ai_instructions / ai_include_cats; ai_context = Memo para a IA) ---
  const aiStanceMemo = (memos||[]).find(m=>m.scope==='ai_stance' && m.target_id===project?.id);
  const aiInstrMemo  = (memos||[]).find(m=>m.scope==='ai_instructions' && m.target_id===project?.id);
  const ctxMemo      = (memos||[]).find(m=>m.scope==='ai_context' && m.target_id===project?.id);
  const aiStanceTextMemo = (memos||[]).find(m=>m.scope==='ai_stance_text' && m.target_id===project?.id);
  const aiIncludeCatsMemo = (memos||[]).find(m=>m.scope==='ai_include_cats' && m.target_id===project?.id);
  const aiInjectMemo = (memos||[]).find(m=>m.scope==='ai_inject' && m.target_id===project?.id);
  const [stance, setStance] = useState('padrao');
  const [aiInstr, setAiInstr] = useState('');
  const [stanceText, setStanceText] = useState(''); // texto da postura personalizada
  const instrTouched = useRef(false);
  const stanceTouched = useRef(false);
  const injectTouched = useRef(false);
  const memoKey = (m)=> `${m.scope}:${m.target_id}`;
  const ctxKey = `ai_context:${project?.id}`;
  // selecao de memos injetados — PERSISTIDA por projeto (memo scope 'ai_inject', content = JSON das chaves
  // selecionadas). Sem memo salvo, default = so o "Memo para a IA" (ctxKey). Chaves de memos ja apagados
  // sao inofensivas (injectedMemos filtra pelos memos reais). Array vazio salvo = usuario desmarcou tudo.
  const parseInject = ()=>{ try{ const a = aiInjectMemo?.content ? JSON.parse(aiInjectMemo.content) : null; return Array.isArray(a) ? new Set(a) : new Set([ctxKey]); }catch(e){ return new Set([ctxKey]); } };
  const [injectSel, setInjectSel] = useState(parseInject);
  const injectDebRef = useRef(null);
  // sincroniza da fonte (memos) sem atropelar edição: postura sempre reflete o salvo; instruções
  // refletem o salvo até o pesquisador começar a digitar (instrTouched); reset ao trocar de projeto.
  useEffect(()=>{ setStance(aiStanceMemo?.content || 'padrao'); }, [aiStanceMemo?.content]);
  useEffect(()=>{ if(!instrTouched.current) setAiInstr(aiInstrMemo?.content || ''); }, [aiInstrMemo?.content]);
  useEffect(()=>{ if(!stanceTouched.current) setStanceText(aiStanceTextMemo?.content || ''); }, [aiStanceTextMemo?.content]);
  useEffect(()=>{ setIncludeCats(aiIncludeCatsMemo?.content==='1'); }, [aiIncludeCatsMemo?.content]); // toggle atomico (clique), sem guarda de "touched"
  useEffect(()=>{ if(!injectTouched.current) setInjectSel(parseInject()); }, [aiInjectMemo?.content]); // carrega a selecao salva; guarda pra nao atropelar um toggle recem-feito
  useEffect(()=>{ instrTouched.current=false; stanceTouched.current=false; injectTouched.current=false; setInjectSel(parseInject()); }, [project?.id]); // eslint-disable-line
  const changeStance = (id)=>{ setStance(id); onSetMemo && onSetMemo('ai_stance', project.id, id); };
  const changeIncludeCats = (v)=>{ setIncludeCats(v); onSetMemo && onSetMemo('ai_include_cats', project.id, v ? '1' : ''); };
  const instrDebRef = useRef(null), stanceTextDebRef = useRef(null);
  const changeInstr = (val)=>{ instrTouched.current=true; setAiInstr(val); clearTimeout(instrDebRef.current); instrDebRef.current = setTimeout(()=>{ onSetMemo && onSetMemo('ai_instructions', project.id, val); }, 700); };
  const changeStanceText = (val)=>{ stanceTouched.current=true; setStanceText(val); clearTimeout(stanceTextDebRef.current); stanceTextDebRef.current = setTimeout(()=>{ onSetMemo && onSetMemo('ai_stance_text', project.id, val); }, 700); };
  const toggleInject = (key)=>{ injectTouched.current=true; setInjectSel(s=>{ const n=new Set(s); n.has(key)?n.delete(key):n.add(key); return n; }); };
  // persiste a selecao quando muda por acao do usuario (nao no carregamento do memo — injectTouched guarda)
  useEffect(()=>{ if(!injectTouched.current) return; clearTimeout(injectDebRef.current); const arr=[...injectSel]; injectDebRef.current=setTimeout(()=>{ onSetMemo && onSetMemo('ai_inject', project.id, JSON.stringify(arr)); }, 500); }, [injectSel]); // eslint-disable-line
  const memoName = (m)=> m.scope==='ai_context' ? 'Memo para a IA'
    : m.scope==='project' ? 'Memo do projeto'
    : m.scope==='document' ? `Documento: ${(docs.find(d=>d.id===m.target_id)||{}).name||'—'}`
    : m.scope==='code' ? `Código: ${codePath(m.target_id).join(' ▸ ')}`
    : m.scope==='coding' ? 'Nota de trecho' : m.scope;
  const injectableMemos = (memos||[]).filter(m=> ['project','document','code','coding'].includes(m.scope) && m.content && m.content.trim());
  const injectedMemos = (memos||[]).filter(m=> injectSel.has(memoKey(m)) && m.content && m.content.trim());

  const changeScope = (s)=>{ setScope(s); };
  // insere uma sugestão no campo da tarefa (SUBSTITUI, confirmando se já houver texto)
  const useSuggestion = (text)=>{ if(customInstr.trim() && !confirm('Substituir a tarefa atual por esta sugestão?')) return; setCustomInstr(text); setLibOpen(false); };
  // prompts salvos pelo usuário = memos de escopo ai_prompt (um por prompt, target_id = uid)
  const savedPrompts = (memos||[]).filter(m=>m.scope==='ai_prompt' && m.content && m.content.trim());
  const savePrompt = ()=>{
    const t = customInstr.trim(); if(!t) return;
    const nm = prompt('Nome deste prompt (para a biblioteca):', t.slice(0,40));
    if(nm===null) return; // cancelou
    onSetMemo && onSetMemo('ai_prompt', uid(), t, (nm.trim() || t.slice(0,40)));
    setLibOpen(false);
  };

  const projectMemo = (memos||[]).find(m=>m.scope==='project' && m.target_id===project?.id);

  const toggleIn = (arr, setArr, id)=> setArr(arr.includes(id) ? arr.filter(x=>x!==id) : [...arr, id]);

  // codigos de censura nao sao categoria analitica — ficam fora da lista selecionavel do
  // escopo "Trechos + Codigo" (sua inclusao no material e decidida pelo bloco de censura).
  const selectableCodes = (codes||[]).filter(c=>!c.is_redaction);
  // arvore de codigos (mesma hierarquia/visual da Visualizacao, via CloudCodeNode) pros
  // seletores: filhos/topos a partir de selectableCodes (sem censura) + contagem por codigo.
  const childrenOfSel = (id)=> selectableCodes.filter(c=>c.parent_id===id);
  const selCodeIdSet = new Set(selectableCodes.map(c=>c.id));
  const topSelCodes = selectableCodes.filter(c=> !c.parent_id || !selCodeIdSet.has(c.parent_id));
  // contagem DIRETA por código (sem agregar descendentes) — de propósito: selecionar um código
  // inclui no material só os trechos aplicados DIRETAMENTE nele (selCodes.includes(c.code_id)),
  // não os dos subcódigos. Mostrar o agregado aqui enganaria (pareceria que os filhos entram).
  const codeCounts = useMemo(()=>{ const m={}; (allCodings||[]).forEach(c=>{ m[c.code_id]=(m[c.code_id]||0)+1; }); return m; }, [allCodings]);
  const closedCats = (cats||[]).filter(c=>CAT_HAS_OPTIONS(c.kind));
  const hasDocFilter = Object.values(docFilter).some(Boolean);
  const matchingDocIds = useMemo(()=>{
    const s = new Set();
    docs.forEach(d=>{
      const ok = Object.entries(docFilter).every(([catId,want])=>{
        if(!want) return true;
        const rows = (allValues||[]).filter(x=>x.document_id===d.id && x.category_id===catId);
        const fin = rows.find(r=>r.layer==='final');
        const pool = fin ? [fin.value] : rows.map(r=>r.value);
        return pool.some(v=>v!=null && String(v).split(CAT_MULTI_SEP).includes(want));
      });
      if(ok) s.add(d.id);
    });
    return s;
  }, [docs, allValues, docFilter]);
  const visibleDocs = hasDocFilter ? docs.filter(d=>matchingDocIds.has(d.id)) : docs;

  // pares "categoria: valor" PREENCHIDOS do documento (prefere o gabarito). Filtra vazio e o token
  // "Nao informado": injetar categoria em branco reabriria o recorte != lacuna num eixo novo. Multi-
  // valor (checkbox) mantem os valores reais, so tira os especiais. E a etiqueta de caso do documento.
  const docCatPairs = (docId)=> (cats||[]).map(cat=>{
      const rows = (allValues||[]).filter(v=>v.document_id===docId && v.category_id===cat.id);
      const fin = rows.find(r=>r.layer==='final');
      const raw = fin ? fin.value : rows.map(r=>r.value).filter(Boolean).join(CAT_MULTI_SEP);
      const clean = String(raw||'').split(CAT_MULTI_SEP).map(v=>v.trim()).filter(v=>v && v!==NAO_INFO).join(CAT_MULTI_SEP);
      return clean ? `${cat.name}: ${clean}` : null;
    }).filter(Boolean);
  // etiqueta " [cat: val; cat: val]" pro cabecalho do documento — SO quando o toggle esta ligado E ha
  // par preenchido (documento sem categoria nao recebe colchete). Formato da "etiqueta de caso".
  const docCatsBracket = (docId)=>{
    if(!includeCats) return '';
    const pairs = docCatPairs(docId);
    return pairs.length ? ` [${pairs.join('; ')}]` : '';
  };
  // categorias efetivamente injetadas nesta montagem? (toggle ligado + escopo com documento + ao menos
  // um doc selecionado com categoria preenchida). Comanda a GUARDA no "Sobre o material": etiqueta e
  // guarda viajam JUNTAS ou nada — o pesquisador desliga o material, nao a tendencia do modelo de contar.
  const catsInjected = includeCats && scope!=='codes' && selDocs.some(id=>docCatPairs(id).length>0);
  const codeMemoLine = (codeId)=>{
    const m = (memos||[]).find(mm=>mm.scope==='code' && mm.target_id===codeId);
    return m?.content?.trim() || null;
  };
  const docNameOf = (docId)=> docs.find(d=>d.id===docId)?.name || '(documento removido)';

  // censura em scope='codes' (e nas citacoes de docs_codes): a citacao mostrada e o c.quote de UM
  // coding so (o do codigo analitico), que pode ocupar o MESMO trecho de uma censura aplicada como
  // coding separado (code_id diferente). maskQuoteText (via maskQuoteSpans, sobre codingsByDoc)
  // mascara isso. Nos escopos de texto integral (docs/docs_codes) o maskRedactedContent ja
  // reconstroi o texto por posicao, entao a censura em qualquer code_id apaga o intervalo de graca.
  const codingsByDoc = useMemo(()=>{
    const m = {}; (allCodings||[]).forEach(c=>{ (m[c.document_id]=m[c.document_id]||[]).push(c); }); return m;
  }, [allCodings]);

  // documentos cujo conteudo entra no material do escopo atual — base UNICA de deteccao de
  // censura pros TRES escopos: docs/docs_codes mostram o texto integral dos documentos
  // selecionados; codes mostra as citacoes dos codigos selecionados (logo, dos documentos
  // desses codigos). Assim a opcao "excluir censura" aparece sempre que houver trecho
  // censurado no material — antes a deteccao por escopo era inconsistente e a opcao sumia
  // em Trechos+Codigo / Documentos+Trechos+Codigo. A MASCARA em si continua precisa:
  // maskRedactedContent (texto integral) e maskQuoteText (citacoes, mascara parcial por span).
  // memoizado: isto rodava no corpo do componente a CADA render (inclusive a cada tecla no
  // input de follow-up), varrendo allCodings inteiro — agora só quando a seleção/máscara muda
  const { redactionCodesPresent, maskedCodeIds } = useMemo(()=>{
    const docIdsInMaterial = scope==='codes'
      ? new Set((allCodings||[]).filter(c=>selCodes.includes(c.code_id)).map(c=>c.document_id))
      : new Set(selDocs);
    // codigos de censura (is_redaction) presentes nesses documentos — um checkbox por codigo,
    // default excluido (mascarado); marcar libera incluir aquele tipo nesta analise.
    const present = [...new Set(
        (allCodings||[]).filter(c=>docIdsInMaterial.has(c.document_id)).map(c=>c.code_id)
      )].map(id=>codeById[id]).filter(c=>c && c.is_redaction);
    return { redactionCodesPresent: present, maskedCodeIds: new Set(present.filter(c=>!allowRedact[c.id]).map(c=>c.id)) };
  }, [scope, selCodes, selDocs, allCodings, codeById, allowRedact]);

  const docsBlock = ()=>{
    const chosen = docs.filter(d=>selDocs.includes(d.id));
    return chosen.map(d=>{
      const content = maskRedactedContent(d.content||'', (allCodings||[]).filter(c=>c.document_id===d.id), maskedCodeIds);
      return `--- Documento: ${d.name}${docCatsBracket(d.id)} ---\n${content.slice(0, IA_DOC_CHAR_LIMIT)}`;
    }).join('\n\n');
  };

  // mascara PARCIAL da citacao (maskQuoteSpans top-level): se o PROPRIO code_id for censura (nao
  // liberado), o trecho inteiro vira "[trecho censurado]"; senao mascara so as porcoes cobertas por
  // codings de censura de OUTROS codificadores sobrepostos. Respeita allowRedact (via maskedCodeIds).
  const maskQuoteText = (c)=> maskQuoteSpans(c, codingsByDoc[c.document_id], maskedCodeIds);

  // colapsa codings pelo MESMO span (documento+offsets): em projeto coletivo, varios
  // pesquisadores codificando o trecho EXATO viram UMA entrada, listando quem aplicou — em vez
  // de repetir a citacao por codificador (o que inflava frequencia/saturacao e gastava tokens).
  // Dois trechos com texto igual mas spans diferentes sao ocorrencias distintas, ficam ambos.
  const collapseSpans = (list)=>{
    const map = new Map();
    for(const c of list){
      const key = c.document_id+'|'+c.span_start+'|'+c.span_end;
      let g = map.get(key);
      if(!g){ g = { rep:c, authors:[], hasFinal:false }; map.set(key, g); }
      const a = c.author_name||'anônimo';
      if(!g.authors.includes(a)) g.authors.push(a);
      if(c.layer==='final') g.hasFinal = true;
    }
    return [...map.values()];
  };
  const spanCoders = (g)=> [...g.authors, ...(g.hasFinal?['final']:[])].join(', ');

  const codesBlock = ()=>{
    const chosen = (allCodings||[]).filter(c=>selCodes.includes(c.code_id));
    return selCodes.map(codeId=>{
      const memo = codeMemoLine(codeId);
      const quotes = collapseSpans(chosen.filter(c=>c.code_id===codeId))
        .map(g=>`"${maskQuoteText(g.rep)}" — documento: ${docNameOf(g.rep.document_id)} [${spanCoders(g)}]`);
      return `--- Código: ${codePath(codeId).join(' ▸ ')}${memo?`\nMemo do código: ${memo}`:''} (${quotes.length} trechos) ---\n${quotes.join('\n')}`;
    }).join('\n\n');
  };

  const docsWithCodingsBlock = ()=>{
    const chosen = docs.filter(d=>selDocs.includes(d.id));
    // filtro opcional de codigos: se nada selecionado, inclui todos os codigos do documento
    const codeFilter = selCodes.length ? new Set(selCodes) : null;
    return chosen.map(d=>{
      const codingsByCode = {};
      (allCodings||[]).filter(c=>c.document_id===d.id && (!codeFilter || codeFilter.has(c.code_id)))
        .forEach(c=>{ (codingsByCode[c.code_id]=codingsByCode[c.code_id]||[]).push(c); });
      const codeBlocks = Object.entries(codingsByCode).map(([codeId,cs])=>{
        const memo = codeMemoLine(codeId);
        const quotes = collapseSpans(cs).map(g=>`"${maskQuoteText(g.rep)}" (${spanCoders(g)})`);
        return `${codePath(codeId).join(' ▸ ')}${memo?` — memo: ${memo}`:''}:\n${quotes.join('\n')}`;
      });
      // rotulo filtro-ciente: quando ha filtro, "(nenhum)" significaria so "nenhum DOS SELECIONADOS",
      // nunca "documento sem codificacao" — deixar isso explicito evita a IA criticar lacuna inexistente.
      const header = codeFilter ? 'Trechos dos códigos selecionados presentes neste documento:' : 'Codificação aplicada neste documento:';
      const empty = codeFilter ? '(nenhum trecho dos códigos selecionados neste documento — o documento pode conter outras codificações não exibidas)' : '(nenhuma codificação neste documento)';
      const content = maskRedactedContent(d.content||'', (allCodings||[]).filter(c=>c.document_id===d.id), maskedCodeIds);
      return `--- Documento: ${d.name}${docCatsBracket(d.id)} ---\n${content.slice(0, IA_DOC_CHAR_LIMIT)}\n\n${header}\n${codeBlocks.length?codeBlocks.join('\n\n'):empty}`;
    }).join('\n\n');
  };

  // memoizado: montar o material concatena (e mascara) o texto integral dos documentos
  // selecionados — recalcular isso a cada tecla digitada no chat era o custo dominante da
  // tela. Deps = tudo que os blocos leem (seleção, docs, codings, máscara, memos, categorias).
  const rawMaterial = useMemo(()=>(
    scope==='docs' ? docsBlock()
    : scope==='codes' ? codesBlock()
    : docsWithCodingsBlock()
  ), [scope, selDocs, selCodes, docs, allCodings, maskedCodeIds, codeById, memos, cats, allValues, includeCats]); // eslint-disable-line
  const materialTruncated = rawMaterial.length > IA_TOTAL_CHAR_LIMIT;
  const buildMaterial = ()=> materialTruncated
    ? rawMaterial.slice(0, IA_TOTAL_CHAR_LIMIT) + '\n\n[...material truncado — limite de tamanho da requisição...]'
    : rawMaterial;

  const hasSelection = scope==='codes' ? selCodes.length>0 : selDocs.length>0;

  // monta as PECAS do prompt (papel, memo, descricao do material com os LIMITES da selecao,
  // material, regra de citacao, e a tarefa). A descricao do material e a chave: diz a IA o que
  // ela ve e, sobretudo, o que foi deixado de fora de proposito — pra nao confundir recorte
  // com lacuna. buildSystem junta tudo MENOS a tarefa (= prefixo estavel/cacheavel = `system`);
  // buildTask devolve so a tarefa (= 1o turno de usuario). Assim a conversa reusa o mesmo
  // material sem remontar nada a cada follow-up.
  const buildParts = ()=>{
    const memo = projectMemo?.content?.trim() || '(nenhum memo de projeto registrado)';
    const codeNames = (ids)=> ids.map(id=>codePath(id).join(' ▸ ')).join('; ');

    let role, materialDesc, taskLead, cite;
    if(scope==='docs'){
      role = 'Analise o texto bruto de documentos, sem nenhuma codificação aplicada.';
      materialDesc = `É o texto integral de ${selDocs.length} documento(s) escolhido(s) pelo pesquisador. Não há códigos nem trechos destacados: trate o conteúdo como dado empírico bruto.`;
      taskLead = 'Analisando o conteúdo dos documentos,';
      cite = 'Ao fazer uma observação, cite a fonte (nome exato do documento).';
    } else if(scope==='codes'){
      role = 'Analise os trechos selecionados e já codificados, agrupados pelo código que receberam.';
      materialDesc = `Contém apenas os trechos dos ${selCodes.length} código(s) que o pesquisador selecionou para esta análise: ${codeNames(selCodes)}. `
        + 'O texto integral dos documentos não está incluído: você vê somente os trechos extraídos. '
        + 'Outros códigos e trechos existem no projeto e foram deliberadamente deixados de fora desta seleção; não trate a ausência deles como lacuna, falha ou achado. '
        + 'Tensões, silêncios ou contradições internos ao próprio material selecionado podem ser analisados normalmente.';
      taskLead = 'Analisando os trechos e o que cada código reúne,';
      cite = 'Ao fazer uma observação, cite a fonte (nome do documento e código correspondente, exatamente como aparecem no material).';
    } else { // docs_codes
      const filtered = selCodes.length > 0;
      role = 'Analise os documentos completos em conjunto com a codificação aplicada a eles, relacionando texto e códigos.';
      materialDesc = `É o texto integral de ${selDocs.length} documento(s) escolhido(s) e, em cada um, os trechos nele codificados. `
        + (filtered
            ? `Atenção: foram incluídos apenas os trechos do(s) código(s) selecionado(s): ${codeNames(selCodes)}. `
              + 'Os documentos podem conter muitas outras codificações deliberadamente omitidas desta visualização. '
              + 'Não interprete a ausência de outros códigos, nem documentos que apareçam sem trechos, como lacuna de codificação, falha do pesquisador ou achado: o recorte é intencional. '
              + 'Tensões ou contradições internas ao material que aparece podem ser analisadas normalmente.'
            : 'Estão incluídas todas as codificações deste tipo presentes nesses documentos.');
      taskLead = 'Analisando os documentos em conjunto com a codificação aplicada (relacionando o que os trechos codificados dizem com o texto em volta),';
      cite = 'Ao fazer uma observação, cite a fonte (nome do documento e, quando for sobre um trecho, o código correspondente).';
    }
    if(maskedCodeIds.size){
      materialDesc += ` Trechos marcados como censura (${[...maskedCodeIds].map(id=>codeById[id]?.name).join(', ')}) aparecem como "[censurado]" (quando só parte de uma citação é sensível) ou "[trecho censurado]" (citação inteira): é uma omissão deliberada do pesquisador, não uma lacuna ou erro de extração.`;
    }
    if(catsInjected){
      materialDesc += ' Cada documento pode trazer, entre colchetes após seu identificador, as categorias que o pesquisador lhe atribuiu (atributos do caso, por exemplo tipo de ator ou período). Use-as apenas para situar e comparar os casos; não as converta em contagens, porcentagens ou proporções, e não trate a ausência de uma categoria como lacuna ou achado.';
    }

    // tarefa: modo pre-definido usa taskLead + instrucao; "Personalizado" usa a
    // instrucao livre do pesquisador como tarefa inteira (controle total do verbo).
    const task = customInstr.trim() || '(escreva a tarefa ou use uma sugestão da biblioteca)';

    return { role, memo, materialDesc, material: buildMaterial(), cite, task };
  };

  // SECOES NOMEADAS do prompt — FONTE UNICA: o `system` enviado e a juncao das secoes de
  // sistema (mesma string de sempre, byte a byte), e o PromptInspector mostra essas mesmas
  // secoes rotuladas. A tarefa e o 1o turno de usuario (fora do system), exibida a parte.
  const promptSections = ()=>{
    const p = buildParts();
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const matMeta = (scope==='codes' ? `${selCodes.length} código(s)` : `${selDocs.length} doc(s)`) + ` · ${p.material.length.toLocaleString('pt-BR')} chars`;
    const stanceObj = IA_STANCES.find(s=>s.id===stance) || IA_STANCES[0];
    const postureText = stance==='personalizado' ? stanceText.trim() : stanceObj.text;
    const roleText = [IA_CONSTITUICAO, postureText, p.role, aiInstr.trim() ? `Instruções específicas deste projeto:\n${aiInstr.trim()}` : ''].filter(Boolean).join('\n\n');
    const memoText = injectedMemos.length
      ? injectedMemos.map(m=>`[${memoName(m)}]\n${m.content.trim()}`).join('\n\n')
      : '(nenhum memo injetado)';
    const sys = [
      { key:'role',  label:'Papel e princípios',       meta:`postura: ${stanceObj.label.toLowerCase()}`,
        text: roleText },
      { key:'memo',  label:'Memo(s) para a IA',         meta:`${injectedMemos.length} injetado(s)`,
        text: memoText },
      { key:'mem',   label:'Memória do projeto',        meta: nMem ? `${nAtiv} de ${nMem} ativas` : 'nenhuma',
        text: memoryBlock(memory) },
      { key:'desc',  label:'Sobre o material',          meta:'o recorte',
        text: `Sobre o material que você recebeu:\n${p.materialDesc}` },
      { key:'mat',   label:'Material',                  meta: matMeta,
        text: `Material:\n${p.material}` },
      { key:'rules', label:'Regras e formato de saída', meta:'—',
        text: `Regras:\n- ${p.cite}\n- Trate o que você propõe como construção interpretativa a validar, não como algo que "emerge" do material por si só.\n- Ao afirmar um padrão ou uma leitura dominante, registre também, quando houver, o trecho que a tensiona, o caso que não se encaixa ou a leitura rival que o próprio material sustenta.\n\nEsta é uma conversa de análise: responda à tarefa inicial do pesquisador e, depois, às perguntas de acompanhamento, sempre com base neste mesmo material.` },
    ];
    const task = { key:'task', label:'Tarefa · 1º turno', meta: customInstr.trim() ? 'definida' : 'vazia',
      text: p.task };
    return { sys, task };
  };
  // system = juncao das secoes de sistema (identico ao buildSystem antigo).
  const buildSystem = ()=> promptSections().sys.map(s=>s.text).join('\n\n');
  const buildTask = ()=> buildParts().task;
  // proveniencia pro cabecalho do inspetor (modelo/escopo/contagens/estimativa de tokens).
  // tokens ~ (material efetivo, capado no limite, + escala fixa do prompt) / 4 chars por token.
  const buildProv = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const chars = rawMaterial.length;
    return {
      model: currentModelLabel(),
      scope: SCOPES.find(s=>s.id===scope)?.label,
      material: scope==='codes' ? `${selCodes.length} código(s)` : `${selDocs.length} doc(s)`,
      mem: nMem ? `${nAtiv} de ${nMem}` : 'nenhuma',
      censura: maskedCodeIds.size ? `${maskedCodeIds.size} mascarada(s)` : (redactionCodesPresent.length ? 'incluída' : '—'),
      chars, limit: IA_TOTAL_CHAR_LIMIT,
      tokens: iaPromptTokens(chars),
      cost: aiForecastLabel(iaPromptTokens(chars), aiPrices),
    };
  };

  const canRun = hasSelection && !!customInstr.trim();

  // aborto: uma chamada pendurada (modelo lento) podia ficar viva depois de trocar de tela,
  // e não havia como o pesquisador cancelar. O controller vale pra análise/follow-up/memórias;
  // desmontar o painel aborta o fetch em voo. AbortError não vira banner (foi intencional).
  const abortRef = useRef(null);
  const newAbort = ()=>{ abortRef.current?.abort(); const ac = new AbortController(); abortRef.current = ac; return ac; };
  useEffect(()=>()=>abortRef.current?.abort(), []);
  const isAbort = (e)=> e?.name==='AbortError' || /abort/i.test(String(e?.message||''));

  const unsavedConv = history.length>0 && !saved;
  // custo acumulado da conversa (soma das estimativas por turno; ignora local/gratis)
  const convCost = history.reduce((a,t)=> (t.est && t.est.src!=='local') ? a + (t.est.brl||0) : a, 0);
  const convHasCost = history.some(t=>t.est && t.est.src!=='local');

  // 1o turno: trava o material no system e manda a tarefa do modo como 1a mensagem de usuario.
  const analyze = async ()=>{
    if(!canRun || busy) return;
    if(unsavedConv && !confirm('Começar uma nova análise descarta a conversa atual, que não foi salva. Continuar?')) return;
    const system = buildSystem();
    const h = [{ role:'user', content: buildTask() }];
    setConvSystem(system); setConvLabel((suggestions.find(s=>s.instr===customInstr.trim())?.label) || customInstr.trim().slice(0,40) || 'Análise'); setTaskOpen(false);
    setHistory(h); setFollowup(''); setSaved(false); setErr(''); setBusy(true);
    const ac = newAbort();
    try{
      const text = await askAIChat({ system, messages: h, signal: ac.signal });
      const usage = lastAiUsage(), est = aiCostEstimate(usage);
      setHistory(x=>[...x, { role:'assistant', content: text, model: currentModelLabel(), usage, est }]);
    }catch(e){ if(!isAbort(e)) setErr(String(e?.message || e)); }
    finally{ setBusy(false); }
  };

  // follow-up: continua a MESMA conversa reusando o system travado (material entra so 1 vez;
  // so os turnos crescem). buildPrompt nao e remontado.
  const sendFollowup = async ()=>{
    const text = followup.trim();
    if(!text || busy || !convSystem) return;
    const h = [...history, { role:'user', content: text }];
    setHistory(h); setFollowup(''); setSaved(false); setErr(''); setBusy(true);
    const ac = newAbort();
    try{
      const reply = await askAIChat({ system: convSystem, messages: h, signal: ac.signal });
      const usage = lastAiUsage(), est = aiCostEstimate(usage);
      setHistory(x=>[...x, { role:'assistant', content: reply, model: currentModelLabel(), usage, est }]);
    }catch(e){ if(!isAbort(e)) setErr(String(e?.message || e)); }
    finally{ setBusy(false); }
  };

  const resetConv = ()=>{
    if(unsavedConv && !confirm('Limpar a conversa descarta as perguntas e respostas atuais, que não foram salvas. Continuar?')) return;
    abortRef.current?.abort();
    setHistory([]); setConvSystem(''); setConvLabel(''); setFollowup(''); setErr(''); setSaved(false); setMemProps([]); setTaskOpen(true);
  };

  // "Sugerir memórias desta conversa": turno EXTRA, à parte da conversa em prosa, pedindo só um
  // JSON de memórias (não força a análise principal a virar JSON — preserva a UX conversacional).
  // Reusa o system travado da conversa; parseia com a mesma tolerância das operações.
  const suggestMemories = async ()=>{
    if(!convSystem || memBusy || busy) return;
    setMemBusy(true); setErr('');
    const ask = { role:'user', content: 'Com base nesta conversa e no material, sugira memórias DURÁVEIS sobre o projeto que valham registrar (fatos/decisões, não observações triviais ou transitórias). Responda APENAS com um objeto JSON no formato { "memory": [ { "content": "fato/decisão em 1 frase", "reason": "por que vale lembrar, 1 linha" } ] }, no máximo 8 entradas. Se não houver nada relevante, devolva { "memory": [] }. Sem texto fora do JSON.' };
    const ac = newAbort();
    try{
      const text = await askAIChat({ system: convSystem, messages: [...history, ask], json: true, signal: ac.signal });
      const parsed = parseAIJson(text);
      const props = validateMemProps(parsed?.memory);
      setMemProps(props);
      if(!props.length) setErr('A IA não sugeriu nenhuma memória desta conversa.');
    }catch(e){ if(!isAbort(e)) setErr(String(e?.message || e)); }
    finally{ setMemBusy(false); }
  };

  // salva a conversa INTEIRA (todas as perguntas e respostas) como um resultado unico.
  const save = async ()=>{
    if(!history.length || saved) return;
    const transcript = history.map(t=> (t.role==='user' ? '**Pergunta:** ' : `**IA${t.model?' ('+t.model+')':''}:** `) + t.content).join('\n\n');
    await onSave(scope, convLabel || 'Análise', transcript);
    setSaved(true);
  };

  // seletor de Material numa barra horizontal no topo (libera espaço pras duas telas abaixo).
  const SCOPES = [
    { id:'docs',       label:'Documentos' },
    { id:'codes',      label:'Trechos + Código' },
    { id:'docs_codes', label:'Documentos + Trechos + Código' },
  ];

  return html`<section class="pane" style="flex:1 1 100%">
    <div class="pane-head" style="gap:12px">
      <button class="btn accent" onClick=${openConfig}
        title="Configurar e revisar exatamente o que será enviado à IA">
        <${PromptGearIcon} /> Configurar Prompt <span style="font-family:var(--mono);font-size:11px;font-weight:400;opacity:.85">· ${(IA_STANCES.find(s=>s.id===stance)||IA_STANCES[0]).label.toLowerCase()}${hasSelection?(()=>{ const tk=iaPromptTokens(rawMaterial.length), fc=aiForecastLabel(tk,aiPrices); return html` · ≈ ${tk.toLocaleString('pt-BR')} tokens${fc?html` · <span title=${fc.title}>${fc.text}</span>`:''}`; })():''}</span>
      </button>
      <div class="seg" style="flex-wrap:wrap">
        ${SCOPES.map(s=>html`<button key=${s.id} class=${scope===s.id?'on':''} onClick=${()=>changeScope(s.id)}>${s.label}</button>`)}
      </div>
    </div>

    <div style="flex:1;min-height:0;display:flex">

    <!-- TELA ESQUERDA: configuração da análise -->
    <div class="pane-body scroll" style="flex:0 0 400px;border-right:1px solid var(--line)">
    <div class="section">
    ${!introSeen && html`<div class="modal-bg" onClick=${markIntroSeen}>
      <div class="modal" style="max-width:460px" onClick=${e=>e.stopPropagation()}>
        <div class="row" style="gap:9px;align-items:center;margin-bottom:8px">
          <span style="color:var(--teal-deep);display:inline-flex"><${PromptGearIcon} /></span>
          <h3 style="margin:0">Configure o prompt antes de analisar</h3>
        </div>
        <p class="hint" style="margin:0 0 14px;font-size:13px;line-height:1.6">Antes de iniciar, vale abrir o <b>Configurar Prompt</b> (botão azul no topo) e definir a <b>postura</b> da IA, as <b>instruções próprias</b> e <b>quais memos</b> ela recebe — e conferir a prévia exata do que será enviado. Este aviso aparece só desta vez.</p>
        <div class="row" style="justify-content:flex-end;gap:8px">
          <button class="btn ghost" onClick=${markIntroSeen}>entendi</button>
          <button class="btn primary" onClick=${openConfig}>configurar agora</button>
        </div>
      </div>
    </div>`}

    ${scope==='codes' ? html`<details class="collap field" open>
      <summary class="field-label">Códigos${selCodes.length?` (${selCodes.length} selecionado${selCodes.length===1?'':'s'})`:''}</summary>
      <div class="row" style="margin:6px 0;gap:8px">
        <button class="btn sm ghost" onClick=${()=>setSelCodes(selectableCodes.map(c=>c.id))}>selecionar todos</button>
        <button class="btn sm ghost" onClick=${()=>setSelCodes([])}>limpar seleção</button>
      </div>
      <div class="card tree" style="margin-bottom:10px;max-height:260px;overflow:auto;padding:8px">
        ${selectableCodes.length===0 && html`<span class="meta">Nenhum código no projeto.</span>`}
        ${topSelCodes.map(t=>html`<${CloudCodeNode} key=${t.id} code=${t} childrenOf=${childrenOfSel}
          counts=${codeCounts} selectedIds=${new Set(selCodes)} onToggle=${id=>toggleIn(selCodes, setSelCodes, id)} depthPad=${0} />`)}
      </div>
    </details>` : html`<div>
      ${closedCats.length>0 && html`<details class="collap field" style="margin-bottom:8px" open=${hasDocFilter}>
        <summary class="field-label">Filtrar documentos por categoria${hasDocFilter?' (filtro ativo)':' (opcional, ajuda a marcar vários de uma vez)'}</summary>
        <div class="row" style="gap:8px;flex-wrap:wrap;margin-top:8px">
          ${closedCats.map(cat=>{ const opts=(cat.options||[]).filter(o=>!isSpecialOpt(o));
            return html`<select key=${cat.id} class="opt" style="min-width:160px"
              value=${docFilter[cat.id]||''} onChange=${e=>{ const v=e.target.value; setDocFilter(f=>{ const n={...f}; if(v) n[cat.id]=v; else delete n[cat.id]; return n; }); }}>
              <option value="">${cat.name}: qualquer</option>
              ${opts.map(o=>html`<option value=${o}>${cat.name}: ${o}</option>`)}
            </select>`;
          })}
          ${hasDocFilter && html`<button class="btn sm ghost" onClick=${()=>setDocFilter({})}>limpar filtro</button>`}
        </div>
      </details>`}
      <details class="collap field" open>
        <summary class="field-label">Documentos${selDocs.length?` (${selDocs.length} selecionado${selDocs.length===1?'':'s'})`:''}</summary>
        <div class="row" style="margin:6px 0;gap:8px">
          <button class="btn sm ghost" onClick=${()=>setSelDocs(visibleDocs.map(d=>d.id))}>selecionar ${hasDocFilter?'visíveis':'todos'}</button>
          <button class="btn sm ghost" onClick=${()=>setSelDocs([])}>limpar seleção</button>
        </div>
        <div class="card" style="margin-bottom:10px">
          ${visibleDocs.length===0 && html`<span class="meta">${docs.length===0?'Nenhum documento no projeto.':'Nenhum documento corresponde ao filtro.'}</span>`}
          ${visibleDocs.map(d=>html`<button key=${d.id} class="opt ${selDocs.includes(d.id)?'on':''}" style="display:flex;gap:6px;align-items:flex-start;width:100%;margin-bottom:4px;font-size:11px;line-height:1.35"
            onClick=${()=>toggleIn(selDocs, setSelDocs, d.id)}>${selDocs.includes(d.id)?'☑':'☐'}<span style="flex:1;text-align:justify">${d.name}</span></button>`)}
        </div>
      </details>
      ${scope==='docs_codes' && html`<details class="collap field" style="margin-bottom:10px">
        <summary class="field-label">Códigos — filtro opcional${selCodes.length?` (${selCodes.length} selecionado${selCodes.length===1?'':'s'})`:' (vazio = todos)'}</summary>
        <div class="row" style="margin:6px 0;gap:8px">
          <button class="btn sm ghost" onClick=${()=>setSelCodes(selectableCodes.map(c=>c.id))}>selecionar todos</button>
          <button class="btn sm ghost" onClick=${()=>setSelCodes([])}>limpar seleção</button>
        </div>
        <div class="card tree" style="max-height:240px;overflow:auto;padding:8px">
          ${selectableCodes.length===0 && html`<span class="meta">Nenhum código no projeto.</span>`}
          ${topSelCodes.map(t=>html`<${CloudCodeNode} key=${t.id} code=${t} childrenOf=${childrenOfSel}
            counts=${codeCounts} selectedIds=${new Set(selCodes)} onToggle=${id=>toggleIn(selCodes, setSelCodes, id)} depthPad=${0} />`)}
        </div>
      </details>`}
    </div>`}

    ${redactionCodesPresent.length>0 && html`<div class="card" style="margin-bottom:10px">
      <div class="field-label">⦸ Censura na seleção</div>
      <p class="hint" style="margin:0 0 6px">Por padrão, ficam fora do material enviado à IA. Marque os que valem como contexto.</p>
      ${redactionCodesPresent.map(c=>html`<label key=${c.id} class="row" style="gap:6px;font-size:12.5px;cursor:pointer;align-items:center">
        <input type="checkbox" checked=${!!allowRedact[c.id]} onChange=${e=>setAllowRedact(x=>({...x,[c.id]:e.target.checked}))} />
        Incluir trechos de "${c.name}"
      </label>`)}
    </div>`}

    ${materialTruncated && html`<div class="banner warn" style="margin-bottom:10px">A seleção tem ~${iaPages(rawMaterial.length)} páginas — mais do que a IA analisa bem de uma vez (o limite é ~${iaPages(IA_TOTAL_CHAR_LIMIT)} páginas). Só as primeiras ~${iaPages(IA_TOTAL_CHAR_LIMIT)} páginas serão enviadas; para uma leitura completa, selecione menos itens de cada vez — a IA rende mais em recortes focados.</div>`}
    ${history.length>0 && html`<p class="hint" style="margin:0">Conversa em andamento à direita. Mude a seleção e clique em <b>Analisar de novo</b> (no chat) para recomeçar com outro material.</p>`}
    </div>
    </div>

    <!-- TELA DIREITA: chat da conversa (cabeçalho = modalidade) -->
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;background:var(--paper)">
      <div class="pane-head" style="gap:8px;cursor:pointer" onClick=${()=>setTaskOpen(o=>!o)} title=${taskOpen?'Recolher a tarefa':'Abrir a tarefa'}>
        <span class="caret">${taskOpen?'▾':'▸'}</span>
        <span class="field-label" style="margin:0">Tarefa</span>
        ${taskOpen
          ? html`<span class="meta" style="margin-left:auto">o que a IA deve fazer nesta análise</span>`
          : html`<span class="meta" style="margin-left:auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title=${customInstr.trim()}>${customInstr.trim() || '(vazia)'}</span>`}
      </div>
      ${taskOpen && html`<div style="padding:8px 14px;border-bottom:1px solid var(--line-soft);background:var(--surface);position:relative">
        <textarea class="txtin" rows="2" style="resize:vertical" placeholder="Descreva a tarefa… ou use uma sugestão da biblioteca abaixo como ponto de partida"
          value=${customInstr} onInput=${e=>setCustomInstr(e.target.value)}></textarea>
        <div class="row" style="gap:8px;margin-top:6px">
          <button class="btn sm" onClick=${()=>setLibOpen(o=>!o)}>biblioteca de prompts ▾</button>
          <button class="btn sm" disabled=${!customInstr.trim()} onClick=${savePrompt} title="Salvar o texto atual como um prompt reutilizável">✦ salvar</button>
        </div>
        ${libOpen && html`<div style="position:fixed;inset:0;z-index:40" onClick=${()=>setLibOpen(false)}></div>`}
        ${libOpen && html`<div style="position:absolute;left:14px;right:14px;top:100%;margin-top:-2px;z-index:41;background:var(--surface);border:1px solid var(--line);border-radius:11px;box-shadow:0 12px 30px rgba(0,0,0,.18);padding:8px;max-height:280px;overflow:auto">
          ${savedPrompts.length>0 && html`<div class="meta" style="text-transform:uppercase;letter-spacing:.05em;margin:4px 6px 6px;font-weight:600">Salvos por você</div>`}
          ${savedPrompts.map(m=>html`<div key=${m.id} class="node-row appliable" style="align-items:center;gap:6px;padding:6px 8px;cursor:pointer" onClick=${()=>useSuggestion(m.content)}>
            <span style="color:var(--teal-deep);flex:none">✦</span>
            <span class="node-name" style="flex:1;min-width:0;font-weight:600;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title=${m.label||m.content}>${m.label||m.content.slice(0,40)}</span>
            <button class="icon-btn" title="Apagar prompt salvo" style="flex:none;font-size:12px" onClick=${e=>{ e.stopPropagation(); if(confirm('Apagar este prompt salvo?')) onDeletePrompt && onDeletePrompt(m.id); }}>🗑</button>
          </div>`)}
          <div class="meta" style="text-transform:uppercase;letter-spacing:.05em;margin:8px 6px 6px;font-weight:600">Sugeridas do QualiLab</div>
          ${suggestions.map(s=>html`<div key=${s.id} class="node-row appliable" style="flex-direction:column;align-items:flex-start;gap:1px;padding:6px 8px;cursor:pointer" onClick=${()=>useSuggestion(s.instr)}>
            <span class="node-name" style="font-weight:600;font-size:12.5px">${s.label}</span>
            <span class="meta" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%">${s.instr}</span>
          </div>`)}
        </div>`}
      </div>`}
      <div class="pane-body scroll" style="padding:16px">
        ${history.length===0 && html`<div style="text-align:center;max-width:360px;margin:56px auto 0">
          <p class="meta" style="font-size:13px;line-height:1.7;margin:0 0 16px">Configure o material à esquerda e escreva a tarefa acima (ou use uma sugestão), depois inicie a análise.</p>
          <button class="btn primary" style="min-width:180px;justify-content:center" disabled=${busy || !canRun} onClick=${analyze}>${busy?'iniciando…':'Iniciar Análise'}</button>
          ${!canRun && !busy && html`<p class="hint" style="margin:10px 0 0">Selecione ${scope==='codes'?'ao menos um código':'ao menos um documento'} e escreva a tarefa (ou use uma sugestão) para começar.</p>`}
        </div>`}
        ${history.map((t,i)=> i===0 ? null : html`<div key=${i} class="card" style=${`margin-bottom:10px;${t.role==='user'?'background:var(--teal-soft);border-color:var(--teal-soft)':''}`}>
          <div class="field-label" style="margin-bottom:4px;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap">
            <span>${t.role==='user' ? 'Você' : ('IA' + (t.model ? ' — '+t.model : ''))}</span>
            ${t.role==='assistant' && t.est && html`<span class="meta" style="font-weight:400" title=${t.usage?`entrada ${(t.usage.input||0).toLocaleString('pt-BR')} · saída ${(t.usage.output||0).toLocaleString('pt-BR')} tokens${t.est.src&&t.est.src!=='local'?' · US$ '+(t.est.usd||0).toFixed(4)+' · '+t.est.src:''}`:''}>· ${t.est.src==='local' ? 'grátis (local)' : ('~'+iaMoney(t.est.brl,'BRL'))}</span>`}
          </div>
          ${t.role==='user'
            ? html`<div style="white-space:pre-wrap;font-size:13px">${t.content}</div>`
            : html`<div dangerouslySetInnerHTML=${{__html: mdLite(t.content)}} />`}
        </div>`)}
        ${busy && html`<div class="card" style="margin-bottom:10px">
          <div class="field-label" style="margin-bottom:6px">IA</div>
          <div class="row" style="gap:10px;align-items:center">
            <div class="typing"><span></span><span></span><span></span></div>
            <button class="btn sm ghost" onClick=${()=>abortRef.current?.abort()}>cancelar</button>
          </div>
        </div>`}
        ${err && html`<div class="banner err" style="margin-top:10px">${err}</div>`}
        ${onAddMemory && html`<${MemoryProposalReview} proposals=${memProps} onCommit=${async (entries)=>{
          for(const e of entries) await onAddMemory({ content:e.content, reason:e.reason, source:'ai', ai_model:currentModelLabel(), mode_label:convLabel || 'Análise com IA' });
        }} />`}
      </div>

      ${history.length>0 && html`<div style="flex:none;border-top:1px solid var(--line);background:var(--surface);padding:10px 14px">
        <textarea class="txtin" rows="2" style="resize:vertical" placeholder=${'Continuar a conversa (ex.: "desenvolva o ponto 2", "compare com o outro documento")… Enter envia, Shift+Enter quebra linha'}

          <button class="btn sm ghost" disabled=${busy} onClick=${resetConv}>Limpar conversa</button>

    ${showPrompt && (()=>{ const ps = promptSections();

          ${stance==='personalizado'
            ? html`<textarea class="txtin" rows="3" style="resize:vertical;margin-top:8px"
                placeholder="Descreva a postura/papel que a IA deve assumir nesta análise (substitui as posturas prontas acima)…"
                value=${stanceText} onInput=${e=>changeStanceText(e.target.value)}></textarea>`
            : html`<div style="margin-top:8px;font-size:12.5px;line-height:1.55;color:var(--ink-soft)">${(IA_STANCES.find(s=>s.id===stance)||IA_STANCES[0]).text}</div>`}
        </div>
        <div class="field" style="margin-bottom:12px">
          <div class="field-label">Instruções próprias à IA</div>
          <textarea class="txtin" rows="2" style="resize:vertical" placeholder="Guias que sempre entram no prompt (ex.: priorize a linguagem dos entrevistados)…" value=${aiInstr} onInput=${e=>changeInstr(e.target.value)}></textarea>

   e botão de apagar. Mostrado quando se clica numa conversa na navegação. */
