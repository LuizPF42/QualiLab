<script>
  // captura erros do modulo (import falho, sintaxe, runtime) e mostra na tela
  function showFatal(msg){
    var el=document.getElementById('app'); if(!el) return;
    var esc=String(msg==null?'erro desconhecido':msg).replace(/[<>&]/g,function(c){return ({'<':'&lt;','>':'&gt;','&':'&amp;'})[c];});
    el.innerHTML='<div style="font-family:system-ui,sans-serif;padding:24px;max-width:720px;margin:24px auto;color:#1A1B1E">'
      +'<h2 style="font-family:Georgia,serif;margin:0 0 6px">QualiLab nao carregou</h2>'
      +'<p style="color:#5C5F66;margin:0 0 12px">Houve um erro ao iniciar. O detalhe abaixo ajuda a depurar. Causas comuns: alguma biblioteca de CDN bloqueada pela rede, ou um erro de digitacao ao colar as credenciais do Supabase.</p>'
      +'<pre style="white-space:pre-wrap;background:#F3ECD9;border:1px solid #d9c89a;border-radius:8px;padding:12px;font-size:12px;overflow:auto">'+esc+'</pre></div>';
  }
  window.addEventListener('error', function(e){ showFatal((e.error&&e.error.stack)||e.message||(e.filename?(e.filename+':'+e.lineno):'')||'erro'); });
  window.addEventListener('unhandledrejection', function(e){ var r=e.reason; showFatal((r&&(r.stack||r.message))||String(r)); });
</script>
<style>
  :root{
    --paper:#F4F3EF; --surface:#FFFFFF; --ink:#1A1B1E; --ink-soft:#5C5F66; --ink-faint:#8B8E94;
    --line:#E5E3DD; --line-soft:#EEECE6;
    /* paleta FGV: azul-marinho (primario) + azul-celeste (acento). nomes --teal* mantidos por compatibilidade */
    --teal:#00427A; --teal-deep:#002B5C; --teal-soft:#E2ECF5; --sky:#1B9DD9;
    --amber:#8A6D1F; --amber-soft:#F3ECD9; --danger:#B23A3A;
    --serif:"Newsreader","Iowan Old Style",Palatino,Georgia,serif;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"JetBrains Mono","SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;
  }
  /* modo escuro do app inteiro: sobrepoe as MESMAS variaveis do :root quando html[data-theme=dark]
     (setado pelo state darkMode no App). A maior parte da UI vira escura de graca por usar var(--*).
     As 3 regras abaixo cobrem o que nao depende so de variavel (banner de erro e o tema sepia do
     leitor sob fundo escuro). As cores dos codigos (tint) viram escuras via codeColor(...,dark). */
  [data-theme="dark"]{
    --paper:#1C1C1E; --surface:#2C2C2E; --ink:#F0EFEB; --ink-soft:#A0A09A; --ink-faint:#6B6B6B;
    --line:#3A3A3C; --line-soft:#2E2E30;
    --teal:#4A9EDB; --teal-deep:#76BBEC; --teal-soft:#1A2E3F; --sky:#5BB8F5;
    --amber:#C8A84B; --amber-soft:#2E2510; --danger:#E06060;
  }
  [data-theme="dark"] .banner.err{background:#3D1A1A;border-color:#7A3A3A;color:#F08080;}
  [data-theme="dark"] .reader-pane.theme-sepia{background:#2A2218;}
  [data-theme="dark"] .reader-pane.theme-sepia .reader{color:#D4C9A8;}
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);font-size:14px;}
  #app{height:100%;}
  ::selection{background:rgba(0,66,122,.18);}
  button{font-family:var(--sans);cursor:pointer;}
  input,select,textarea{font-family:var(--sans);color:var(--ink);}
  .scroll::-webkit-scrollbar{width:10px;height:10px;}
  .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  :focus-visible{outline:2px solid var(--sky);outline-offset:2px;}

  .app{display:flex;flex-direction:column;height:100vh;}
  header.top{background:var(--surface);border-bottom:1px solid var(--line);padding:8px 14px;display:flex;flex-direction:column;gap:8px;}
  .top-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:-.01em;color:var(--teal-deep);}

  .btn{font-size:13px;font-weight:500;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 12px;display:inline-flex;align-items:center;gap:7px;}

<script type="module">
import { h, render } from 'https://esm.sh/preact@10';

// carregamento sob demanda (uma falha aqui vira erro tratavel, nao tela em branco)
let _pdfjs=null, _mammoth=null, _JSZip=null, _createClient=null, _SQL=null, _XLSX=null;
async function getPdfjs(){ if(!_pdfjs){ _pdfjs=await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs'); try{ _pdfjs.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs'; }catch(e){} } return _pdfjs; }
async function getMammoth(){ if(!_mammoth){ const m=await import('https://esm.sh/mammoth@1.8.0'); _mammoth=m.default||m; } return _mammoth; }
async function getJSZip(){ if(!_JSZip){ const m=await import('https://esm.sh/jszip@3.10.1'); _JSZip=m.default||m; } return _JSZip; }
async function getCreateClient(){ if(!_createClient){ const m=await import('https://esm.sh/@supabase/supabase-js@2'); _createClient=m.createClient; } return _createClient; }
// SheetJS: le .xlsx/.xls no navegador (para o import de planilha Excel, mesmo fluxo do .csv)

// sql.js: SQLite compilado para WASM, p/ ler o .sqlite3 nativo do Taguette no navegador
async function getSqlJs(){

}

/* ============ CONFIG ============

// AI_ENABLED — chave da unificacao dos forks. Este arquivo (ai-lab) e a FONTE UNICA: com
// AI_ENABLED=true serve a versao com IA; gerar a versao "estavel" (sem IA) = este mesmo arquivo
// com AI_ENABLED=false (esconde as telas "Codificar/Analisar com IA", o card de IA em "Minha
// Conta" e os caminhos de IA). O codigo de IA segue presente porem dormente — se a versao
// estavel precisar de ZERO codigo de IA (auditoria), remova o bloco entre os marcadores
// "AI-BLOCK START/END" antes de publicar (strip simples, sem build). Censura (is_redaction) NAO
// e gateada por aqui: e uma feature geral de codificacao, nao uma tela de IA.
const AI_ENABLED = false;

/* ============ CORES (matiz = familia, luminosidade = profundidade) ============
   hueDeg (opcional, 0-359): cor personalizada definida na familia (nivel 0) e
   copiada para os descendentes na criacao/cascata. Quando ausente, usa a
   paleta automatica (HUES[hue]). */
const HUES = [210, 28, 150, 350, 268, 184, 322, 70];
function codeColor(hue, depth, hueDeg, dark=false){
  // hueDeg===-1: marcador de cinza personalizado (sem matiz, saturacao 0). hueDeg===-2: preto
  // solido (sem matiz, sem variar por profundidade — diferente do cinza, que ainda escurece/
  // clareia com a profundidade igual as cores normais). Ambos reaproveitam a mesma coluna int
  // em vez de campo novo no banco. Preto e mais reconhecivel como "censurado" que cinza.
  const isGray = hueDeg===-1, isBlack = hueDeg===-2;
  const H = (isGray||isBlack) ? 0 : (hueDeg!=null) ? ((hueDeg%360)+360)%360 : HUES[((hue % HUES.length)+HUES.length)%HUES.length];
  const S = (isGray||isBlack) ? 0 : 58, tintS = (isGray||isBlack) ? 0 : 55;
  const solidL = isBlack ? 0 : Math.min(70, 32 + depth*13);
  // em dark mode, o tint (fundo do grifo) usa luminosidade baixa (fundo escuro tintado) em vez
  // do pastel claro — senao os grifos viram blocos claros e berrantes sobre o fundo escuro.
  const bgL = dark ? Math.max(18, 24 - depth*2) : Math.min(94, 86 + depth*3);
  return { solid:`hsl(${H} ${S}% ${solidL}%)`, tint:`hsl(${H} ${tintS}% ${bgL}%)`, H, isGray, isBlack };
}
/* extrai o matiz (0-359) de um hex, sem encaixar na paleta fixa (usado p/ cor personalizada) */
function hexToHue(hex){
  const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex||'');
  if(!m) return 0;
  const r=parseInt(m[1],16)/255, g=parseInt(m[2],16)/255, b=parseInt(m[3],16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  let h=0;
  if(d!==0){ if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0) h+=360; }
  return Math.round(h);
}

/* ============ TIPOS DE CATEGORIA ============
   'single' (token legado) = Multipla Escolha. Os demais tokens sao novos.
   Os tipos com lista de valores: select, single, checkbox. Caixa de Selecao
   guarda varios valores num unico campo, separados por CAT_MULTI_SEP. */
const CAT_KINDS = [
  { id:'select',   label:'Texto Fechado' },
  { id:'text',     label:'Texto Aberto' },
  { id:'date',     label:'Data' },
  { id:'single',   label:'Múltipla Escolha' },
  { id:'checkbox', label:'Caixa de Seleção' },
];
const CAT_HAS_OPTIONS = (k)=> k==='select' || k==='single' || k==='checkbox';
const CAT_MULTI_SEP = ' | ';
// valores especiais guardados dentro de options (sem precisar de colunas novas):
// NAO_INFO = "o documento nao informa"; OUTROS = habilita um valor livre "Outros".
const NAO_INFO = 'Não informado';
const OUTROS = 'Outros';
const isSpecialOpt = (o)=> o===NAO_INFO || o===OUTROS;

/* ============ EXTRACAO DE TEXTO ============ */
async function extractText(file){
  const n = (file.name||'').toLowerCase();
  if(n.endsWith('.txt')||n.endsWith('.md')||n.endsWith('.markdown')|| (file.type||'').startsWith('text/'))
    return await file.text();
  if(n.endsWith('.docx')){
    const ab = await file.arrayBuffer();
    const r = await (await getMammoth()).extractRawText({ arrayBuffer: ab });
    return (r && r.value) || '';
  }
  if(n.endsWith('.pdf')){
    const ab = await file.arrayBuffer();
    const pdfjsLib = await getPdfjs();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    const pages = [];
    for(let p=1;p<=pdf.numPages;p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent({ includeMarkedContent: false });

      // Coleta itens com posição; descarta itens só-espaço (artefatos de justificação)
      const items = tc.items
        .filter(it => 'str' in it && it.str.trim().length > 0)
        .map(it => ({
          str: it.str,
          x: it.transform[4],
          y: it.transform[5],
          w: it.width,
          h: Math.abs(it.height) || 10,
        }));

      if(!items.length){ pages.push(''); continue; }

      const avgH = items.reduce((s,it) => s + it.h, 0) / items.length;
      const spaceThreshold = avgH * 0.25;

      // Agrupa em linhas por Y (tolerância = 40% da altura média)
      items.sort((a,b) => b.y - a.y || a.x - b.x);
      const lines = [];
      let cur = [items[0]];
      for(let i = 1; i < items.length; i++){
        if(Math.abs(items[i].y - cur[0].y) < avgH * 0.4){
          cur.push(items[i]);
        } else {
          lines.push(cur);
          cur = [items[i]];
        }
      }
      lines.push(cur);
      lines.forEach(l => l.sort((a,b) => a.x - b.x));

      const lH = i => Math.max(...lines[i].map(it => it.h));

      function lineToText(line){
        let t = line[0].str;
        for(let i = 1; i < line.length; i++){
          const gap = line[i].x - (line[i-1].x + line[i-1].w);
          if(gap > spaceThreshold && !t.endsWith(' ') && !line[i].str.startsWith(' ')) t += ' ';
          t += line[i].str;
        }
        return t.trim();
      }

      // Une linhas em parágrafos: gap > 1.6× altura local = parágrafo novo; senão junta com espaço
      const paras = [];
      let para = lineToText(lines[0]);
      for(let k=1;k<lines.length;k++){
        const gapY = lines[k-1][0].y - lines[k][0].y;
        const localH = Math.max(lH(k-1), lH(k));
        const t = lineToText(lines[k]);
        if(gapY > localH * 1.6){
          paras.push(para.trim());
          para = t;
        } else {
          // Trata hifenização: linha termina em hífen → remove e une direto
          para = para.endsWith('-') ? para.slice(0,-1)+t : para+' '+t;
        }
      }
      paras.push(para.trim());

      pages.push(paras.join('\n\n'));
    }
    return pages.join('\n\n');
  }
  return await file.text();
}

/* ============ RUNS (segmentacao do texto para os grifos) ============ */
function buildRuns(text, codings, extraPoints){
  const b = new Set([0, text.length]);
  codings.forEach(c=>{ if(c.span_start>=0 && c.span_end>c.span_start){ b.add(c.span_start); b.add(c.span_end);} });
  (extraPoints||[]).forEach(p=>{ if(p>=0 && p<=text.length) b.add(p); });
  const pts = [...b].filter(p=>p>=0&&p<=text.length).sort((x,y)=>x-y);
  const runs=[];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], z=pts[i+1]; if(z<=a) continue;
    runs.push({ start:a, end:z, text:text.slice(a,z), codings:codings.filter(c=>c.span_start>=0&&c.span_start<=a&&c.span_end>=z) });
  }
  return runs;
}

/* mascara trechos marcados como censura (code.is_redaction) antes de mandar pra IA — so
   considera o codigo da PROPRIA linha de coding, nao verifica sobreposicao com OUTROS codigos
   no mesmo span (ex.: um trecho com "Tema X" que por acaso contem um nome ja censurado por
   outro codigo continuaria aparecendo intacto aqui). Cobertura parcial, de proposito por ora —
   ver CLAUDE.md ("Censura — proximos passos") pra fechar essa lacuna e estender pra exports. */
function maskRedactedContent(content, codings, maskedCodeIds){
  if(!maskedCodeIds || !maskedCodeIds.size) return content;
  const ranges = (codings||[])
    .filter(c=>maskedCodeIds.has(c.code_id) && c.span_start>=0 && c.span_end>c.span_start)
    .map(c=>[c.span_start, c.span_end]).sort((a,b)=>a[0]-b[0]);
  if(!ranges.length) return content;
  const merged=[]; for(const r of ranges){ const last=merged[merged.length-1]; if(last && r[0]<=last[1]) last[1]=Math.max(last[1],r[1]); else merged.push([...r]); }
  let out='', pos=0;
  for(const [s,e] of merged){ out += content.slice(pos,s) + '[trecho censurado]'; pos = e; }
  return out + content.slice(pos);
}

function hslToHex(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  const toHex=v=>Math.round(v*255).toString(16).padStart(2,'0');
  return '#'+toHex(f(0))+toHex(f(8))+toHex(f(4));
}
function xmlEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripGuid(g){ return String(g||'').replace(/[{}]/g,'').trim(); }

/* REFI-QDA conta posicoes de trecho em CARACTERES (code points); o app indexa strings em
   UTF-16 (semantica de String do JS, span_start/span_end). Os dois so divergem quando ha
   caractere FORA do BMP (emoji, alguns CJK estendidos): 1 code point = 2 unidades UTF-16
   (surrogate pair). QualCoder (Python) lê code points — sem converter, no .qdpx todo trecho
   APOS um char astral sai deslocado e o highlight ancora no texto errado (interop quebrada,
   confirmado pelo harness de round-trip). Convertendo nos dois sentidos, o offset gravado no
   .qdpx fica em code points (o que o ecossistema REFI-QDA espera) e o app continua correto ao
   reimportar. No-op em texto sem char astral (a esmagadora maioria), entao nao muda nada nos
   projetos comuns. Ver scripts/roundtrip/. */
function u16ToCp(str, u16){ return [...str.slice(0, u16)].length; }   // offset UTF-16 -> indice de code point
function cpToU16(str, cp){ let u=0,n=0; for(const ch of str){ if(n>=cp) break; u+=ch.length; n++; } return u; } // code point -> offset UTF-16

/* markdown bem leve, so pra exibir as respostas da IA (que vem em markdown)
   sem precisar carregar uma lib: negrito/italico e quebras de linha. */
function mdLite(text){
  return xmlEsc(text)
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/(?<!\*)\*(?!\*)(.+?)\*(?!\*)/g, '<i>$1</i>')
    .replace(/\n/g, '<br>');
}

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));

function csvEscape(s){ s = s==null ? "" : String(s); return /[",\n\r]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function toCSV(rows){ return rows.map(r=>r.map(csvEscape).join(",")).join("\r\n"); }
function codePathFor(codes,id){ const by={}; codes.forEach(c=>by[c.id]=c); const o=[]; let c=by[id],g=0; while(c&&g++<12){o.unshift(c.name);c=c.parent_id?by[c.parent_id]:null;} return o; }
function download(name,text,mime){ const b=new Blob([text],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }

/* ============ QDPX (REFI-QDA Project Exchange) ============
   Compatível com ATLAS.ti, MAXQDA, NVivo, Quirkos, Taguette.
   Mapeamento: documento -> TextSource; categoria do documento -> Variable + Case;
   codigo -> Code (hierarquico); trecho codificado -> PlainTextSelection + Coding. */
function buildCodeXml(code, byParent){
  const kids = byParent[code.id] || [];
  const H = (code.hue_deg!=null) ? ((code.hue_deg%360)+360)%360 : HUES[((code.hue%HUES.length)+HUES.length)%HUES.length];
  const hex = hslToHex(H, 58, Math.min(70,32+code.depth*13));
  return `<Code guid="${stripGuid(code.id)}" name="${xmlEsc(code.name)}" isCodable="true" color="${hex}">`
    + kids.map(k=>buildCodeXml(k, byParent)).join('')
    + `</Code>`;
}

/* exporta so o livro de codigos (sem documentos/codificacoes — .qdc nao tem isso),
   reusando o mesmo <Code> recursivo do QDPX. Util pra compartilhar/padronizar o esquema
   de codigos com outra ferramenta REFI-QDA sem expor os dados do projeto. */
function exportQDC(codes, project){
  const byParent = {};
  codes.forEach(c=>{ const p=c.parent_id||'__root__'; (byParent[p]=byParent[p]||[]).push(c); });
  const topCodes = byParent['__root__']||[];
  const codesXml = topCodes.map(c=>buildCodeXml(c, byParent)).join('');
  const qdc = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n`
    + `<CodeBook xmlns="urn:QDA-XML:codebook:1.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" `
    + `xsi:schemaLocation="urn:QDA-XML:codebook:1.0 http://schema.qdasoftware.org/versions/Codebook/v1.0/Codebook.xsd" `
    + `origin="QualiLab" name="${xmlEsc(project?.name||'Projeto QualiLab')}">`
    + `<Codes>${codesXml}</Codes>`
    + `</CodeBook>`;
  download((project?.name||'codebook').replace(/[^\w\-]+/g,'_')+'.qdc', qdc, 'application/xml');
}

/* ============ Web Annotation (W3C) + Leitor de Transparência ============
   Liga o QualiLab ao ecossistema de transparência qualitativa (DA-RT / QDR / ATI).
   O padrão de fato sob o ATI do QDR, hypothes.is, Anno-REP e Dataverse é o W3C Web
   Annotation Data Model (JSON-LD). Miramos NELE — interoperável sem casar com nenhum
   fornecedor. Cada trecho codificado vira uma Annotation: target com TextQuoteSelector
   (exact/prefix/suffix) + TextPositionSelector (start/end); o código vira um body de
   "tagging" e o memo do código, quando existe, um body de "commenting" (a "nota
   analítica" do ATI). Memos de documento/projeto entram como metadados da coleção.
   Para qual camada usar: prefere o gabarito (final); se não houver, as individuais
   (mesma regra do QDPX). Ver CLAUDE.md. */
function pickTransparencyLayer(allC){
  const finalC = allC.filter(c=>c.layer==='final');
  return finalC.length ? finalC : allC.filter(c=>(c.layer||'individual')!=='final');
}
function indexMemos(memos){
  const codeMemo={}, docMemo={}, codingMemo={}; let projectMemo='';
  (memos||[]).forEach(m=>{ if(!m.content||!String(m.content).trim()) return;
    if(m.scope==='code') codeMemo[m.target_id]=m.content;
    else if(m.scope==='document') docMemo[m.target_id]=m.content;
    else if(m.scope==='coding') codingMemo[m.target_id]=m.content;
    else if(m.scope==='project') projectMemo=m.content; });
  return { codeMemo, docMemo, codingMemo, projectMemo };
}
/* CENSURA nos exports de transparência: por padrão NADA marcado com código is_redaction pode
   vazar num apêndice público. Como esses exports são artefatos para terceiros, mascaramos sempre
   (sem o toggle por-código que o Relatório tem). Duas frentes: (1) excluir as próprias codings
   de censura das anotações/legenda; (2) substituir por "[trecho censurado]" qualquer pedaço de
   texto (do documento OU do excerto de outra coding) que caia sobre uma faixa censurada.
   maskRedactedContent muda o tamanho do texto (desalinha offsets), então aqui trabalhamos por
   faixa/posição: redactionRanges (faixas mescladas, de TODAS as camadas — nunca vaza) + maskSlice
   (recorta [start,end) trocando só a sobreposição). */
function redactionRanges(allC, redactionCodeIds, docId){
  const r = allC.filter(c=>c.document_id===docId && redactionCodeIds.has(c.code_id) && c.span_start>=0 && c.span_end>c.span_start)
    .map(c=>[c.span_start,c.span_end]).sort((a,b)=>a[0]-b[0]);
  const m=[]; for(const x of r){ const last=m[m.length-1]; if(last && x[0]<=last[1]) last[1]=Math.max(last[1],x[1]); else m.push([...x]); }
  return m;
}
function maskSlice(content, start, end, ranges){
  if(!ranges || !ranges.length) return content.slice(start,end);
  let out='', pos=start;
  for(const [s,e] of ranges){ if(e<=start||s>=end) continue; const a=Math.max(s,start), b=Math.min(e,end);
    if(a>pos) out+=content.slice(pos,a); out+='[trecho censurado]'; pos=Math.max(pos,b); }
  if(pos<end) out+=content.slice(pos,end);
  return out;
}
function buildWebAnnotations(docs, codes, allC, memos, project, anonymize){
  const docById={}; docs.forEach(d=>docById[d.id]=d);
  const { codeMemo, docMemo, codingMemo, projectMemo } = indexMemos(memos);
  const redactionCodeIds = new Set(codes.filter(c=>c.is_redaction).map(c=>c.id));
  const rangesByDoc = {}; docs.forEach(d=>rangesByDoc[d.id]=redactionRanges(allC, redactionCodeIds, d.id));
  const CTX = 32; // palavras de contexto (prefix/suffix) p/ reancoragem robusta
  const useC = pickTransparencyLayer(allC)
    .filter(c=>c.span_start>=0 && c.span_end>c.span_start && !redactionCodeIds.has(c.code_id));
  const items = useC.map(c=>{
    const content = docById[c.document_id]?.content || '';
    const ranges = rangesByDoc[c.document_id] || [];
    const path = codePathFor(codes, c.code_id);
    // nota analítica: a do TRECHO (coding) tem prioridade; cai pra do código se não houver
    const note = codingMemo[c.id] || codeMemo[c.code_id];
    const body = [{ type:'TextualBody', purpose:'tagging', value: path.join(' > ') }];
    if(note) body.push({ type:'TextualBody', purpose:'commenting', value: note });
    const ann = {
      id:'urn:uuid:'+(c.id||uid()), type:'Annotation',
      created: c.created_at || undefined,
      creator: (!anonymize && c.author_name) ? { type:'Person', name:c.author_name } : undefined,
      body,
      target:{
        source:'urn:qualilab:document:'+c.document_id,
        selector:[
          { type:'TextQuoteSelector', exact: maskSlice(content, c.span_start, c.span_end, ranges) || c.quote || '',
            prefix: maskSlice(content, Math.max(0,c.span_start-CTX), c.span_start, ranges),
            suffix: maskSlice(content, c.span_end, c.span_end+CTX, ranges) },
          { type:'TextPositionSelector', start:c.span_start, end:c.span_end }
        ]
      }
    };
    return ann;
  });
  const collection = {
    '@context':'http://www.w3.org/ns/anno.jsonld',
    type:'AnnotationCollection',
    label: project?.name || 'Projeto QualiLab',
    generator:{ type:'Software', name:'QualiLab', homepage:'https://luizpf42.github.io/QualiLab/' },
    total: items.length,
    // metadados não-normativos (extensão QualiLab): visão geral + fontes referenciadas
    'qualilab:overview': projectMemo || undefined,
    'qualilab:sources': docs.map(d=>({ id:'urn:qualilab:document:'+d.id, name:d.name, note: docMemo[d.id]||undefined })),
    first:{ type:'AnnotationPage', items }
  };
  return collection;
}
function exportWebAnnotations(docs, codes, allC, memos, project, anonymize){
  download((project?.name||'projeto').replace(/[^\w\-]+/g,'_')+(anonymize?'_anon':'')+'_anotacoes.json',
    JSON.stringify(buildWebAnnotations(docs, codes, allC, memos, project, anonymize),null,2), 'application/ld+json');
}

/* Leitor de Transparência: página HTML auto-contida (sem rede, sem build) que mostra
   cada documento com os trechos grifados e, ao clicar, a "nota analítica" (memo do código),
   o excerto e a autoria — o equivalente ao overlay do ATI, mas hospedável por você (ex.:
   uma subpasta do GitHub Pages). Reaproveita buildRuns/codeColor; pré-renderiza os runs
   pra não precisar embarcar lógica do app. */
function buildTransparencyReaderHTML(docs, codes, allC, memos, project, anonymize){
  const codeById={}; codes.forEach(c=>codeById[c.id]=c);
  const colorOf = (id)=>{ const c=codeById[id]; return c ? codeColor(c.hue, c.depth, c.hue_deg) : {tint:'#eee',solid:'#888'}; };
  const { codeMemo, docMemo, codingMemo, projectMemo } = indexMemos(memos);
  const redactionCodeIds = new Set(codes.filter(c=>c.is_redaction).map(c=>c.id));
  const useC = pickTransparencyLayer(allC).filter(c=>!redactionCodeIds.has(c.code_id));
  const anns = {}; // id -> detalhes p/ o painel
  const docsHtml = docs.map(d=>{
    const content = d.content || '';
    const ranges = redactionRanges(allC, redactionCodeIds, d.id);
    const overlapsRedaction = (s,e)=> ranges.some(([a,b])=>a<e && b>s);
    // inclui as codings de censura só pra cortar os runs nas bordas certas (não viram grifo)
    const redC = allC.filter(c=>c.document_id===d.id && redactionCodeIds.has(c.code_id) && c.span_start>=0 && c.span_end>c.span_start);
    const dc = useC.filter(c=>c.document_id===d.id && c.span_start>=0 && c.span_end>c.span_start).concat(redC);
    let body='', prevMasked=false;
    buildRuns(content, dc).forEach(r=>{
      if(overlapsRedaction(r.start, r.end)){ if(!prevMasked){ body += '<span class="redacted">[trecho censurado]</span>'; prevMasked=true; } return; }
      prevMasked=false;
      const vis = r.codings.filter(c=>!redactionCodeIds.has(c.code_id));
      const t = xmlEsc(r.text).replace(/\n/g,'<br>');
      if(!vis.length){ body += t; return; }
      const col = colorOf(vis[0].code_id);
      vis.forEach(c=>{ if(!anns[c.id]){ const p=codePathFor(codes,c.code_id);
        anns[c.id]={ code:p.join(' › '), color:colorOf(c.code_id).solid, author:anonymize?'':(c.author_name||''),
          note:codingMemo[c.id]||codeMemo[c.code_id]||'' }; } });
      const bb = vis.length>1 ? `border-bottom:2px solid ${col.solid}` : '';
      body += `<span class="hl" data-ann="${vis.map(c=>c.id).join(' ')}" style="background:${col.tint};${bb}">${t}</span>`;
    });
    // documento colapsável (vem colapsado): o TÍTULO (summary) abre/fecha; o ● é o link pro
    // memo do documento (clicar nele não dispara o colapso — preventDefault no handler).
    const hasDocMemo = !!docMemo[d.id];
    const memoDot = hasDocMemo ? ` <span class="memo-dot linky" data-ann="doc:${xmlEsc(d.id)}" title="ver memo do documento">●</span>` : '';
    return `<details class="doc"><summary class="doc-title">${xmlEsc(d.name)}${memoDot}</summary><div class="reader">${body}</div></details>`;
  }).join('\n');
  // legenda só com os códigos visíveis (já sem censura, pois useC a exclui); o swatch/código
  // com memo vira "link" pro memo do código (abre no painel, igual o título e os grifos)
  const usedCodes = [...new Set(useC.map(c=>c.code_id))].map(id=>codeById[id]).filter(Boolean);
  const legendItems = usedCodes.map(c=>{ const col=codeColor(c.hue,c.depth,c.hue_deg); const hasMemo=!!codeMemo[c.id];
    return `<span class="leg${hasMemo?' linky':''}"${hasMemo?` data-ann="code:${xmlEsc(c.id)}"`:''}><i style="background:${col.solid}"></i>${xmlEsc(codePathFor(codes,c.id).join(' › '))}${hasMemo?' <span class="memo-dot">●</span>':''}</span>`; }).join('');
  // muitos códigos (grounded theory) viram um paredão ilegível no topo: recolhe por padrão
  // acima do limite, com filtro + altura limitada. <details> nativo, sem JS pra abrir/fechar.
  const manyCodes = usedCodes.length > 12;
  const legend = usedCodes.length ? `<details class="legend"${manyCodes?'':' open'}>`
    + `<summary>Legenda de códigos (${usedCodes.length})</summary>`
    + (manyCodes ? `<input class="legfilter" type="text" placeholder="filtrar códigos…" oninput="filterLeg(this.value)">` : '')
    + `<div class="legitems${manyCodes?' capped':''}">${legendItems}</div></details>` : '';
  // entradas de memo de documento/código no mesmo mapa do painel (chaves prefixadas, sem colidir com ids de coding)
  docs.forEach(d=>{ if(docMemo[d.id]) anns['doc:'+d.id]={ code:d.name, color:'#00427A', author:'', note:docMemo[d.id] }; });
  usedCodes.forEach(c=>{ if(codeMemo[c.id]) anns['code:'+c.id]={ code:codePathFor(codes,c.id).join(' › '), color:codeColor(c.hue,c.depth,c.hue_deg).solid, author:'', note:codeMemo[c.id] }; });
  const overview = projectMemo ? `<div class="overview"><h3>Visão geral</h3><div>${xmlEsc(projectMemo).replace(/\n/g,'<br>')}</div></div>` : '';
  const docsCtrl = docs.length>1 ? `<div class="docctrl"><span>${docs.length} documentos</span><button onclick="allDocs(true)">expandir todos</button><button onclick="allDocs(false)">recolher todos</button></div>` : '';
  const dataJson = JSON.stringify(anns).replace(/</g,'\\u003c');
  const title = xmlEsc(project?.name || 'Projeto QualiLab');
  return `<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${title} — Apêndice de Transparência</title>
<style>
:root{--teal:#00427A;--ink:#1a2330;--muted:#5b6675;--line:#e2e8f0;--paper:#fff}
*{box-sizing:border-box}
body{margin:0;font-family:Georgia,'Newsreader',serif;color:var(--ink);background:#f6f8fb;line-height:1.6}
header{background:var(--teal);color:#fff;padding:18px 24px;font-family:system-ui,sans-serif}
header h1{margin:0;font-size:20px}
header .sub{opacity:.85;font-size:13px;margin-top:4px}
.wrap{display:flex;gap:20px;max-width:1180px;margin:0 auto;padding:24px;align-items:flex-start}
.main{flex:1;min-width:0}
.aside{width:340px;flex:none;position:sticky;top:24px}
.overview,.legend,.doc,#panel{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:18px}

.legend>summary{cursor:pointer;font-weight:600;color:var(--teal);list-style:revert}
.legend[open]>summary{margin-bottom:10px}
