/* ============ ESQUEMA > CODIGOS — reorganizacao em lote ============
   Tela cheia dedicada (sem documento aberto), pensada pra quem fez codificacao aberta
   (grounded theory) e termina com centenas de codigos soltos, todos no mesmo nivel.
   Selecao multipla por checkbox + duas acoes em lote:
   - "agrupar": os codigos marcados continuam separados, so passam a ser filhos de um
     unico pai (existente ou recem-criado, que nasce em Hierarquia 0).
   - "mesclar": reatribui as codificacoes de todos os marcados pra um unico sobrevivente
     e apaga os demais — irreversivel, confirma antes.
   Tambem da pra promover qualquer codigo a Hierarquia 0 (familia de topo) com um clique.
   Reaproveita RenameCode (definido mais abaixo, perto de TreeNode) mas NAO toca em
   CodesPanel/TreeNode — o painel da tela de Codificacao continua intocado de proposito. */
function SchemaCodesView({ codes, codeById, codePath, count, isAdmin, store, project, reload, loadAll,
                            allCodings, selCode, setSelCode, onUpd, onSetColor, onSetSat, onSetRedaction, onAdd, onDel }){
  const [query, setQuery] = useState('');
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [busy, setBusy] = useState(false);
  const [dragId, setDragId] = useState(null); // drag-and-drop pra reordenar codigos entre irmaos (mesmo parent_id)
  const [overId, setOverId] = useState(null); // alvo sob o cursor durante o arrasto (indicador de destino)
  const [schemaMode, setSchemaMode] = useState('arvore'); // arvore (lista hierarquica) | mapa (quadro branco espacial)
  // controles do mapa vivem no pane-head (nao flutuando sobre o canvas): estado aqui, o canvas
  // consome tool/showLinks e expoe fit/reshuffle via mapApiRef (gatilhos, sem re-render do pai)
  const [mapTool, setMapTool] = useState('select');   // select (laço) | pan (mover a tela)
  const [mapShowLinks, setMapShowLinks] = useState(true);
  const mapApiRef = useRef({});

  const tops = codes.filter(c=>!c.parent_id);
  const childrenOf = (id)=>codes.filter(c=>c.parent_id===id);
  const toggleSelect = (id)=> setSelectedIds(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const clearSelection = ()=> setSelectedIds(new Set());

  // reordena so entre irmaos (mesmo parent_id) — mudar de pai e feito por "Agrupar", nao por
  // arrastar aqui. Se draggedId/targetId tiverem pais diferentes, ignora silenciosamente.
  async function reorderSiblings(draggedId, targetId){
    if(draggedId===targetId) return;
    const dragged = codeById[draggedId], target = codeById[targetId];
    if(!dragged || !target || dragged.parent_id!==target.parent_id) return;
    const siblings = codes.filter(c=>c.parent_id===dragged.parent_id).slice().sort((a,b)=>(a.position??0)-(b.position??0));
    const from = siblings.findIndex(c=>c.id===draggedId), to = siblings.findIndex(c=>c.id===targetId);
    if(from<0 || to<0) return;
    siblings.splice(to, 0, siblings.splice(from,1)[0]);
    setBusy(true);
    if(store.beginBatch) store.beginBatch();
    try{ await Promise.all(siblings.map((s,i)=> s.position!==i ? store.updateCode(s.id,{position:i}) : null)); }
    finally{ if(store.endBatch) await store.endBatch(); setBusy(false); }
    await reload();
  }

  const q = query.trim().toLowerCase();
  const filtered = q ? codes.filter(c=>c.name.toLowerCase().includes(q)) : null;

  // evita ciclo: nao deixa mover um codigo pra dentro de um dos seus proprios descendentes
  const isDescendantOf = (nodeId, maybeAncestorId)=>{
    let p = codeById[nodeId]?.parent_id;
    while(p){ if(p===maybeAncestorId) return true; p = codeById[p]?.parent_id; }
    return false;
  };

  // recalcula a profundidade (e, se adoptColor, a cor) de um codigo e de toda a sua
  // subarvore — necessario sempre que um codigo muda de pai, senao a luminosidade do
  // swatch (que depende de code.depth) fica errada pra posicao nova na arvore.
  async function reparentSubtree(codeId, newParentId, newDepth, adoptColor){
    const patch = { parent_id:newParentId, depth:newDepth };
    if(adoptColor){ patch.hue = adoptColor.hue; patch.hue_deg = adoptColor.hue_deg ?? null; patch.sat = adoptColor.sat ?? null; }
    await store.updateCode(codeId, patch);
    const stack=[{id:codeId,depth:newDepth}];
    while(stack.length){
      const {id,depth}=stack.pop();
      for(const ch of childrenOf(id)){
        const cd = depth+1;
        const cpatch = { depth:cd };
        if(adoptColor){ cpatch.hue=adoptColor.hue; cpatch.hue_deg=adoptColor.hue_deg ?? null; cpatch.sat=adoptColor.sat ?? null; }
        await store.updateCode(ch.id, cpatch);
        stack.push({id:ch.id,depth:cd});
      }
    }
  }

  async function promoteToRoot(code){
    if(!code.parent_id) return;
    setBusy(true);
    if(store.beginBatch) store.beginBatch();
    try{ await reparentSubtree(code.id, null, 0, null); }
    finally{ if(store.endBatch) await store.endBatch(); setBusy(false); }
    await reload();
  }

  async function handleGroup(targetId, newName, ids){
    setBusy(true);
    // batch: reparentSubtree grava um updateCode POR nó da subárvore — agrupar famílias
    // grandes sem isso re-serializava o banco local/arquivo inteiro a cada nó
    if(store.beginBatch) store.beginBatch();
    try{
      const target = targetId ? codeById[targetId] : await onAdd(null, newName||'Novo agrupamento');
      for(const id of ids){
        if(id===target.id || isDescendantOf(target.id, id)) continue;
        await reparentSubtree(id, target.id, target.depth+1, { hue:target.hue, hue_deg:target.hue_deg, sat:target.sat });
      }
    } finally { if(store.endBatch) await store.endBatch(); setBusy(false); }
    await reload();
    clearSelection();
  }

  async function handleMerge(survivorId, mergedIds){
    setBusy(true);
    try{
      const survivor = codeById[survivorId];
      // notas-por-trecho (scope='coding') dos codings que serao recriados: como o merge
      // recria cada coding com id NOVO (addCoding) e apaga o antigo (deleteCoding faz GC do
      // memo do trecho), a nota se perderia. Busca fresco e migra pro id novo antes do delete.
      let memoByCoding = {};
      try{ (await store.listMemos(project.id)).forEach(m=>{ if(m.scope==='coding' && m.content) memoByCoding[m.target_id]=m; }); }catch(e){}
      // 1) reatribui as codificacoes dos mesclados pro sobrevivente (recria + apaga a
      // original, ja que os stores nao tem updateCoding — so addCoding/deleteCoding).
      // Batch (local/arquivo) + Promise.all (nuvem): mesclar um codigo com centenas de
      // trechos fazia um write serial POR coding — minutos na nuvem, e cada save
      // re-serializava o banco local inteiro. O par add->delete continua ordenado DENTRO
      // de cada coding (se falhar no meio, sobra duplicata — nunca perda).
      if(store.beginBatch) store.beginBatch();
      try{
        for(const mid of mergedIds){
          await Promise.all(allCodings.filter(c=>c.code_id===mid).map(async cod=>{
            const nc = await store.addCoding(project.id, { document_id:cod.document_id, code_id:survivorId,
              span_start:cod.span_start, span_end:cod.span_end, quote:cod.quote, layer:cod.layer,
              created_by:cod.created_by??null, author_name:cod.author_name });
            const mem = memoByCoding[cod.id];
            if(mem && nc && nc.id) await store.setMemo(project.id, 'coding', nc.id, mem.content, mem.author_name);
            await store.deleteCoding(cod.id);
          }));
        }
        // 2) reparenta os filhos diretos dos mesclados pro sobrevivente — senao deleteCode
        // (que apaga em cascata) destruiria esses filhos junto
        for(const mid of mergedIds){
          for(const ch of childrenOf(mid)){
            await reparentSubtree(ch.id, survivorId, survivor.depth+1, { hue:survivor.hue, hue_deg:survivor.hue_deg, sat:survivor.sat });
          }
        }
        // 3) exclui os mesclados (ja sem filhos nem codificacoes)
        for(const mid of mergedIds){ await store.deleteCode(mid); }
      } finally { if(store.endBatch) await store.endBatch(); }
      await reload();
      await loadAll();
      clearSelection();
    } finally { setBusy(false); }
  }

  // promove um ou varios codigos para Hierarquia 0 (reusa reparentSubtree; batch p/ familia grande)
  async function promoteManyToRoot(ids){
    const list = ids.map(id=>codeById[id]).filter(c=>c && c.parent_id);
    if(!list.length) return;
    setBusy(true);
    if(store.beginBatch) store.beginBatch();
    try{ for(const c of list){ await reparentSubtree(c.id, null, 0, null); } }
    finally{ if(store.endBatch) await store.endBatch(); setBusy(false); }
    await reload(); clearSelection();
  }
  // agrupa a selecao sob um NOVO pai (Hierarquia 0), pedindo o nome — reusa handleGroup(null,...)
  async function handleGroupNew(ids){
    const name = prompt('Nome do novo agrupamento (nova família no topo):', 'Novo agrupamento');
    if(name===null) return;
    await handleGroup(null, name||'Novo agrupamento', ids);
  }
  // grava as posicoes x,y do mapa em lote (drag de varios / reembaralhar) — 1 batch + 1 reload,
  // em vez de um save por no (onUpd faria isso). entries: [{id,x,y}]
  async function persistPositions(entries){
    if(!entries.length) return;
    if(store.beginBatch) store.beginBatch();
    try{ await Promise.all(entries.map(e=> store.updateCode(e.id, { pos_x:e.x, pos_y:e.y }))); }
    finally{ if(store.endBatch) await store.endBatch(); }
    await reload();
  }

  const treeBody = html`<div class="pane-body scroll" style="padding:14px">
        <div class="row" style="gap:6px;margin-bottom:10px;flex-wrap:wrap">
          <button class="btn sm" onClick=${()=>onAdd(selCode?codeById[selCode]:null)} disabled=${!selCode}
            title=${selCode?`filho de ${codeById[selCode]?.name}`:'selecione um código'}>＋ subcódigo</button>
          <button class="btn sm ghost" onClick=${()=>onAdd(null)}>＋ nova família (topo)</button>
          <div style="flex:1"></div>
          <input class="txtin" style="max-width:220px" placeholder="buscar código…" value=${query} onInput=${e=>setQuery(e.target.value)} />
        </div>
        ${busy && html`<div class="banner warn">Aplicando…</div>`}
        <div class="tree">
          ${tops.length===0 && html`<span class="meta">Nenhum código ainda. Comece por uma família.</span>`}
          ${!filtered && tops.map(t=>html`<${SchemaTreeNode} key=${t.id} code=${t} childrenOf=${childrenOf} count=${count}
              selCode=${selCode} setSelCode=${setSelCode} selectedIds=${selectedIds} onToggleSelect=${toggleSelect} onDel=${onDel} depthPad=${0}
              dragId=${dragId} setDragId=${setDragId} overId=${overId} setOverId=${setOverId}
              dragParentId=${dragId ? (codeById[dragId]?.parent_id ?? null) : undefined} onReorder=${reorderSiblings} />`)}
          ${filtered && filtered.length===0 && html`<span class="meta">Nenhum código com esse nome.</span>`}
          ${filtered && filtered.map(c=>html`<div class="node-row ${selCode===c.id?'sel':''}" key=${c.id} onClick=${()=>setSelCode(c.id)}>
              <input type="checkbox" checked=${selectedIds.has(c.id)} onClick=${e=>e.stopPropagation()} onChange=${()=>toggleSelect(c.id)} style="margin-right:2px" />
              <span class="swatch" style=${`background:${codeColor(c.hue,c.depth,c.hue_deg,false,c.sat).solid}`}></span>
              <span class="node-name" title=${codePath(c.id).join(' ▸ ')}>${codePath(c.id).join(' ▸ ')}</span>
              ${count[c.id]?html`<span class="count">${count[c.id]}</span>`:''}
            </div>`)}
        </div>
      </div>`;

  return html`<div class="split">
    <section class="pane" style="flex:1;min-width:0;border-right:1px solid var(--line)">
      <div class="pane-head" style="flex:none">
        <p class="h" style="margin:0">✎ Esquema de códigos</p>
        <div class="seg" style="margin-left:8px">
          <button class=${schemaMode==='arvore'?'on':''} onClick=${()=>setSchemaMode('arvore')}>⛼ Árvore</button>
          <button class=${schemaMode==='mapa'?'on':''} onClick=${()=>setSchemaMode('mapa')} title="quadro branco espacial">⊞ Mapa</button>
        </div>
        ${schemaMode==='mapa' && html`<div class="row" style="gap:6px;align-items:center;margin-left:4px">
          <div class="seg">
            <button class=${mapTool==='select'?'on':''} onClick=${()=>setMapTool('select')} title="selecionar / laço">▚</button>
            <button class=${mapTool==='pan'?'on':''} onClick=${()=>setMapTool('pan')} title="mover a tela">✜</button>
          </div>
          <button class="btn sm ghost" onClick=${()=>mapApiRef.current.fit?.()} title="ajustar à tela">⤢ ajustar</button>
          <button class="btn sm ghost" onClick=${()=>mapApiRef.current.reshuffle?.()} title="reembaralhar posições (sobrescreve o layout)">↻ reembaralhar</button>
          <button class="btn sm ghost" onClick=${()=>setMapShowLinks(v=>!v)} title="mostrar/ocultar as linhas de hierarquia">${mapShowLinks?'☑':'☐'} linhas</button>
        </div>`}
        <span class="meta" style="margin-left:auto">${codes.length} código(s)</span>
      </div>
      ${schemaMode==='arvore' ? treeBody
        : html`<div class="pane-body" style="position:relative;padding:0;overflow:hidden;min-height:0">
            <${SchemaMapView} codes=${codes} codeById=${codeById} codePath=${codePath} count=${count}
              selCode=${selCode} setSelCode=${setSelCode} selectedIds=${selectedIds} setSelectedIds=${setSelectedIds}
              onUpd=${onUpd} onPersistPositions=${persistPositions}
              onMoveInto=${(t,ids)=>handleGroup(t,'',ids)} onMerge=${handleMerge} onGroupNew=${handleGroupNew}
              onPromote=${promoteManyToRoot} onAdd=${onAdd} onDel=${onDel} isAdmin=${isAdmin} busy=${busy}
              tool=${mapTool} showLinks=${mapShowLinks} apiRef=${mapApiRef} />
          </div>`}
    </section>
    <aside class="pane" style="flex:0 0 300px;min-width:0;background:var(--paper)">
      <div class="pane-body scroll" style="padding:14px">
        ${selectedIds.size>=2
          ? html`<${SchemaBulkPanel} selectedIds=${selectedIds} codes=${codes} codeById=${codeById} count=${count}
                   onMerge=${handleMerge} onGroup=${handleGroup} onClear=${clearSelection} isAdmin=${isAdmin} />`
          : selCode && codeById[selCode]
            ? html`<div class="section">
                <p class="h">Código selecionado</p>
                <div class="crumb">${codePath(selCode).join(' ▸ ')}</div>
                <${RenameCode} code=${codeById[selCode]} onUpd=${onUpd} onSetColor=${onSetColor} onSetSat=${onSetSat} onSetRedaction=${onSetRedaction} isAdmin=${isAdmin} />
                ${codeById[selCode].parent_id && html`<button class="btn sm ghost" style="margin-top:10px;width:100%"
                  onClick=${()=>promoteToRoot(codeById[selCode])}>Promover a Hierarquia 0</button>`}
              </div>`
            : html`<div class="section"><p class="hint">Marque dois ou mais códigos (☑) para agrupar ou mesclar, ou clique em um para renomear/colorir.</p></div>`}
      </div>
    </aside>
  </div>`;
}

function SchemaTreeNode({ code, childrenOf, count, selCode, setSelCode, selectedIds, onToggleSelect, onDel, depthPad, dragId, setDragId, overId, setOverId, dragParentId, onReorder }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg, false, code.sat);
  const isSel = selCode===code.id;
  const dragging = dragId===code.id;
  // alvo válido só entre irmãos (mesmo parent_id) — reorderSiblings ignora o resto
  const canDrop = dragId && dragId!==code.id && code.parent_id===dragParentId;
  const isTarget = overId===code.id && canDrop;
  const endDrag = ()=>{ setDragId(null); setOverId&&setOverId(null); };
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''}" style=${`padding-left:${6+depthPad*16}px;${dragging?'opacity:.35':''}${isTarget?'box-shadow:0 -3px 0 0 var(--sky)':''}`} onClick=${()=>setSelCode(code.id)}
      onDragOver=${e=>{ e.preventDefault(); if(canDrop && overId!==code.id) setOverId&&setOverId(code.id); }}
      onDragLeave=${e=>{ if(overId===code.id) setOverId&&setOverId(null); }}
      onDrop=${e=>{ e.preventDefault(); e.stopPropagation(); if(dragId && dragId!==code.id) onReorder(dragId, code.id); endDrag(); }}>
      <span class="drag-handle" draggable="true" title="arrastar para reordenar entre irmãos"
        onClick=${e=>e.stopPropagation()}
        onDragStart=${e=>{ e.stopPropagation(); e.dataTransfer.effectAllowed='move'; setDragId(code.id); }}
        onDragEnd=${endDrag}>⠿</span>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <input type="checkbox" checked=${selectedIds.has(code.id)} onClick=${e=>e.stopPropagation()} onChange=${()=>onToggleSelect(code.id)} style="margin-right:2px" />
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.is_redaction?'⦸ ':''}${code.name}</span>
      ${count[code.id]?html`<span class="count">${count[code.id]}</span>`:''}
      <button class="icon-btn" onClick=${e=>{e.stopPropagation(); if(confirm('Excluir o código e seus subcódigos e codificações?')) onDel(code.id);}} title="excluir">✕</button>
    </div>
    ${open && kids.map(k=>html`<${SchemaTreeNode} key=${k.id} code=${k} childrenOf=${childrenOf} count=${count}
      selCode=${selCode} setSelCode=${setSelCode} selectedIds=${selectedIds} onToggleSelect=${onToggleSelect} onDel=${onDel} depthPad=${depthPad+1}
      dragId=${dragId} setDragId=${setDragId} overId=${overId} setOverId=${setOverId} dragParentId=${dragParentId} onReorder=${onReorder} />`)}
  </div>`;
}

function SchemaBulkPanel({ selectedIds, codes, codeById, count, onMerge, onGroup, onClear, isAdmin }){
  const [mode, setMode] = useState('group'); // group | merge
  const items = [...selectedIds].map(id=>codeById[id]).filter(Boolean);
  const sorted = useMemo(()=>items.slice().sort((a,b)=>(count[b.id]||0)-(count[a.id]||0)), [selectedIds, count]);
  const [survivor, setSurvivor] = useState(sorted[0]?.id || '');
  // recalcula a sugestao (o mais frequente) a cada mudanca na selecao — useState(sorted[0])
  // so roda na montagem do componente (quando a selecao ja tinha 2), entao marcar um 3o item
  // mais frequente depois nao atualizaria o sobrevivente sugerido sem isto
  useEffect(()=>{ setSurvivor(sorted[0]?.id || ''); }, [selectedIds]); // eslint-disable-line
  const [groupTarget, setGroupTarget] = useState('');
  const [groupNewName, setGroupNewName] = useState('');
  const candidates = codes.filter(c=>!selectedIds.has(c.id)); // nao pode ser pai um dos proprios marcados

  return html`<div class="section">
    <p class="h">${items.length} código(s) selecionado(s)</p>
    <div class="seg" style="margin-bottom:10px">
      <button class=${mode==='group'?'on':''} onClick=${()=>setMode('group')}>Agrupar</button>
      <button class=${mode==='merge'?'on':''} onClick=${()=>setMode('merge')}>Mesclar</button>
    </div>

    ${mode==='group' ? html`<div>
      <p class="hint">Os códigos marcados continuam separados, mas passam a ser filhos de um único código.</p>
      <div class="field">
        <div class="field-label">Código-pai</div>
        <select class="opt" style="width:100%" value=${groupTarget} onChange=${e=>setGroupTarget(e.target.value)}>
          <option value="">＋ criar novo (Hierarquia 0)</option>
          ${candidates.map(c=>html`<option value=${c.id}>${'— '.repeat(c.depth)}${c.name}</option>`)}
        </select>
      </div>
      ${!groupTarget && html`<input class="txtin" style="margin-top:6px;width:100%" placeholder="nome do novo código"
        value=${groupNewName} onInput=${e=>setGroupNewName(e.target.value)} />`}
      <button class="btn sm primary" style="margin-top:10px;width:100%"
        disabled=${!groupTarget && !groupNewName.trim()}
        onClick=${()=>onGroup(groupTarget||null, groupNewName, [...selectedIds])}>Agrupar</button>
    </div>` : html`<div>
      <p class="hint">Escolha qual código sobrevive. Os demais têm suas codificações reatribuídas a ele e são excluídos — não pode ser desfeito.</p>
      ${!isAdmin && html`<div class="banner warn" style="margin-bottom:8px">Mesclar reatribui codificações de todos os pesquisadores — só administradores podem aplicar (mesma regra do Organizar com IA).</div>`}
      ${sorted.map(c=>html`<label class="row" style="gap:6px;padding:4px 0;cursor:pointer" key=${c.id}>
        <input type="radio" name="survivor" checked=${survivor===c.id} onChange=${()=>setSurvivor(c.id)} />
        <span style="flex:1;font-size:13px">${c.name}</span><span class="meta">${count[c.id]||0}</span>
      </label>`)}
      <button class="btn sm primary" style="margin-top:10px;width:100%" disabled=${!survivor || !isAdmin}
        onClick=${()=>{ if(confirm(`Mesclar ${items.length} códigos em "${codeById[survivor]?.name}"? As codificações dos outros serão reatribuídas a ele, e eles serão excluídos. Isso não pode ser desfeito.`))
          onMerge(survivor, [...selectedIds].filter(id=>id!==survivor)); }}>Mesclar</button>
    </div>`}

    <button class="btn sm ghost" style="margin-top:10px;width:100%" onClick=${onClear}>limpar seleção</button>
  </div>`;
}

/* hash deterministico (FNV-1a) de um id -> usado pro placement inicial estavel/reproduzivel do
   mapa, sem Math.random (mesmo id sempre cai no mesmo lugar entre renders) */
function mapStrHash(s){ let h=2166136261; s=s||''; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0); }
/* raio do no proporcional ao nº de usos (area ~ count): cavalo-de-batalha grande, fragmentacao pequena */
function mapNodeRadius(n){ return Math.max(13, Math.min(46, 13 + Math.sqrt(n||0)*3.2)); }

/* SchemaMapView — quadro branco espacial dos codigos (aba Esquema -> Mapa). Motor visual: SVG na
   mao (como ChartsPanel), pan/zoom por transform, posicao x,y persistida por no. Gesto: esquerdo
   seleciona (Ctrl/laço = varios), DIREITO abre menu contextual cujo alvo e o DESTINO (mover/mesclar
   a selecao pra ca) — todas as acoes reusam os handlers de SchemaCodesView (nada de gravacao
   paralela). Manchas/hulls e força continua ficam pra rodada seguinte. */
function SchemaMapView({ codes, codeById, count, selCode, setSelCode, selectedIds, setSelectedIds,
                         onUpd, onPersistPositions, onMoveInto, onMerge, onGroupNew, onPromote, onAdd, onDel, isAdmin, busy,
                         tool, showLinks, apiRef }){
  const wrapRef = useRef(null), svgRef = useRef(null);
  const [positions, setPositions] = useState({}); // id -> {x,y} em coordenadas de mundo
  const posRef = useRef(positions);
  const [tf, setTf] = useState({ tx:0, ty:0, k:1 }); // screen = world*k + t
  const tfRef = useRef(tf);
  // tool/showLinks vem do pai (controles vivem no pane-head, nao flutuando sobre o canvas)
  const [lasso, setLasso] = useState(null);    // {x0,y0,x1,y1} em px de tela (rel. ao svg)
  const [menu, setMenu] = useState(null);      // {x,y,targetId}
  const [movePick, setMovePick] = useState(null); // ids aguardando clique no codigo-destino ("mover para dentro de...")
  const act = useRef({ type:'idle' });
  const didFit = useRef(false);

  useEffect(()=>{ posRef.current = positions; }, [positions]);
  useEffect(()=>{ tfRef.current = tf; }, [tf]);

  const familyOf = (id)=>{ let c=codeById[id], guard=0; while(c && c.parent_id && guard++<50) c=codeById[c.parent_id]; return c?c.id:id; };
  const radiusOf = (id)=> mapNodeRadius(count[id]||0);

  // ---- LAYOUT: mantem posicoes salvas/existentes fixas, calcula so os nao posicionados, colide ----
  function computeLayout(list, prev){
    const roots = list.filter(c=>!c.parent_id);
    const N = roots.length||1, cols = Math.ceil(Math.sqrt(N)), gap = 260;
    const anchor = {};
    roots.forEach((r,i)=>{ anchor[r.id] = { x:(i%cols)*gap, y:Math.floor(i/cols)*gap }; });
    const pos = {}, fixed = new Set();
    for(const c of list){
      if(prev && prev[c.id]){ pos[c.id]={...prev[c.id]}; fixed.add(c.id); }
      else if(c.pos_x!=null && c.pos_y!=null){ pos[c.id]={x:c.pos_x, y:c.pos_y}; fixed.add(c.id); }
    }
    for(const c of list){
      if(pos[c.id]) continue;
      const a = anchor[familyOf(c.id)] || {x:0,y:0}, h = mapStrHash(c.id);
      if(!c.parent_id) pos[c.id] = { x:a.x + ((h%13)-6), y:a.y + (((h>>4)%13)-6) };
      else { const ang=(h%360)*Math.PI/180, rad=45 + c.depth*22 + ((h>>3)%50); pos[c.id]={ x:a.x+Math.cos(ang)*rad, y:a.y+Math.sin(ang)*rad }; }
    }
    collide(pos, fixed, list);
    return pos;
  }
  // relaxamento de colisao simples: empurra vizinhos sobrepostos; nos fixos (salvos) nao se movem.
  // (força continua / forceCollide d3 fica pra rodada seguinte — aqui so pra o placement nascer sem overlap)
  function collide(pos, fixed, list){
    const ids = list.map(c=>c.id).filter(id=>pos[id]);
    for(let it=0; it<90; it++){
      let moved=false;
      for(let i=0;i<ids.length;i++) for(let j=i+1;j<ids.length;j++){
        const A=pos[ids[i]], B=pos[ids[j]];
        let dx=B.x-A.x, dy=B.y-A.y, d=Math.hypot(dx,dy); if(d<0.01){ d=0.01; dx=0.01; dy=0; }
        const min=radiusOf(ids[i])+radiusOf(ids[j])+10;
        if(d<min){
          const push=(min-d), ux=dx/d, uy=dy/d, af=fixed.has(ids[i]), bf=fixed.has(ids[j]);
          if(af&&bf) continue;
          if(af){ B.x+=ux*push; B.y+=uy*push; }
          else if(bf){ A.x-=ux*push; A.y-=uy*push; }
          else { A.x-=ux*push/2; A.y-=uy*push/2; B.x+=ux*push/2; B.y+=uy*push/2; }
          moved=true;
        }
      }
      if(!moved) break;
    }
  }

  // reconcilia posicoes quando o conjunto de codigos muda (add/merge/reparent recarrega `codes`)
  useEffect(()=>{ setPositions(prev=>{ const p=computeLayout(codes, prev); posRef.current=p; return p; }); }, [codes]);
  // fit inicial (uma vez), tolerante a container ainda sem medida
  useEffect(()=>{
    if(didFit.current || !Object.keys(positions).length) return;
    const doFit=()=>{ const r=wrapRef.current?.getBoundingClientRect(); if(r && r.width>10){ fitToView(); didFit.current=true; } else if(wrapRef.current) requestAnimationFrame(doFit); };
    requestAnimationFrame(doFit);
  }, [positions]);

  function fitToView(){
    const ids=Object.keys(posRef.current), r=wrapRef.current?.getBoundingClientRect();
    if(!ids.length || !r || r.width<10) return;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const id of ids){ const p=posRef.current[id], rr=radiusOf(id)+18; minX=Math.min(minX,p.x-rr); minY=Math.min(minY,p.y-rr); maxX=Math.max(maxX,p.x+rr); maxY=Math.max(maxY,p.y+rr); }
    const w=maxX-minX||1, h=maxY-minY||1, k=Math.min(2.2, Math.max(0.2, Math.min(r.width/w, r.height/h)));
    setTf({ k, tx:(r.width-w*k)/2 - minX*k, ty:(r.height-h*k)/2 - minY*k });
  }

  function localPt(cx,cy){ const r=svgRef.current.getBoundingClientRect(); return { x:cx-r.left, y:cy-r.top }; }
  function toWorld(cx,cy){ const t=tfRef.current, p=localPt(cx,cy); return { x:(p.x-t.tx)/t.k, y:(p.y-t.ty)/t.k }; }
  function worldToScreen(wx,wy){ const t=tfRef.current; return { x:wx*t.k+t.tx, y:wy*t.k+t.ty }; }
  function hitTest(cx,cy){ const w=toWorld(cx,cy); let best=null,bd=Infinity; for(const c of codes){ const p=posRef.current[c.id]; if(!p) continue; const d=Math.hypot(p.x-w.x,p.y-w.y); if(d<=radiusOf(c.id) && d<bd){ bd=d; best=c.id; } } return best; }

  function toggleSel(id){ setSelectedIds(s=>{ const n=new Set(s); if(!n.size && selCode && selCode!==id) n.add(selCode); n.has(id)?n.delete(id):n.add(id); return n; }); setSelCode(null); }

  function onDown(e){
    if(e.button===2) return; // direito = onCtx
    setMenu(null);
    const id = hitTest(e.clientX,e.clientY);
    // modo "escolher destino" (aberto pelo menu do codigo): proximo clique num codigo aplica o move;
    // clique no vazio cancela. Nao seleciona nem arrasta enquanto nesse modo.
    if(movePick){ act.current={type:'idle'}; if(id){ const ids=movePick.filter(x=>x!==id); if(ids.length) onMoveInto(id, ids); } setMovePick(null); return; }
    try{ svgRef.current.setPointerCapture(e.pointerId); }catch(_){}
    const ctrl = e.ctrlKey||e.metaKey;
    if(id){
      if(ctrl){ toggleSel(id); act.current={type:'idle'}; return; }
      let dragIds;
      if(selectedIds.has(id) && selectedIds.size>1) dragIds=[...selectedIds];
      else { setSelCode(id); setSelectedIds(new Set()); dragIds=[id]; }
      act.current={ type:'drag', dragIds, last:{x:e.clientX,y:e.clientY}, moved:false };
    } else if(tool==='pan' || e.button===1){
      act.current={ type:'pan', last:{x:e.clientX,y:e.clientY} };
    } else {
      const p=localPt(e.clientX,e.clientY);
      act.current={ type:'lasso', start:{x:e.clientX,y:e.clientY}, moved:false };
      setLasso({ x0:p.x, y0:p.y, x1:p.x, y1:p.y });
    }
  }
  function onMove(e){
    const a=act.current; if(!a || a.type==='idle') return;
    if(a.type==='pan'){ const dx=e.clientX-a.last.x, dy=e.clientY-a.last.y; a.last={x:e.clientX,y:e.clientY}; setTf(t=>({...t, tx:t.tx+dx, ty:t.ty+dy})); }
    else if(a.type==='drag'){ const k=tfRef.current.k, dx=(e.clientX-a.last.x)/k, dy=(e.clientY-a.last.y)/k; if(dx||dy){ a.moved=true; a.last={x:e.clientX,y:e.clientY}; setPositions(p=>{ const n={...p}; for(const id of a.dragIds){ const q=n[id]; if(q) n[id]={x:q.x+dx,y:q.y+dy}; } posRef.current=n; return n; }); } }
    else if(a.type==='lasso'){ a.moved=true; const p=localPt(e.clientX,e.clientY); setLasso(l=> l?{...l, x1:p.x, y1:p.y}:l); }
  }
  function onUp(e){
    const a=act.current; act.current={type:'idle'};
    try{ svgRef.current.releasePointerCapture(e.pointerId); }catch(_){}
    if(!a) return;
    if(a.type==='drag' && a.moved){
      const entries=a.dragIds.map(id=>({ id, x:posRef.current[id]?.x, y:posRef.current[id]?.y })).filter(en=>en.x!=null);
      if(entries.length===1) onUpd(entries[0].id, { pos_x:entries[0].x, pos_y:entries[0].y });
      else if(entries.length>1) onPersistPositions(entries);
    } else if(a.type==='lasso'){
      if(a.moved){
        const s=localPt(a.start.x,a.start.y), en=localPt(e.clientX,e.clientY);
        const box={ x0:Math.min(s.x,en.x), y0:Math.min(s.y,en.y), x1:Math.max(s.x,en.x), y1:Math.max(s.y,en.y) };
        const sel=new Set(selectedIds);
        for(const c of codes){ const p=posRef.current[c.id]; if(!p) continue; const sc=worldToScreen(p.x,p.y); if(sc.x>=box.x0&&sc.x<=box.x1&&sc.y>=box.y0&&sc.y<=box.y1) sel.add(c.id); }
        setSelectedIds(sel); if(sel.size) setSelCode(null);
      } else { setSelectedIds(new Set()); setSelCode(null); } // clique simples no vazio limpa a selecao
      setLasso(null);
    }
  }
  function onWheel(e){ e.preventDefault(); const p=localPt(e.clientX,e.clientY); setTf(t=>{ const k2=Math.min(3, Math.max(0.2, t.k*Math.exp(-e.deltaY*0.0015))); const wx=(p.x-t.tx)/t.k, wy=(p.y-t.ty)/t.k; return { k:k2, tx:p.x-wx*k2, ty:p.y-wy*k2 }; }); }
  function onCtx(e){ e.preventDefault(); if(movePick){ setMovePick(null); return; } const id=hitTest(e.clientX,e.clientY); setMenu({ x:e.clientX, y:e.clientY, targetId:id||null }); }

  async function reshuffle(){
    if(!confirm('Reembaralhar as posições de todos os códigos? Isso sobrescreve o layout atual do mapa.')) return;
    const pos=computeLayout(codes, null); posRef.current=pos; setPositions(pos); didFit.current=false;
    const entries=codes.map(c=>({ id:c.id, x:pos[c.id]?.x, y:pos[c.id]?.y })).filter(e=>e.x!=null);
    await onPersistPositions(entries); requestAnimationFrame(fitToView);
  }
  function run(fn){ setMenu(null); Promise.resolve().then(fn); }

  const selArr = selectedIds.size ? [...selectedIds] : (selCode?[selCode]:[]);
  // expoe as acoes ao pai (que renderiza os botoes no pane-head) — sao so gatilhos, sem estado de
  // display, entao um ref basta (nao precisa re-render do pai)
  if(apiRef) apiRef.current = { fit:fitToView, reshuffle };

  return html`<div class="mapwrap" ref=${wrapRef}>
    ${codes.length===0
      ? html`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:13px">Nenhum código ainda. Crie um na aba Árvore.</div>`
      : html`<svg ref=${svgRef} onPointerDown=${onDown} onPointerMove=${onMove} onPointerUp=${onUp} onWheel=${onWheel} onContextMenu=${onCtx}
          style=${`cursor:${movePick?'crosshair':(tool==='pan'?'grab':'default')};touch-action:none`}>
        <g transform=${`translate(${tf.tx.toFixed(2)} ${tf.ty.toFixed(2)}) scale(${tf.k.toFixed(4)})`}>
          ${showLinks && (()=>{ const selSet=new Set(selArr), anySel=selSet.size>0;
            // linhas pai->filho POR BAIXO das bolhas: cor da familia, opacidade baixa, AFINANDO com a
            // profundidade (tronco->galho->folha) — sem arrowhead (o afinamento + o pai maior ja dao
            // a direcao). Com selecao, acende so a linhagem do selecionado (pai+filhos) e apaga o resto.
            return codes.map(c=>{ if(!c.parent_id) return null; const p=positions[c.id], pp=positions[c.parent_id]; if(!p||!pp) return null;
              const lit=selSet.has(c.id)||selSet.has(c.parent_id);
              const op=anySel?(lit?0.9:0.06):0.3, w=(Math.max(1.1, 2.6 - c.depth*0.55))*(lit?1.7:1);
              const col=codeColor(c.hue,c.depth,c.hue_deg,false,c.sat).solid;
              const mx=(pp.x+p.x)/2, my=(pp.y+p.y)/2, dx=p.x-pp.x, dy=p.y-pp.y, len=Math.hypot(dx,dy)||1;
              const bow=Math.min(38,len*0.12), cxp=mx-dy/len*bow, cyp=my+dx/len*bow;
              return html`<path key=${'e'+c.id} d=${`M${pp.x.toFixed(1)},${pp.y.toFixed(1)} Q${cxp.toFixed(1)},${cyp.toFixed(1)} ${p.x.toFixed(1)},${p.y.toFixed(1)}`} fill="none" stroke=${col} stroke-width=${w.toFixed(2)} stroke-opacity=${op} stroke-linecap="round"></path>`;
            }); })()}
          ${codes.map(c=>{ const p=positions[c.id]; if(!p) return null; const r=radiusOf(c.id), col=codeColor(c.hue,c.depth,c.hue_deg,false,c.sat), isSel=(selCode===c.id||selectedIds.has(c.id));
            return html`<g key=${c.id} transform=${`translate(${p.x.toFixed(1)} ${p.y.toFixed(1)})`}>
              <circle r=${r} fill=${col.solid} stroke=${isSel?'var(--sky)':'rgba(0,0,0,.20)'} stroke-width=${isSel?3.5:1} opacity=${busy?0.55:1}></circle>
              ${c.is_redaction
                ? html`<text y="5" text-anchor="middle" font-size="14" style="pointer-events:none">⦸</text>`
                : (count[c.id]? html`<text y="4" text-anchor="middle" font-size=${Math.min(15, r*0.72).toFixed(0)} font-family="var(--mono)" fill=${col.isBlack?'rgba(255,255,255,.9)':'rgba(255,255,255,.94)'} style="pointer-events:none">${count[c.id]}</text>`:null)}
              <text class="map-node-label" y=${(r+13).toFixed(0)} text-anchor="middle">${chTrunc(c.name,16)}</text>
            </g>`;
          })}
        </g>
        ${lasso? html`<rect x=${Math.min(lasso.x0,lasso.x1)} y=${Math.min(lasso.y0,lasso.y1)} width=${Math.abs(lasso.x1-lasso.x0)} height=${Math.abs(lasso.y1-lasso.y0)} fill="rgba(27,157,217,.12)" stroke="var(--sky)" stroke-width="1" stroke-dasharray="4 3"></rect>`:null}
      </svg>`}

    <div class="map-zoom">${Math.round(tf.k*100)}%</div>
    <div class="map-hint" style=${movePick?'background:var(--sky);color:#fff;border-color:var(--sky)':''}>
      ${movePick? `clique no código-destino para mover ${movePick.length} para dentro · clique no vazio (ou direito) cancela`
                : 'clique = selecionar · Ctrl+clique / laço = vários · botão direito = agir'}</div>

    ${menu && (()=>{
      const menuW=252, maxH=Math.round(window.innerHeight*0.6);
      const left=Math.max(8, Math.min(menu.x, window.innerWidth-menuW-8));
      const top=Math.max(8, Math.min(menu.y, window.innerHeight-maxH-8));
      const C = menu.targetId? codeById[menu.targetId] : null;
      const sel = selArr, cInSel = C? sel.includes(C.id) : false, selNoC = C? sel.filter(id=>id!==C.id) : sel;
      const items=[];
      if(C){
        if(sel.length===0 || (sel.length===1 && cInSel)){
          items.push({ label:`＋ subcódigo de “${chTrunc(C.name,20)}”`, on:()=>onAdd(C) });
          items.push({ label:'✎ editar (renomear / cor)', on:()=>{ setSelCode(C.id); setSelectedIds(new Set()); } });
          if(codes.length>1) items.push({ label:'↳ mover para dentro de outro…', on:()=>setMovePick([C.id]) });
          if(C.parent_id) items.push({ label:'↑ promover ao topo', on:()=>onPromote([C.id]) });
          items.push({ sep:true });
          items.push({ label:'✕ excluir', danger:true, on:()=>{ if(confirm('Excluir o código e seus subcódigos e codificações?')) onDel(C.id); } });
        } else if(!cInSel){
          items.push({ head:`destino: ${chTrunc(C.name,26)}` });
          items.push({ label:`↳ mover ${selNoC.length} para dentro`, on:()=>onMoveInto(C.id, selNoC) });
          items.push({ label:`⧉ mesclar ${selNoC.length} aqui (este sobrevive)`, danger:true, disabled:!isAdmin,
            on:()=>{ if(!isAdmin) return; if(confirm(`Mesclar ${selNoC.length} código(s) em “${C.name}”? As codificações serão reatribuídas a ele e os outros serão excluídos. Não pode ser desfeito.`)) onMerge(C.id, selNoC); } });
          if(!isAdmin) items.push({ note:'Mesclar só por administradores.' });
        } else {
          items.push({ label:`↳ mover ${sel.length} para dentro de outro…`, on:()=>setMovePick([...sel]) });
          items.push({ label:`↑ promover ${sel.length} ao topo`, on:()=>onPromote(sel) });
          items.push({ label:`⌗ agrupar ${sel.length} sob novo pai`, on:()=>onGroupNew(sel) });
        }
      } else if(sel.length){
        items.push({ label:`↑ promover ${sel.length} ao topo`, on:()=>onPromote(sel) });
        items.push({ label:`⌗ agrupar ${sel.length} sob novo pai`, on:()=>onGroupNew(sel) });
      } else {
        items.push({ label:'＋ nova família (topo)', on:()=>onAdd(null) });
      }
      return html`
        <div style="position:fixed;inset:0;z-index:60" onPointerDown=${()=>setMenu(null)} onContextMenu=${e=>{e.preventDefault();setMenu(null);}}></div>
        <div class="exmenu" style=${`position:fixed;left:${left}px;top:${top}px;z-index:61;width:${menuW}px;max-height:${maxH}px;overflow:auto`}>
          ${items.map((it,i)=> it.sep? html`<div key=${i} style="border-top:1px solid var(--line-soft)"></div>`
            : it.head? html`<div key=${i} style="padding:7px 12px;font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.head}</div>`
            : it.note? html`<div key=${i} style="padding:6px 12px;font-size:11.5px;color:var(--ink-faint)">${it.note}</div>`
            : html`<button key=${i} disabled=${it.disabled} onClick=${()=>run(it.on)} style=${`white-space:nowrap;overflow:hidden;text-overflow:ellipsis${it.danger?';color:var(--danger)':''}${it.disabled?';opacity:.5;cursor:default':''}`}>${it.label}</button>`)}
        </div>`;
    })()}
  </div>`;
}

/* Agrupa codificacoes individuais que se sobrepoem com o mesmo codigo (reuso: por-doc e todos-os-docs) */
function reconcileGroups(indiv){
  const byCode = {};
  indiv.forEach(c=>{ (byCode[c.code_id]=byCode[c.code_id]||[]).push(c); });
  const groups = [];
  Object.entries(byCode).forEach(([codeId,list])=>{
    list.slice().sort((a,b)=>a.span_start-b.span_start).forEach(c=>{
      const cur = groups.find(g=>g.codeId===codeId && c.span_start < g.end && g.start < c.span_end);
      if(cur){ cur.start=Math.min(cur.start,c.span_start); cur.end=Math.max(cur.end,c.span_end); cur.items.push(c); }
      else groups.push({ codeId, start:c.span_start, end:c.span_end, items:[c] });
    });
  });
  groups.sort((a,b)=>a.start-b.start || a.end-b.end);
  return groups;
}

/* ============ RECONCILIACAO (camadas individuais -> camada final) ============
   Agrupa as codificacoes individuais que se sobrepoem com o mesmo codigo, mostra
   quantos codificadores concordam e permite consolidar cada grupo na camada "final". */
function Reconcile({ activeDoc, codings, coders, codeById, codePath, cats, values, isOwner, userId, tab, onSetFinal, onConsolidate, onDelCoding }){
  if(!activeDoc) return html`<div class="card"><span class="meta">Abra um documento para reconciliar.</span></div>`;
  const indiv = codings.filter(c=>c.layer!=='final');
  const finals = codings.filter(c=>c.layer==='final');
  const totalCoders = new Set(indiv.map(c=>c.created_by)).size || 1;
  const groups = reconcileGroups(indiv);
  const finalFor = (g)=> finals.find(f=>f.code_id===g.codeId && f.span_start < g.end && g.start < f.span_end);
  const nameOf = (id, fallback)=> (coders.find(c=>c.id===id)||{}).name || fallback || 'anônimo';
  return html`<div class="section">
    ${tab==='categorias' && html`<div>
    <p class="h">Categorias — gabarito e comparação</p>
    <p class="hint">Cada pesquisador preenche os atributos do documento; o dono consolida o <b>gabarito</b>. ✓ = igual ao gabarito, ✗ = diferente.</p>
    ${(cats||[]).length===0 && html`<div class="card"><span class="meta">Nenhuma categoria definida.</span></div>`}
    ${(cats||[]).map(cat=>{
      const finRow = (values||[]).find(v=>v.category_id===cat.id && v.layer==='final');
      const finalVal = finRow ? finRow.value : '';
      const indivVals = (values||[]).filter(v=>v.category_id===cat.id && (v.layer||'individual')!=='final');
      return html`<div class="card" key=${cat.id} style="margin-bottom:8px;padding:10px 12px">
        <div style="font-size:12.5px;font-weight:600;margin-bottom:2px">${cat.name}</div>
        ${cat.description && html`<div class="hint" style="margin:0 0 6px">${cat.description}</div>`}
        <div style="background:var(--teal-soft);border-radius:8px;padding:6px 10px;margin-bottom:8px">
          <div class="row" style="gap:8px;align-items:center">
            <span class="meta" style="color:var(--teal-deep);font-weight:600">Gabarito</span>
            ${isOwner
              ? html`<div style="flex:1"><${CategoryValue} cat=${cat} v=${finRow} onSet=${val=>onSetFinal(cat.id,val)} /></div>`
              : html`<span style="font-weight:600;color:var(--teal-deep)">${finalVal||'(não consolidado)'}</span>`}
          </div>
        </div>
        ${indivVals.length===0
          ? html`<div class="meta">Ninguém respondeu ainda.</div>`
          : indivVals.map(v=>{ const ok = finalVal!=='' && v.value===finalVal;
              return html`<div class="row" key=${v.id||v.set_by} style="gap:8px;padding:2px 0">
                <span style=${`color:${ok?'var(--teal)':'var(--danger)'};font-weight:700;width:14px`}>${ok?'✓':'✗'}</span>
                <span style="flex:1;font-size:13px">${v.value||html`<span class="meta" style="font-style:italic">sem resposta</span>`}</span>
                <span class="meta">${v.author_name||'anônimo'}</span>
              </div>`;
            })}
      </div>`;
    })}
    </div>`}
    ${tab==='codigos' && html`<div>
    <p class="h">Códigos — reconciliação</p>
    <p class="hint">Cada grupo reúne as codificações que se sobrepõem com o mesmo código. Consolide os que devem entrar na camada <b>final</b> do projeto.${totalCoders>1?` ${totalCoders} codificadores neste documento.`:''}</p>
    ${isOwner && (()=>{
      const pending = groups.filter(g=>!finalFor(g));
      const mine = pending.filter(g=>g.items.some(i=>i.created_by===userId));
      const consolidateMany = async (list)=>{ for(const g of list){ await onConsolidate(g.codeId, g.start, g.end, activeDoc.content.slice(g.start,g.end)); } };
      return pending.length>0 && html`<div class="row" style="gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn sm" disabled=${mine.length===0}
          title="Consolida no gabarito final todas as suas codificações ainda não consolidadas deste documento"
          onClick=${()=>{ if(confirm(`Consolidar no gabarito final as ${mine.length} codificação(ões) feitas por você neste documento?\n\nIsso NÃO pode ser desfeito.`)) consolidateMany(mine); }}>
          Consolidar tudo feito por mim (${mine.length})</button>
        <button class="btn sm primary"
          title="Consolida no gabarito final todas as codificações ainda não consolidadas deste documento, de todos os codificadores"
          onClick=${()=>{ if(confirm(`Consolidar no gabarito final TODAS as ${pending.length} codificação(ões) deste documento (de todos os codificadores)?\n\nIsso NÃO pode ser desfeito.`)) consolidateMany(pending); }}>
          Consolidar tudo (${pending.length})</button>
      </div>`;
    })()}
    ${groups.length===0 && html`<div class="card"><span class="meta">Nenhuma codificação individual neste documento ainda.</span></div>`}
    ${groups.map(g=>{
      const code = codeById[g.codeId]; const col = code?codeColor(code.hue,code.depth,code.hue_deg,false,code.sat):codeColor(0,0);
      const coderIds = [...new Set(g.items.map(i=>i.created_by))];
      const fin = finalFor(g);
      const consensus = coderIds.length>=totalCoders && totalCoders>1;
      const quote = activeDoc.content.slice(g.start,g.end);
      return html`<div class="card" key=${g.codeId+':'+g.start} style=${`margin-bottom:8px;padding:10px 12px;${consensus?'border-color:var(--teal)':''}`}>
        <div class="row" style="gap:7px;margin-bottom:4px">
          <span class="swatch" style=${`background:${col.solid}`}></span>
          <span style="flex:1;font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${codePath(g.codeId).join(' ▸ ')}</span>
          <span class="meta">${coderIds.length} de ${totalCoders}${consensus?' · consenso':''}</span>
        </div>
        <div class="row" style="flex-wrap:wrap;gap:4px;margin-bottom:6px">
          ${coderIds.map(id=>html`<span class="author" key=${id}>${nameOf(id, (g.items.find(i=>i.created_by===id)||{}).author_name)}</span>`)}
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:8px">"${quote.slice(0,180)}"</div>
        ${fin
          ? html`<div class="row" style="gap:8px;align-items:center">
              <span class="author" style="background:var(--teal-soft);color:var(--teal-deep)">✓ na camada final</span>
              <button class="btn sm ghost" onClick=${()=>onDelCoding(fin.id)}>remover do final</button></div>`
          : html`<button class="btn sm primary" onClick=${()=>onConsolidate(g.codeId, g.start, g.end, quote)}>Consolidar no final →</button>`}
      </div>`;
    })}
    </div>`}
  </div>`;
}

/* ============ ReconcileCatAcrossDocs — UMA categoria reconciliada em TODOS os documentos ============
   Modo "(Todos os documentos)" da aba Categorias: usa allValues (projeto inteiro) e grava o gabarito
   por documento via onSetFinalDoc(docId, catId, value). Espelha o card por-categoria do Reconcile. */
function ReconcileCatAcrossDocs({ docs, cat, allValues, isOwner, onSetFinalDoc }){
  if(!cat) return html`<div class="card"><span class="meta">Nenhuma categoria neste projeto.</span></div>`;
  return html`<div class="section">
    <p class="h">Categoria em todos os documentos · ${cat.name}</p>
    <p class="hint">Consolide o <b>gabarito</b> desta categoria documento a documento. ✓ = resposta igual ao gabarito, ✗ = diferente.</p>
    ${cat.description && html`<p class="hint" style="margin-top:-4px">${cat.description}</p>`}
    ${docs.length===0 && html`<div class="card"><span class="meta">Nenhum documento no projeto.</span></div>`}
    ${docs.map(d=>{
      const rows = allValues.filter(v=>v.document_id===d.id && v.category_id===cat.id);
      const finRow = rows.find(r=>r.layer==='final');
      const finalVal = finRow ? finRow.value : '';
      const indivVals = rows.filter(r=>(r.layer||'individual')!=='final');
      return html`<div class="card" key=${d.id} style="margin-bottom:8px;padding:10px 12px">
        <div style="font-size:12.5px;font-weight:600;margin-bottom:4px">${d.name}</div>
        <div style="background:var(--teal-soft);border-radius:8px;padding:6px 10px;margin-bottom:8px">
          <div class="row" style="gap:8px;align-items:center">
            <span class="meta" style="color:var(--teal-deep);font-weight:600">Gabarito</span>
            ${isOwner
              ? html`<div style="flex:1"><${CategoryValue} cat=${cat} v=${finRow} onSet=${val=>onSetFinalDoc(d.id, cat.id, val)} /></div>`
              : html`<span style="font-weight:600;color:var(--teal-deep)">${finalVal||'(não consolidado)'}</span>`}
          </div>
        </div>
        ${indivVals.length===0
          ? html`<div class="meta">Ninguém respondeu ainda.</div>`
          : indivVals.map((v,i)=>{ const ok = finalVal!=='' && v.value===finalVal;
              return html`<div class="row" key=${i} style="gap:8px;padding:2px 0">
                <span style=${`color:${ok?'var(--teal)':'var(--danger)'};font-weight:700;width:14px`}>${ok?'✓':'✗'}</span>
                <span style="flex:1;font-size:13px">${v.value||html`<span class="meta" style="font-style:italic">sem resposta</span>`}</span>
                <span class="meta">${v.author_name||'anônimo'}</span>
              </div>`;
            })}
      </div>`;
    })}
  </div>`;
}

/* Bloco colapsável de UM documento na visão "todos os documentos" da aba Códigos. */
function ReconcileDocCodes({ d, groups, finalFor, totalCoders, coders, codeById, codePath, onConsolidateDoc, onDelCoding }){
  const [open, setOpen] = useState(true);
  const nameOf = (id, fallback)=> (coders.find(c=>c.id===id)||{}).name || fallback || 'anônimo';
  const pend = groups.filter(g=>!finalFor(g)).length;
  return html`<div style="margin-bottom:14px">
    <div class="node-row" style="cursor:pointer;border-radius:6px;background:var(--surface);padding:6px 10px" onClick=${()=>setOpen(o=>!o)}>
      <span class="caret">${open?'▾':'▸'}</span>
      <span class="node-name" style="font-weight:600">${d.name}</span>
      <span class="count">${groups.length}</span>
      ${pend>0 && html`<span class="pill" style="font-size:10px;padding:1px 8px">${pend} pendente${pend>1?'s':''}</span>`}
    </div>
    ${open && html`<div style="padding-top:8px">
      ${groups.map(g=>{
        const code = codeById[g.codeId]; const col = code?codeColor(code.hue,code.depth,code.hue_deg,false,code.sat):codeColor(0,0);
        const coderIds = [...new Set(g.items.map(i=>i.created_by))];
        const fin = finalFor(g);
        const consensus = coderIds.length>=totalCoders && totalCoders>1;
        const quote = (d.content||'').slice(g.start,g.end);
        return html`<div class="card" key=${g.codeId+':'+g.start} style=${`margin-bottom:8px;padding:10px 12px;${consensus?'border-color:var(--teal)':''}`}>
          <div class="row" style="gap:7px;margin-bottom:4px">
            <span class="swatch" style=${`background:${col.solid}`}></span>
            <span style="flex:1;font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${codePath(g.codeId).join(' ▸ ')}</span>
            <span class="meta">${coderIds.length} de ${totalCoders}${consensus?' · consenso':''}</span>
          </div>
          <div class="row" style="flex-wrap:wrap;gap:4px;margin-bottom:6px">
            ${coderIds.map(id=>html`<span class="author" key=${id}>${nameOf(id, (g.items.find(i=>i.created_by===id)||{}).author_name)}</span>`)}
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:8px">"${quote.slice(0,180)}"</div>
          ${fin
            ? html`<div class="row" style="gap:8px;align-items:center">
                <span class="author" style="background:var(--teal-soft);color:var(--teal-deep)">✓ na camada final</span>
                <button class="btn sm ghost" onClick=${()=>onDelCoding(fin.id)}>remover do final</button></div>`
            : html`<button class="btn sm primary" onClick=${()=>onConsolidateDoc(d.id, g.codeId, g.start, g.end, quote)}>Consolidar no final →</button>`}
        </div>`;
      })}
    </div>`}
  </div>`;
}

/* ============ ReconcileCodesAllDocs — códigos reconciliados em TODOS os documentos ============
   Modo "(Todos os documentos)" da aba Códigos. selCode='all' mostra todos; um id filtra um código.
   Usa allCodings (projeto inteiro) e o conteúdo de cada doc para os trechos; blocos por documento
   colapsáveis; botões de consolidar em massa (projeto inteiro, respeitando o filtro de código). */
function ReconcileCodesAllDocs({ docs, allCodings, coders, codeById, codePath, isOwner, userId, selCode, onConsolidateDoc, onDelCoding }){
  // por documento: grupos individuais + finais, e os pendentes (sem equivalente no gabarito)
  const perDoc = docs.map(d=>{
    const dc = allCodings.filter(c=>c.document_id===d.id);
    const indiv = dc.filter(c=>c.layer!=='final');
    const finals = dc.filter(c=>c.layer==='final');
    let groups = reconcileGroups(indiv);
    if(selCode && selCode!=='all') groups = groups.filter(g=>g.codeId===selCode);
    const finalFor = (g)=> finals.find(f=>f.code_id===g.codeId && f.span_start < g.end && g.start < f.span_end);
    const totalCoders = new Set(indiv.map(c=>c.created_by)).size || 1;
    return { d, groups, finalFor, totalCoders };
  }).filter(x=>x.groups.length>0);

  // pendentes (e os "meus") em todo o projeto, para os botões de consolidar em massa
  const allPending = [], allMine = [];
  perDoc.forEach(({d, groups, finalFor})=> groups.forEach(g=>{ if(!finalFor(g)){ allPending.push({d,g}); if(g.items.some(i=>i.created_by===userId)) allMine.push({d,g}); } }));
  const consolidateMany = async (list)=>{ for(const {d,g} of list){ await onConsolidateDoc(d.id, g.codeId, g.start, g.end, (d.content||'').slice(g.start,g.end)); } };
  const filtTitle = selCode && selCode!=='all' ? ` · ${codePath(selCode).join(' ▸ ')}` : '';

  return html`<div class="section">
    <p class="h">Códigos — todos os documentos${filtTitle}</p>
    <p class="hint">Cada grupo reúne as codificações que se sobrepõem com o mesmo código. Consolide na camada <b>final</b> do projeto.</p>
    ${isOwner && allPending.length>0 && html`<div class="row" style="gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn sm" disabled=${allMine.length===0}
        title="Consolida no gabarito final todas as suas codificações ainda não consolidadas (respeitando o filtro de código)"
        onClick=${()=>{ if(confirm(`Consolidar no gabarito final as ${allMine.length} codificação(ões) feitas por você?\n\nIsso NÃO pode ser desfeito.`)) consolidateMany(allMine); }}>
        Consolidar tudo feito por mim (${allMine.length})</button>
      <button class="btn sm primary"
        title="Consolida no gabarito final todas as codificações ainda não consolidadas (respeitando o filtro de código)"
        onClick=${()=>{ if(confirm(`Consolidar no gabarito final TODAS as ${allPending.length} codificação(ões) (de todos os codificadores)?\n\nIsso NÃO pode ser desfeito.`)) consolidateMany(allPending); }}>
        Consolidar tudo (${allPending.length})</button>
    </div>`}
    ${perDoc.length===0 && html`<div class="card"><span class="meta">${selCode && selCode!=='all' ? 'Nenhuma codificação deste código.' : 'Nenhuma codificação individual no projeto ainda.'}</span></div>`}
    ${perDoc.map(({d, groups, finalFor, totalCoders})=>html`<${ReconcileDocCodes} key=${d.id}
      d=${d} groups=${groups} finalFor=${finalFor} totalCoders=${totalCoders}
      coders=${coders} codeById=${codeById} codePath=${codePath}
      onConsolidateDoc=${onConsolidateDoc} onDelCoding=${onDelCoding} />`)}
  </div>`;
}

/* ============ VizNav — painel esquerdo da Visualização ============
   Visual idêntico ao painel de Codificação: mesmas classes CSS, sem fundo colorido. */
function VizNav({ cats, codes, allCodings, allValues, docs, view, catFilter, selCode,
                  onView, onCatFilter, onSelCode, coders, userId, mode, codePath, codeById, projectMode }){
  const [catsOpen, setCatsOpen] = useState(true);
  const closedCats = cats.filter(c=>CAT_HAS_OPTIONS(c.kind)||c.kind==='date');
  const tops = codes.filter(c=>!c.parent_id);
  const childrenOf = (id)=>codes.filter(c=>c.parent_id===id);

  // mesma fonte (codingsForView) do leitor: o recorte "Ver:" é compartilhado entre todas as telas.
  const layerCodings = useMemo(()=>
    codingsForView(allCodings, view, userId, projectMode)
  , [allCodings, view, userId, projectMode]);

  const matchingDocIds = useMemo(()=>{
    const s=new Set();
    docs.forEach(d=>{
      const ok = Object.entries(catFilter).every(([catId,want])=>{
        if(!want) return true;
        const rows = allValues.filter(x=>x.document_id===d.id && x.category_id===catId);
        const fin = rows.find(r=>r.layer==='final');
        const pool = fin ? [fin.value] : rows.map(r=>r.value);
        return pool.some(v=>v!=null && String(v).split(CAT_MULTI_SEP).includes(want));
      });
      if(ok) s.add(d.id);
    });
    return s;
  }, [docs, allValues, catFilter]);

  // contagem direta por código + agregada nos ancestrais (família mostra a soma de todos os subcódigos)
  const countByCode = useMemo(()=>{
    const direct={};
    layerCodings.filter(c=>matchingDocIds.has(c.document_id)).forEach(c=>{ direct[c.code_id]=(direct[c.code_id]||0)+1; });
    const parentOf = {}; codes.forEach(c=>{ parentOf[c.id]=c.parent_id; });
    const agg = {...direct};
    Object.entries(direct).forEach(([codeId,n])=>{
      let p = parentOf[codeId];
      while(p){ agg[p]=(agg[p]||0)+n; p = parentOf[p]; }
    });
    return agg;
  }, [layerCodings, matchingDocIds, codes]);

  const hasFilter = Object.values(catFilter).some(Boolean);

  return html`<div style="background:var(--surface);display:flex;flex-direction:column;height:100%">

    <!-- recorte "Ver:" compartilhado (mesmo seletor do leitor) -->
    ${((mode==='cloud' && projectMode==='collective') || (coders||[]).length>1) && html`<div class="pane-head" style="flex-direction:column;align-items:stretch;gap:6px;padding:10px 14px">
      <${ViewSelect} value=${view} onChange=${onView} coders=${coders} userId=${userId} projectMode=${projectMode} mode=${mode} />
    </div>`}

    <!-- categorias: seção colapsável idêntica ao "Gerenciar esquema" -->
    ${closedCats.length>0 && html`<div style="border-bottom:1px solid var(--line-soft)">
      <div class="node-row" style="padding:6px 14px;cursor:pointer;border-radius:0"
        onClick=${()=>setCatsOpen(o=>!o)}>
        <span class="caret">${catsOpen?'▾':'▸'}</span>
        <span class="node-name" style="font-weight:600">⍞ Categorias</span>
        ${hasFilter && html`<span class="pill" style="font-size:10px;padding:1px 8px">filtro ativo</span>`}
      </div>
      ${catsOpen && html`<div style="padding:4px 14px 12px">
        ${closedCats.map(cat=>{ const opts=(cat.options||[]).filter(o=>!isSpecialOpt(o));
          return html`<div key=${cat.id} class="field" style="margin-bottom:8px">
            <div class="field-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title=${cat.name}>${cat.name}</div>
            <select class="opt" style="width:100%"
              value=${catFilter[cat.id]||''} onChange=${e=>{ const v=e.target.value; onCatFilter(f=>{ const n={...f}; if(v) n[cat.id]=v; else delete n[cat.id]; return n; }); }}>
              <option value="">(qualquer)</option>
              ${opts.map(o=>html`<option value=${o}>${o}</option>`)}
            </select>
          </div>`; })}
        ${hasFilter && html`<button class="btn sm ghost" style="width:100%" onClick=${()=>onCatFilter({})}>limpar filtros</button>`}
      </div>`}
    </div>`}

    <!-- árvore de códigos (mesmas classes que o TreeNode do painel Codificar) -->
    <div class="field-label" style="padding:8px 14px 0;margin:0">✎ Códigos</div>
    <div class="tree scroll" style="flex:1;overflow-y:auto;padding:4px 6px">
      ${tops.length===0 && html`<span class="meta" style="padding:14px 8px;display:block">Nenhum código criado.</span>`}
      ${tops.map(t=>html`<${VizCodeNode} key=${t.id} code=${t} childrenOf=${childrenOf}
        counts=${countByCode} sel=${selCode} onSel=${onSelCode} depthPad=${0} />`)}
    </div>
  </div>`;
}

function VizCodeNode({ code, childrenOf, counts, sel, onSel, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg, false, code.sat);
  const isSel = sel===code.id;
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''}" style=${`padding-left:${6+depthPad*16}px;cursor:pointer`}
      onClick=${()=>onSel(code.id)}>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.name}</span>
      ${counts[code.id] ? html`<span class="count">${counts[code.id]}</span>` : ''}
    </div>
    ${open && kids.map(k=>html`<${VizCodeNode} key=${k.id} code=${k} childrenOf=${childrenOf}
      counts=${counts} sel=${sel} onSel=${onSel} depthPad=${depthPad+1} />`)}
  </div>`;
}

/* Nó de árvore com MULTI-seleção por checkbox (filtro de código da Nuvem em Gráficos).
   Espelha o VizCodeNode (mesma profundidade/visual), mas com checkbox em vez de seleção
   única — e sem arrastar/excluir (diferente do SchemaTreeNode). selectedIds é um Set. */
function CloudCodeNode({ code, childrenOf, counts, selectedIds, onToggle, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg, false, code.sat);
  const checked = selectedIds.has(code.id);
  return html`<div class="node">
    <div class="node-row ${checked?'sel':''}" style=${`padding-left:${6+depthPad*16}px;cursor:pointer`}
      onClick=${()=>onToggle(code.id)}>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <input type="checkbox" checked=${checked} onClick=${e=>e.stopPropagation()} onChange=${()=>onToggle(code.id)} style="margin-right:2px" />
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.is_redaction?'⦸ ':''}${code.name}</span>
      ${counts[code.id] ? html`<span class="count">${counts[code.id]}</span>` : ''}
    </div>
    ${open && kids.map(k=>html`<${CloudCodeNode} key=${k.id} code=${k} childrenOf=${childrenOf}
      counts=${counts} selectedIds=${selectedIds} onToggle=${onToggle} depthPad=${depthPad+1} />`)}
  </div>`;
}

/* ============ VizExcerpts — painel direito da Visualização ============
   Trechos do código selecionado, legíveis, agrupados por documento. */
function VizExcerpts({ docs, codes, codeById, codePath, allCodings, allValues, memos,
                       view, userId, catFilter, selCode, crossCodes, setCrossCodes,
                       onDelCoding, onAccept, onJump, projectMode, isAdmin, mode }){
  const layerCodings = useMemo(()=>
    codingsForView(allCodings, view, userId, projectMode)
  , [allCodings, view, userId, projectMode]);
  // notas analiticas por coding (scope='coding'): { coding_id -> conteudo }. Alimenta o ● no balao.
  const codingMemo = useMemo(()=> indexMemos(memos).codingMemo, [memos]);
  const [openNote, setOpenNote] = useState(null); // coding.id cuja nota esta aberta no card (um por vez)

  // conjunto de codificações já no gabarito (final), por doc+código+intervalo — pra não
  // oferecer "aceitar no gabarito" de algo que já está consolidado (evita duplicata).
  const finalSet = useMemo(()=>{
    const s=new Set();
    allCodings.forEach(c=>{ if(c.layer==='final') s.add(c.document_id+'|'+c.code_id+'|'+c.span_start+'|'+c.span_end); });
    return s;
  }, [allCodings]);
  const isFinalAlready = (c)=> finalSet.has(c.document_id+'|'+c.code_id+'|'+c.span_start+'|'+c.span_end);
  // admin no projeto coletivo pode consolidar no gabarito (só faz sentido pra trecho individual ainda não final)
  const canAccept = (c)=> isAdmin && projectMode==='collective' && c.layer!=='final' && !isFinalAlready(c);
  // remover: o próprio autor sempre; admin remove de qualquer um; fora da nuvem/individual tudo é do usuário
  const canRemove = (c)=> mode!=='cloud' || projectMode==='individual' || c.created_by===userId || isAdmin;

  const docById = useMemo(()=>Object.fromEntries(docs.map(d=>[d.id,d])), [docs]);

  const matchingDocIds = useMemo(()=>{
    const s=new Set();
    docs.forEach(d=>{
      const ok = Object.entries(catFilter).every(([catId,want])=>{
        if(!want) return true;
        const rows = allValues.filter(x=>x.document_id===d.id && x.category_id===catId);
        const fin = rows.find(r=>r.layer==='final');
        const pool = fin ? [fin.value] : rows.map(r=>r.value);
        return pool.some(v=>v!=null && String(v).split(CAT_MULTI_SEP).includes(want));
      });
      if(ok) s.add(d.id);
    });
    return s;
  }, [docs, allValues, catFilter]);

  // codigo selecionado + todos os seus descendentes (familia agrega os subcodigos)
  const selWithDescendants = useMemo(()=>{
    if(!selCode) return new Set();
    const ids = new Set([selCode]);
    let added = true;
    while(added){
      added = false;
      codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added = true; } });
    }
    return ids;
  }, [selCode, codes]);

  const excerpts = useMemo(()=>{
    if(!selCode) return [];
    const extra = [...new Set((crossCodes||[]).filter(Boolean))];
    return layerCodings
      .filter(c=> selWithDescendants.has(c.code_id) && matchingDocIds.has(c.document_id))
      .filter(c=>{
        if(!extra.length) return true;
        return extra.every(xid=>
          layerCodings.some(x=> x.document_id===c.document_id && x.code_id===xid
            && x.span_start < c.span_end && c.span_start < x.span_end));
      })
      .sort((a,b)=>{
        const na=docById[a.document_id]?.name||'', nb=docById[b.document_id]?.name||'';
        return na>nb?1:na<nb?-1:a.span_start-b.span_start;
      });
  }, [selCode, crossCodes, layerCodings, matchingDocIds, docById, selWithDescendants]);

  // agrupa codings de MESMO span+codigo no mesmo documento numa unidade so: um trecho identico
  // grifado por varios codificadores aparece uma vez, com um balao por pessoa (mesmo padrao da
  // Reconciliacao). So funde span EXATO (o quote e o mesmo) — spans parecidos mas diferentes
  // continuam separados. excerpts ja vem ordenado e o Map preserva a ordem de insercao (= ordem de span).
  const byDoc = useMemo(()=>{
    const g={};
    excerpts.forEach(c=>{ (g[c.document_id]=g[c.document_id]||[]).push(c); });
    return Object.entries(g).map(([docId, cods])=>{
      const groups = new Map();
      cods.forEach(c=>{
        const k = c.code_id+'|'+c.span_start+'|'+c.span_end;
        let grp = groups.get(k);
        if(!grp){ grp = { key:k, code_id:c.code_id, span_start:c.span_start, span_end:c.span_end, quote:c.quote, items:[] }; groups.set(k, grp); }
        grp.items.push(c);
      });
      return [docId, [...groups.values()]];
    });
  }, [excerpts]);

  const selCodeObj = selCode ? codeById[selCode] : null;
  const crossOpts = codes.filter(c=>c.id!==selCode);

  if(!selCode) return html`<div class="empty">
    <div class="t">Selecione um código</div>
    <div>Clique em um código à esquerda para ver os trechos codificados de todo o projeto.</div>
  </div>`;

  const col = codeColor(selCodeObj?.hue||0, selCodeObj?.depth||0, selCodeObj?.hue_deg, false, selCodeObj?.sat);

  return html`<div class="section" style="max-width:820px;margin:0 auto">

    <!-- cabeçalho: caminho do código + contagem -->
    <p class="h" style="font-size:15px;margin-bottom:4px">
      <span class="swatch" style=${`background:${col.solid}`}></span>
      ${codePath(selCode).join(' ▸ ')}
      <span class="pill">${excerpts.length} trecho${excerpts.length!==1?'s':''}</span>
    </p>

    <!-- co-ocorrência -->
    <div class="row" style="gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:14px">

/* ============ GRAFICOS — primitivas SVG desenhadas na mão (sem libs) ============
   Tudo é um único <svg> por gráfico, com viewBox/largura explícitos, pra que a
   exportação SVG/PNG (inlineSvgStyles + rasterizeSvg) seja genérica: serializa o
   <svg> ao vivo, resolve as var(--cor) computadas e baixa vetor ou rasteriza. */
function chTrunc(s, n){ s=String(s==null?'':s); return s.length>n ? s.slice(0,n-1)+'…' : s; }

/* soma de caracteres cobertos por uma lista de intervalos [start,end], mesclando
   sobreposições (senão um trecho coberto por 2 codings contaria em dobro). */
function mergedLen(spans){
  if(!spans.length) return 0;
  const s=[...spans].sort((a,b)=>a[0]-b[0]);
  let total=0, curS=s[0][0], curE=s[0][1];
  for(let i=1;i<s.length;i++){ const [a,b]=s[i];
    if(a>curE){ total+=curE-curS; curS=a; curE=b; } else if(b>curE){ curE=b; } }
  return total + (curE-curS);
}

/* barras horizontais que PREENCHEM a largura disponível (w = largura do container,
   medida pelo componente). Coluna de rótulo dimensionada pelo maior rótulo, sem cortar
   à toa; barras ocupam todo o resto. items: [{key,label,value,color,title}] */
function svgHBars(items, opt={}){
  const { color='var(--teal)', w=900, onClick, selKey, fmt=(v)=>v } = opt;
  const rowH=26, padT=10, padB=10, gap=14, valW=60, CH=6.6; // CH ≈ largura média do glifo a 12px
  // rótulo: cabe o maior texto, mas entre 25% e 48% da largura
  const longest = items.reduce((m,i)=>Math.max(m,String(i.label).length),0);
  const labelW = Math.round(Math.min(w*0.48, Math.max(w*0.25, Math.min(longest*CH+10, 520))));
  const maxChars = Math.max(6, Math.floor((labelW-8)/CH));
  const barX=labelW+gap, valX=w-6, barMaxW=Math.max(40, w-barX-valW-gap);
  const h=padT+padB+items.length*rowH;
  const max=Math.max(1, ...items.map(i=>i.value));
  return html`<svg viewBox="0 0 ${w} ${h}" width=${w} style="max-width:100%;font-family:var(--sans)" xmlns="http://www.w3.org/2000/svg">
    ${items.map((it,i)=>{ const y=padT+i*rowH, cy=y+rowH/2;
      const bw=Math.max(2, it.value/max*barMaxW), sel=selKey!=null&&it.key===selKey;
      return html`<g key=${it.key||i} style=${onClick?'cursor:pointer':''} onClick=${onClick?()=>onClick(it):null}>
        <title>${it.title||(it.label+' — '+fmt(it.value))}</title>
        <rect x="0" y=${y} width=${w} height=${rowH} fill="transparent"></rect>
        <text x=${labelW} y=${cy} dominant-baseline="middle" text-anchor="end" font-size="12.5" fill="var(--ink)">${chTrunc(it.label,maxChars)}</text>
        <rect x=${barX} y=${cy-9} width=${barMaxW} height="18" rx="5" fill="var(--line-soft)"></rect>
        <rect x=${barX} y=${cy-9} width=${bw} height="18" rx="5" fill=${it.color||color} stroke=${sel?'var(--ink)':'none'} stroke-width=${sel?1.6:0}></rect>
        <text x=${valX} y=${cy} dominant-baseline="middle" text-anchor="end" font-size="12" font-family="var(--mono)" fill="var(--ink-soft)">${fmt(it.value)}</text>
      </g>`; })}
  </svg>`;
}

/* heatmap em grade que ocupa a largura disponível (W = largura do container).
   Coluna de rótulo dimensionada pelo maior rótulo; células crescem pra preencher
   o resto quando há poucas colunas (e rolam horizontalmente quando há muitas).
   rows:[{id,label}], cols:[...], getN(row,col)->n */
function svgHeat(rows, cols, getN, max, opt={}){
  const { onClick, selId, colLabel=(c)=>c, sel2=null, W=900, rowColor=null, colColor=null } = opt;
  const cellH=24, topH=112, padR=12, padB=10, CH=6.4;
  const longest = rows.reduce((m,r)=>Math.max(m,String(r.label).length),0);
  const leftW = Math.round(Math.min(W*0.45, Math.max(W*0.18, Math.min(longest*CH+12, 480))));
  const maxChars = Math.max(8, Math.floor((leftW-8)/CH));
  const avail = W-leftW-padR;
  const cellW = Math.max(40, Math.min(140, Math.floor(avail/Math.max(1,cols.length)))); // preenche, sem esticar absurdo
  const w=Math.max(W, leftW+cols.length*cellW+padR), h=topH+rows.length*cellH+padB;
  // células em tons de CINZA (cor fica só nos rótulos dos códigos) — intensidade ∝ contagem.
  const heatFn=(n)=>{ if(!n) return 'transparent'; const a=0.10+0.72*(n/Math.max(1,max)); return `hsl(220 8% 45% / ${a.toFixed(2)})`; };
  return html`<svg viewBox="0 0 ${w} ${h}" width=${w} style="max-width:100%;font-family:var(--sans)" xmlns="http://www.w3.org/2000/svg">
    ${cols.map((c,ci)=>{ const x=leftW+ci*cellW+cellW*0.62, yy=topH-7; const cc=colColor&&colColor(c);
      return html`<text key=${'h'+ci} x=${x} y=${yy} transform=${`rotate(-45 ${x} ${yy})`} text-anchor="start" font-size="10.5" fill=${cc||'var(--ink-soft)'} font-weight=${cc?'600':'400'}>${chTrunc(colLabel(c),20)}</text>`; })}
    ${rows.map((r,ri)=>{ const y=topH+ri*cellH, cy=y+cellH/2, sel=selId!=null&&r.id===selId; const rc=rowColor&&rowColor(r);
      return html`<g key=${r.id||ri}>
        <title>${r.label}</title>
        <text x=${leftW-6} y=${cy} dominant-baseline="middle" text-anchor="end" font-size="11.5" fill=${sel?'var(--teal)':(rc||'var(--ink)')} font-weight=${(sel||rc)?'600':'400'}>${chTrunc(r.label,maxChars)}</text>
        ${cols.map((c,ci)=>{ const n=getN(r,c), x=leftW+ci*cellW;
          const hot=sel2&&selId===r.id&&sel2===c;
          return html`<g key=${ci} style=${onClick?'cursor:pointer':''} onClick=${onClick?()=>onClick(r,c,n):null}>
            <rect x=${x} y=${y} width=${cellW} height=${cellH} fill=${heatFn(n)} stroke=${hot?'var(--ink)':'var(--surface)'} stroke-width=${hot?1.6:1}></rect>
            ${n?html`<text x=${x+cellW/2} y=${cy} dominant-baseline="middle" text-anchor="middle" font-size="11" font-family="var(--mono)" fill="var(--ink)">${n}</text>`:null}
          </g>`; })}
      </g>`; })}
  </svg>`;
}

/* copia os estilos computados (resolvendo var(--cor)) do svg ao vivo para um clone
   destacado, pra que vetor/PNG saiam idênticos à tela mesmo fora do documento. */
function inlineSvgStyles(srcRoot, dstRoot){
  const src=[srcRoot, ...srcRoot.querySelectorAll('*')];
  const dst=[dstRoot, ...dstRoot.querySelectorAll('*')];
  const props=['fill','stroke','stroke-width','font-size','font-family','font-weight','opacity','dominant-baseline','text-anchor'];
  for(let i=0;i<src.length;i++){ const cs=getComputedStyle(src[i]), d=dst[i]; if(!d) continue;
    props.forEach(p=>{ const v=cs.getPropertyValue(p); if(v) d.style.setProperty(p,v); }); }
}
function svgCloneForExport(svg){
  const clone=svg.cloneNode(true);
  inlineSvgStyles(svg, clone);
  const vb=svg.viewBox.baseVal; const W=vb&&vb.width?vb.width:svg.clientWidth, H=vb&&vb.height?vb.height:svg.clientHeight;
  clone.setAttribute('width', W); clone.setAttribute('height', H);
  const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x',0); bg.setAttribute('y',0); bg.setAttribute('width',W); bg.setAttribute('height',H); bg.setAttribute('fill','#ffffff');
  clone.insertBefore(bg, clone.firstChild);
  return { clone, W, H };
}
function exportChartSVG(svg, name){
  if(!svg) return; const { clone }=svgCloneForExport(svg);
  const s='<?xml version="1.0" encoding="UTF-8"?>\n'+new XMLSerializer().serializeToString(clone);
  download(name+'.svg', s, 'image/svg+xml');
}
function exportChartPNG(svg, name){
  if(!svg) return; const { clone, W, H }=svgCloneForExport(svg);
  const s=new XMLSerializer().serializeToString(clone);
  const img=new Image(); const sc=2;
  img.onload=()=>{ const c=document.createElement('canvas'); c.width=W*sc; c.height=H*sc;
    const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height); ctx.scale(sc,sc); ctx.drawImage(img,0,0);
    c.toBlob(b=>{ const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name+'.png';
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }); };
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(s);
}

function tokenizeWords(text){
  const out=[];
  const m = (text||'').toLowerCase().match(/\p{L}[\p{L}\p{M}'\-]*/gu);
  if(!m) return out;
  for(const tk of m){ const w=tk.replace(/^['\-]+|['\-]+$/g,''); if(w.length>=3 && !STOPWORDS_PT.has(w) && !/^\d+$/.test(w)) out.push(w); }
  return out;
}
/* nuvem de palavras posicionada por espiral de Arquimedes com colisão por retângulo
   (mesma ideia do d3-cloud, sem lib). items: [{label,value,color}] já ordenados desc. */
function svgWordCloud(items, opt={}){
  const { w=900, h=520 } = opt;
  if(!items.length) return null;
  const fr=items.map(i=>i.value), maxF=Math.max(...fr), minF=Math.min(...fr);
  const sizeOf=(f)=>{ if(maxF===minF) return 26; const t=(Math.sqrt(f)-Math.sqrt(minF))/(Math.sqrt(maxF)-Math.sqrt(minF)); return Math.round(12+t*34); };
  const placed=[]; // {x,y,hw,hh,label,size,color,value}
  const hit=(x,y,hw,hh)=> placed.some(p=> Math.abs(x-p.x)<(hw+p.hw+1.5) && Math.abs(y-p.y)<(hh+p.hh+1.5));
  let minX=0,maxX=0,minY=0,maxY=0;
  // empacota na PROPORÇÃO da área visível (w/h): a nuvem nasce parecida com o container,
  // pra que ao caber (contain) sobre pouca margem. VF achata/estica a espiral p/ isso.
  // (palavras são largas, baseAR≈1.25; VF = baseAR / aspecto-alvo, limitado.)
  const VF=Math.max(0.32, Math.min(1.5, 1.25/((w/Math.max(1,h))||1.4)));
  items.forEach(it=>{
    const size=sizeOf(it.value);
    const hw=Math.max(5, it.label.length*size*0.285), hh=size*0.58;
    let x=0,y=0;
    for(let t=0; t<6000; t+=0.22){ const r=2.4*t; x=r*Math.cos(t); y=r*Math.sin(t)*VF; if(!hit(x,y,hw,hh)) break; }
    placed.push({x,y,hw,hh,label:it.label,size,color:it.color,value:it.value});
    minX=Math.min(minX,x-hw); maxX=Math.max(maxX,x+hw); minY=Math.min(minY,y-hh); maxY=Math.max(maxY,y+hh);
  });
  const pad=10, W=Math.round((maxX-minX)+pad*2), H=Math.round((maxY-minY)+pad*2);
  const ox=-minX+pad, oy=-minY+pad;
  // width/height = 100% do contêiner (que tem tamanho fixo = área visível) + preserveAspectRatio
  // "meet" => a nuvem CABE inteira (contain), centralizada, sem rolagem.
  return html`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%;display:block;font-family:var(--sans)" xmlns="http://www.w3.org/2000/svg">
    ${placed.map((p,i)=>html`<text key=${i} x=${(p.x+ox).toFixed(1)} y=${(p.y+oy).toFixed(1)} font-size=${p.size} font-weight="600" fill=${p.color} text-anchor="middle" dominant-baseline="middle"><title>${p.label} — ${p.value}</title>${p.label}</text>`)}
  </svg>`;
}

          onClick=${()=>onSel({scope:'coding', targetId:m.target_id})}>
