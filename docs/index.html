    async setFinalValue(pid,docId,catId,value){
      if(value===''){ must(await sb.from('doc_values').delete().eq('document_id',docId).eq('category_id',catId).eq('layer','final')); return; }
      must(await sb.from('doc_values').upsert({project_id:pid,document_id:docId,category_id:catId,value,set_by:user.id,author_name:name,layer:'final',updated_at:new Date().toISOString()},{onConflict:'document_id,category_id,set_by,layer'}));

    // usado pelo import de .qualilab pra preservar cada pesquisador de origem como uma linha
    // independente, igual ja fazia addCoding com created_by:null. set_by null nunca colide
    // com a unique (document_id,category_id,set_by,layer) — Postgres trata NULL como distinto

    async addDocValue(pid,v){

    async deleteCode(id){ must(await sb.from('codes').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','code').eq('target_id',id); },
    async listCodings(pid,docId){ return must(await sb.from('codings').select('*').eq('project_id',pid).eq('document_id',docId)); },
    async addCoding(pid,co){
      const hasCB = Object.prototype.hasOwnProperty.call(co,'created_by');
      const row = {project_id:pid, created_by:user.id, author_name:name, ...co};
      if(hasCB && co.created_by===null) row.created_by = null;
      return must(await sb.from('codings').insert(row).select().single());
    },
    async deleteCoding(id){ must(await sb.from('codings').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','coding').eq('target_id',id); },
    // memos: nota unica compartilhada por alvo (projeto/documento/codigo); ultima edicao vale
    async listMemos(pid){ try{ return must(await sb.from('memos').select('*').eq('project_id',pid)); }catch(e){ return []; } },
    async setMemo(pid, scope, targetId, content, authorName){
      if(!content || !content.trim()){
        must(await sb.from('memos').delete().eq('project_id',pid).eq('scope',scope).eq('target_id',targetId));
        return;
      }
      must(await sb.from('memos').upsert(
        { project_id:pid, scope, target_id:targetId, content, author_name:authorName||'anonimo', updated_by:user?.id||null, updated_at:new Date().toISOString() },
        { onConflict:'project_id,scope,target_id' }
      ));
    },
    // resultados salvos da aba "Analisar com IA"
    async listIaResults(pid){ try{ return must(await sb.from('ia_results').select('*').eq('project_id',pid).order('created_at',{ascending:false})); }catch(e){ return []; } },
    async addIaResult(pid,{scope,mode_label,result,author_name}){
      return must(await sb.from('ia_results').insert(
        { project_id:pid, scope, mode_label, result, author_name:author_name||'anonimo', created_by:user?.id||null }
      ).select().single());
    },
    async deleteIaResult(id){ must(await sb.from('ia_results').delete().eq('id',id)); },
    // sincronizacao ao vivo: dispara onChange a cada alteracao em codings/doc_values do projeto
    realtime(projectId, onChange){
      const ch = sb.channel('qualilab:'+projectId)
        .on('postgres_changes', { event:'*', schema:'public', table:'codings',    filter:'project_id=eq.'+projectId }, onChange)
        .on('postgres_changes', { event:'*', schema:'public', table:'doc_values', filter:'project_id=eq.'+projectId }, onChange)
        .subscribe();
      return ()=>{ try{ sb.removeChannel(ch); }catch(e){} };
    },
  };
}

/* ===== Recorte "Ver:" unificado (camada/codificador) — fonte unica usada em TODAS as telas =====
   view: 'all' (individuais de todos + gabarito) | 'mine' | 'final' (gabarito) | <userId> | '__nm__'+nome
   Regra: 'all' = sobreposicao de TODAS as camadas (individuais de cada codificador + o gabarito
   consolidado), pra "ver todo mundo" incluir o que ja foi reconciliado. O gabarito sozinho fica
   em 'final'. (Atencao: em telas de contagem — Graficos/Relatorio — 'all' soma individuais E
   gabarito, entao o que ja foi consolidado conta duas vezes; escolha do autor.) Projeto individual:
   tudo ja nasce em 'final', entao o recorte so filtra por codificador quando ha >1 autor importado. */
function codingsForView(codings, view, userId, projectMode){
  if(projectMode==='individual'){
    if(typeof view==='string' && view.startsWith('__nm__')) return codings.filter(c=>c.author_name===view.slice(6));
    if(view && view!=='all' && view!=='mine' && view!=='final') return codings.filter(c=>c.created_by===view);
    return codings;
  }
  if(view==='final') return codings.filter(c=>c.layer==='final');
  if(view==='all') return codings;
  const indiv = codings.filter(c=>c.layer!=='final');
  if(view==='mine') return indiv.filter(c=>c.created_by===userId);
  if(typeof view==='string' && view.startsWith('__nm__')){ const nm=view.slice(6); return indiv.filter(c=>c.author_name===nm); }
  return indiv.filter(c=>c.created_by===view);
}
/* lista de valores de UMA categoria de UM documento conforme o recorte (para agregacao/distribuicao).
   'all' devolve as respostas de todos os pesquisadores + o gabarito; 'final' so o gabarito;
   'mine'/coder a resposta daquele autor. Em projeto individual, gabarito (ou a 1a resposta). */
function valuesForView(values, docId, catId, view, userId, projectMode){
  const rows = values.filter(v=>v.document_id===docId && v.category_id===catId);
  const fin = rows.find(r=>r.layer==='final');
  if(projectMode==='individual') return fin ? [fin.value] : (rows[0] ? [rows[0].value] : []);
  if(view==='final') return fin ? [fin.value] : [];
  const indiv = rows.filter(r=>(r.layer||'individual')!=='final');
  if(view==='all') return rows.map(r=>r.value);
  if(view==='mine'){ const m=indiv.find(r=>r.set_by===userId); return m?[m.value]:[]; }
  if(typeof view==='string' && view.startsWith('__nm__')){ const nm=view.slice(6); const m=indiv.find(r=>r.author_name===nm); return m?[m.value]:[]; }
  const m=indiv.find(r=>r.set_by===view); return m?[m.value]:[];
}
/* rotulo legivel do recorte (para textos/relatorio) */
function viewLabel(view, coders){
  if(view==='final') return 'gabarito final';
  if(view==='all') return 'individuais (todos)';
  if(view==='mine') return 'minhas codificacoes';
  if(typeof view==='string' && view.startsWith('__nm__')) return view.slice(6);
  const c=(coders||[]).find(x=>x.id===view); return c?c.name:'individuais';
}
/* Seletor "Ver:" unico, identico em todas as telas. Recebe o estado compartilhado do App.
   Visibilidade: igual a regra historica do leitor — projeto coletivo na nuvem, ou qualquer
   projeto com mais de um codificador (ex.: .qdpx importado offline). */
function ViewSelect({ value, onChange, coders, userId, projectMode, mode, label='Ver:' }){
  const show = (mode==='cloud' && projectMode==='collective') || (coders||[]).length>1;
  if(!show) return null;
  return html`<label class="meta" style="display:flex;align-items:center;gap:5px">${label}
    <select class="opt" value=${value} onChange=${e=>onChange(e.target.value)}>
      ${projectMode==='collective' ? html`
        <option value="all">Individuais (todos)</option>
        <option value="mine">Minhas</option>
        ${coders.filter(c=>c.id!==userId).map(c=>html`<option value=${c.id}>${c.name}</option>`)}
        <option value="final">Final / gabarito</option>
      ` : html`
        <option value="all">Todos os codificadores</option>
        ${coders.map(c=>html`<option value=${c.id}>${c.name}</option>`)}
      `}
    </select></label>`;
}

/* Seção colapsável (fechada por padrão) do menu de contexto do leitor — usada por
   "Aceitar no gabarito" e "Rejeitar / remover", pra não despejar listas longas abertas. */
function CtxSection({ title, count, children }){
  const [open, setOpen] = useState(false);
  return html`<div style="border-bottom:1px solid var(--line-soft)">
    <button onClick=${e=>{ e.stopPropagation(); setOpen(o=>!o); }}
      style="display:flex;align-items:center;gap:6px;width:100%;padding:7px 12px;font-size:11px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;box-sizing:border-box">
      <span style="font-size:9px;width:9px">${open?'▼':'▶'}</span>${title}<span class="count" style="margin-left:auto">${count}</span>
    </button>
    ${open && children}
  </div>`;
}

/* Seção colapsável (aberta por padrão) de barra lateral — cabeçalho com caret + conteúdo.
   Usada na navegação da Reconciliação (Documentos / Categoria / Código). */
function NavGroup({ title, children, defaultOpen=true }){
  const [open, setOpen] = useState(defaultOpen);
  return html`<div style="border-bottom:1px solid var(--line-soft)">
    <div class="node-row" style="padding:6px 12px;cursor:pointer;border-radius:0" onClick=${()=>setOpen(o=>!o)}>
      <span class="caret">${open?'▾':'▸'}</span>
      <span class="node-name" style="font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.04em;color:var(--ink-soft)">${title}</span>
    </div>
    ${open && html`<div style="padding-bottom:6px">${children}</div>`}
  </div>`;
}

/* ============================== APP ============================== */

  const [progress, setProgress] = useState(null); // {done,total} durante import grande

  // (trocar de aba do navegador não interrompe — MessageChannel/Worker seguem —, mas fechar
  // ou recarregar no meio perde o progresso). Só ativo enquanto 'busy'.
  useEffect(()=>{
    if(!busy) return;

  }, [busy]);
  const [online, setOnline] = useState(navigator.onLine);
  const [pending, setPending] = useState(0); // escritas em fila (cloud offline)
  const [saveError, setSaveError] = useState(null); // ultima falha de gravacao local/arquivo (null = ok)
  const [backupStatus, setBackupStatus] = useState({ active:false, name:null, lastOk:null, lastError:null, warnLarge:false }); // backup automatico em pasta (so LocalStore)
  const [sendCloudOpen, setSendCloudOpen] = useState(false); // modal "Enviar para a nuvem" (projeto local/arquivo -> projeto novo na nuvem)
  const [importMsg, setImportMsg] = useState(null);
  const [role, setRole] = useState('member');  // papel do usuário no projeto: admin | member
  const [members, setMembers] = useState([]);   // membros do projeto (gestão de admins)

  const activeDoc = docs.find(d=>d.id===activeId) || null;
  const isAdmin = role==='admin';

  // modo escuro do app inteiro (persistido por navegador, sem relacao com o projeto). Liga/desliga
  // via html[data-theme=dark], que sobrepoe as variaveis de cor do :root. O tema do LEITOR
  // (readerPrefs.theme) e independente disto.
  const [darkMode, setDarkMode] = useState(()=>{ try{ return localStorage.getItem('qualilab:dark')==='1'; }catch(e){ return false; } });
  useEffect(()=>{
    document.documentElement.dataset.theme = darkMode ? 'dark' : '';
    try{ localStorage.setItem('qualilab:dark', darkMode?'1':'0'); }catch(e){}
  }, [darkMode]);

  // preferencias de leitura do .reader (zoom, largura, tema) — persistidas no localStorage,
  // sem relacao com o projeto (vale pra qualquer documento/projeto neste navegador).
  const [readerPrefs, setReaderPrefs] = useState(()=>{
    try{ return { scale:1, width:'normal', theme:'light', rightW:340, ...JSON.parse(localStorage.getItem('qualilab:reader_prefs')||'{}') }; }
    catch(e){ return { scale:1, width:'normal', theme:'light', rightW:340 }; }
  });
  useEffect(()=>{ try{ localStorage.setItem('qualilab:reader_prefs', JSON.stringify(readerPrefs)); }catch(e){} }, [readerPrefs]);
  // arrasta a divisa (.pane-resize) entre o leitor e o painel direito na tela de Codificação —
  // largura do painel direito persiste em readerPrefs.rightW. Arrastar pra esquerda alarga a
  // direita (delta = startX - x atual). Limites: 180px a 60% da janela.
  function onResizeHandleMouseDown(e){
    if(e.button!==0) return;
    const startX = e.clientX;
    const startW = readerPrefs.rightW;
    const handle = e.currentTarget;
    handle.classList.add('dragging');
    function onMove(ev){
      const delta = startX - ev.clientX;
      const newW = Math.max(180, Math.min(window.innerWidth*0.6, startW + delta));
      setReaderPrefs(p=>({...p, rightW:Math.round(newW)}));
    }
    function onUp(){ handle.classList.remove('dragging'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    e.preventDefault();
  }
  // busca dentro do documento aberto (independente da selecao de codigo/categoria)
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchIdx, setSearchIdx] = useState(0);
  const readerRef = useRef(null);
  const searchMatches = useMemo(()=>{
    const text = activeDoc?.content||'';
    const q = searchQuery.trim().toLowerCase();
    if(!q || !text) return [];
    const lower = text.toLowerCase();
    const out = []; let from = 0;
    while(true){ const found = lower.indexOf(q, from); if(found<0) break; out.push([found, found+q.length]); from = found+q.length; }
    return out;
  }, [searchQuery, activeDoc]);
  useEffect(()=>{ setSearchIdx(0); }, [searchQuery, activeId]);
  useEffect(()=>{
    if(!searchOpen || !searchMatches.length) return;
    const i = ((searchIdx % searchMatches.length) + searchMatches.length) % searchMatches.length;
    const el = readerRef.current?.querySelector(`[data-match="${i}"]`);
    el?.scrollIntoView({ block:'center' });
  }, [searchIdx, searchMatches, searchOpen]);

  // codificadores presentes no documento ativo (para o filtro "Ver:")
  // usa created_by quando disponível (sessão ativa); cai em author_name para codificações
  // importadas de QDPX que chegam sem uuid (created_by === null)
  const coders = useMemo(()=>{
    const byId = {}; const byName = {};
    // lista de codificadores do PROJETO INTEIRO (allCodings) quando carregado — assim o filtro
    // "Ver:" aparece e oferece todos os pesquisadores mesmo abrindo um documento de um so autor;
    // cai para as codings do doc ativo enquanto allCodings nao estiver carregado.
    const src = allCodings.length ? allCodings : codings;
    src.forEach(c=>{
      // coletivo: a camada final (gabarito) nao e um "codificador". Individual: tudo conta,
      // pois .qdpx importado entra em 'final' mas preserva os autores em author_name —
      // sem isso, um projeto multi-pesquisador importado offline ficaria sem o filtro "Ver:".
      if(projectMode!=='individual' && c.layer==='final') return;
      if(c.created_by) byId[c.created_by] = c.author_name||'anônimo';
      else if(c.author_name) byName[c.author_name] = true;
    });
    const fromId = Object.entries(byId).map(([id,name])=>({id, name}));
    // inclui autores por nome que não coincidam com alguém já indexado por uuid
    const fromName = Object.keys(byName)
      .filter(n=>!fromId.find(x=>x.name===n))
      .map(n=>({id:'__nm__'+n, name:n}));
    return [...fromId, ...fromName].sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  }, [allCodings, codings, projectMode]);

  // codificações visíveis no leitor conforme o recorte "Ver:" — mesma fonte (codingsForView)
  // usada por Visualizar, Gráficos e Relatório, pra o comportamento ser idêntico em todas as telas.
  const visibleCodings = useMemo(()=>
    codingsForView(codings, viewCoder, user?.id, projectMode)
  , [codings, viewCoder, user, projectMode]);

  /* lista "Meus Projetos" por conta (cache local, complementa o servidor) */
  const recentKey = (st)=> 'qualilab:projects:'+((st||store)?.currentUser?.()?.id || 'anon');
  const getRecent = (st)=>{ try{ return JSON.parse(localStorage.getItem(recentKey(st))||'[]'); }catch(e){ return []; } };
  const removeRecent = (p, st)=>{ try{ const k=recentKey(st||store); localStorage.setItem(k, JSON.stringify(getRecent(st||store).filter(x=>x.code!==p.code))); }catch(e){} };
  const pushRecent = (p, st)=>{ try{ const k=recentKey(st); const list=getRecent(st).filter(x=>x.code!==p.code);
    list.unshift({ id:p.id, name:p.name, code:p.code, at:Date.now() }); localStorage.setItem(k, JSON.stringify(list.slice(0,30))); }catch(e){} };

  const loadMyProjects = useCallback(async ()=>{
    if(!store){ setMyProjects([]); return; }
    let list = null;
    try{ list = await store.listMyProjects?.(); }catch(e){}
    const local = getRecent();
    if(list && list.length){ const codes=new Set(list.map(p=>p.code)); list=[...list, ...local.filter(p=>!codes.has(p.code))]; }
    else { list = local; }
    setMyProjects(list);
  }, [store, user]); // eslint-disable-line
  useEffect(()=>{ if(phase==='gate' || account) loadMyProjects(); }, [phase, account, loadMyProjects]);

  const openProject = (p)=>{
    setProject(p); setProjectMode(p.mode||'collective');
    // recorte "Ver:" volta ao padrão (individuais de todos) ao entrar num projeto
    setViewCoder('all');
  };

  /* online / offline + flush da fila de escrita ao recuperar conexão */
  useEffect(()=>{
    const goOnline = ()=>{ setOnline(true); if(store?.flush) store.flush(); };
    const goOffline = ()=>setOnline(false);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    if(store?.onPendingChange) store.onPendingChange(setPending);
    if(store?.onSaveError) store.onSaveError(setSaveError);
    if(store?.onBackupStatus) store.onBackupStatus(setBackupStatus);
    return ()=>{ window.removeEventListener('online',goOnline); window.removeEventListener('offline',goOffline); };
  }, [store]);

  /* apos autenticar (sessao existente ou login): reentra no projeto salvo ou vai pro gate */
  async function afterAuth(st, display){
    setUser(st.currentUser());
    const saved = (()=>{ try{return JSON.parse(localStorage.getItem('qualilab:project')||'null');}catch(e){return null;} })();
    if(saved && saved.code){
      try{ const p = await st.joinProject(saved.code, display||st.currentUser()?.name||'anonimo'); pushRecent(p, st); openProject(p); setPhase('work'); return; }
      catch(e){ try{localStorage.removeItem('qualilab:project');}catch(_){} }
    }
    setPhase('gate');
  }

  async function enterLocalOffline(display){
    const st = LocalStore();
    setMode('local');
    setStore(st);
    const name = display || (()=>{ try{return localStorage.getItem('qualilab:name')||'pesquisador';}catch(e){return 'pesquisador';} })();
    try{ localStorage.setItem('qualilab:name', name); }catch(e){}
    await st.init(name);
    setUser(st.currentUser());
    const p = await st.createProject();
    openProject(p);
    setErr(null);
    setPhase('work');
  }

  /* boot */
  useEffect(()=>{ (async()=>{
    try{
      if(wantCloud){
        const createClient = await getCreateClient();
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const st = SupabaseStore(sb);
        setStore(st);
        const display = (()=>{ try{return localStorage.getItem('qualilab:name')||'';}catch(e){return '';} })();
        const sess = await st.init(display);   // null se nao houver sessao salva
        if(!sess){ setPhase('auth'); return; } // pede login/cadastro
        setUser(st.currentUser());
        await afterAuth(st, display);
      } else {
        // tenta reabrir o último arquivo .qualilab antes de cair no localStorage
        const lastHandle = await reopenLastFile();
        if(lastHandle){
          const st = await createFileStore(lastHandle, false); setStore(st);
          const display = (()=>{ try{return localStorage.getItem('qualilab:name')||'pesquisador';}catch(e){return 'pesquisador';} })();
          const u = await st.init(display); setUser({...u,anon:false});

  // reordena categorias por drag-and-drop: move draggedId pra posicao de targetId,
  // empurrando as demais — so muda position, nunca a hierarquia (categoria e flat).
  async function reorderCategories(draggedId, targetId){
    if(draggedId===targetId) return;
    const ordered = cats.slice().sort((a,b)=>(a.position??0)-(b.position??0));
    const from = ordered.findIndex(c=>c.id===draggedId), to = ordered.findIndex(c=>c.id===targetId);
    if(from<0 || to<0) return;
    ordered.splice(to, 0, ordered.splice(from,1)[0]);
    for(let i=0;i<ordered.length;i++){ if(ordered[i].position!==i) await store.updateCategory(ordered[i].id,{position:i}); }

  // cor personalizada: so o nivel 0 escolhe; a cascata propaga para todos os descendentes
  async function setCodeColor(rootCode, hex){
    if(!isAdmin){ setErr('Apenas administradores podem alterar a cor de uma família de código.'); return; }
    const hueDeg = hex==='gray' ? -1 : hex==='black' ? -2 : hex ? hexToHue(hex) : null;
    const ids = new Set([rootCode.id]);
    let added = true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); }
    for(const id of ids) await store.updateCode(id, { hue_deg: hueDeg });
    setCodes(x=>x.map(c=>ids.has(c.id) ? {...c, hue_deg:hueDeg} : c));
  }
  // censura propaga pra subarvore inteira (igual cor) — marcar uma familia como censura e
  // os subcodigos continuarem "normais" seria inconsistente: o pesquisador esperaria que
  // qualquer trecho dali pra baixo ficasse de fora do material da IA por padrao.
  async function setCodeRedaction(rootCode, value){
    if(!isAdmin){ setErr('Apenas administradores podem marcar um código como censura.'); return; }
    const ids = new Set([rootCode.id]);
    let added = true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); }
    // ao marcar censura: força preto (hue_deg:-2); ao desmarcar: devolve cor automática (null)
    const huePatch = value ? { hue_deg: -2 } : { hue_deg: null };
    for(const id of ids) await store.updateCode(id, { is_redaction: value, ...huePatch });
    setCodes(x=>x.map(c=>ids.has(c.id) ? {...c, is_redaction:value, ...huePatch} : c));
  }

  // monta o objeto db no mesmo formato de um .qualilab a partir do projeto ATIVO (qualquer
  // modo) — extraido pra ser reaproveitado tanto por saveQualilab (baixa como arquivo) quanto
  // por "enviar para a nuvem" (importa direto noutro projeto, sem passar por arquivo).
  async function buildQualilabDb(){
    const documents = docs.map(d=>({ id:d.id, name:d.name, content:d.content, created_at:d.created_at||new Date().toISOString() }));
    const categories = cats.map((c,i)=>({ id:c.id, position:c.position??i, name:c.name, kind:c.kind, options:c.options||[], description:c.description||'', color:c.color||0 }));
    const codesOut = codes.map((c,i)=>({ id:c.id, position:c.position??i, parent_id:c.parent_id||null, name:c.name, hue:c.hue||0, depth:c.depth||0, hue_deg:c.hue_deg??null, is_redaction:!!c.is_redaction }));
    const doc_values=[], codings=[];
    for(const d of docs){
      const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id, d.id)]);
      v.forEach(x=>doc_values.push({ id:x.id||uid(), document_id:d.id, category_id:x.category_id, value:x.value, set_by:x.set_by||'file-user', author_name:x.author_name||'anonimo', layer:x.layer||'individual' }));
      co.forEach(x=>codings.push({ id:x.id||uid(), document_id:x.document_id, code_id:x.code_id, span_start:x.span_start, span_end:x.span_end, quote:x.quote, layer:x.layer||'individual', created_by:x.created_by??null, author_name:x.author_name||'anonimo', created_at:x.created_at||new Date().toISOString() }));
    }
    let memos=[], ia_results=[];
    try{ memos = (await store.listMemos?.(project.id))||[]; }catch(e){}
    try{ ia_results = ((await store.listIaResults?.(project.id))||[]).slice().reverse(); }catch(e){}
    return { _meta:{ id:'file-project', name:project.name||'Projeto', code:'FILE', mode:projectMode||'individual', displayName:user?.name||'pesquisador' },
      documents, categories, doc_values, codes:codesOut, codings, memos, ia_results };
  }
  // salva o projeto inteiro como um arquivo .qualilab (mesmo formato do FileStore),
  // que pode ser reaberto depois via "abrir .qualilab". Funciona em qualquer modo
  // (local/nuvem/arquivo) — junta tudo do store e baixa como JSON.
  async function saveQualilab(){
    setExpOpen(false);
    setBusy('Gerando .qualilab...');
    try{
      const db = await buildQualilabDb();
      download((project.name||'projeto').replace(/[^\w\-]+/g,'_')+'.qualilab', JSON.stringify(db,null,2), 'application/json');
      setBusy(null);
    }catch(e){ setBusy(null); setErr('Falha ao salvar .qualilab: '+(e.message||e)); }
  }

  async function doExport(kind){
    setExpOpen(false);
    try{
      const allV=[], allC=[];
      for(const d of docs){
        const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id,d.id)]);
        v.forEach(x=>allV.push({ document_id:d.id, category_id:x.category_id, value:x.value, author:x.author_name||'anonimo', layer:x.layer||'individual' }));
        co.forEach(x=>allC.push(x));
      }
      const dn=(id)=>docs.find(d=>d.id===id)?.name||"";
      if(kind==='json'){
        const obj={ exported_at:new Date().toISOString(), project:{ name:project.name, code:project.code },
          documents:docs.map(d=>({id:d.id,name:d.name,content:d.content})),
          categories:cats.map(c=>({id:c.id,name:c.name,kind:c.kind,options:c.options,description:c.description||''})),
          document_values:allV,
          codes:codes.map(c=>({id:c.id,parent_id:c.parent_id,name:c.name,depth:c.depth,path:codePathFor(codes,c.id)})),
          codings:allC.map(c=>({id:c.id,document_id:c.document_id,code_id:c.code_id,code_path:codePathFor(codes,c.code_id),start:c.span_start,end:c.span_end,quote:c.quote,author:c.author_name,layer:c.layer||'individual'})) };
        download('qualilab_projeto.json', JSON.stringify(obj,null,2), 'application/json');
      } else if(kind==='trechos'){
        const header=["documento","familia","codigo","nivel","trecho","inicio","fim","autor","camada"];
        const sorted=allC.slice().sort((a,b)=> a.document_id===b.document_id ? a.span_start-b.span_start : (dn(a.document_id)>dn(b.document_id)?1:-1));
        const rows=sorted.map(c=>{ const p=codePathFor(codes,c.code_id); return [dn(c.document_id), p[0]||"", p.join(" > "), String(p.length-1), c.quote, String(c.span_start), String(c.span_end), c.author_name, c.layer||'individual']; });
        download('qualilab_trechos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='documentos'){
        // usa o gabarito (final) quando existe; senao a primeira resposta individual
        const valFor=(docId,catId)=>{ const rows=allV.filter(x=>x.document_id===docId&&x.category_id===catId);
          const fin=rows.find(r=>r.layer==='final'); return (fin||rows[0]||{}).value||""; };
        const header=["documento",...cats.map(c=>c.name),"n_trechos"];
        const rows=docs.map(d=>[d.name, ...cats.map(cat=>valFor(d.id,cat.id)), String(allC.filter(c=>c.document_id===d.id&&(c.layer||'individual')!=='final').length)]);
        download('qualilab_documentos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='qdpx'){
        // um valor por documento/categoria (QDPX espera isso): prefere o gabarito (final)
        const pick = {};
        allV.forEach(x=>{ const k=x.document_id+':'+x.category_id; const cur=pick[k];
          if(!cur || (x.layer==='final' && cur.layer!=='final')) pick[k]=x; });
        // prefere a camada final (gabarito consolidado); se nao houver, usa as individuais
        const finalCods = allC.filter(c=>c.layer==='final');
        const codForQdpx = finalCods.length > 0 ? finalCods : allC.filter(c=>(c.layer||'individual')!=='final');
        await exportQDPX(docs, cats, Object.values(pick), codes, codForQdpx, project);
      } else if(kind==='ati' || kind==='leitor'){
        let memosForExport=[]; try{ memosForExport=(await store.listMemos?.(project.id))||[]; }catch(e){}
        if(kind==='ati') exportWebAnnotations(docs, codes, allC, memosForExport, project);
        else exportTransparencyReader(docs, codes, allC, memosForExport, project);
      }
    }catch(e){ setErr('Falha ao exportar: '+(e.message||e)); }
  }

    setBusy('Importando .qdpx...');
    setProgress({done:0,total:0});
    try{
      const r = await importQDPX(file, store, project.id, projectMode, (done,total,label)=>setProgress({done,total,label}));
      setProgress(null);
      const freshDocs = await store.listDocuments(project.id);
      // carrega o projeto completo e define explicitamente o primeiro documento
      // (evita race condition: loadDoc usa activeId do closure, que pode ser antigo)
      const [cats2, codes2] = await Promise.all([store.listCategories(project.id), store.listCodes(project.id)]);
      setCats(cats2); setCodes(codes2); setDocs(freshDocs);
      try{ if(store.listMemos) setMemos(await store.listMemos(project.id) || []); }catch(e){}
      const firstId = freshDocs[0]?.id || null;
      if(firstId){
        setActiveId(firstId);
        const [vals, cods] = await Promise.all([store.getDocValues(firstId), store.listCodings(project.id, firstId)]);
        setValues(vals); setCodings(cods);
      }
      const desc = r.descartados;
      const skippedBits = [];
      if(desc.picture) skippedBits.push(`${desc.picture} imagem(ns)`);
      if(desc.audio) skippedBits.push(`${desc.audio} áudio(s)`);
      if(desc.video) skippedBits.push(`${desc.video} vídeo(s)`);
      if(desc.pdfSemTexto) skippedBits.push(`${desc.pdfSemTexto} PDF(s) sem representação em texto`);
      if(desc.fonteExterna) skippedBits.push(`${desc.fonteExterna} fonte(s) externa(s)`);
      if(desc.codingsRegiao) skippedBits.push(`${desc.codingsRegiao} codificação(ões) em regiões/imagens do PDF (sem texto selecionável)`);
      if(desc.codingsNaoLocalizados) skippedBits.push(`${desc.codingsNaoLocalizados} codificação(ões) cujo trecho não foi localizado no texto`);
      const skippedMsg = skippedBits.length ? ` Não importado(s): ${skippedBits.join(', ')}.` : '';
      const detalhes = [];
      if(r.trechosGeometricos>0) detalhes.push(`${r.trechosGeometricos} recuperado(s) por geometria do PDF`);
      if(r.trechosAproximados>0) detalhes.push(`${r.trechosAproximados} localizado(s) de forma aproximada`);
      const aproxMsg = detalhes.length ? ` (${detalhes.join(', ')})` : '';
      const fechadasMsg = r.categoriasFechadasDetectadas>0
        ? ` ${r.categoriasFechadasDetectadas} categoria(s) detectada(s) como fechada(s) automaticamente (poucos valores distintos) — revise em "Gerenciar esquema de categorias".`
        : '';
      setErr(null);
      setBusy(null);
      const memosMsg = r.memos>0 ? ` ${r.memos} memo(s) (comentários de documento/código).` : '';
      const notasMsg = r.notasProjeto>0 ? ` ${r.notasProjeto} nota(s) livre(s) reunida(s) no memo do projeto.` : '';
      setImportMsg(`Importado: ${r.documentos} documento(s), ${r.categorias} categoria(s), ${r.codigos} código(s), ${r.trechos} trecho(s) codificado(s)${aproxMsg}.${memosMsg}${notasMsg}${skippedMsg}${fechadasMsg}`);
    }catch(e){ setBusy(null); setProgress(null); setErr('Falha ao importar: '+(e.message||e)); }
  }

  function computeSelection(){
    if(!activeDoc) return null;
    const s = window.getSelection();
    if(!s || s.rangeCount===0 || s.isCollapsed) return null;
    const r = s.getRangeAt(0);
    const off=(node,o)=>{ let el=node.nodeType===3?node.parentElement:node; while(el && (!el.dataset || el.dataset.start===undefined)) el=el.parentElement; return el?parseInt(el.dataset.start,10)+o:null; };
    const a=off(r.startContainer,r.startOffset), b=off(r.endContainer,r.endOffset);
    if(a==null||b==null) return null;
    const start=Math.min(a,b), end=Math.max(a,b);
    const q = activeDoc.content.slice(start,end); if(q.trim().length===0) return null;
    return { start, end, quote:q };
  }
  function onMouseUp(e){
    if(e && e.button!==0) return; // ignora clique direito (tratado em onContextMenu)
    const sx = computeSelection();
    if(sx){ setSel(sx); setRtab('codigos'); }
  }
  function onContextMenu(e){
    const sx = computeSelection();
    const marked = e.target?.closest?.('[data-c="1"]');
    if(!sx && !marked) return; // sem seleção nem grifo: deixa o menu normal do navegador
    e.preventDefault();
    // limite direito = borda da coluna de leitura (não invade o painel da direita)
    const boundRight = e.currentTarget.getBoundingClientRect().right;
    if(sx){
      setSel(sx);
      setCtxMenu({ x:e.clientX, y:e.clientY, sel:sx, quote:sx.quote, boundRight });
    } else {
      const start = parseInt(marked.dataset.start,10);
      const end = parseInt(marked.dataset.end||marked.dataset.start,10);
      setCtxMenu({ x:e.clientX, y:e.clientY, sel:null, pos:start, runEnd:end, quote:activeDoc.content.slice(start,end), boundRight });
    }
  }

  /* ----- maps ----- */
  const codeById = useMemo(()=>Object.fromEntries(codes.map(c=>[c.id,c])), [codes]);
  // codigos em ordem de arvore (pai antes dos filhos), para o menu de contexto
  const orderedCodes = useMemo(()=>{
    const out=[]; const childrenOf=(id)=>codes.filter(c=>c.parent_id===id);
    const walk=(list)=>list.forEach(c=>{ out.push(c); walk(childrenOf(c.id)); });
    walk(codes.filter(c=>!c.parent_id));
    return out;
  }, [codes]);
  const codePath = useCallback((id)=>{ const out=[]; let c=codeById[id]; let guard=0; while(c&&guard++<12){ out.unshift(c.name); c=c.parent_id?codeById[c.parent_id]:null; } return out; }, [codeById]);
  // o próprio autor sempre remove; admin remove (rejeita) o grifo de qualquer codificador; fora da nuvem/individual tudo é do usuário
  const canRemoveCoding = useCallback((c)=> store?.mode!=='cloud' || projectMode==='individual' || c.created_by===user?.id || isAdmin, [store, projectMode, user, isAdmin]);
  function codingsForCtxMenu(menu){
    if(!menu) return [];
    const matches = visibleCodings.filter(c=>{
      if(c.document_id!==activeId || !canRemoveCoding(c)) return false;
      if(menu.sel) return c.span_start < menu.sel.end && c.span_end > menu.sel.start;
      return c.span_start <= menu.pos && c.span_end > menu.pos;
    });
    const seen = new Set();
    return matches.filter(c=>{ if(seen.has(c.id)) return false; seen.add(c.id); return true; });
  }
  const codingCount = useMemo(()=>{ const m={}; codings.forEach(c=>{m[c.code_id]=(m[c.code_id]||0)+1;}); return m; }, [codings]);
  // frequencia GLOBAL (todo o projeto, nao so o documento aberto) — usada na aba Esquema,
  // que nao tem documento ativo; ajuda a ver o que esta sendo usado de fato ao reorganizar
  // agregada (familia soma os subcodigos), igual o countByCode do VizNav — sem isso, uma
  // familia (Hierarquia 0) sempre aparece com 0 quando o uso real esta nos subcodigos
  const schemaCodingCount = useMemo(()=>{
    const direct={}; allCodings.forEach(c=>{direct[c.code_id]=(direct[c.code_id]||0)+1;});
    const parentOf={}; codes.forEach(c=>{parentOf[c.id]=c.parent_id;});
    const agg={...direct};
    Object.entries(direct).forEach(([codeId,n])=>{
      let p=parentOf[codeId];
      while(p){ agg[p]=(agg[p]||0)+n; p=parentOf[p]; }
    });
    return agg;
  }, [allCodings, codes]);

/* ============ MODAL DE MAPEAMENTO DO .csv ============
   Mostra cada coluna do .csv e deixa o usuario escolher o papel dela: Texto (conteudo do
   documento), Nome do documento, uma Categoria (de qualquer tipo) ou Ignorar. Exige
   exatamente UMA coluna de texto. Os defaults sao um chute: a coluna com texto mais longo
   em media vira o "Texto"; as demais viram Categoria · Texto Fechado (revisavel). */
function CsvImportModal({ parsed, fileName, onCancel, onConfirm }){
  const { headers, rows } = parsed;
  // chute inicial: coluna com maior comprimento medio = texto
  const guessTextCol = (()=>{
    let best=0, bestLen=-1;
    headers.forEach((_,c)=>{ let sum=0,n=0; for(const r of rows.slice(0,50)){ sum+=(r[c]||'').length; n++; } const avg=n?sum/n:0; if(avg>bestLen){ bestLen=avg; best=c; } });
    return best;
  })();
  const [roles, setRoles] = useState(()=> headers.map((_,c)=> c===guessTextCol ? 'text' : 'cat:select'));
  const setRole = (c,v)=> setRoles(rs=> rs.map((x,i)=> i===c ? v : x));

  const textCount = roles.filter(r=>r==='text').length;
  const valid = textCount===1;
  const roleOpts = [
    {v:'ignore', l:'— Ignorar —'},
    {v:'text', l:'Texto (conteúdo do documento)'},
    {v:'name', l:'Nome do documento'},
    ...CAT_KINDS.map(k=>({v:'cat:'+k.id, l:'Categoria · '+k.label})),
  ];

  function confirm(){
    if(!valid) return;
    const textCol = roles.findIndex(r=>r==='text');
    const nameCol = roles.findIndex(r=>r==='name'); // -1 se nenhum
    const cats = roles.map((r,c)=> r.startsWith('cat:') ? { col:c, name:headers[c], kind:r.slice(4) } : null).filter(Boolean);
    onConfirm({ textCol, nameCol, cats });
  }

  // amostra por coluna: primeiros 3 VALORES DISTINTOS nao-vazios (para no 3o, varre so o necessario) —
  // a 1a linha de dados as vezes esta vazia/NA e nao representa a coluna; mostrar distintos
  // da uma ideia melhor do conteudo (e ja sinaliza colunas de poucos valores = candidatas a fechada).
  const colSamples = headers.map((_,c)=>{
    const seen=new Set(); const out=[];
    for(const r of rows){ const v=(r[c]||'').trim(); if(!v||seen.has(v)) continue; seen.add(v); out.push(v); if(out.length>=3) break; }
    return out;
  });
  return html`<div class="modal-bg" onClick=${onCancel}>
    <div class="modal" onClick=${e=>e.stopPropagation()} style="max-width:640px">
      <h3 style="margin:0 0 4px">Importar planilha</h3>
      <p class="hint" style="margin:0 0 12px">
        <b>${fileName}</b> · ${rows.length} linha(s) → cada linha vira um documento.
        Escolha o papel de cada coluna. Exatamente uma coluna deve ser o <b>Texto</b> (o conteúdo a codificar); as demais podem virar categorias.
      </p>
      <div style="max-height:46vh;overflow:auto;display:flex;flex-direction:column;gap:8px">
        ${headers.map((h,c)=> html`<div key=${c} class="card" style="padding:8px 10px;display:flex;align-items:center;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h}</div>
            <div class="hint" style="font-family:var(--mono);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title=${colSamples[c].join(' · ')}>
              ${colSamples[c].length ? 'ex.: '+colSamples[c].join(' · ') : '(coluna vazia)'}
            </div>
          </div>
          <select value=${roles[c]} onChange=${e=>setRole(c, e.target.value)} style="flex-shrink:0">
            ${roleOpts.map(o=> html`<option key=${o.v} value=${o.v}>${o.l}</option>`)}
          </select>
        </div>`)}
      </div>
      ${!valid && html`<p class="hint" style="color:var(--danger);margin:10px 0 0">
        ${textCount===0 ? 'Selecione uma coluna como "Texto (conteúdo do documento)".' : 'Apenas uma coluna pode ser o Texto.'}
      </p>`}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button class="btn ghost" onClick=${onCancel}>Cancelar</button>
        <button class="btn primary" disabled=${!valid} onClick=${confirm}>Importar</button>
      </div>
    </div>
  </div>`;
}

/* ============ AUTH (login / cadastro por e-mail e senha) ============ */
function Auth({ onSignIn, onSignUp, onAnon, onLocal, err }){
  const [tab,setTab]=useState('in');   // in = entrar | up = criar conta
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false);
  const [confirmMsg,setConfirmMsg]=useState(false);
  const submit = async ()=>{
    setBusy(true); setConfirmMsg(false);
    if(tab==='in'){ await onSignIn(email, pw); }
    else { const r = await onSignUp(email, pw, name||'pesquisador'); if(r && r.confirmed===false) setConfirmMsg(true); }
    setBusy(false);
  };
  return html`<div class="modal-bg"><div class="modal">
    <h2>Acessar o QualiLab</h2>
    <p class="hint">Entre com e-mail e senha para que seus projetos e codificações fiquem salvos na sua conta, em qualquer dispositivo.</p>
    <div class="seg" style="margin-bottom:14px">
      <button class=${tab==='in'?'on':''} onClick=${()=>{setTab('in');setConfirmMsg(false);}}>Entrar</button>
      <button class=${tab==='up'?'on':''} onClick=${()=>{setTab('up');setConfirmMsg(false);}}>Criar conta</button>
    </div>
    ${err && html`<div class="banner err" style="margin:0 0 12px">${err}</div>`}
    ${confirmMsg && html`<div class="banner warn" style="margin:0 0 12px">Conta criada. Verifique seu e-mail para confirmar o cadastro e depois entre.</div>`}
    ${tab==='up' && html`<div class="field"><div class="field-label">Seu nome de exibição</div>
      <input class="txtin" value=${name} onInput=${e=>setName(e.target.value)} placeholder="como você aparece nas codificações" /></div>`}
    <div class="field"><div class="field-label">E-mail</div>
      <input class="txtin" type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="voce@exemplo.com"
        onKeyDown=${e=>{ if(e.key==='Enter') submit(); }} /></div>
    <div class="field"><div class="field-label">Senha</div>
      <input class="txtin" type="password" value=${pw} onInput=${e=>setPw(e.target.value)} placeholder="mínimo 6 caracteres"
        onKeyDown=${e=>{ if(e.key==='Enter') submit(); }} /></div>
    <button class="btn primary" style="width:100%" disabled=${busy||!email||pw.length<6} onClick=${submit}>
      ${busy?'...':(tab==='in'?'Entrar':'Criar conta')}</button>
    <hr style="border:none;border-top:1px solid var(--line-soft);margin:16px 0 10px" />
    <div style="text-align:center">
      <span class="meta">Sem conta? </span>
      <button class="btn sm ghost" style="font-size:12px" onClick=${()=>onAnon(name||'visitante')}>Continuar como visitante</button>
      ${onLocal && html`<button class="btn sm ghost" style="font-size:12px;margin-left:6px" onClick=${()=>onLocal(name||'visitante')}>Usar offline</button>`}
      <p class="meta" style="margin:6px 0 0;font-size:11px">Visitante usa a nuvem deste navegador. Offline salva apenas neste dispositivo, sem sincronização entre aparelhos.</p>
    </div>
  </div></div>`;
}

/* ============ GATE (Meus Projetos + criar / entrar em projeto) ============ */

        ${list.map(p=>html`<div class="docitem" key=${p.code||p.id} style="cursor:pointer" onClick=${()=>onOpen(p)}>

            <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name||'(sem nome)'}</div>

          </div>
          <button class="btn sm">abrir</button>
        </div>`)}
      </div>`
      : html`<div class="card" style="margin-bottom:14px"><span class="meta">Você ainda não tem projetos. Crie o primeiro abaixo.</span></div>`}

        <button class="opt ${pmode==='individual'?'on':''}" onClick=${()=>setPmode('individual')} style="flex:1;justify-content:center">

        </button>
        <button class="opt ${pmode==='collective'?'on':''}" onClick=${()=>setPmode('collective')} style="flex:1;justify-content:center">
          Projeto Coletivo
