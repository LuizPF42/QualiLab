/* ============ GRAFICOS — explorador interativo ============
   Uma aba = um gráfico por vez (.seg), desenhado em SVG (exportável PNG/SVG),
   com painel de trechos à direita: clicar numa barra/célula abre as codificações
   daquele recorte no VizExcerpts (mesma leitura da aba Visualizar). Abas:
   freq · co-ocorrência · cobertura · código×atributo · tempo. */
function ChartsPanel({ docs, cats, codes, codeById, codePath, allCodings, allValues, projectMode,
                       view, onView, coders, userId, mode, isAdmin, onDelCoding, onAccept, onJump, darkMode }){
  const isIndividual = projectMode==='individual';
  const closedCats = (cats||[]).filter(c=>CAT_HAS_OPTIONS(c.kind));
  const dateCats   = (cats||[]).filter(c=>c.kind==='date');
  const [tab,setTab] = useState('freq');
  const [topN,setTopN] = useState(25);
  const [catId,setCatId] = useState(closedCats[0]?.id || '');
  const [dateCatId,setDateCatId] = useState(dateCats[0]?.id || '');
  useEffect(()=>{ if(!closedCats.find(c=>c.id===catId)) setCatId(closedCats[0]?.id || ''); }, [cats]); // eslint-disable-line
  useEffect(()=>{ if(!dateCats.find(c=>c.id===dateCatId)) setDateCatId(dateCats[0]?.id || ''); }, [cats]); // eslint-disable-line
  const cat = closedCats.find(c=>c.id===catId) || null;

  const [coderMode,setCoderMode] = useState('prod'); // sub-modo da aba Codificadores

  // mede a ÁREA VISÍVEL (largura e altura) pra os gráficos serem responsivos; mede o
  // pane-body (viewport de rolagem, tamanho estável que NÃO cresce com o conteúdo, evitando
  // o laço do ResizeObserver). `chartRef` fica no wrapper do gráfico ativo só p/ o export.
  const chartRef = useRef(null);
  const bodyRef  = useRef(null);
  const [cw,setCw] = useState(900);
  const [ch,setCh] = useState(440);
  useEffect(()=>{
    const el = bodyRef.current; if(!el || typeof ResizeObserver==='undefined') return;
    let raf=0;
    const apply = ()=>{ const w=Math.round(el.clientWidth-30), h=Math.round(el.clientHeight-54); // -30 padding do card; -54 hint+margens
      // rAF tira o setState de dentro da entrega do observer (silencia "ResizeObserver loop …");
      // limiar evita micro-oscilação.
      setCw(prev=> (w>200 && Math.abs(w-prev)>4) ? w : prev);
      setCh(prev=> (h>160 && Math.abs(h-prev)>4) ? h : prev); };
    const measure = ()=>{ cancelAnimationFrame(raf); raf=requestAnimationFrame(apply); };
    measure(); const ro=new ResizeObserver(measure); ro.observe(el); return ()=>{ cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);

  // filtro por categorias (painel esquerdo, igual à Visualização): restringe os
  // documentos considerados em TODOS os gráficos. {catId: valor exigido}.
  const [catFilter,setCatFilter] = useState({});
  const [hideRedaction,setHideRedaction] = useState(true); // "ignorar censura" (padrão ligado): tira códigos is_redaction
  const isRedactionCoding = (c)=> !!codeById[c.code_id]?.is_redaction;
  const [cloudCodes,setCloudCodes] = useState(()=>new Set()); // filtro multi-código da NUVEM; vazio = todos
  // co-ocorrência: códigos escolhidos para cada eixo da matriz (vazio = top por frequência)
  const [coocX,setCoocX] = useState(()=>new Set()); // eixo X = colunas
  const [coocY,setCoocY] = useState(()=>new Set()); // eixo Y = linhas
  // família = o código + toda a subárvore. Marcar um pai (Hierarquia 0 ou não) marca TODOS os
  // descendentes; desmarcar tira a subárvore. (Depois dá pra desmarcar filhos individualmente.)
  const familyOf = (id)=>{ const ids=new Set([id]); let added=true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); } return ids; };
  const toggleFamily = (setter)=>(id)=> setter(prev=>{ const n=new Set(prev); const off=n.has(id);
    familyOf(id).forEach(f=> off ? n.delete(f) : n.add(f)); return n; });
  const onPickCloud = toggleFamily(setCloudCodes);
  const matchingDocIds = useMemo(()=>{
    const s=new Set();
    docs.forEach(d=>{
      const ok = Object.entries(catFilter).every(([cId,want])=>{
        if(!want) return true;
        const rows = allValues.filter(x=>x.document_id===d.id && x.category_id===cId);
        const fin = rows.find(r=>r.layer==='final');
        const pool = fin ? [fin.value] : rows.map(r=>r.value);
        return pool.some(v=>v!=null && String(v).split(CAT_MULTI_SEP).includes(want));
      });
      if(ok) s.add(d.id);
    });
    return s;
  }, [docs, allValues, catFilter]);
  const fdocs = useMemo(()=> docs.filter(d=>matchingDocIds.has(d.id)), [docs, matchingDocIds]);

  // codings do recorte "Ver:" compartilhado (mesma fonte do leitor/Visualizar/Relatório),
  // já restritas aos documentos que passam no filtro de categorias.
  const cod = useMemo(()=> codingsForView(allCodings, view, userId, projectMode).filter(c=>matchingDocIds.has(c.document_id) && (!hideRedaction || !isRedactionCoding(c))), [allCodings, view, userId, projectMode, matchingDocIds, hideRedaction, codeById]);
  const codingsByDoc = useMemo(()=>{ const g={}; cod.forEach(c=>{ (g[c.document_id]=g[c.document_id]||[]).push(c); }); return g; }, [cod]);
  const codeOf = (id)=>codeById[id];
  const codeColorOf = (id)=>{ const c=codeOf(id); return c?codeColor(c.hue,c.depth,c.hue_deg).solid:'var(--teal)'; };
  const codeLabelOf = (id)=>codePath(id).join(' ▸ ');

  // ---- frequência de códigos
  const freqItems = useMemo(()=>{
    const f={}; cod.forEach(c=>{ f[c.code_id]=(f[c.code_id]||0)+1; });
    return codes.filter(c=>f[c.id]).map(c=>({ key:c.id, label:codeLabelOf(c.id), value:f[c.id], color:codeColorOf(c.id) }))
      .sort((a,b)=>b.value-a.value);
  }, [cod, codes, codePath]);

  // ---- cobertura do corpus (% de caracteres cobertos por cada código, mesclando sobreposições)
  const corpusLen = useMemo(()=> fdocs.reduce((s,d)=>s+((d.content||'').length),0), [fdocs]);
  const coverItems = useMemo(()=>{
    const byCode={}; // codeId -> {docId -> [[s,e]]}
    cod.forEach(c=>{ (byCode[c.code_id]=byCode[c.code_id]||{}); (byCode[c.code_id][c.document_id]=byCode[c.code_id][c.document_id]||[]).push([c.span_start,c.span_end]); });
    return Object.entries(byCode).map(([id,perDoc])=>{
      let chars=0; Object.values(perDoc).forEach(spans=>{ chars+=mergedLen(spans); });
      return { key:id, label:codeLabelOf(id), chars, value:corpusLen?+(chars/corpusLen*100).toFixed(2):0, color:codeColorOf(id) };
    }).filter(i=>i.chars>0).sort((a,b)=>b.value-a.value);
  }, [cod, corpusLen, codePath]);

  // ---- árvore de códigos do painel esquerdo (filtro da nuvem), no padrão da Visualização.
  const tops = useMemo(()=> codes.filter(c=>!c.parent_id), [codes]);
  const childrenOf = (id)=> codes.filter(c=>c.parent_id===id);
  // contagem por código (direta + agregada nos ancestrais) no recorte atual — igual ao VizNav.
  const codeCounts = useMemo(()=>{
    const direct={}; cod.forEach(c=>{ direct[c.code_id]=(direct[c.code_id]||0)+1; });
    const parentOf={}; codes.forEach(c=>{ parentOf[c.id]=c.parent_id; });
    const agg={...direct};
    Object.entries(direct).forEach(([id,n])=>{ let p=parentOf[id]; while(p){ agg[p]=(agg[p]||0)+n; p=parentOf[p]; } });
    return agg;
  }, [cod, codes]);
  // marcar um pai já marca a subárvore (toggleFamily), então a seleção é literal — sem
  // re-expandir aqui (senão desmarcar um filho não teria efeito).
  const cloudCodeSet = useMemo(()=> cloudCodes.size ? cloudCodes : null, [cloudCodes]);

  // ---- nuvem de palavras: tokens dos trechos codificados, cor herdada do código dominante.
  // usa `cod` (já respeita filtro de categorias, "Ver:" e "ignorar censura"); se houver código
  // selecionado na árvore, restringe à família dele (código + descendentes).
  const docContentById = useMemo(()=>{ const m={}; docs.forEach(d=>{ m[d.id]=d.content||''; }); return m; }, [docs]);
  const wordCloud = useMemo(()=>{
    const src = cloudCodeSet ? cod.filter(c=>cloudCodeSet.has(c.code_id)) : cod;
    const wf={}; // palavra -> { total, codes:{codeId:n} }
    src.forEach(c=>{
      const txt=(docContentById[c.document_id]||'').slice(c.span_start, c.span_end);
      tokenizeWords(txt).forEach(w=>{ const e=wf[w]||(wf[w]={total:0,codes:{}}); e.total++; e.codes[c.code_id]=(e.codes[c.code_id]||0)+1; });
    });
    return Object.entries(wf).map(([w,e])=>{
      let best=null,bn=-1; for(const k in e.codes){ if(e.codes[k]>bn){ bn=e.codes[k]; best=k; } }
      return { key:w, label:w, value:e.total, color:codeColorOf(best) };
    }).sort((a,b)=>b.value-a.value);
  }, [cod, cloudCodeSet, docContentById, codeById]);

  // ---- co-ocorrência: matriz código×código (nº de pares de trechos sobrepostos no mesmo doc).
  // eixos escolhidos pelo usuário: Y = linhas (coocY), X = colunas (coocX). Vazio = top-12 por
  // frequência, na ordem de freqItems (pra não abrir vazio). Conta só os pares úteis (X×Y).
  const cooc = useMemo(()=>{
    const rank = freqItems.map(i=>i.key);
    const order = (s)=> rank.filter(id=>s.has(id)).concat([...s].filter(id=>!rank.includes(id)));
    const rows = coocY.size ? order(coocY) : rank.slice(0,12); // ids das linhas
    const cols = coocX.size ? order(coocX) : rank.slice(0,12); // ids das colunas
    const rowSet=new Set(rows), colSet=new Set(cols);
    const m={}; rows.forEach(a=>m[a]={});
    Object.values(codingsByDoc).forEach(list=>{
      for(let i=0;i<list.length;i++) for(let j=0;j<list.length;j++){
        if(i===j) continue;
        const a=list[i], b=list[j];
        if(a.code_id===b.code_id) continue;
        if(!rowSet.has(a.code_id) || !colSet.has(b.code_id)) continue;
        if(a.span_start<b.span_end && b.span_start<a.span_end) m[a.code_id][b.code_id]=(m[a.code_id][b.code_id]||0)+1;
      }
    });
    // laço ordenado (i≠j): a célula m[linha][coluna] conta os pares (coding-da-linha, coding-da-coluna)
    // sobrepostos — sem dobra, pois (x,y) e (y,x) caem em células distintas (linha×coluna ≠ coluna×linha).
    let max=1; rows.forEach(a=>cols.forEach(b=>{ if(a!==b) max=Math.max(max, m[a][b]||0); }));
    return { rows: rows.map(id=>({ id, label:codeLabelOf(id) })), cols, m, max };
  }, [freqItems, codingsByDoc, coocX, coocY, codePath]);

  // ---- código × atributo (heatmap): valor consolidado (gabarito) por documento
  const finalVal = (docId,cId)=>{ const f=allValues.find(v=>v.document_id===docId && v.category_id===cId && v.layer==='final'); return f?f.value:null; };
  const splitVals = (val)=> val==null ? ['(sem valor)'] : String(val).split(CAT_MULTI_SEP).filter(Boolean);
  const crossTab = useMemo(()=>{
    if(!cat) return { cols:[], rows:[], max:1 };
    const docVals={}; fdocs.forEach(d=>{ docVals[d.id]=splitVals(finalVal(d.id,catId)); });
    const colSet=new Set(); Object.values(docVals).forEach(vs=>vs.forEach(v=>colSet.add(v)));
    const cols=[...colSet];
    const cells={}; cod.forEach(c=>{ (docVals[c.document_id]||[]).forEach(v=>{ (cells[c.code_id]=cells[c.code_id]||{}); cells[c.code_id][v]=(cells[c.code_id][v]||0)+1; }); });
    const rows=codes.filter(c=>cells[c.id]).map(c=>({ id:c.id, label:codeLabelOf(c.id), cells:cells[c.id] }))
      .sort((a,b)=>{ const sa=Object.values(a.cells).reduce((x,y)=>x+y,0), sb=Object.values(b.cells).reduce((x,y)=>x+y,0); return sb-sa; });
    let max=1; rows.forEach(r=>cols.forEach(v=>{ max=Math.max(max,r.cells[v]||0); }));
    return { cols, rows, max };
  }, [cat, fdocs, cod, codes, catId, allValues, codePath]);

  // ---- série temporal: trechos por ano (via categoria de data, gabarito do documento)
  const timeData = useMemo(()=>{
    if(!dateCatId) return [];
    const yearOf={}; fdocs.forEach(d=>{ const y=parseDate(finalVal(d.id,dateCatId)).y; if(y) yearOf[d.id]=y; });
    const counts={}; cod.forEach(c=>{ const y=yearOf[c.document_id]; if(y) counts[y]=(counts[y]||0)+1; });
    return Object.entries(counts).map(([y,value])=>({ key:y, label:y, value })).sort((a,b)=>a.label.localeCompare(b.label));
  }, [dateCatId, fdocs, cod, allValues]);

  // ---- por codificador (só coletivo): produção e concordância sobre a camada individual,
  // respeitando o filtro de categorias (documentos que passam no filtro).
  const indiv = useMemo(()=> allCodings.filter(c=>c.layer!=='final' && matchingDocIds.has(c.document_id) && (!hideRedaction || !isRedactionCoding(c))), [allCodings, matchingDocIds, hideRedaction, codeById]);
  const coderKey = (c)=> c.created_by || ('__nm__'+(c.author_name||'anônimo'));
  const prodItems = useMemo(()=>{
    const p={}, lbl={}; indiv.forEach(c=>{ const k=coderKey(c); p[k]=(p[k]||0)+1; lbl[k]=c.author_name||'anônimo'; });
    return Object.entries(p).map(([k,value])=>({ key:k, label:lbl[k]||k, value })).sort((a,b)=>b.value-a.value);
  }, [indiv]);
  const agreeItems = useMemo(()=>{
    const m={}; indiv.forEach(c=>{ (m[c.code_id]=m[c.code_id]||new Set()).add(coderKey(c)); });
    return codes.filter(c=>m[c.id]).map(c=>({ key:c.id, label:codeLabelOf(c.id), value:m[c.id].size, color:codeColorOf(c.id) }))
      .sort((a,b)=>b.value-a.value);
  }, [indiv, codes, codePath]);

  const empty = allCodings.length===0 && (allValues||[]).length===0;
  const TABS = [['freq','Frequência'],['nuvem','Nuvem'],['cooc','Co-ocorrência'],['cobertura','Cobertura'],['cruz','Código × atributo']];
  if(dateCats.length) TABS.push(['tempo','Tempo']);
  if(!isIndividual) TABS.push(['coders','Codificadores']);

  // ---- gráfico ativo (um SVG por aba)
  let chart=null, hint=null;
  if(tab==='freq'){
    hint = 'Nº de trechos codificados com cada código.';
    chart = freqItems.length===0 ? null : svgHBars(freqItems.slice(0,topN), { w:cw });
  } else if(tab==='nuvem'){
    hint = cloudCodes.size===1
      ? `Palavras do código «${codeLabelOf([...cloudCodes][0])}» e subcódigos (tamanho ∝ frequência). Stopwords removidas; sem lematização.`
      : cloudCodes.size>1
      ? `Palavras de ${cloudCodes.size} códigos selecionados (e subcódigos), coloridas pelo código (tamanho ∝ frequência). Stopwords removidas; sem lematização.`
      : 'Palavras dos trechos codificados, coloridas pelo código predominante (tamanho ∝ frequência). Stopwords removidas; sem lematização.';
    chart = wordCloud.length===0 ? null : svgWordCloud(wordCloud.slice(0,topN), { w:cw, h:ch });
  } else if(tab==='cobertura'){
    hint = '% do corpus coberto por cada código (sobreposições mescladas) — peso real, não só contagem.';
    chart = coverItems.length===0 ? null
      : svgHBars(coverItems.slice(0,topN), { w:cw, color:'var(--sky)', fmt:(v)=>v.toFixed(2)+'%' });
  } else if(tab==='cooc'){
    hint = (coocX.size||coocY.size)
      ? 'Trechos sobrepostos no mesmo documento entre os códigos de cada eixo (linha = Y, coluna = X). Diagonal do mesmo código fica vazia.'
      : 'Trechos sobrepostos no mesmo documento (12 códigos mais frequentes em cada eixo — escolha os eixos no painel à esquerda).';
    chart = (cooc.rows.length===0 || cooc.cols.length===0) ? null
      : svgHeat(cooc.rows, cooc.cols, (r,c)=> r.id===c?null:(cooc.m[r.id]?.[c]||0), cooc.max, {
          W:cw, colLabel:(id)=>codeLabelOf(id), rowColor:(r)=>codeColorOf(r.id), colColor:(id)=>codeColorOf(id) });
  } else if(tab==='cruz'){
    hint = 'Nº de trechos de cada código nos documentos com cada valor da categoria.';
    chart = (!cat || crossTab.rows.length===0) ? null
      : svgHeat(crossTab.rows, crossTab.cols, (r,c)=>r.cells[c]||0, crossTab.max, { W:cw, colLabel:(v)=>v, rowColor:(r)=>codeColorOf(r.id) });
  } else if(tab==='tempo'){
    hint = 'Trechos codificados por ano (data consolidada do documento).';
    chart = timeData.length===0 ? null : svgHBars(timeData, { w:cw, color:'var(--teal-deep)' });
  } else if(tab==='coders'){
    if(coderMode==='prod'){
      hint = 'Nº de trechos codificados por cada pesquisador (camada individual).';
      chart = prodItems.length===0 ? null : svgHBars(prodItems, { w:cw, color:'var(--amber)' });
    } else {
      hint = 'Quantos pesquisadores diferentes aplicaram cada código (concordância).';
      chart = agreeItems.length===0 ? null : svgHBars(agreeItems, { w:cw });
    }
  }

  const svgEl = ()=>chartRef.current?.querySelector('svg');
  const hasFilter = Object.values(catFilter).some(Boolean);

  // Painel esquerdo (filtro por categorias, mesmo tamanho da Visualização) + gráfico à direita.
  // htm devolve um array com os dois <section>; o App já os envolve num .split.
  return html`
  <section class="pane" style="flex:0 0 270px;min-width:0;border-right:1px solid var(--line)">
    <div class="pane-body scroll" style="padding:0;background:var(--surface)">
      <div class="field-label" style="padding:12px 14px 6px;margin:0;display:flex;align-items:center;gap:8px">
        🏷️ Filtrar por categorias
        ${hasFilter && html`<span class="pill" style="font-size:10px;padding:1px 8px">ativo</span>`}
      </div>
      <label class="row" style="gap:7px;padding:2px 14px 10px;font-size:12px;cursor:pointer;align-items:center" title="Exclui dos gráficos os códigos marcados como censura (is_redaction)">
        <input type="checkbox" checked=${hideRedaction} onChange=${e=>setHideRedaction(e.target.checked)} />
        Ignorar censura
      </label>
      <div style="padding:0 14px 14px">
        ${closedCats.length===0
          ? html`<span class="meta">Nenhuma categoria com opções para filtrar. Crie categorias de Texto Fechado, Múltipla Escolha ou Caixa de Seleção.</span>`
          : html`<div>
            <p class="meta" style="margin:0 0 10px;font-size:11px">Restringe todos os gráficos aos documentos que atendem às condições selecionadas.</p>
            ${closedCats.map(cat=>{ const opts=(cat.options||[]).filter(o=>!isSpecialOpt(o));
              return html`<div key=${cat.id} class="field" style="margin-bottom:9px">
                <div class="field-label" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title=${cat.name}>${cat.name}</div>
                <select class="opt" style="width:100%"
                  value=${catFilter[cat.id]||''} onChange=${e=>{ const v=e.target.value; setCatFilter(f=>{ const n={...f}; if(v) n[cat.id]=v; else delete n[cat.id]; return n; }); }}>
                  <option value="">(qualquer)</option>
                  ${opts.map(o=>html`<option value=${o}>${o}</option>`)}
                </select>
              </div>`; })}
            ${hasFilter && html`<button class="btn sm ghost" style="width:100%;margin-top:4px" onClick=${()=>setCatFilter({})}>limpar filtros</button>`}
            <p class="meta" style="margin:12px 0 0;font-size:11px">${matchingDocIds.size} de ${docs.length} documento(s) no filtro.</p>
          </div>`}
      </div>
      ${tab==='nuvem' && html`<div style="border-top:1px solid var(--line-soft)">
        <div class="field-label" style="padding:10px 14px 2px;margin:0;display:flex;align-items:center;gap:8px">
          🖍️ Códigos (filtram a nuvem)
          ${cloudCodes.size>0 && html`<span class="pill" style="font-size:10px;padding:1px 8px">${cloudCodes.size}</span>`}
        </div>
        <p class="meta" style="margin:0;padding:0 14px 6px;font-size:11px">Marque um ou mais códigos para ver só o vocabulário deles (e dos subcódigos). Nenhum = todos.</p>
        ${cloudCodes.size>0 && html`<div style="padding:0 14px 6px"><button class="btn sm ghost" style="width:100%" onClick=${()=>setCloudCodes(new Set())}>limpar seleção</button></div>`}
        <div class="tree" style="padding:4px 6px">
          ${tops.length===0 ? html`<span class="meta" style="padding:10px 8px;display:block">Nenhum código criado.</span>`
            : tops.map(t=>html`<${CloudCodeNode} key=${t.id} code=${t} childrenOf=${childrenOf}
                counts=${codeCounts} selectedIds=${cloudCodes} onToggle=${onPickCloud} depthPad=${0} />`)}
        </div>
      </div>`}
      ${tab==='cooc' && html`<div>
        <div style="border-top:1px solid var(--line-soft)">
          <div class="field-label" style="padding:10px 14px 2px;margin:0;display:flex;align-items:center;gap:8px">
            ↔️ Eixo X (horizontal)
            ${coocX.size>0 && html`<span class="pill" style="font-size:10px;padding:1px 8px">${coocX.size}</span>`}
          </div>
          <p class="meta" style="margin:0;padding:0 14px 6px;font-size:11px">Códigos nas colunas. Nenhum = 12 mais frequentes.</p>
          ${coocX.size>0 && html`<div style="padding:0 14px 6px"><button class="btn sm ghost" style="width:100%" onClick=${()=>setCoocX(new Set())}>limpar X</button></div>`}
          <div class="tree" style="padding:4px 6px">
            ${tops.map(t=>html`<${CloudCodeNode} key=${'x'+t.id} code=${t} childrenOf=${childrenOf}
              counts=${codeCounts} selectedIds=${coocX} onToggle=${toggleFamily(setCoocX)} depthPad=${0} />`)}
          </div>
        </div>
        <div style="border-top:1px solid var(--line-soft)">
          <div class="field-label" style="padding:10px 14px 2px;margin:0;display:flex;align-items:center;gap:8px">
            ↕️ Eixo Y (vertical)
            ${coocY.size>0 && html`<span class="pill" style="font-size:10px;padding:1px 8px">${coocY.size}</span>`}
          </div>
          <p class="meta" style="margin:0;padding:0 14px 6px;font-size:11px">Códigos nas linhas. Nenhum = 12 mais frequentes.</p>
          ${coocY.size>0 && html`<div style="padding:0 14px 6px"><button class="btn sm ghost" style="width:100%" onClick=${()=>setCoocY(new Set())}>limpar Y</button></div>`}
          <div class="tree" style="padding:4px 6px">
            ${tops.map(t=>html`<${CloudCodeNode} key=${'y'+t.id} code=${t} childrenOf=${childrenOf}
              counts=${codeCounts} selectedIds=${coocY} onToggle=${toggleFamily(setCoocY)} depthPad=${0} />`)}
          </div>
        </div>
      </div>`}
    </div>
  </section>
  <section class="pane left" style="flex:1;border-right:none;max-width:none;display:flex;flex-direction:column">
    <div class="pane-head" style="flex-wrap:wrap;gap:10px">
      <div class="seg">
        ${TABS.map(([k,lbl])=>html`<button key=${k} class=${tab===k?'on':''} onClick=${()=>setTab(k)}>${lbl}</button>`)}
      </div>
      <div class="row" style="gap:10px;flex-wrap:wrap;margin-left:auto">
        <${ViewSelect} value=${view} onChange=${onView} coders=${coders} userId=${userId} projectMode=${projectMode} mode=${mode} />
        ${(tab==='freq'||tab==='cobertura'||tab==='nuvem') && html`<label class="meta" style="display:flex;gap:5px;align-items:center">${tab==='nuvem'?'Palavras:':'Top:'}
          <select class="opt" value=${String(topN)} onChange=${e=>setTopN(e.target.value==='all'?9999:+e.target.value)}>
            <option value="10">10</option><option value="25">25</option><option value="50">50</option><option value="all">Todos</option>
          </select></label>`}
        ${tab==='cruz' && closedCats.length>0 && html`<label class="meta" style="display:flex;gap:5px;align-items:center">Categoria:
          <select class="opt" value=${catId} onChange=${e=>setCatId(e.target.value)}>
            ${closedCats.map(c=>html`<option value=${c.id}>${c.name}</option>`)}
          </select></label>`}
        ${tab==='tempo' && dateCats.length>1 && html`<label class="meta" style="display:flex;gap:5px;align-items:center">Data:
          <select class="opt" value=${dateCatId} onChange=${e=>setDateCatId(e.target.value)}>
            ${dateCats.map(c=>html`<option value=${c.id}>${c.name}</option>`)}
          </select></label>`}
        ${tab==='coders' && html`<div class="seg">
          <button class=${coderMode==='prod'?'on':''} onClick=${()=>setCoderMode('prod')}>Produção</button>
          <button class=${coderMode==='agree'?'on':''} onClick=${()=>setCoderMode('agree')}>Concordância</button>
        </div>`}
        ${chart && html`<span class="row" style="gap:4px">
          <button class="btn sm ghost" title="Baixar vetor (SVG)" onClick=${()=>exportChartSVG(svgEl(),'grafico-'+tab)}>SVG</button>
          <button class="btn sm ghost" title="Baixar imagem (PNG)" onClick=${()=>exportChartPNG(svgEl(),'grafico-'+tab)}>PNG</button>
        </span>`}
      </div>
    </div>
    <div class="pane-body scroll" ref=${bodyRef} style=${`flex:1;scrollbar-gutter:stable;${tab==='nuvem'?'overflow:hidden':''}`}>
      <div>
        ${empty ? html`<div class="card"><span class="meta">Ainda não há dados para gráficos. Codifique trechos e preencha categorias.</span></div>`
          : html`<div>
            ${hint && html`<p class="meta" style="margin:2px 0 12px">${hint}</p>`}
            ${tab==='cruz' && closedCats.length===0 && html`<div class="card"><span class="meta">Crie uma categoria de Texto Fechado, Múltipla Escolha ou Caixa de Seleção para cruzar com os códigos.</span></div>`}
            ${tab==='tempo' && dateCats.length===0 && html`<div class="card"><span class="meta">Crie uma categoria de Data para ver a distribuição temporal.</span></div>`}
            ${tab==='nuvem'
              ? html`<div ref=${chartRef} class="card" style="height:${Math.max(220,ch)}px;overflow:hidden;display:flex;align-items:center;justify-content:center">
                  ${chart || html`<span class="meta">Sem palavras nos trechos codificados (no recorte/filtro atual).</span>`}
                </div>`
              : html`<div ref=${chartRef} class="card" style="overflow:auto">
                  ${chart || html`<span class="meta">Sem dados para este gráfico no recorte atual.</span>`}
                </div>`}
          </div>`}
      </div>
    </div>
  </section>`;
}

function TreeNode({ code, childrenOf, count, sel, selCode, setSelCode, onApply, onDel, store, reload, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg);
  const isSel = selCode===code.id;
  const appliable = !!sel;
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''} ${appliable?'appliable':''}" style=${`padding-left:${6+depthPad*16}px`}
      onClick=${()=> appliable ? onApply(code.id) : setSelCode(code.id) }>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'▾':'▸'}</span>` : html`<span class="caret"></span>`}
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.is_redaction?'🚫 ':''}${code.name}</span>
      ${count[code.id]?html`<span class="count">${count[code.id]}</span>`:''}
      <button class="icon-btn" onClick=${e=>{e.stopPropagation(); if(confirm('Excluir o código e seus subcódigos e codificações?')) onDel(code.id);}} title="excluir">✕</button>
    </div>
    ${open && kids.map(k=>html`<${TreeNode} key=${k.id} code=${k} childrenOf=${childrenOf} count=${count}
      sel=${sel} selCode=${selCode} setSelCode=${setSelCode} onApply=${onApply} onDel=${onDel}
      store=${store} reload=${reload} depthPad=${depthPad+1} />`)}
  </div>`;
}
function RenameCode({ code, onUpd, onSetColor, onSetRedaction, isAdmin }){
  const [v,setV]=useState(code.name);
  useEffect(()=>setV(code.name),[code.id]);
  const col = codeColor(code.hue, code.depth, code.hue_deg);
  // so o matiz (H) importa pra cor de codigo — saturacao/luminosidade sao sempre fixas por
  // codeColor() (luminosidade varia so pela profundidade do subcodigo). Um <input type="color">
  // deixaria escolher RGB completo, mas tudo que nao for matiz seria descartado — confunde,
  // parece que da pra escolher claro/escuro/saturacao quando na pratica nao da. Por isso um
  // slider de matiz (0-359), nao o retangulo de cor inteiro.
  const [hueLive,setHueLive]=useState(col.H);
  useEffect(()=>setHueLive(col.H),[code.id, col.H]);
  const isGray = code.hue_deg===-1, isBlack = code.hue_deg===-2;
  const previewHex = isBlack ? '#000000' : isGray ? '#808080' : hslToHex(hueLive, 58, 32);
  return html`<div>
    <div class="row" style="gap:6px;margin-top:6px">
      <input class="txtin" value=${v} onInput=${e=>setV(e.target.value)} />
      <button class="btn sm" onClick=${()=>onUpd(code.id,{name:v})}>renomear</button>
    </div>
    ${code.depth===0 && isAdmin && html`<div class="row" style="gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap">
      <span class="meta">Cor da família</span>
      <span style=${`background:${previewHex};flex-shrink:0;width:40px;height:40px;border-radius:8px;border:1px solid var(--line)`}></span>
      <input type="range" min="0" max="359" value=${hueLive} disabled=${isGray||isBlack}
        oninput=${e=>setHueLive(parseInt(e.target.value,10))}
        onChange=${e=>onSetColor(code, hslToHex(parseInt(e.target.value,10), 58, 32))}
        style="flex:1 1 80px;min-width:0;max-width:160px" title="Cor personalizada (matiz — propaga para os subcódigos)" />
      <button class="btn sm ${isGray?'':'ghost'}" onClick=${()=>onSetColor(code, isGray ? hslToHex(hueLive,58,32) : 'gray')}>cinza</button>
      <button class="btn sm ${isBlack?'':'ghost'}" onClick=${()=>onSetColor(code, isBlack ? hslToHex(hueLive,58,32) : 'black')}>preto</button>
      ${code.hue_deg!=null && html`<button class="btn sm ghost" onClick=${()=>onSetColor(code, null)}>usar cor automática</button>`}
    </div>`}
    ${code.depth===0 && !isAdmin && code.hue_deg!=null && html`<p class="meta" style="margin-top:6px">Cor definida pelo administrador.</p>`}
    ${isAdmin && html`<label class="row" style="gap:6px;margin-top:8px;font-size:12.5px;cursor:pointer;align-items:center">
      <input type="checkbox" checked=${!!code.is_redaction} onChange=${e=>onSetRedaction(code, e.target.checked)} />
      🚫 Código de censura
    </label>
    <p class="hint" style="margin:2px 0 0">Trechos com este código (e seus subcódigos) ficam de fora por padrão do que é enviado pra IA — pode escolher incluir na hora da análise.</p>`}
  </div>`;
}

/* inputs com debounce / colar */
function DebInput({ value, onCommit, placeholder, disabled }){
  const [v,setV]=useState(value||''); const t=useRef(null);
  useEffect(()=>setV(value||''),[value]);
  return html`<input class="txtin" placeholder=${placeholder} value=${v} disabled=${!!disabled}
    onInput=${e=>{ setV(e.target.value); clearTimeout(t.current); const val=e.target.value; t.current=setTimeout(()=>onCommit(val),600); }}
    onBlur=${()=>{ clearTimeout(t.current); onCommit(v); }} />`;
}

/* data possivelmente parcial: DD/MM/AAAA com partes em branco quando o documento nao informa.
   guarda como string "dd/mm/aaaa" (campo vazio = parte desconhecida); tudo vazio = nao informada. */
function parseDate(val){
  if(!val) return { d:'', mo:'', y:'' };
  const iso = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(val);   // aceita formato ISO legado
  if(iso) return { d:iso[3], mo:iso[2], y:iso[1] };
  const m = /^(\d{0,2})\/(\d{0,2})\/(\d{0,4})$/.exec(val);
  return m ? { d:m[1], mo:m[2], y:m[3] } : { d:'', mo:'', y:'' };
}
function DateInput({ value, onCommit, disabled }){
  const [p,setP]=useState(parseDate(value)); const t=useRef(null);
  useEffect(()=>setP(parseDate(value)),[value]);
  const build = (q)=> (q.d||q.mo||q.y) ? `${q.d}/${q.mo}/${q.y}` : '';
  const set = (k,raw,max)=>{ const digits=String(raw).replace(/\D/g,'').slice(0,max); const q={...p,[k]:digits}; setP(q);
    clearTimeout(t.current); t.current=setTimeout(()=>onCommit(build(q)),600); };
  const flush = ()=>{ clearTimeout(t.current); onCommit(build(p)); };
  const informada = !!(p.d||p.mo||p.y);
  return html`<div>
    <div class="row" style="gap:8px;margin-bottom:8px">
      <button class="opt ${informada?'':'on'}" disabled=${!!disabled} title="Marca a data como não informada (limpa os campos)"
        onClick=${()=>{ const q={d:'',mo:'',y:''}; setP(q); clearTimeout(t.current); onCommit(''); }}>Não informada</button>
    </div>
    <div class="row" style="gap:6px;align-items:center">
      <input class="txtin" style="width:60px;text-align:center" inputmode="numeric" placeholder="DD" maxlength="2" disabled=${!!disabled}
        value=${p.d} onInput=${e=>set('d',e.target.value,2)} onBlur=${flush} />
      <span class="meta">/</span>
      <input class="txtin" style="width:60px;text-align:center" inputmode="numeric" placeholder="MM" maxlength="2" disabled=${!!disabled}
        value=${p.mo} onInput=${e=>set('mo',e.target.value,2)} onBlur=${flush} />
      <span class="meta">/</span>
      <input class="txtin" style="width:78px;text-align:center" inputmode="numeric" placeholder="AAAA" maxlength="4" disabled=${!!disabled}
        value=${p.y} onInput=${e=>set('y',e.target.value,4)} onBlur=${flush} />
    </div>
    <div class="meta" style="margin-top:6px">Deixe em branco as partes que o documento não informa.</div>
  </div>`;
}
function AddPaste({ onAdd }){
  const [open,setOpen]=useState(false); const [n,setN]=useState(''); const [t,setT]=useState('');
  if(!open) return html`<button class="btn sm ghost" onClick=${()=>setOpen(true)}>colar texto</button>`;
  return html`<div class="modal-bg"><div class="modal">
    <h2>Colar documento</h2>
    <div class="field"><input class="txtin" placeholder="nome" value=${n} onInput=${e=>setN(e.target.value)} /></div>
    <div class="field"><textarea class="txtin" rows="8" placeholder="cole o texto aqui" value=${t} onInput=${e=>setT(e.target.value)} style="font-family:var(--serif);line-height:1.6"></textarea></div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="btn ghost" onClick=${()=>{setOpen(false);setN('');setT('');}}>cancelar</button>
      <button class="btn primary" onClick=${()=>{ if(t.trim()){ onAdd(n,t); setOpen(false); setN(''); setT(''); } }}>Adicionar</button>
    </div>
  </div></div>`;
}

/* ============ ENVIAR PARA A NUVEM ============
   Cria um projeto novo na nuvem e importa pra ele o projeto local/arquivo ativo, numa tacada
   so — sem passar por exportar .qualilab e importar manualmente. Auto-contido: usa seu PROPRIO
   cliente Supabase (mesma URL/key globais, sempre disponiveis quando canSendToCloud e true)
   e sua propria instancia de SupabaseStore, sem tocar no store/sessao principal do App — entrar
   de fato no projeto criado continua sendo "trocar projeto" depois, fluxo ja existente. */
function SendToCloudModal({ defaultName, onBuildDb, onClose }){
  const [step, setStep] = useState('auth'); // auth | project | running | done
  const [authTab, setAuthTab] = useState('in'); // in | up | anon
  const [email, setEmail] = useState(''); const [pw, setPw] = useState(''); const [dispName, setDispName] = useState('');
  const [pname, setPname] = useState(defaultName || 'Projeto');
  const [pmode, setPmode] = useState('collective');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);
  const [progress, setProgress] = useState(null); // {done,total}
  const [result, setResult] = useState(null); // {code,name}
  const cloudRef = useRef(null);

  const doAuth = async ()=>{
    setErr(null); setBusy(true);
    try{
      const createClient = await getCreateClient();
      const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const st = SupabaseStore(sb);
      if(authTab==='in') await st.signIn(email, pw);
      else if(authTab==='up'){
        const r = await st.signUp(email, pw, dispName.trim()||'pesquisador');
        if(r && r.confirmed===false){ setErr('Conta criada — confirme seu e-mail e depois entre com "Já tenho conta".'); setBusy(false); return; }
      } else await st.signInAnon(dispName.trim()||'pesquisador');
      cloudRef.current = st;
      setStep('project');
    }catch(e){ setErr(String(e.message||e)); }
    setBusy(false);
  };

  const doSend = async ()=>{
    setErr(null); setBusy(true); setStep('running'); setProgress({done:0,total:1});
    try{
      const st = cloudRef.current;
      const proj = await st.createProject(pname.trim()||'Projeto', st.currentUser()?.name||'pesquisador', pmode);
      const db = await onBuildDb();
      await mergeQualilabDb(db, st, proj.id, pmode, (done,total)=>setProgress({done,total}));
      setResult({ code: proj.code, name: proj.name });
      setStep('done');
    }catch(e){ setErr(String(e.message||e)); setStep('project'); }
    setBusy(false);
  };

  return html`<div class="modal-bg"><div class="modal">
    <h2>Enviar para a nuvem</h2>
    ${err && html`<div class="banner err" style="margin:0 0 12px">${err}</div>`}

    ${step==='auth' && html`<div>
      <p class="hint" style="margin:0 0 10px">Primeiro, entre (ou crie uma conta/visitante) na nuvem — é ali que o projeto novo vai ser criado.</p>
      <div class="seg" style="margin-bottom:10px">
        <button class=${authTab==='in'?'on':''} onClick=${()=>setAuthTab('in')}>Já tenho conta</button>
        <button class=${authTab==='up'?'on':''} onClick=${()=>setAuthTab('up')}>Criar conta</button>
        <button class=${authTab==='anon'?'on':''} onClick=${()=>setAuthTab('anon')}>Visitante</button>
      </div>
      ${authTab!=='anon' && html`<div class="field"><div class="field-label">E-mail</div>
        <input class="txtin" type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="voce@exemplo.com" /></div>
        <div class="field"><div class="field-label">Senha</div>
        <input class="txtin" type="password" value=${pw} onInput=${e=>setPw(e.target.value)} placeholder="mínimo 6 caracteres" /></div>`}
      ${authTab!=='in' && html`<div class="field" style="margin-bottom:8px"><div class="field-label">Nome de exibição</div>
        <input class="txtin" value=${dispName} onInput=${e=>setDispName(e.target.value)} placeholder="como você aparece nas codificações" /></div>`}
      <div class="row" style="justify-content:flex-end;gap:8px;margin-top:10px">
        <button class="btn ghost" onClick=${onClose}>cancelar</button>
        <button class="btn primary" disabled=${busy||(authTab!=='anon' && (!email||!pw))} onClick=${doAuth}>${busy?'…':'Continuar'}</button>
      </div>
    </div>`}

    ${step==='project' && html`<div>
      <p class="hint" style="margin:0 0 10px">Tudo do projeto ativo (documentos, categorias, códigos, codificações e memos) vai ser copiado pra esse projeto novo na nuvem.</p>
      <div class="field"><div class="field-label">Nome do projeto novo</div>
        <input class="txtin" value=${pname} onInput=${e=>setPname(e.target.value)} /></div>
      <div class="field" style="margin-bottom:8px"><div class="field-label">Tipo do projeto</div>
        <div class="row" style="gap:8px">
          <button class="opt ${pmode==='collective'?'on':''}" style="flex:1;justify-content:center" onClick=${()=>setPmode('collective')}>Coletivo</button>
          <button class="opt ${pmode==='individual'?'on':''}" style="flex:1;justify-content:center" onClick=${()=>setPmode('individual')}>Individual</button>
        </div>
      </div>
      <div class="row" style="justify-content:flex-end;gap:8px;margin-top:10px">
        <button class="btn ghost" onClick=${onClose}>cancelar</button>
        <button class="btn primary" disabled=${busy||!pname.trim()} onClick=${doSend}>${busy?'…':'Enviar'}</button>
      </div>
    </div>`}

    ${step==='running' && html`<div class="banner warn">Enviando… ${progress?.total>0?`${progress.done}/${progress.total}`:''}</div>`}

    ${step==='done' && html`<div>
      <div class="banner warn" style="margin:0 0 12px">Projeto criado na nuvem com sucesso.</div>
      <p class="hint">Nome: <b>${result.name}</b><br/>Código de acesso: <span class="pill" style="font-family:var(--mono)">${result.code}</span></p>
      <p class="hint">Pra abrir, use "trocar projeto" e entre com esse código (ou ele já aparece em "Meus projetos" deste navegador).</p>
      <div class="row" style="justify-content:flex-end;margin-top:10px"><button class="btn primary" onClick=${onClose}>Fechar</button></div>
    </div>`}
  </div></div>`;
}

/* ============ MINHA CONTA ============ */
function AccountModal({ user, projects, onClose, onChangePassword, onChangeName, onOpen, onRename, onDelete, onLeave, onLogout }){
  const [name,setName]=useState(user?.name||'');
  const [pw1,setPw1]=useState(''); const [pw2,setPw2]=useState('');
  const [msg,setMsg]=useState(null); const [err,setErr]=useState(null);
  const [busy,setBusy]=useState(false);
  const [editId,setEditId]=useState(null); const [editName,setEditName]=useState('');
  const [confirmId,setConfirmId]=useState(null); // id do projeto aguardando confirmação inline
  const list = projects||[];

  // BYOK (bring your own key): config de IA pessoal, guardada so no localStorage deste
  // navegador — ausente significa "usa a chave/modelo compartilhados do projeto" (default).
  const [aiProvider,setAiProvider]=useState(()=>{ try{return localStorage.getItem('qualilab:ai_provider')||'gemini';}catch(e){return 'gemini';} });
  const [aiKey,setAiKey]=useState(()=>{ try{return localStorage.getItem('qualilab:ai_key')||'';}catch(e){return '';} });
  const [aiModel,setAiModel]=useState(()=>{ try{return localStorage.getItem('qualilab:ai_model')||'';}catch(e){return '';} });
  const [aiBaseUrl,setAiBaseUrl]=useState(()=>{ try{return localStorage.getItem('qualilab:ai_baseurl')||'';}catch(e){return '';} });
  // custom e azure compartilham a UI de "URL base + modelo em texto livre" (custom:true);
  // azure tem rotulos proprios e exige a chave (azure:true).
  const provDef = AI_PROVIDERS.find(p=>p.id===aiProvider);
  const needsBaseUrl = !!provDef?.custom;
  const isAzure = !!provDef?.azure;

  const run = async (fn)=>{ setErr(null); setMsg(null); try{ await fn(); }catch(e){ setErr(String(e.message||e)); } };

  const saveName = ()=>run(async()=>{ await onChangeName(name.trim()||'pesquisador'); setMsg('Nome atualizado.'); });
  const savePw   = ()=>{
    if(pw1.length<6){ setErr('A senha precisa de ao menos 6 caracteres.'); return; }
    if(pw1!==pw2)   { setErr('As senhas não coincidem.'); return; }
    setBusy(true);
    run(async()=>{ await onChangePassword(pw1); setPw1('');setPw2(''); setMsg('Senha alterada.'); }).finally(()=>setBusy(false));
  };
  const saveAI = ()=>run(async()=>{
    if(needsBaseUrl && !aiBaseUrl.trim()){ setErr(isAzure?'Informe a URL base (endpoint) do Azure OpenAI.':'Informe a URL base da API personalizada.'); return; }
    if(needsBaseUrl && !aiModel.trim()){ setErr(isAzure?'Informe o deployment do Azure OpenAI.':'Informe o modelo da API personalizada.'); return; }
    if(isAzure && !aiKey.trim()){ setErr('A chave de API é obrigatória para o Azure OpenAI.'); return; }
    try{
      localStorage.setItem('qualilab:ai_provider', aiProvider);
      if(aiKey.trim()) localStorage.setItem('qualilab:ai_key', aiKey.trim()); else localStorage.removeItem('qualilab:ai_key');
      if(aiModel.trim()) localStorage.setItem('qualilab:ai_model', aiModel.trim()); else localStorage.removeItem('qualilab:ai_model');
      if(needsBaseUrl && aiBaseUrl.trim()) localStorage.setItem('qualilab:ai_baseurl', aiBaseUrl.trim()); else localStorage.removeItem('qualilab:ai_baseurl');
    }catch(e){}
    setMsg('Configuração de IA salva.');
  });
  const clearAI = ()=>run(async()=>{
    try{ localStorage.removeItem('qualilab:ai_provider'); localStorage.removeItem('qualilab:ai_key'); localStorage.removeItem('qualilab:ai_model'); localStorage.removeItem('qualilab:ai_baseurl'); }catch(e){}
    setAiProvider('gemini'); setAiKey(''); setAiModel(''); setAiBaseUrl('');
    setMsg('Removida — as telas de IA voltam a usar a chave compartilhada do projeto.');
  });

  return html`<div class="modal-bg"><div class="modal" style="max-width:560px">
    <h2>Minha conta</h2>
    <p class="hint">${user?.email||'sessão de visitante'}${user?.anon?' (visitante — sem senha)':''}</p>
    ${err && html`<div class="banner err" style="margin:0 0 12px">${err} <button class="btn sm ghost" onClick=${()=>setErr(null)}>×</button></div>`}
    ${msg && html`<div class="banner warn" style="margin:0 0 12px">${msg}</div>`}

    <!-- identidade -->
    <div class="card" style="margin-bottom:12px">
      <div class="field-label">Nome de exibição</div>
      <div class="row" style="gap:6px">
        <input class="txtin" value=${name} onInput=${e=>setName(e.target.value)} />
        <button class="btn sm" disabled=${!name.trim()||name===user?.name} onClick=${saveName}>salvar</button>
      </div>
    </div>

    <!-- senha (só para contas com e-mail) -->
    ${user && !user.anon && user.email && html`<div class="card" style="margin-bottom:12px">
      <div class="field-label">Alterar senha</div>
      <div class="field"><input class="txtin" type="password" value=${pw1} onInput=${e=>setPw1(e.target.value)} placeholder="nova senha (mín. 6)" /></div>
      <div class="field" style="margin-bottom:8px"><input class="txtin" type="password" value=${pw2} onInput=${e=>setPw2(e.target.value)} placeholder="repita a nova senha" /></div>
      <button class="btn sm primary" disabled=${busy||!pw1||!pw2} onClick=${savePw}>${busy?'…':'Alterar senha'}</button>
    </div>`}

    <!-- IA: chave e modelo pessoais (opcional, BYOK) — gateado por AI_ENABLED -->
    ${AI_ENABLED && html`<div class="card" style="margin-bottom:12px">
      <div class="field-label">IA — chave e modelo pessoais (opcional)</div>
      <p class="hint" style="margin:0 0 8px">Por padrão, as telas de IA usam a chave e o modelo compartilhados deste projeto. Preenchendo aqui, suas análises passam a usar a <b>sua</b> chave — ela viaja só na requisição até a função do servidor que chama o provedor escolhido; não fica guardada lá, só neste navegador.</p>
      <div class="field"><div class="field-label">Provedor</div>
        <div class="row" style="gap:6px;flex-wrap:wrap">
          ${AI_PROVIDERS.map(p=>html`<button key=${p.id} class="opt ${aiProvider===p.id?'on':''}"
            onClick=${()=>{ setAiProvider(p.id); setAiModel(''); setAiBaseUrl(''); }}>${p.label}</button>`)}
        </div>
      </div>
      ${needsBaseUrl && html`<div class="field"><div class="field-label">${isAzure?'URL base (endpoint do recurso)':'URL base da API'}</div>
        <input class="txtin" value=${aiBaseUrl} onInput=${e=>setAiBaseUrl(e.target.value)} placeholder=${isAzure?'ex.: https://SEU-RECURSO.openai.azure.com/openai/v1':'ex.: https://api.deepseek.com/v1 — precisa ser acessível pela internet (não funciona com localhost)'} />
        <p class="hint" style="margin:6px 0 0">${isAzure
          ? html`Endpoint do seu recurso no portal do Azure, terminando em <code>/openai/v1</code> (superfície "v1"). A autenticação é por chave de API do recurso.`
          : html`Qualquer API compatível com o formato clássico da OpenAI (<code>/chat/completions</code>) — cobre DeepSeek, Mistral, Qwen hospedado, ou um servidor próprio (Ollama/vLLM) exposto numa URL pública.`}</p>
      </div>`}
      <div class="field"><div class="field-label">Sua chave de API</div>
        <input class="txtin" type="password" value=${aiKey} onInput=${e=>setAiKey(e.target.value)} placeholder=${isAzure?'obrigatória — chave de API do recurso Azure':needsBaseUrl?'deixe em branco se o servidor não exigir chave':'deixe em branco pra usar a chave compartilhada'} /></div>
      <div class="field" style="margin-bottom:4px"><div class="field-label">${isAzure?'Deployment':'Modelo'}</div>
        ${needsBaseUrl
          ? html`<input class="txtin" value=${aiModel} onInput=${e=>setAiModel(e.target.value)} placeholder=${isAzure?'ex.: gpt-4.1-mini (nome do deployment)':'ex.: deepseek-chat'} />`
          : html`<div class="row" style="gap:6px;flex-wrap:wrap">
              ${(provDef?.models||[]).map(m=>html`<button key=${m.id} class="opt ${aiModel===m.id || (!aiModel && m.def) ? 'on':''}"
                title=${m.note} onClick=${()=>setAiModel(m.id)}>${m.label}${m.def?html`<span style="opacity:.65;font-size:10px;margin-left:5px">padrão</span>`:''}</button>`)}
            </div>`}
        <p class="hint" style="margin:6px 0 0">${isAzure ? 'Obrigatório — use o nome do deployment criado no portal do Azure (não o nome do modelo base, ex.: o deployment de um gpt-4.1-mini pode ter qualquer nome).' : needsBaseUrl ? 'Obrigatório para o provedor personalizado — use o id de modelo exatamente como o servidor espera.' : 'Modelo "vazio" usa o padrão do projeto pra esse provedor. Em geral, modelos maiores/mais capazes (à direita) são mais lentos e mais caros por uso do que os menores (à esquerda) — escolha conforme a complexidade da tarefa.'}</p>
      </div>
      <p class="hint" style="margin:0 0 8px">Temperatura padrão: <code>0,3</code> (respostas mais focadas e consistentes, menos "criativas"). Top-p: não definido pela aplicação — usa o padrão do provedor/modelo escolhido (em geral entre 0,9 e 1). Nenhum dos dois é configurável por aqui ainda.</p>
      <div class="row" style="gap:6px">
        <button class="btn sm primary" onClick=${saveAI}>salvar</button>
        <button class="btn sm ghost" onClick=${clearAI}>usar chave compartilhada</button>
      </div>
    </div>`}

    <!-- projetos -->
    <div class="field-label" style="margin-bottom:6px">Meus projetos</div>
    ${list.length===0 && html`<div class="card"><span class="meta">Você ainda não tem projetos.</span></div>`}
    <div style="max-height:300px;overflow:auto">
      ${list.map(p=>{ const admin = p.role==='admin'; const confirming = confirmId===p.id;
        return html`<div class="card" key=${p.code||p.id} style="margin-bottom:6px;padding:10px 12px">
          ${editId===p.id
            ? html`<div class="row" style="gap:6px">
                <input class="txtin" value=${editName} onInput=${e=>setEditName(e.target.value)} />
                <button class="btn sm" onClick=${()=>run(async()=>{ await onRename(p.id, editName.trim()||p.name); setEditId(null); })}>salvar</button>
                <button class="btn sm ghost" onClick=${()=>setEditId(null)}>cancelar</button>
              </div>`
            : confirming
              ? html`<div>
                  <div style="font-weight:600;margin-bottom:6px">${p.name||'(sem nome)'}</div>
                  <div class="banner err" style="margin:0 0 8px;font-size:12.5px">
                    ${admin ? 'Excluir definitivamente? Todo o conteúdo será perdido.' : 'Sair deste projeto? Você perderá o acesso.'}
                  </div>
                  <div class="row" style="gap:6px">
                    <button class="btn sm" style="background:var(--danger);color:#fff;border:none"
                      onClick=${()=>run(async()=>{ if(admin) await onDelete(p.id); else await onLeave(p.id); setConfirmId(null); })}>
                      ${admin?'Excluir':'Sair'}
                    </button>
                    <button class="btn sm ghost" onClick=${()=>setConfirmId(null)}>cancelar</button>
                  </div>
                </div>`
              : html`<div class="row" style="gap:8px;align-items:center">
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name||'(sem nome)'}</div>
                    <div class="meta">código ${p.code} · ${p.mode==='individual'?'individual':'coletivo'}${admin?' · admin':''}</div>
                  </div>
                  <button class="btn sm" onClick=${()=>onOpen(p)}>abrir</button>
                  ${admin && html`<button class="icon-btn" title="renomear" onClick=${()=>{ setEditId(p.id); setEditName(p.name||''); }}>✎</button>`}
                  <button class="btn sm ghost" style="color:var(--danger)"
                    onClick=${()=>setConfirmId(p.id)}>
                    ${admin?'🗑':'sair'}
                  </button>
                </div>`}
        </div>`; })}
    </div>

    <div class="row" style="justify-content:space-between;margin-top:14px">
      ${onLogout && html`<button class="btn ghost" style="color:var(--danger)" onClick=${onLogout}>sair da conta</button>`}
      <button class="btn" onClick=${onClose}>Fechar</button>
    </div>
  </div></div>`;
}

try { render(html`<${App} />`, document.getElementById('app')); } catch(e){ showFatal((e&&e.stack)||(e&&e.message)||e); }
</script>
</body>
</html>
