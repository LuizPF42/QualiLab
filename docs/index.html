}
function MemoCodeNode({ code, childrenOf, sel, onSel, hasMemo, depthPad }){
  const [open,setOpen]=useState(false);
  const kids = childrenOf(code.id);
  const col = codeColor(code.hue, code.depth, code.hue_deg);
  const isSel = sel.scope==='code' && sel.targetId===code.id;
  return html`<div class="node">
    <div class="node-row ${isSel?'sel':''}" style=${`padding-left:${6+depthPad*16}px;cursor:pointer`}
      onClick=${()=>onSel({scope:'code', targetId:code.id})}>
      ${kids.length>0 ? html`<span class="caret" onClick=${e=>{e.stopPropagation();setOpen(!open);}}>${open?'‚Ėĺ':'‚Ėł'}</span>` : html`<span class="caret"></span>`}
      <span class="swatch" style=${`background:${col.solid}`}></span>
      <span class="node-name" title=${code.name}>${code.name}</span>
      ${hasMemo('code', code.id) && html`<span class="count">‚óŹ</span>`}
    </div>
    ${open && kids.map(k=>html`<${MemoCodeNode} key=${k.id} code=${k} childrenOf=${childrenOf}
      sel=${sel} onSel=${onSel} hasMemo=${hasMemo} depthPad=${depthPad+1} />`)}
  </div>`;
}

/* ============ MemoEditor ‚ÄĒ painel direito da aba Memos ============
   Editor de texto livre com autosave (debounce), mostrando autor/data da √ļltima edi√ß√£o. */
function MemoEditor({ sel, project, codeById, codePath, codings, docs, memos, onSave, onDelete, onRenameDoc }){
  const targetId = sel.scope==='project' ? project?.id : sel.targetId;
  // memo de projeto: tolera target_id null gravado por vers√Ķes antigas do import (a conven√ß√£o
  // atual √© target_id = project.id) ‚ÄĒ sem isso o memo importado ficava invis√≠vel e editar criava
  // uma segunda linha
  const current = memos.find(m=>m.scope===sel.scope && (m.target_id===targetId || (sel.scope==='project' && !m.target_id)));
  const [text, setText] = useState(current?.content||'');
  const [labelVal, setLabelVal] = useState(current?.label||''); // nome do prompt (s√≥ ai_prompt)
  const [saving, setSaving] = useState(false);
  const [editingName, setEditingName] = useState(false); // renomear documento inline no topo do memo
  const [nameVal, setNameVal] = useState('');
  const debRef = useRef(null), labelDebRef = useRef(null);

  useEffect(()=>{ setText(current?.content||''); setLabelVal(current?.label||''); setEditingName(false); }, [sel.scope, targetId]); // eslint-disable-line

  if(!targetId) return html`<div class="empty">
    <div class="t">Selecione um alvo</div>
    <div>Escolha o projeto, um documento, um c√≥digo ou um trecho √† esquerda para escrever um memo.</div>
  </div>`;

  const coding = sel.scope==='coding' ? (codings||[]).find(c=>c.id===targetId) : null;
  const doc = sel.scope==='document' ? (docs||[]).find(d=>d.id===targetId) : null;
  const label = sel.scope==='project' ? 'Memo do projeto'
    : sel.scope==='ai_context' ? 'Memo para a IA'
    : sel.scope==='ai_prompt' ? 'Prompt salvo'
    : sel.scope==='document' ? 'Memo do documento'
    : sel.scope==='coding' ? 'Nota anal√≠tica do trecho'
    : 'Memo do c√≥digo';
  const subtitle = sel.scope==='code' ? codePath(targetId).join(' ‚Ėł ')
    : sel.scope==='coding' && coding ? codePath(coding.code_id).join(' ‚Ėł ') : null;

  const change = (val)=>{
    setText(val);
    clearTimeout(debRef.current);
    debRef.current = setTimeout(async ()=>{ setSaving(true); await onSave(sel.scope, targetId, val, labelVal); setSaving(false); }, 700);
  };
  // renomear um prompt salvo (preserva o conte√ļdo). S√≥ usado em ai_prompt.
  const changeLabel = (val)=>{
    setLabelVal(val);
    clearTimeout(labelDebRef.current);
    labelDebRef.current = setTimeout(async ()=>{ setSaving(true); await onSave(sel.scope, targetId, text, val); setSaving(false); }, 700);
  };

  return html`<div class="section" style="max-width:760px;margin:0 auto">
    <p class="h" style="margin-bottom:2px">${label}</p>
    ${sel.scope==='ai_context' && html`<p class="hint" style="margin:2px 0 8px">Contexto do projeto escrito <b>para a IA</b> ‚ÄĒ injetado nos prompts por padr√£o (voc√™ controla no painel "Configurar prompt"). O "Memo do projeto" comum deixou de ser enviado automaticamente; use-o como rascunho livre.</p>`}
    ${sel.scope==='ai_prompt' && html`<div style="margin:2px 0 10px">
      <input class="txtin" style="font-size:14px;padding:5px 9px" placeholder="Nome do prompt" value=${labelVal} onInput=${e=>changeLabel(e.target.value)} />
      <p class="hint" style="margin:6px 0 0">Prompt reutiliz√°vel da biblioteca (aba Analisar com IA). Editar aqui muda o texto que a sugest√£o insere.</p>
    </div>`}
    ${doc && html`<div class="row" style="gap:6px;align-items:center;margin:0 0 4px">
      ${editingName
        ? html`<input class="txtin" autoFocus style="max-width:460px;font-size:14px;padding:3px 8px" value=${nameVal}
            onInput=${e=>setNameVal(e.target.value)}
            onKeyDown=${e=>{ if(e.key==='Enter'){ if(nameVal.trim()) onRenameDoc?.(doc.id, nameVal); setEditingName(false); } else if(e.key==='Escape') setEditingName(false); }}
            onBlur=${()=>{ if(nameVal.trim()) onRenameDoc?.(doc.id, nameVal); setEditingName(false); }} />`
        : html`<span style="font-weight:600;font-size:15px">${doc.name}</span>
          ${onRenameDoc && html`<button class="icon-btn" title="Renomear documento" style="font-size:13px" onClick=${()=>{ setNameVal(doc.name); setEditingName(true); }}>‚úŹ</button>`}`}
    </div>`}
    ${subtitle && html`<p class="hint" style="margin:0 0 4px">${subtitle}</p>`}
    ${coding && coding.quote && html`<blockquote style="margin:0 0 8px;padding:8px 12px;background:var(--surface);border-left:3px solid var(--teal);font-family:var(--serif);font-size:14px;max-height:140px;overflow:auto">${coding.quote}</blockquote>`}
    <p class="hint" style="margin:0 0 10px">
      Nota √ļnica, compartilhada entre todos os pesquisadores do projeto ‚ÄĒ qualquer membro pode editar.
      ${current && html` √öltima edi√ß√£o: <b>${current.author_name||'an√īnimo'}</b>${current.updated_at?` em ${new Date(current.updated_at).toLocaleString('pt-BR')}`:''}.`}
    </p>
    <textarea class="txtin" rows="18" style="font-family:var(--serif);font-size:16px;line-height:1.7;resize:vertical"
      placeholder="Escreva aqui suas anota√ß√Ķes anal√≠ticas, defini√ß√Ķes, decis√Ķes metodol√≥gicas‚Ä¶"
      value=${text} onInput=${e=>change(e.target.value)}></textarea>
    <div class="row" style="margin-top:6px;gap:10px"><span class="meta">${saving?'salvando‚Ä¶':'salvo automaticamente'}</span>
      ${sel.scope==='ai_prompt' && onDelete && current && html`<button class="btn sm" style="margin-left:auto;color:var(--danger)" onClick=${()=>{ if(confirm('Apagar este prompt salvo?')) onDelete(current.id); }}>ūüóĎ apagar prompt</button>`}
    </div>
  </div>`;
}

/* ============ CodingMemoModal ‚ÄĒ nota anal√≠tica por TRECHO (scope='coding') ============
   Aberto pelo menu de contexto do leitor sobre um grifo. √Č a "anota√ß√£o por trecho" (base da
   transpar√™ncia ativa): a nota que o export de transpar√™ncia prefere sobre o memo do c√≥digo.
   Nota √ļnica por coding, compartilhada entre membros (mesma sem√Ęntica de setMemo). */
function CodingMemoModal({ target, memos, onClose, onSave }){
  const current = (memos||[]).find(m=>m.scope==='coding' && m.target_id===target.id);
  const [text, setText] = useState(current?.content||'');
  const [saving, setSaving] = useState(false);
  useEffect(()=>{ setText(current?.content||''); }, [target.id]); // eslint-disable-line
  const save = async ()=>{ setSaving(true); await onSave(text); setSaving(false); onClose(); };
  // clique fora s√≥ fecha direto se o texto n√£o mudou ‚ÄĒ um clique acidental no backdrop
  // no meio da digita√ß√£o descartava a nota inteira sem aviso
  const requestClose = ()=>{ if(text===(current?.content||'') || confirm('Descartar a nota n√£o salva?')) onClose(); };
  return html`<div class="modal-bg" onClick=${requestClose}>
    <div class="modal" style="max-width:620px" onClick=${e=>e.stopPropagation()}>
      <h3 style="margin:0 0 2px">Nota anal√≠tica do trecho</h3>
      <p class="hint" style="margin:0 0 8px">${target.codePath||''}</p>
      <blockquote style="margin:0 0 10px;padding:8px 12px;background:var(--surface);border-left:3px solid var(--teal);font-family:var(--serif);font-size:14px;max-height:120px;overflow:auto">${target.quote||''}</blockquote>
      <p class="hint" style="margin:0 0 8px">
        Explique como este trecho sustenta a interpreta√ß√£o/infer√™ncia (o que vira a "nota anal√≠tica" no ap√™ndice de transpar√™ncia). Nota √ļnica, compartilhada entre membros.
        ${current && html` √öltima edi√ß√£o: <b>${current.author_name||'an√īnimo'}</b>${current.updated_at?` em ${new Date(current.updated_at).toLocaleString('pt-BR')}`:''}.`}
      </p>
      <textarea class="txtin" rows="7" autofocus style="font-family:var(--serif);font-size:15px;line-height:1.6;resize:vertical"
        placeholder="Ex.: este trecho evidencia a contradi√ß√£o porque‚Ä¶" value=${text} onInput=${e=>setText(e.target.value)}></textarea>
      <div class="row" style="gap:8px;justify-content:flex-end;margin-top:10px">
        <button class="btn ghost" onClick=${requestClose}>cancelar</button>
        <button class="btn primary" disabled=${saving} onClick=${save}>${saving?'salvando‚Ä¶':'salvar nota'}</button>
      </div>
    </div>
  </div>`;
}

/* ============ IA (chat simples via Edge Function ai-ask) ============
   Proxy generico para a Groq, deployado em supabase/functions/ai-ask.
   Aqui so existe um chat de pergunta/resposta; funcoes mais especificas
   (sugerir codigo, resumir documento) podem reusar askAI() depois. */
// catalogo de modelos por provedor pro seletor de botoes em "Minha Conta" ‚ÄĒ ordenados do
// mais rapido/barato pro mais capaz/lento/caro (mesmo padrao "tamanho" nos tres provedores).
// O array tambem decide a ordem dos botoes de provedor.
const AI_PROVIDERS = [
  { id:'gemini', label:'Google Gemini', models:[
    { id:'gemini-3.1-flash-lite',  label:'Flash Lite', note:'padr√£o ‚ÄĒ mais r√°pido e barato', def:true },
    { id:'gemini-3.5-flash',       label:'Flash',      note:'equil√≠brio' },
    { id:'gemini-3.1-pro-preview', label:'Pro',        note:'mais capaz ‚ÄĒ mais lento e caro' },
  ]},
  { id:'openai', label:'OpenAI', models:[
    { id:'gpt-5.4-mini', label:'GPT-5.4-mini', note:'mais r√°pido e barato' },
    { id:'gpt-5.4',      label:'GPT-5.4',      note:'padr√£o ‚ÄĒ equil√≠brio', def:true },
    { id:'gpt-5.5',      label:'GPT-5.5',      note:'mais capaz ‚ÄĒ mais lento e caro' },
  ]},
  { id:'anthropic', label:'Anthropic', models:[
    { id:'claude-haiku-4-5-20251001', label:'Haiku',  note:'mais r√°pido e barato' },
    { id:'claude-sonnet-4-6',         label:'Sonnet', note:'padr√£o ‚ÄĒ equil√≠brio', def:true },
    { id:'claude-opus-4-8',          label:'Opus',   note:'mais capaz ‚ÄĒ mais lento e caro' },
  ]},
  // Azure OpenAI: como o "custom" (URL base + modelo em texto livre, custom:true), mas
  // autenticacao por header "api-key" e chave obrigatoria ‚ÄĒ tratado pela Edge Function.
  // baseUrl = endpoint "v1" do recurso (https://SEU-RECURSO.openai.azure.com/openai/v1);
  // modelo = nome do DEPLOYMENT criado no portal do Azure (nao o nome do modelo base).
  { id:'azure', label:'Azure OpenAI', azure:true, custom:true, models:[] },
  // provedor "personalizado": sem lista fixa de modelos (custom:true) ‚ÄĒ o pesquisador
  // preenche URL base + modelo em texto livre. Cobre qualquer API compativel com o formato
  // classico da OpenAI (/chat/completions): DeepSeek, Mistral, Qwen hospedado, ou um
  // servidor local (Ollama/vLLM) exposto numa URL publica (a Edge Function roda no servidor
  // do Supabase, nao alcanca localhost da maquina do pesquisador sem tunel).
  { id:'custom', label:'Personalizado', custom:true, models:[] },
  // Ollama LOCAL: tambem formato classico da OpenAI (custom:true reusa a UI de URL+modelo),
  // mas a flag local:true desvia a chamada pra DIRETA do navegador (askLocalChat), sem passar
  // pela Edge Function ai-ask ‚ÄĒ que roda no servidor do Supabase e nao alcanca o localhost da
  // maquina. Assim funciona offline/air-gapped, sem tunel. Requer iniciar o Ollama com
  // OLLAMA_ORIGINS liberando a origem do navegador (CORS); ver hint em "Minha Conta".
  { id:'ollama', label:'Ollama (local)', custom:true, local:true, models:[] },
];
// Sugestoes (NAO uma lista fixa) de modelos Ollama populares ‚ÄĒ viram <option> de um <datalist>
// no campo de modelo (texto livre): o pesquisador clica numa sugestao OU digita qualquer outro
// modelo que tenha baixado (ollama pull / ollama list). So nomes-base comuns; tags especificas
// (ex.: llama3.1:70b) o usuario completa a mao. Manter curto e atualizavel.
const OLLAMA_MODEL_SUGGESTIONS = [
  'llama3.1', 'llama3.2', 'llama3.3', 'qwen2.5', 'qwen2.5-coder',
  'gemma2', 'mistral', 'mistral-nemo', 'phi4', 'deepseek-r1',
];
// configuracao pessoal de IA (BYOK) ‚ÄĒ guardada so no localStorage de quem configurou em
// "Minha Conta". Ausente = usa a chave/modelo do servidor, se houver (comportamento
// de sempre); a Edge Function decide isso, aqui so manda o que tiver preenchido.
function getAIConfig(){
  try{
    return {
      provider: localStorage.getItem('qualilab:ai_provider') || 'gemini',
      apiKey: localStorage.getItem('qualilab:ai_key') || '',
      model: localStorage.getItem('qualilab:ai_model') || '',
      baseUrl: localStorage.getItem('qualilab:ai_baseurl') || '',
    };
  }catch(e){ return { provider:'gemini', apiKey:'', model:'', baseUrl:'' }; }
}
// r√≥tulo do modelo ativo, pra proveni√™ncia da mem√≥ria (ex.: "anthropic:claude-opus-4-8",
// ou "gemini:(padr√£o)" quando o modelo √© o default do provedor). Auditoria em projeto coletivo.
function currentModelLabel(){
  const c = getAIConfig();
  const prov = AI_PROVIDERS.find(p=>p.id===c.provider);
  const provLabel = prov?.label || c.provider || 'IA';
  // modelo escolhido; se vazio, resolve o default (def:true) do provedor (mesmo do DEFAULT_MODELS da Edge Function)
  const mid = c.model || (prov?.models||[]).find(m=>m.def)?.id || '';
  const mObj = (prov?.models||[]).find(m=>m.id===mid);
  let mLabel;
  if(mObj){
    mLabel = mObj.label; // ex.: "Sonnet"
    // acrescenta a versao vinda do id quando o rotulo nao a traz ("Sonnet" + "claude-sonnet-4-6" -> "Sonnet 4.6")
    if(!/\d/.test(mLabel)){ const v=(mid.match(/(\d+)[.\-](\d+)/)||[])[0]; if(v) mLabel += ' '+v.replace('-','.'); }
  } else {
    mLabel = c.model || 'modelo padr√£o'; // custom/azure/ollama: modelo em texto livre
  }
  return `${provLabel}: ${mLabel}`;
}
// provedor "local" (Ollama/vLLM na maquina): a chamada NAO passa pela Edge Function ai-ask
// (que roda no servidor do Supabase e nao alcanca o localhost do pesquisador) ‚ÄĒ o navegador
// fala DIRETO com o servidor local. Marcado pela flag local:true em AI_PROVIDERS.
function isLocalProvider(provider){
  return !!AI_PROVIDERS.find(p=>p.id===provider)?.local;
}
// Chamada direta do navegador a um servidor local compativel com o formato classico da OpenAI
// (/chat/completions). Mesmo corpo do callCustom da Edge Function, porem disparado no cliente ‚ÄĒ
// funciona offline/air-gapped, sem tunel nem nuvem. Requer OLLAMA_ORIGINS liberando a origem do
// navegador (CORS); e, se o app estiver em HTTPS (GitHub Pages), o navegador pode bloquear
// http://localhost como conteudo misto ‚ÄĒ rodar o app localmente (http://localhost) contorna.
// json=true ativa o "modo JSON" do servidor local (response_format json_object). Ollama/vLLM
// compativeis com OpenAI restringem a saida a JSON valido via gramatica ‚ÄĒ essencial pros modelos
// locais menores, que entendem a tarefa mas costumam ignorar a instrucao de "responda so JSON" e
// devolvem prosa (ai o parseAIJson falha). So passar nas chamadas que esperam JSON (Codificar com
// IA, "Sugerir memorias"); NUNCA na conversa em prosa do Analisar, senao quebraria a resposta.
async function askLocalChat({ system, messages, signal, json }){
  const cfg = getAIConfig();
  const base = (cfg.baseUrl || 'http://localhost:11434/v1').replace(/\/+$/, '');
  const msgs = [ ...(system ? [{ role:'system', content: system }] : []), ...(messages || []) ];
  let res;
  try{
    res = await fetch(`${base}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', ...(cfg.apiKey ? { Authorization:`Bearer ${cfg.apiKey}` } : {}) },
      body: JSON.stringify({ model: cfg.model, messages: msgs, temperature: 0.3, stream: false, max_tokens: 8192, ...(json ? { response_format:{ type:'json_object' } } : {}) }),
      ...(signal ? { signal } : {}),
    });
  }catch(e){
    if(e && e.name === 'AbortError') throw e;
    throw new Error(`N√£o consegui falar com o servidor local em ${base} ‚ÄĒ o Ollama est√° rodando e iniciado com OLLAMA_ORIGINS liberando este site? (Se o app estiver em HTTPS, rode-o localmente em http://localhost.)`);
  }
  if(!res.ok){ const t = await res.text().catch(()=> ''); throw new Error(`Servidor local (${res.status}): ${t || 'sem detalhe'}`); }
  const data = await res.json().catch(()=>({}));
  return data.choices?.[0]?.message?.content || '';
}
async function askAI(prompt){
  const cfg = getAIConfig();
  if(isLocalProvider(cfg.provider)) return askLocalChat({ messages:[{ role:'user', content: prompt }] });
  const res = await fetch(`${SUPABASE_URL}/functions/v1/ai-ask`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${await aiAuthToken()}`, apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, provider: cfg.provider, ...(cfg.apiKey ? { apiKey: cfg.apiKey } : {}), ...(cfg.model ? { model: cfg.model } : {}), ...(cfg.baseUrl ? { baseUrl: cfg.baseUrl } : {}) }),
  });
  const data = await res.json().catch(()=>({}));

}

// Motor de conversa multi-turno (Fase 0 do plano de IA assistida). Reaproveita o suporte a
// { system, messages } que a Edge Function ai-ask JA tem ‚ÄĒ nao substitui askAI (que segue
// servindo o caminho de uma rodada). messages = [{role:'user'|'assistant', content}]; o
// material grande vai no system (prefixo estavel = candidato a prompt caching no provedor).
//
// IMPORTANTE: a ai-ask SO usa body.system no fallback de { prompt } ‚ÄĒ quando vem body.messages,
// ela ignora body.system e extrai o system de mensagens com role:'system' DENTRO do array.
// Por isso o system entra PREPENDADO como 1a mensagem (role:'system'), nao como campo separado;
// senao o system (= todo o material) seria descartado e o modelo responderia sem contexto.
// Esse caminho funciona em todos os provedores (Gemini/OpenAI/Anthropic/Azure/custom) sem
// precisar redeploy da function. Mandamos body.system tambem, por compatibilidade/inocuo.
async function askAIChat({ system, messages, signal, json }){
  const cfg = getAIConfig();
  if(isLocalProvider(cfg.provider)) return askLocalChat({ system, messages, signal, json });
  const msgs = [ ...(system ? [{ role:'system', content: system }] : []), ...(messages || []) ];
  const res = await fetch(`${SUPABASE_URL}/functions/v1/ai-ask`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${await aiAuthToken()}`, apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ...(system ? { system } : {}),
      messages: msgs,
      provider: cfg.provider,
      ...(cfg.apiKey ? { apiKey: cfg.apiKey } : {}),
      ...(cfg.model ? { model: cfg.model } : {}),
      ...(cfg.baseUrl ? { baseUrl: cfg.baseUrl } : {}),
    }),
    ...(signal ? { signal } : {}),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || data.error) throw new Error(data.error || `Erro ${res.status}`);
  return data.text || '';
}

// extrai os objetos {...} de NIVEL SUPERIOR de uma string, respeitando strings/escapes ‚ÄĒ
// usado pra "salvar" operacoes mesmo quando o JSON em volta veio truncado (max_tokens) ou
// malformado. Pula chaves dentro de strings; nao confunde { de dentro de uma string.
function extractBalancedObjects(s){
  const out=[]; let depth=0, start=-1, inStr=false, esc=false;
  for(let i=0;i<s.length;i++){ const ch=s[i];
    if(inStr){ if(esc) esc=false; else if(ch==='\\') esc=true; else if(ch==='"') inStr=false; continue; }
    if(ch==='"'){ inStr=true; continue; }
    if(ch==='{'){ if(depth===0) start=i; depth++; }
    else if(ch==='}'){ if(depth>0){ depth--; if(depth===0 && start>=0){ out.push(s.slice(start,i+1)); start=-1; } } }
  }
  return out;
}

// Parser tolerante de JSON vindo da IA ‚ÄĒ e o fallback UNIVERSAL do plano (funciona em
// qualquer provedor BYOK sem depender de saida estruturada nativa). Estrategia em camadas:
//   1) recorta um bloco ```json``` se houver, senao do 1o {/[ ao ultimo }/] e tenta JSON.parse
//      (com e sem virgulas-sobrando), cobrindo o caso comum de resposta bem-formada.
//   2) SALVAMENTO: se o parse falhar (tipico de saida truncada por max_tokens, em que o objeto
//      { "operations": [ ... } nunca fecha), localiza o array "operations" e extrai dele os
//      objetos {...} balanceados que parsearem individualmente ‚ÄĒ recupera as operacoes
//      completas e descarta so a ultima cortada. Marca _salvaged pra UI avisar.
// Devolve null se nada der. Quem chama trata o erro (e pode mostrar a resposta crua).
// Bloco de "mem√≥ria do projeto" (di√°rio de insights) injetado no system prompt das chamadas
// de IA. S√≥ as entradas ATIVAS entram (o pesquisador escolhe quais usar ‚ÄĒ economia de tokens
// e transpar√™ncia). Recebe a lista completa de mem√≥rias e filtra aqui, pra ser uma √ļnica fonte.
function memoryBlock(entries){
  const active = (entries||[]).filter(m=>m && m.active);
  if(!active.length) return 'Mem√≥ria do projeto (decis√Ķes e insights j√° registrados pelo pesquisador): (nenhuma mem√≥ria registrada ainda)';
  return 'Mem√≥ria do projeto (decis√Ķes e insights j√° registrados pelo pesquisador ‚ÄĒ leve em conta, n√£o repita como novidade):\n'
    + active.map(m=>`- ${m.content}`).join('\n');
}

// Valida/normaliza as mem√≥rias propostas pela IA (campo "memory" do JSON): s√≥ entradas com
// content n√£o-vazio; reason default ''; corta tamanho; at√© 8 (mesma disciplina do validateOps).
function validateMemProps(raw){
  const out = [];
  for(const e of (Array.isArray(raw)?raw:[])){
    const content = String(e?.content||'').trim();
    if(!content) continue;
    out.push({ content: content.slice(0,400), reason: String(e?.reason||'').trim().slice(0,300) });
    if(out.length>=8) break;
  }
  return out;
}

function parseAIJson(text){
  if(!text) return null;
  let s = String(text).trim();
  const fenced = s.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if(fenced) s = fenced[1].trim();
  const firstObj = s.indexOf('{'), firstArr = s.indexOf('[');
  let start = -1, closeCh = '}';
  if(firstArr >= 0 && (firstObj < 0 || firstArr < firstObj)){ start = firstArr; closeCh=']'; }
  else if(firstObj >= 0){ start = firstObj; }
  const last = start>=0 ? s.lastIndexOf(closeCh) : -1;
  const core = start>=0 ? s.slice(start, last>start ? last+1 : s.length) : s;
  for(const t of [core, core.replace(/,\s*([}\]])/g, '$1')]){ // crua e sem virgula-sobrando
    try{ return JSON.parse(t); }catch(e){}
  }
  // SALVAMENTO generico (cobre truncamento por max_tokens): acha o 1o array NOMEADO do objeto
  // ("operations"/"values"/"codings"/"memory"...) e extrai dele os objetos {...} balanceados que
  // parseiam individualmente ‚ÄĒ recupera os itens completos e descarta so o ultimo cortado. A chave
  // detectada e PRESERVADA (parsed.operations, parsed.values, ...), pra cada painel ler a sua.
  const arrKey = s.match(/["'](\w+)["']\s*:\s*\[/);
  if(arrKey){
    const items = [];
    for(const o of extractBalancedObjects(s.slice(s.indexOf('[', arrKey.index) + 1))){
      try{ const p = JSON.parse(o); if(p && typeof p==='object' && !Array.isArray(p)) items.push(p); }catch(e){}
    }
    if(items.length){
      const sum = s.match(/["']summary["']\s*:\s*"((?:[^"\\]|\\.)*)"/);
      return { [arrKey[1]]: items, summary: sum ? sum[1] : '', _salvaged: true };
    }
  }
  return null;
}

/* ============ CODIFICAR COM IA ‚ÄĒ organizacao de codigos (Fase 2 do plano) ============
   A IA PROPOE reorganizar o esquema de codigos (caso classico de grounded theory: centenas
   de codigos soltos no mesmo nivel apos a codificacao aberta); o pesquisador APROVA / recusa
   cada operacao, com a justificativa (reason) visivel. Nada e aplicado sem confirmacao
   (mesmo espirito do allowRedact e do "Ver prompt completo"). Aplicar reusa a MESMA logica
   ja provada em SchemaCodesView ‚ÄĒ reparentSubtree (recalcula profundidade/cor da subarvore),
   merge via addCoding+deleteCoding preservando filhos, prote√ß√£o contra ciclo (isDescendantOf).

   IDs: os codigos reais sao uuids longos; aqui mapeamos cada um pra um id curto (#c1, #c2...)
   pra IA referenciar de forma barata e legivel. Toda operacao tem seus ids traduzidos de
   volta e VALIDADOS contra os codigos reais ‚ÄĒ id inexistente e descartado em silencio. */

// uma operacao por tipo, com descricao legivel pra previa antes->depois e o reason da IA.
const IA_COD_SYS_REGRAS = `Sua tarefa √© propor uma reorganiza√ß√£o do esquema de c√≥digos e devolver SOMENTE um objeto JSON (sem texto fora dele), no formato:
{
  "operations": [
    { "op": "merge",    "survivor": "#c2", "merged": ["#c5","#c8"], "reason": "..." },
    { "op": "group",    "children": ["#c3","#c4"], "parent": "#c1", "reason": "..." },
    { "op": "group",    "children": ["#c6","#c7"], "parent": null, "newParentName": "Nome da nova fam√≠lia", "reason": "..." },
    { "op": "reparent", "id": "#c9", "newParent": "#c1", "reason": "..." },
    { "op": "rename",   "id": "#c4", "newName": "Novo nome", "reason": "..." },
    { "op": "promote",  "id": "#c7", "reason": "..." }
  ],
  "summary": "uma frase resumindo a l√≥gica geral da proposta",
  "memory": [ { "content": "fato/decis√£o curto e dur√°vel sobre o projeto, em 1 frase", "reason": "por que vale lembrar, em 1 linha" } ]
}
Significado: merge = fundir c√≥digos redundantes num s√≥ (survivor sobrevive, merged somem e seus trechos passam pro survivor); group = manter os c√≥digos separados, mas agrup√°-los como filhos de um pai (existente em "parent", ou novo com "newParentName" e parent=null); reparent = mover um c√≥digo pra dentro de outro pai; rename = renomear; promote = tornar um c√≥digo uma fam√≠lia de topo (Hierarquia 0).
Regras: use SOMENTE os ids curtos que aparecem na lista de c√≥digos (n√£o invente ids nem use nomes no lugar do id); explique CADA opera√ß√£o no campo "reason" (em portugu√™s, em UMA frase curta ‚ÄĒ n√£o use quebras de linha dentro de strings JSON); prefira poucas fam√≠lias claras a muitos n√≠veis; sinalize incerteza no pr√≥prio "reason" quando houver; n√£o proponha opera√ß√Ķes triviais ou redundantes. Proponha NO M√ĀXIMO 20 opera√ß√Ķes por resposta ‚ÄĒ se houver mais a fazer, priorize as mais importantes e diga no "summary" que h√° mais a fazer numa pr√≥xima rodada (a resposta n√£o pode ser longa demais ou ser√° cortada). Se o esquema j√° estiver bem organizado, devolva "operations": [] e diga isso no "summary".
O campo "memory" √© OPCIONAL: inclua-o s√≥ se desta an√°lise emergir algum fato ou decis√£o DUR√ĀVEL sobre o projeto que valha registrar na mem√≥ria do projeto (ex.: "as fam√≠lias X e Y foram consolidadas", "o esquema foi reorganizado em N fam√≠lias tem√°ticas"). N√ÉO registre observa√ß√Ķes triviais ou transit√≥rias. No m√°ximo 8 entradas, cada "content" em UMA frase. Se n√£o houver nada relevante, omita "memory" ou devolva [].
Devolva apenas o JSON, sem texto antes nem depois, sem coment√°rios.`;

function IAOrganizarPanel({ project, docs, codes, codeById, codePath, store, allCodings, count, isAdmin, reload, loadAll, onAdd, memos, onSetMemo, memory, onAddMemory, onToggleMemory, onDeleteMemory, tab, setTab, TABS }){
  // history: a conversa inteira. Cada turno de IA carrega seus PROPRIOS dados estruturados
  // (operacoes ja traduzidas+validadas, resumo, memorias propostas, flags) ‚ÄĒ assim as operacoes
  // aparecem INLINE no balao da IA. So o ultimo turno de IA fica acionavel; os anteriores/aplicados
  // viram registro somente-leitura (aplicar uma proposta velha apos o esquema mudar seria inseguro).
  const [history, setHistory] = useState([]);
  const [decided, setDecided] = useState({});    // { 'turnIdx:opIdx:op': true|false } aprovar/recusar (default aprovar)
  const [instruction, setInstruction] = useState(''); // 1o turno / follow-up livre do pesquisador
  const [withSamples, setWithSamples] = useState(true); // incluir amostra de trechos por codigo
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [applyMsg, setApplyMsg] = useState('');

  // patch imutavel de um turno especifico do history
  const patchTurn = (idx, patch)=> setHistory(h=> h.map((t,i)=> i===idx ? { ...t, ...patch } : t));
  // ultimo turno de IA (so ele aceita aprovar/aplicar)
  const lastAssistantIdx = (()=>{ for(let i=history.length-1;i>=0;i--){ if(history[i].role==='assistant') return i; } return -1; })();
  const dkey = (turnIdx, i, op)=> turnIdx+':'+i+':'+op;

  // --- CONFIG DO PROMPT (mesmo padr√£o do Analisar, MENOS postura/biblioteca): ai_instructions
  // (COMPARTILHADO com o Analisar) + ai_context (Memo para a IA) + memos injetados. ---
  const [showPrompt, setShowPrompt] = useState(false);
  const aiInstrMemo = (memos||[]).find(m=>m.scope==='ai_instructions' && m.target_id===project?.id);
  const ctxMemo     = (memos||[]).find(m=>m.scope==='ai_context' && m.target_id===project?.id);
  const [aiInstr, setAiInstr] = useState('');
  const instrTouched = useRef(false);
  const memoKey = (m)=> `${m.scope}:${m.target_id}`;
  const ctxKey = `ai_context:${project?.id}`;
  const [injectSel, setInjectSel] = useState(()=> new Set([ctxKey]));
  useEffect(()=>{ if(!instrTouched.current) setAiInstr(aiInstrMemo?.content || ''); }, [aiInstrMemo?.content]);
  useEffect(()=>{ instrTouched.current=false; setInjectSel(new Set([ctxKey])); }, [project?.id]); // eslint-disable-line
  const instrDebRef = useRef(null);
  const changeInstr = (val)=>{ instrTouched.current=true; setAiInstr(val); clearTimeout(instrDebRef.current); instrDebRef.current = setTimeout(()=>{ onSetMemo && onSetMemo('ai_instructions', project.id, val); }, 700); };
  const toggleInject = (key)=> setInjectSel(s=>{ const n=new Set(s); n.has(key)?n.delete(key):n.add(key); return n; });
  const memoName = (m)=> m.scope==='ai_context' ? 'Memo para a IA'
    : m.scope==='project' ? 'Memo do projeto'
    : m.scope==='document' ? `Documento: ${(docs.find(d=>d.id===m.target_id)||{}).name||'‚ÄĒ'}`
    : m.scope==='code' ? `C√≥digo: ${(codePath?codePath(m.target_id):[]).join(' ‚Ėł ')}`
    : m.scope==='coding' ? 'Nota de trecho' : m.scope;
  const injectableMemos = (memos||[]).filter(m=> ['project','document','code','coding'].includes(m.scope) && m.content && m.content.trim());
  const injectedMemos = (memos||[]).filter(m=> injectSel.has(memoKey(m)) && m.content && m.content.trim());

  // ids curtos estaveis (#c1..) <-> uuid real. Recalcula quando a lista de codigos muda.
  const { shortToId, idToShort } = useMemo(()=>{
    const s2i = {}, i2s = {};
    codes.forEach((c,i)=>{ const sh = 'c'+(i+1); s2i[sh] = c.id; i2s[c.id] = sh; });
    return { shortToId: s2i, idToShort: i2s };
  }, [codes]);
  const resolveId = (ref)=>{
    if(ref==null) return null;
    const key = String(ref).replace(/^#/, '').trim();
    if(shortToId[key]) return shortToId[key];      // id curto (#c3 ou c3)
    if(codeById[key]) return key;                  // a IA mandou o uuid real direto
    return null;
  };
  const shortOf = (realId)=> idToShort[realId] || '?';
  const nameOf = (realId)=> codeById[realId]?.name || '(removido)';
  const labelOf = (realId)=> `#${shortOf(realId)} "${nameOf(realId)}"`;

  // censura: codigos is_redaction (e toda a subarvore ‚ÄĒ a flag cascateia) NAO sao categorias
  // analiticas, sao marcacao de conteudo sensivel. Ficam FORA do material de reorganizacao (a IA
  // nao deve mesclar/agrupar/mover censura) ‚ÄĒ mesmo espirito do selectableCodes no IAAnalisarPanel.
  const redactionIds = useMemo(()=> new Set(codes.filter(c=>c.is_redaction).map(c=>c.id)), [codes]);
  const organizable = useMemo(()=> codes.filter(c=>!redactionIds.has(c.id)), [codes, redactionIds]);

  // ---- MATERIAL (vai no system, prefixo estavel) ----
  const codeListBlock = useMemo(()=>{
    const lines = organizable.map(c=>{
      const parent = c.parent_id ? '#'+shortOf(c.parent_id) : '(raiz)';
      return `#${shortOf(c.id)} | "${c.name}" | pai: ${parent} | profundidade ${c.depth??0} | ${count[c.id]||0} trechos`;
    });
    return 'LISTA DE C√ďDIGOS (id | nome | pai | profundidade | n¬ļ de trechos):\n' + (lines.join('\n') || '(nenhum c√≥digo)');
  }, [organizable, count, idToShort]);

  const excerptBlock = useMemo(()=>{
    if(!withSamples) return '';
    const byCode = {}, byDoc = {};
    (allCodings||[]).forEach(c=>{ (byCode[c.code_id] = byCode[c.code_id]||[]).push(c); (byDoc[c.document_id] = byDoc[c.document_id]||[]).push(c); });
    // CENSURA POR SOBREPOSICAO: o codigo amostrado nunca e de censura (organizable exclui), mas o
    // quote dele pode COBRIR um trecho que OUTRO codificador censurou (coding separado, code_id de
    // censura). maskQuoteSpans (top-level) mascara so a porcao sobreposta, preservando o resto como
    // contexto de organizacao; depois corta em 240 chars.
    const maskQuote = (co)=> maskQuoteSpans(co, byDoc[co.document_id], redactionIds).slice(0,240);
    // escolhe ate N trechos ILUSTRATIVOS e DISTINTOS por codigo (O(n), so um Set):
    //  1) dedup por span EXATO (documento+offsets) ‚ÄĒ varios pesquisadores codificando o MESMO
    //     trecho viram 1 (era o desperdicio: os 3 slots gastos com a mesma frase repetida);
    //  2) round-robin por documento ‚ÄĒ alterna as fontes pra mostrar variacao entre casos, em
    //     vez de 3 trechos do mesmo documento. (Mesmo span/texto identico = mesma chave; dois
    //     trechos com texto igual mas spans diferentes sao ocorrencias distintas, ficam ambos.)
    const pick = (list, n)=>{
      const seen = new Set(); const docBuckets = new Map();
      for(const co of list){
        const key = co.document_id+'|'+co.span_start+'|'+co.span_end;
        if(seen.has(key)) continue; seen.add(key);
        if(!docBuckets.has(co.document_id)) docBuckets.set(co.document_id, []);
        docBuckets.get(co.document_id).push(co);
      }
      const out = []; let round = 0, added = true;
      while(added && out.length < n){ added = false;
        for(const arr of docBuckets.values()){ if(out.length>=n) break; if(arr[round]){ out.push(arr[round]); added = true; } }
        round++;
      }
      return out;
    };
    const blocks = organizable.map(c=>{
      const list = pick(byCode[c.id]||[], 3);
      if(!list.length) return null;
      const quotes = list.map(co=> `- "${maskQuote(co)}"`);
      return `#${shortOf(c.id)} "${c.name}":\n${quotes.join('\n')}`;
    }).filter(Boolean);
    if(!blocks.length) return '';
    return '\n\nAMOSTRA DE TRECHOS POR C√ďDIGO (at√© 3 por c√≥digo, distintos e ilustrativos ‚ÄĒ N√ÉO s√£o todos os trechos):\n' + blocks.join('\n\n');
  }, [organizable, allCodings, withSamples, idToShort, redactionIds]);

  // material com truncamento (preserva a lista de codigos inteira; corta a amostra primeiro)
  const buildMaterial = ()=>{
    let mat = codeListBlock + excerptBlock;
    if(mat.length > IA_TOTAL_CHAR_LIMIT){
      const budget = Math.max(0, IA_TOTAL_CHAR_LIMIT - codeListBlock.length);
      mat = codeListBlock + (budget>200 ? excerptBlock.slice(0, budget) + '\n[...amostra truncada ‚ÄĒ limite de tamanho...]' : '\n[amostra de trechos omitida ‚ÄĒ esquema grande]');
    }
    return mat;
  };
  // SECOES NOMEADAS do prompt ‚ÄĒ FONTE UNICA (system enviado + PromptInspector). Papel =
  // constituicao + papel deste painel + instrucoes; Memo = memos injetados (nao mais o memo
  // de projeto auto-injetado); regras = IA_COD_SYS_REGRAS.
  const promptSections = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const roleText = [
      IA_CONSTITUICAO,
      'Neste projeto voc√™ organiza o ESQUEMA DE C√ďDIGOS (codebook), no esp√≠rito da grounded theory: prop√Ķe mesclar, agrupar, mover, renomear e promover c√≥digos.',
      aiInstr.trim() ? `Instru√ß√Ķes espec√≠ficas deste projeto:\n${aiInstr.trim()}` : '',
    ].filter(Boolean).join('\n\n');
    const memoText = injectedMemos.length
      ? injectedMemos.map(m=>`[${memoName(m)}]\n${m.content.trim()}`).join('\n\n')
      : '(nenhum memo injetado)';
    const desc = 'Abaixo est√° a lista dos c√≥digos do projeto que voc√™ pode reorganizar (com hierarquia e contagem de trechos) e, quando dispon√≠vel, uma amostra ilustrativa de trechos por c√≥digo. A amostra N√ÉO √© exaustiva ‚ÄĒ n√£o tire conclus√Ķes sobre a quantidade de trechos a partir dela. N√£o critique a cobertura nem a quantidade de codifica√ß√£o: o foco √© s√≥ a ORGANIZA√á√ÉO dos c√≥digos.'
      + (redactionIds.size ? ' OBSERVA√á√ÉO: c√≥digos de CENSURA (marca√ß√£o de conte√ļdo sens√≠vel) foram deixados de fora desta lista de prop√≥sito ‚ÄĒ eles n√£o s√£o categorias anal√≠ticas e N√ÉO devem ser mesclados, agrupados, movidos nem renomeados. Trabalhe apenas com os c√≥digos listados.' : '');
    return [
      { key:'role',  label:'Papel e princ√≠pios',       meta:'organizador de c√≥digos', text: roleText },
      { key:'memo',  label:'Memo(s) para a IA',         meta:`${injectedMemos.length} injetado(s)`, text: memoText },
      { key:'mem',   label:'Mem√≥ria do projeto',        meta: nMem ? `${nAtiv} de ${nMem} ativas` : 'nenhuma', text: memoryBlock(memory) },
      { key:'desc',  label:'Sobre o material',          meta:'o recorte', text: `Sobre o material que voc√™ recebeu:\n${desc}` },
      { key:'mat',   label:'Material',                  meta:`${organizable.length} c√≥digo(s)`, text: 'MATERIAL:\n' + buildMaterial() },
      { key:'rules', label:'Regras e formato de sa√≠da', meta:'‚ÄĒ', text: IA_COD_SYS_REGRAS },
    ];
  };
  const systemPrompt = promptSections().map(s=>s.text).join('\n\n');
  const buildProv = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const chars = (codeListBlock + excerptBlock).length;
    return {
      model: currentModelLabel(),
      material: `${organizable.length} c√≥digo(s)`,
      mem: nMem ? `${nAtiv} de ${nMem}` : 'nenhuma',
      censura: redactionIds.size ? `${redactionIds.size} c√≥digo(s) de censura fora` : '‚ÄĒ',
      chars, limit: IA_TOTAL_CHAR_LIMIT,
      tokens: Math.round((Math.min(chars, IA_TOTAL_CHAR_LIMIT) + 1200) / 4),
    };
  };

  // ---- VALIDACAO: traduz ids curtos -> reais e descarta operacoes invalidas ----
  // resolveSafe = resolveId mas BLOQUEIA ids de censura (defesa: mesmo que a IA alucine um id
  // de codigo is_redaction, a operacao que o referencia e descartada ‚ÄĒ censura nao se reorganiza).
  const resolveSafe = (ref)=>{ const id = resolveId(ref); return (id && redactionIds.has(id)) ? null : id; };
  const validateOps = (rawOps)=>{
    const out = []; let bad = 0;
    const seen = new Set(); // ids ja "consumidos" por um merge/group anterior nesta proposta
    for(const o of (Array.isArray(rawOps)?rawOps:[])){
      const op = String(o?.op||'').toLowerCase();
      const reason = String(o?.reason||'').trim();
      if(op==='merge'){
        const survivor = resolveSafe(o.survivor);
        const merged = (Array.isArray(o.merged)?o.merged:[]).map(resolveSafe).filter(id=>id && id!==survivor && !seen.has(id));
        if(survivor && merged.length){ merged.forEach(id=>seen.add(id)); out.push({ op, survivor, merged, reason }); }
        else bad++;
      } else if(op==='group'){
        const parent = o.parent!=null ? resolveSafe(o.parent) : null;
        const newParentName = String(o.newParentName||'').trim();
        const children = (Array.isArray(o.children)?o.children:[]).map(resolveSafe).filter(Boolean);
        if(children.length && (parent || newParentName)) out.push({ op, parent, newParentName, children, reason });
        else bad++;
      } else if(op==='reparent'){
        const id = resolveSafe(o.id), newParent = resolveSafe(o.newParent);
        if(id && newParent && id!==newParent) out.push({ op, id, newParent, reason });
        else bad++;
      } else if(op==='rename'){
        const id = resolveSafe(o.id), newName = String(o.newName||'').trim();
        if(id && newName) out.push({ op, id, newName, reason });
        else bad++;
      } else if(op==='promote'){
        const id = resolveSafe(o.id);
        if(id && codeById[id]?.parent_id) out.push({ op, id, reason });
        else bad++;
      } else bad++;
    }
    return { out, bad };
  };

  // ---- ENVIAR (1o turno ou follow-up) ----
  async function send(){
    if(busy) return;
    if(!organizable.length){ setErr('N√£o h√° c√≥digos para organizar (c√≥digos de censura ficam de fora).'); return; }
    const base = instruction.trim() || (history.length
      ? 'Continue refinando a proposta.'
      : 'Analise a lista de c√≥digos fornecida e proponha uma reorganiza√ß√£o (mesclar redund√Ęncias, agrupar em fam√≠lias coerentes, mover, renomear ou promover quando fizer sentido).');
    // reforco do formato no turno do usuario ‚ÄĒ modelos menores as vezes respondem em prosa
    const userTurn = base + ' Responda APENAS com o objeto JSON no formato especificado, sem texto antes ou depois.';
    setErr(''); setApplyMsg(''); setBusy(true);
    const nextHistory = [...history, { role:'user', content: userTurn, display: base }];
    setHistory(nextHistory); setInstruction('');
    const aIdx = nextHistory.length; // indice que o turno de IA ocupara
    try{
      const text = await askAIChat({ system: systemPrompt, messages: nextHistory, json: true });
      const parsed = parseAIJson(text);
      let entry;
      if(!parsed){
        // parse falhou de vez: guarda a resposta crua pra diagnosticar (truncada? texto em vez de JSON?)
        entry = { role:'assistant', content:text, ops:[], summary:'', dropped:0, salvaged:false,
          rawFail: text || '(resposta vazia)', memProps:[], applied:false, parseFailed:true };
      }else{
        const { out, bad } = validateOps(parsed.operations);
        entry = { role:'assistant', content:text, ops:out, summary:String(parsed.summary||''), dropped:bad,
          salvaged:!!parsed._salvaged, rawFail:'', memProps: validateMemProps(parsed.memory), applied:false };
        if(out.length){ setDecided(d=>{ const n={...d}; out.forEach((o,i)=>{ n[dkey(aIdx,i,o.op)] = true; }); return n; }); }
      }
      setHistory(h=>[...h, entry]);
    }catch(e){ setErr(String(e?.message||e)); }
    finally{ setBusy(false); }
  }

  // ---- APLICAR operacoes aprovadas (reusa a logica de SchemaCodesView, sobre um modelo de
  // trabalho local pra nao depender de re-render entre operacoes; reload/loadAll no fim) ----
  async function applyApproved(turnIdx){
    if(!isAdmin){ setErr('Apenas administradores podem alterar o esquema de c√≥digos.'); return; }
    const turn = history[turnIdx]; if(!turn) return;
    const ops = turn.ops || [];
    const approved = ops.filter((o,i)=>decided[dkey(turnIdx,i,o.op)]);
    if(!approved.length){ setErr('Nenhuma opera√ß√£o aprovada para aplicar.'); return; }
    setErr(''); setApplyMsg(''); setBusy(true);
    // modelo de trabalho: copia mutavel dos codigos (intermediarios refletem aqui; o store e a
    // fonte da verdade so depois do reload). _deleted marca codigos ja mesclados/excluidos.
    const work = codes.map(c=>({ ...c }));
    const byId = id => work.find(c=>c.id===id);
    const childrenOf = id => work.filter(c=>c.parent_id===id && !c._deleted);
    const isDescendantOf = (nodeId, ancId)=>{ let p=byId(nodeId)?.parent_id; while(p){ if(p===ancId) return true; p=byId(p)?.parent_id; } return false; };
    async function reparentSubtree(codeId, newParentId, newDepth, adoptColor){
      const node = byId(codeId); if(!node) return;
      const patch = { parent_id:newParentId, depth:newDepth };
      if(adoptColor){ patch.hue=adoptColor.hue; patch.hue_deg=adoptColor.hue_deg ?? null; }
      await store.updateCode(codeId, patch); Object.assign(node, patch);
      const stack=[{id:codeId,depth:newDepth}];
      while(stack.length){ const {id,depth}=stack.pop();
        for(const ch of childrenOf(id)){ const cd=depth+1; const cp={depth:cd};
          if(adoptColor){ cp.hue=adoptColor.hue; cp.hue_deg=adoptColor.hue_deg ?? null; }
          await store.updateCode(ch.id, cp); Object.assign(ch, cp); stack.push({id:ch.id,depth:cd}); }
      }
    }
    let applied=0, skipped=0;
    if(store.beginBatch) store.beginBatch();
    try{
      for(let i=0;i<ops.length;i++){
        const o = ops[i];
        if(!decided[dkey(turnIdx,i,o.op)]) continue;
        try{
          if(o.op==='merge'){
            const survivor = byId(o.survivor);
            const merged = o.merged.filter(id=>byId(id) && !byId(id)._deleted);
            if(!survivor || survivor._deleted || !merged.length){ skipped++; continue; }
            for(const mid of merged){
              for(const cod of (allCodings||[]).filter(c=>c.code_id===mid)){
                await store.addCoding(project.id, { document_id:cod.document_id, code_id:o.survivor,
                  span_start:cod.span_start, span_end:cod.span_end, quote:cod.quote, layer:cod.layer,
                  created_by:cod.created_by??null, author_name:cod.author_name });
                await store.deleteCoding(cod.id);
              }
            }
            for(const mid of merged){ for(const ch of childrenOf(mid)){ await reparentSubtree(ch.id, o.survivor, survivor.depth+1, { hue:survivor.hue, hue_deg:survivor.hue_deg }); } }
            for(const mid of merged){ await store.deleteCode(mid); const n=byId(mid); if(n) n._deleted=true; }
            applied++;
          } else if(o.op==='group'){
            let parent = o.parent ? byId(o.parent) : null;
            if(!parent){ const created = await onAdd(null, o.newParentName||'Novo agrupamento'); parent = { ...created }; work.push(parent); }
            if(parent._deleted){ skipped++; continue; }
            for(const id of o.children){ const ch = byId(id); if(!ch || ch._deleted || id===parent.id || isDescendantOf(parent.id, id)) continue; await reparentSubtree(id, parent.id, parent.depth+1, { hue:parent.hue, hue_deg:parent.hue_deg }); }
            applied++;
          } else if(o.op==='reparent'){
            const node = byId(o.id), parent = byId(o.newParent);
            if(!node || node._deleted || !parent || parent._deleted || o.id===parent.id || isDescendantOf(parent.id, o.id)){ skipped++; continue; }
            await reparentSubtree(o.id, parent.id, parent.depth+1, { hue:parent.hue, hue_deg:parent.hue_deg });
            applied++;
          } else if(o.op==='rename'){
            const node = byId(o.id); if(!node || node._deleted){ skipped++; continue; }
            await store.updateCode(o.id, { name:o.newName }); node.name=o.newName; applied++;
          } else if(o.op==='promote'){
            const node = byId(o.id); if(!node || node._deleted || !node.parent_id){ skipped++; continue; }
            await reparentSubtree(o.id, null, 0, null); applied++;
          }
        }catch(e){ skipped++; }
      }
    } finally { if(store.endBatch) await store.endBatch(); }
    await reload(); await loadAll();
    patchTurn(turnIdx, { applied:true }); // proposta vira registro somente-leitura
    setApplyMsg(`${applied} opera√ß√£o(√Ķes) aplicada(s)${skipped?`, ${skipped} ignorada(s)`:''}. Confira o esquema na aba "Esquema ‚Ėł C√≥digos".`);
    // registra no historico que foi aplicado, pra IA saber o estado num proximo turno
    setHistory(h=>[...h, { role:'user', content: `(Apliquei ${applied} opera√ß√£o(√Ķes) da sua proposta. O esquema mudou.)` }]);
    setBusy(false);
  }

  function reset(){ setHistory([]); setDecided({}); setErr(''); setApplyMsg(''); setInstruction(''); }

  // ---- descricao legivel de uma operacao (previa antes->depois) ----
  const describe = (o)=>{
    if(o.op==='merge') return html`Mesclar ${o.merged.map(labelOf).join(', ')} ‚Üí sobrevivente <b>${labelOf(o.survivor)}</b>`;
    if(o.op==='group') return html`Agrupar ${o.children.map(labelOf).join(', ')} sob ${o.parent ? html`<b>${labelOf(o.parent)}</b>` : html`a nova fam√≠lia <b>"${o.newParentName}"</b>`}`;
    if(o.op==='reparent') return html`Mover ${labelOf(o.id)} para dentro de <b>${labelOf(o.newParent)}</b>`;
    if(o.op==='rename') return html`Renomear ${labelOf(o.id)} ‚Üí <b>"${o.newName}"</b>`;
    if(o.op==='promote') return html`Promover ${labelOf(o.id)} a fam√≠lia de topo (Hierarquia 0)`;
    return o.op;
  };
  const OP_TAG = { merge:'Mesclar', group:'Agrupar', reparent:'Mover', rename:'Renomear', promote:'Promover' };

  const turnApprovedCount = (t, idx)=> (t.ops||[]).filter((o,i)=>decided[dkey(idx,i,o.op)]).length;

  // ---- render de um turno da IA: resumo em prosa + operacoes INLINE no proprio balao ----
  const assistantTurn = (t, idx)=>{
    const ops = t.ops || [];
    const interactive = idx===lastAssistantIdx && !t.applied && isAdmin; // so a ultima proposta e acionavel
    const appr = turnApprovedCount(t, idx);
    return html`<div key=${'a'+idx} class="card" style="margin-bottom:10px">
      <div class="field-label" style="margin-bottom:4px">IA</div>
      ${t.summary && html`<div dangerouslySetInnerHTML=${{__html: mdLite(t.summary)}} />`}
      ${t.salvaged && html`<div class="banner warn" style="margin-top:8px">A resposta veio truncada ou malformada; recuperei as opera√ß√Ķes completas abaixo (a √ļltima pode ter sido descartada). Para uma proposta completa, pe√ßa menos opera√ß√Ķes por vez.</div>`}
      ${t.parseFailed && html`<div class="banner err" style="margin-top:8px">A IA n√£o devolveu um JSON v√°lido. Se a resposta abaixo est√° cortada no fim, o esquema √© grande demais: pe√ßa menos opera√ß√Ķes por vez, ou desligue a amostra de trechos.</div>`}
      ${t.rawFail && html`<details style="margin-top:8px"><summary class="meta" style="cursor:pointer">Ver resposta crua (diagn√≥stico)</summary>
        <pre style="white-space:pre-wrap;font-family:var(--mono);font-size:11px;background:var(--teal-soft);padding:10px;border-radius:8px;margin-top:6px;max-height:280px;overflow:auto">${t.rawFail}</pre></details>`}
      ${ops.length>0 && html`<div style="margin-top:10px">
        <div class="row" style="align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
          <b>${ops.length} opera√ß√£o(√Ķes) ${t.applied?'aplicada(s)':'proposta(s)'}</b>
          ${!t.applied && html`<span class="meta">${appr} marcada(s) para aplicar</span>`}
          ${t.dropped>0 && html`<span class="meta">(${t.dropped} descartada(s) por id inv√°lido)</span>`}
          ${interactive && html`<div style="flex:1"></div>
            <button class="btn sm ghost" onClick=${()=>setDecided(d=>{ const n={...d}; ops.forEach((o,i)=>{ n[dkey(idx,i,o.op)]=true; }); return n; })}>Aprovar todas</button>
            <button class="btn sm ghost" onClick=${()=>setDecided(d=>{ const n={...d}; ops.forEach((o,i)=>{ n[dkey(idx,i,o.op)]=false; }); return n; })}>Recusar todas</button>`}
        </div>
        ${ops.map((o,i)=>{ const k=dkey(idx,i,o.op); const on=!!decided[k]; const struck = !t.applied && !on;
          return html`<div key=${k} class="card" style=${`margin-bottom:8px;opacity:${struck?0.55:1}`}>
          <div class="row" style="gap:10px;align-items:flex-start">
            <div style="flex:1;min-width:0">
              <div style=${`font-size:13px;${struck?'text-decoration:line-through;text-decoration-color:var(--ink-faint)':''}`}><span class="pill" style="margin-right:6px">${OP_TAG[o.op]||o.op}</span>${describe(o)}</div>
              ${o.reason && html`<div class="meta" style="margin-top:4px">${o.reason}</div>`}
            </div>
            ${interactive && html`<div class="row" style="gap:6px;flex-shrink:0">
              <button class=${`btn sm ${on?'primary':'ghost'}`} title="Incluir esta opera√ß√£o ao aplicar" onClick=${()=>setDecided(d=>({...d,[k]:true}))}>${on?'‚úď Aprovada':'Aprovar'}</button>
              <button class=${`btn sm ${on?'ghost':''}`} title="N√£o aplicar esta opera√ß√£o" onClick=${()=>setDecided(d=>({...d,[k]:false}))} style=${on?'':'background:var(--danger);color:#fff;border-color:var(--danger)'}>${on?'Recusar':'‚úē Recusada'}</button>
            </div>`}
          </div>
        </div>`; })}
        ${interactive && html`<button class="btn primary" disabled=${busy || !appr} onClick=${()=>applyApproved(idx)}>Aplicar ${appr} opera√ß√£o(√Ķes)</button>`}
        ${t.applied && html`<div class="meta" style="margin-top:4px">‚úď Opera√ß√Ķes aplicadas ao esquema.</div>`}
        ${!interactive && !t.applied && ops.length>0 && html`<div class="meta" style="margin-top:4px">${isAdmin?'Proposta anterior ‚ÄĒ envie um refinamento para gerar uma nova.':'Voc√™ n√£o √© administrador: pode ver, mas n√£o aplicar.'}</div>`}
      </div>`}
      ${!ops.length && !t.summary && !t.rawFail && html`<span class="meta">Sem opera√ß√Ķes nesta resposta.</span>`}
      ${onAddMemory && html`<${MemoryProposalReview} proposals=${t.memProps||[]} onCommit=${async (entries)=>{
        for(const e of entries) await onAddMemory({ content:e.content, reason:e.reason, source:'ai', ai_model:currentModelLabel(), mode_label:'Organiza√ß√£o de c√≥digos' });
        patchTurn(idx, { memProps:[] });
      }} />`}
    </div>`;
  };

  return html`<section class="pane" style="flex:1 1 100%">
    <div class="pane-head" style="gap:12px">
      <button class="btn accent" onClick=${()=>setShowPrompt(true)}
        title="Configurar e revisar exatamente o que ser√° enviado √† IA">

        ${!isAdmin && html`<div class="banner warn" style="margin-bottom:10px">Voc√™ n√£o √© administrador deste projeto: pode ver as sugest√Ķes, mas n√£o aplic√°-las.</div>`}
        <div class="card" style="margin-bottom:10px">
          <label class="row" style="gap:6px;font-size:12.5px;cursor:pointer;align-items:center">
            <input type="checkbox" checked=${withSamples} disabled=${busy} onChange=${e=>setWithSamples(e.target.checked)} />
            Incluir amostra de trechos por c√≥digo (a IA decide melhor, mas gasta mais tokens)
          </label>
          <p class="meta" style="margin:8px 0 0">${organizable.length} c√≥digo(s) para organizar${redactionIds.size?` ¬∑ ${redactionIds.size} de censura fora`:''}.</p>

    <!-- TELA DIREITA: chat da reorganiza√ß√£o -->

              <div class="field-label" style="margin-bottom:4px">${i===0?'Sua instru√ß√£o':'Voc√™'}</div>
              <div style="white-space:pre-wrap;font-size:13px">${t.display || t.content}</div>

        ${busy && html`<div class="card" style="margin-bottom:10px">
          <div class="field-label" style="margin-bottom:6px">IA</div>
          <div class="typing"><span></span><span></span><span></span></div>

        ${err && html`<div class="banner err" style="margin-top:10px">${err}</div>`}
        ${applyMsg && html`<div class="banner warn" style="margin-top:10px">${applyMsg}</div>`}
      </div>

      <div style="flex:none;border-top:1px solid var(--line);background:var(--surface);padding:10px 14px">
        <textarea class="txtin" rows="2" style="resize:vertical"
          placeholder=${history.length ? 'Refinar a proposta (ex.: "mantenha X separado", "agrupe de outro jeito")‚Ä¶ Enter envia, Shift+Enter quebra linha' : 'Instru√ß√£o opcional para a 1¬™ proposta (deixe em branco para a IA decidir)‚Ä¶ Enter envia, Shift+Enter quebra linha'}
          value=${instruction} disabled=${busy} onInput=${e=>setInstruction(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }}></textarea>
        <div class="row" style="gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap">
          <button class="btn primary" disabled=${busy || !organizable.length} onClick=${send}>${history.length ? 'Enviar refinamento' : 'Propor reorganiza√ß√£o'}</button>
          ${history.length>0 && html`<button class="btn sm ghost" disabled=${busy} onClick=${reset}>Limpar conversa</button>`}
          ${busy && html`<span class="meta">pensando‚Ä¶</span>`}
        </div>

    </div>
    ${showPrompt && (()=>{ const controls = html`<div>
        <div class="field" style="margin-bottom:12px">
          <div class="field-label">Instru√ß√Ķes pr√≥prias √† IA</div>
          <textarea class="txtin" rows="2" style="resize:vertical" placeholder="Guias que sempre entram no prompt (ex.: prefira poucas fam√≠lias amplas)‚Ä¶" value=${aiInstr} onInput=${e=>changeInstr(e.target.value)}></textarea>
          <div class="meta" style="margin-top:4px">Compartilhado com o Analisar com IA.</div>
        </div>
        <div class="field">
          <div class="field-label">Memos injetados</div>
          <label class="row" style="gap:7px;font-size:12.5px;cursor:pointer;align-items:center">
            <input type="checkbox" checked=${injectSel.has(ctxKey)} onChange=${()=>toggleInject(ctxKey)} />
            <span>Memo para a IA${ctxMemo?.content?.trim()?'':' ‚ÄĒ vazio (escreva na aba Memos)'}</span>
          </label>
          <details class="collap" style="margin-top:4px">
            <summary class="field-label" style="font-weight:400">outros memos (${injectableMemos.length})</summary>
            ${injectableMemos.length===0 && html`<div class="meta" style="padding:4px 0 0 18px">Nenhum outro memo com conte√ļdo.</div>`}
            ${injectableMemos.map(m=>html`<label key=${memoKey(m)} class="row" style="gap:7px;font-size:12px;cursor:pointer;align-items:center;padding:2px 0 2px 18px">
              <input type="checkbox" checked=${injectSel.has(memoKey(m))} onChange=${()=>toggleInject(memoKey(m))} />
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${memoName(m)}</span>

          </details>
        </div>

      return html`<${PromptInspector} title="Configurar prompt" hint="Ajuste os controles; a pr√©via mostra exatamente o que a IA recebe." controls=${controls}
        sections=${promptSections()} prov=${buildProv()} onClose=${()=>setShowPrompt(false)} />`; })()}
    </div>
  </section>`;
}

/* ============ CODIFICAR COM IA ‚ÄĒ wrapper de abas =========================================
   Tres assistentes que compartilham o mesmo motor (askAIChat json + parseAIJson + revisao por
   item + MemoryProposalReview), cada um num momento do trabalho:
   - Organizar Codigos: reorganiza o esquema de codigos (merge/group/reparent/rename/promote).
   - Sugerir Categorizacao: preenche o VALOR de categorias JA EXISTENTES por documento (doc_values).
   - Sugerir Codificacao: propoe trechos a codificar com codigos EXISTENTES (segundo codificador).
   O wrapper so mantem a aba ativa e o cabecalho com o seletor; cada sub-painel renderiza o
   conteudo interno (duas telas: config | chat), sem a <section> externa (essa fica aqui). */
function IACodificarPanel(props){
  const [tab, setTab] = useState('codificar');
  const TABS = [
    { id:'codificar',   label:'Sugerir Codifica√ß√£o' },
    { id:'categorizar', label:'Sugerir Categoriza√ß√£o' },
    { id:'organizar',   label:'Organizar C√≥digos' },
  ];
  // Cada sub-painel renderiza a propria barra do topo [‚öô configurar prompt][seg de abas],
  // espelhando o IAAnalisarPanel ‚ÄĒ por isso o wrapper so segura o estado das abas e repassa
  // tab/setTab/TABS; o botao ‚öô vive dentro de cada sub-painel (junto do showPrompt local).
  if(tab==='organizar')   return html`<${IAOrganizarPanel} ...${props} tab=${tab} setTab=${setTab} TABS=${TABS} />`;
  if(tab==='categorizar') return html`<${IACategorizarPanel} ...${props} tab=${tab} setTab=${setTab} TABS=${TABS} />`;
  return html`<${IACodificacaoPanel} ...${props} tab=${tab} setTab=${setTab} TABS=${TABS} />`;
}

const IA_CAT_SYS_REGRAS = `Sua tarefa √© sugerir o VALOR de cada categoria para cada documento, com base no conte√ļdo dele, e devolver SOMENTE um objeto JSON (sem texto fora dele), no formato:
{
  "values": [
    { "doc": "#d1", "category": "#t2", "value": "valor sugerido", "reason": "..." }
  ],
  "summary": "uma frase resumindo a l√≥gica geral",
  "memory": [ { "content": "fato/decis√£o dur√°vel sobre o projeto, em 1 frase", "reason": "por que vale lembrar" } ]
}
Regras: use SOMENTE os ids de documento (#d...) e de categoria (#t...) que aparecem no material ‚ÄĒ n√£o invente ids nem categorias novas. Para categorias de op√ß√£o fechada (Texto Fechado / M√ļltipla Escolha / Caixa de Sele√ß√£o), o "value" DEVE ser EXATAMENTE uma das op√ß√Ķes listadas para aquela categoria (em Caixa de Sele√ß√£o, junte v√°rias com " | "). Para Data, use DD/MM/AAAA. Para Texto Aberto, seja curto e objetivo. S√≥ inclua um par documento√ócategoria quando o texto der base real para o valor ‚ÄĒ se o documento n√£o informa, use a op√ß√£o de "n√£o informado" quando ela existir, sen√£o OMITA aquele par (nunca chute). Explique cada sugest√£o no "reason" (em portugu√™s, UMA frase, sem quebras de linha dentro de strings JSON).
IMPORTANTE ‚ÄĒ devolva s√≥ DIFEREN√áAS: cada documento mostra os VALORES J√Ā PREENCHIDOS. Inclua um par documento√ócategoria APENAS quando sua sugest√£o for DIFERENTE do valor j√° preenchido, ou quando ele estiver "(vazio)". Se voc√™ CONCORDA com o valor j√° preenchido, N√ÉO o inclua na resposta ‚ÄĒ devolver menos √© melhor (e evita cortar a resposta). Se concordar com tudo, devolva "values": []. Proponha no m√°ximo 40 itens por resposta; se faltar, diga no "summary".
O campo "memory" √© OPCIONAL (s√≥ fatos/decis√Ķes DUR√ĀVEIS; no m√°ximo 8). Devolva apenas o JSON, sem texto antes nem depois, sem coment√°rios.`;

/* ============ SUGERIR CATEGORIZACAO ‚ÄĒ preenche o VALOR de categorias JA EXISTENTES por documento.
   NAO cria categorias (decisao do autor): le o texto dos documentos + o esquema de categorias e
   propoe doc_values, revisados item a item e aplicados via setDocValue/setFinalValue (mesmo caminho
   manual, espelhando projectMode). Censura mascarada no material. Espelha o IAOrganizarPanel. */
function IACategorizarPanel({ project, docs, cats, codePath, allValues, store, isAdmin, projectMode, user, reload, loadAll, allCodings, codes, memos, onSetMemo, memory, onAddMemory, onToggleMemory, onDeleteMemory, tab, setTab, TABS }){
  const [history, setHistory] = useState([]);
  const [decided, setDecided] = useState({});
  const [instruction, setInstruction] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [applyMsg, setApplyMsg] = useState('');
  const [selDocs, setSelDocs] = useState(()=>docs.map(d=>d.id));
  const [selCats, setSelCats] = useState(()=>cats.map(c=>c.id));

  // --- CONFIG DO PROMPT (mesmo padr√£o do Analisar, MENOS postura/biblioteca): ai_instructions
  // (COMPARTILHADO com o Analisar) + ai_context (Memo para a IA) + memos injetados. ---
  const [showPrompt, setShowPrompt] = useState(false);
  const aiInstrMemo = (memos||[]).find(m=>m.scope==='ai_instructions' && m.target_id===project?.id);
  const ctxMemo     = (memos||[]).find(m=>m.scope==='ai_context' && m.target_id===project?.id);
  const [aiInstr, setAiInstr] = useState('');
  const instrTouched = useRef(false);
  const memoKey = (m)=> `${m.scope}:${m.target_id}`;
  const ctxKey = `ai_context:${project?.id}`;
  const [injectSel, setInjectSel] = useState(()=> new Set([ctxKey]));
  useEffect(()=>{ if(!instrTouched.current) setAiInstr(aiInstrMemo?.content || ''); }, [aiInstrMemo?.content]);
  useEffect(()=>{ instrTouched.current=false; setInjectSel(new Set([ctxKey])); }, [project?.id]); // eslint-disable-line
  const instrDebRef = useRef(null);
  const changeInstr = (val)=>{ instrTouched.current=true; setAiInstr(val); clearTimeout(instrDebRef.current); instrDebRef.current = setTimeout(()=>{ onSetMemo && onSetMemo('ai_instructions', project.id, val); }, 700); };
  const toggleInject = (key)=> setInjectSel(s=>{ const n=new Set(s); n.has(key)?n.delete(key):n.add(key); return n; });
  const memoName = (m)=> m.scope==='ai_context' ? 'Memo para a IA'
    : m.scope==='project' ? 'Memo do projeto'
    : m.scope==='document' ? `Documento: ${(docs.find(d=>d.id===m.target_id)||{}).name||'‚ÄĒ'}`
    : m.scope==='code' ? `C√≥digo: ${(codePath?codePath(m.target_id):[]).join(' ‚Ėł ')}`
    : m.scope==='coding' ? 'Nota de trecho' : m.scope;
  const injectableMemos = (memos||[]).filter(m=> ['project','document','code','coding'].includes(m.scope) && m.content && m.content.trim());
  const injectedMemos = (memos||[]).filter(m=> injectSel.has(memoKey(m)) && m.content && m.content.trim());

  const patchTurn = (idx,patch)=> setHistory(h=>h.map((t,i)=>i===idx?{...t,...patch}:t));
  const lastAssistantIdx = (()=>{ for(let i=history.length-1;i>=0;i--){ if(history[i].role==='assistant') return i; } return -1; })();
  const dkey = (ti,i)=> ti+':'+i;
  const kindLabel = (k)=> (CAT_KINDS.find(x=>x.id===k)||{}).label || k;

  // ids curtos estaveis: documentos #d1.. e categorias #t1..
  const { d2i } = useMemo(()=>{ const a={}; docs.forEach((d,i)=>{a['d'+(i+1)]=d.id;}); return {d2i:a}; }, [docs]);
  const { t2i } = useMemo(()=>{ const a={}; cats.forEach((c,i)=>{a['t'+(i+1)]=c.id;}); return {t2i:a}; }, [cats]);
  const i2d = useMemo(()=>Object.fromEntries(Object.entries(d2i).map(([k,v])=>[v,k])), [d2i]);
  const i2t = useMemo(()=>Object.fromEntries(Object.entries(t2i).map(([k,v])=>[v,k])), [t2i]);
  const dShort = id=>i2d[id]||'?', tShort = id=>i2t[id]||'?';
  const catById = useMemo(()=>Object.fromEntries(cats.map(c=>[c.id,c])), [cats]);
  const docById = useMemo(()=>Object.fromEntries(docs.map(d=>[d.id,d])), [docs]);
  const resolveDoc = ref=>{ const k=String(ref??'').replace(/^#/,'').trim(); return d2i[k] || (docById[k]?k:null); };
  const resolveCat = ref=>{ const k=String(ref??'').replace(/^#/,'').trim(); return t2i[k] || (catById[k]?k:null); };

  const selCatObjs = cats.filter(c=>selCats.includes(c.id));
  const selDocObjs = docs.filter(d=>selDocs.includes(d.id));
  const redactionIds = useMemo(()=> new Set((codes||[]).filter(c=>c.is_redaction).map(c=>c.id)), [codes]);
  const toggle = (arr,set,id)=> set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);

  // valor JA APLICADO para (documento, categoria) ‚ÄĒ robusto a como ele foi parar l√° (import,
  // reconcilia√ß√£o, resposta do pr√≥prio usu√°rio): prefere o gabarito (final), sen√£o a resposta do
  // PROPRIO usu√°rio, sen√£o QUALQUER valor existente (ex.: importado com set_by de outro/null). √Č o
  // que vai no prompt como "j√° preenchido" e na revis√£o como "atual" ‚ÄĒ a IA s√≥ mexe onde difere.
  const curVal = (docId,catId)=>{ const vs=(allValues||[]).filter(v=>v.document_id===docId && v.category_id===catId);
    const v = vs.find(x=>x.layer==='final') || vs.find(x=>x.layer!=='final' && x.set_by===user?.id) || vs[0];
    return v?.value ?? null; };
  const sameVal = (a,b)=> String(a??'').trim().toLowerCase() === String(b??'').trim().toLowerCase();

  // ---- MATERIAL ----
  const catBlock = useMemo(()=>{
    const lines = selCatObjs.map(c=>{
      let spec;
      if(CAT_HAS_OPTIONS(c.kind)) spec = 'uma das op√ß√Ķes: ' + (c.options||[]).map(o=>`"${o}"`).join(', ') + (c.kind==='checkbox'?' (pode marcar V√ĀRIAS, separadas por " | ")':'');
      else if(c.kind==='date') spec = 'uma data DD/MM/AAAA';
      else spec = 'texto livre curto';
      return `#${tShort(c.id)} | "${c.name}"${c.description?` ‚ÄĒ ${c.description}`:''} | ${kindLabel(c.kind)} | valor esperado: ${spec}`;
    });
    return 'CATEGORIAS A PREENCHER (id | nome | tipo | valor esperado):\n' + (lines.join('\n') || '(nenhuma categoria selecionada)');
  }, [selCatObjs, i2t]);

  const docBlock = useMemo(()=>{
    let total = 0; const parts = [];
    for(const d of selDocObjs){
      const masked = maskRedactedContent(d.content||'', (allCodings||[]).filter(c=>c.document_id===d.id), redactionIds);
      const filled = selCatObjs.map(c=>{ const v=curVal(d.id,c.id); return `  - #${tShort(c.id)} "${c.name}": ${v!=null && v!==''?`"${v}"`:'(vazio)'}`; }).join('\n');
      const chunk = `--- #${dShort(d.id)} "${d.name}" ---\nVALORES J√Ā PREENCHIDOS (n√£o devolva se concordar):\n${filled}\nTEXTO:\n${masked.slice(0, IA_DOC_CHAR_LIMIT)}`;
      if(total + chunk.length > IA_TOTAL_CHAR_LIMIT){ parts.push('[...documentos restantes omitidos ‚ÄĒ limite de tamanho; selecione menos documentos...]'); break; }
      parts.push(chunk); total += chunk.length;
    }
    return 'DOCUMENTOS:\n' + (parts.join('\n\n') || '(nenhum documento selecionado)');
  }, [selDocObjs, selCatObjs, allCodings, redactionIds, i2d, i2t, allValues, user, projectMode]);

  // SECOES NOMEADAS do prompt ‚ÄĒ FONTE UNICA (system enviado + PromptInspector). Papel =
  // constituicao + papel deste painel + instrucoes; Memo = memos injetados (nao mais o memo
  // de projeto auto-injetado); regras = IA_CAT_SYS_REGRAS.
  const promptSections = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const roleText = [
      IA_CONSTITUICAO,
      'Neste projeto voc√™ ATRIBUI valores de categorias (atributos) a documentos. Voc√™ N√ÉO cria categorias novas ‚ÄĒ usa apenas as categorias e as op√ß√Ķes fornecidas.',
      aiInstr.trim() ? `Instru√ß√Ķes espec√≠ficas deste projeto:\n${aiInstr.trim()}` : '',
    ].filter(Boolean).join('\n\n');
    const memoText = injectedMemos.length
      ? injectedMemos.map(m=>`[${memoName(m)}]\n${m.content.trim()}`).join('\n\n')
      : '(nenhum memo injetado)';
    const desc = 'Abaixo est√£o as categorias a preencher (com tipo e valores aceitos) e, para cada documento selecionado, os VALORES J√Ā PREENCHIDOS seguidos do TEXTO. Sua fun√ß√£o √© s√≥ corrigir/completar ‚ÄĒ devolva apenas onde discordar ou onde estiver vazio.' + (redactionIds.size?' Trechos sens√≠veis podem aparecer como "[trecho censurado]" ‚ÄĒ √© omiss√£o deliberada do pesquisador, n√£o lacuna nem erro.':'');
    return [
      { key:'role',  label:'Papel e princ√≠pios',       meta:'preenchedor de atributos', text: roleText },
      { key:'memo',  label:'Memo(s) para a IA',         meta:`${injectedMemos.length} injetado(s)`, text: memoText },
      { key:'mem',   label:'Mem√≥ria do projeto',        meta: nMem ? `${nAtiv} de ${nMem} ativas` : 'nenhuma', text: memoryBlock(memory) },
      { key:'desc',  label:'Sobre o material',          meta:'o recorte', text: `Sobre o material que voc√™ recebeu:\n${desc}` },
      { key:'mat',   label:'Material',                  meta:`${selCatObjs.length} categoria(s) ¬∑ ${selDocObjs.length} doc(s)`, text: 'MATERIAL:\n' + catBlock + '\n\n' + docBlock },
      { key:'rules', label:'Regras e formato de sa√≠da', meta:'‚ÄĒ', text: IA_CAT_SYS_REGRAS },
    ];
  };
  const systemPrompt = promptSections().map(s=>s.text).join('\n\n');
  const buildProv = ()=>{
    const nMem = (memory||[]).length, nAtiv = (memory||[]).filter(m=>m&&m.active).length;
    const chars = catBlock.length + docBlock.length;
    return {
      model: currentModelLabel(),
      material: `${selCatObjs.length} categoria(s) ¬∑ ${selDocObjs.length} doc(s)`,
      mem: nMem ? `${nAtiv} de ${nMem}` : 'nenhuma',
      censura: redactionIds.size ? `${redactionIds.size} c√≥digo(s) de censura mascarado(s)` : '‚ÄĒ',
      chars, limit: IA_TOTAL_CHAR_LIMIT,
      tokens: Math.round((Math.min(chars, IA_TOTAL_CHAR_LIMIT) + 1200) / 4),
    };
  };

  // ---- VALIDACAO: resolve ids e valida o valor contra o tipo/opcoes da categoria ----
  const validateValues = (raw)=>{
    const out=[]; let bad=0; const seen=new Set();
    for(const v of (Array.isArray(raw)?raw:[])){
      const docId=resolveDoc(v?.doc), catId=resolveCat(v?.category); const cat=catId?catById[catId]:null;
      if(!docId || !cat){ bad++; continue; }
      const key=docId+'|'+catId; if(seen.has(key)){ bad++; continue; }
      let value=String(v?.value??'').trim(); const reason=String(v?.reason||'').trim();
      if(!value){ bad++; continue; }
      if(CAT_HAS_OPTIONS(cat.kind)){
        const opts=(cat.options||[]); const match=(o)=> opts.find(x=>x.toLowerCase()===String(o).trim().toLowerCase());
        if(cat.kind==='checkbox'){ const picked=value.split(/\s*[|;]\s*/).map(match).filter(Boolean); if(!picked.length){ bad++; continue; } value=[...new Set(picked)].join(CAT_MULTI_SEP); }
        else { const m=match(value); if(!m){ bad++; continue; } value=m; }
      }
      if(sameVal(value, curVal(docId,catId))){ continue; } // concorda com o j√° preenchido: ignora (n√£o √© mudan√ßa)
      seen.add(key); out.push({ docId, catId, value, reason });
    }
    return { out, bad };
  };

  async function send(){
    if(busy) return;
    if(!selDocObjs.length || !selCatObjs.length){ setErr('Selecione ao menos um documento e uma categoria.'); return; }
    const base = instruction.trim() || (history.length ? 'Continue refinando as sugest√Ķes.' : 'Analise os documentos e sugira o valor de cada categoria para cada documento, quando o texto der base.');
    const userTurn = base + ' Responda APENAS com o objeto JSON no formato especificado, sem texto antes ou depois.';
    setErr(''); setApplyMsg(''); setBusy(true);
    const nextHistory = [...history, { role:'user', content:userTurn, display:base }];
    setHistory(nextHistory); setInstruction('');
    const aIdx = nextHistory.length;
    try{
      const text = await askAIChat({ system: systemPrompt, messages: nextHistory, json: true });
      const parsed = parseAIJson(text); let entry;
      if(!parsed){ entry = { role:'assistant', content:text, values:[], summary:'', dropped:0, memProps:[], applied:false, rawFail:text||'(resposta vazia)', parseFailed:true }; }
      else {
        const { out, bad } = validateValues(parsed.values);
        entry = { role:'assistant', content:text, values:out, summary:String(parsed.summary||''), dropped:bad, memProps:validateMemProps(parsed.memory), applied:false, rawFail:'', salvaged:!!parsed._salvaged };
        if(out.length){ setDecided(d=>{ const n={...d}; out.forEach((_,i)=>{ n[dkey(aIdx,i)]=true; }); return n; }); }
      }
      setHistory(h=>[...h, entry]);
    }catch(e){ setErr(String(e?.message||e)); }
    finally{ setBusy(false); }
  }

  async function applyApproved(turnIdx){
    const turn = history[turnIdx]; if(!turn) return;

    const approved = (turn.values||[]).filter((_,i)=>decided[dkey(turnIdx,i)]);
    if(!approved.length){ setErr('Nenhuma sugest√£o aprovada para aplicar.'); return; }
    setErr(''); setApplyMsg(''); setBusy(true);
    let applied=0, skipped=0;
    if(store.beginBatch) store.beginBatch();
    try{
      for(const v of approved){ try{ await setVal.call(store, project.id, v.docId, v.catId, v.value); applied++; }catch(e){ skipped++; } }
    } finally { if(store.endBatch) await store.endBatch(); }
    await reload(); await loadAll();
    patchTurn(turnIdx, { applied:true });
    setApplyMsg(`${applied} valor(es) aplicado(s)${skipped?`, ${skipped} falhou(aram)`:''}. Confira na aba Codifica√ß√£o (Categorias do documento) ou no Esquema.`);
    setHistory(h=>[...h, { role:'user', content:`(Apliquei ${applied} valor(es) de categoria da sua sugest√£o.)` }]);

  function reset(){ setHistory([]); setDecided({}); setErr(''); setApplyMsg(''); setInstruction(''); }

  const turnApprovedCount = (t,idx)=> (t.values||[]).filter((_,i)=>decided[dkey(idx,i)]).length;

  const valueLine = (v)=>{ const cat=catById[v.catId]; const doc=docById[v.docId]; const cur=curVal(v.docId,v.catId); const has=cur!=null && cur!=='';

  const assistantTurn = (t, idx)=>{

      ${t.salvaged && html`<div class="banner warn" style="margin-top:8px">A resposta veio truncada (limite de tokens); recuperei os valores completos abaixo (o √ļltimo pode ter sido descartado). Aplique estes e pe√ßa a continua√ß√£o, ou selecione menos documentos/categorias.</div>`}
      ${t.rawFail && html`<details style="margin-top:8px"><summary class="meta" style="cursor:pointer">Ver resposta crua (diagn√≥stico)</summary>
        <pre style="white-space:pre-wrap;font-family:var(--mono);font-size:11px;background:var(--teal-soft);padding:10px;border-radius:8px;margin-top:6px;max-height:280px;overflow:auto">${t.rawFail}</pre></details>`}

          ${interactive && html`<div style="flex:1"></div>

        </div>
        ${vals.map((v,i)=>{ const k=dkey(idx,i); const on=!!decided[k]; const struck=!t.applied && !on;
          return html`<div key=${k} class="card" style=${`margin-bottom:8px;opacity:${struck?0.55:1}`}>
          <div class="row" style="gap:10px;align-items:flex-start">
            <div style="flex:1;min-width:0">
              <div style=${`font-size:13px;${struck?'text-decoration:line-through;text-decoration-color:var(--ink-faint)':''}`}>${valueLine(v)}</div>
