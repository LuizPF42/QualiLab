    async myRole(){ return 'admin'; },
    async listMembers(){ return [{ user_id:'local-user', display_name:name, role:'admin' }]; },
    async setMemberRole(){ return P(); },
    async removeMember(){ return P(); },
    async renameProject(){ return P(); },
    // idem FileStore: sem memos/ia_* aqui, db.memos ficava undefined at√© recarregar a p√°gina
    async deleteProject(){ db={ documents:[], categories:[], doc_values:[], codes:[], codings:[], memos:[], ia_results:[], ia_memory:[] }; save(); return P(); },
    async setProjectMode(){ return P(); },
    listDocuments(){ return P(db.documents.slice()); },
    addDocument(pid,{id,name:dn,content}){ const d={id:id||uid(),name:dn,content,created_at:new Date().toISOString()}; db.documents.push(d); save(); return P(d); },
    renameDocument(id,dn){ const d=db.documents.find(x=>x.id===id); if(d) d.name=dn; save(); return P(); },
    setDocumentContent(id,content){ const d=db.documents.find(x=>x.id===id); if(d) d.content=content; save(); return P(); },
    updateCoding(id,patch){ const c=db.codings.find(x=>x.id===id); if(c) Object.assign(c,patch); save(); return P(); },
    deleteDocument(id){ const cids=new Set(db.codings.filter(c=>c.document_id===id).map(c=>c.id)); db.documents=db.documents.filter(d=>d.id!==id); db.doc_values=db.doc_values.filter(v=>v.document_id!==id); db.codings=db.codings.filter(c=>c.document_id!==id); db.memos=db.memos.filter(m=>!(m.scope==='document'&&m.target_id===id) && !(m.scope==='coding'&&cids.has(m.target_id))); save(); return P(); },
    // "limpar projeto" apaga o material, N√ÉO o di√°rio de insights nem as conversas salvas
    // de IA (a vers√£o antiga recriava o db sem essas chaves e as destru√≠a junto)
    clearProject(){ const keepMemos=(db.memos||[]).filter(m=>m.scope==='project'); db={ documents:[], categories:[], doc_values:[], codes:[], codings:[], memos:keepMemos, ia_results:db.ia_results||[], ia_memory:db.ia_memory||[] }; save(); return P(); },
    listCategories(){ return P(db.categories.slice().sort((a,b)=>a.position-b.position)); },
    addCategory(pid,cat){ const c={id:uid(),position:db.categories.length,...cat}; db.categories.push(c); save(); return P(c); },
    updateCategory(id,patch){ db.categories=db.categories.map(c=>c.id===id?{...c,...patch}:c); save(); return P(); },
    deleteCategory(id){ db.categories=db.categories.filter(c=>c.id!==id); db.doc_values=db.doc_values.filter(v=>v.category_id!==id); save(); return P(); },
    getDocValues(docId){ return P(db.doc_values.filter(v=>v.document_id===docId)); },
    setDocValue(pid,docId,catId,value){ db.doc_values=db.doc_values.filter(v=>!(v.document_id===docId&&v.category_id===catId&&v.set_by==='local-user'&&(v.layer||'individual')==='individual')); if(value!=='') db.doc_values.push({id:uid(),document_id:docId,category_id:catId,value,set_by:'local-user',author_name:name,layer:'individual'}); save(); return P(); },
    setFinalValue(pid,docId,catId,value){ db.doc_values=db.doc_values.filter(v=>!(v.document_id===docId&&v.category_id===catId&&v.layer==='final')); if(value!=='') db.doc_values.push({id:uid(),document_id:docId,category_id:catId,value,set_by:'local-user',author_name:name,layer:'final'}); save(); return P(); },
    // grava uma resposta de categoria com autor arbitrario (sem dono-do-navegador) ‚ÄĒ usado
    // pelo import de .qualilab pra preservar cada pesquisador de origem, igual ao addCoding
    // ja faz com author_name/created_by. Nao deduplica: cada chamada e uma linha nova.
    addDocValue(pid,v){ const row={id:uid(),document_id:v.document_id,category_id:v.category_id,value:v.value,set_by:v.set_by??null,author_name:v.author_name||'anonimo',layer:v.layer||'individual'}; db.doc_values.push(row); save(); return P(row); },
    listCodes(){ return P(db.codes.slice().sort((a,b)=>a.depth-b.depth||a.position-b.position)); },
    addCode(pid,code){ const c={id:uid(),position:db.codes.length,...code}; db.codes.push(c); save(); return P(c); },
    updateCode(id,patch){ db.codes=db.codes.map(c=>c.id===id?{...c,...patch}:c); save(); return P(); },
    deleteCode(id){ const kill=new Set([id]); let added=true; while(added){added=false; db.codes.forEach(c=>{if(c.parent_id&&kill.has(c.parent_id)&&!kill.has(c.id)){kill.add(c.id);added=true;}});} const cids=new Set(db.codings.filter(c=>kill.has(c.code_id)).map(c=>c.id)); db.codes=db.codes.filter(c=>!kill.has(c.id)); db.codings=db.codings.filter(c=>!kill.has(c.code_id)); db.memos=db.memos.filter(m=>!(m.scope==='code'&&kill.has(m.target_id)) && !(m.scope==='coding'&&cids.has(m.target_id))); save(); return P(); },
    listCodings(pid,docId){ return P(db.codings.filter(c=>c.document_id===docId)); },
    addCoding(pid,co){ const c={id:uid(),author_name:name,created_at:new Date().toISOString(),...co}; db.codings.push(c); save(); return P(c); },
    deleteCoding(id){ db.codings=db.codings.filter(c=>c.id!==id); db.memos=db.memos.filter(m=>!(m.scope==='coding'&&m.target_id===id)); save(); return P(); },
  };
}

/* ============ STORE SUPABASE (coletivo) ============ */
function SupabaseStore(sb){
  let user=null, name='anonimo';
  const must = (r)=>{ if(r.error) throw r.error; return r.data; };
  const nameOf = (u, fallback)=> (u && u.user_metadata && u.user_metadata.name) || fallback || name;

  /* NAO ha fila de escrita offline: a versao anterior tinha um "withQueue" que nunca era
     chamado pelos metodos (e cujo replay era impossivel ‚ÄĒ so gravava {key,ts}, sem a
     operacao). Removido em jul/2026 pra nao vender resiliencia que nao existe: escrita
     que falha por rede LANCA o erro, o App mostra banner e o usuario re-tenta. Se um dia
     for implementar de verdade: enfileirar {op,args} serializaveis no IDB, envolver os
     metodos de escrita e reaplicar FIFO num flush() no evento 'online'. */
  return {
    mode:'cloud',
    // retoma sess√£o de e-mail/senha; sess√Ķes an√īnimas s√£o ignoradas (usu√°rio volta √† tela de auth)
    async init(display){
      const { data:{ session } } = await sb.auth.getSession();
      if(session && !session.user.is_anonymous){
        user = session.user; name = nameOf(user, display);
        return { id:user.id, name, email:user.email||null, anon:false };
      }
      if(display) name = display;
      return null; // sem sess√£o ou sess√£o an√īnima ‚Üí tela de login
    },
    async signIn(email, password){
      const r = await sb.auth.signInWithPassword({ email:email.trim(), password }); if(r.error) throw r.error;
      user = r.data.user; name = nameOf(user); return { id:user.id, name, email:user.email||null, anon:false };
    },
    async signUp(email, password, display){
      const r = await sb.auth.signUp({ email:email.trim(), password, options:{ data:{ name: display||'pesquisador' } } });
      if(r.error) throw r.error;
      // se a confirmacao de e-mail estiver ativa, ainda nao ha sessao
      if(r.data.session){ user = r.data.session.user; name = nameOf(user, display); return { confirmed:true, user:{ id:user.id, name, email:user.email||null, anon:false } }; }
      return { confirmed:false };
    },
    async signInAnon(display){
      let { data:{ session } } = await sb.auth.getSession();
      if(!session){ const r = await sb.auth.signInAnonymously(); if(r.error) throw r.error; session = r.data.session; }
      user = session.user; name = display || name;
      return { id:user.id, name, email:null, anon:true };
    },
    async signOut(){ try{ await sb.auth.signOut(); }catch(e){} user=null; },
    currentUser(){ return user ? { id:user.id, name, email:user.email||null, anon:!!user.is_anonymous } : null; },
    async changePassword(newPw){ const r = await sb.auth.updateUser({ password:newPw }); if(r.error) throw r.error; },
    async changeDisplayName(newName){ name = newName || name; const r = await sb.auth.updateUser({ data:{ name } }); if(r.error) throw r.error; if(r.data&&r.data.user) user = r.data.user; },
    // p_mode PRECISA ir na RPC: sem ele o banco grava 'collective' e o projeto "individual"
    // virava coletivo ao reabrir (bug real ‚ÄĒ o retorno local mentia o mode)
    async createProject(pn, display, pmode){ name=display||name; const d=must(await sb.rpc('create_project',{p_name:pn,p_display:name,p_mode:pmode||'collective'})); return { id:d.id, name:d.name, code:d.code, created_by:d.created_by, mode:d.mode||pmode||'collective' }; },
    // codigo inexistente vem como NULL (a RPC nao usa raise pra nao desfazer o registro
    // do throttle de tentativas ‚ÄĒ ver join_project no schema.sql)
    async joinProject(code, display){ name=display||name; const d=must(await sb.rpc('join_project',{p_code:code,p_display:name})); if(!d || !d.id) throw new Error('Projeto n√£o encontrado para este c√≥digo'); return { id:d.id, name:d.name, code:d.code, created_by:d.created_by, mode:d.mode||'collective' }; },
    // lista os projetos do usuario: tenta a RPC dedicada (com contagens), senao a tabela projects;
    // null = sem suporte no servidor (o app cai na lista local por conta)
    async listMyProjects(){
      try{ const r = await sb.rpc('my_projects'); if(!r.error && Array.isArray(r.data)) return r.data; }catch(e){}
      try{ const r = await sb.from('projects').select('id,name,code,created_at'); if(!r.error && Array.isArray(r.data)) return r.data; }catch(e){}
      return null;
    },
    // papel do usuario atual no projeto: 'admin' | 'member'
    async myRole(pid){ try{ const r = await sb.from('members').select('role').eq('project_id',pid).eq('user_id',user.id).maybeSingle(); return (r.data&&r.data.role)||'member'; }catch(e){ return 'member'; } },
    async listMembers(pid){ try{ return must(await sb.from('members').select('user_id,display_name,role,joined_at').eq('project_id',pid).order('joined_at')); }catch(e){ return []; } },
    async setMemberRole(pid, userId, role){ must(await sb.rpc('set_member_role',{ p_project:pid, p_user:userId, p_role:role })); },
    async removeMember(pid, userId){ must(await sb.rpc('remove_member',{ p_project:pid, p_user:userId })); },
    async renameProject(pid, pn){ must(await sb.rpc('rename_project',{ p_project:pid, p_name:pn })); },
    async deleteProject(pid){ must(await sb.rpc('delete_project',{ p_project:pid })); },
    async setProjectMode(pid, pmode, authorName){ must(await sb.rpc('set_project_mode',{ p_project:pid, p_mode:pmode, p_author:authorName||'pesquisador' })); },
    async listDocuments(pid){ return must(await sb.from('documents').select('*').eq('project_id',pid).order('created_at')); },
    async addDocument(pid,{id,name:dn,content}){ const row={project_id:pid,name:dn,content,created_by:user.id}; if(id) row.id=id; return must(await sb.from('documents').insert(row).select().single()); },
    async renameDocument(id,dn){ must(await sb.from('documents').update({name:dn}).eq('id',id)); },
    async setDocumentContent(id,content){ must(await sb.from('documents').update({content}).eq('id',id)); },
    async updateCoding(id,patch){ must(await sb.from('codings').update(patch).eq('id',id)); },
    async deleteDocument(id){ let cids=[]; try{ cids=(await sb.from('codings').select('id').eq('document_id',id)).data?.map(r=>r.id)||[]; }catch(e){} must(await sb.from('documents').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','document').eq('target_id',id); if(cids.length) await sb.from('memos').delete().eq('scope','coding').in('target_id',cids); },
    async clearProject(pid){
      await sb.from('codings').delete().eq('project_id',pid);
      await sb.from('doc_values').delete().eq('project_id',pid);
      await sb.from('documents').delete().eq('project_id',pid);
      await sb.from('codes').delete().eq('project_id',pid);
      await sb.from('categories').delete().eq('project_id',pid);
      // mantem o memo do projeto; remove memos de documento/codigo/trecho (orfaos apos a
      // limpeza ‚ÄĒ 'coding' faltava e as notas analiticas ficavam orfas). O trigger
      // memos_gc no banco tambem cobre isso; aqui e o cinto pra banco ainda nao migrado.
      await sb.from('memos').delete().eq('project_id',pid).in('scope',['document','code','coding']);
    },
    async listCategories(pid){ return must(await sb.from('categories').select('*').eq('project_id',pid).order('position')); },
    async addCategory(pid,cat){
      try { return must(await sb.from('categories').insert({project_id:pid,...cat}).select().single()); }
      catch(e){ if(!/description/i.test(String(e.message||e))) throw e;
        const { description, ...rest } = cat; // coluna ausente na nuvem: grava sem a descricao
        return must(await sb.from('categories').insert({project_id:pid,...rest}).select().single()); }
    },
    async updateCategory(id,patch){
      try { must(await sb.from('categories').update(patch).eq('id',id)); }
      catch(e){ if(!/description/i.test(String(e.message||e))) throw e;
        const { description, ...rest } = patch;
        if(Object.keys(rest).length) must(await sb.from('categories').update(rest).eq('id',id)); }
    },
    async deleteCategory(id){ must(await sb.from('categories').delete().eq('id',id)); },
    async getDocValues(docId){ return must(await sb.from('doc_values').select('*').eq('document_id',docId)); },
    // valor individual do usuario atual (cada pesquisador responde o seu)
    async setDocValue(pid,docId,catId,value){
      if(value===''){ must(await sb.from('doc_values').delete().eq('document_id',docId).eq('category_id',catId).eq('set_by',user.id).eq('layer','individual')); return; }
      must(await sb.from('doc_values').upsert({project_id:pid,document_id:docId,category_id:catId,value,set_by:user.id,author_name:name,layer:'individual',updated_at:new Date().toISOString()},{onConflict:'document_id,category_id,set_by,layer'}));
    },
    // valor consolidado (gabarito) ‚ÄĒ somente o dono escreve (garantido por RLS)
    async setFinalValue(pid,docId,catId,value){
      if(value===''){ must(await sb.from('doc_values').delete().eq('document_id',docId).eq('category_id',catId).eq('layer','final')); return; }
      must(await sb.from('doc_values').upsert({project_id:pid,document_id:docId,category_id:catId,value,set_by:user.id,author_name:name,layer:'final',updated_at:new Date().toISOString()},{onConflict:'document_id,category_id,set_by,layer'}));
    },
    // grava uma resposta de categoria com autor arbitrario (set_by:null, author_name livre) ‚ÄĒ
    // usado pelo import de .qualilab pra preservar cada pesquisador de origem como uma linha
    // independente, igual ja fazia addCoding com created_by:null. set_by null nunca colide
    // com a unique (document_id,category_id,set_by,layer) ‚ÄĒ Postgres trata NULL como distinto
    // de outro NULL ‚ÄĒ entao e sempre um insert novo, nunca um upsert/merge.
    async addDocValue(pid,v){
      return must(await sb.from('doc_values').insert({project_id:pid,document_id:v.document_id,category_id:v.category_id,value:v.value,set_by:v.set_by??null,author_name:v.author_name||'anonimo',layer:v.layer||'individual',updated_at:new Date().toISOString()}).select().single());
    },
    async listCodes(pid){ return must(await sb.from('codes').select('*').eq('project_id',pid).order('depth').order('position')); },
    async addCode(pid,code){ return must(await sb.from('codes').insert({project_id:pid,...code}).select().single()); },
    async updateCode(id,patch){ must(await sb.from('codes').update(patch).eq('id',id)); },
    // memos de SUBcodigos e das codings da subarvore (apagados por cascade do Postgres) sao
    // limpos pelo trigger memos_gc no banco ‚ÄĒ o cliente nao conhece a subarvore daqui.
    async deleteCode(id){ must(await sb.from('codes').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','code').eq('target_id',id); },
    async listCodings(pid,docId){ return must(await sb.from('codings').select('*').eq('project_id',pid).eq('document_id',docId)); },
    async addCoding(pid,co){
      const hasCB = Object.prototype.hasOwnProperty.call(co,'created_by');
      const row = {project_id:pid, created_by:user.id, author_name:name, ...co};
      if(hasCB && co.created_by===null) row.created_by = null;
      return must(await sb.from('codings').insert(row).select().single());
    },
    async deleteCoding(id){ must(await sb.from('codings').delete().eq('id',id)); await sb.from('memos').delete().eq('scope','coding').eq('target_id',id); },
    // memos: nota unica compartilhada por alvo (projeto/documento/codigo); ultima edicao vale
    async listMemos(pid){ try{ return must(await sb.from('memos').select('*').eq('project_id',pid)); }catch(e){ return []; } },
    async setMemo(pid, scope, targetId, content, authorName, label){
      if(!content || !content.trim()){
        must(await sb.from('memos').delete().eq('project_id',pid).eq('scope',scope).eq('target_id',targetId));
        return;
      }
      must(await sb.from('memos').upsert(
        { project_id:pid, scope, target_id:targetId, content, label:label||'', author_name:authorName||'anonimo', updated_by:user?.id||null, updated_at:new Date().toISOString() },
        { onConflict:'project_id,scope,target_id' }
      ));
    },
    async deleteMemo(id){ must(await sb.from('memos').delete().eq('id',id)); },
    // resultados salvos da aba "Analisar com IA"
    async listIaResults(pid){ try{ return must(await sb.from('ia_results').select('*').eq('project_id',pid).order('created_at',{ascending:false})); }catch(e){ return []; } },
    async addIaResult(pid,{scope,mode_label,result,author_name}){
      return must(await sb.from('ia_results').insert(
        { project_id:pid, scope, mode_label, result, author_name:author_name||'anonimo', created_by:user?.id||null }
      ).select().single());
    },
    async deleteIaResult(id){ must(await sb.from('ia_results').delete().eq('id',id)); },
    async listMemory(pid){ try{ return must(await sb.from('ia_memory').select('*').eq('project_id',pid).order('created_at',{ascending:false})); }catch(e){ return []; } },
    async addMemory(pid,{content,reason,source,ai_model,mode_label,author_name}){
      return must(await sb.from('ia_memory').insert(
        { project_id:pid, content, reason:reason||'', source:source||'ai', active:true, ai_model:ai_model||'', mode_label:mode_label||'', author_name:author_name||'anonimo', created_by:user?.id||null }
      ).select().single());
    },
    // via RPC: a policy de update de ia_memory protege o content (autor/admin), mas o
    // toggle de "usar na analise" e aberto a todo membro. Fallback direto pra banco antigo.
    async setMemoryActive(id,active){
      const r = await sb.rpc('set_memory_active',{ p_id:id, p_active:!!active });
      if(r.error) must(await sb.from('ia_memory').update({ active:!!active }).eq('id',id));
    },
    async deleteMemory(id){ must(await sb.from('ia_memory').delete().eq('id',id)); },
    // sincronizacao ao vivo: dispara onChange a cada alteracao em codings/doc_values do projeto
    realtime(projectId, onChange){
      const ch = sb.channel('qualilab:'+projectId)
        .on('postgres_changes', { event:'*', schema:'public', table:'codings',    filter:'project_id=eq.'+projectId }, onChange)
        .on('postgres_changes', { event:'*', schema:'public', table:'doc_values', filter:'project_id=eq.'+projectId }, onChange)
        .subscribe();
      return ()=>{ try{ sb.removeChannel(ch); }catch(e){} };
    },
  };
}

/* ===== Recorte "Ver:" unificado (camada/codificador) ‚ÄĒ fonte unica usada em TODAS as telas =====
   view: 'all' (individuais de todos + gabarito) | 'mine' | 'final' (gabarito) | <userId> | '__nm__'+nome
   Regra: 'all' = sobreposicao de TODAS as camadas (individuais de cada codificador + o gabarito
   consolidado), pra "ver todo mundo" incluir o que ja foi reconciliado. O gabarito sozinho fica
   em 'final'. (Atencao: em telas de contagem ‚ÄĒ Graficos/Relatorio ‚ÄĒ 'all' soma individuais E
   gabarito, entao o que ja foi consolidado conta duas vezes; escolha do autor.) Projeto individual:
   tudo ja nasce em 'final', entao o recorte so filtra por codificador quando ha >1 autor importado. */
function codingsForView(codings, view, userId, projectMode){
  if(projectMode==='individual'){
    if(typeof view==='string' && view.startsWith('__nm__')) return codings.filter(c=>c.author_name===view.slice(6));
    if(view && view!=='all' && view!=='mine' && view!=='final') return codings.filter(c=>c.created_by===view);
    return codings;
  }
  if(view==='final') return codings.filter(c=>c.layer==='final');
  if(view==='all') return codings;
  const indiv = codings.filter(c=>c.layer!=='final');
  if(view==='mine') return indiv.filter(c=>c.created_by===userId);
  if(typeof view==='string' && view.startsWith('__nm__')){ const nm=view.slice(6); return indiv.filter(c=>c.author_name===nm); }
  return indiv.filter(c=>c.created_by===view);
}
/* lista de valores de UMA categoria de UM documento conforme o recorte (para agregacao/distribuicao).
   'all' devolve as respostas de todos os pesquisadores + o gabarito; 'final' so o gabarito;
   'mine'/coder a resposta daquele autor. Em projeto individual, gabarito (ou a 1a resposta). */
function valuesForView(values, docId, catId, view, userId, projectMode){
  const rows = values.filter(v=>v.document_id===docId && v.category_id===catId);
  const fin = rows.find(r=>r.layer==='final');
  if(projectMode==='individual') return fin ? [fin.value] : (rows[0] ? [rows[0].value] : []);
  if(view==='final') return fin ? [fin.value] : [];
  const indiv = rows.filter(r=>(r.layer||'individual')!=='final');
  if(view==='all') return rows.map(r=>r.value);
  if(view==='mine'){ const m=indiv.find(r=>r.set_by===userId); return m?[m.value]:[]; }
  if(typeof view==='string' && view.startsWith('__nm__')){ const nm=view.slice(6); const m=indiv.find(r=>r.author_name===nm); return m?[m.value]:[]; }
  const m=indiv.find(r=>r.set_by===view); return m?[m.value]:[];
}
/* rotulo legivel do recorte (para textos/relatorio) */
function viewLabel(view, coders){
  if(view==='final') return 'gabarito final';
  if(view==='all') return 'individuais (todos)';
  if(view==='mine') return 'minhas codificacoes';
  if(typeof view==='string' && view.startsWith('__nm__')) return view.slice(6);
  const c=(coders||[]).find(x=>x.id===view); return c?c.name:'individuais';
}
/* Seletor "Ver:" unico, identico em todas as telas. Recebe o estado compartilhado do App.
   Visibilidade: igual a regra historica do leitor ‚ÄĒ projeto coletivo na nuvem, ou qualquer
   projeto com mais de um codificador (ex.: .qdpx importado offline). */
function ViewSelect({ value, onChange, coders, userId, projectMode, mode, label='Ver:' }){
  const show = (mode==='cloud' && projectMode==='collective') || (coders||[]).length>1;
  if(!show) return null;
  return html`<label class="meta" style="display:flex;align-items:center;gap:5px">${label}
    <select class="opt" value=${value} onChange=${e=>onChange(e.target.value)}>
      ${projectMode==='collective' ? html`
        <option value="all">Individuais (todos)</option>
        <option value="mine">Minhas</option>
        ${coders.filter(c=>c.id!==userId).map(c=>html`<option value=${c.id}>${c.name}</option>`)}
        <option value="final">Final / gabarito</option>
      ` : html`
        <option value="all">Todos os codificadores</option>
        ${coders.map(c=>html`<option value=${c.id}>${c.name}</option>`)}
      `}
    </select></label>`;
}

  useEffect(()=>{

  const [backupStatus, setBackupStatus] = useState({ active:false, name:null, lastOk:null, lastError:null, warnLarge:false }); // backup automatico em pasta (so LocalStore)
  const [sendCloudOpen, setSendCloudOpen] = useState(false); // modal "Enviar para a nuvem" (projeto local/arquivo -> projeto novo na nuvem)
  const [nudgeHidden, setNudgeHidden] = useState(false); // oculta o nudge do rascunho ATE recarregar (colapsavel por sessao)
  const [importMsg, setImportMsg] = useState(null);
  const [role, setRole] = useState('member');  // papel do usu√°rio no projeto: admin | member
  const [members, setMembers] = useState([]);   // membros do projeto (gest√£o de admins)

  const activeDoc = docs.find(d=>d.id===activeId) || null;
  const isAdmin = role==='admin';
  // editar o texto do documento: livre em rascunho/arquivo/individual; admin-only em coletivo na nuvem
  // (editar desloca os offsets dos grifos de TODOS os codificadores, entao so admin, que pode remapear todos).
  const canEditText = !!activeDoc && (store?.mode!=='cloud' || projectMode==='individual' || isAdmin);

  // modo escuro do app inteiro (persistido por navegador, sem relacao com o projeto). Liga/desliga
  // via html[data-theme=dark], que sobrepoe as variaveis de cor do :root. O tema do LEITOR
  // (readerPrefs.theme) e independente disto.
  const [darkMode, setDarkMode] = useState(()=>{ try{ return localStorage.getItem('qualilab:dark')==='1'; }catch(e){ return false; } });
  useEffect(()=>{
    document.documentElement.dataset.theme = darkMode ? 'dark' : '';
    try{ localStorage.setItem('qualilab:dark', darkMode?'1':'0'); }catch(e){}
  }, [darkMode]);

  // preferencias de leitura do .reader (zoom, largura, tema) ‚ÄĒ persistidas no localStorage,
  // sem relacao com o projeto (vale pra qualquer documento/projeto neste navegador).
  const [readerPrefs, setReaderPrefs] = useState(()=>{
    try{ return { scale:1, width:'normal', theme:'light', rightW:340, ...JSON.parse(localStorage.getItem('qualilab:reader_prefs')||'{}') }; }
    catch(e){ return { scale:1, width:'normal', theme:'light', rightW:340 }; }
  });
  useEffect(()=>{ try{ localStorage.setItem('qualilab:reader_prefs', JSON.stringify(readerPrefs)); }catch(e){} }, [readerPrefs]);
  // arrasta a divisa (.pane-resize) entre o leitor e o painel direito na tela de Codifica√ß√£o ‚ÄĒ
  // largura do painel direito persiste em readerPrefs.rightW. Arrastar pra esquerda alarga a
  // direita (delta = startX - x atual). Limites: 180px a 60% da janela.
  function onResizeHandleMouseDown(e){
    if(e.button!==0) return;
    const startX = e.clientX;
    const startW = readerPrefs.rightW;
    const handle = e.currentTarget;
    handle.classList.add('dragging');
    function onMove(ev){
      const delta = startX - ev.clientX;
      const newW = Math.max(180, Math.min(window.innerWidth*0.6, startW + delta));
      setReaderPrefs(p=>({...p, rightW:Math.round(newW)}));
    }
    function onUp(){ handle.classList.remove('dragging'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    e.preventDefault();
  }
  // busca dentro do documento aberto (independente da selecao de codigo/categoria)
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchIdx, setSearchIdx] = useState(0);
  const readerRef = useRef(null);
  const searchMatches = useMemo(()=>{
    const text = activeDoc?.content||'';
    const q = searchQuery.trim().toLowerCase();
    // minimo de 2 chars + teto de matches: buscar "a" num documento grande gerava dezenas
    // de milhares de matches -> dezenas de milhares de spans no DOM -> congelamento
    if(!q || q.length<2 || !text) return [];
    const lower = text.toLowerCase();
    const out = []; let from = 0;
    while(out.length<2000){ const found = lower.indexOf(q, from); if(found<0) break; out.push([found, found+q.length]); from = found+q.length; }
    return out;
  }, [searchQuery, activeDoc]);
  useEffect(()=>{ setSearchIdx(0); }, [searchQuery, activeId]);
  useEffect(()=>{
    if(!searchOpen || !searchMatches.length) return;
    const i = ((searchIdx % searchMatches.length) + searchMatches.length) % searchMatches.length;
    const el = readerRef.current?.querySelector(`[data-match="${i}"]`);
    el?.scrollIntoView({ block:'center' });
  }, [searchIdx, searchMatches, searchOpen]);

  // codificadores presentes no documento ativo (para o filtro "Ver:")
  // usa created_by quando dispon√≠vel (sess√£o ativa); cai em author_name para codifica√ß√Ķes
  // importadas de QDPX que chegam sem uuid (created_by === null)
  const coders = useMemo(()=>{
    const byId = {}; const byName = {};
    // lista de codificadores do PROJETO INTEIRO (allCodings) quando carregado ‚ÄĒ assim o filtro
    // "Ver:" aparece e oferece todos os pesquisadores mesmo abrindo um documento de um so autor;
    // cai para as codings do doc ativo enquanto allCodings nao estiver carregado.
    const src = allCodings.length ? allCodings : codings;
    src.forEach(c=>{
      // coletivo: a camada final (gabarito) nao e um "codificador". Individual: tudo conta,
      // pois .qdpx importado entra em 'final' mas preserva os autores em author_name ‚ÄĒ
      // sem isso, um projeto multi-pesquisador importado offline ficaria sem o filtro "Ver:".
      if(projectMode!=='individual' && c.layer==='final') return;
      if(c.created_by) byId[c.created_by] = c.author_name||'an√īnimo';
      else if(c.author_name) byName[c.author_name] = true;
    });
    const fromId = Object.entries(byId).map(([id,name])=>({id, name}));
    // inclui autores por nome que n√£o coincidam com algu√©m j√° indexado por uuid
    const fromName = Object.keys(byName)
      .filter(n=>!fromId.find(x=>x.name===n))
      .map(n=>({id:'__nm__'+n, name:n}));
    return [...fromId, ...fromName].sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  }, [allCodings, codings, projectMode]);

  // codifica√ß√Ķes vis√≠veis no leitor conforme o recorte "Ver:" ‚ÄĒ mesma fonte (codingsForView)
  // usada por Visualizar, Gr√°ficos e Relat√≥rio, pra o comportamento ser id√™ntico em todas as telas.
  const visibleCodings = useMemo(()=>
    codingsForView(codings, viewCoder, user?.id, projectMode)
  , [codings, viewCoder, user, projectMode]);

  // runs do leitor MEMOIZADOS (antes o buildRuns rodava inline no JSX a cada render do App ‚ÄĒ
  // cada sele√ß√£o de texto/tick de realtime re-segmentava o documento inteiro). O √≠ndice do
  // match de busca √© anotado numa √ļnica passada de dois ponteiros (era findIndex linear POR
  // RUN: O(runs√ómatches) congelava a busca em documento grande).
  const readerRuns = useMemo(()=>{
    if(!activeDoc) return [];
    const runs = buildRuns(activeDoc.content, visibleCodings, searchMatches.flat());
    let mi = 0;
    for(const run of runs){
      while(mi < searchMatches.length && searchMatches[mi][1] <= run.start) mi++;
      run.matchI = (mi < searchMatches.length && run.start>=searchMatches[mi][0] && run.end<=searchMatches[mi][1]) ? mi : -1;
    }
    return runs;
  }, [activeDoc, visibleCodings, searchMatches]);

  /* lista "Meus Projetos" por conta (cache local, complementa o servidor) */
  const recentKey = (st)=> 'qualilab:projects:'+((st||store)?.currentUser?.()?.id || 'anon');
  const getRecent = (st)=>{ try{ return JSON.parse(localStorage.getItem(recentKey(st))||'[]'); }catch(e){ return []; } };
  const removeRecent = (p, st)=>{ try{ const k=recentKey(st||store); localStorage.setItem(k, JSON.stringify(getRecent(st||store).filter(x=>x.code!==p.code))); }catch(e){} };
  const pushRecent = (p, st)=>{ try{ const k=recentKey(st); const list=getRecent(st).filter(x=>x.code!==p.code);
    list.unshift({ id:p.id, name:p.name, code:p.code, at:Date.now() }); localStorage.setItem(k, JSON.stringify(list.slice(0,30))); }catch(e){} };

  const loadMyProjects = useCallback(async ()=>{
    if(!store){ setMyProjects([]); return; }
    let list = null;
    try{ list = await store.listMyProjects?.(); }catch(e){}
    const local = getRecent();
    if(list && list.length){ const codes=new Set(list.map(p=>p.code)); list=[...list, ...local.filter(p=>!codes.has(p.code))]; }
    else { list = local; }
    setMyProjects(list);
  }, [store, user]); // eslint-disable-line
  useEffect(()=>{ if(phase==='gate' || account) loadMyProjects(); }, [phase, account, loadMyProjects]);

  /* carregar doc ativo ‚ÄĒ com token de staleness: trocar r√°pido de documento (ou um poll
     concorrente) podia fazer a resposta VELHA chegar depois e ancorar codings do doc A
     sobre o texto do doc B. S√≥ a resposta mais recente aplica o estado; dados id√™nticos
     n√£o trocam a refer√™ncia (sameJson) pra n√£o invalidar os useMemo do leitor. */
  const reqSeqRef = useRef({ doc:0, all:0 });
  const loadDoc = useCallback(async ()=>{
    if(!store || !project || !activeId){ setValues([]); setCodings([]); return; }
    const tok = ++reqSeqRef.current.doc;
    const [v, co] = await Promise.all([store.getDocValues(activeId), store.listCodings(project.id, activeId)]);
    if(tok !== reqSeqRef.current.doc) return;
    setValues(x=> sameJson(x,v) ? x : v);
    setCodings(x=> sameJson(x,co) ? x : co);
  }, [store, project, activeId]);
  useEffect(()=>{ loadDoc(); setSel(null); setCtxMenu(null); }, [loadDoc]);

  /* carregar trechos e valores de TODOS os documentos (aba de visualizacao) */
  const loadAll = useCallback(async ()=>{
    if(!store || !project){ setAllCodings([]); setAllValues([]); return; }
    const tok = ++reqSeqRef.current.all;
    // busca os valores+codings de TODOS os documentos em paralelo (antes era doc-a-doc em
    // serie: N round-trips sequenciais, lento na nuvem com muitos docs). O navegador limita
    // a concorrencia real por host, entao isso sobrepoe as latencias sem estourar o servidor.
    const per = await Promise.all(docs.map(async d=>{
      const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id, d.id)]);
      return { d, v, co };
    }));
    if(tok !== reqSeqRef.current.all) return; // resposta velha (outro loadAll ja come√ßou)
    const V=[], C=[];
    for(const { d, v, co } of per){
      v.forEach(x=>V.push({ document_id:d.id, category_id:x.category_id, value:x.value, author_name:x.author_name, layer:x.layer||'individual' }));
      co.forEach(x=>C.push(x));
    }
    setAllValues(x=> sameJson(x,V) ? x : V);
    setAllCodings(x=> sameJson(x,C) ? x : C);
  }, [store, project, docs]);

  // codings e disparava um loadAll completo (2 requests POR DOCUMENTO a cada 20s nas telas
  // agregadas, sem nada ter mudado). A atualiza√ß√£o ao vivo dessas telas √© responsabilidade
  // do reloadRef (evento realtime ‚Üí loadAll; poll de reserva agregado a cada 60s).
  useEffect(()=>{ if(phase==='work' && AGG_VIEWS.includes(mainView)) loadAll(); }, [phase, mainView, loadAll]);

  /* recarrega a visao atual ‚ÄĒ usado pelo realtime e pelo poll de reserva.
     full=true recarrega tambem o agregado (loadAll) quando uma tela agregada esta aberta;
     full=false so o doc ativo (barato: 2 requests). */
  const reloadRef = useRef(()=>{});
  reloadRef.current = (full)=>{ loadDoc(); if(full && AGG_VIEWS.includes(mainView)) loadAll(); };

  /* sincronizacao ao vivo no modo nuvem (codings/doc_values), com poll lento de reserva.
     Evento realtime = mudanca real -> recarga completa. O poll cego de reserva e dividido:
     doc ativo a cada 20s (leve) e agregado a cada 60s ‚ÄĒ o formato antigo (tudo a cada 20s)
     custava 2 requests POR DOCUMENTO a cada 20s nas telas agregadas. */
  useEffect(()=>{
    if(mode!=='cloud' || phase!=='work' || !project || !store || !store.realtime) return;
    const onChange = ()=>reloadRef.current(true);
    const unsub = store.realtime(project.id, onChange);
    const t  = setInterval(()=>reloadRef.current(false), 20000);
    const t2 = setInterval(()=>reloadRef.current(true), 60000);
    return ()=>{ if(unsub) unsub(); clearInterval(t); clearInterval(t2); };
  }, [mode, phase, project, store]);

  // reordena categorias por drag-and-drop: move draggedId pra posicao de targetId,
  // empurrando as demais ‚ÄĒ so muda position, nunca a hierarquia (categoria e flat).
  async function reorderCategories(draggedId, targetId){
    if(draggedId===targetId) return;
    const ordered = cats.slice().sort((a,b)=>(a.position??0)-(b.position??0));
    const from = ordered.findIndex(c=>c.id===draggedId), to = ordered.findIndex(c=>c.id===targetId);
    if(from<0 || to<0) return;
    ordered.splice(to, 0, ordered.splice(from,1)[0]);
    if(store.beginBatch) store.beginBatch();
    try{ await Promise.all(ordered.map((c,i)=> c.position!==i ? store.updateCategory(c.id,{position:i}) : null)); }
    finally{ if(store.endBatch) await store.endBatch(); }
    setCats(ordered.map((c,i)=>({...c,position:i})));
  }

    const c = await store.addCode(project.id,{ parent_id: parent?parent.id:null, name, hue, depth, hue_deg:hueDeg, position: codes.length });

  // cor personalizada: so o nivel 0 escolhe; a cascata propaga para todos os descendentes
  async function setCodeColor(rootCode, hex){
    if(!isAdmin){ setErr('Apenas administradores podem alterar a cor de uma fam√≠lia de c√≥digo.'); return; }
    const hueDeg = hex==='gray' ? -1 : hex==='black' ? -2 : hex ? hexToHue(hex) : null;
    const ids = new Set([rootCode.id]);
    let added = true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); }
    // batch + paralelo: a cascata numa fam√≠lia grande fazia um write serial por subc√≥digo
    if(store.beginBatch) store.beginBatch();
    try{ await Promise.all([...ids].map(id=>store.updateCode(id, { hue_deg: hueDeg }))); }
    finally{ if(store.endBatch) await store.endBatch(); }
    setCodes(x=>x.map(c=>ids.has(c.id) ? {...c, hue_deg:hueDeg} : c));
  }
  // censura propaga pra subarvore inteira (igual cor) ‚ÄĒ marcar uma familia como censura e
  // os subcodigos continuarem "normais" seria inconsistente: o pesquisador esperaria que
  // qualquer trecho dali pra baixo ficasse de fora do material da IA por padrao.
  async function setCodeRedaction(rootCode, value){
    if(!isAdmin){ setErr('Apenas administradores podem marcar um c√≥digo como censura.'); return; }
    const ids = new Set([rootCode.id]);
    let added = true;
    while(added){ added=false; codes.forEach(c=>{ if(c.parent_id && ids.has(c.parent_id) && !ids.has(c.id)){ ids.add(c.id); added=true; } }); }
    // ao marcar censura: for√ßa preto (hue_deg:-2); ao desmarcar: devolve cor autom√°tica (null)
    const huePatch = value ? { hue_deg: -2 } : { hue_deg: null };
    if(store.beginBatch) store.beginBatch();

  // Salva a edicao do texto do documento e REANCORA os grifos (remapSpans reancora por prefixo/sufixo;
  // grifo que caiu dentro do trecho editado e clampeado e contado em 'affected' pra avisar).
  async function saveEditedText(){
    if(!activeDoc) return;
    const oldC = activeDoc.content, newC = editDraft;
    const newTitle = (editTitleDraft||'').trim();
    const titleChanged = !!newTitle && newTitle !== activeDoc.name;   // titulo e so uma string, nao mexe em offset
    const contentChanged = newC !== oldC;
    if(!titleChanged && !contentChanged){ setEditingText(false); return; }
    let updates=[], affected=0;
    if(contentChanged){
      const docCodings = codings.filter(c=>c.document_id===activeDoc.id);
      const r = remapSpans(oldC, newC, docCodings); updates=r.updates; affected=r.affected;
      if(affected>0 && !window.confirm(`Sua edi√ß√£o toca ${affected} codifica√ß√£o(√Ķes): os grifos afetados ser√£o reajustados √†s bordas do trecho editado e podem precisar de confer√™ncia. Continuar?`)) return;
    }
    try{
      if(titleChanged) await renameDoc(activeDoc.id, newTitle);
      if(contentChanged){
        await store.setDocumentContent(activeDoc.id, newC);
        for(const u of updates) await store.updateCoding(u.id, { span_start:u.span_start, span_end:u.span_end, quote:u.quote });
      }
    }catch(e){ setErr('Falha ao salvar a edi√ß√£o: '+(e?.message||e)); return; }
    if(contentChanged){
      const patch = list => list.map(c=>{ const u=updates.find(x=>x.id===c.id); return u ? {...c, span_start:u.span_start, span_end:u.span_end, quote:u.quote} : c; });
      setDocs(ds=>ds.map(x=>x.id===activeDoc.id ? {...x, content:newC} : x));   // renameDoc ja atualizou o name
      setCodings(patch); setAllCodings(patch);
    }
    setEditingText(false);
  }

      if(e.key==='Escape'){

      const isUndo = (e.ctrlKey||e.metaKey) && !e.shiftKey && (e.key||'').toLowerCase()==='z';
      if(!isUndo || mainView!=='codificar' || undoStackRef.current.length===0) return;
      const tag = (e.target?.tagName||'').toLowerCase();

      e.preventDefault();

    window.addEventListener('keydown', onKeyDown);

  // monta o objeto db no mesmo formato de um .qualilab a partir do projeto ATIVO (qualquer
  // modo) ‚ÄĒ extraido pra ser reaproveitado tanto por saveQualilab (baixa como arquivo) quanto
  // por "enviar para a nuvem" (importa direto noutro projeto, sem passar por arquivo).
  async function buildQualilabDb(){
    const documents = docs.map(d=>({ id:d.id, name:d.name, content:d.content, created_at:d.created_at||new Date().toISOString() }));
    const categories = cats.map((c,i)=>({ id:c.id, position:c.position??i, name:c.name, kind:c.kind, options:c.options||[], description:c.description||'', color:c.color||0 }));
    const codesOut = codes.map((c,i)=>({ id:c.id, position:c.position??i, parent_id:c.parent_id||null, name:c.name, hue:c.hue||0, depth:c.depth||0, hue_deg:c.hue_deg??null, is_redaction:!!c.is_redaction, pos_x:c.pos_x??null, pos_y:c.pos_y??null }));
    const doc_values=[], codings=[];
    for(const d of docs){
      const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id, d.id)]);
      // set_by null √© sem√Ęntica de multi-autor importado (o autor de fato est√° em author_name)
      // e PRECISA sobreviver ao export ‚ÄĒ reescrever como 'file-user' fazia o valOf estrito
      // mostrar resposta alheia como "minha" ao reabrir o arquivo
      v.forEach(x=>doc_values.push({ id:x.id||uid(), document_id:d.id, category_id:x.category_id, value:x.value, set_by:x.set_by??null, author_name:x.author_name||'anonimo', layer:x.layer||'individual' }));
      co.forEach(x=>codings.push({ id:x.id||uid(), document_id:x.document_id, code_id:x.code_id, span_start:x.span_start, span_end:x.span_end, quote:x.quote, layer:x.layer||'individual', created_by:x.created_by??null, author_name:x.author_name||'anonimo', created_at:x.created_at||new Date().toISOString() }));
    }
    let memos=[], ia_results=[], ia_memory=[];
    try{ memos = (await store.listMemos?.(project.id))||[]; }catch(e){}
    try{ ia_results = ((await store.listIaResults?.(project.id))||[]).slice().reverse(); }catch(e){}
    try{ ia_memory = ((await store.listMemory?.(project.id))||[]).slice().reverse(); }catch(e){}
    return { _meta:{ id:'file-project', name:project.name||'Projeto', code:'FILE', mode:projectMode||'individual', displayName:user?.name||'pesquisador' },
      documents, categories, doc_values, codes:codesOut, codings, memos, ia_results, ia_memory };
  }

  async function doExport(kind){
    setExpOpen(false);
    try{
      const allV=[], allC=[];
      for(const d of docs){
        const [v,co]=await Promise.all([store.getDocValues(d.id), store.listCodings(project.id,d.id)]);
        v.forEach(x=>allV.push({ document_id:d.id, category_id:x.category_id, value:x.value, author:x.author_name||'anonimo', layer:x.layer||'individual' }));
        co.forEach(x=>allC.push(x));
      }
      const dn=(id)=>docs.find(d=>d.id===id)?.name||"";
      if(kind==='json'){
        const obj={ exported_at:new Date().toISOString(), project:{ name:project.name, code:project.code },
          documents:docs.map(d=>({id:d.id,name:d.name,content:d.content})),
          categories:cats.map(c=>({id:c.id,name:c.name,kind:c.kind,options:c.options,description:c.description||''})),
          document_values:allV,
          codes:codes.map(c=>({id:c.id,parent_id:c.parent_id,name:c.name,depth:c.depth,path:codePathFor(codes,c.id)})),
          codings:allC.map(c=>({id:c.id,document_id:c.document_id,code_id:c.code_id,code_path:codePathFor(codes,c.code_id),start:c.span_start,end:c.span_end,quote:c.quote,author:c.author_name,layer:c.layer||'individual'})) };
        download('qualilab_projeto.json', JSON.stringify(obj,null,2), 'application/json');
      } else if(kind==='trechos'){
        const header=["documento","familia","codigo","nivel","trecho","inicio","fim","autor","camada"];
        const sorted=allC.slice().sort((a,b)=> a.document_id===b.document_id ? a.span_start-b.span_start : (dn(a.document_id)>dn(b.document_id)?1:-1));
        const rows=sorted.map(c=>{ const p=codePathFor(codes,c.code_id); return [dn(c.document_id), p[0]||"", p.join(" > "), String(p.length-1), c.quote, String(c.span_start), String(c.span_end), c.author_name, c.layer||'individual']; });
        download('qualilab_trechos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='documentos'){
        // usa o gabarito (final) quando existe; senao a primeira resposta individual
        const valFor=(docId,catId)=>{ const rows=allV.filter(x=>x.document_id===docId&&x.category_id===catId);
          const fin=rows.find(r=>r.layer==='final'); return (fin||rows[0]||{}).value||""; };
        const header=["documento",...cats.map(c=>c.name),"n_trechos"];
        const rows=docs.map(d=>[d.name, ...cats.map(cat=>valFor(d.id,cat.id)), String(allC.filter(c=>c.document_id===d.id&&(c.layer||'individual')!=='final').length)]);
        download('qualilab_documentos.csv', '\uFEFF'+toCSV([header,...rows]), 'text/csv;charset=utf-8');
      } else if(kind==='qdpx'){
        // um valor por documento/categoria (QDPX espera isso): prefere o gabarito (final)
        const pick = {};
        allV.forEach(x=>{ const k=x.document_id+':'+x.category_id; const cur=pick[k];
          if(!cur || (x.layer==='final' && cur.layer!=='final')) pick[k]=x; });
        // prefere a camada final (gabarito consolidado); se nao houver, usa as individuais
        const finalCods = allC.filter(c=>c.layer==='final');
        const codForQdpx = finalCods.length > 0 ? finalCods : allC.filter(c=>(c.layer||'individual')!=='final');
        await exportQDPX(docs, cats, Object.values(pick), codes, codForQdpx, project);
      } else if(kind==='ati' || kind==='leitor'){
        let memosForExport=[]; try{ memosForExport=(await store.listMemos?.(project.id))||[]; }catch(e){}
        if(kind==='ati') exportWebAnnotations(docs, codes, allC, memosForExport, project);
        else exportTransparencyReader(docs, codes, allC, memosForExport, project);
      }
    }catch(e){ setErr('Falha ao exportar: '+(e.message||e)); }
  }

    if(!s || s.rangeCount===0 || s.isCollapsed) return null;
    const r = s.getRangeAt(0);
    const off=(node,o)=>{ let el=node.nodeType===3?node.parentElement:node; while(el && (!el.dataset || el.dataset.start===undefined)) el=el.parentElement; return el?parseInt(el.dataset.start,10)+o:null; };
    const a=off(r.startContainer,r.startOffset), b=off(r.endContainer,r.endOffset);
    if(a==null||b==null) return null;
    const start=Math.min(a,b), end=Math.max(a,b);
    const q = activeDoc.content.slice(start,end); if(q.trim().length===0) return null;
    return { start, end, quote:q };
  }
  function onMouseUp(e){
    if(e && e.button!==0) return; // ignora clique direito (tratado em onContextMenu)
    const sx = computeSelection();
    if(sx){ setSel(sx); setRtab('codigos'); }
  }
  function onContextMenu(e){
    const sx = computeSelection();
    const marked = e.target?.closest?.('[data-c="1"]');
    if(!sx && !marked) return; // sem sele√ß√£o nem grifo: deixa o menu normal do navegador
    e.preventDefault();
    // limite direito = borda da coluna de leitura (n√£o invade o painel da direita)
    const boundRight = e.currentTarget.getBoundingClientRect().right;
    if(sx){
      setSel(sx);
      setCtxMenu({ x:e.clientX, y:e.clientY, sel:sx, quote:sx.quote, boundRight });
    } else {
      const start = parseInt(marked.dataset.start,10);
      const end = parseInt(marked.dataset.end||marked.dataset.start,10);
      setCtxMenu({ x:e.clientX, y:e.clientY, sel:null, pos:start, runEnd:end, quote:activeDoc.content.slice(start,end), boundRight });
    }
  }

  /* ----- maps ----- */
  const codeById = useMemo(()=>Object.fromEntries(codes.map(c=>[c.id,c])), [codes]);
  // codigos em ordem de arvore (pai antes dos filhos), para o menu de contexto
  const orderedCodes = useMemo(()=>{
    const out=[]; const childrenOf=(id)=>codes.filter(c=>c.parent_id===id);
    const walk=(list)=>list.forEach(c=>{ out.push(c); walk(childrenOf(c.id)); });
    walk(codes.filter(c=>!c.parent_id));
    return out;
  }, [codes]);
  const codePath = useCallback((id)=>{ const out=[]; let c=codeById[id]; let guard=0; while(c&&guard++<12){ out.unshift(c.name); c=c.parent_id?codeById[c.parent_id]:null; } return out; }, [codeById]);
  // o pr√≥prio autor sempre remove; admin remove (rejeita) o grifo de qualquer codificador; fora da nuvem/individual tudo √© do usu√°rio
  const canRemoveCoding = useCallback((c)=> store?.mode!=='cloud' || projectMode==='individual' || c.created_by===user?.id || isAdmin, [store, projectMode, user, isAdmin]);
  function codingsForCtxMenu(menu){
    if(!menu) return [];
    const matches = visibleCodings.filter(c=>{
      if(c.document_id!==activeId || !canRemoveCoding(c)) return false;
      if(menu.sel) return c.span_start < menu.sel.end && c.span_end > menu.sel.start;
      return c.span_start <= menu.pos && c.span_end > menu.pos;
    });
    const seen = new Set();
    return matches.filter(c=>{ if(seen.has(c.id)) return false; seen.add(c.id); return true; });
  }
  const codingCount = useMemo(()=>{ const m={}; codings.forEach(c=>{m[c.code_id]=(m[c.code_id]||0)+1;}); return m; }, [codings]);
  // frequencia GLOBAL (todo o projeto, nao so o documento aberto) ‚ÄĒ usada na aba Esquema,
  // que nao tem documento ativo; ajuda a ver o que esta sendo usado de fato ao reorganizar
  // agregada (familia soma os subcodigos), igual o countByCode do VizNav ‚ÄĒ sem isso, uma
  // familia (Hierarquia 0) sempre aparece com 0 quando o uso real esta nos subcodigos
  const schemaCodingCount = useMemo(()=>{
    const direct={}; allCodings.forEach(c=>{direct[c.code_id]=(direct[c.code_id]||0)+1;});
    const parentOf={}; codes.forEach(c=>{parentOf[c.id]=c.parent_id;});
    const agg={...direct};
    Object.entries(direct).forEach(([codeId,n])=>{

        ${store?.mode==='local' && localUsage>=0.75*LOCAL_QUOTA_CHARS && html`<span class="pill mode-offline" style="font-size:11px"

    ${store?.mode==='local' && !nudgeHidden && html`<div class="nudge">

/* ============ MODAL DE MAPEAMENTO DO .csv ============
   Mostra cada coluna do .csv e deixa o usuario escolher o papel dela: Texto (conteudo do
   documento), Nome do documento, uma Categoria (de qualquer tipo) ou Ignorar. Exige
   exatamente UMA coluna de texto. Os defaults sao um chute: a coluna com texto mais longo
   em media vira o "Texto"; as demais viram Categoria ¬∑ Texto Fechado (revisavel). */
function CsvImportModal({ parsed, fileName, onCancel, onConfirm }){
  const { headers, rows } = parsed;
  // chute inicial: coluna com maior comprimento medio = texto
  const guessTextCol = (()=>{
    let best=0, bestLen=-1;
    headers.forEach((_,c)=>{ let sum=0,n=0; for(const r of rows.slice(0,50)){ sum+=(r[c]||'').length; n++; } const avg=n?sum/n:0; if(avg>bestLen){ bestLen=avg; best=c; } });
    return best;
  })();
  const [roles, setRoles] = useState(()=> headers.map((_,c)=> c===guessTextCol ? 'text' : 'cat:select'));
  const setRole = (c,v)=> setRoles(rs=> rs.map((x,i)=> i===c ? v : x));

  const textCount = roles.filter(r=>r==='text').length;
  const valid = textCount===1;
  const roleOpts = [
    {v:'ignore', l:'‚ÄĒ Ignorar ‚ÄĒ'},
    {v:'text', l:'Texto (conte√ļdo do documento)'},
    {v:'name', l:'Nome do documento'},
    ...CAT_KINDS.map(k=>({v:'cat:'+k.id, l:'Categoria ¬∑ '+k.label})),
  ];

  function confirm(){
    if(!valid) return;
    const textCol = roles.findIndex(r=>r==='text');
    const nameCol = roles.findIndex(r=>r==='name'); // -1 se nenhum
    const cats = roles.map((r,c)=> r.startsWith('cat:') ? { col:c, name:headers[c], kind:r.slice(4) } : null).filter(Boolean);
    onConfirm({ textCol, nameCol, cats });
  }

  // amostra por coluna: primeiros 3 VALORES DISTINTOS nao-vazios (para no 3o, varre so o necessario) ‚ÄĒ
  // a 1a linha de dados as vezes esta vazia/NA e nao representa a coluna; mostrar distintos
  // da uma ideia melhor do conteudo (e ja sinaliza colunas de poucos valores = candidatas a fechada).
  const colSamples = headers.map((_,c)=>{
    const seen=new Set(); const out=[];
    for(const r of rows){ const v=(r[c]||'').trim(); if(!v||seen.has(v)) continue; seen.add(v); out.push(v); if(out.length>=3) break; }
    return out;
  });
  return html`<div class="modal-bg" onClick=${onCancel}>
    <div class="modal" onClick=${e=>e.stopPropagation()} style="max-width:640px">
      <h3 style="margin:0 0 4px">Importar planilha</h3>
      <p class="hint" style="margin:0 0 12px">
        <b>${fileName}</b> ¬∑ ${rows.length} linha(s) ‚Üí cada linha vira um documento.
        Escolha o papel de cada coluna. Exatamente uma coluna deve ser o <b>Texto</b> (o conte√ļdo a codificar); as demais podem virar categorias.
      </p>
      <div style="max-height:46vh;overflow:auto;display:flex;flex-direction:column;gap:8px">
        ${headers.map((h,c)=> html`<div key=${c} class="card" style="padding:8px 10px;display:flex;align-items:center;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h}</div>
            <div class="hint" style="font-family:var(--mono);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title=${colSamples[c].join(' ¬∑ ')}>
              ${colSamples[c].length ? 'ex.: '+colSamples[c].join(' ¬∑ ') : '(coluna vazia)'}
            </div>
          </div>
          <select value=${roles[c]} onChange=${e=>setRole(c, e.target.value)} style="flex-shrink:0">
            ${roleOpts.map(o=> html`<option key=${o.v} value=${o.v}>${o.l}</option>`)}
          </select>
        </div>`)}
      </div>
      ${!valid && html`<p class="hint" style="color:var(--danger);margin:10px 0 0">
        ${textCount===0 ? 'Selecione uma coluna como "Texto (conte√ļdo do documento)".' : 'Apenas uma coluna pode ser o Texto.'}
      </p>`}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button class="btn ghost" onClick=${onCancel}>Cancelar</button>
        <button class="btn primary" disabled=${!valid} onClick=${confirm}>Importar</button>
      </div>
    </div>
  </div>`;
}

/* ============ PAINEL DE CATEGORIAS (atributos do documento) ============ */
function CategoriesPanel({ cats, values, activeDoc, canEditSchema, userId, projectMode, viewCoder, onSet, onAdd, onUpd, onDel, dragCatId, setDragCatId, onReorder }){
  // individual: setValue grava direto em layer='final' (sem multi-coder) ‚ÄĒ mostra o gabarito,
  // sempre editavel (so existe 1 "pesquisador").
  // coletivo: segue o MESMO filtro "Ver:" que o leitor usa pra codings, mas um campo de
  // categoria so cabe UM valor por vez ‚ÄĒ diferente dos grifos no texto, que podem sobrepor
  // varios. Por isso 'all' (Individuais/todos, no leitor = sobrepoe todo mundo) NAO pode
  // significar "minha resposta" aqui: sem um pesquisador especifico escolhido nao ha como
  // "calcular" qual resposta mostrar, entao cai no gabarito se existir (so leitura) ‚ÄĒ so 'mine'
  // (resposta do PROPRIO usuario, sem ambiguidade) e editavel. Ver a resposta de outro
  // pesquisador ou o gabarito tambem fica somente leitura ‚ÄĒ editar ali so escreveria sob a
  // identidade de quem esta logado (setDocValue sempre usa o uid do usuario atual), entao
  // "corrigir" o que aparece sobrescreveria a PROPRIA resposta do usuario atual por engano,
  // nao a da pessoa exibida. O gabarito se edita na Reconcilia√ß√£o (onSetFinal), nao aqui.
  const isOwnView = projectMode==='individual' || viewCoder==='mine';
  const valOf = (catId)=>{
    const final = ()=> values.find(v=>v.category_id===catId && v.layer==='final');
    if(projectMode==='individual') return final();
    if(viewCoder==='final' || viewCoder==='all') return final(); // 'all': sem 1 resposta so p/ mostrar, cai no gabarito
    const indiv = values.filter(v=>v.category_id===catId && (v.layer||'individual')!=='final');
    if(viewCoder==='mine') return indiv.find(v=>v.set_by===userId);
    if(viewCoder.startsWith('__nm__')){ const nm=viewCoder.slice(6); return indiv.find(v=>v.author_name===nm); }
    return indiv.find(v=>v.set_by===viewCoder);
  };
  const viewLbl = viewCoder==='final' ? 'Final / gabarito' : viewCoder==='all' ? 'Final / gabarito (sem 1 resposta individual s√≥ pra mostrar com "todos")' : viewCoder.startsWith('__nm__') ? viewCoder.slice(6) : 'outro pesquisador';
  return html`<div class="section">
    <p class="h">Atributos deste documento</p>
    <p class="hint">Cada categoria recebe um valor para o documento inteiro (n√£o para um trecho). O esquema √© definido pelo dono do projeto; o valor √© preenchido por documento.</p>
    ${!isOwnView && html`<div class="banner warn" style="margin:0 0 10px">Mostrando: ${viewLbl} ‚ÄĒ somente leitura. Troque o filtro "Ver:" para "Minhas" pra editar a sua pr√≥pria resposta.</div>`}
    ${!activeDoc && html`<div class="card"><span class="meta">Abra um documento para preencher.</span></div>`}
    ${activeDoc && cats.length===0 && html`<div class="card"><span class="meta">${canEditSchema?'Nenhuma categoria ainda. Crie abaixo.':'Nenhuma categoria definida pelo dono do projeto.'}</span></div>`}
    ${activeDoc && cats.map(cat=>{
      const v = valOf(cat.id);
      return html`<div class="field" key=${cat.id}>
        <div class="field-label">${cat.name} ${v && html`<span class="author">${v.author_name}</span>`}</div>
        ${cat.description && html`<p class="hint" style="margin:-2px 0 7px">${cat.description}</p>`}
        <${CategoryValue} cat=${cat} v=${v} onSet=${val=>onSet(cat.id,val)} readOnly=${!isOwnView} />
      </div>`;
    })}
    ${canEditSchema && html`<details style="margin-top:10px">
      <summary style="cursor:pointer;font-size:12.5px;color:var(--ink-soft)">Gerenciar esquema de categorias</summary>
      <div style="margin-top:10px">
        <${DraggableCategoryList} cats=${cats} onUpd=${onUpd} onDel=${onDel}
          dragCatId=${dragCatId} setDragCatId=${setDragCatId} onReorder=${onReorder} />
        <button class="btn sm" onClick=${onAdd} style="margin-top:6px">Ôľč Nova categoria</button>
      </div>
    </details>`}
  </div>`;
}
/* lista de categorias com reordenacao por arrastar (drag-and-drop nativo, sem lib) ‚ÄĒ usado
   tanto em CategoriesPanel quanto na aba Esquema, mesmos dragCatId/onReorder vindos do App
   (so 1 dessas vistas fica visivel por vez, entao reaproveitar o mesmo estado e seguro). */
function DraggableCategoryList({ cats, onUpd, onDel, dragCatId, setDragCatId, onReorder }){
  const [overId, setOverId] = useState(null);
  const endDrag = ()=>{ setDragCatId(null); setOverId(null); };
  return html`<div>
    ${cats.map(cat=>{
      const dragging = dragCatId===cat.id;
      const isTarget = overId===cat.id && dragCatId && !dragging;
      return html`<div key=${cat.id} class="row" style=${`gap:6px;align-items:flex-start;border-radius:8px;transition:opacity .12s;${dragging?'opacity:.35':''}${isTarget?'box-shadow:0 -3px 0 0 var(--sky);margin-top:4px':''}`}
        onDragOver=${e=>{ e.preventDefault(); if(dragCatId && dragCatId!==cat.id && overId!==cat.id) setOverId(cat.id); }}
        onDragLeave=${e=>{ if(overId===cat.id) setOverId(null); }}
        onDrop=${e=>{ e.preventDefault(); if(dragCatId && dragCatId!==cat.id) onReorder(dragCatId, cat.id); endDrag(); }}>
        <span class="drag-handle" draggable="true" title="arrastar para reordenar"
          onDragStart=${e=>{ e.dataTransfer.effectAllowed='move'; setDragCatId(cat.id); }}
          onDragEnd=${endDrag}>‚†Ņ</span>
        <div style="flex:1;min-width:0"><${CategoryEditor} cat=${cat} onUpd=${onUpd} onDel=${onDel} /></div>
      </div>`;
    })}
  </div>`;
}
function CategoryEditor({ cat, onUpd, onDel }){
  const [nv,setNv]=useState('');
  const opts = cat.options||[];
  const realOpts = opts.filter(o=>!isSpecialOpt(o));
  const hasTok = (tok)=> opts.includes(tok);
  // mantem os valores reais e adiciona/remove o token no fim, preservando a ordem dos demais
  const toggleTok = (tok,on)=>{ const base = opts.filter(o=>o!==tok); onUpd(cat.id,{ options: on ? [...base,tok] : base }); };
  const addVal = ()=>{ const t=nv.trim(); if(!t||isSpecialOpt(t)||opts.includes(t)) { setNv(''); return; }
    const tokens = opts.filter(isSpecialOpt); onUpd(cat.id,{ options:[...realOpts, t, ...tokens] }); setNv(''); };
  return html`<div class="card" style="margin-bottom:8px">
    <div class="row" style="gap:6px">
      <input class="txtin" value=${cat.name} onInput=${e=>onUpd(cat.id,{name:e.target.value})} />
      <select class="opt" value=${cat.kind} onChange=${e=>onUpd(cat.id,{kind:e.target.value})}>
        ${CAT_KINDS.map(k=>html`<option value=${k.id}>${k.label}</option>`)}
      </select>
      <button class="icon-btn" onClick=${()=>onDel(cat.id)} title="excluir">ūüóĎ</button>
    </div>
    <input class="txtin" style="margin-top:6px" placeholder="descri√ß√£o / instru√ß√£o (opcional)"
      value=${cat.description||''} onInput=${e=>onUpd(cat.id,{description:e.target.value})} />
    ${CAT_HAS_OPTIONS(cat.kind) && html`<div style="margin-top:8px">
      <div class="row" style="flex-wrap:wrap;gap:5px;margin-bottom:6px">
        ${realOpts.map(o=>html`<span class="opt" style="display:inline-flex;gap:5px">${o}
          <button class="icon-btn" style="padding:0" onClick=${()=>onUpd(cat.id,{options:opts.filter(x=>x!==o)})}>‚úē</button></span>`)}
      </div>
      <div class="row" style="gap:6px">
        <input class="txtin" placeholder="adicionar valor" value=${nv} onInput=${e=>setNv(e.target.value)}
          onKeyDown=${e=>{ if(e.key==='Enter') addVal(); }} />
        <button class="btn sm" onClick=${addVal}>Ôľč</button>
      </div>
    </div>`}
    <div class="row" style="gap:16px;margin-top:8px;flex-wrap:wrap">
      <label class="row" style="gap:5px;font-size:12.5px;cursor:pointer">
        <input type="checkbox" checked=${hasTok(NAO_INFO)} onChange=${e=>toggleTok(NAO_INFO,e.target.checked)} /> Permitir "N√£o informado"</label>
      ${CAT_HAS_OPTIONS(cat.kind) && html`<label class="row" style="gap:5px;font-size:12.5px;cursor:pointer">
        <input type="checkbox" checked=${hasTok(OUTROS)} onChange=${e=>toggleTok(OUTROS,e.target.checked)} /> Permitir "Outros" (valor livre)</label>`}
    </div>
  </div>`;
}

/* ============ VALOR DE UMA CATEGORIA (por documento) ============
   "N√£o informado" e "Outros" sao opcoes dentro da categoria (tokens em options).
   Escolher "Outros" abre um campo de texto livre cujo conteudo vira o valor. */
function CategoryValue({ cat, v, onSet, readOnly }){
  const [editingOther,setEditingOther]=useState(false);
  const opts = cat.options||[];
  const hasNA = opts.includes(NAO_INFO);
  const hasOther = opts.includes(OUTROS);
  const realOpts = opts.filter(o=>!isSpecialOpt(o));
  const value = v ? v.value : '';
  const isNA = value===NAO_INFO;
  const noVals = realOpts.length===0 && !hasNA && !hasOther
    ? html`<span class="meta">sem valores ‚ÄĒ edite o esquema abaixo</span>` : '';

  if(cat.kind==='date') return html`<${DateInput} value=${value} onCommit=${onSet} disabled=${readOnly} />`;

  if(cat.kind==='text'){
    return html`<div>
      ${hasNA && html`<button class="opt ${isNA?'on':''}" disabled=${readOnly} style="margin-bottom:6px" onClick=${()=>onSet(isNA?'':NAO_INFO)}>N√£o informado</button>`}
      ${!isNA && (readOnly
        ? html`<span class="opt" style="display:inline-block;cursor:default">${value||html`<span class="meta" style="font-style:italic">sem resposta</span>`}</span>`
        : html`<${DebInput} value=${value} onCommit=${onSet} placeholder="valor descritivo" />`)}
    </div>`;
  }

  if(cat.kind==='checkbox'){
    const selv = isNA ? [] : (value?String(value):'').split(CAT_MULTI_SEP).filter(Boolean);
    const customs = selv.filter(s=>!realOpts.includes(s));
    const showOther = hasOther && (editingOther || customs.length>0);
    const setSel = (arr)=> onSet(arr.join(CAT_MULTI_SEP));
    const toggle = (o)=>{ const base=isNA?[]:selv; setSel(base.includes(o)?base.filter(x=>x!==o):[...base,o]); };
    const setOther = (txt)=>{ const keep = selv.filter(s=>realOpts.includes(s)); setSel(txt.trim()?[...keep,txt.trim()]:keep); };
    return html`<div class="row" style="flex-wrap:wrap;gap:6px">
        ${noVals}
        ${realOpts.map(o=>html`<button class="opt ${selv.includes(o)?'on':''}" disabled=${readOnly} onClick=${()=>toggle(o)}>${selv.includes(o)?'‚ėĎ':'‚ėź'} ${o}</button>`)}
        ${hasOther && (customs.length>0 || !readOnly) && html`<button class="opt ${showOther?'on':''}" disabled=${readOnly} onClick=${()=>setEditingOther(x=>!x)}>${showOther?'‚ėĎ':'‚ėź'} Outros</button>`}
        ${hasNA && html`<button class="opt ${isNA?'on':''}" disabled=${readOnly} onClick=${()=>onSet(isNA?'':NAO_INFO)}>${isNA?'‚ėĎ':'‚ėź'} N√£o informado</button>`}
        ${showOther && (readOnly
          ? html`<span class="opt" style="display:inline-block;cursor:default">${customs[0]||''}</span>`
          : html`<${DebInput} value=${customs[0]||''} onCommit=${setOther} placeholder="qual?" />`)}
      </div>`;
  }

  // single / select: valor unico
  const isCustom = hasOther && !!value && value!==NAO_INFO && !realOpts.includes(value);
  const showOther = hasOther && (editingOther || isCustom);

  if(cat.kind==='select'){
    const selVal = showOther ? '__other__' : (isNA ? NAO_INFO : (realOpts.includes(value)?value:''));
    return html`<div>
      <select class="opt" disabled=${readOnly} style="min-width:180px" value=${selVal} onChange=${e=>{ const val=e.target.value;
          if(val==='__other__'){ setEditingOther(true); onSet(''); } else { setEditingOther(false); onSet(val); } }}>
        <option value="">(sem valor)</option>
        ${realOpts.map(o=>html`<option value=${o}>${o}</option>`)}
        ${hasOther && html`<option value="__other__">Outros‚Ä¶</option>`}
        ${hasNA && html`<option value=${NAO_INFO}>N√£o informado</option>`}
      </select>
      ${showOther && html`<div style="margin-top:6px">${readOnly
        ? html`<span class="opt" style="display:inline-block;cursor:default">${isCustom?value:''}</span>`
        : html`<${DebInput} value=${isCustom?value:''} onCommit=${onSet} placeholder="qual?" />`}</div>`}
      ${noVals && html`<div style="margin-top:4px">${noVals}</div>`}
    </div>`;
  }

  // single = M√ļltipla Escolha (bot√Ķes)
  return html`<div class="row" style="flex-wrap:wrap;gap:6px;align-items:center">
      ${noVals}
      ${realOpts.map(o=>html`<button class="opt ${(!isCustom && value===o)?'on':''}" disabled=${readOnly} onClick=${()=>{ setEditingOther(false); onSet(value===o?'':o); }}>${o}</button>`)}
      ${hasOther && (isCustom || !readOnly) && html`<button class="opt ${showOther?'on':''}" disabled=${readOnly} onClick=${()=>setEditingOther(true)}>Outros</button>`}
      ${hasNA && html`<button class="opt ${isNA?'on':''}" disabled=${readOnly} onClick=${()=>{ setEditingOther(false); onSet(isNA?'':NAO_INFO); }}>N√£o informado</button>`}
      ${showOther && (readOnly
        ? html`<span class="opt" style="display:inline-block;cursor:default">${isCustom?value:''}</span>`
        : html`<${DebInput} value=${isCustom?value:''} onCommit=${onSet} placeholder="qual?" />`)}
    </div>`;
}
